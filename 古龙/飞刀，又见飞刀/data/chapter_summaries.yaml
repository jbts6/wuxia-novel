- chapter: 1
  title: 楔子
  summary: 段八方以十三太保横练称雄，统领七大门派四十二寨并遥领齐豫四大镖局。除夕前三天他在淮阳调停纷争后走出镇海楼，收到落拓少年所送仅画小刀的白纸，竟拔刀自刃。棺木运回八方庄时已是大年初一，却又传出他曾在年初一仍活着的怪事，揭开飞刀阴影。
- chapter: 2
  title: 第一回　归来
  summary: 浪子李坏回到边陲山城，在馒头铺以半真半假的话认下老张，揭开他在此成长的童年噩梦与归来动机。
- chapter: 3
  title: 第二回　月神的刀
  summary: 边陲强豪方天豪与段八方同型，爱权势名声与独女可可。他命吴心柳以京城泥金笺写帖，对铁银衣一系极为忌惮。回目点出月神之刀的阴影。
- chapter: 4
  title: 第三回　轻柔
  summary: 情节转向更私人的情感与关系张力，李坏与边城人物周旋，轻柔表象下暗流涌动。
- chapter: 5
  title: 第四回　山城之死
  summary: 山城笼罩死亡阴影，李坏再度面对这座小城的残酷与变故，归来之城变为死城意象。
- chapter: 6
  title: 第五回　银衣
  summary: 铁银衣正式登场，银衣客以权势财富介入李坏命运，局面由边城恩怨升至更大棋局。
- chapter: 7
  title: 第六回　李坏的家
  summary: 李坏回到自己的家，私人空间揭开其身世与情感的另一面。
- chapter: 8
  title: 第七回　骨血
  summary: 骨血主题凸显，李坏的血脉、家与恨交织，为李家真相铺垫。
- chapter: 9
  title: 第八回　公孙太夫人
  summary: 高地一夜搭起豪华帐篷，名厨美人云集。铁银衣请李坏痛饮，公孙太夫人一系权势登场，夜宴成为权力与杀机的舞台。
- chapter: 10
  title: 第九回　夜迷蒙
  summary: 夜宴乐声如战场，胡琴蚊鸣压倒一切，公孙太夫人步出，保证李坏日出前不死。紫藤花等人物穿插，夜色迷离杀机四伏。
- chapter: 11
  title: 第十回　第一名侠
  summary: 第一名侠的名号与江湖秩序被提起，李坏与飞刀传说的身份压力加剧。
- chapter: 12
  title: 第十一回　一剑飞雪
  summary: 一剑飞雪的凌厉对决展开，剑势与飞刀传说碰撞，是全书武戏高潮之一。
- chapter: 13
  title: 第十二回　锦囊
  summary: 锦囊带来密计或关键讯息，推动局势向最终对决收束。
- chapter: 14
  title: 第十三回　小楼
  summary: 小楼成为对峙与情感交汇的空间，灯光与人心交织，为生死之局定场。
- chapter: 15
  title: 第十四回　曼青老人
  summary: 李曼青（曼青老人）登场，李家尊荣与小李探花一脉的真相更近。
- chapter: 16
  title: 第十五回　生死
  summary: 月神与小星遥望小楼。正月十五的生死对决不可避免：李坏是李家后代，月神不能让薛家尊荣毁在自己手里，二人相爱却必须刀剑相向。
- chapter: 17
  title: 尾声
  summary: 作者直抒：胜败生死皆是刹那，情感却是永恒。李坏与月神无论结果都是悲剧，并希望人能想出避免悲剧的法子。
