- chapter: 1
  title: 第一回 万福万寿园
  summary: 楔子铺陈楚留香传奇名声与胡铁花等挚友。第一回写金太夫人于万福万寿园八旬寿宴，楚留香、胡铁花应金灵芝之约前来。寿堂中少女艾青失仪放响屁，楚留香代为顶缸后在假山结识艾青与爱笑的张洁洁；艾青约三更以五百两相报。胡铁花因金灵芝欲嫁而拉楚留香遁入小酒铺痛饮醉卧。三更自称艾青之妹的艾虹上门以身抵银，鞋底毒刃行刺，被佯醉的胡铁花抓住脚后逃走。楚留香赴约先遇张洁洁警示，再入园外小屋见仅戴毒针耳环的艾青；艾青坦言奉命以色杀他，天明窗外纤手弹耳环袭杀，艾青失踪，楚留香仅抓住一只齐腕断手，知遇极可怕对手。
- chapter: 2
  title: 第二回 勾魂玉手
  summary: 楚留香发现房中断手并非先前所见之手，疑与艾青有关；张洁洁告知此为勾魂手，并承认知悉艾青携杀人耳环来杀他。二人搭骡车进城寻张洁洁的朋友，却遭假扮市井夫妇的武林高手老头子与老太婆算计，以秤杆点穴制住楚留香。楚留香借酒喷作酒箭冲开穴道，凭天下无双的轻功脱身；夫妇逃走后，骡车车底竟传出掌声。
- chapter: 3
  title: 第三回一线曙光
  summary: 张洁洁从车下现身，与楚留香调侃并透露曾想救他；楚留香以骡子识途追查幕后，骡子却回源记骡马号，线索指向金家。艾虹于五福楼现身，自白非艾青之妹且少了一手，旋即被人绑架。楚留香追车迷路，投宿卜担夫家，夜见阿鹃取下头颅梳头的诡秘景象。
- chapter: 4
  title: 第四回好梦难成
  summary: 楚留香追衔人头的黑狗，蜡头炸开迷药倒地，揭穿卜担夫装无头人；卜阿鹃以梳头、妒夫木与情人油连环骗他去瀑布山洞送死。楚留香识破卜担夫即童子功高手不空、毒物为假，半路装鬼吓退卜阿鹃。张洁洁出现并赶走卜阿鹃，告知老头子夫妻即秤与秤砣、骡子属金四爷。二人至三岔路口酒摊，张洁洁借马离去；假老板娘抛婴点穴欲囚楚留香，被其装瘫套话后脱身。窗外七名弩手被细暗器同时点倒，树上黄衣张洁洁抛荔枝暗示亦有毒，桃花运仍未了。
- chapter: 5
  title: 第五回花非花雾非雾
  summary: 张洁洁告知楚留香中了毒，楚留香因信她不会害己而断言荔枝无毒并出言调侃；老板娘口含荔枝中毒身亡，七八名打手亦呈紫黑死状，张洁洁否认下手。楚留香痛悔未及时解开穴道，斥责轻贱人命；二人于杨柳岸漫步心意相通，吟及晓风残月。张洁洁主动提出带他去找那只手的主人，指引其翻越高墙，沿雨花台彩石小路至花林屋子；楚留香登上墙头后决意跳下探险。
- chapter: 6
  title: 第六回断魂夜断肠人
  summary: 楚留香自高墙跃入陌生花林庭园，循方向找到九曲桥上紫红灯光的精致小轩。房门开启，一位冷艳高贵如寒月梅花的白衣女子请他入座，并以自己喝过的茶相待。对谈中她坦承自己就是要杀他的人，并承认派人行刺，却说此处不能吐露缘由，低语须到床上方可说。她褪衣入罗帐、要他抱上床；楚留香察其绝不会武功、床上无陷阱，仍克制追问幕后指使。突闻铜锣声与“采花贼”呼喊。女子问他是君子还是聪明人，楚留香自认或许是傻子；两人各怀幽怨却未成事。楚留香悄然离去，女子在熄灯后的黑暗中泪湿枕头。
- chapter: 7
  title: 第七回九曲桥上
  summary: 楚留香悄离水阁，九曲桥与荷塘已被金四爷部属无声包围。金四爷以简练扣腕摔技数度将他掷向桥柱，楚留香皆以绝顶轻功身法化解并落回面前。金四爷收兵设酒，借垂死女儿之痛劝其忘记今夜；楚留香允诺。白衣女子自承因病与不厌楚留香而召其前来，求勿恨其父；楚留香察觉金家与自己皆被人利用，追问张洁洁、艾青、卜阿鹃皆无结果，自高墙跃下却落入水盆，闻人笑声。
- chapter: 8
  title: 第八回月下水水中月
  summary: 楚留香突闻张洁洁笑声失气跌入冷水盆，二人在水中打闹言情。张洁洁承认受人所骗才引他入金府，并透露金姑娘患麻疯、金四爷曾欲灭口，真正害楚留香者另有其人且她认识却不敢明说，只求一起逃走。楚留香答应却叹世上无处可逃。二人雇车至大镇酒楼吃鱼翅，神秘麻冠老夫妇入座，老人以恐怖内力压境并断言张洁洁不会回来；楚留香硬拼内力几难支撑，张洁洁及时归来后老人退去。二人共度良宵后，张洁洁再遣楚留香去买鱼翅，这竟是他久久之后才能再听到的她的话。
- chapter: 9
  title: 第九回玉人何处
  summary: 楚留香捧鱼翅归来不见张洁洁，枕衾余香中由甜蜜等待转为彻夜空守与日暮寻访。他苦觅其旧日现身之处，憔悴而不在乎，终想到金四爷。再至高墙外，见僧众携小沙弥持法器入金家大门，白发悲容的金四爷相迎，遂明白金姑娘已死、死为其解脱，遂悄然离去。立于流水看水中月，悟情缘如月不可捉，并疑张洁洁或从未真的存在。
- chapter: 10
  title: 第十回神秘老妪
  summary: 楚留香在寒夜流水边强自清醒，却遇雾中现身的黑衣老妪。老妪禁他回头，称唯有自己能助他找到本已无望再见之人，并层层逼问他是否肯吃苦、赴死、永不后悔，最终命他去找来历成谜的姓麻之人，潜入其山洞圣坛面见可闻可见的生神，以探张洁洁下落；同时严令可用计谋、暗器、迷药却绝不可令对方流血。人影随风涟消失后，楚留香寻访胡铁花诉说此事。胡铁花力斥所谓魔力实为爱情迷障，痛陈姓麻一家人与机关山洞之可怕，并提及石观音、水母、血衣人、蝙蝠岛与华真真，以及苏蓉蓉、宋甜儿、李红袖等友人的牵挂，劝他勿放弃船、波斯葡萄酒、名声与友情。楚留香仍坚持独自前往查清真相，握别后没入无星无月的黑暗；胡铁花追忆老妪魔咒，冷汗涔涔，终自问能否眼看好友走上绝路。
- chapter: 11
  title: 第十一回山在虚无缥缈中
  summary: 楚留香寻至山巅飞泉，遇汲水的艾青却被其否认相识；二麻衣人施自转诡掌将他击倒抬入石室。他假昏迷后突袭来人，见艾虹自点穴道不予阻拦，遂换麻衣潜入石廊，遭数人尾随后冲入暗室。真艾青坦言曾受命杀他、失踪系自逃，终因楚留香执意要见圣女而针刺其软麻穴，声称成全其死志。
- chapter: 12
  title: 第十二回奇迹
  summary: 艾青将楚留香弃之门外后又率人归来，借矮子麻衣人之口逼问艾虹与十三郎私放楚留香之事，并诬艾虹有私情。众人将楚留香蒙眼抬入"里面"圣坛；钟声石门后，七色长袍、黄金面具的生神升座，判神前司花女艾虹"血刑"。刑具搬来之际楚留香忽然大喝掠起，以惊人身法扑向生神并揭下面具，神殿麻衣人尽皆匍匐，面具下竟是一双新月般、热泪满盈的女子之眼。
- chapter: 13
  title: 第十三回有情人终成眷属
  summary: 楚留香在圣坛揭下面具，发现所谓的神竟是张洁洁，两人重逢相拥。黑衣老妪现身，揭示自己是张洁洁之母与教中护法，并坦言主谋考验乃至要杀楚留香的人正是她自己：因不忍女儿永做圣女受孤独之苦，又因楚留香曾杀石观音而挑中他，设计令二人动情并入圣坛揭下面具以解脱圣女之身。族人欢呼承认二人夫妻，按规矩楚留香成为家族一分子难以脱离。约一个月后张洁洁察觉楚留香不适于长留，自承已有身孕，愿放其离开；二人向黑衣老妪求生路，老妪称可走但条件是先杀她，并言圣女之夫欲走则死。张洁洁反驳自己已决定以腹中孩子为圣女，楚留香既为圣女之父则无人可杀，双方争执未完。
- chapter: 14
  title: 第十四回来过活过爱过
  summary: 张洁洁援引本教经典，迫使黑衣老妪承认其腹中孩子为圣女、楚留香为圣父，并据此求放楚留香离开。黑衣老妪自陈今年才四十一岁，因张洁洁之父出走后另遇石观音而怀恨，最终只许楚留香走其父当年的「天梯」。张洁洁说明自己须留下引导族人、不愿楚留香沦为死人，连夜赴圣坛探天梯活路；次日她被逼离开，临别眨左眼。楚留香在四十丈天梯前两扇无从分辨的门前经历生死抉择，终坦然开门迈出，称已来过、活过、爱过。
