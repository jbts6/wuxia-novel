- chapter: 1
  title: 第一回 无眉画眉
  summary: 楚留香与胡铁花自大漠归来，在热闹城市酒楼临街饮酒，感念平凡世人的可爱，并谈及未同行的姬冰雁与牵挂中的蓉儿等人。酒楼中青衫少年李玉函携病态美艳的妻子柳无眉过来结交，二人言谈斯文却眼神内功极深；楚留香发现柳无眉眉毛全是画上，联想到秘谷被削眉惨死的少女，怀疑她即是画眉鸟。一名贴金钱膏药的大汉受雇当众喊出楚香帅身份，称指使者提着鸟笼、笼中似有画眉。二人回客栈后，姚长华率毛健光、赵大海等本地人物连夜拜访敬酒，胡铁花与楚留香互指对方身份取乐；忽有重达三五百斤的大金鱼缸自窗外飞入落于桌上，院中梧桐下出现一哭一笑、青白面具的黑袍人影。
- chapter: 2
  title: 第二回 英 雄 会
  summary: 姚长华宅中，戴哭脸与笑脸面具的两名黑衣人以金丝绵掌般阴柔掌力示威，众宾客退避；胡铁花、楚留香追至荒坟，四人分坐小棺。对方抬来大棺假作食死人肉，实为浇红糖汁的白藕，楚留香当场识破。揭下面具，竟是李玉函与柳无眉，为替二人解闷而设局。坟场畅饮间，楚留香纵论武林三大世家，点破李玉函为拥翠山庄李观鱼之子；李氏夫妇邀往拥翠山庄作平原十日之饮，并提及苏蓉蓉等少女想见楚留香，二人因俗务婉拒。
- chapter: 3
  title: 第三回 暗器之王
  summary: 楚留香、胡铁花随李玉函夫妇返中原，途中歇脚开封。夜谈金丝绵掌与九九八十一式凌风剑，并疑柳无眉身世。柳无眉夜半剧痛似中奇毒，佣仆习以为常。忽有人以暴雨梨花钉偷袭，楚留香险死还生，追击时失于浓雾；胡铁花拾得刻有「出必见血，空回不祥。急中之急，暗器之王」的银匣。二人确认此暗器力量远超石观音针筒，二十七枚钉皆直没入土；胡铁花倒酒时，杯中酒竟能溶化小虫，暗伏剧毒。
- chapter: 4
  title: 第四回 暴雨梨花钉
  summary: 楚留香凭左手倒茶习惯察觉茶壶被人动过，打翻胡铁花杯中毒酒；茶与酒相遇青烟骤起，毒势近似石观音所使。胡铁花与楚留香探望李玉函，确认柳无眉系旧疾发作，李玉函未闻异响。李玉函认出桌上暗器为暴雨梨花钉，详述其由残废奇人周世明与银匠巧手宋制成，曾毙侯南辉等暗器高手，南湖双剑物故后江南四义欲借其立威反遭公敌围剿，周家庄被焚、周世明葬身火窟，此后暗器屡易其主、持有者多不得善终。柳无眉携酒入室时，楚留香扣住胡铁花脉门并点其天泉等五处穴道。
- chapter: 5
  title: 第五回 病困英雄
  summary: 胡铁花因徒手拔取淬了剧毒的暴雨梨花钉而中毒，手臂肿黑；楚留香点住其穴封闭毒气约一个对时。李玉函、柳无眉验明钉毒，想起古松庄熊老伯处有可解毒的七指前辈，夫妇赶去求援，并留下清妙散嘱楚留香服食。楚留香却因劳累风寒骤然病倒高烧。雨夜，刺客用奄奄一息的猫送来威胁字条；胡铁花宁折毋曲，装好钉匣闯出屋脊叫阵，被黑衣蒙面人故意保持距离诱离客栈，终在巷角撞翻馄饨担摔倒。
- chapter: 6
  title: 第六回 出乎意外
  summary: 胡铁花被画眉鸟嘲弄并撞翻面担，卖面老人实为丐帮前辈戴独行，假意纠缠后托送胡铁花反制画眉鸟；画眉鸟自承数次救过胡铁花却拒揭面离去。戴独行与胡铁花议论画眉鸟来历，胡铁花猛省此乃调虎离山，急奔回客栈却迷途。另一更高壮的黑衣人潜入楚留香房中行刺，楚留香假病以枕头迎剑反制对方；黑衣人承认受指使且是第二次来杀，正欲说出主使时突遭暗器，话未及出口。
- chapter: 7
  title: 第七回 职业杀手
  summary: 柳无眉情急杀死床前黑衣刺客后，楚留香从其剑式联想到中原一点红，又于贴身衣物中发现二十万两银票与刻有十三剑环手、反面「八」字的铜牌，推断存在以杀人为业的十三人集团及幕后「那只手」。胡铁花夜归，称遇丐帮长老万里独行与画眉鸟；天明分车赶路时，楚留香向胡铁花暗示李玉函夫妇可能另有图谋，并质疑蓉儿下落与刺客何以知其病倒。
- chapter: 8
  title: 第八回 欲取先予
  summary: 楚留香与胡铁花推断画眉鸟实为柳无眉化名，认为柳无眉夫妇以施恩留退路、假声障眼并借暴雨梨花钉暗算，意在害楚却保全拥翠山庄侠名；二人明知拥翠山庄有备仍为救蓉儿等人前往。途经姑苏时，卖花姑娘以茉莉花球藏毒针行刺，被楚留香识破骇走。一行抵达虎丘，柳无眉讲解千人石、剑池与陆羽茶井掌故，楚留香于剑池品题，突闻有人感叹江山依旧人面全非。
- chapter: 9
  title: 第九回 天下无敌
  summary: 虎丘山亭暮色中，摘星羽士帅一帆受李观鱼之托等候楚留香。楚留香以柔枝树叶诱发其剑气，乘隙一点破之；帅一帆弃绝世名剑入剑池下山。事后楚留香向胡铁花解说破剑气之法，并点明李观鱼杀机或为子媳，且评石观音招式更胜帅一帆。
- chapter: 10
  title: 第十回 奇异夫妻
  summary: 胡铁花与楚留香暮色中登虎丘寻拥翠山庄，塔檐红灯处见"楚留香毕命于此"，随即遭巨网与钵镰枪伏击。出手者为武林奇异夫妻"无法无天"屠狗翁与"天罗地网"杜渔婆，二人因受李观鱼之恩欲捉二人送庄。楚留香借胡铁花冲撞撞开被点穴道，自网中反制屠狗翁，并以屠狗翁"能打躺下就是本事"之语反将一军；屠狗翁反劝楚留香杀己，章末悬于放与不放。
- chapter: 11
  title: 第十一回 剑道新论
  summary: 屠狗翁夫妇离去后，楚留香与胡铁花以怕老婆为题松弛神经，随即赴李玉函、柳无眉厅中，见垂暮的天下第一剑客李观鱼痴坐名剑之前。苏蓉蓉等人未在场。李玉函代父论剑，比较魔教慑魂大九式与武当两仪剑法之盛名差异，并述铁中棠以弱胜强击杀独孤残，以及北斗七星阵、八卦剑阵难困真正高手之故，暗示将请二人助成李观鱼未了心愿。
- chapter: 12
  title: 第十二回 多谢借剑
  summary: 李玉函道破其父李观鱼创出自认无人可破的剑阵,需六位绝顶剑手布阵并以楚留香试阵破绽。五位蒙面黑衣高手入厅,帅一帆缺席,柳无眉以滥竽充数并取走李观鱼秋水长剑。胡铁花欲与楚留香并肩,楚留香掌心写"救""走",嘱其趁机救出苏蓉蓉等并离开。开战之际楚留香以虚招"双龙夺珠"借得柳无眉掌中剑。
- chapter: 13
  title: 第十三回 世家大族
  summary: 厅中楚留香夺剑抢攻搅动剑阵，柳无眉退下由李玉函替位；胡铁花虽不舍仍先离开以免分心，见剑幕愈密后循炊烟潜入拥翠山庄仆役区，假充马房人。厨房赵老大苛扣口粮与马脸汉子冲突，胡铁花出手弹压；体面丫头平姑娘出面制止，并取上房客人广东点心。胡铁花探得上房有几位难伺候的大姑娘要吃虾饺鸡粥，趁机替平姑娘提食匣，穿过花径走向静悄悄的上房回廊。
- chapter: 14
  title: 第十四回 恩将仇寺艮
  summary: 胡铁花得意随平姑娘送食，反被其点穴擒拿并捆交少庄主夫人；楚留香以捏剑尖奇招破六人剑阵、制住李玉函却不忍伤人，反被李玉函踢倒，险遭柳无眉刺死，为萧石等五老剑网所救。李玉函以父恩孝道为先拒放人，五老为报李观鱼之恩与武当身份左右为难；铁山道长在楚留香讽劝后自断右肩。
- chapter: 15
  title: 第十五回 死亡滋味
  summary: 铁山道长自认无力再阻，柳无眉与李玉函拜谢后，柳无眉剑锋刺入楚留香胸膛；楚留香临死忆起幼时与胡铁花玩雪，反觉死亡不过如此。茶几翻倒，有人嗄声喝住。另线胡铁花被绑于闺房牢房，平姑娘言楚留香一死便放人；青衣童子讹称楚香帅已被少庄主踢倒、少奶奶刺中，并诈取胡铁花身上暴雨梨花钉。胡铁花举中原一点红、戴老前辈、天峰大师、姬冰雁自慰。地下铁栅地室中，宋甜儿、李红袖等四女在押，墙上有嘲讽李观鱼一家的画像对联；平姑娘带胡铁花下地室，红衣少女认出姓胡之人。
- chapter: 16
  title: 第十六回 错综复杂
  summary: 胡铁花在石室中与苏蓉蓉、李红袖、宋甜儿重逢，得知三人被李玉函、柳无眉以迷药掳来；众人猜到楚留香凶讯后悲恸。李玉函、柳无眉突至并争执生死，楚留香现身未死，道出系李观鱼怒极真气复通所救，且揭李玉函假传李观鱼之命。楚留香以秘谷路径与解石观音毒酒两事为线索，揭穿柳无眉实为石观音门下弟子；李玉函以暴雨梨花钉挟持五人质对峙。
- chapter: 17
  title: 第十七回 残暴之尤
  summary: 楚留香推断柳无眉因身为石观音亲近之人而下毒手，并可能利用拥翠山庄少庄主夫人身份卧底；李玉函悲愤护妻以暴雨梨花钉胁迫。柳无眉自承本是石观音门下孤儿，原名无忆，与曲无容（原名无思）一同被收养；她得知石观音杀死曲无容父母并毁其容后求去，却在饯行酒中中毒，宁以罂粟续命也不愿回去求饶。她承认客栈呻吟为毒发、暗算用暴雨梨花钉，七根指头的老前辈与熊老伯皆为杜撰，并花二十万两买凶、事败灭口。她称杀楚留香是为求石观音所惧之人解毒，以免拖累李玉函。
- chapter: 18
  title: 第十八回 你死我活
  summary: 柳无眉坦言解其毒者索要楚留香人头，且她中毒仅剩约一月；李玉函以暴雨梨花钉胁逼楚留香自尽并数到四。楚留香点破匣中钉子昨夜对付天罗地网夫妻时已射尽，趁李玉函动摇夺匣，二十七枚梨花钉尽钉屋顶。众人为李玉函夫妇深情所感，胡铁花反要以恩人论救柳无眉，但柳无眉拒说能解其毒者姓名，称帅一帆、萧玉剑、天罗地网联手亦必死其手。
- chapter: 19
  title: 第十九回 仙境与地狱
  summary: 众人推断要杀楚留香者为神水宫主人水母阴姬。楚留香自承因被疑偷天一神水、又误过限期而惹怒对方。苏蓉蓉忆神水宫如桃花源仙境；柳无眉则述经菩提庵入宫后所见阴湿地道与气味折磨，称其为人间地狱，并证实水母阴姬要以楚留香之头换她的救治。楚留香决意亲赴神水宫了结。
- chapter: 20
  title: 第二十回 前辈风范
  summary: 柳无眉讲述未见水母阴姬、醒来已回菩提庵的经历，众人怀疑其神水宫之行或是圈套；她称路径由君子剑黄鲁直指点，李红袖细说黄老剑客诚实到连对敌也实告招式。玉剑萧石、黄鲁直与神秘黑衫剑客下地道向楚留香负荆请罪，言及李观鱼与铁山道长伤势，并拟代李玉函夫妇向观鱼兄求情。苏蓉蓉向黄鲁直确认菩提庵为神水宫接引处及哑师太来历，黄鲁直拒透露知情者秘密后与黑衫剑客告退；萧石嘱李玉函暂避其父。众人于松鹤楼用饭，议定仍请李玉函夫妇带路往菩提庵，楚留香内心实忧水母阴姬。
- chapter: 21
  title: 第二十一回 人皮面具
  summary: 众人议论与黄鲁直同行的面具客身份，苏蓉蓉指出其人戴顶尖人皮面具；胡铁花、李红袖历数近五十年三名人皮面具好手——已故小神童、被铁中棠所杀的千面人魔、被神水宫主除去的采花淫贼雄娘子。苏蓉蓉自承为小神童之妹、面具尽归己有。楚留香因黄鲁直嘱托不再追究面具客苦衷。黑珍珠欲独自回沙漠，被结拜姐妹与楚留香劝留，改陪李红袖、宋甜儿由李玉函带路去菩提庵；楚留香、胡铁花则由苏蓉蓉带路从另一路进神水宫，约月圆碰头。一行人至山城，闻江湖客言君子剑黄鲁直在太白楼，楚留香等未去打扰而尾随其他酒客至客栈；三更后窗外有人唤楚留香，黑影屋脊招手疾掠而去。
- chapter: 22
  title: 第二十二回 人为财死
  summary: 楚留香与胡铁花追踪神秘夜行人；胡铁花回客栈照看苏蓉蓉，目击雷老三等江洋大盗为赃物自相残杀。白衣女子宫南燕以神水宫禁区不许杀人为由带走四人，旋即于棺材店将其处死并取走包袱。胡铁花经苏蓉蓉告知宫南燕身份后尾随未及，又在棺材店确认四人已死。另一线楚留香追上夜行人，对方自承为万里独行戴独行，因客栈不便谈话而将其引至土地庙旁私塾。
- chapter: 23
  title: 第二十三回 独行其是
  summary: 戴独行在学堂与楚留香对饮，说明自己追踪无名小卒却因神水宫禁杀未下手；并向楚报告丐帮检点南宫灵遗物时，自无花寄存木鱼中发现纸簿秘记，虽已烧毁，但戴独行铭记其中神水宫情状——无花借说法潜入、佯跌入潭、于小庙得司徒静献身并偷得天一神水。胡铁花赶到通报蓉蓉无恙及六人非一流，三人推断宫南燕出谷另有目的；熄灯换地时见两名轻功极高者潜入学堂，遂隐身草丛窥伺。
- chapter: 24
  title: 第二十四回 生死之交
  summary: 胡铁花、楚留香夜窥学堂，见黑衣人与君子剑黄鲁直密会，黑衣人原为等候女儿，却由宫南燕来告其女司徒静已死，并诬楚留香杀之。黑衣人狂哭自揭为采花贼雄娘子。戴独行欲除之，黄鲁直以生死之交相护；戴独行本欲放过，雄娘子却施迷药迷倒二人后离去。
- chapter: 25
  title: 第二十五回 有女怀春
  summary: 黄鲁直倒地前仍断言自己不会看错雄娘子；雄娘子含泪磕头致歉后狂奔欲入神水宫见女儿。楚留香将戴独行、黄鲁直托付胡铁花，暗中跟踪雄娘子：后者回客栈取黑色皮囊，经荒僻秘径入山崖洞穴，易容成神水宫白衣少女并埋藏易容之物，再以皮囊充气作皮筏拟顺流而入。皮筏突被击破，浓雾中宫南燕驾轻舟现身，提及昔日毒誓与其女儿坟墓，言语由尖刻转娇柔，表露对雄娘子的心意；雄娘子以不忍害她为由婉拒。楚留香全程隐伏窥听。
- chapter: 26
  title: 第二十六回 虎穴龙潭
  summary: 宫南燕借机亲近雄娘子后将其刺死并弃尸流水，再洗净换装驾舟入谷。楚留香潜水道踪，得见神水宫山谷与尼庵，遇当值白衣美妇三姐；她因蓉儿之恩不杀，却拒指秘道。警乐示警、谷中戒严，九妹巡查；楚留香险被发现后潜入神湖暂避，湖底空无生物。
- chapter: 27
  title: 第二十七回 水母阴姬
  summary: 楚留香潜伏神水宫湖中，见黄鲁直、胡铁花、戴独行闯入，与白衣弟子对峙后开战。胡铁花折铁刀使八方风雨，戴独行持打狗棒，黄鲁直出剑，三人占上风。楚留香在水底发现巨石秘道，窥见宫南燕与水母阴姬自湖底而出；阴姬由水柱托升端坐湖心，宫南燕令三人跪拜，并详述戴独行乃独行盗出身、经朱明代师传艺入丐帮的来历。
- chapter: 28
  title: 第二十八回 生死之搏
  summary: 水母阴姬与宫南燕盘问胡铁花武功来历，并许以能将其自圣水莲台推下便放行。胡铁花、戴独行、黄鲁直商定斩水柱之计后并肩掠攻，反被阴姬催动分泉水箭击晕。楚留香潜入秘道，以分水刺对峙中点穴制服守泉少女及石室两女，藏入机关密室并躲进衣柜，窥见水母阴姬归来时功力惊人却心事重重，未察三人失踪。
- chapter: 29
  title: 第二十九回 变态心理
  summary: 楚留香藏身衣柜，闻知胡铁花等人仅被关押未死。宫南燕回报并与阴姬因雄娘子旧情爆发冲突，揭示阴姬畸形情感、与雄娘子生下司徒静、以宫南燕为替身等隐秘。阴姬误认柜中为雄娘子反锁衣柜，楚留香假冒其声套出司徒静借无花复仇、无花偷天一神水弃之、阴姬以楚留香为替罪羊、柳无眉实未中毒等内情，终因谎称柳无眉害死自己而被阴姬识破，杀机已定。
- chapter: 30
  title: 第三十回 水底大战
  summary: 阴姬先命弟子将困住楚留香的衣柜抬去湖心欲沉底，旋因急于得知雄娘子下落而改令抬回并开柜。楚留香出柜后以决斗换消息，陆上不敌阴姬如潮掌力，借轻功挣脱坠入池中；阴姬追入水中，二人于湖底激战，浪涛壁立，神水宫弟子惊骇，宫南燕入水探查目睹水中恶斗。
- chapter: 31
  title: 第三十一回 死亡之吻
  summary: 楚留香在湖底与水母阴姬苦战，借水势与抱缠几乎令其窒息；宫南燕启动湖心喷泉将二人冲出水面，楚留香以死亡之吻封其呼吸却因见泪心软松手，反被宫南燕点穴。回寝宫后宫南燕欲杀楚灭口，阴姬出手击飞宫南燕并承认知其杀雄娘子乃为自己，却仍要为他报仇。阴姬终拍开楚留香穴道，命弟子找三师姐放人；楚留香出石门后与获蓉儿姑妈相救的胡铁花、黄鲁直、戴独行重逢。
- chapter: 32
  title: 第三十二回 出宫维艰
  summary: 胡铁花、戴独行与楚留香会合，告知女弟子自封石牢、蓉儿未同来而改往菩提庵会合甜儿等人。黄鲁直得知故友已死且由神水宫主报仇。南苹引众人沿地下水道前往菩提庵出口，说明入宫多靠竹箱顺流，大师姐又聋又哑又盲。敲铁环无应，戴独行以铁碗贴壁听声，闻有男子说话后陷入死寂。众人推测甜儿、李红袖或已饮迷药茶昏迷，外敌胁迫大师姐以致门不敢开；绕外路至少需三四个时辰，众人干着急却无计可施。
- chapter: 33
  title: 第三十三回 宝剑无罪
  summary: 南苹等困于地道，胡铁花敲铁环传声迫使神水宫入口开启。楚留香、胡铁花自蒲团洞穴窜入菩提庵，遭青衣大师姐暗器袭击；胡铁花飞出窗外又遇剑光，曲无容以蒲团相救。蒙面伤者实为一点红，蒙面女子为曲无容。门外人以本门叛徒相逼，一点红拒吐养育传授他武功的神秘黑手；楚留香出示刻有十三剑绕手之铜牌，点明剑本身并没有错、错的只是那只握剑的手，并欲联手除之，一点红仍以义气不肯出卖对方。
- chapter: 34
  title: 第三十四回 铁血传奇
  summary: 楚留香与一点红、曲无容等谈及薛衣人剑法及黑衣刺客来历：本十人，济南城外除一走一，余八人武功精强。曲无容忆石观音嘱托与恩情。窗外激战中，青衣尼因无法外出护庵而怒，足踝铁链另一端连神案下怪人；神案震散后两人以寒铁铁链左右包抄，连勒杀多名黑衣刺客。楚留香抓住铁链求饶一命，放走余下刺客，并借拍肩染上郁金香香气以便追踪幕后"那只手"。青衣尼与怪人率先追击，楚留香、胡铁花跟出，密林中五名黑衣刺客已遭一名戴紫檀木面具的瘦长黑衣人屠尽。
- chapter: 35
  title: 第三十五回 知己知彼
  summary: 面具黑袍客以极快剑法反手刺穿黄幔中人，青衣尼崩溃。楚留香与胡铁花赶到，黑袍客自承为「那只手」，洞察二人疲惫并激战意图，剑气合一压制胡铁花。黑袍客出手之际，苏蓉蓉从背后以空手当暴雨梨花钉虚张声势；楚留香算准其不敢回头、不敢同归于尽，逼其收剑离去，约期三月后再战。
- chapter: 36
  title: 第三十六回 百战百胜
  summary: 楚留香向苏蓉蓉解说对手宁可退走也不愿回头的气势之理。青衣尼忽然开口，求楚留香永不揭黄幔、死后与尸身火化并将骨灰撒入流向神水宫的溪水，随即倒在尸身上自尽。胡铁花从被慑心神中醒来并依劝遗忘，众人火化尸身。一点红与曲无容离去，戴独行相送；黄鲁直受托骨灰并寻雄娘子。众人至樵夫木屋见李玉函独饮，宋甜儿掀被发现柳无眉已死如骷髅，李玉函拒信其死。酒铺中众人感叹，楚留香憾黑大姐不辞而别；胡铁花见青衣少女送酒又失魂，终自嘲不再上当。
