- chapter: 1
  title: 第一回 沙漠遇故知
  summary: 楚留香回船不见苏蓉蓉、李红袖、宋甜儿，舱内机关未动、陈设如常，仅大椅黄沙中埋有黑珍珠与纸条，点明黑珍珠海上劫美。他骑黑珍珠之马赶至马连河边小镇，巧遇故友胡铁花；二人畅叙旧事，言及高亚男、姬冰雁与莫愁湖往事。楚留香道破三女遭沙漠之王札木合之子黑珍珠劫走，胡铁花决意同行共闯大沙漠。
- chapter: 2
  title: 第二回 富贵人家
  summary: 胡铁花被小妇人当众求嫁后落荒而逃，与楚留香商议：沙漠凶险、黑珍珠地利人和，不可贸然入漠。二人改道兰州寻找旧识姬冰雁（死公鸡）。姬冰雁已成西北巨富，却因沙漠风湿双腿瘫痪，苦劝勿去，并指出酒肉安逸已软化二人筋骨；见二人志不可夺，答应次日黄昏备齐骆驼、食水、粮食、宿具及老手照料牲口。楚留香仍坚持自理牲口，只要两匹马与粮水便可，显出十年未改的牛脾气。
- chapter: 3
  title: 第三回 出此下策
  summary: 楚留香与胡铁花离开姬冰雁后，楚留香点破其断腿实为装病推辞。胡铁花心有不甘，潜回将迎雁、伴冰绑来，欲逼姬冰雁现身，却直至半夜未见人来；二人只好将姑娘送回。归途中遇深夜赶路的怪异车队，队中有一持长鞭、反穿羊皮背心的黑大汉，神情诡异，对胡铁花的搭讪置之不理。
- chapter: 4
  title: 第四回 直奔大戈壁
  summary: 姬冰雁现身马车，断腿之计揭穿后与楚留香、胡铁花会合，车上备足酒菜。三人约定听姬冰雁指挥，直奔大戈壁，几乎不停歇；桌面地图划定沿黄河上流至银川路线，并定于老龙湾寄存楚留香那匹招摇之马。次日抵老龙湾农庄，检视骆驼车马，结识赶车人小潘与又聋又哑又盲、能通畜生的石驼，昼夜赶路继续西行。
- chapter: 5
  title: 第五回 沙漠风光
  summary: 姬冰雁、楚留香、胡铁花、小潘与石驼抵达沙漠边缘小镇，姬冰雁高价买羊皮袋清水、低价卖马并烧毁心爱大车后，众人改装入漠。石驼着蒙装步行、独宿骆驼旁，姬冰雁称其因欠情效力且瞧不起所有人。次日烈日下闻沙丘后呻吟，胡铁花力主救人，见两人被湿牛皮钉地晒至半死；解绑施水后对方突以藏于头发的机簧弩筒暗器射穿水袋逃窜，被楚留香、胡铁花制服，一人颈折而死，另一人嘲札木合不配为其主提鞭并含毒自尽。姬冰雁揭穿其焦皮为假皮伪装。
- chapter: 6
  title: 第六回 救人害己
  summary: 胡铁花等发现易容者所毁羊皮袋中的水已被毒暗器污染，姬冰雁倒水弃之；楚留香检视精巧针筒，称其胜于昔年天魔神针，并排除黑珍珠，推断另有能令属下甘愿赴死的黑道或沙漠流寇首领设阱。众人仅剩姬冰雁一小袋水，次日分水后赶往其所述百里外秘密水源，却掘地无水。此时五马四骑的彭家子弟狂奔力竭，以五虎断门刀对虚空乱砍，似陷极度恐惧；胡铁花念彭云情谊欲上前相救。
- chapter: 7
  title: 第七回 极乐之星
  summary: 沙漠中彭门七虎四人接连倒地，姬冰雁阻拦贸然出探；训练有素的鹰从马背衔走其所保一箱红货。胡铁花灌酒暂救大胡子彭一虎，对方惊呼恶魔后力尽而死。姬冰雁验尸断为脱力、饥渴并中类大麻罂粟之毒致幻狂奔。夜中姬冰雁与石驼掌心传意，确认害他们者即从前害石驼、武功极强且手下众多之人，并疑与黑珍珠有关；楚留香决意硬拼。二十余黑衣人包围索要「极乐之星」，搜身与掘尸未获；为首者情急吐露劫箱后发现极乐之星不在箱内。姬冰雁答应以极乐之星换水，并提示胡铁花曾觉彭一虎肩头有又圆又硬一块。
- chapter: 8
  title: 第八回 荒漠绿洲
  summary: 姬冰雁自彭一虎肩肉中取出极乐之星并故意交予无水徒步的黑衣人，以便跟踪其木屋巢穴；黑衣大汉回报后尽数死于销魂乐声。石驼近屋惊恐狂奔，众人回屋发现神龛石像消失，只余铁锅肉羹与龛中人字条，楚留香断定为石观音所为。黄狗先试汤似无毒，胡铁花怒弃铁锅，小潘偷喝余汤中毒身亡，原是狗口毒丸溶入汤锅。其后数日沙漠缺水，石驼寻湿沙维生，终在远方望见绿洲。
- chapter: 9
  title: 第九回 琵琶公主
  summary: 楚留香、胡铁花、姬冰雁在沙漠绿洲闻见欢笑，楚留香探入，撞见琵琶公主裸浴并被当面质问。公主将其引入帐篷面见龟兹王，武士以四柄金戈暗试，楚留香不动声色夹住长戈。席间揭出龟兹王身份与苏败婆典故，琵琶公主弹奏曲颈四弦琵琶；胡铁花随后打伤金甲武士闯来，龟兹王引见龙游剑吴家兄弟、独行大盗司徒流星、杀手无情杜环与王冲等人。
- chapter: 10
  title: 第十回 龟兹国王
  summary: 龟兹王命莽汉昆弥与胡铁花比力，胡铁花两次以巧劲将其制倒；杀手无情杜环争琵琶公主所赐之酒，暗以淬毒钢环偷袭，反被胡铁花「蝶双飞」夹断手腕。王冲由此认出胡铁花即昔年与盗帅楚留香齐名的潇湘侠盗花蝴蝶。事后三人察觉龟兹王远驻荒漠、广结江湖人必有隐情；楚留香从金甲武士口中听出彭家兄弟、石观音与极乐之星，断定石观音势力已渗入此间，主张留下以逸待劳。
- chapter: 11
  title: 第十一回 喜从天降
  summary: 楚留香、姬冰雁、胡铁花夜议众人武功，指出琵琶公主比王冲更深藏不露。青天剑客吴青天受龟兹王所托前来求亲，称大公主看上的是胡铁花；三人笑闹后胡铁花表面推拒、最终答应。楚留香出帐见王冲凝视石驼，又遇琵琶公主追问外号。随后三人入龟兹王帐中，胡铁花跪拜岳父获赐天方之石（猫儿眼），缠绵病榻的龟兹王妃亦出来冲喜并赐宝物，楚留香对龟兹王轻赠珍宝却重极乐之星起疑。
- chapter: 12
  title: 第十二回 变生肘腋
  summary: 龟兹王大宴宾客，吐露国土为叛臣所夺、屡遭中原刺客行刺，并称极乐之星与彭氏五虎俱失，勒索者约三日后以重金明珠玉璧交换。楚留香等答应护送交换；姬冰雁看破对方可能加码，又发现石驼与王冲离去。入夜火起、驼马奔窜，众人被调虎离山引出，姬冰雁故意让楚留香回帐窥探，见吴青天拔剑指住龟兹王。
- chapter: 13
  title: 第十三回 护驾来迟
  summary: 吴青天、吴白云受重金收买反刺龟兹王，琵琶公主以曲头琵琶与银针先后击杀二人。杀手无情杜环与黑猴孙空破帐擒住琵琶公主，楚留香现身吓退孙空；孙空临走抓伤并踢走杜环，又警告另有强敌将至。胡铁花、姬冰雁入帐，坦言故意放孙空进来；龟兹王与琵琶公主急将婚期订在明天。胡铁花在花瓶下发现龛中人纸条，劝三人速离。
- chapter: 14
  title: 第十四回 大漠风云
  summary: 姬冰雁、胡铁花、楚留香研判石观音留柬与极乐之星的隐秘价值，决定照旧等婚、按原计试探。中原侠盗司徒流星夜闯帐篷，述跟踪杀手无情杜环所见：黑帐中有龟兹贵胄与阴鸷汉人，有人骑无声宝马射入索换极乐之星的纸条，孙空等追马未果后转去行刺；另有不具名高手放过昔日有恩的司徒流星，并托其预警当夜行刺。司徒流星因楚留香揭破前丐帮帮主南宫灵之罪而拜谢，又因双方皆是恩人告退。胡铁花成婚当日，婚礼盛宴中银刀刀尖发黑、吉祥蛋疑有毒，楚留香暗藏不吃；姬冰雁又自烤骆驼上取下留头颅的威胁纸条，二人约定分外留神、滴酒不沾护婚。
- chapter: 15
  title: 第十五回 飞来艳福
  summary: 大漠夜寒，姬冰雁守在水池旁树影下，楚留香与之对饮并轮值。二人剖验烤骆驼中毒蛋，发现蛋黄内有须丝般毒针，推断下毒者必为龟兹王亲近且预知其会将蛋挑给楚留香；姬冰雁已排除厨子。楚留香独守下半夜，念及苏蓉蓉、李红袖、宋甜儿仍无消息，以及石观音与深不可测的刺客。琵琶公主裹鲜红鹅毛被溜出，自承非新娘而是嫁与胡铁花的姐姐之妹，与楚留香共卧至天明，并称绝不能嫁他且后会难期；被楚留香直言未必肯娶后恼怒着其衣奔去。楚留香裹被溜回，向装睡的姬冰雁坦白；胡铁花随即满面春风走进帐篷。
- chapter: 16
  title: 第十六回 血溅洞房
  summary: 胡铁花新婚次日拉楚留香闯洞房,却发现床上躺着面目浮肿、胸膛被抓出血洞的女尸,而昨夜所见绝世美貌的新娘已踪影全无。龟兹王与琵琶公主指认死者即大公主、胡铁花的新娘,指控胡铁花杀妻;胡铁花坚称所见并非此人并怒拒金戈武士围攻。楚留香拦下欲走的胡铁花,立誓三日之内找出真凶,二人并以性命互保;楚留香推断新娘早在洞房前四五个时辰已死,凶手藏尸床下冒充新娘,次日又移尸嫁祸。
- chapter: 17
  title: 第十七回 阴谋诡计
  summary: 楚留香向胡铁花点明冒充新娘者恐即石观音，意在离间他们与龟兹王。回帐后发现姬冰雁失踪，床上替身是被姬冰雁点了睡穴的龟兹武士；楚留香料定姬冰雁不服气独自寻刺客决战。胡铁花被留下与昆弥冲突，楚留香循铁锅、旧营焦木与岩石脚印及仙人掌切口追至北方，见证姬冰雁与一名腕力发剑、极似中原一点红的高手自夜战至晨，姬冰雁左肩中剑仍拼出十字封门，却正中对方诱招。
- chapter: 18
  title: 第十八回 英雄相惜
  summary: 一点红与姬冰雁苦斗，姬冰雁以毒蛇出穴点中一点红双肩肩井穴，却发现一点红方才变招是为救自己左股上的毒蝎。姬冰雁不肯领情欲自砍左腿，被赶来的楚留香震飞长剑。三人会合后，一点红说明自己是被人假借楚留香名义骗来刺杀龟兹王；知情者只余黑珍珠可疑。一点红又见过龟兹大臣与汉人吴菊轩，对方已迁往大盗半天风的沙漠客栈黑店。楚留香因三名友人被挟持且两面受敌石观音，决计趁黑珍珠未到先去客栈探消息，三人低声商定两全之计。
- chapter: 19
  title: 第十九回 剑不轻出
  summary: 渴极的旅人欲往有水处却因听闻是半天风地盘而却步。楚留香与姬冰雁为刺探虚实，扮成一点红的俘虏，由黑衣人牵绳进入半天风的沙漠客栈。客栈以天价卖水并劫掠旅人；黑衣人入店后以诡异身法戏弄老颜等大汉，并亮出「此剑不轻出，出必见血」的长剑。掌柜摇铃四面弩箭相向，身长九尺的半天风手提九环金背刀现身，一刀直砍黑衣人。
- chapter: 20
  title: 第二十回 沙漠行舟
  summary: 沙漠客栈中，黑衣一点红以电光剑法点杀持金刀的虬须大汉，连摔八壶茶逼得掌柜半天风断下老颜之手示弱。红衣少女突至，断半天风之手、连杀两汉并夹折窗口暗箭，自称替约见者来接一点红。一点红牵驼子麻子出门，见沙海上华丽鬼船：竹制轻舟由兀鹰曳行。船中吴菊轩与两名龟兹叛臣现身相迎。
- chapter: 21
  title: 第二十一回 附骨之蛆
  summary: 吴菊轩、敏将军、洪相公与红衣女长孙红现身，揭穿半天风实为敏将军爪牙。一点红交出“俘虏”后，吴菊轩突以点穴制住驼子与麻子，长孙红以尖刀锁住一点红，并点破驼子即楚留香。众人将楚留香、姬冰雁、一点红囚于竹船暗舱；舱上密谈显示吴菊轩为石观音牵线龟兹叛臣。石观音乘船到来，长孙红以弟子之礼叩见；她携来极乐之星，却决意交还昏王以诱其自曝秘密，欲擒故纵。
- chapter: 22
  title: 第二十二回 士为知己者死
  summary: 石观音一方说明请来刺客只为恐吓龟兹王逼出秘密而非真杀；石观音认定楚留香是能欣赏其杰作的知音，要带走舱下三人。另一边胡铁花被琵琶公主带去见龟兹王妃，王妃请他赴约换回极乐之星并打听与龟兹国宝藏相关的秘密；胡铁花应允后率骆驼与武士西行。
- chapter: 23
  title: 第二十三回 酒醉误事
  summary: 胡铁花押着满载金子的骆驼，随三名龟兹武士西行五十里，准备与石观音交换。武士中途怂恿歇息被拒后故意带错方向，又用下了软身药的大宛葡萄酒灌醉胡铁花，图谋独吞金银珠宝并杀人灭口。胡铁花药力发作仍强撑恐吓，恰逢沙漠中驶来沙船，白衣石观音现身；三武士偷袭被其弹指震飞兵刃，最终三刀穿心钉死，石观音与胡铁花在其最泄气的情形下首次见面。
- chapter: 24
  title: 第二十四回 料事如神
  summary: 白衣人（石观音门下）取走骆驼珠宝却未杀胡铁花，留下极乐之星；楚留香、姬冰雁、一点红困于附近鬼船，楚留香料定对方需胡铁花携星回去套取龟兹王秘密。胡铁花于沙漠生火，据易容颜料与埋藏包袱认出楚留香曾易容改扮，并分出楚、姬二人随身物。琵琶公主受王妃之命前来照应，因丝巾定情物与胡铁花斗嘴哭闹，终和解分酒。
- chapter: 25
  title: 第二十五回 花海迷魂
  summary: 胡铁花与琵琶公主发现老臭虫与死公鸡此行凶险，决定暂缓送回极乐之星，先去寻人。楚留香、姬冰雁、一点红被白衣人曲无容押入石峰秘谷鬼径，途见美男子奴隶扫地如傀儡，后入花海中迷药，倒地醒来后遭黄衣、绛衣少女调侃，楚留香试图套问迷药来历。
- chapter: 26
  title: 第二十六回 丽质天生
  summary: 黄衣、绛衣两女向中迷药的楚留香炫耀罂粟花与大麻草所炼迷药之效。石观音白衣蒙纱现身，以一视同仁为由令曲无容与两女生死相搏；曲无容先断黄衣少女手臂，再以对方手法杀绛衣少女。石观音称其武功精进并言及长孙红，曲无容抽银刀自断右腕以明心迹后晕倒。一点红为曲无容敷刀伤药反遭撕布拒药；楚留香随石观音离去，于精雅屋中得见石观音绝美真容，姬冰雁与一点红则议论楚留香与曲无容。
- chapter: 27
  title: 第二十七回 坐怀不乱
  summary: 石观音在闺房中以美色、柔语与胴体极力诱惑楚留香，楚留香抱起后又将她抛开，并洒酒于其身，点破她征服占有男人后视之为奴隶扫地的心理，坚拒冒险；石观音威胁以昔日折磨拒绝者成石驼的酷刑，见仍无法得手便摔枕喝令滚出去。楚留香装乏力走回，肘撞放倒扶他的两名少女，向姬冰雁、一点红说明自己假受迷香、故意留下见石观音，并趁她气疯的半个时辰内逃命：以腰带让姬冰雁背一点红、自己再背姬冰雁。途经石屋见两名浴女，点穴逼问苏蓉蓉、李红袖、宋甜儿下落，得知此处五十六位姐妹并无其人。一点红想找曲姑娘却料她不肯跟走；有人冷笑讥其难逃。章末胡铁花倒在沙堆上，又脏又饿几不成人形。
- chapter: 28
  title: 第二十八回 生死之间
  summary: 胡铁花与琵琶公主困于沙漠濒死，互诉绝望与欲望；琵琶公主坦白身子已属老臭虫，胡铁花狂怒后又与她同病相怜。两只负剑伤的鹰坠落，二人食鹰肉续命。沙丘后石驼与隐名剑客王冲被石观音属下黑衣大汉围杀，胡铁花出手解围。王冲自白本姓柳名别飞，即神龙小剑客；石驼实为华山七剑之首皇甫高。柳别飞痛述华山派为石观音所毁，皇甫高因无力复仇而隐姓埋名与驼马为伍。
- chapter: 29
  title: 第二十九回 画 眉 鸟
  summary: 柳别飞受琵琶公主激将，与胡铁花、皇甫高（石驼）夜改风向后潜入石观音迷谷。楚留香、姬冰雁、一点红途遇曲无容，一点红自请留下后曲无容抛出解药；紫衣少女鸣铃阻截。神秘杀手画眉鸟以勒杀、翡翠小剑等方式屠尽诸多少女，并以翠绿纸笺将死尸敬赠楚香帅，长廊尸横，众人惊骇。
- chapter: 30
  title: 第三十回 断臂论交
  summary: 楚留香与姬冰雁发现女尸皆被削去眉毛，断为画眉鸟杀人标志。众人由曲无容带路离开秘谷时，胡铁花突袭一刀砍断一点红左臂；楚留香夺刀、姬冰雁切喉，认出是胡铁花后停手。一点红不怨反赞刀法，拾断臂自嘲后昏迷。会合琵琶公主等人后，众议画眉鸟与石观音去向；楚留香似有所悟却以禅机掩饰，要去见王妃并谈极乐之星，又留住欲返华山的柳别飞，承诺不问皇甫高隐事。远处驼铃响起，众人赶去却见驼队戒备森严。
- chapter: 31
  title: 第三十一回 女人心理
  summary: 姬冰雁、胡铁花、楚留香、琵琶公主等人在沙漠上遥见纪律严明的队伍，争论应否买水夺驼。青胡子率众盘问来历并欲搜身，众人被迫隐忍。青胡子试探黑珍珠后认出楚香帅，拜谢无礼，并告知小王爷（黑珍珠）因珍珠驹空骑而回已入关查访，苏姑娘、李姑娘与蓉儿等亦随行且亲密异常。众人得知小王爷实为女子后大感意外，于帐篷中由琵琶公主与胡铁花剖析女人心理，推测蓉儿她们出关或为让楚留香着急，而黑珍珠动机亦与情愫有关。
- chapter: 32
  title: 第三十二回 复 辟
  summary: 众人分析黑珍珠与石观音布局，察觉另有人知晓楚留香与一点红的关系。三骑远客赶到帐篷，实为龟兹王；官兵五百骑追来。龟兹王阵前亮出安得山首级，宣称五路大军复国已成。胡铁花、青胡子、姬冰雁擒拿敏洪奎与洪学汉，军士弃刀归降。吴菊轩乘乱逃遁，楚留香弃马以轻功追赶，对方施放紫烟，去向未明。
- chapter: 33
  title: 第三十三回 庆功宴上
  summary: 庆功宴上，胡铁花归还极乐之星，龟兹王却笑称宝石秘密本是声东击西的谣言，真复国靠先王宝藏买通五路大军。龟兹王妃现身揭下面具，原是石观音，已毒杀真王妃并在酒中下毒欲诛龟兹王父女；青胡子与琵琶公主联手攻击被胡铁花强行制住救下，石观音亮出令男人必死的绝招「男人见不得」，帐中众人尽落下风。
- chapter: 34
  title: 第三十四回 有所必为
  summary: 石观音嘲讽少林武当并自诩男人见不得为自创绝招，胡铁花与姬冰雁联手突袭仍败北；她断言吴菊轩能杀楚留香并举杯讽劝龟兹王。沙漠中楚留香中紫雾迷香，吴菊轩揭去易容现出无花真容；楚留香道破石观音即黄山世家李姑娘、无花与南宫灵之母，及其与秋灵素、任慈之因果。无花欲以迎风一刀斩结果楚留香。石观音返回秘室，在镶宝巨镜前自赏完美躯体。
- chapter: 35
  title: 第三十五回 红粉骷髅
  summary: 石观音在镜前自语，自承毒杀龟兹王父女，并称姬冰雁、胡铁花抢饮毒酒，又因老头子杀安得山等人而称计划完成，图谋赴龟兹国做太后。楚留香现身揭破其只爱自己，双方言语交锋；石观音追问无花与迷药眼儿媚为何无效，楚留香以鼻疾与毛孔呼吸内功作答，并称无花未死。谈及曲无容、一点红已走、柳别飞未见、胡铁花等人恐已中毒难救后，石观音以美色与龟兹王座诱降，楚留香以年老恶言激怒对方。石观音七招齐发又收手，交手中尽占上风，楚留香自知再过五十招必死。
- chapter: 36
  title: 第三十六回 别兮大沙漠
  summary: 楚留香与石观音决战，掌击镜子令其失神后点穴将其击倒；石观音咬破牙中毒药自尽。楚留香欲押无花回中原，却见无花已被画眉鸟长箭射喉。循碧线寻去，与胡铁花、姬冰雁及龟兹王父女重逢，得知画眉鸟曾救活中毒的二人。琵琶公主邀赴龟兹遭拒后黯然分手；楚留香断定画眉鸟必会再来找他们。
