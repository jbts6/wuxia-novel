- id: item_an_qi
  name: 暗器
  aliases:
    - 破铜烂铁
  types:
    - 暗器
  description: 十几点寒光破窗而入打向宫萍要害，被陆小凤以腰带与两指化解，称为棺材店的老把戏。
- id: item_bei_zhan_jin
  name: 备战金
  aliases:
    - 黄金
  types:
    - 其他
  description: 朝廷交由中原镖局押运的黄金，本回被涂色伪装。
- id: item_bi_lin
  name: 碧磷
  aliases: []
  types:
    - 其他
  description: 用于在大风筝上写八个大字的材料，价格不菲。
- id: item_bi_shou
  name: 匕首
  aliases:
    - 凶器
    - 利刃
  types:
    - 武器
  description: 刺杀柳乘风的波斯宫廷古物，象牙裸女刀柄，轻按胸部可弹刃，锋刃呈暗赤色；沙大户密藏后交给陆小凤。
- id: item_biao_che
  name: 镖车
  aliases: []
  types:
    - 其他
  description: 中原镖局停放于沙大户门前的运镖车辆。
- id: item_bo_si_bao_dao
  name: 波斯宝刀
  aliases: []
  types:
    - 武器
  description: 陆小凤酒后回想线索时提到的价值连城宝刀，与凶杀案并列为他此行相关的谜团。
- id: item_chang_jian
  name: 长剑
  aliases: []
  types:
    - 武器
  description: 白衣少年腰上所佩、与玉带同属价值连城的长剑。
- id: item_du_ju
  name: 赌具
  aliases: []
  types:
    - 其他
  description: 绣花鞋所带象牙匣装赌具，内有骰子、牌九与叶子牌，供其赌钱赚钱。
- id: item_duan_dao
  name: 短刀
  aliases: []
  types:
    - 武器
  description: 宫萍所用兵刃，先有一尺三寸长者直取陆小凤心口，后又有七寸七分长者反手刺划。
- id: item_feng_ji
  name: 凤鸡
  aliases: []
  types:
    - 其他
  description: 沙大户吃饭时案上的一碟菜肴，他正盯着其中一只鸡脚。
- id: item_feng_zheng
  name: 风筝
  aliases: []
  types:
    - 其他
  description: 晨空中飘起的大风筝，上有碧磷大字「要找祸秧打破鱼缸」。
- id: item_gong_deng
  name: 宫灯
  aliases: []
  types:
    - 其他
  description: 黑暗中出现的两盏宫灯，由两位宫装美女提着为白衣少年开路。
- id: item_guan_cai
  name: 棺材
  aliases: []
  types:
    - 其他
  description: 赵瞎子言及棺材生意，并称西门吹雪等刚好来得及睡其棺材。
- id: item_hong_sheng_zi
  name: 红绳子
  aliases: []
  types:
    - 其他
  description: 陆小凤两指夹持，上面吊着玉绊。
- id: item_hu_chuang
  name: 胡床
  aliases: []
  types:
    - 其他
  description: 小叫化箕踞其上，按住沙大户与许煞的脑袋。
- id: item_huo_zhe_zi
  name: 火折子
  aliases: []
  types:
    - 其他
  description: 赵瞎子带陆小凤入鬼屋停灵处时所打起的火折，光比烛光更黯淡。
- id: item_jian
  name: 剑
  aliases: []
  types:
    - 武器
  description: 宫萍手持突袭西门吹雪；西门吹雪亦以剑一闪击倒宫萍。
- id: item_jian_pu
  name: 剑谱
  aliases: []
  types:
    - 秘籍
  description: null
- id: item_jian_xue
  name: 箭靴
  aliases: []
  types:
    - 武器
  description: 宫萍所穿，一脚踢出可碎石如粉。
- id: item_jin_yu_gang
  name: 金鱼缸
  aliases: []
  types:
    - 其他
  description: 八个干涸空缸，缸底藏有密道入口，宫萍砸破其一后露出地洞。
- id: item_jin_zhen
  name: 金针
  aliases: []
  types:
    - 暗器
  description: 飞向镖车守卫咽喉的细小暗器。
- id: item_jiu
  name: 酒
  aliases: []
  types:
    - 其他
  description: 宫素素劝遥祝陆小凤在天之灵而共饮，后揭示酒里有毒，致牛肉汤与西门吹雪中毒。
- id: item_lian_hua_bai
  name: 莲花白
  aliases: []
  types:
    - 其他
  description: 酒；金七两称亲眼见宫素素一顿饭喝下一坛仍面不改色。
- id: item_ling_pai
  name: 灵牌
  aliases: []
  types:
    - 其他
  description: 棺材铺棺前灵牌，上书"故友陆小凤"。
- id: item_liu_cheng_feng_de_jian
  name: 柳乘风的剑
  aliases: []
  types:
    - 武器
  description: 柳乘风生前所用之剑，紫衣老妪持此剑刺向陆小凤心脏附近，被陆小凤双指捏住剑尖。
- id: item_mi_huan_yao
  name: 迷幻药
  aliases: []
  types:
    - 丹药
  description: 文中提及属妖魔教之物；大鼓即便服之也不敢动西门吹雪。
- id: item_pao_luo
  name: 炮烙
  aliases: []
  types:
    - 其他
  description: 石室中陈列的古老残酷刑具。
- id: item_pu_gai
  name: 铺盖
  aliases: []
  types:
    - 其他
  description: 绣花鞋随身所带铺盖，自称清洁方便，用于陪睡生意。
- id: item_qiu_shou_xing_lie_tu
  name: 秋狩行猎图
  aliases: []
  types:
    - 其他
  description: 宫素素背对门时凝视的画作，绘有骑白马行猎的王者。
- id: item_ren_pi_mian_ju
  name: 人皮面具
  aliases:
    - 面具
    - 红阁面具
  types:
    - 其他
  description: 金七两脸上所戴，自称红阁真品，陆小凤识破为赝品；真红阁面具据称极难识破。
- id: item_ruan_duan_xiu_xie
  name: 软缎绣鞋
  aliases: []
  types:
    - 其他
  description: 宫萍所穿轻软绣鞋，被陆小凤握住脚踝时感觉如赤足。
- id: item_sha_lou
  name: 沙漏
  aliases: []
  types:
    - 其他
  description: 牛肉汤取出三个沙漏，以漏沙计时逼沙大户家僮传令主人限期到帐，否则扬言取其头。
- id: item_shan_niang
  name: 善酿
  aliases: []
  types:
    - 其他
  description: 沙大户中午所饮的软酒，特地从绍兴捎来，极易入口而后劲极大。
- id: item_shu_zhuang_xiang
  name: 梳妆箱
  aliases: []
  types:
    - 其他
  description: 绣花鞋所带、用上好漆器制成的梳妆箱。
- id: item_tie_lian
  name: 铁链
  aliases: []
  types:
    - 其他
  description: null
- id: item_tie_pian
  name: 铁片
  aliases: []
  types:
    - 其他
  description: 绑在老实和尚胸口护体以配合假死。
- id: item_tie_xue_zi
  name: 铁靴子
  aliases: []
  types:
    - 防具
  description: 纯铁打成，每只约九斤半至十三四斤，大鼓所穿；重而步声极轻。
- id: item_tie_zi
  name: 帖子
  aliases: []
  types:
    - 其他
  description: 小叫化送来给西门吹雪的请帖，正文三十五字邀午时粗茶洗尘，又及称略知陆大侠死因。
- id: item_tong_men
  name: 铜门
  aliases: []
  types:
    - 其他
  description: 密道石室中的门，其后另有石室与刑具。
- id: item_wu_qiao_jian
  name: 乌鞘剑
  aliases: []
  types:
    - 武器
  description: 西门吹雪标志性的长而狭的乌鞘剑，被假扮者佩带。
- id: item_xiao
  name: 箫
  aliases: []
  types:
    - 其他
  description: 绣花鞋上山所带之物，与唱曲赚钱相关。
- id: item_xiong_dao
  name: 凶刀
  aliases: []
  types:
    - 武器
  description: 刺杀柳乘风之窄刀，伤口约一寸三分、刺入心口第六七肋间；赵瞎子抱尸时刀仍在，亲手拔出后藏灵台砖下暗洞，后不翼而飞。
- id: item_xiu_hua_xie
  name: 绣花鞋
  aliases: []
  types:
    - 其他
  description: 绝岭下第二人穿的轻轻薄薄、软软绣花鞋，脚步声却重如八百斤胖子。
- id: item_xue_bao
  name: 血包
  aliases: []
  types:
    - 其他
  description: 绑在老实和尚胸口以假死溅血。
- id: item_yan_huo
  name: 烟火
  aliases: []
  types:
    - 其他
  description: 西门吹雪于黄石镇泥沙路上点放，"咻"的一声飞上高空爆出火花。
- id: item_yao_dai
  name: 腰带
  aliases:
    - 绸布带子
  types:
    - 其他
  description: 原系于宫萍身上，被陆小凤解下当作奇形软兵器绞卷暗器。
- id: item_yin_hu_pi_feng
  name: 银狐披风
  aliases: []
  types:
    - 防具
  description: 绣花鞋上山时所穿的很短银狐披风。
- id: item_yin_piao
  name: 银票
  aliases: []
  types:
    - 其他
  description: 大鼓离开时双手呈给牛小姐的一叠银票；绣花鞋未还。
- id: item_yin_zhen
  name: 银针
  aliases: []
  types:
    - 暗器
  description: 九根银针被打入宫萍要穴，用以制住她。
- id: item_yu_ban
  name: 玉绊
  aliases: []
  types:
    - 饰品
  description: 柳乘风随身佩带之物，后经宫素素、宫萍之手，再被指认为沙大户送给素云宫主人的节礼；系于红绳，为凶案关键线索。
- id: item_yu_dai
  name: 玉带
  aliases: []
  types:
    - 饰品
  description: 白衣少年腰上所系、价值连城的玉带。
- id: item_yu_shan
  name: 玉扇
  aliases: []
  types:
    - 饰品
  description: 陆小凤用以刮去黄金表面伪装色的玉扇。
- id: item_yuan_bao
  name: 元宝
  aliases: []
  types:
    - 其他
  description: 西门吹雪取火折子与烟火时弹落在柜台上的代价。
- id: item_yue_zhan_xi_men_chui_xue_de_xin
  name: 约战西门吹雪的信
  aliases: []
  types:
    - 其他
  description: 老实和尚替牛小姐所写、约战西门吹雪的信；司空摘星称自己其实未见此信。
- id: item_zhi_tao
  name: 指套
  aliases: []
  types:
    - 武器
  description: 老板娘指甲上所套薄铜指套，锋利如剑，用于突袭陆小凤笑腰穴。
- id: item_zhu_ye_qing
  name: 竹叶青
  aliases: []
  types:
    - 其他
  description: 陆小凤在宫素素处连饮多杯后头脑反而清醒，重新串起线索。
