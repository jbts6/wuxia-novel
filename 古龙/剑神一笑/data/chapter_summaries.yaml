- chapter: 1
  title: 第一回 刺痛手指的黄土
  summary: 序章论剑与剑神，提出西门吹雪可称剑神却几乎从不笑。第一回中，陆小凤在落日黄土上撮起含友人血迹的土，追忆七个月前与一剑乘风柳如钢（柳乘风）对饮：柳如钢身为巴山第一嫡传掌门弟子，以七七四十九手回风舞柳剑闻名，却为机密险事远赴西北边陲小镇黄石后失踪；陆小凤义气相召，决意追往该镇查探。
- chapter: 2
  title: 第二回 一个穷得要死的人
  summary: 陆小凤来到荒凉贫穷的黄石镇，街上只有缩在屋檐下的半大孩子小叫化；此地连客栈都没有，小叫化靠坑骗外地冤大头与偷窃维生。陆小凤不解好友、负天下盛名的剑侠柳乘风为何会到这种地方，且对方似乎已从世上消失，决心查明其间关系。小叫化带他来到字号古怪的大眼杂货店，店主名叫王大眼。
- chapter: 3
  title: 第三回 王大眼的杂货店
  summary: 陆小凤入住王大眼杂货店后院破屋，从老板娘口中得知来客多为寻宝藏的财迷或避祸之人，自称来寻资助五百两后失踪的财迷朋友。王大眼指出此人即曾住同屋的柳大侠，人已死；陆小凤至对面赵瞎子棺材铺，于鬼屋灵前见故友柳如钢灵牌与柳乘风尸体，确认心口窄刀一刺致命，推断凶手必为极熟之友。赵瞎子承认抱尸拔刀藏于灵台砖下，取刀时刀已失踪；正待供出知情者姓名，窗外二十余道暗器灭口，陆小凤摔走赵瞎子并穿窗迎战。蒙面快刀手被双指捏刀震伤，紫衣老妪持柳乘风之剑突刺，亦被捏剑后放剑掠逃，陆小凤只看清其非老妪之修长美腿。小叫化黄小虫自称丐帮弟子，否认自己是首个发现尸体者，称先有一男一女逃离。夜半老板娘入房，以柳乘风死因为饵，醉后指出黄石镇惟沙大户能聚一流亡命之徒，陆小凤决意次寻沙大户。
- chapter: 4
  title: 第四回 大户人家里的杀手
  summary: 本章交代黄石镇沙家由玄祖沙曼阁掘金暴富的来历。陆小凤抵达次日拜访沙大户，护院杨五扔不动来客，清客孙先生陪酒。沙大户闻陆小凤之名亲自出迎，厅中人满为观。双方斗嘴：沙大户知陆小凤为亡友与刀而来，却不知其所追一男一女的细节——男的善用刀，女的白发而腿如少女。众人散去时，陆小凤喝住蓝衫秀才，当众点破其为金老七、金七两。
- chapter: 5
  title: 第五回 棉花七两 面具一张
  summary: 陆小凤识破秀才老者为人皮面具伪装的金七两，并指出其自称的红阁面具是赝品。金七两透露柳乘风去年已死于暗巷刀下，凶手留下一把特别的刀。沙大户取出密藏的象牙柄波斯匕首，称是刺杀柳大侠的凶器并交给陆小凤；陆小凤判断此物为宫廷刺客所用古物，且无人能迎面一刀杀死柳乘风，除非凶手是其不提防的亲近之人，尤其可能是情人。沙大户夺匕刺向陆小凤，被其两指夹住刀尖夺回。陆小凤逐一排除小叫化、棺材铺、老板娘、王大眼与沙大户的嫌疑，感到真凶关键仍藏在思想死角中。
- chapter: 6
  title: 第六回 冒牌大盗的亡命窝
  summary: 陆小凤自沙大户庄院踏泥返回老王杂货铺，途中用匕首削木棍当高跷，并与树上的金七两会合。金七两因沙大老板恼怒陆小凤不肯留饭而溜出，两人在杂货铺喝酒；金七两透露自己以杀死小小田、避田八太爷为幌混入沙府，实为追踪蛇郎君，却发现沙大老板窝藏的所谓江洋大盗全是冒牌小贼，陆小凤寻柳乘风凶手的主线因此中断。金七两另提起唯一非本地的宫素素——风雅善饮、本为亲贵王爷爱妃后被放逐，并答应带陆小凤去见她；离店时老板娘对陆小凤怒目以待。
- chapter: 7
  title: 第七回 九天仙子下凡尘
  summary: 金七两带陆小凤至竹篱梅院求见被谪宫主宫素素后独自离去。陆小凤先后被应门老妪拦阻、与宫萍言语交锋，并两次以两指夹住其短刀、反制其无影脚。进屋后见年华已逝的宫素素凝视秋狩行猎图，对方温柔留酒。酒后陆小凤想起宫萍腿劲与宫素素远距传音等疑点，再因玉绊失态要看宫萍腿；宫素素以碗筷杯碟暗器齐发，陆小凤趁鸡汤遮目带走宫萍与玉绊。
- chapter: 8
  title: 第八回 玉绊会不会跑
  summary: 陆小凤点穴抱走宫萍，质问其身藏柳乘风玉绊的来历；宫萍拒答并反驳杀人栽赃逻辑。宫素素现身称玉绊由自己赠宫萍、原是柳乘风生日所赠。暗器破窗袭宫萍，陆小凤以解下的腰带与两指化解，宫素素趁乱离去。宫萍推断宫素素灭口并指认玉绊实经沙大户之手。陆小凤夜访沙大老板，对方坦承玉绊是送给素云宫主人的节礼但非原物；被窝中一女子声称玉绊是她老公给她再转送，陆小凤随即离去。
- chapter: 9
  title: 第九回 好快的刀
  summary: 陆小凤弄醒烂醉的王大眼，得知玉绊是小叫化所卖，追查时小叫化失踪；他赶到宫素素居处见一片凌乱，捡到被快刀削落的小叫化发髻，又在金鱼缸中救出遭银针点穴的宫萍。宫萍指出制住她的是应门许老太，亦即昔年三手仙妪许煞；小叫化因知晓与柳乘风之死相关的秘密，已被宫素素与许老太押走灭口。晨空风筝亮出碧磷八字「要找祸秧打破鱼缸」。
- chapter: 10
  title: 第十回 打破金鱼缸
  summary: 陆小凤检查八个干涸金鱼缸一无所获，宫萍砸破一缸后露出地洞密道。二人沿密道进入青石石室，见铜门、刑具（含炮烙）及写着若是君子敬请敲门的第二道门。敲门后老板娘开门，室内小叫化已制住沙大户、许煞、赵瞎子、许老大、宫素素等人，称与宫萍、老板娘要为柳乘风复仇。老板娘以铜指套、宫萍以箭靴突袭陆小凤，陆小凤险避并认出宫萍之腿即紫裙老妪之腿；众人趁其发呆齐攻，陆小凤倒地。
- chapter: 11
  title: 第十一回 巴山夜雨话神剑
  summary: 巴山夜雨中，独居荒道观两年的老实和尚被牛小姐与小豆子寻访。牛小姐请他去找失踪的陆小凤；和尚自锁七巧堂铁链断情，并指出惟有西门吹雪能救陆小凤。
- chapter: 12
  title: 第十二回 超级杀手云峰见
  summary: 西门吹雪在山巅赴约，回思与陆小凤二十年交情及自身唯剑可见的性情。超级杀手大鼓（小瘦子）穿极重铁靴、轻功惊人上山，却非约战者；西门吹雪点破其不该来。绝岭下另有人脚步极重却着绣花鞋，西门吹雪眼神骤变。文末作者长注述与金庸、倪匡对"冰比冰水冰"上联之趣事。
- chapter: 13
  title: 第十三回 大鼓与绣花鞋
  summary: 绣花鞋上山炫耀绝传外门功夫，与大鼓互嘲生财之道，自白兼做杀手、赌局、唱曲与卖身。两人同被白衣少年以重金约来开路，却发现西门吹雪独坐山巅；少年澄清并非雇他们杀西门，只为显摆身份并想借西门之剑除去谋害陆小凤之人。西门吹雪冰冷拒绝，称陆小凤应自理其事，若强求则立刻要少年去死。
- chapter: 14
  title: 第十四回 小姐与大偷
  summary: 白衣少年在大鼓、绣花鞋与牛小姐面前谈笑自若，自称西门吹雪不会杀他；随即坦言自己从头到脚都不是西门吹雪。牛小姐以剑气杀气与易容难度推断能扮剑神者不过西方玉罗刹、陆小凤与司空摘星三人，白衣人承认为偷王之王司空摘星。大鼓留下银票遁去，绣花鞋悄然离开。司空摘星喝下牛小姐早备的牛肉汤后说明：他并未见约战信，只见过不老实的老实和尚，因西门吹雪不会赴无名之约，他才以陆小凤之友身份前来。
- chapter: 15
  title: 第十五回 角落里的神秘夫妻
  summary: 西门吹雪沐浴斋戒、更衣束发，视即将行的杀人为神圣之事。状元楼饭口，司空摘星扮成西门吹雪与牛肉汤登场，却只点青菜豆腐白馒头白水，遭牛肉汤嘲笑不像挥金如土的偷王；二人互嘲陆小凤诸般绰号。角落一对神秘老夫妻中，枯干老头忽然坐到邻座，指出他并非西门吹雪，听力之异令人心惊。
- chapter: 16
  title: 第十六回 司空摘星摘下了一颗什么星
  summary: 司空摘星以易容扮作西门吹雪，与牛大小姐同席，却被神秘小老头隔桌识破：江湖消息称真西门吹雪已在塞外黄石镇。小老头继而点出其真身为偷王之王司空摘星，并透露西门吹雪此次破例为朋友陆小凤赶赴黄石镇。司空摘星追问小老头身份，对方称自己亦不知自己是谁，唯角落小老太婆可知；司空摘星察觉小老太婆亦非真身，待明白自己要摘的是怎样一颗星时，竟晕了过去。
- chapter: 17
  title: 第十七回 帐篷里的洗澡水
  summary: 酒楼中司空摘星被神秘小老太婆附耳数语后失色遁去；牛大小姐自坐其席，听老夫妻称陆小凤已死于黄石镇、西门吹雪乃去报仇，痛哭于树。西门吹雪入黄石镇，冷对黄小虫与大眼杂货店，买火折子烟火于街石静坐；黑衣人搭雪白帐篷送热水白衣与侍浴少女。牛肉汤至帐被斥"走开"，实为传令偷看者退去，并代约镇民次日轮流受问。赵瞎子、黄小虫、店主店娘皆称陆小凤已死；沙大户被沙漏威逼到帐亦称其死，引至棺材铺见灵牌"故友陆小凤"与棺中尸身。西门吹雪合棺后收一帖，帖末又及称略知陆大侠死因，遂赴约。
- chapter: 18
  title: 第十八回 宴无好宴
  summary: 牛肉汤向宫素素逼问陆小凤死因，宫素素设宴并召人到场。席间宫萍自纱幔后持剑突袭西门吹雪未中，连攻二十四招后被其一闪剑光击倒。沙大户、老板娘、杂货店老板、小叫化黄小虫、赵瞎子相继入场；西门吹雪指认沙大户、杂货店老板、老板娘、赵瞎子、小叫化与宫素素皆为凶手，宫素素承认黄石镇人人皆杀陆小凤，并揭酒中有毒。牛肉汤与西门吹雪中毒倒地。另有小老头、小老太婆在远处酒店商议赴黄石镇，因柳如钢与陆小凤皆死该镇而忧西门吹雪被害。
- chapter: 19
  title: 第十九回 小老太婆的神秘笑容
  summary: 中原镖局总镖头百里长青与副总镖头金鹏为三千五百万两黄金重镖上路，京师柳乘风沿线布防；黄石镇沙大户、宫素素等人因剑谱暂留西门吹雪与牛肉汤不杀。小老头与小老太婆黄昏抵镇外，识出镖队名号后见其入沙大户府，决意先办要事再救西门吹雪，小老太婆留下神秘笑容。
- chapter: 20
  title: 第二十回 微笑的剑神
  summary: 黄石镇沙大户等人借夜宴分散中原镖局人马，分头杀害守卫与镖师。陆小凤化装小老太婆、司空摘星化装小老头救出牢房中的西门吹雪与牛肉汤，并揭穿金鹏主谋劫镖、黄金被涂色伪装的真相。百里长青被解缚，众人联手击溃沙大户、金鹏一党，清晨镖银重见天日。
