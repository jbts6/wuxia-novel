- chapter: 1
  title: 第一回　刺痛手指的黄土
  summary: 陆小凤在黄土中发现朋友的血迹，回想七个月前柳如钢为一件危险而机密的事前往黄石镇后失踪，于是决定追到那个小镇查明真相。
- chapter: 2
  title: 第二回　一个穷得要死的人
  summary: 陆小凤来到贫穷荒凉、连客栈都没有的黄石镇，遇见一个靠行乞、偷窃和赚外来客钱维生的小叫化。他决心查明柳乘风与小镇的关系，并由小叫化带到王大眼开设的大眼杂货店。
- chapter: 3
  title: 第三回　王大眼的杂货店
  summary: 陆小凤从王大眼处得知柳乘风已死，继而在赵瞎子的棺材铺验尸，确认柳乘风被窄刀刺中心口，并推测凶手可能是其熟人。凶刀失踪后，快刀手和伪装成老妪的女子袭击赵瞎子，女子持柳乘风的剑逃走。小叫化表明自己是丐帮弟子黄小虫，并说发现尸体时已有一男一女在场；老板娘又指引陆小凤去查沙大户。
- chapter: 4
  title: 第四回　大户人家里的杀手
  summary: 陆小凤到黄石镇拜访沙大户，追查一位死在当地的朋友和一把刀，询问会用刀的男子及白发女子的线索，最后当众叫住穿蓝衫秀才的金七两。
- chapter: 5
  title: 第五回　棉花七两　面具一张
  summary: 陆小凤揭穿金七两佩戴的人皮面具；金七两讲述柳乘风遇刺后留下的匕首，沙大户取出并交给陆小凤。沙大户忽然持匕首刺向陆小凤，却被陆小凤以两指夹住；陆小凤随后判断柳乘风是被他不会提防的亲近情人迎面杀死。
- chapter: 6
  title: 第六回　冒牌大盗的亡命窝
  summary: 陆小凤回到杂货铺与金七两饮酒。金七两说明自己为追查蛇郎君而来，并揭露沙大户收留的著名亡命客全是冒牌小贼，使柳乘风案的线索再次中断；随后他指出宫素素不是本地人，并带陆小凤去见她。
- chapter: 7
  title: 第七回　九天仙子下凡尘
  summary: 金七两带陆小凤拜访宫素素后独自离开。陆小凤先后两次以双指夹住宫萍的短刀，并识出她所用的无影脚；见到宫素素并饮酒后，他察觉宫素素身怀绝技，又发现宫萍腰带中掉出的玉绊，遂带着宫萍和玉绊离开。
- chapter: 8
  title: 第八回　玉绊会不会跑
  summary: 陆小凤带走宫萍并追问玉绊来历，宫素素现身称玉绊是柳乘风赠送的生日礼物。暗器突袭宫萍时，陆小凤用她的腰带挡下暗器；宫萍由此怀疑宫素素要杀她灭口，并说玉绊来自沙大户。陆小凤转而质问沙大老板，随后又有女子声称玉绊是她送给沙大老板的。
- chapter: 9
  title: 第九回　好快的刀
  summary: 王大眼供称玉绊是从小叫化手中买来，但小叫化已经失踪。陆小凤在宫素素凌乱的住处发现小叫化被快刀削落的发髻，随后从金鱼缸中救出被九根银针制住的宫萍；宫萍说小叫化为救她而来，后来被宫素素和许老太押走。天亮前，一个写有“要找祸秧打破鱼缸”的风筝升起。
- chapter: 10
  title: 第十回　打破金鱼缸
  summary: 宫萍砸破金鱼缸发现密道，陆小凤进入密室后见到老板娘、小叫化及多名被擒的嫌疑人。宫萍、老板娘与众人随即突然合击，陆小凤在围攻中倒下。
- chapter: 11
  title: 第十一回　巴山夜雨话神剑
  summary: 牛肉汤带小豆子冒雨来到巴山道观，请老实和尚寻找失去消息的陆小凤。老实和尚已用铁链锁住自己，无法同行，便指出陆小凤若尚在人世，唯一能救他的人是西门吹雪。
- chapter: 12
  title: 第十二回　超级杀手云峰见
  summary: 西门吹雪在山巅等待一名以陌生剑法约战的对手。超级杀手大鼓穿铁鞋登山，却并非赴约之人；随后又有一名穿绣花鞋的人接近，西门吹雪的神情骤然转冷。
- chapter: 13
  title: 第十三回　大鼓与绣花鞋
  summary: 超级杀手绣花鞋登上山巅，与大鼓等候雇主。白衣少年随后现身，表明雇请二人只为显示身份，并请求西门吹雪借剑诛杀一个想谋害陆小凤的人；西门吹雪拒绝插手。
- chapter: 14
  title: 第十四回　小姐与大偷
  summary: 白衣少年识破眼前的西门吹雪是假扮者，自己也被认出是牛肉汤；假西门吹雪则现出司空摘星的身份。大鼓与绣花鞋离去后，司空摘星说明自己没有见过约战信，但因是陆小凤的朋友而决定前去救他。
- chapter: 15
  title: 第十五回　角落里的神秘夫妻
  summary: 西门吹雪为杀人斋戒沐浴、佩剑出门；司空摘星仍假扮西门吹雪，与牛肉汤进入状元楼。两人斗嘴时，角落里的一对老夫妻引起注意，老头突然来到桌旁，识破司空摘星并显露出异常耳力。
- chapter: 16
  title: 第十六回　司空摘星摘下了一颗什么星
  summary: 假扮西门吹雪的司空摘星被神秘小老头识破。小老头透露西门吹雪已为陆小凤远赴黄石镇，并指出角落里的小老太婆知道自己的身份；司空摘星向她探问后震惊得几乎晕倒。
- chapter: 17
  title: 第十七回　帐篷里的洗澡水
  summary: 神秘小老太婆告诉牛肉汤，西门吹雪是去黄石镇替已死的陆小凤报仇。西门吹雪抵达后搭起白帐篷，牛肉汤也赶来协助查问镇民；众人一致声称陆小凤已死，并带他们验看棺中尸体。随后西门吹雪收到一张声称略知陆小凤死因的请帖。
- chapter: 18
  title: 第十八回　宴无好宴
  summary: 西门吹雪与牛肉汤赴宫素素之宴追查陆小凤死因。宫萍持剑行刺，被西门吹雪一剑击倒；黄石镇众人随后到场，承认共同杀死陆小凤。宫素素揭示酒中有毒，西门吹雪和牛肉汤倒地；远方的神秘老夫妻因担心西门吹雪遇害，决定赶往黄石镇。
- chapter: 19
  title: 第十九回　小老太婆的神秘笑容
  summary: 百里长青率中原镖局押送三千五百万两黄金进入黄石镇。与此同时，被囚的牛肉汤与西门吹雪仍不明白黄石镇众人为何留他们性命，宫素素则打算取得西门吹雪的剑谱。小老头和小老太婆暗中观察押镖队伍，来到牢房营救西门吹雪；小老太婆却在牢门前决定先办另一件更重要的事，只留下神秘笑容。
- chapter: 20
  title: 第二十回　微笑的剑神
  summary: 金鹏勾结顶替黄石镇居民的盗匪，先分散并袭击中原镖局人手，再擒住百里长青索问黄金下落。化装成小老太婆的陆小凤与化装成小老头的司空摘星救出西门吹雪、牛肉汤，揭示老实和尚曾凭易容、铁片、血包和龟息功假死。陆小凤又证明所谓废铁只是被涂黑的黄金；金鹏等人发动围攻，但被陆小凤、西门吹雪、司空摘星、老实和尚及脱困的百里长青击败，押镖危机解除。
