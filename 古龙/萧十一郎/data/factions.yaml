- id: faction_dian_cang
  name: 点苍
  aliases:
    - 点苍派
  types:
    - 门派
  description: 武林门派，朱白水兼修点苍派武学。
- id: faction_e_mei
  name: 峨嵋
  aliases:
    - 峨嵋派
  types:
    - 门派
  description: 武林门派，朱白水身兼峨嵋、点苍两家之长。
- id: faction_guan_fu
  name: 官府
  aliases: []
  types:
    - 官府
  description: 张知府所代表的官府体系，本章仅作为彭鹏飞罪行的受害者背景出现。
- id: faction_guan_zhong_qun_dao
  name: 关中群盗
  aliases:
    - 十三帮
  types:
    - 帮会
  description: 关中黑道十三帮强盗的总称,花平为总瓢把子。
- id: faction_hai_nan_jian_pai
  name: 海南剑派
  aliases:
    - 海南派
    - 海南门下
  types:
    - 门派
  description: 以迅急诡秘剑法见长的门派，剑客性格古怪，素来不肯和别的门派打交道。七年前铜椰岛之战中九大高手死得只剩海灵子一人。
- id: faction_jin_zhen_shen_jia
  name: 金针沈家
  aliases:
    - 沈家
    - 沈家庄
  types:
    - 世家
    - 家族
  description: 沈璧君的家族，大明湖畔的古老庄园，以金针闻名。已被小公子放火焚毁，庄中人员几乎全部遇难，沈太君亦遭毒手。
- id: faction_lei_dian_shuang_shen
  name: 雷电双神
  aliases: []
  types:
    - 其他
  description: 雷满堂（太湖雷神）与龙一闪（龙光）的组合，情逾骨肉，焦不离孟。雄据太湖，侠名远播。实为小公子收买，假装侠士接近沈璧君，设局嫁祸萧十一郎。
- id: faction_lian_jia
  name: 连家
  aliases:
    - 连家庄
  types:
    - 世家
    - 家族
  description: 连城璧的家族，沈璧君嫁入连家后被称为连夫人。有庄院，有属下仆从，在江湖中朋友众多、耳目灵通。
- id: faction_liu_jia
  name: 柳家
  aliases: []
  types:
    - 世家
  description: 柳三爷（芙蓉剑）的家族，柳永南为其大少爷。以剑法和掌法闻名江湖，属武林名家。
- id: faction_lu_dong_si_yi
  name: 鲁东四义
  aliases: []
  types:
    - 家族
  description: 四兄弟均姓沈，金针沈家的远亲，每年沈太君寿辰必备重礼前来。大侠沈天松、三侠沈天柏在大火中遇难，二侠沈天竹、四侠沈天菊假装受伤，实为小公子收买，设局嫁祸萧十一郎。
- id: faction_luan_shi_shan
  name: 乱石山
  aliases:
    - 强盗山
  types:
    - 帮会
  description: 又名强盗山,山上住的都是强盗,连小客栈老板也是强盗。解老二等人为其成员。
- id: faction_meng_jia_zhuang
  name: 孟家庄
  aliases: []
  types:
    - 家族
  description: 孟三爷的家族庄园，仗义疏财。十多天前被人洗劫一空，一百多口人全被杀害，无活口。被指控为萧十一郎所为。
- id: faction_nan_hai_jian_pai
  name: 南海剑派
  aliases: []
  types:
    - 门派
  description: 海灵子所属门派，海灵子为该派第一高手。
- id: faction_qi_shi_er_jia_biao_ju
  name: 七十二家镖局
  aliases:
    - 南七北六十三省七十二家镖局
  types:
    - 镖局
  description: 南七北六十三省七十二家镖局，总镖头为司徒中平，江湖中人称其稳如泰山。
- id: faction_shao_lin
  name: 少林
  aliases:
    - 少林寺
  types:
    - 门派
  description: 武林名门正派，铁山大师为少林监寺，杨开泰为其唯一俗家弟子，少林神拳为派中绝学。
- id: faction_shen_jia
  name: 沈家
  aliases:
    - 沈家
  types:
    - 世家
    - 家族
  description: 沈璧君所在的家族，以祖传金针暗器闻名天下，号称天下第一暗器。家族中有沈太君等长辈，对后辈武功要求严格。
- id: faction_shen_jia_zhuang
  name: 沈家庄
  aliases:
    - 金针沈家
  types:
    - 山庄
    - 家族
    - 世家
  description: 位于大明湖旁边的世家大族,以"金针"闻名江湖。沈璧君即为其千金小姐。庄中有太夫人、老家丁沈义等上下人等。本章中得知沈家庄已被烧成一片平地,庄中人或死或伤或散。
- id: faction_tian_shan
  name: 天山
  aliases: []
  types:
    - 门派
  description: 武林门派，有天山七剑，十三年前被雷雨、龙飞骥兄弟以铁掌连战而未能伤对方，此役震惊古今。
- id: faction_wan_ou_shan_zhuang
  name: 玩偶山庄
  aliases: []
  types:
    - 山庄
  description: 小公子据守之地，萧十一郎又闯入此地寻找沈璧君。
- id: faction_wu_dang
  name: 武当
  aliases:
    - 武当派
  types:
    - 门派
  description: 武林名门正派，徐青藤为武当掌门真人最心爱的弟子，拳剑双绝。
- id: faction_wu_xia_shan_zhuang
  name: 无瑕山庄
  aliases: []
  types:
    - 山庄
    - 世家
  description: 位于姑苏，江南第一世家，主人连城璧为当今天下数一数二的高手，武林世家子弟，行事大仁大义。
- id: faction_xian_tian_wu_ji_men
  name: 先天无极门
  aliases:
    - 先天无极
  types:
    - 门派
  description: 赵无极所掌的门派，武功讲究以静制动、以逸待劳、以守为攻、以快打慢。
- id: faction_yi_dao_liu
  name: 一刀流
  aliases: []
  types:
    - 门派
  description: 东瀛（扶桑）剑术门派，掌门人太玄信机曾渡海至中土与少年连城璧交手论剑。
- id: faction_yuan_ji_piao_hao
  name: 源记票号
  aliases:
    - 源记
  types:
    - 商会
  description: 山西人所开的钱庄票号，为当时最大的一家，杨开泰为其少东主，富可敌国。
