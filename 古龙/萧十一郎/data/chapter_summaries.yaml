- chapter: 1
  title: 第一回 情人的手
  summary: 风四娘出关六七年后重回中原,在乱石山客栈沐浴时遭解老二等七八名强盗偷窥。她以银针暗器刺瞎众人双眼,随后花平出现,一瞬间杀死七人。花平已是关中群盗总瓢把子,号称中原第一快刀,但风四娘发现他的左臂已被萧十一郎砍断。风四娘此行的目的是寻找帮手做一件大事,花平建议她找萧十一郎,但风四娘拒绝,转而去找飞大夫公孙铃。公孙铃不在家,风四娘在路口等候。深夜,两名轿夫抬着一位枯瘦老人经过,在山坡前停下休息时,突然从轿中抽出细长剑刺杀老人。
- chapter: 2
  title: 第二回 飞大夫的脚
  summary: 风四娘目睹飞大夫以指夹剑、断剑杀敌，击退两名伪装成轿夫的刺客。风四娘欲请飞大夫帮忙，却发现他双腿已被萧十一郎砍断。飞大夫请风四娘追查偷走刻有武功心法棺材的贼人。应门童子追贼被杀，临死前喊出"萧十一郎"之名。风四娘追贼途中发现一名自称姓萧的男子被倒吊树上，此人正是偷棺贼，他宁死吞药也不肯透露主使者。最终棺材被萧十一郎暗中追回送回墓室，萧十一郎却不愿与风四娘相见便已离去。
- chapter: 3
  title: 第三回 夜半歌声
  summary: 七月十五夜，风四娘独饮感怀自己三十四岁的青春消逝。忽闻萧十一郎熟悉的歌声，飞身追寻却不见人影。回到客栈发现萧十一郎已躺在她床上，二人互相打趣。风四娘展示逍遥侯所赠的蓝玉短剑与已断的赤霞剑，萧十一郎认出蓝玉为公孙大娘首徒申若兰之物，并指出赤霞为雄剑。风四娘透露赤霞是被一把刀削断的。随后萧十一郎请风四娘去长街尽头老张的面摊吃宵夜，展现出大盗却身无分文的反差。
- chapter: 4
  title: 第四回 割鹿刀
  summary: 风四娘向萧十一郎透露宝刀"割鹿刀"的消息。割鹿刀由铸刀大师徐鲁子耗尽毕生心血铸成，取意"秦失其鹿,天下共逐,惟胜者得鹿而割之"，出炉不到半年便能砍断古代利器，风四娘的赤霞遇之如废铁。割鹿刀正由四位高手护送入关：先天无极门掌门赵无极、关东大侠屠啸天、海南剑派仅存高手海灵子、独臂鹰王司空曙。风四娘激将萧十一郎去夺刀，萧十一郎虽心动却以各种理由推脱。随后四人抵达关外重镇的"恩德元"清真馆，马回回恭敬接待。独臂鹰王当众表演鹰爪力，手穿活牛腹取出牛心生吞，震慑众人。
- chapter: 5
  title: 第五回 出色的女人
  summary: 风四娘伪装为风尘女子'思娘'，利用马回回的安排接近护刀人独臂鹰王（司空曙），企图夺取割鹿刀。她以美色和话术令独臂鹰王放松警惕，趁机点其大穴夺刀。然而独臂鹰王内力深厚自行解穴反制，风四娘险遭凌辱。危急时刻萧十一郎以青衣人身份破窗而入，以声东击西之计先取刀引开独臂鹰王，风四娘趁机带刀逃走。萧十一郎以绝世快刀逼退独臂鹰王后与风四娘会合，却指出所夺割鹿刀实为赝品——赵无极等人故意让独臂鹰王携带假刀做替死鬼，真刀另行护送。风四娘试刀证实后大怒，萧十一郎以蓝玉剑相赠作为补偿，二人互诉衷情。
- chapter: 6
  title: 第六回 美人心
  summary: 萧十一郎与风四娘在济南茶馆中，风四娘因众人注目沈璧君的马车而心生不悦。随后遇到源记票号少东主、少林俗家第一高手杨开泰（铁君子），杨开泰对风四娘一见倾心、笨拙追求。在悦宾楼饭局中，杨开泰透露六君子（连城璧、杨开泰、柳色青、厉刚、徐青藤、朱白水）齐聚济南的缘由：铸刀大师徐鲁子费一生心血铸成割鹿刀，邀六人至沈家庄比试，得刀者须终生佩刀且以刀除去大盗萧十一郎。杨开泰逐一分析六人优劣，认为连城璧深不可测最有望得刀。萧十一郎隐姓埋名在旁静听，借杨开泰之口得知自己被视为天下公敌，而连城璧则是唯一可能胜过自己的人。
- chapter: 7
  title: 第七回 沈太君的气派
  summary: 萧十一郎和风四娘化名"冯五"和"冯士良"随杨开泰进入沈家庄。沈家庄由年迈但极有威严的沈太君主持，江湖地位崇高。大厅中聚集了万重山、厉刚、柳色青、徐青藤等武林人物。厉刚怀疑"冯先生"身份，与风四娘起冲突，被沈太君一句话镇住。沈太君逐一调侃众人，尽显气派。赵无极前来报告护刀失败——宝刀在老鹰王手中被风四娘和萧十一郎夺走，但风四娘知道夺到的其实是假刀，真刀下落不明。众人纷纷表示要除去萧十一郎，而萧十一郎本人就在场中安然自若。沈太君透露孙女璧君（连城璧之妻）已有身孕。夜间，萧十一郎留书劝风四娘嫁给杨开泰后独自离去，风四娘又气又感动。
- chapter: 8
  title: 第八回 鹰王的秘密
  summary: 萧十一郎在暗林中遇到伤重垂危的独臂鹰王(司空曙),鹰王透露割鹿刀是假的,赵无极、海灵子、屠啸天三人背后另有主使,但未能说出主使名字便仓皇逃去。随后小公子——一个戴人皮面具的神秘青衫少年——与屠啸天、海灵子赶到,一刀斩下鹰王头颅,并策划用血书嫁祸萧十一郎杀了司空曙,命屠啸天将树皮送到沈家庄示众。小公子还透露此行另一目标是夺取武林第一美人沈璧君,计划用萧十一郎做饵引开连城璧。萧十一郎在三岔路口等候沈璧君车马时,遇到一个外表可爱实则杀人不眨眼的阔少爷。阔少爷用银刀飞掷杀死沈璧君车马的赶车人老赵,并以两指夹住护卫的鬼头刀,其随从射箭射杀另一护卫,对沈璧君的车马发动了袭击。
- chapter: 9
  title: 第九回 倾国绝色
  summary: 第九回"倾国绝色"中，武林第一美人沈璧君从车厢中走出，与伪装成阔少爷的小公子相遇。小公子无故杀了沈璧君的两个奴才，沈璧君以武相见，却被小公子以暗器、迷烟等手段击倒。萧十一郎假装烂醉实则清醒，识破小公子与红鼻子卖酒老头的串通。萧十一郎揭露小公子身份——正是写下"割鹿不如割头"之人。小公子以毒蛋、暗器、软剑、钢指甲、火焰等多种手段攻击萧十一郎，均被其快如鬼魅的身法化解。最终小公子以女色迷惑萧十一郎，趁机以藏有七巧化骨散的指甲划破其颈部皮肤，萧十一郎中毒后凌空掠去。
- chapter: 10
  title: 第十回 杀机
  summary: 第十回"杀机"。沈璧君在昏迷中回忆与连城璧三四年的婚姻生活——温柔平静却缺少激情。她醒来发现自己被小公子掳在马车中，小公子因嫉妒她的美貌而起杀心。萧十一郎及时出现在车顶，逼小公子停车放人。小公子假意服从，却在将沈璧君抛向萧十一郎时发出三件暗器，趁萧十一郎闪避之际逃遁。萧十一郎将受伤的沈璧君带到一座破旧山神庙中，为她烤火、煮汤、铺草。沈璧君右腿受伤肿胀，起初对这粗野男人充满戒备和不安，甚至负气一瘸一拐走入寒夜。萧十一郎不拦不追，只默默送来一碗热汤。沈璧君最终在破庙中安然入睡，第一次在陌生男人身旁感到绝对安全。本章是萧十一郎与沈璧君情感线的起点，也是沈璧君内心世界的首次深入展现。
- chapter: 11
  title: 第十一回 淑女与强盗
  summary: 第十一回"淑女与强盗"。沈璧君在半山破庙中醒来,发现救她的神秘男子不在,心中竟感到空虚寂寞。萧十一郎带着水和药草归来,为她熬药治腿伤。沈璧君试图报恩被拒,请求雇车回庄也被告知此处在半山上无法通车。萧十一郎以言语逼她脱鞋泡脚、敷药包扎,态度粗鲁却细心周到。沈璧君对他越来越好奇,试探其身世,萧十一郎只说自己四海为家、不愿谈过去。随后彭鹏飞(万胜金刀)与柳永南(玉面剑客)到来,自称是连公子故交,要接沈璧君回庄。萧十一郎出言阻拦、质疑二人来意,被二人联手攻击。萧十一郎以一双肉掌轻松封住刀剑,本可取二人性命,却因沈璧君一句"他是我的朋友"而杀机尽失,反被划伤肩头。最终萧十一郎夺过刀剑折断、撞破庙墙离去。彭柳二人事后推断此人就是萧十一郎,但沈璧君否认,认为他绝不是坏人。
- chapter: 12
  title: 第十二回 要命的婚事
  summary: 沈璧君在山神庙脱险后由彭鹏飞、柳永南护送回程，途中被小公子派来的车夫和青衣妇人截住，欲将她带回交给小公子。柳永南突然出手杀死车夫和青衣妇人救出沈璧君，但彭鹏飞与柳永南随即互相揭发对方丑行——彭鹏飞实为杀人越货的假镖师，柳永南则是采花盗。两人大打出手，沈璧君趁乱驾马车逃走却撞树翻车。小公子现身，以极端手段胁迫沈璧君答应嫁给柳永南，以此同时折磨二人。正当柳永南准备入洞房时，萧十一郎如鬼魅般出现制住小公子，欲以其人之道还治其人之身。小公子假意顺从后突然发难，以暗器袭向沈璧君、一拳震碎柳永南内脏，趁乱逃走。萧十一郎虽震飞暗器救了沈璧君，却未能追上小公子。
- chapter: 13
  title: 第十三回 秋灯
  summary: 萧十一郎在一间冷清客栈中照顾晕迷三天的沈璧君。沈璧君醒来后感激他的救命之恩,但萧十一郎因她已是他人之妻且身份悬殊而刻意冷淡。沈家庄老家丁沈义受太夫人之命前来接沈璧君回去,萧十一郎识破沈义已被小公子收买,将其打伤赶走,却不肯向沈璧君解释原因。沈璧君心生误解与愤怒,喝酒后大醉,执意要回沈家庄。店伙告知她沈家庄已被焚毁,沈璧君悲痛欲绝仍坚持前往。萧十一郎内心矛盾挣扎,最终决定无论沈璧君如何对他,都要再救她一次,大步追了出去。沈璧君在马车中做了噩梦,梦见萧十一郎变成了连城璧。到达沈家庄旧址时,沈璧君整个人僵住了。
- chapter: 14
  title: 第十四回 雷电双神
  summary: 沈璧君回到大明湖畔，发现沈家庄已被焚为瓦砾，悲痛欲绝。雷电双神（雷满堂、龙一闪）出现，自称专程来给沈太夫人拜寿却来迟一步，将沈璧君引至湖中船上。船上"鲁东四义"中假装重伤的沈天竹和沈天菊指认萧十一郎为凶手。萧十一郎出现，沈璧君在愤怒与矛盾中刺伤萧十一郎。随后沈天竹、沈天菊、龙一闪联手围攻萧十一郎，萧十一郎在刹那间将三人击败（龙一闪、沈天竹死亡，沈天菊断腕）。雷满堂再度扑来，被小公子操控尸体攻击萧十一郎。小公子现身，揭露真相：她才是放火杀人的真凶，鲁东四义和雷电双神都是被她收买来嫁祸萧十一郎的。小公子深爱萧十一郎，但受制于其武功极高的师父，必须将沈璧君带回交差。萧十一郎重伤之下无法救出沈璧君，陷入绝境。
- chapter: 15
  title: 第十五回 萧十一郎的家
  summary: 小公子以奢华生活软禁沈璧君，同时故意给重伤的萧十一郎饮酒食海鲜，使其胸膛伤口严重溃烂。沈璧君发现萧十一郎的伤势后悲痛欲绝，质问小公子为何不救治。萧十一郎带二人来到他幼年成长的穷山恶谷，在绝壑边纵身跳下，沈璧君也随之跳入。二人在绝壑底部的泥沼中幸存——泥沼中腐烂的药草有神奇疗伤之力（萧十一郎幼时从狼群处得知此秘密）。泥沼缓慢流动将二人带至一片隐秘的世外桃源，那里有萧十一郎亲手搭建的小木屋。二人在山谷中共同生活，伤势渐愈，感情日深。萧十一郎第一次将此地视为"家"，沈璧君也第一次感受到被人等待的幸福。
- chapter: 16
  title: 第十六回 柔肠寸断
  summary: 萧十一郎打探到连城璧的消息后，告诉沈璧君该走了。他雇了辆骡车送她，自己步行在车辕外，沈璧君由此得知他花的每一文钱都是正当清白。沈璧君回到连城璧所住的高贵客栈，夫妻重逢却只是淡淡两句对话。屋内有赵无极、海灵子、屠啸天、司徒中平、厉刚五位连城璧的朋友。赵无极讲述孟家庄灭门惨案并指控萧十一郎，沈璧君激动辩护，声称两个月来从未离开过萧十一郎。连城璧表示相信妻子，众人认为是误会。司徒中平进一步指出若非萧十一郎所做，别的事也可能冤枉了他。本章揭示了萧十一郎被冤枉的处境，以及沈璧君在两个世界之间的挣扎与抉择。
- chapter: 17
  title: 第十七回 君子的心
  summary: 连城璧与沈璧君深夜对饮，沈璧君因对萧十一郎的感情而痛哭，连城璧虽温柔安慰却内心煎熬。赵无极、屠啸天、海灵子、厉刚四人趁夜秘密出发去杀萧十一郎，司徒中平故意探出行踪却置身事外，连城璧明知却不阻止。沈璧君得知后拼命赶去相救。萧十一郎烂醉如泥，醉中捧着沈璧君的金钗痛哭。四人闯入客栈围攻，萧十一郎虽醉却凭本能以金钗震退海灵子，又接住厉刚的大摔碑手，夺下屠啸天的旱烟管。但终因酒醉受伤，被赵无极刺中腋下。萧十一郎酒醒后以气势震慑四人不敢动手，欲自刎时被赵无极言语刺激，怒而挥刀将赵无极震飞，随后力竭倒地。
- chapter: 18
  title: 第十八回 亡命
  summary: 第十八回"亡命"。萧十一郎身受重伤，在暴雨黑夜中被赵无极、海灵子、厉刚、屠啸天四人追杀。沈璧君冒雨赶到，以家传夺命金针威慑众人，抱起萧十一郎逃入暴雨中。连城璧早已跟随在侧，却不出手阻拦，表面深情实则借刀杀人。保镖司徒中平试图以此要挟连城璧，被其一剑刺死灭口。沈璧君带萧十一郎躲入山穴，萧十一郎判断追兵必会分散，设计以逸待劳、各个击破。第一个追来的屠啸天中了疑心之计，被萧十一郎以毒金针射杀。随后萧十一郎又设下树枝弹射陷阱，准备对付第二个追来的赵无极。
- chapter: 19
  title: 第十九回 奇计
  summary: 萧十一郎与沈璧君遭海灵子追杀，萧十一郎以血肉之躯扼住海灵子剑锋，为沈璧君创造以"满天花雨"金针手法击杀海灵子的机会，二人合力将其杀死。随后萧十一郎以言语虚张声势吓退精明谨慎的赵无极。二人设下假死之局，以海灵子和屠啸天的尸体布置同归于尽的假象，引诱厉刚上钩。厉刚果然中计，见沈璧君"昏迷"后兽性大发欲行侵犯，沈璧君奋起以刀将其刺死。事后二人在山坡上体力不支双双昏迷，被神秘的天公子救回其华美居所。醒来后见到精美绝伦的玩偶房屋，天公子侍女素素前来照料，但端上的仙种茶中暗含迷药，二人饮后再次昏迷。连城璧与赵无极在密林中目睹萧沈二人离去，连城璧态度平静，自信沈璧君迟早会回来。
- chapter: 20
  title: 第二十回 玩偶世界
  summary: 萧十一郎与沈璧君被天公子迷倒后醒来，发现自己身处玩偶世界之中——他们已缩小为玩偶大小，先前所见的玩偶老人、侍女都变成了活人。玩偶世界的庄主（一个面貌俊美的侏儒）设宴招待他们，席间还有雷雨（万里行云）和龙飞骥（天马行空）两位武林豪杰，他们十三年前以铁掌战天山七剑成名，却已在此困了十二年。庄主来此已二十年。众人告知萧十一郎，天公子拥有不可思议的魔法，能监视一切言行，被囚者永无归期。但天公子留下了一处破法关键藏于宅院二十八间屋中，找到即可恢复自由；另一条路是在祭台上献上自己最珍视之物换取自由。庄主讲述了一对夫妻的故事，妻子牺牲自己换了丈夫自由，萧十一郎却冷言批评此举愚蠢。雷雨则展示此间人已丧失羞耻心，将身边女子随意示人、让人，沈璧君惊惧万分。
- chapter: 21
  title: 第二十一回 真情流露
  summary: 萧十一郎和沈璧君被天公子囚禁在庄院中,被迫承认是夫妻。两人真情流露, 沈璧君愿去恶魔祭典以换萧十一郎性命,萧十一郎却坚决反对,决心先逃出庄院。 第五天晚饭时,萧十一郎未归,沈璧君出门寻找遭遇雷雨调戏,遂以沈家金针威慑。 原来萧十一郎已与少女苏燕虚与委蛇,套取庄院秘密——两名神秘老者的身份与武功。 第六天,萧十一郎与朱衣老人、绿袍老人在八角亭展开一场内力和定力的静默决斗, 双方对峙五个时辰不分胜负。
- chapter: 22
  title: 第二十二回 最长的一夜
  summary: 萧十一郎与绿袍老人、朱衣老人决战后凯旋,回屋不见沈璧君反见四五天未露面的主人。主人揭露沈璧君已失去腹中孩子,并以玩偶房屋造成的魔法错觉囚禁众人。萧十一郎看破阳光破绽,撞墙入隔壁揭穿玩偶屋真相。主人坦承毁沈家庄杀其祖母,以此激恨挽留沈璧君。小公子现身与主人密谈,料定沈璧君必返回复仇。
- chapter: 23
  title: 第二十三回 吓坏人的新娘子
  summary: 萧十一郎与沈璧君逃出玩偶山庄后同行,途中被朱衣老人与绿袍老人用车相送,两位老人警告他们千万莫要再回来,因为有一种"比鬼还可怕的妖怪"随时能杀他们,他们已二十年被困在山庄,靠下棋消磨时日,只能送至路口。老人走后,二人遇到一队迎亲队伍,新娘子竟从花轿中飞出拍打萧十一郎,原是风四娘成婚,新郎倌是杨开泰。风四娘与杨开泰争吵后摔下凤冠撕破绣袍,拉着萧十一郎和沈璧君离席,杨开泰怒喊天下女人都死光也不会再找她这女妖怪。沈璧君为令萧十一郎死心,冷淡宣告自己已是连城璧的妻子,今后与萧十一郎两不相欠,并决意去找杨开泰护送,始终没有回头,萧十一郎心碎不已。
- chapter: 24
  title: 第二十四回 此情可待成追忆
  summary: 萧十一郎与风四娘在酒摊对饮,两人都心事重重。萧十一郎因沈璧君决绝离去而痛苦不已,风四娘则因他可能的报复行为而担忧。与此同时,沈璧君在枯林中崩溃大哭,决心前往"玩偶山庄"以死明志。连城璧一直在暗中跟随沈璧君,两人在林中对峙,沈璧君向连城璧坦言心已变,拒绝回家,连城璧失控打了她一巴掌后狂奔而去。随后连城璧在酒摊与萧十一郎相遇,两人对饮至醉,连城璧在醉中承认自己从未真正得到过沈璧君,拔剑欲杀萧十一郎却因醉而跌倒,最终三人皆醉。萧十一郎在朦胧中向连城璧承诺会找回沈璧君。本章还通过风四娘之口提及了江湖中武功最高之人逍遥侯,其轻功无人能比。
- chapter: 25
  title: 第二十五回 夕阳无限好
  summary: 萧十一郎重返玩偶山庄寻找沈璧君，跪求小公子带路。在屋内见到沈璧君正为刺杀逍遥侯而脱衣，被逍遥侯以言语逼迫。萧十一郎撞破后向逍遥侯挑战，逍遥侯以轻功飞身离去。风四娘突然闯入，为救沈璧君与小公子交手，却因手已被小公子以毒针刺入而失败。小公子欲杀沈璧君时，被连城璧以家传袖中剑（短剑）刺杀。小公子临终前将解药留给风四娘。结尾处，红衣老人与绿袍老者遥视路尽头，萧十一郎独自走上死路，沈璧君随后追随而去，风四娘痴望路尽。
