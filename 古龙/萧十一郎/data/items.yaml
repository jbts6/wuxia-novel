- id: item_bao_dao
  name: 宝刀
  aliases:
    - 刀
  types:
    - 武器
  description: 由赵无极、屠啸天、海灵子、老鹰王等人护送入关的宝刀，在老鹰王手中丢失。风四娘和萧十一郎夺到的是假刀，真刀下落不明。
- id: item_bi_shou
  name: 匕首
  aliases: []
  types:
    - 武器
  description: 萧十一郎藏于身上的短刃，几乎完美无瑕。在扼住海灵子剑锋后，以此匕首刺入海灵子胸膛将其杀死。后沈璧君亦以类似短刀刺杀厉刚。
- id: item_bo_si_zhan_zi
  name: 波斯毡子
  aliases: []
  types:
    - 其他
  description: 出自波斯名手制作的毡子，铺在山坡上供人休憩享用酒食，体现小公子对沈璧君的奢华款待。
- id: item_chang_qiang
  name: 长枪
  aliases:
    - 大铁枪
  types:
    - 武器
  description: 龙一闪的兵刃之一，长一丈四尺，枪头红缨闪动，比龙一闪身子还长三尺。主攻兵器，配合软剑使用。
- id: item_chi_xia
  name: 赤霞
  aliases: []
  types:
    - 武器
  description: 与蓝玉配对的雄剑，剑鞘上镶着淡红的宝玉。原为逍遥侯所有，后赠予风四娘，但已被一把刀削断，成为断剑。
- id: item_dao_xia
  name: 刀匣
  aliases: []
  types:
    - 其他
  description: 装载割鹿刀（赝品）的匣子，藏于独臂鹰王宽大袍子内的黄布包袱中。
- id: item_duan_dao
  name: 短刀
  aliases: []
  types:
    - 武器
  description: 萧十一郎腰带上的短刀，被沈天菊指认为杀害沈太夫人的凶器（实为嫁祸）。沈璧君曾拔出此刀刺伤萧十一郎。
- id: item_duan_jian
  name: 短剑
  aliases: []
  types:
    - 武器
  description: 连城璧以袖中剑（短剑）刺入小公子心口，将其击杀。
- id: item_duo_ming_jin_zhen
  name: 夺命金针
  aliases:
    - 沈家金针
  types:
    - 暗器
  description: 沈家祖传暗器，金丝制成，带有剧毒。名震天下，令江湖中人闻之色变。一蓬金丝可同时暴射而出，杀伤范围大。
- id: item_fu_rong_jian
  name: 芙蓉剑
  aliases: []
  types:
    - 武器
  description: 柳永南所佩长剑,施展芙蓉剑法所用。剑光绚丽夺目,后被萧十一郎夺去折断。
- id: item_gang_zhi_jia
  name: 钢指甲
  aliases:
    - 钢套
  types:
    - 暗器
  description: 小公子五指指甲上套着的薄薄钢套，可飞射击向对手胸肋间穴道，极为隐蔽难以察觉。
- id: item_ge_lu_dao
  name: 割鹿刀
  aliases: []
  types:
    - 武器
  description: 徐鲁子费一生心血铸成的宝刀，非寻常兵器可比。得刀者须答应两件事：终生佩带此刀绝不落入第二人之手；以此刀除去当今天下声名最狼藉的大盗萧十一郎。现由司空曙护刀入关，将在沈家庄由六君子中本事最大者获得。
- id: item_han_yan_dai
  name: 旱烟袋
  aliases: []
  types:
    - 武器
  description: 屠啸天所持武器，用以打人身三十六大穴、七十二小穴，是其标志性兵器。
- id: item_han_yan_guan
  name: 旱烟管
  aliases:
    - 旱烟袋
    - 旱烟筒
  types:
    - 武器
  description: 屠啸天的武器，精钢所铸，分量极重。既是日常用具也是打穴利器，烟斗可攻击穴道。后被萧十一郎拗断烟斗。
- id: item_hong_dao_yi
  name: 红刀衣
  aliases: []
  types:
    - 武器
  description: 花平所佩之刀的刀柄装饰,红色刀衣,在黑披风下露出。
- id: item_ji_tai
  name: 祭台
  aliases: []
  types:
    - 其他
  description: 大厅后院落中的青石，桌面般大小，光滑如镜。若有人将最心爱最珍视之物作为祭礼献给天公子，天公子便会放了此人。
- id: item_jie_yao
  name: 解药
  aliases: []
  types:
    - 丹药
    - 其他
  description: 小公子毒针的解药，藏于其怀中，留给风四娘。
- id: item_jin_bei_kan_shan_dao
  name: 金背砍山刀
  aliases:
    - 金背刀
  types:
    - 武器
  description: 彭鹏飞所用兵器,重达二十七斤,刀风激扬,刚劲有力。与芙蓉剑配合时,其刚劲恰好弥补芙蓉剑法柔弱的不足。后被萧十一郎夺去折断。
- id: item_jin_chai
  name: 金钗
  aliases: []
  types:
    - 饰品
  description: 沈璧君遗落在客栈的金钗，萧十一郎醉后视若珍宝反复把玩。萧十一郎醉中竟以金钗格挡海灵子的利剑，将其震退两步。
- id: item_jin_ding
  name: 金锭
  aliases: []
  types:
    - 其他
  description: 独臂鹰王从怀中掏出的一锭金子,想以此酬谢萧十一郎背他去沈家庄,实为诱骗萧十一郎靠近的陷阱。
- id: item_jin_zhen
  name: 金针
  aliases: []
  types:
    - 暗器
  description: 沈璧君使用的暗器，配合"满天花雨"手法使用。本章中发出七把后已用尽。
- id: item_jing_gang_ruan_jian
  name: 精钢软剑
  aliases: []
  types:
    - 武器
  description: 赵无极的佩剑，精钢所制的软剑，平时藏于腰间。赵无极自恃身份平日不带兵刃，仅在必要时才抽出使用。
- id: item_jiu_bei
  name: 酒杯
  aliases: []
  types:
    - 其他
  description: 主人以捏碎酒杯展示内力的道具。
- id: item_ke_zi_guan_cai
  name: 刻字棺材
  aliases:
    - 飞大夫的棺材
  types:
    - 秘籍
    - 其他
  description: 飞大夫的棺材，上面刻有其毕生医术和武功心法，原打算陪葬。被偷棺贼盗走后由萧十一郎追回送回。
- id: item_lan_yu
  name: 蓝玉
  aliases: []
  types:
    - 武器
  description: 一尺多长的短剑，剑锋奇薄，发着青中带蓝的光，为雌剑。原为公孙大娘首徒申若兰所用，后为逍遥侯所得并赠予风四娘。最适女子使用，虽不能真的削铁如泥却也差不多。
- id: item_lan_yu_jian
  name: 蓝玉剑
  aliases:
    - 蓝玉
  types:
    - 武器
  description: 风四娘所佩之剑，品质优良，能轻易斩断赝品割鹿刀。风四娘将其赠予萧十一郎，萧十一郎打算将其送给一位'又聪明、又漂亮、又爽直'的姑娘（即风四娘本人）。
- id: item_lei_gong_zao
  name: 雷公凿
  aliases:
    - 精钢雷公凿
  types:
    - 武器
  description: 雷满堂的兵刃，一双精钢制成的雷公凿，可击打人身穴道，招式精奇，水里陆上运转如意。
- id: item_liang_fu_zi_lu
  name: 梁福字履
  aliases: []
  types:
    - 饰品
  description: 绿袍老人下棋时脱在石凳旁的鞋履。
- id: item_long_xian_xiang
  name: 龙涎香
  aliases: []
  types:
    - 其他
  description: 玩偶世界屋中香炉所燃之名贵香料，香烟婀娜。
- id: item_luo_che
  name: 骡车
  aliases: []
  types:
    - 其他
  description: 萧十一郎雇来送沈璧君回连城璧处的交通工具。萧十一郎自己始终跨在车辕外步行，体现其花钱正当清白。
- id: item_qi
  name: 棋
  aliases: []
  types:
    - 其他
  description: 朱衣老人与绿袍老人在八角亭中饮酒下棋用的棋子。
- id: item_qi_qiao_hua_gu_san
  name: 七巧化骨散
  aliases: []
  types:
    - 丹药
  description: 藏于小公子指甲中的剧毒药物，通过划破皮肤渗入人体，不到半个时辰便令人全身溃烂而死。
- id: item_qi_zi
  name: 棋子
  aliases: []
  types:
    - 暗器
  description: 朱衣老人用以弹出击落酒壶的暗器。
- id: item_qing_ci_gai_wan
  name: 青瓷盖碗
  aliases: []
  types:
    - 其他
  description: 萧十一郎和沈璧君先前用过的两只盖碗，在玩偶世界中显得巨大无比，萧十一郎几乎可以在碗里洗澡。
- id: item_ren_pi_mian_ju
  name: 人皮面具
  aliases: []
  types:
    - 饰品
  description: 小公子脸上戴的制作极精巧的人皮面具,使其面容诡秘可怖,但灵活的双眼仍暴露其魅力。
- id: item_ruan_dou_xiao_jiao
  name: 软兜小轿
  aliases: []
  types:
    - 其他
  description: 枯瘦老人乘坐的交通工具,由两名轿夫抬行。轿中暗藏细长剑,实为刺杀工具。
- id: item_ruan_jian
  name: 软剑
  aliases: []
  types:
    - 武器
  description: 龙一闪的兵刃之一，藏于腰带上，配合长枪使用，主守护身。沈天菊也藏有一把软剑于被中。
- id: item_san_dao_han_guang_an_qi
  name: 三道寒光暗器
  aliases: []
  types:
    - 暗器
  description: 小公子随身携带的暗器，发出时呈三道寒光，具体形制未详。
- id: item_tiao_deng_kan_jian_tu
  name: 挑灯看剑图
  aliases: []
  types:
    - 其他
  description: 玩偶世界屋中桌上铺着的未完成图画，令萧十一郎感到寒意。
- id: item_wan_ou_fang_wu
  name: 玩偶房屋
  aliases: []
  types:
    - 其他
  description: 天公子收藏的精美微缩建筑，用真实木材砖瓦建成，琉璃瓦与皇宫所用完全一样但小了十几倍。前后二十七间房，内有正厅、偏厅、花厅、卧室、客房、仓房、厨房，每间陈设皆为真实微缩物件，有吴道子手笔山水、紫檀木雕花椅、真瓷茶盏等。花园中有松竹花草、小桥流水、假山亭阁，还有木石所塑的黄犬白兔、仙鹤驯鹿。
- id: item_wu_guang_an_qi
  name: 乌光暗器
  aliases:
    - 两道乌光
  types:
    - 暗器
  description: 柳永南左手发出的暗器，呈乌光状，速度极快，一击毙命，击中青衣妇人咽喉。
- id: item_wu_qiao_jian
  name: 乌鞘剑
  aliases: []
  types:
    - 武器
  description: 柳色青腰间所悬之剑，乌鞘包裹，绝非凡品，为其施展回风舞柳剑之兵刃。
- id: item_xi_liang_pu_tao_jiu
  name: 西凉葡萄酒
  aliases:
    - 葡萄酒
    - 葡萄美酒
  types:
    - 其他
  description: 来自西凉国的葡萄酒，小公子用来招待沈璧君和萧十一郎。对伤者而言，酒属发物，会加重伤口溃烂。
- id: item_xian_zhong_cha
  name: 仙种茶
  aliases: []
  types:
    - 丹药
  description: 天公子所赐茶叶，据称是仙种，益气补身且有"意想不到的好处"。实则含有迷药，萧十一郎和沈璧君饮后随即昏迷。
- id: item_xiao_gong_zi_an_qi
  name: 小公子暗器
  aliases:
    - 几点寒星
  types:
    - 暗器
  description: 小公子发出的暗器，呈寒星状，在被萧十一郎制住时突然发出射向沈璧君，被萧十一郎及时震飞。
- id: item_xiao_niu_pi_zhu_hua_xue
  name: 小牛皮珠花靴
  aliases:
    - 珠花皮靴
  types:
    - 饰品
  description: 用硝过的小牛皮制成的精致靴子，镶有珠花，非规矩人或一般江湖豪杰所穿。是偷棺贼遗落的证物，风四娘凭此认出偷棺贼身份。
- id: item_xiao_shi_yi_lang_de_dao
  name: 萧十一郎的刀
  aliases: []
  types:
    - 武器
  description: 萧十一郎佩刀，一刀之威势不可挡，即使身受重伤仍能一刀震裂赵无极虎口、震飞其手中剑。
- id: item_xiao_shi_yi_lang_de_duan_dao
  name: 萧十一郎的短刀
  aliases: []
  types:
    - 武器
  description: 比普通刀短很多的刀，刀鞘用黑色皮革所制，已非常陈旧。随随便便插在腰间蓝布带上。
- id: item_xiao_shi_yi_lang_de_xiao_dao
  name: 萧十一郎的小刀
  aliases: []
  types:
    - 武器
  description: 萧十一郎藏于靴筒中的小刀，刀锋极为锋利。萧十一郎爱刀，认为好刀本身就是完美的，如无瑕璧玉。
- id: item_xiao_yin_dao
  name: 小银刀
  aliases: []
  types:
    - 武器
  description: 老赵随身携带的古雅精致小银刀,本用于切食验毒,被阔少爷夺过后化为银光刺入老赵咽喉。
- id: item_xing_hong_dou_peng
  name: 猩红斗篷
  aliases: []
  types:
    - 饰品
  description: 小公子所披的猩红色斗篷，配金冠红缨，衬其雪白粉嫩面容，显得活泼可爱。
- id: item_yin_shao_zi
  name: 银勺子
  aliases: []
  types:
    - 其他
  description: 老赵随身携带的验毒工具,用银勺舀酒观察是否变色来判断有无毒物。
- id: item_yin_zhen
  name: 银针
  aliases: []
  types:
    - 暗器
  description: 风四娘的暗器,细小如针,从指缝间飞出,银光闪烁,可精准刺中目标眼睛。
- id: item_yu_dai
  name: 玉带
  aliases: []
  types:
    - 暗器
    - 武器
  description: 小公子腰上束着的玉带，内藏暗器机关，可射出银芒暴雨般的暗器，也可从中抽出软剑。
- id: item_zhao_wu_ji_de_dao
  name: 赵无极的刀
  aliases: []
  types:
    - 武器
  description: 赵无极使用的刀，能挽起一片刀花护住面目，是其主要兵器。
- id: item_zhu_ye_qing
  name: 竹叶青
  aliases: []
  types:
    - 其他
  description: 红鼻子老头在三岔路口挑担售卖的酒,清甜可口,配开花蚕豆、椒盐花生和卤蛋。
- id: item_zi_tan_mu_shu_xiang
  name: 紫檀木书箱
  aliases: []
  types:
    - 其他
  description: 玩偶世界屋中四壁陈列的紫檀木书箱，装满书籍。
