- chapter: 1
  title: 第一回 白玉美人
  summary: 楚留香预告在子时盗取金伴花的白玉美人。金伴花请万无敌、生死判和秃鹰守护，楚留香却先以假玉雕引开众人，再用铜锣声调开秃鹰，成功取走密匣中的真品。回到海上后，楚留香与李红袖、宋甜儿发现一具漂来的尸体；李红袖凭七星飞环、楚留香凭身份与胸口掌印，确认死者是天星帮首领左又铮，并判断其死于朱砂掌。两人梳理天星帮与朱砂门的旧怨，却认为旧事不足以解释这场追杀，楚留香预感海上还会漂来更多尸体。
- chapter: 2
  title: 第二回 海上浮尸
  summary: 楚留香的船边接连漂来多具江湖高手尸体：西门千杀死左又铮后死于窄剑，海南三剑中的灵鹫子又遭利刃劈杀，沙漠刀客札木合则中了神水宫的天一神水。楚留香由伤势与遗物串起杀人链，推测众高手可能在争夺宝藏。第五名神水宫女子看似死于札木合的大风刀，楚留香却指出宝刀早已落入他人手中，断定有人借刀杀人、故意制造事件结束的假象，真正的阴谋才刚开始。
- chapter: 3
  title: 第三回 天一神水
  summary: 楚留香为追查五具尸体下海搜索东面船只，发现妙僧无花和丐帮新任帮主南宫灵都在附近，却仍无直接线索。回到船上后，一名神水宫女子已悄然进入船舱，指控楚留香盗走天一神水；失窃的几滴神水若使用得当足以杀死三十七名一流高手。楚留香带她查看尸体，本以为被砍去一肩的少女是盗水的神水宫弟子，女子却断言从未见过此人。楚留香由此推断，幕后人物故意把少女伪装成神水宫门下，让人误以为札木合与她互相残杀，以少女作为终止追查的代罪羔羊。
- chapter: 4
  title: 第四回 一百十三号
  summary: 楚留香从宫南燕口中确认神水宫一名年轻弟子怀孕后自尽，据此推断盗水者曾诱骗并胁迫她盗出天一神水；宫南燕限他一个月内查清真相。楚留香随后请苏蓉蓉前往神水宫调查死者经历和遗物，自己则决定赴济南查访朱砂帮。他从苏蓉蓉准备的身份资料中选定一百十三号，戴上人皮面具化名关外参商张啸林，进入朱砂帮经营的快意堂赌场，并见到主管冷秋魂。
- chapter: 5
  title: 第五回 三十万两
  summary: 程三把化名张啸林的豪客带进赌场。张啸林豪赌后故意把赢牌说成输牌，送给冷秋魂三十万两，以一桩三百万两生意诱使他透露师父西门千的行踪。冷秋魂说明西门千接到一封信后离开，并把信交给杨松保管；两人赶到杨宅，却发现杨松被截去手足分尸，信也失踪，现场被布置成血煞五鬼的五鬼分尸手法。西门千房中还悬着一幅神秘绝美女子的半身画像。张啸林回客栈后遭人监视，夜里一名持柳叶刀的蒙面少女潜入房间，不取银票也不行刺，转而试图打开黑色箱子。
- chapter: 6
  title: 第六回 剑下一点红
  summary: 楚留香以张啸林身份识破潜入房中的天星帮女刺客，将她制住后送交冷秋魂盘问，并凭她遗落的柳叶刀找到天星帮落脚处。他掷刀示警后引出受雇杀手中原一点红；一点红以迅急剑法连续追击，最终识破张啸林就是楚留香。天星帮雇主催促并辱骂一点红，反被其一剑刺死；一点红以楚留香并非朱砂帮门下为由收剑离去。楚留香回到快意堂时，冷秋魂已将女刺客审至精神崩溃，她供出自己姓沈、名珊姑，是天星帮弟子。
- chapter: 7
  title: 第七回 强人所难
  summary: 冷秋魂与化名张啸林的楚留香审问沈珊姑，得知天星帮掌门左又铮失踪前要找朱砂门的西门千，天星帮还雇用了中原一点红报复朱砂门。宋刚率众赶到后，冷秋魂以沈珊姑为质，逼他承诺天星帮永不再入济南；一点红拒绝救人，也拒绝替宋刚杀死楚留香。楚留香以释放沈珊姑为条件追问左又铮收到的书信，宋刚即将说出内容时遭神秘人暗杀。楚留香追至大明湖，刺客借疑似忍术的紫烟逃脱；中原一点红随后现身，执意要与楚留香决一生死。
- chapter: 8
  title: 第八回 清风明月
  summary: 一点红因张啸林拒绝与他决斗而举剑自尽，张啸林出手抢救；湖上琴声随后令一点红失控攻击张啸林，张啸林诱他入水并制住。循琴声而去的楚留香见到妙僧无花，从无花口中得知忍术与伊贺、柳生流、一刀流及闽南武林的线索。楚留香回到快意堂，以易容后的身份试探冷秋魂，并获知天鹰子为寻找师兄灵鹫子来到济南。楚留香从天鹰子的黄绢经书中发现署名灵素的书信，赶回迎宾楼时却发现天鹰子已被点穴后一剑穿胸杀死。
- chapter: 9
  title: 第九回 红颜祸水
  summary: 楚留香发现天鹰子已遭灭口，确认左又铮、西门千、灵鹫子和札木合都可能因同一人来信而离开，相关知情者宋刚、杨松、天鹰子也已被杀。他随后跟踪沈珊姑来到贫民窟，旁听她向盲画师孙学圃追问左又铮所藏画像。孙学圃承认二十年前曾为绝色女子绘制四幅画像，完工后却被她挖去双眼，并最终说出女子名叫秋灵素。楚留香由“灵素”署名短笺和相同画像，推断西门千、左又铮、灵鹫子均曾为秋灵素痴迷，而三人现已全部死亡。
- chapter: 10
  title: 第十回 卿在何方
  summary: 楚留香从孙学圃口中得知，秋灵素曾将四幅画像分别赠给四名旧日恋人；左又铮、西门千、灵鹫子和札木合后来又收到署她姓名的书信，并相继出门遇害。孙学圃指出乌衣庵主持素心大师可能知道秋灵素的下落。楚留香乘车前往，却先被引到桃花庵，听假素心声称秋灵素早已出家身亡；他发现对方不该知道自己与孙学圃的谈话，随即识破骗局。抵达真正的乌衣庵后，楚留香发现素心大师早已悬梁身亡，黑衣人藏在枯骨中以剑和毒暗器伏击，正是此前用忍术逃走、害死宋刚的神秘人；伏击失败后，暗器误杀了引路女尼。
- chapter: 11
  title: 第十一回 骰子之戏
  summary: 垂死女尼只留下一个“无”字，楚留香误以为线索指向梧桐树，返回时却发现乌衣庵已被焚毁。他转赴快意堂寻找秋灵素线索，遇见一名骑神骏烈马、披黑斗篷的无名少年。少年以珍贵玉璧为注，与冷秋魂赌六粒骰子的最低点数，并用长鞭把六粒骰子依次嵌入墙中，只留一点而获胜。楚留香从少年斗篷内的飞骆驼标记察觉其来历，主动续赌，以手弹六粒骰子相互撞碎，得到零点并胜过少年，取得玉璧、冷秋魂的自由和发问资格。
- chapter: 12
  title: 第十二回 独步武林
  summary: 黑衣少年驱走厅中众人后，依赌约允许楚留香询问其父入关前收到的书信，却拒绝作答，并挥鞭交手。他以云底飞星发出七星针，又施展飞环套月、行云布雨的奇异鞭法；楚留香凭分光捉影接住暗器，并以竹签逐一破解鞭圈。一名暗中敌人突袭黑衣少年时，楚留香为替他挡下暗器而故意挨了一鞭。一点红现身说明真相，黑衣少年感动之下留下书信离去。一点红随即以剑挑走书信，逼楚留香先胜过自己；两人围绕书信展开激斗，楚留香最终以双掌夹住剑尖与书信，双方仍相持未决。
- chapter: 13
  title: 第十三回 三 蛇 羹
  summary: 一点红以长剑与楚留香较力，楚留香折断长剑，却也以内力将关键书信震碎；一点红由此立誓不再找楚留香动手。去而复返的黑衣少年躲进快意堂窗帘后，白玉魔率丐帮弟子追来并驱使毒蛇进攻，楚留香转眼击毙群蛇。丐帮新任帮主南宫灵赶到后制止冲突、责问白玉魔，又说明黑衣少年曾伤害丐帮弟子并盗走要物。南宫灵随即掷出袖中短剑试探窗帘，众人最后发现黑衣少年已经逃走，只留下靴子作为障眼。
- chapter: 14
  title: 第十四回 捉魂如意钵
  summary: 南宫灵误以为黑衣少年已经逃走，率丐帮弟子离开后，少年从另一扇窗帘后现身，原来他利用故意露出的靴尖误导了追兵。白玉魔返回后迫使少年再次逃走，并以独创的捉魂如意钵攻击楚留香。楚留香故意观尽兵器变化，险些被带毒鬼爪击中，最后用怀中的画卷卡住机关脱险。白玉魔展开画卷，认出画中人是昔日丐帮帮主任慈之妻叶淑贞；楚留香由此确认秋灵素嫁给任慈后改名叶淑贞。白玉魔表示南宫灵或许知道她的下落，并准备用黑衣少年的来历交换消息，遂带楚留香前往丐帮香堂；一点红在途中悄然离去。
- chapter: 15
  title: 第十五回 情侣书信
  summary: 楚留香潜伏在丐帮香堂外，旁听南宫灵审问一名来历不明的黑衣少年。中原一点红闯入救人，以快剑牵制丐帮高手；楚留香又投掷瓦片冒充五毒铜钹制造混乱，使两人突围。楚留香随后与少年交谈，凭斗篷上的飞骆驼判断其是沙漠之王之子，并听到秋灵素求援信的全文：她自称陷入困境，恳请旧人援手，署名为“素”。少年说明沙漠之王接信入关后突然断绝鸽书，临城鸽站人员也全被杀死；结合丐帮无人知道任夫人去处、老帮主任慈同期死亡等疑点，楚留香决定直接向南宫灵查问。
- chapter: 16
  title: 第十六回 妙僧无花
  summary: 无名黑衣少年约楚留香次日由黑马带路寻找自己，并以黑珍珠自称。楚留香返回丐帮香堂，与南宫灵、妙僧无花饮酒谈话，以札木合已死的消息试探南宫灵，并请求查访任夫人；南宫灵最终答应带路。楚留香以快手取走无花腰间玉如意后赴大明湖见黑珍珠，说明自己将随南宫灵去见任夫人，并约定两日后再会。随后楚留香与南宫灵前往尼山，得知任老帮主曾养育孤儿南宫灵，并梦想在尼山隐居；两人继续向任夫人住处前进。
- chapter: 17
  title: 第十七回 迎风一刀斩
  summary: 楚留香随南宫灵前往任夫人居所，在绝崖石梁上遭自称伊贺忍侠的天枫十四郎阻拦。天枫道出自己对秋灵素的痴情及与任慈的旧怨，继而施展死卷术、丹心术和迎风一刀斩。楚留香借石梁险势避过杀招并反击，天枫却以空蝉术脱身。楚留香由姓名泄露和面具易容判断此人本是相识的中原高手，随后与南宫灵过桥入舍，终于见到任夫人。
- chapter: 18
  title: 第十八回 颠倒众生
  summary: 楚留香在南宫灵陪同下拜见蒙着黑纱的秋灵素，询问西门千、左又铮、灵鹫子和札木合因信赴援之事，秋灵素却否认写过这封信。楚留香从任老帮主遗骨已经火化及秋灵素关于其病逝的说法中察觉线索，回到济南后向黑珍珠复盘会面。黑珍珠声称苏蓉蓉遭四名绿袍人以暗器伏击并坠湖失踪，使楚留香悲痛欲绝；随后扮成渔翁的苏蓉蓉现身，说明她识破了四人冒称朱砂帮弟子的疑点，故意假装中暗器坠湖，以使幕后敌人相信她已经死亡。
- chapter: 19
  title: 第十九回 棋高一着
  summary: 苏蓉蓉向楚留香说明自己未能从神水宫查出司徒静所爱之人的线索，两人却从秋灵素关于任老帮主之死的矛盾说法中看出暗示。楚留香决定立即重返尼山，又在大明湖借与无花、南宫灵下棋之机从气窗脱身，并向黑珍珠借得千里驹赶路。抵达秋灵素的茅舍后，他发现人已失踪，遂由蒲团上的乌木发簪和荆棘上的黑布追到后山悬崖，听见白玉魔声称为二十年前的旧仇逼秋灵素赴死。
- chapter: 20
  title: 第二十回 天枫十四郎
  summary: 楚留香及时赶到悬崖边救下欲抱骨灰瓶赴死的秋灵素，并在一招间夺下白玉魔的狼牙棒。秋灵素承认四封求援信出自自己之手，随后揭露南宫灵长期下毒削弱任慈、软禁二人并操控丐帮，又利用四封信将札木合等四人同时引来；神秘来客与南宫灵密谈后，原本索财的计划转为杀人灭口。楚留香判断任慈喝下的参汤含有天一神水，从而把幕后之人与神水宫失窃、宋刚之死及伪装天枫十四郎等事件串联起来。秋灵素最后说明真正的天枫十四郎是二十年前渡海挑战任慈的东瀛剑客，并称他最终死于任慈之手。
- chapter: 21
  title: 第二十一回 帮主夫人
  summary: 秋灵素向楚留香讲述任慈以打狗棒击败重伤的天枫十四郎，以及天枫十四郎临终托付秘密的往事，并由任慈对南宫灵的歉疚与容忍推断南宫灵正是天枫十四郎的遗孤。随后她揭开黑纱，让楚留香看到自己被毁的容貌，并说明石观音因嫉妒她的美貌而逼她用烈性药水毁容。秋灵素又坦白自己在疯狂中伤害画家孙学圃，最终则是任慈在她重伤和绝望时日复一日地照顾、陪伴并安慰她。
- chapter: 22
  title: 第二十二回 好友成仇
  summary: 秋灵素完成揭露南宫灵秘密的心愿后跳崖身亡，悲愤的楚留香随即赶到丐帮香堂与南宫灵对质。南宫灵承认杀死任慈，却因贪恋帮主权位拒绝辞职赎罪，也不肯供出盗取天一神水、杀死天鹰子和宋刚的幕后人物。昔日好友短暂交手，楚留香七掌之间占据上风；南宫灵随即押出苏蓉蓉，以她的性命逼楚留香停止追查。危急之际，黑珍珠用长鞭制住看守人质的大汉，一点红持剑拦住南宫灵，楚留香趁机将苏蓉蓉救到一旁。
- chapter: 23
  title: 第二十三回 兄杀其弟
  summary: 黑珍珠以长鞭同无名大汉较力，长鞭折断后大汉也被勒死。与此同时，一点红拒绝南宫灵以十万两收买，持剑与南宫灵的缅刀激战；双方各自受伤且难分胜负，一点红主动停手，并向楚留香重申朋友之义。楚留香将苏蓉蓉托付给黑珍珠后，随南宫灵登上湖心画舫等待神秘主谋。楚留香因警觉没有饮酒，南宫灵却将两杯酒都喝下，旋即显出天一神水中毒症状。楚留香判断毒酒本为灭南宫灵之口；南宫灵临死只来得及揭露主谋是自己的嫡亲哥哥，尚未说出姓名便死亡，线索再次中断。
- chapter: 24
  title: 第二十四回 南下追凶
  summary: 楚留香从天枫十四郎分别托孤于任慈和另一位绝顶高手的往事中，推断其长子由闽南天峰大师抚养，幕后凶手很可能正是此人，并担忧天峰大师将成为下一个目标。他把黑珍珠父亲的死讯和遗体所在告知黑珍珠后，骑马赶往闽南。在茶馆里，楚留香从旧识钱麻子与冯天和的谈话中确认天峰大师的声望、武功与隐居经历，遂代钱麻子携茶前往莆田少林寺。临行前，老捕头秃鹰现身，告知丐帮正追查南宫灵被分尸之事；楚留香承认自己知道真凶。
- chapter: 25
  title: 第二十五回 天峰大师
  summary: 楚留香为阻止天峰大师遭害，赶到莆田少林寺，在四名灰袍僧人拦截后以轻功脱身，又故意声称要看少林藏经，将守卫调往东面，自己潜入安静的西院。他承受监寺僧人的百步神拳后表明身份，得知无花正在为天峰大师烹茶，便再次脱身闯入禅房，及时阻止天峰大师饮下可疑之茶并接替无花烹茶。随后楚留香询问天枫十四郎旧事，天峰大师承认自己是当年与其交手的另一位中土高手，并开始讲述天枫十四郎与黄山世家遗女李琦在扶桑相识、成婚和生子的往事。
- chapter: 26
  title: 第二十六回 法律庄严
  summary: 天峰大师向楚留香讲述李琦、天枫十四郎及两个孩子的往事：李琦为父兄复仇后失踪，天枫十四郎故意受天峰大师与任老帮主重创，再将长子与幼子分别托孤。楚留香由此确认无花是天枫十四郎长子、南宫灵兄长，并揭穿无花盗取天一神水、假扮天枫十四郎及杀害宋刚、素心大师等人的秘密。无花承认罪行，却表示要杀楚留香灭口；两人在暴雨中交手，无花连续施展少林神拳、弹指神通和风萍掌，仍被楚留香化解。最终无花承认败北，楚留香表示只能揭穿而无权依法制裁他。
- chapter: 27
  title: 第二十七回 自裁以谢
  summary: 无花拒绝被楚留香交给执法者，因不愿在所谓卑贱之人面前低头而自裁身亡。楚留香将他的死视为对生前罪责的了结，带着尸身前往林家花园，却拒绝向名捕秃鹰和丐帮长老透露姓名或交出尸身，并因他们要追究死者而动怒。楚留香随后准备回船休息，章节末尾预告一场他从未遭遇过的惊人变故正在等候。
