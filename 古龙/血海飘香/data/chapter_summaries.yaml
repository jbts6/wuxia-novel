- chapter: 1
  title: 第一回 白玉美人
  summary: 楚留香预告盗取金伴花所藏京城四宝玉美人，万无敌、生死判、秃鹰联手防守仍中调虎离山之计，真玉美人被盗。事后楚留香在三桅船上与李红袖、宋甜儿闲谈，并从海中捞起天星帮总瓢把子左又铮的尸体，胸有朱砂掌印，预示将有更多死尸漂来。
- chapter: 2
  title: 第二回 海上浮尸
  summary: 楚留香与李红袖船上先后捞得五具浮尸：杀手书生西门千喉中剑创，疑为海南剑派所杀；海南三剑灵鹫子头顶被劈，断剑仍握；沙漠之王札木合中天一神水毒发，大风刀失踪；神水宫女使者半身被削。众人推断连环仇杀与宝藏有关，楚留香认定真凶仍在、事未结束，宋甜儿、病中苏蓉蓉亦卷入议论。
- chapter: 3
  title: 第三回 天一神水
  summary: 楚留香为查五尸案下海“捞针”，遇无花与丐帮新任帮主南宫灵一行。神水宫女子潜入船舱，指楚留香偷走天一神水；楚带其验尸，女尸并非神水宫弟子，显系真凶将人扮作神水宫门下栽赃札木合以阻断追查。
- chapter: 4
  title: 第四回 一百十三号
  summary: 楚留香与自称冷姑娘的神水宫弟子对质，推断盗天一神水者系得宫中少女相助，且该女因有孕遭弃而自杀；女子终自报家门宫南燕，限他一月破案。船上李红袖、宋甜儿打趣，苏蓉蓉应约天亮后赴神水宫探表姑与亡女遗物，七日后济南大明湖风雨亭会合；楚留香拒扮马百万，取一百十三号行头化身关外大参药商张啸林，以人皮面具与留香之计掩行踪。华灯初上，济南朱砂帮开设的快意堂内豪赌正酣，掌门弟子杀手玉郎粉面孟尝冷秋魂坐镇内厅。
- chapter: 5
  title: 第五回 三十万两
  summary: 程三将自称张啸林的豪客引入冷秋魂的赌局；张啸林一掷千金后故意输掉三十万两，借此求见杀手书生西门千，并称事成可得三百万两之利。冷秋魂称家师西门千因一封信已离济南，二人赶往立地追魂手杨松宅取信，却发现杨松惨遭五鬼分尸、信件失踪。张啸林回客栈遭冷秋魂派人监视，夜有蒙面女刺客潜入翻检衣物与黑箱。
- chapter: 6
  title: 第六回 剑下一点红
  summary: 女刺客潜入张啸林房中以色诱刺探，反被张啸林制住并当作奸细送交冷公子。张啸林循柳叶刀线索登上屋顶寻至天星帮落脚处，与受雇的中原一点红交手；一点红百余剑未能伤他，识破其为盗帅楚留香，又因他非朱砂帮门下而罢手，并杀辱骂自己的天星帮雇主。张啸林脱身返回后，见冷秋魂已将供认自己是天星帮弟子珊姑的女刺客缚于赌桌刑台。
- chapter: 7
  title: 第七回 强人所难
  summary: 张啸林与冷秋魂审问被擒的天星帮沈珊姑，得知掌门左又铮失踪前曾留书信给二师兄宋刚，且天星帮重金聘请中原一点红对付朱砂门。宋刚率众赶至快意堂，冷秋魂以沈珊姑性命逼其立誓永离济南；一点红穿窗示威却拒出手救人。张啸林另提条件要看那封书信，宋刚刚要吐露内容便遭暗算身亡。张啸林追击凶手至大明湖，对方以忍术遁去并道破其楚留香身份；一点红随后追至，要与楚留香决一生死。
- chapter: 8
  title: 第八回 清风明月
  summary: 一点红以剑逼张啸林却始终难以下手，反欲自刎；湖上无花抚琴，琴音令一点红失控狂攻，张啸林诱其入水点穴制住。楚留香与妙僧无花相见，问及一点红与擅忍术的第二人，无花沉琴并述忍术传自伊贺、或由闽南习得。楚留香回快意堂以张啸林身份见冷秋魂，得知沈珊姑已放走、城中有海南剑派高手天鹰子落脚迎宾楼。他先搜天鹰子行囊得灵素绝情书信而非神秘书信，再闻天鹰子已访冷秋魂；赶回跨院时天鹰子已遭点穴穿胸而死，刺客之技竟未震落其手中茶壶。
- chapter: 9
  title: 第九回 红颜祸水
  summary: 楚留香在天鹰子死后梳理线索，认定左又铮、西门千、灵鹫子、札木合皆因同出一手的书信出门，相关知情人多已灭口。他在济南酒楼偶遇被逐出城的天星帮沈珊姑，跟踪至贫民窟，见其向瞎眼老画师孙学圃追问一幅画像。孙学圃自承二十年前为绝色女子秋灵素画四幅像，事后被她挖去双眼；沈珊姑称画属失踪大师兄左又铮，并疑其接信失踪与该女有关。楚留香见画与西门千屋中所藏为同一人，又联想到天鹰子短笺署名"灵素"，遂破窗相认，共寻秋灵素下落，但孙学圃自那夜后再无其音讯。
- chapter: 10
  title: 第十回 卿在何方
  summary: 孙学圃透露秋灵素曾命他画四幅像分赠四名旧情男子以断情，沈珊姑推断其另嫁武林高手。楚留香点破隐情后沈珊姑惊惧逃走；孙学圃再供出画像地点乌衣庵及住持素心大师。楚留香乘车寻庵，先被假素心以“秋灵素已出家并圆寂”误导至桃花庵，识破后赶往真乌衣庵，见荒庵痴尼引其见梁上枯骨（素心已悬梁），黑衣人以剑与暗器偷袭，身法正是害死天强星宋刚、以忍术遁入大明湖之人；暗器误杀痴尼，血迹变惨碧，凶手穿屋遁逃。
- chapter: 11
  title: 第十一回 骰子之戏
  summary: 痴尼临死仅吐出"无"字后身亡,楚留香推断凶手借孙学圃之口诱其入乌衣庵并在禅堂梁上伏击;乌衣庵随即遭火焚。楚留香回济南赴快意堂探听秋灵素下落,途遇黑斗篷少年骑神骏入堂。黑衣少年以无瑕玉璧赌冷秋魂人身,用长鞭将六粒骰子钉墙仅露一点胜出;楚留香见斗篷绣飞骆驼后介入,以手弹骰子互撞尽碎、六点皆无而胜,逼少年对赌问答。
- chapter: 12
  title: 第十二回 独步武林
  summary: 黑衣少年在大厅鞭逐众人并抽伤冷秋魂后，与楚留香对质其父入关前书信；二人动手，少年以云底飞星与飞环套月、行云布雨鞭法猛攻，楚留香用分光捉影与状元红竹签破圈。一点红破窗入场点破楚留香实为救少年而故意接鞭，少年交出书信含泪离去。一点红随即以信要挟与楚留香交手，双方剑招身法连变七次，楚留香终将书信与剑尖一齐夹住，压得一点红剑势难动。
- chapter: 13
  title: 第十三回 三 蛇 羹
  summary: 楚留香与一点红比拼后折断宝剑并毁了争抢的书信；黑衣少年避入快意堂窗帘后。白玉魔率丐帮弟子以毒蛇围攻，楚留香举手尽灭群蛇。南宫灵到场制止冲突并点明双方身份，继而追查赵官镇伤人窃物的黑衣少年，以短剑与腰刀袭向窗帘，却只刺中空靴，其人已遁。
- chapter: 14
  title: 第十四回 捉魂如意钵
  summary: 南宫灵因黑衣少年逃走责罚窗外弟子后匆匆离去；黑衣少年实未走远，自另一窗复出，疑心重且怕蛇。白玉魔携白布袋现身，黑衣少年飞掠出窗遭追；白玉魔以独创兵器捉魂如意钵对战楚留香，机簧鬼爪几近命中，楚留香以怀中画卷塞入鬼爪化解。白玉魔认出画中人为任慈之妻叶淑贞，楚留香据此悟出秋灵素已改名嫁入丐帮。白玉魔不知任夫人下落，暗示可用黑衣少年来历向南宫灵交换消息，并引楚留香夜赴丐帮香堂；一点红中途离去。
- chapter: 15
  title: 第十五回 情侣书信
  summary: 楚留香潜入丐帮外围，窥见南宫灵、白玉魔等在香堂逼问黑衣少年来意，黑衣少年软硬兼施拒不吐露。中原一点红破窗突入，与黑衣少年刀剑联手突围；楚留香假称五毒铜钹掷瓦制造混乱，三人脱身。一点红将黑衣少年赔给楚留香后离去。楚留香凭斗篷飞骆驼认出其乃沙漠之王子侄，双方互信后，黑衣少年转述其父念给他听的秋灵素求援书信内容，并说明沙漠之王入关后鸽书中断、临城鸽站人尽死，故怀疑与丐帮及老帮主任慈之死有关；楚留香约定去问南宫灵后再告知。
- chapter: 16
  title: 第十六回 妙僧无花
  summary: 楚留香依黑珍珠之约记下大明湖黑马接头之法后，回丐帮香堂与南宫灵、妙僧无花对饮。席间他试探称沙漠之王札木合已死并已藏尸，邀南宫灵助查真凶，并逼问任老帮主夫人下落；南宫灵答应酒后带路。楚留香取走无花腰间玉如意后赴大明湖见黑珍珠，嘱其勿跟踪以免惊走任夫人，并托两日后转告姓苏少女等候。随后南宫灵引楚留香至曲阜尼山，途中追忆任老帮主，章末将见任夫人。
- chapter: 17
  title: 第十七回 迎风一刀斩
  summary: 楚留香与南宫灵至断崖石梁，遇自称东瀛伊贺谷的天枫十四郎阻路。对方使死卷术、丹心术示威，并以迎风一刀斩与楚留香对峙；楚留香以轻功避必杀一刀反扑，却只抓到假发面具，天枫十四郎借空蝉术与丝线脱身。楚留香怀疑其并非真伊贺人且彼此相识。二人过梁至茅舍，南宫灵叩见，任夫人应声，楚留香得以拜见。
- chapter: 18
  title: 第十八回 颠倒众生
  summary: 楚留香与南宫灵拜会面蒙黑纱的任夫人（秋灵素）。任夫人承认认识西门千、左又铮、灵鹫子、札木合，但称是二十年前旧事，并否认写过求援信；谈及任老帮主火化遗骨与突死时，楚留香似有所悟。二人返回济南后，黑珍珠告称苏容容已在大明湖风雨亭被四名绿袍人以暗器杀死。楚留香悲愤至极，却在湖上遇柴衣笠帽“渔翁”，实为假死脱身的苏容容（苏蓉蓉）；对方说明四人自称朱砂帮弟子、伪称奉楚留香之命来接，她因识破而预作提防并佯装中暗器入湖。
- chapter: 19
  title: 第十九回 棋高一着
  summary: 苏蓉蓉向楚留香回报神水宫探查无果,司徒静身亡且无遗物;二人推断假扮天枫十四郎者杀害多人并盗走天一神水,秋灵素暗示任老帮主之死有疑。楚留香以臭棋支开无花、南宫灵,向黑珍珠借马赶赴尼山,发现秋灵素失踪,依乌簪指向寻至后山悬崖,见白玉魔以狼牙棒逼她跳崖。
- chapter: 20
  title: 第二十回 天枫十四郎
  summary: 楚留香悬崖救下秋灵素，奇招震飞白玉魔狼牙棒并放其逃生。秋灵素吐露：四封信出己手，实因南宫灵下毒架空任慈、软禁夫妇；南宫灵代送信并算准札木合等四人同时赴死，后因神秘人夜谈改夺财为夺命，又以神水宫盗出的天一神水毒杀任慈。南宫灵更泄其居处予白玉魔灭口，并曾命人扮天枫十四郎截杀楚留香。章末点出真有天枫十四郎其人，二十年前渡海以东瀛剑法约战任慈，于闽南边境被任慈所杀，仅司徒长老随行。
- chapter: 21
  title: 第二十一回 帮主夫人
  summary: 秋灵素向楚留香讲述天枫十四郎与任慈决斗之事：天枫十四郎已负重伤却只说「来吧」，被任慈竹节杖击中后当日不支而死，临终托付一事。秋灵素推断托付即南宫灵为其遗孤，任慈因歉疚终身容忍南宫灵，终为其所害。楚留香请秋灵素掀开面纱，见其脸已毁于石观音威逼下自淋烈性药水；秋灵素忆及毁容前请孙学圃画像、毁容后任慈日日陪伴感化，并言容貌被毁的二十年反是最幸福岁月。她称所知秘密已尽告，余谜有待楚留香发掘。
- chapter: 22
  title: 第二十二回 好友成仇
  summary: 秋灵素向楚留香吐露往事并在心事已了后坠崖自尽。楚留香于济南丐帮香堂与南宫灵对质其杀任慈等秘事；二人忆及泰山初识与船上旧谊后，南宫灵拒辞帮主与闭门思过。双方凌空交七掌分出高下，南宫灵以巨汉挟持中毒般木然的苏蓉蓉逼楚留香罢手。黑珍珠鞭缚巨汉、一点红剑光拦截，楚留香趁机将苏蓉蓉推开脱险。
- chapter: 23
  title: 第二十三回 兄杀其弟
  summary: 大汉被鞭勒断气后,南宫灵与一点红刀剑相拼,双方互伤难分胜负,一点红罢手离去并申明仍是楚留香之友。楚留香将穴伤未醒的苏蓉蓉托付黑珍珠,随南宫灵至大明湖画舫;酒中竟下有天一神水,南宫灵中毒身亡,临终透露主谋是其嫡亲哥哥却未及道出姓名,线索再断。
- chapter: 24
  title: 第二十四回 南下追凶
  summary: 楚留香推断天枫十四郎将小儿子托给任慈、大儿子托给更早交手的成名高手，并列出其名头、武功、性情、闽南等地线索。他告知赶来的黑珍珠其父已死、遗体在鲁东红石崖船上，称凶手就在画舫上后借马离去。南下闽南寻访无果，于仙游茶馆遇满天星钱麻子与夜游神冯天和，得知天峰大师接掌莆田少林约二十年且声名在任慈之上，遂断定其为托孤之人，并疑神秘凶手或其子、下一目标或是天峰；钱麻子托楚送茶。秃鹰吴老捕头现身，告以南宫灵死于济南大明湖且被分尸、丐帮欲寻凶手，楚留香称自己的确知道凶手是谁。
- chapter: 25
  title: 第二十五回 天峰大师
  summary: 楚留香约秃鹰三日后在莆田林家花园交凶,随即夜闯莆田少林寺求见天峰大师。寺僧以飞袖功与阵式拦截,他以绝顶轻功周旋并声东击西;灰眉监寺以百步神拳试探后得知其为盗帅,言及无花正为掌门烹茶。楚留香急闯后院喝止天峰饮茶,暗示无花茶中有天一神水,并代为烹茶。天峰大师应其所请,追述二十余年前天枫十四郎与李琦的海外姻缘,以及华山与黄山世家血战等往事。
- chapter: 26
  title: 第二十六回 法律庄严
  summary: 天峰大师向楚留香细述：李姑娘（李琦）疑自扶桑重返中土，杀华山四剑复仇后销声匿迹；天枫十四郎携两子来中土寻妻绝望，放火逼天峰比掌故意重伤，留书托孤，终死于任老帮主之手。无花与楚留香后山夜谈，承认自己是天枫十四郎长子、盗天一神水、石梁假扮其父、杀宋刚与素心大师、欲除楚留香与蓉儿并杀死南宫灵灭口。楚留香推断其父以秘笈传功并欲令两子接掌少林与丐帮以君临天下。二人交手，无花连换少林神拳、弹指神通、风萍掌与暗器皆败；无花拒逃认输。楚留香称只能揭穿秘密、无权制裁。章节题旨「法律庄严」。
- chapter: 27
  title: 第二十七回 自裁以谢
  summary: 楚留香与无花论及制裁与规矩，欲将无花交予代表法律之人；无花自裁，称不屑在卑贱者面前低头。楚留香至林家花园见名捕秃鹰与丐帮长老，只告凶手已死且拒言姓名与尸身，因无花之死伤心暴怒后离去，欲回船休息，却不知惊人变故已在等待。
