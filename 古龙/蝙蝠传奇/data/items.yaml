- id: item_bai_yi_shen_er
  name: 白衣神耳
  aliases: []
  types:
    - 其他
  description: 英万里以合金嵌入耳骨的传音装置，音波中被扯下，反使其更难抵挡。
- id: item_bang_zi
  name: 棒子
  aliases: []
  types:
    - 其他
    - 武器
  description: 岛奴黑暗中搜索用的细长棒，如昆虫触角当眼睛；在棉被上扫过仍未发现躲在被下的楚留香与东三娘。
- id: item_bao_fu
  name: 包袱
  aliases: []
  types:
    - 其他
  description: 金灵芝交给张三收着的一包东西，内有染血长衫。
- id: item_bi_shou
  name: 匕首
  aliases:
    - 宝刀
  types:
    - 武器
  description: 白猎靴筒中寒光四射的利器，称熊大将军所赐古物，可削金断玉、吹毛断发。
- id: item_bi_yan_hu
  name: 鼻烟壶
  aliases: []
  types:
    - 其他
  description: 东三娘执意找回之物；盖子跌开后有味道，楚留香凭嗅觉与鼻炎在黑暗中寻得并交还，令其重获尊严而落泪。
- id: item_chang_jian
  name: 长剑
  aliases: []
  types:
    - 武器
  description: 金灵芝制住胡铁花后抵住其咽喉的兵刃，后在船底破裂混乱中被楚留香夺下。
- id: item_chang_suo
  name: 长索
  aliases:
    - 绳索
  types:
    - 其他
  description: 黑衣人所带，结于船桅横空伸向黑暗，称为上蝙蝠岛的绳桥。
- id: item_chen_nian_da_qu
  name: 陈年大曲
  aliases:
    - 烈酒
  types:
    - 其他
  description: 被用来助燃、使火势猛烈的上好陈年大曲；原随云等待酒烧尽以便行动。
- id: item_du_yao
  name: 毒药
  aliases: []
  types:
    - 其他
  description: 蜀中唐门出品，魏行龙指王天寿买下欲于酒中害铁中棠并嫁祸唐大先生。
- id: item_duan_dao
  name: 短刀
  aliases: []
  types:
    - 武器
  description: 插在勾子长肩上的飞来之刃。
- id: item_duan_jian
  name: 短剑
  aliases: []
  types:
    - 武器
  description: 青衣少女高亚男腰边所佩,一闪间削去黑衣大汉耳朵。
- id: item_feng_wei_jian
  name: 凤尾箭
  aliases: []
  types:
    - 暗器
  description: 武维扬壶中所备箭矢，号称十三根百发百中；胡铁花据伤口臆断凶手用特大箭镞后拔箭灭迹以掩身份。
- id: item_gang_suo
  name: 钢索
  aliases: []
  types:
    - 其他
  description: 屏风岩石后悬吊滑车、通向黑黝山洞的钢索；楚留香曾以足尖勾住并借其摆荡横掠。
- id: item_gong_pin
  name: 贡品
  aliases: []
  types:
    - 其他
  description: 镇远将军自关外押解上京、准备进贡朝廷却失窃的一批东西。
- id: item_gua_pi_ting
  name: 瓜皮艇
  aliases: []
  types:
    - 其他
  description: 张三乘来的小艇，与怪客所乘船对照。
- id: item_guan_cai
  name: 棺材
  aliases: []
  types:
    - 其他
  description: 货舱油布下六口来路不明的棺材；海船本无棺材，被疑为死亡预告。
- id: item_guan_cai_gai
  name: 棺材盖
  aliases: []
  types:
    - 其他
  description: 既可遮烈日供人卧棺中歇息，又被楚留香用作划棺的桨。
- id: item_guan_gai
  name: 棺盖
  aliases: []
  types:
    - 其他
  description: null
- id: item_hei_jin
  name: 黑巾
  aliases: []
  types:
    - 其他
  description: 华真真与所抱之人蒙面所用，揭起后分别显露华真真与金灵芝。
- id: item_hei_pi_xiang
  name: 黑皮箱
  aliases: []
  types:
    - 其他
  description: 勾子长随身所携，席间垫在身下而坐，像是生怕被人抢走。
- id: item_hei_se_de_pi_xiang
  name: 黑色的皮箱
  aliases: []
  types:
    - 其他
  description: 勾子长始终紧提在手中的黑皮箱。
- id: item_hei_se_pi_xiang
  name: 黑色皮箱
  aliases:
    - 皮箱
  types:
    - 其他
  description: 勾子长所携三尺见方黑色重箱，放上船时船身摇动；自谓比性命还珍贵，绝不以世上黄金交换，并不肯轻易示人。
- id: item_hei_xiang_zi
  name: 黑箱子
  aliases: []
  types:
    - 其他
  description: 勾子长之物；胡铁花追问所装何物，勾称本空、火药乃丁枫圈套；英万里追问赃物下落时勾拒言。
- id: item_hu_pi_jiao_yi
  name: 虎皮交椅
  aliases: []
  types:
    - 其他
  description: 第三层石台中央蝙蝠公子发声处的座椅，火光大亮后其上已无人。
- id: item_hua_che
  name: 滑车
  aliases: []
  types:
    - 其他
  description: 众人潜入时所用；金姑娘故意不跳下，使滑车不致空车下滑以掩护同伴。
- id: item_huang_jin
  name: 黄金
  aliases: []
  types:
    - 其他
  description: 四箱黄金，由白蜡烛挑索过船送上紫鲸帮主船。
- id: item_huang_jing
  name: 黄经
  aliases: []
  types:
    - 其他
  description: 紫衣少女在枯梅大师身旁低诵的经卷。
- id: item_huo_zhe_zi
  name: 火折子
  aliases:
    - 火折
  types:
    - 其他
  description: 勾子长藏于袜筒，京城霹雳堂为皇宫所制，小巧防水；点亮后众人见东三娘无眼惨状，又佯称点不着以护其尊严。
- id: item_jian
  name: 箭
  aliases: []
  types:
    - 暗器
  description: null
- id: item_jian_pu
  name: 剑谱
  aliases:
    - 心法秘笈
  types:
    - 秘籍
  description: 清风十三式之剑谱与心法秘笈，由枯梅大师严密收藏；楚留香推断其已失窃，故有外人得传。
- id: item_jiang_rou
  name: 酱肉
  aliases: []
  types:
    - 其他
  description: 一大碟本供十人的酱肉，被白蜡烛眨眼吃光。
- id: item_jin_zhen
  name: 金针
  aliases: []
  types:
    - 暗器
  description: 被归为暗器一类，言女子比男子更擅。
- id: item_jiu_hu
  name: 酒壶
  aliases: []
  types:
    - 其他
  description: 肚大身圆如酒坛，白蜡烛曾一口气喝下大半壶乃至整壶。
- id: item_la_wan
  name: 蜡丸
  aliases: []
  types:
    - 其他
  description: 云从龙临终酒杯中所藏之物，内有画着蝙蝠、流水、礁石与发光圆圈的图，被慎重交托给楚留香。
- id: item_liu_kou_guan_cai
  name: 六口棺材
  aliases: []
  types:
    - 其他
  description: 船上已有的多口棺材；张三怀疑或由海阔天自己送上，楚留香亦觉外人难以神不知鬼不觉运上船，并忧凶手不填满棺材不会住手。
- id: item_long_tou_guai_zhang
  name: 龙头拐杖
  aliases: []
  types:
    - 其他
  description: 枯梅大师右手所扶拐杖,一点便将黑衣大汉点飞十余丈落江。
- id: item_mi_ji
  name: 秘笈
  aliases: []
  types:
    - 秘籍
  description: 华仙子所留，记其毕生武功心法，后由华真真获得并负监察掌门之任。
- id: item_mian_bei
  name: 棉被
  aliases: []
  types:
    - 其他
  description: 楚留香与东三娘分拉四角拉直，使棒搜误以为床空，实则二人躺在被下。
- id: item_mian_ju
  name: 面具
  aliases: []
  types:
    - 其他
  description: 纸板糊成，被胡铁花从袭击者脸上抓下捏碎。
- id: item_ming_ce
  name: 名册
  aliases: []
  types:
    - 其他
  description: 水手名册，藏在金灵芝舱房衣柜中。
- id: item_mu_jiang
  name: 木桨
  aliases: []
  types:
    - 其他
  description: 白蜡烛用以将四口箱子系在两头肩担过索。
- id: item_na_zhang_tu
  name: 那张图
  aliases: []
  types:
    - 其他
  description: null
- id: item_ruan_jian
  name: 软剑
  aliases: []
  types:
    - 武器
  description: 上好缅铁所打,薄而细,平时藏于腰带,迎风一抖伸直。
- id: item_sheng_zi
  name: 绳子
  aliases: []
  types:
    - 其他
  description: 楚留香自棺中取出的几捆绳子，用以将六口棺材捆成一体防失散。
- id: item_tan_xiang_mu_xia
  name: 檀香木匣
  aliases: []
  types:
    - 其他
  description: 海阔天自怀中取出，欲托付楚留香，因门外敲门又藏回。
- id: item_tao_qing_jiu
  name: 逃情酒
  aliases: []
  types:
    - 丹药
  description: 服后进入假死状态的奇药酒，传说由风流才子所制。
- id: item_tian_yi_shen_shui
  name: 天一神水
  aliases: []
  types:
    - 其他
  description: 神水宫重宝，本由水母门下保管，曾为无花盗取；本回用作与清风十三式剑谱失窃案的对比。
- id: item_tie_bian_fu
  name: 铁蝙蝠
  aliases:
    - 铁铸的蝙蝠
  types:
    - 其他
  description: 钉在石壁上的铁铸蝙蝠，带起风声把追击者引到角落，掩护原随云脱身。
- id: item_tie_mao
  name: 铁锚
  aliases:
    - 小铁锚
  types:
    - 其他
  description: 系于长索绳头，钉入大船船头；后被白蜡烛拔出用以扯起小船。
- id: item_tong_guan
  name: 铜管
  aliases: []
  types:
    - 其他
  description: 英万里耳聋前自其中辨出原随云的声音，成为揭穿蝙蝠公子身份的关键线索。
- id: item_wu_si
  name: 乌丝
  aliases: []
  types:
    - 暗器
  description: 假东三娘与高亚男同时挥出的密集致命暗器，密如暴雨。
- id: item_xi_fang_pu_kou
  name: 西方扑蔻
  aliases: []
  types:
    - 丹药
  description: 三种奇药之一，由基度山小岛传来，可使人机能停顿如冬眠。
- id: item_xiang_zi
  name: 箱子
  aliases: []
  types:
    - 其他
  description: 勾子长时刻不离的黑色重箱，双锁精巧，实藏爆炸机关，开锁后炸破船舱。
- id: item_xiao_hun_suo
  name: 销魂索
  aliases: []
  types:
    - 武器
  description: 张碧奇自创自名的兵刃，实为长达三丈的绳子，昔年站于三丈外与轩辕野缠斗以消耗其内力。
- id: item_xiao_ting
  name: 小艇
  aliases: []
  types:
    - 其他
  description: 甲板危急救生小艇，丁枫逃走前已带走，使众人无艇可逃。
- id: item_xue_yi
  name: 血衣
  aliases:
    - 长衫
  types:
    - 其他
  description: 淡青色染血长衫，胡铁花指认为丁枫接枯梅大师时所穿。
- id: item_yao_dai
  name: 腰带
  aliases: []
  types:
    - 其他
  description: null
- id: item_yao_pai
  name: 腰牌
  aliases: []
  types:
    - 其他
  description: 蝙蝠岛巡逻凭证；丁枫下令遇见未带腰牌者格杀勿论。
- id: item_yi_shu
  name: 遗书
  aliases: []
  types:
    - 其他
  description: null
- id: item_yin_tong
  name: 银筒
  aliases: []
  types:
    - 其他
  description: 特制银质听筒，水中人套于耳上伸出水面窃听；本回被楚留香整罐醋灌入，窃听者久不得闻。
- id: item_you_bu
  name: 油布
  aliases: []
  types:
    - 其他
  description: 货舱中覆盖六口棺材的油布。
- id: item_yu_dai
  name: 玉带
  aliases: []
  types:
    - 饰品
    - 暗器
  description: 海阔天束腰之带，中空可藏珠；内藏数十点带剧毒寒星暗器，号称玉带藏针，二十年来屡救其命，制造匠人已被其灭口；本回被楚留香扳断取出珍珠。
- id: item_yu_pan_tao
  name: 玉蟠桃
  aliases:
    - 桃子
  types:
    - 丹药
  description: 传为西天王母蟠桃园仙种，极乐宫所珍，十三年结实七枚；少年食之养气驻颜，老人食之延年益寿；金灵芝逼楚留香去取四五个为祖母八旬寿礼。
- id: item_zhen_zhu
  name: 珍珠
  aliases: []
  types:
    - 饰品
  description: 龙眼般大小，张三指认为自己所偷金灵芝之物，被楚留香自王得志衣襟取出；胡铁花又称其曾出现在李得标尸体上。
- id: item_zhi_mei_zi
  name: 纸媒子
  aliases: []
  types:
    - 其他
  description: 点水烟用引火物，上岸前连同可点火之物全被搜走。
- id: item_zi_jin_dai
  name: 紫金带
  aliases: []
  types:
    - 饰品
  description: 金灵芝腰间束带,内藏软剑,抽时可出鞘。
- id: item_zi_jin_guan
  name: 紫金冠
  aliases: []
  types:
    - 饰品
  description: 金灵芝头上所戴,原镶大珍珠后被张三盗去。
