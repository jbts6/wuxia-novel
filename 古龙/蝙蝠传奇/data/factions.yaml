    - 门派
  description: 淮西门派，享名武林垂七十年；王天寿曾为第一高手并传位侄子王维杰。
- id: faction_zhong_yuan_peng_jia
  name: 中原彭家
  aliases: []
  types:
    - 家族
  description: 原随云自述"五虎断门刀"所属家族。
- id: faction_zi_jing_bang
  name: 紫鲸帮
  aliases: []
  types:
    - 帮会
  description: 海阔天属下所在帮会，船上水手训练有素，骤经大变仍不慌不乱。
