  description: 与秘笈大手印相关的教派势力，其秘笈在第一次拍卖中售出。
- id: faction_ji_le_gong
  name: 极乐宫
  aliases: []
  types:
    - 其他
  description: 位于西方星宿海，昔为离愁宫，张碧奇夫妇夺得后所居；内有十三年一结的玉蟠桃，防守森严，数十年来打主意者鲜有生还。
- id: faction_jia_he_gu
  name: 甲贺谷
  aliases: []
