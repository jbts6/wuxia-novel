  description: 海上秘密交易之地，主人邀人竞价购买重大秘密，并有迎客与追回所售剑法等手段。
- id: faction_hua_shan
  name: 华山
  aliases: []
  types:
    - 门派
  description: 门下有人曾以清风十三式欺负金灵芝，促使她购得该剑法心法报复。
