- id: faction_guan_zhong_yuan_shi
  name: 关中原氏
  aliases: []
  types:
    - 世家
  description: 关中世家，声望本隆，与无争山庄渊源有自。
- id: faction_hai_bang
  name: 海帮
  aliases: []
  types:
    - 帮会
  description: null
