- chapter: 1
  title: 第一回 燃烧的大江
  summary: 华山枯梅大师蓄发俗装,携高亚男等乘江船冒蓝太夫人之名赴约;楚留香与胡铁花跟踪时,黑衣人丁枫迎驾扬帆,大船突沉,江面黑油起火,二人跳水逃生。事后于逍遥池巧遇快网张三,金灵芝为追被盗珍珠闯入男堂,使出峨嵋柳絮剑法与华山清风十三式对战胡铁花。
- chapter: 2
  title: 第二回 玉带中的秘密
  summary: 澡堂中金灵芝连使清风徐来、清风拂柳，楚留香扣其脉门追问剑法来历，金灵芝矢口否认。楚留香指紫袍大汉为窝主，逼其解下玉带，扳出毒针暗器并滚出龙眼大珍珠；胡铁花一拳击退该汉。丁枫突至，双手夹剑，谎称其为峨嵋柳絮飞雪，为紫袍大汉解围并邀三和楼。事后海阔天自承忌惮者为楚留香。楚胡梳理七怪事，断定清风十三式心法秘笈失窃，金灵芝或自丁枫购得，幕后尚有出售秘密的大蛇。江岸会勾子长，张三烤鱼；楚留香以醋灌银筒破水中窃听，又闻凤尾帮骑手言帮主在船，旋见空马血鞍返回，勾子长与胡铁花跃马察看，推断骑手已遭毒手。
- chapter: 3
  title: 第三回 推 测
  summary: 胡铁花沿岸寻尸不获折返，见楚留香、勾子长、张三已自江中捞起两骑士尸体；勾子长赞香帅敏锐后见火光匆匆离去。众人据左肋箭伤与马匹折返等迹象争论，胡铁花断为武维扬凤尾箭所为，楚留香以面对方位、灭迹不周、空马回奔等反证凶手另有其人，并推测武维扬或已死、真凶欲借此证明其尚活。张三邀食烤鱼时船舱现金灵芝，她以伤腿眼泪骗近胡铁花，北派鸳鸯腿制住并以长剑逼楚留香去取极乐宫玉蟠桃为祖母寿礼；楚留香详述张碧奇夫妇以销魂索等计夺离愁宫掌故拖住她，张三破船底钻出反制夺势，金灵芝被托出船舱逃走。事后三人推断金灵芝或受丁枫指使，图借刀杀人并调虎离山。
- chapter: 4
  title: 第四回 心怀鬼胎
  summary: 海阔天在三和楼阁楼设宴，胡铁花与楚留香赴席，见金灵芝已易装端坐上座，旁为本以为已死的凤尾帮总瓢把子武维扬，以及勾子长、丁枫、海上孤鹰向天飞等人。席间胡铁花点破丁枫姓名令其失色，勾子长与向天飞为轻功言语相激，丁枫又暗中挑拨；最后神龙帮帮主云从龙匆匆赶到，却一反平日八面玲珑，铁青着脸似有重大变故。
- chapter: 5
  title: 第五回 死 客 人
  summary: 海阔天宴请江湖诸人,云从龙却携两具凤尾帮弟子尸首入席,指控武维扬以凤尾箭杀害其卧底。两人出外动手后云从龙惨死;其遗书竟将神龙帮主之位传予武维扬。孙老二抗命被夏奇峰所杀,夏奇峰跪拜新帮主。众人转赴紫鲸帮主座船续饮,金灵芝与胡铁花约拼酒;张三以卖身葬友被金灵芝买下,江上神秘买家竞价并言及海上销金窟,丁枫称曾去过并邀同行。
- chapter: 6
  title: 第六回 白 蜡 烛
  summary: 公孙劫余与徒弟白蜡烛携四箱黄金以长索登紫鲸帮主海阔天座船；白蜡烛走索挑金、托船显露深不可测武功，向天飞被其震慑后不再下舱。众人安顿舱房后，海阔天引楚留香、胡铁花、张三至货舱，揭出六口来路不明的棺材，并分析云从龙死于武维扬之怪，疑公孙师徒身份与船上杀机。海阔天欲以檀香木匣相托，门外王得志、李得标已成死尸。
- chapter: 7
  title: 第七回 死神的影子
  summary: 王得志、李得标后心现淡红掌印，疑为失传已久的朱砂掌所杀；楚留香自王得志衣襟取出金灵芝的珍珠。船尾向天飞遭暗刺惨呼落水，尸身未获。丁枫与勾子长互相指摘，楚留香以溅血与衣履排除勾子长。回舱后三人剖析海阔天、金灵芝、丁枫、公孙劫余、钱风、鲁长吉等皆有嫌疑，楚留香出示云从龙所托蜡丸中的蝙蝠图，并料凶手不填满棺材不会住手。
- chapter: 8
  title: 第八回 谁是凶手
  summary: 金灵芝将一包刚捡的东西交张三收着后回房。丁枫夜探欲访楚留香，勾子长提黑皮箱出现并挤回房，令胡铁花、张三怀疑其早识公孙劫余与白蜡烛。胡铁花抢开包袱，见淡青染血长衫，认出是丁枫接枯梅大师所穿，众人争论是丁枫杀向天飞、金灵芝栽赃，或他人故意放衣给她发现；张三更指勾子长同屋最易偷衣。胡铁花终不敢问金灵芝。睡后被隔壁公孙劫余敲壁约楚留香，才发现楚、张已走；勾子长称见二人上甲板。胡铁花逼问下，勾子长自称熊大将军贴身卫士，密查开封镇远将军被杀、贡品失踪、随行尽灭一案，据侍妾所闻一老一少欲逃海外销金窟，故盯上公孙劫余与白蜡烛，并嘱暂勿轻动。
- chapter: 9
  title: 第九回 朱砂掌印
  summary: 薄暮海上,丁枫急报海帮主失踪,最后目击者钱风称其午时在船头念叨向二爷。众人往底舱寻钱风,发现他已死,前胸有淡红左手朱砂掌印;膳房六名水手同样被朱砂掌灭口。嫌疑在半个时辰内指向船上众人,公孙劫余师徒与勾子长互咬。楚留香以包袱试探,使丁枫自承本善用左手,并认出包中血衣是自己的,却称遭人嫁祸。勾子长被迫敬酒后丁枫中毒身亡,临终托楚留香归葬骸骨;楚留香指出毒在酒杯内壁而非酒中。张三以血衣覆面,船上十人已死其三,凶手仍未明。
- chapter: 10
  title: 第十回 第八个人
  summary: 丁枫死后，楚留香与张三仍觉动机难圆。公孙劫余欲揭身份时勾子长肩中短刀，白蜡烛因守护金灵芝得免嫌疑，船上似有"第八个人"。分头召集水手时底舱与甲板水手尽遭朱砂掌杀害，勾子长失踪。胡铁花指公孙劫余为京城大盗，对方卸下假发假耳自承神鹰英万里，并指白蜡烛实为白猎；二人凭过耳不忘认出勾子长。金灵芝醒来认领珍珠。楚留香找出舱房翻板秘道通货舱，空棺显示丁枫以奇药诈死"复活"，第八人实为诈死的丁枫。
- chapter: 11
  title: 第十一回 凶 手
  summary: 众人揭开六口棺材，见内书楚留香、胡铁花、金灵芝、英万里、白猎、张三之名。楚留香梳理海上销金窟售密、勾子长泄底与丁枫摆棺攻心、诈死退路及破水弃艇困船之计。勾子长遗留的黑色双锁重箱被以白猎匕首隔空削开后爆炸，船舱进水将沉；众人抬六棺下海为筏，用绳捆牢、棺盖遮日并作桨，分两班向东南划行，以求遇见小岛或通商海船。
- chapter: 12
  title: 第十二回 棺材里的灵机
  summary: 众人驾六口棺材漂海，酷热难耐。楚留香在棺中理清线索：丁枫已杀武维扬并以易容假冒者接掌凤尾、神龙两帮船只，再杀海阔天夺紫鲸帮；云从龙曾以「骨鲠在喉」「鱼目混珠」暗示假武维扬。金灵芝点明图上蝙蝠指蝙蝠岛与销金窟，但航程尚需七八日且缺水；风雨将至，白猎欲投海被楚留香拦住，海面忽现灯光。
- chapter: 13
  title: 第十三回 海上明灯
  summary: 楚留香一行在海上划向灯光，登上举止斯文的大船，受到少年船主原随云以礼相待。原随云凭足音与气度认出楚留香、胡铁花，自报为关中无争山庄少庄主、原东园之子；众人惊悉其自幼失明却耳力过人。席间英万里仍化名公孙劫余，与原随云互探；原随云承认此行亦赴号称海上销金窟的蝙蝠岛，并允同行。张三怀疑其过分热诚及四间内拴舱房，与胡铁花争执；楚留香劝宜小心。夜半胡铁花难眠上甲板，遇金灵芝独泣，两人饮酒互诉寂寞并生情愫，却被门后白皙纤手女子冷嘲打断；人影倏忽不见，胡铁花似曾相识却未认清，金灵芝负气下舱。
- chapter: 14
  title: 第十四回 人 鱼
  summary: 胡铁花告知楚留香昨夜撞见高亚男，推断枯梅大师亦以蓝太夫人身份藏于船上。席间金灵芝故意亲近白猎以气胡铁花。原随云请张三快网捕鱼，第一网却捞起四个赤裸"人鱼"；众人请蓝太夫人施救，高亚男现身应允。舱中突生变故：人鱼杀死枯梅大师，枯梅临死以摘心手反杀四人；高亚男狂攻原随云被长袖震晕。众人分析其人鱼实为善久潜水之采珠女，整局计划周密，动机成谜。
- chapter: 15
  title: 第十五回 虚 惊
  summary: 枯梅大师水葬后，楚留香等夜谈断定采珠女非主谋，凶手知蓝太夫人即枯梅，为防清风十三式秘密被揭而先杀之，并可能待众人入蝙蝠岛再下手。胡铁花赴约误将甲板高亚男认作金灵芝，又因落水惊呼起疑，撞开金灵芝房门却见她未赴约，羞愧后与高亚男和解。巨震船触礁漏水，舵手失踪；楚留香见礁石上长腿轻功人影（疑勾子长），原随云探得前方陆地有人。黑衣蒙面女接应，确认此地即蝙蝠岛，以长索为桥通往岛主处，另路待天明。原随云、高亚男、华真真上桥；楚留香、胡铁花、张三与金灵芝拟走另一条路，金灵芝仍拒言岛上秘密。
- chapter: 16
  title: 第十六回 船舱中的蝙蝠
  summary: 曙色中胡铁花、楚留香、张三望见蝙蝠岛只是光秃石山,船上众人似已失踪。张三以盐戏谑后提出岛人当居于石山秘窟。金灵芝告知英万里已在接原随云时离船追踪;众人寻白猎时,在锁着的枯梅大师遇难舱中惊出带血蝙蝠,发现白猎亦死于摘心手。胡铁花误指金灵芝为凶手,经楚留香以尸僵与甲板在场时间驳回后道歉和好。众人推断会使摘心手者仅余高亚男、华真真,对华真真有所怀疑却无定论。水手亦尽失,金灵芝畏惧岛中伸手不见五指之黑暗,张三悟出蝙蝠岛意谓盲者之岛。
- chapter: 17
  title: 第十七回 人间地狱
  summary: 胡铁花、张三、金灵芝与楚留香抵达寸草不生的险恶孤岛。金灵芝称岛主即神秘的蝙蝠公子，到岛者皆盲。众人沿钢索滑车潜入，约数到五十后跳下；胡铁花、张三落入陷阱被关入牢狱，并遇见负伤的勾子长。楚留香于坠落瞬间勾住钢索，以轻功横掠山壁、凭壁虎功潜入底层，结识自称东三娘的可怜女子。东三娘引导他前往牢狱救友，途中因门内男人以鼻烟壶凌辱女伴，东三娘愤然扑击，惊动巡逻者，危机骤起。
- chapter: 18
  title: 第十八回 地狱中的温情
  summary: 楚留香在蝙蝠岛地狱区击倒岛奴、一招制服赵刚并告诫其尊重女囚；陪东三娘凭气味找回鼻烟壶，又以拉直棉被瞒过棒搜，趁丁枫下令撤退时脱身。丁枫认出其为不杀人的盗帅楚留香，加严巡逻。楚留香再入石牢救出胡铁花、张三，并带东三娘相会；众人推断金姑娘故意留在滑车成全同伴，又见勾子长重伤。门外鬼声锁石门将他们活埋；点火后见东三娘无眼，众人佯称火不燃以护其尊严，石牢中涌起温情。张三、胡铁花发现英万里断手塞口之酷刑，英称上岸遭高功蒙面女子所袭且非蝙蝠公子。高亚男带伤闯入，指华真真为内奸：盗清风十三式、杀白猎、勾结蝙蝠岛，实为辣手仙子华飞凤后人。勾子长称黑箱本空。门外冷声宣告众人已难活命。
- chapter: 19
  title: 第十九回 蝙蝠公子
  summary: 石狱中楚留香等七人遭蝙蝠公子铜管传音与音波袭击；楚留香借震力与真力震开石门。众人分路逃离时，胡铁花、高亚男见鬼火大书“我是凶手”并遭点穴，楚留香则遇上比石观音等人更可怕、满含同归于尽之意的对手。第三层蝙蝠公子与朱先生等以“女鬼索命”煽动恐惧，丁枫回报目标与巡逻皆失后宣布第二次拍卖，公开贩卖勾子长、英万里与胡铁花。楚留香现身以自身换友，蝙蝠公子却索其双眼；酒香与火光骤起，黑衣人如扑火蝙蝠般溃乱，虎皮交椅上空无一人。原随云制住“遍地洒金钱”钱老三，楚留香揭破其即临城血案凶手，并指出拍卖实为搜集把柄、实现称霸江湖野心之局，请在场群豪允他独自与蝙蝠公子决战。
- chapter: 20
  title: 第二十回 决 战
  summary: 楚留香反客为主，揭穿原随云即盲眼蝙蝠公子：英万里聋前吼出的"原"字与铜管声已泄漏真相。原随云坦然承认，原只要楚留香双目、现则要命；双方礼让欲决战，胡铁花因被出卖抢先出手却难沾衣袂。原随云罗列三十余种武功并扬言杀尽知情者；第二层石台火圈围住黑衣人，七八十人无声倒地。他道破是放火者点穴，助燃物为陈年大曲，并等酒尽。火弱时众人围攻，他以长袖生风灭火遁入黑暗，用壁上铁蝙蝠声东击西脱身。火折再现，点火与点穴者实为黑衣蒙面的金灵芝。楚留香命张三等护送金灵芝、英万里、勾子长、丁枫撤出死地，自己留下寻粮水并追踪原随云。
- chapter: 21
  title: 第二十一回 文无第二,武无第一
  summary: 众人出洞见光，张三点破黑巾女子是东三娘，胡铁花自责后冲回洞中助楚留香。高亚男与张三否定华真真、金灵芝为点火者。群豪中高亚男识破鹰爪门王天寿与紫面煞神魏行龙；魏行龙当众指认王天寿买唐门毒药欲害铁血大旗门铁中棠，二人动手，钱不赚、钱不要介入，杨标、单鹗等亦卷入混战。张三与高亚男推测王天寿所喊「龙抬头」及原随云的互相牵制安排。
- chapter: 22
  title: 第二十二回 又入地狱
  summary: 胡铁花二入山窟，与咳嗽鬼魅交手不敌，撞上楚留香后发现对手已失踪；远处火光闪动令他误认并打空，左腕脱臼，方知携火折子脱身的是蝙蝠岛主原随云。华真真黑衣蒙面抱回受伤昏迷的金灵芝。出窟见英万里死抓勾子长、张三气绝，假死的“东三娘”与高亚男突以乌丝突袭，楚留香撞开胡铁花、华真真击倒假东三娘，高亚男痛哭。揭面后黑衣人即华真真；假东三娘实为枯梅大师，全案主谋，疑亦是蝙蝠岛真正主使人。
- chapter: 23
  title: 第二十三回 希望永在人间
  summary: 胡铁花顿悟船上惊呼与"看不见"凶手之谜：枯梅大师用药诈死自水中复活，高亚男协助转移注意并挟制金灵芝。原随云现身礁石，楚留香拆穿其与枯梅利用死人行凶、栽赃华真真并挑拨火并的计划，指出高亚男以碧磷在其背上印下"我是凶手"。华真真得华琼凤秘笈，武功反高于枯梅并传其摘心手，负监察掌门之责；清风十三式实为枯梅监守自盗。原随云称金灵芝爱的是他；金灵芝扑入其怀双双坠海，枯梅圆寂。高亚男承认张三未死只被点穴，并点明华真真须接掌华山、与楚留香面临别离。众人乘船离岛，希望永在人间。
