- chapter: 1
  title: 第一回 七个瞎子
  summary: 风四娘在乱石山洗澡时遭七个瞎子闯入，瞎子以写有"必杀萧十一郎"的折扇相逼要带她走， 并出示关中群盗总瓢把子花平被斩之断手相胁。跛子带路，花如玉派丫鬟心心送衣， 残废怪物"人上人"以四五丈长鞭制服心心，并自述曾自断四肢。
  source_refs:
    - text: 七柄扇子上,都写着同样的六个字:'必杀萧十一郎!'
      chapter: 1
    - text: 这个人才是个真正的怪物,怪物中的怪物。
      chapter: 1
- chapter: 2
  title: 第二回 怪物中的怪物
  summary: 人上人逼风四娘脱衣，侠盗厉青锋以银丸破鞭相救并与人上人激战；风四娘脱身遇金菩萨， 得知萧十一郎未死且得宝藏与割鹿刀，七瞎子中含昆仑四剑与点苍掌门谢天石； 风四娘因花如玉衣毒假死，厉青锋与人上人寻至，人上人指认衣毒出自花如玉。
  source_refs:
    - text: 弓弦一响,两道银光闪电般飞来,打在鞭子上。
      chapter: 2
    - text: 花如玉碰过的东西就有毒,我们不要。
      chapter: 2
- chapter: 3
  title: 第三回 怜香惜玉的花如玉
  summary: 花如玉将风四娘"尸体"收回并救醒，谎称二人已于端午节成亲、风四娘是其妻子； 设宴洞房后风四娘出手攻击却被花如玉轻易制住并以脱衣相逼，暴露其对风四娘另有图谋。
  source_refs:
    - text: 其实我自从跟你成亲之后,就再也没有看过别的女人了
      chapter: 3
    - text: 花如玉看着她,眼睛里充满了赞赏之意,微笑着道:'你紧张什么?'
      chapter: 3
- chapter: 4
  title: 第四回 寸步不离
  summary: 花如玉向风四娘坦白自己实为女子，称娶她只为阻止其嫁给萧十一郎（因怜惜沈璧君）； 二人赴花平（实为花如玉幕后操纵）所设快聚堂宴，沈璧君在逍遥侯门下朱衣、绿袍两老者 （"两大钩子"）陪同下到场，风四娘借小木屋之机欲向沈璧君示警。
  source_refs:
    - text: 我是个女人,你为什么反而气成这样子
      chapter: 4
    - text: 这就是武林中第一美人沈璧君。
      chapter: 4
- chapter: 5
  title: 第五回 会走路的屋子
  summary: 风四娘将沈璧君诱入花如玉预设的"会走路的屋子"（钢板木笼马车），二人被囚车运往花如玉处并醉倒三日； 到家后花如玉突称自己实为男子，沈璧君以沈家金针袭击被其化解，花如玉称萧十一郎给他戴了绿帽子，意图一并占有二女。
  source_refs:
    - text: 这屋子竟在动...这屋子竟好像自己会走路。
      chapter: 5
    - text: 花如玉竟真的是个男人
      chapter: 5
- chapter: 6
  title: 第六回 萧十一郎在哪里?
  summary: 花如玉将制住穴道、蒙面的风四娘与沈璧君带至姑苏大亨楼（牡丹楼），欲证明萧十一郎抢走了他的未婚妻冰冰。萧十一郎乘八马黑车携冰冰盛装登场，仗势强横，为讨冰冰欢心向柳苏州强索翠玉耳环，并以指弹断保镖高刚的长剑，震慑满楼。沈璧君目睹一切，心碎不已。
  source_refs:
    - text: 萧十一郎却连动也没有动,只不过伸出手,在剑脊上轻轻一弹。
      chapter: 6
- chapter: 7
  title: 第七回 伯仲双侠
  summary: 柳苏州被迫以一万六千两将翠玉耳环让给萧十一郎，萧却随手抛窗，冰冰亦生厌弃。冰冰出言挑衅伯仲双侠，萧十一郎强令欧阳兄弟自挖双眼，并以割鹿刀在三招之内将二人击倒重伤。角落中蒙面沈璧君终出声阻止这场惨剧。
  source_refs:
    - text: 萧十一郎一共只用了三招。
      chapter: 7
- chapter: 8
  title: 第八回 爱是给予
  summary: 蒙面沈璧君出声阻止欧阳兄弟自挖双眼，冰冰欲揭开其面纱，沈璧君坚拒并否认自己就是沈璧君。花如玉趁机挽沈璧君离去，风四娘亦被架走。萧十一郎与冰冰饮酒，冰冰以"女神童"的细心推断那蒙面流泪的妇人是被制住穴道的风四娘，劝萧去追沈璧君。
  source_refs:
    - text: 冰冰道:"我本来就是个女神童。"
      chapter: 8
- chapter: 9
  title: 第九回 牡丹楼风波
  summary: 萧十一郎与冰冰向吕、牛两位掌柜打探沈璧君下落，得知她们包下连云栈东跨院、连来三夜。花如玉佯醉骗过二人，与心心密谋将风四娘卖予有钱老色鬼。萧从床底捡到风四娘的乌木簪，识破风四娘曾被藏于床下，遂与冰冰追往对面跨院。
  source_refs:
    - text: 她过去捡了起来,才看出那只不过是根女人用的,已经很陈旧的乌木簪。
      chapter: 9
- chapter: 10
  title: 第十回 割 鹿 刀
  summary: 萧十一郎冲入西跨院救出被制穴道的风四娘，与心心、王万成（即轩辕三成）对峙。牛掌柜、吕掌柜突施暗器围攻，萧以割鹿刀尽数削断，但吕以刀挟持冰冰；冰冰反手割下吕掌柜耳朵，展露高手身手。花如玉归来点破王万成即是轩辕三成，并细数十大恶人旧事。
  source_refs:
    - text: 这个人就是王万成,王万成就是轩辕三成。
      chapter: 10
- chapter: 11
  title: 第十一回 久别重逢
  summary: 萧十一郎在梧桐下与轩辕三成交手,以割鹿刀一刀将其击败,轩辕三成佯败借伤遁走。花如玉点破轩辕故意输招的算计,并披露其嗜瓷杀胡三爷满门的往事。萧十一郎解开风四娘穴道,久别重逢间风四娘掌掴萧十一郎并追问其逼人挖眼之举;最终冰冰自陈身世,竟是逍遥侯(哥舒天)的嫡亲妹妹,并讲述萧十一郎与逍遥侯决战、被她悬崖呼名所救的往事。
  source_refs:
    - text: 冰冰道:'因为我是他的妹妹。'
      chapter: 11
- chapter: 12
  title: 第十二回 嫡亲兄妹
  summary: 冰冰自述身世:她是逍遥侯嫡亲妹妹,因正常人体貌遭哥哥嫉妒,被推下杀人崖,靠织锦缎裙兜风与峭壁小树幸存,在谷底以死者兵器挖洞栖身两月余,最终呼喊哥哥名字令其误认冤魂而跳崖,被萧十一郎救起。她揭露当年在秘密洞穴所见蒙脸者皆为武林大侠(含点苍掌门谢天石、伯仲双侠欧阳兄弟),皆已成逍遥侯党羽;逍遥侯死后其组织未瓦解,另有深不可测者接替。风四娘得知萧为保护中毒仅余数年寿命的冰冰而百般迁就,并自白沈璧君实为为萧而来;白老三(花如玉车夫)救走沈璧君。
  source_refs:
    - text: 冰冰道:'因为我是他的妹妹,把我推—F去的。'
      chapter: 12
- chapter: 13
  title: 第十三回 七 杀 阵
  summary: 萧十一郎与风四娘面摊夜谈时,七名蒙眼黑衣瞎子(为首为点苍掌门谢天石)围杀而来,扇书"必杀萧十一郎"。卖面独眼跛足老人抚琴以"天昏地暗七杀大阵"操控七人,明杖织网逼压并喷毒烟令风四娘昏迷。萧十一郎破阵断杖,认出老人乃轩辕三缺(轩辕三成之兄、残废者帮派总瓢把子),留血而退。回宅后发现冰冰被劫、解药被窃,轩辕三成登门假意救人,趁机制住冰冰、带走风四娘,萧十一郎无奈交人后苦思追查之策。
  source_refs:
    - text: 轩辕三缺纵声大笑:'想不到你非但能破了我的'天昏地暗,七杀大阵',还能认得出我来。'
      chapter: 13
- chapter: 14
  title: 第十四回 造化捉弄人
  summary: 萧十一郎为寻吕掌柜,假扮伙计骗开吕家大门,尾随吕妻与牛妻出城,却识破"调虎离山"之计,返城于吕宅厨房柴堆下发现地道,救出昏迷的风四娘并擒获轩辕三成。轩辕三成坦言已将冰冰卖给花如玉,萧将其放走。风四娘解毒后二人于小客栈发生云雨之情,次日风四娘只当是梦不提。二人上大亨楼,利通号阎实送来解银票,萧提取十五万两,并自称不知银子来历。
  source_refs:
    - text: 萧十一郎抽刀,劈门,一脚踢开,就看见了轩辕三成。
      chapter: 14
- chapter: 15
  title: 第十五回 债主出现
  summary: 杨开泰携六十万两银票前来,实为利源、利通两家钱庄主人,借结清账目逼萧十一郎决斗,以泄风四娘被夺之恨。街心交手中萧因不愿胜也不愿败而渐落下风,人上人以长鞭、轩辕三缺以暗语介入;轩辕三成现身激萧拔刀,萧以"不杀君子只杀小人"之志、自削腿肉清醒,逼退轩辕三成。风四娘点破萧故意求败以还债,并劝其先还沈璧君之债。萧终悟银子乃逍遥侯继任者所赠,用以转移江湖视线,二人决意同去寻找沈璧君与冰冰。
  source_refs:
    - text: 杨开泰板着脸道:'这两家钱庄都是我的,从今以后,我不想跟你这种人有任何来往。'
      chapter: 15
- chapter: 16
  title: 第十六回 无垢山庄的变化
  summary: 沈璧君被车夫白老三救出并送至无垢山庄外，惊觉无垢山庄已易主归萧十一郎，而连城璧沦落为偷画的小贼。萧十一郎现身欲挽留，沈璧君却拉住连城璧一同离去。随后萧十二郎奉鱼吃人之命送来白色请柬，署名鱼吃人、金菩萨、花如玉、厉青锋、轩辕三缺、轩辕三成、人上人七人，约萧十一郎赴船上一会，萧十一郎决意前往。
  source_refs:
    - text: 萧十一郎道：“无垢山庄现在也已是我的。”
      chapter: 16
    - text: 萧十一郎道：“第一个人是鱼吃人。”
      chapter: 16
- chapter: 17
  title: 第十七回 红樱绿柳
  summary: 萧十二郎离去后，红袍李红樱与绿袍杨绿柳（红樱绿柳）联袂来访，因曾被风四娘骗过而要带风四娘走。萧十一郎以一丈二尺横木对敌，约定三招取胜；红樱绿柳展示“以气驭线以线驭剑”的飞剑术，剑气凌厉，萧十一郎以长制短终未落败，红樱绿柳退走。
  source_refs:
    - text: 红樱绿柳，天外杀手，双剑合璧，天下无敌。
      chapter: 17
    - text: 这就叫以气驭线，以线驭剑，现在你明白了么？
      chapter: 17
- chapter: 18
  title: 第十八回 大江东流
  summary: 萧十一郎以一丈二尺木棍对红樱绿柳飞剑，三招后双方未分胜负，红樱绿柳剑脱手退走；萧十一郎自认本非其对手，因救风四娘而胜。风四娘独思推断连城璧即接替逍遥侯、陷害萧十一郎的幕后主谋；萧十一郎留辣椒酱写就的留言悄然赴约，风四娘追至江边，遇霍英、杜吟，得知沈璧君与连城璧去向。
  source_refs:
    - text: 好，好个萧十一郎。
      chapter: 18
    - text: 连城璧就是“那个人。”
      chapter: 18
- chapter: 19
  title: 第十九回 金 凤 凰
  summary: 风四娘带霍英、杜吟闯入白马山庄，得知周至刚与连城璧一同外出，沈璧君留在后院；风四娘制住金凤凰后见到沈璧君，向她揭露真相：萧十一郎并未得宝藏，其财富与无垢山庄皆为连城璧为陷害他所赠，连城璧接替逍遥侯主谋，欲借七人之手杀萧十一郎。
  source_refs:
    - text: 风四娘一字字道：“连城璧。”
      chapter: 19
    - text: 接替逍遥侯的那个人，为了想要萧十一郎成为江湖中的众矢之的，就故意散布流言，说他找到了宝藏。
      chapter: 19
- chapter: 20
  title: 第二十回 寻寻觅觅
  summary: 风四娘、沈璧君等从金凤凰口中诈出“枫林渡口”后发觉上当；转赴春江城八仙船，发现鱼吃人、金菩萨、厉青锋、人上人、轩辕三成、轩辕三缺六人已全部被一刀致命；装死的张果老称凶手是个看似好看、持极快刀的男子；沈璧君认定是萧十一郎所为，风四娘坚信萧十一郎从不杀无辜之人。
  source_refs:
    - text: “鲨王”鱼吃人、金菩萨、“金弓银丸刺虎刀，追云捉月水上飘”厉青锋、人上人、轩辕三成、轩辕三缺。
      chapter: 20
    - text: 风四娘叹了口气，道：“不管怎么样，他绝不是你想像中那样无情的人。”
      chapter: 20
- chapter: 21
  title: 第二十一回 神秘天宗
  summary: 风四娘带霍英、杜吟去找金凤凰与沈璧君算账，却只见到周至刚与连城璧，连城璧以沈璧君不愿再见她为由拒见，并对一屋子死人之事佯作不知。酒铺中霍英突以闪电手法点穴制住风四娘欲灭口，杜吟却反手将霍英刺死，自己亦被霍英所伤致死。临终前杜吟透露天宗乃极可怕的秘密组织，并交代其结构（三十六天罡、七十二副香主）及香主谢天石、花如玉等人，印证了萧十一郎此前之言。
  source_refs:
    - text: 杜吟苦笑道:"我们本来就是要到无垢山庄去杀你的。"
      chapter: 21
- chapter: 22
  title: 第二十二回 梦醒不了情
  summary: 风四娘在城郊小客栈偶遇醉酒痛哭的沈璧君，得知连城璧竟是天孙的奴才，并暗中勾结花如玉，欲于月圆时赴西湖水月楼面见天孙。二女互诉身世与痛苦，命运相连；风四娘决意独闯西湖寻人，要沈璧君留守等待萧十一郎。
  source_refs:
    - text: 现在我已知道,那个秘密组织叫'天宗',宗主是一个很矮小,还养着条小狗的人,并不是连城璧。
      chapter: 22
    - text: 花如玉道:'这件事你做得很好,所以天孙想当面跟你谈谈下一件事。'
      chapter: 22
- chapter: 23
  title: 第二十三回 摇船母女
  summary: 风四娘与沈璧君易容成船家母女潜行西湖,借摇船探查将在水月楼现身的神秘人"天孙";途中搭载史秋山、霍无病、王猛三名江湖客前往水月楼,得知有人连日大宴江南武林群雄,章末史秋山更透露设宴之人竟是萧十一郎。
  source_refs:
    - text: 史秋山道:"萧十一郎!"
      chapter: 23
- chapter: 24
  title: 第二十四回 水月楼之宴
  summary: 萧十一郎在水月楼大船设宴,只许来杀他的人入舱饮酒。风四娘与沈璧君扮作船姑潜上探看,群雄陆续现身:霍无病(霍无刚)欲为师兄赵无极复仇,莽和尚王猛、形意门侯一元、神秘青衣刺客先后登场。青衣人以混元一气神功凌空驭船,沈璧君却识破其半途已换人。宴中萧十一郎抽割鹿刀起舞,歌声琴断,神秘人冷言"不吉不智不欢",终以"我已来了,你不能醉"作结,悬念未消。
  source_refs:
    - text: 请客的人居然是萧十一郎。
      chapter: 24
    - text: ——来杀他的人,才能进去喝酒。
      chapter: 24
- chapter: 25
  title: 第二十五回 白衣客与悲歌
  summary: 本章讲述一个乘殡葬纸船而来的白衣卖卜瞎子现身水月楼,以奇诡武功试探萧十一郎,并"看"出冰冰左股枫叶胎记与其被推入绝谷又爬出的隐秘经历;萧十一郎以平实迅疾的武功将其击败,瞎子最终以唯天公子能为之旋转身法破窗而去,留下死亡与灾祸的不祥预兆。
  source_refs:
    - text: 一个瞎子,坐着条殡葬用的纸船,来"看"一个素不相识的陌生人。
      chapter: 25
- chapter: 26
  title: 第二十六回 迷情
  summary: 本章写西湖月下，萧十一郎于船楼与冰冰、风四娘、沈璧君三个女子相聚；风四娘追问冰冰身上青色胎记之秘，引出逍遥侯（冰冰大哥、天公子哥舒天）虽传已死、却可能借“九转无相神功”化身瞎子未死的推断。众人又由天宗宗主养狗之事，牵出八仙船与萧十二郎此前相助的往事。
  source_refs:
    - text: 风四娘笑道:'难道你们认为逍遥侯还没有死?'
      chapter: 26
- chapter: 27
  title: 第二十七回 死亡游戏
  summary: 本章中萧十一郎、风四娘、沈璧君与冰冰相聚于水月楼，冰冰道出被轩辕三成、轩辕三缺送予鲨王及遭鱼吃人软禁的经过；风四娘透露鲨王等请帖上之人皆已被一刀杀死、唯花如玉幸存，并说连城璧将与"养狗的人"在水月楼月圆夜相会。王猛、霍无病携水中死尸指为史秋山并指控风四娘为凶手，萧十一郎辨称死者未必是史秋山且并非死于船上；结尾沈璧君指认史秋山其实就在众人之中。
  source_refs:
    - text: 风四娘道:'不但鲨王死了,请帖上有名字的人,除了花如玉外,已全都死了。'
      chapter: 27
    - text: 这双眼睛正瞪在一个人身上:'这个人就是史秋山。'
      chapter: 27
- chapter: 28
  title: 第二十八回 揭开面具
  summary: 本章讲述船舱中揭穿戴木板面具青衣人真实身份的过程:沈璧君凭其转扇子的习惯认出第二人为史秋山, 侯一元假意掀面具实则暗算沈璧君,却被史秋山拼死缠住而狼狈落窗;真相大白史秋山与连城璧等皆为天宗之人,且以李代桃僵之计令人误以为史秋山已死。 结尾沈璧君向风四娘坦言只有她才配做萧十一郎的伴侣,随即跃入湖心,萧十一郎与风四娘亦相继入水相救。
  source_refs:
    - text: 沈璧君道:"我要告诉你,只有你才能做萧十一郎最好的伴侣,也只有你才真正了解他,信任他,他若再让你走,他就是个白痴。"
      chapter: 28
- chapter: 29
  title: 第二十九回 春残梦断
  summary: 沈璧君生死成谜，萧十一郎痛失所爱形同心死，与风四娘在楼船相对买醉。连城璧扮青衣人潜入，花如玉制住风四娘以割鹿刀胁迫，萧十一郎为救爱人解刀就擒；连城璧却出尔反尔斩杀花如玉，夺走割鹿刀，群雄逐鹿之势已成。
  source_refs:
    - text: 刀光又一闪,他的人就倒了下去。
      chapter: 29
- chapter: 30
  title: 第三十回 一不做二不休
  summary: 连城璧在船上以割鹿刀先后斩杀天宗杀手何平与郑刚灭口，随后将割鹿刀归还萧十一郎， 并与萧十一郎、风四娘对饮长谈，道出自己潜入天宗卧底以毁灭其阴谋的缘由与无垢山庄的家世。 天宗宗主如期在月圆之夜乘舟前来，欲亲眼查验萧十一郎之首，气氛骤然紧张。
  source_refs:
    - text: 连城璧一刀出手,就连看也不再看他一眼
      chapter: 30
    - text: 连城璧淡淡道:"我也绝不肯将这把刀还给别人,我只肯还给他。"
      chapter: 30
    - text: 一叶扁舟,在月下慢慢的荡了过来。
      chapter: 30
- chapter: 31
  title: 第三十一回 月圆之约
  summary: 月圆之夜，连城璧识破四舟天孙真假难辨，与萧十一郎、风四娘联手击倒一假冒天孙者（疑被吓死），分头追查天宗船只。 风四娘追船时被漩涡引入西湖章横小楼，与未死的沈璧君重逢，章横以三棱透骨针为证劝阻其追船。 后无相天孙突袭，以三棱透骨针打伤章横，逼风四娘、沈璧君随行，二人联手抵抗不敌；萧十一郎则守候于西湖北岸宝石山。
  source_refs:
    - text: 连城璧道:"这四人中只有一个是真的天宗主人。"
      chapter: 31
    - text: 黑衣人道:"无相天孙,身外化身,真即是假,假即是真。"
      chapter: 31
    - text: 萧十一郎就在这里。
      chapter: 31
- chapter: 32
  title: 第三十二回 龙潭虎穴
  summary: 本章萧十一郎尾随黑衣人至宝石山宝倜塔，目睹卖卜瞎子(逍遥侯哥舒天)与黑衣人(冰冰)对峙，二人借机关地道遁走并于秘谷同归于尽；萧十一郎循地道进入秘谷，发现兄妹尸身，得知冰冰乃天宗二代主人、借自己铲除异己，终被连城璧救出。萧十一郎回到西湖，于水月楼遇萧十二郎，得风四娘交还旧信，又往恒生钱庄提款仅余一枚铜钱，囊空如洗却依旧豁达。
  source_refs:
    - text: 这兄妹两人都已死在对方手里,他们之间的恩怨仇恨,已全都随着他们的生命消逝
      chapter: 32
    - text: 他甚至知道其中有个人是连城璧。
      chapter: 32
- chapter: 33
  title: 第三十三回 侠义无双
  summary: 本章写连城璧夜深独对金剑"侠义无双"，船家赵伯奇献上割鹿刀并诋毁萧十一郎，反被连城璧斩杀，连城璧命萧十二郎将刀送还。萧十一郎已沦为酒鬼，在鸿宾酒楼酒窖偷酒被殴，萧十二郎送还割鹿刀后，笑面十七郎以一笑换得刀并百般羞辱消沉的萧十一郎，终被悄然现身的连城璧出手托飞。
  source_refs:
    - text: 名满天下的萧十一郎,这一次是真正完了。
      chapter: 33
    - text: 侠义无双的连城璧。
      chapter: 33
- chapter: 34
  title: 第三十四回 真相大白
  summary: 连城璧与萧十一郎对饮,亲口坦白自己才是真正的天宗主人,多年来精心布局借刀杀人、以萧十一郎为工具除去叛徒并将其彻底毁去。连城璧回到无垢山庄,却发现金剑被萧十一郎暗中篡改刻字,意识到自己或许反落入圈套。二人最终在鸿宾酒楼对峙,萧十一郎放下割鹿刀、消失于黑暗,连城璧虽未丧命却失去了希望、骄傲与光荣,落得惨胜而空虚的下场。
  source_refs:
    - text: 所有的一切计划,都是我一个人想出来的。
      chapter: 34
