  description: 逍遥侯(哥舒天)的嫡亲妹妹。本章自述身世:因是正常人体貌遭哥哥嫉妒,被推下杀人崖,靠织锦缎裙兜风与峭壁小树幸存,在谷底以死者兵器挖洞栖身两月余,最终呼喊哥哥名字令其误认冤魂而跳崖,被萧十一郎救起。曾混入秘密集会,记下面具下众武林大侠真容。
  source_refs:
    - text: 这就是冰冰。
      chapter: 6
    - text: 冰冰看着他,美丽的眼睛,充满了光荣和骄傲,嫣然道:"你好像只用一招,就已将他们击倒了。"
      chapter: 7
    - text: 萧十一郎叹道:"你实在比我细心。" 冰冰嫣然道:"莫忘记,我本来就是个女神童。"
      chapter: 8
    - text: 冰冰忽然笑了笑,道:"沈姑娘她们跟着公子,难道公子从来也不让她们坐下来吃饭的?"
      chapter: 9
    - text: 但就在这时,她脚步忽然轻轻一滑,左手在吕掌柜肘上轻轻一托。
      chapter: 10
    - text: 他这一出手,冰冰就知道他已输定了。
      chapter: 11
    - text: 冰冰道:'因为我是他的妹妹。'
      chapter: 11
    - text: 冰冰竟是逍遥侯的妹妹。
      chapter: 12
    - text: 因为我哥哥从不愿别人知道,他有我这么一个妹妹。
      chapter: 12
    - text: 冰冰呢?她绝不会不在这里等他,绝不会自己走的。
      chapter: 13
    - text: 是谁劫去了冰冰?是谁偷去了那解药?当然也是轩辕三成
      chapter: 13
    - text: 轩辕三成道:'我已将她卖给别人了。'
      chapter: 14
    - text: 风四娘道:'所以你只有带着冰冰,四处去找他那组织中的人?'萧十一郎黯然道:'只可惜冰冰现在也不见了。'
      chapter: 15
    - text: 我若是冰冰，我一定会找个最大的地方躲起来。
      chapter: 16
    - text: 现在他们想必已知道冰冰的来历了，冰冰想必也已落入他们手里。
      chapter: 18
    - text: 他那么样对冰冰，只因为冰冰是他的救命恩人，而且她已有了不治的绝症。
      chapter: 19
    - text: 由此可见,冰冰说的话也不假。
      chapter: 21
    - text: 这黄莺般的少女的歌声了,她终于听出了这少女的声音。
      chapter: 24
    - text: 楼船上歌声传下,如在云端。
      chapter: 24
    - text: 冰冰这个女人有些地方连沈璧君也比不上。
      chapter: 25
    - text: 冰冰看不见他的脸色,却似已猜出了他的心事。
      chapter: 26
    - text: 在茶里下药的是轩辕三成,带走冰冰的却是轩辕三缺。
      chapter: 27
    - text: 他好像想利用我要挟萧......萧大哥做一件事。
      chapter: 27
    - text: 这句话她是对冰冰说的。冰冰却只是痴痴的坐在床头,动也没有动,苍白美丽的脸上,带着种没有人能了解也没有人能解释的表情。
      chapter: 28
    - text: 难道连冰冰都已悄悄的走了?
      chapter: 29
    - text: ——萧十一郎的西湖之行,岂非是冰冰安排的?
      chapter: 30
    - text: 天宗的第二代主人,竟赫然真的是冰冰。
      chapter: 32
    - text: 揭起这面具,就可以看见一张苍白美丽的脸
      chapter: 32
    - text: 你带着冰冰走了,我就想法子下崖去看看他。
      chapter: 34
    - text: 因为我要把这所有的责任,都推到冰冰身上。
      chapter: 34
  id: char_bing_bing
