- name: 萧十一郎
  aliases:
    - 大盗萧十一郎
  identities:
    - 江湖大盗
    - 大盗
    - 无垢山庄现庄主
    - 无垢山庄庄主
    - 沈璧君真心相爱的人
    - 水月楼之宴的主人
    - 沈璧君生命中最重要的人
  factions:
    - faction_wu_gou_shan_zhuang
  skills:
    - skill_ge_lu_dao_fa
    - skill_tie_ban_qiao
  level: 核心
  rank: 登峰造极
  description: 本作主角。本章被杨开泰逼斗,因不愿胜亦不愿败而渐落下风;人上人、轩辕三缺介入后,轩辕三成现身激其拔刀,萧以"不杀君子只杀小人"之志、自削腿肉清醒,逼退轩辕三成。终悟所拥银两乃逍遥侯继任者所赠,用以转移江湖视线,决意与风四娘同寻沈璧君与冰冰。
  source_refs:
    - text: 无论他是在天涯,还是在海角,无论他是活,还是死,她都一样忘不了他
      chapter: 1
    - text: 萧十一郎,又是萧十一郎。
      chapter: 2
    - text: 江湖中几乎已没有人不知道她是萧十一郎的朋友。
      chapter: 2
    - text: 萧十一郎,当然是萧十一郎。
      chapter: 3
    - text: 萧十一郎!当然就是萧十一郎!
      chapter: 4
    - text: 用沈璧君来做饵,去钓萧十一郎那条大鱼。
      chapter: 5
    - text: 这个人真的就是萧十一郎!
      chapter: 6
    - text: 萧十一郎一共只用了三招。
      chapter: 7
    - text: 萧十一郎的脸色变了,心跳似已突然停止,血液似已突然凝结。
      chapter: 8
    - text: 萧十一郎的确就在窗外。
      chapter: 9
    - text: 就在这一瞬间,他忽然又变成了以前的那个萧十一郎了。
      chapter: 10
    - text: 萧十一郎就站在梧桐下等着,轩辕三成终于慢慢的走了出来。
      chapter: 11
    - text: 刀出鞘。淡青色的刀光一闪,已有一串晶莹鲜红如玛瑙的血珠溅出。
      chapter: 11
    - text: 萧十一郎黯然道:'我救她上来的时候,她实在已被折磨得不成人形'
      chapter: 12
    - text: 萧十一郎缓缓道:'无论你们怎么看,无论你们怎么想,我跟她之间,直到现在还是纯洁的'
      chapter: 12
    - text: 闪电般的刀光,如惊虹般一卷,七根明杖突然全都断成了两截。
      chapter: 13
    - text: 萧十一郎只好跺了跺脚,道:'好,我就把她交给你。'
      chapter: 13
    - text: 萧十一郎抽刀,劈门,一脚踢开,就看见了轩辕三成。
      chapter: 14
    - text: 萧十一郎道:'冰冰在哪里?'轩辕三成道:'我已将她卖给别人了。'
      chapter: 14
    - text: 萧十一郎冷笑道:'我这柄刀不杀君子,只杀小人。'
      chapter: 15
    - text: 萧十一郎突然反手一刀,又削下了腿上的一块肉,鲜血飞溅而出。
      chapter: 15
    - text: 我就是萧十一郎，杀人不眨眼的大盗！
      chapter: 16
    - text: 无垢山庄现在也已是我的。
      chapter: 16
    - text: 萧十一郎横持着一丈二尺长的木棍，左右双手，距离六尺。
      chapter: 17
    - text: 萧十一郎道：“三招！”
      chapter: 17
    - text: 萧十一郎横持着一丈二尺长的木棍，左右双手，距离六尺。
      chapter: 18
    - text: 他已看不见萧十一郎，什么都已看不见。那是一行用筷子醮着辣椒酱写出来的字。
      chapter: 18
    - text: 风四娘道：“我知道你恨他，因为你认为他已变了。”
      chapter: 19
    - text: 萧十一郎，萧十一郎，你的心为什么如此狠？
      chapter: 20
    - text: 据说他们也都是萧十一郎的对头,我本该和他们同仇敌忾,联合起来对付萧十一郎的
      chapter: 21
    - text: 找到萧十一郎。
      chapter: 22
    - text: 除了萧十一郎外,她也从未在别人面前这么样哭过。
      chapter: 22
    - text: 你至少还有一个真心相爱的人。
      chapter: 22
    - text: 萧十一郎,你究竟到那里去了?为什么至今还是没有消息?
      chapter: 23
    - text: 史秋山道:"萧十一郎!"
      chapter: 23
    - text: 请客的人居然是萧十一郎。
      chapter: 24
    - text: 萧十一郎终于出现了。
      chapter: 24
    - text: 萧十一郎也已看见了这湖上的孤舟,舟上的人影。
      chapter: 25
    - text: 萧十一郎木立在窗前,遥视着远方的夜色
      chapter: 26
    - text: 萧十一郎忽然道:'我知道。'
      chapter: 27
    - text: 萧十一郎淡淡道:'我何必去想?这种事我遇见的反正不是第一次了。'
      chapter: 27
    - text: 萧十一郎看着她走过去,并没有拦阻,因为他心里充满了骄傲——为她而骄傲。
      chapter: 28
    - text: 萧十一郎,萧十一郎,你要等到什么时候,才能了解风四娘对你的感情?
      chapter: 29
    - text: 萧十一郎已接过他的刀,轻抚着刀锋,道:"有些人就像是这把刀一样,这把刀永不会钝,这种人也永不会变。"
      chapter: 30
    - text: 天下绝没有任何人能挡得住连城璧和萧十一郎的联手一击。
      chapter: 31
    - text: 萧十一郎道:"不管有没有消息,明天中午以前,我一定回来。"
      chapter: 31
    - text: 萧十一郎就在这里。
      chapter: 31
    - text: 萧十一郎却还是一路追了过去。
      chapter: 32
    - text: 萧十一郎走上来凤亭,站在黑衣人刚才站着的地方,忽然大喝一声,反手拔刀。
      chapter: 32
    - text: 名满天下的萧十一郎,如今已成了不折不扣的酒鬼,以后武林中再也不会有萧十一郎这个名字了。
      chapter: 33
    - text: 萧十一郎高高举起割鹿刀,仰天大笑。
      chapter: 33
    - text: 名满天下的萧十一郎,这一次是真正完了。
      chapter: 33
    - text: 萧十一郎抬起头,就看见了连城璧的脸。
      chapter: 34
    - text: 萧十一郎放下了他的刀。
      chapter: 34
  id: char_xiao_shi_yi_lang
