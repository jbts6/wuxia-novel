  description: 冰冰的大哥，自号天公子，本名哥舒天，号称天下第一高手。传闻已死却疑似借“九转无相神功”死而复生、化身瞎子；其人有奇异魔力，常说天下无事不可为。
  source_refs:
    - text: 没有人的武功比逍遥侯更高,没有人能比他更阴险、更毒辣、更可怕。
      chapter: 2
    - text: 他们也在逍遥侯门下。
      chapter: 4
    - text: 萧十一郎和逍遥侯决战的那一天
      chapter: 4
    - text: 在那玩偶山庄的时候,他们就一直在暗中帮着他
      chapter: 5
    - text: 纵然逍遥侯复生，也绝不敢说能在三招中击败他们的。
      chapter: 17
    - text: 我本不是他们对手的，就正如我本不是逍遥侯的对手。
      chapter: 18
    - text: 难道就是接替逍遥侯地位的那个人？
      chapter: 18
    - text: 逍遥侯有个秘密组织，他收买了很多人，正在进行一件阴谋。
      chapter: 19
    - text: 逍遥侯死了后,接替他地位的人是谁?
      chapter: 21
    - text: 逍遥侯是天之子,他的继承人当然是天孙。
      chapter: 22
    - text: 冰冰并不是侏儒,她懂事时,逍遥侯已是天下第一高手。
      chapter: 26
    - text: 就连逍遥侯都从来没有留下过她
      chapter: 27
    - text: 逍遥侯总是她的骨肉。
      chapter: 29
    - text: 你真的就是那力战逍遥侯,火并天公子,以一把刀横扫武林的萧十一郎?
      chapter: 33
    - text: 逍遥侯坠崖的时候,我是亲眼看见的,你带着冰冰走了,我就想法子下崖去看看他。
      chapter: 34
    - text: 我要让你有一种错觉,认为那瞎子就是逍遥侯,认为逍遥侯还没有死。
      chapter: 34
