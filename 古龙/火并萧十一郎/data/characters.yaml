      chapter: 21
    - text: 这是花如玉的声音。
      chapter: 22
    - text: 花如玉道:'这件事你做得很好,所以天孙想当面跟你谈谈下一件事。'
      chapter: 22
    - text: 花如玉笑道:'难怪别人都说你是个了不起的角色'
      chapter: 22
    - text: 风四娘道:'不但鲨王死了,请帖上有名字的人,除了花如玉外,已全都死了。'
      chapter: 27
    - text: 花如玉,风四娘用不着回头去看,就知道这个人一定是花如玉。
      chapter: 29
    - text: 连城璧道:"你知不知道我为什么要杀花如玉?"
      chapter: 30
    - text: 连城璧道:"这约会是花如玉订的,他们之间一定已约好了见面的法子。"
