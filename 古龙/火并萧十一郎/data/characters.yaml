  aliases: []
  identities:
    - 武林第一美人
    - 沈家小姐
    - 萧十一郎所爱之人
    - 连城璧之妻
    - 江湖中最美丽的女人
    - 连夫人
    - 萧十一郎真心相爱的人
    - 萧十一郎之情人
    - 端庄的淑女
    - 连城璧的妻子
    - 萧十一郎的伴侣
    - 少年侠侣
  factions:
