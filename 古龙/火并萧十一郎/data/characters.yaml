- name: 人上人
  aliases:
    - 怪物中的怪物
  identities:
    - 残废怪物
    - 残废者帮派首脑(疑似)
    - 请柬具名者
  factions:
    - faction_can_fei_zhe_bang_pai
  skills:
    - skill_bian_fa
  level: 重要
  rank: 出神入化
  description: 坐在大汉头上的真正怪物，四肢仅剩一只右手，自称因中毒自行砍断双腿与一臂。 手持四五丈长鞭，鞭梢带毒，武功深不可测，以"人上人"自居。
  source_refs:
    - text: 这个人才是个真正的怪物,怪物中的怪物。
      chapter: 1
    - text: 他的四肢,竟已只剩下一只右手,那条五尺长的鞭子,就在他右手里。
      chapter: 1
    - text: 所以他就是人上人。
      chapter: 2
    - text: 人上人道:'厉青锋?'
      chapter: 2
    - text: 人上人忍不住冷笑道
      chapter: 3
    - text: 人上人居然还高高的坐在那大汉头上
      chapter: 4
    - text: 轩辕三缺就是这帮派的总瓢把子——人上人也很可能是其中的首脑之一。
      chapter: 13
    - text: 一个头戴珠冠,面貌严肃的独臂人,双腿已齐膝而断,却站在一条赤膊大汉的头顶上,远在一丈外,就挥出了长鞭。
      chapter: 15
    - text: 还有那个人上人。
      chapter: 16
    - text: 无论谁将自己称为人上人，都绝不会很正常的。
      chapter: 17
    - text: 他甚至已连人上人那样的残废都对付不了。
      chapter: 18
    - text: 人上人、轩辕三成、轩辕三缺。
      chapter: 20
    - text: 被杀是鱼吃人,厉青锋,人上人,和轩辕兄弟。
      chapter: 21
  id: char_ren_shang_ren
