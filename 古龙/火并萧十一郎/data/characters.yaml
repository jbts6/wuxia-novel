  description: 奉鱼吃人之命送白色请柬给萧十一郎的少年，自称姓萧，名十二郎。神色冷静，能感知无形杀气，提及江湖中另有萧四郎、萧七郎、萧九郎、萧十郎、无情十三郎、多情十三郎等。
  source_refs:
    - text: 少年又迟疑了半晌，终于垂下头，道：“萧十二郎。”
      chapter: 16
    - text: 在下也姓萧。
      chapter: 16
    - text: 看来贴在十二郎背脊上的那两把剑，果然也已来了。
      chapter: 17
    - text: 风四娘道:'萧十二郎?' 萧十一郎点点头。
      chapter: 26
    - text: 他软禁我的地方,萧十二郎当然知道。
      chapter: 27
    - text: 船头的大汉傲然道:"当然就是侠名满天下的萧十二郎。"
      chapter: 32
    - text: 少年英俊,服饰华丽,果然正是萧十二郎。
      chapter: 32
    - text: 人丛中有人大声道:"好了,萧大侠来了,请萧大侠作主,该打该罚,说句公道话。"
      chapter: 33
    - text: 萧十二郎摆摆手,制止伙计再说下去,用两个指头,轻轻托起醉汉的下巴。
      chapter: 33
    - text: 萧十二郎看到这里,向伙计暗暗点了点头,转身走出了人丛。
      chapter: 33
