  description: 江湖女侠，孤儿出身，从小流浪无家。年已三十五，聪明美丽而洒脱，擅骑快马、喝烈酒、使快刀，深谙自保之道，素将眼泪往肚里流。本章中她于城郊小客栈偶遇痛哭的沈璧君，互诉身世后决意独赴西湖寻找连城璧与天孙。
  source_refs:
    - text: 风四娘心里并不愉快。
      chapter: 1
    - text: 玩最快的刀,杀最狠的人。
      chapter: 1
    - text: 风四娘竟已不见了。
      chapter: 2
    - text: 风四娘一看就知道是个很聪明的女人
      chapter: 2
    - text: 风四娘没有死,她睁开眼睛的时候,就看见了心心。
      chapter: 3
    - text: 风四娘叹了口气道:'我还以为你有三只手哩。'
      chapter: 3
    - text: 风四娘已走到花平面前,微笑道:'又是两年不见了。'
      chapter: 4
    - text: 风四娘嫣然道:'才半天不见,你们就不认得我了?'
      chapter: 4
    - text: 风四娘恨恨道:'当然是上了个女人的当'
      chapter: 5
    - text: 风四娘道:'我上了我老公的当'
      chapter: 5
    - text: 风四娘道:"他抢去了你的什么人?"
      chapter: 6
    - text: 风四娘忽然发觉萧十一郎不但变了,而且竟像是已变成个自大的疯子。
      chapter: 7
    - text: 风四娘在流着泪。
      chapter: 8
    - text: 这根乌木簪虽然已很陈旧,但却一直是风四娘最珍惜的东西。
      chapter: 9
    - text: 风四娘就坐在她身边,打扮得就像是个新娘子一样,但却木头人般坐在那里,动也不动。
      chapter: 10
    - text: 牛掌柜就扶着风四娘坐在椅子上。
      chapter: 11
    - text: 风四娘忽然伸出手,重重的给了他一耳光。
      chapter: 11
    - text: 风四娘怔住:'嫡亲的妹妹?'
      chapter: 12
    - text: 风四娘终于承认:'这么样看来,他的确还不能算太坏。'
      chapter: 12
    - text: 风四娘果然已昏迷不醒,紧紧咬住的牙关中,也已有白沫吐了出来。
      chapter: 13
    - text: 风四娘就昏在被里,死灰色的脸上,已有了红晕。
      chapter: 14
    - text: 风四娘已转过身,推开了窗子。
      chapter: 14
    - text: 风四娘的手在桌下握紧,一字字道:'你应该先去还沈璧君的债。'
      chapter: 15
    - text: 风四娘看着屋角的飞檐，忍不住叹了口气，道：“像这样的房子，你还有多少？”
      chapter: 16
    - text: 风四娘一直在痴痴的看着萧十一郎，眼睛里充满了感激。
      chapter: 17
    - text: 风四娘大声道：“我在乎。”
      chapter: 17
    - text: 风四娘正看着他，道：“所以你现在已有点醉了？”
      chapter: 18
    - text: 风四娘忽然醒来，秋日的艳阳，正照在雪白的窗纸上。
      chapter: 18
    - text: 风四娘吆喝了一声，反手打马，冲出树林。
      chapter: 19
    - text: 风四娘道：“我问你，你知不知道他为什么要为冰冰伤人？”
      chapter: 19
    - text: 风四娘拉着沈璧君冲出去：“我们走。”
      chapter: 20
    - text: 风四娘道：“不管怎么样，他绝不是你想像中那样无情的人。”
      chapter: 20
    - text: 风四娘忽然跳起来,冲出去:"我们走。"
      chapter: 21
    - text: 风四娘走在阳光下,旧日的泪痕已干了。
      chapter: 22
    - text: 今年我已经三十五了,却和二十年前一样,没有家,没有亲人
      chapter: 22
    - text: 十几岁的时候,我已学会了骑最快的马,喝最辣的酒,玩最快的刀
      chapter: 22
    - text: 风四娘道:"我本就是十八般武艺件件精通,件件稀松。"
      chapter: 23
    - text: 沈璧君正在看着她,看着她的时候,忽然道:"听说你一脚踢死过祁连山的大盗半天云?"
      chapter: 23
    - text: 风四娘已怔住。
      chapter: 24
    - text: 无论谁想要用易容来瞒过老朋友都不容易。
      chapter: 24
    - text: 风四娘脸色也变了。
      chapter: 25
    - text: 风四娘手插住腰,道:'你既然已认出了我们,为什么还不赶快替我们倒杯酒。'
      chapter: 26
    - text: 风四娘道:'你虽然没有去过八仙船,我却去过。'
      chapter: 27
    - text: 风四娘道:'不但鲨王死了,请帖上有名字的人,除了花如玉外,已全都死了。'
      chapter: 27
    - text: 风四娘抢着道:"刚才萧十一郎舞刀的时候,这个人已换了一个。"
      chapter: 28
    - text: 风四娘并没有死。
      chapter: 29
    - text: 风四娘忽然道:"一别经年,你的出手好像一点也没有慢。"
      chapter: 30
    - text: 风四娘已怔住。
      chapter: 31
    - text: 风四娘拍了拍手上的土,冷笑道:"在水里我虽然是个旱鸭子,可是一到了岸上,我随时都能让你变成一个死鸭子。"
      chapter: 31
    - text: 大名鼎鼎的风四娘
      chapter: 31
    - text: 风四娘是不是还在等着他?
      chapter: 32
