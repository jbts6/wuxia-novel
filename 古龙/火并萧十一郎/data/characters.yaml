      chapter: 11
    - text: 花如玉还是面不改色的微笑道:'我知道你不信,但这件事却半点不假。'
      chapter: 11
    - text: 萧十一郎道:'有人告诉了我。'风四娘道:'谁?谁告诉你的?'萧十一郎道:'花如玉。'
      chapter: 12
    - text: 轩辕三成走到门口,才缓缓道:'我已将她卖给了花如玉。'
      chapter: 14
    - text: 金菩萨，花如玉，“金弓银丸斩虎刀，追云捉月水上飘”厉青锋。
      chapter: 16
    - text: 那你就更不必担心花如玉了，他只不过是条狐狸。
      chapter: 17
    - text: 那你就更不必担心花如玉了，他只不过是条狐狸。
      chapter: 18
