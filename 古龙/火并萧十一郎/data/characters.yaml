  source_refs:
    - text: 还有一个就是点苍的新任掌门人谢天石。
      chapter: 2
    - text: 谢天石的松纹剑,交手只一招就被削断了。
      chapter: 2
    - text: 谢天石岂非就因为多看了她两眼,眼睛才会瞎的?
      chapter: 4
    - text: 风四娘道:"谢天石就因为多看了她两眼,所以眼睛才会瞎的?"
      chapter: 6
    - text: 你为什么要逼着谢天石挖出眼珠子来?
      chapter: 11
    - text: 冰冰道:'那位点苍的掌门谢天石,就是那天我在山洞里看见的那些人其中之一。'
      chapter: 12
    - text: 第一个人脸色铁青,颧骨高耸,正是昔日的点苍掌门谢天石。
      chapter: 13
    - text: 扇子上六个鲜红的字:'必杀萧十一郎!'
      chapter: 13
    - text: 轩辕三缺道:'他一刀逼瞎了点苍掌门,三招击败了伯仲双侠,据说已可算是当世的第一高手'
      chapter: 15
    - text: 是我的师叔,也就是当年点苍派的掌门人谢天石。
