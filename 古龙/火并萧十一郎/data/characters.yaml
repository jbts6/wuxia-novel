  description: 外表平凡温厚,实则城府极深。本章以空手与萧十一郎交手,招式奇诡变化莫测,却故意落败,借伤遁走。喜爱精美瓷器与有风韵的女人,曾为一只柴窑胆瓶杀胡三爷满门。后揭示为轩辕三缺之弟。
  source_refs:
    - text: 轩辕三成终于慢慢的走了出来。
      chapter: 11
    - text: 轩辕三成本是个很温和平凡的人,但他这出手一击,却势如雷霆,猛不可挡,而且招式奇诡,变化莫测。
      chapter: 11
    - text: 萧十一郎冲过去,拉开了门,又怔住。一个看来老老实实的人,规规矩矩的站在外面,看着他微笑。轩辕三成,这人竟赫然是轩辕三成!
      chapter: 13
    - text: 轩辕三成道:'我已将她卖给别人了。'萧十一郎面色变了。
      chapter: 14
    - text: 轩辕三成走到门口,才缓缓道:'我已将她卖给了花如玉。'
      chapter: 14
    - text: 轩辕三成也出现了。他微笑着,又道:'杨老板是个生意人,生意人讲究的本是心黑皮厚'
      chapter: 15
    - text: 轩辕三成的人却已不见了......一溜烟的窜入了人丛中。
      chapter: 15
    - text: 轩辕三缺，轩辕三成，还有那个人上人。
      chapter: 16
    - text: 轩辕兄弟也是狐狸？
      chapter: 17
    - text: 轩辕兄弟也是狐狸？
      chapter: 18
    - text: 轩辕三成、轩辕三缺。
      chapter: 20
    - text: 在茶里下药的是轩辕三成,带走冰冰的却是轩辕三缺。
      chapter: 27
    - text: 风四娘道:'除了萧十一郎外,还有谁能一刀杀了轩辕三成?'
      chapter: 27
