    - faction_wu_gou_shan_zhuang
    - faction_bai_ma_shan_zhuang
  skills:
    - skill_jin_zhen
    - skill_yi_rong_shu
  level: 核心
  rank: 略有小成
  description: 武林第一美人,本是个温柔脆弱、从不愿伤人的端庄淑女。本章中为指认青衣人真面目而句句锋锐如刀,充满决心与勇气; 凭对方转扇子的习惯动作认出第二人是史秋山,并断言其主子是天宗;最终向风四娘坦言只有她才配做萧十一郎的伴侣,随即跃入湖心。
  source_refs:
    - text: 听说是因为他在无意中多看了沈璧君两眼。
      chapter: 2
    - text: 这就是武林中第一美人沈璧君。
      chapter: 4
    - text: 她第一次看见沈璧君的时候
      chapter: 4
    - text: 沈璧君道:'花如玉又是什么人?'
      chapter: 5
    - text: 她突然挥手,一蓬金针暴雨般射出。
      chapter: 5
    - text: 沈璧君忽然叫了起来:"我不信,你说的话我连一个字也不信。"
      chapter: 6
    - text: 突听一个人大声道:"你若要他们挖出眼睛来,就得先挖出我的眼睛来。"
      chapter: 7
    - text: 沈璧君突然大声道:"你错了,我既不姓沈,也不是沈璧君。"
      chapter: 8
    - text: 花如玉道:"在下与沈姑娘相识,只不过三五天而已。"
      chapter: 9
    - text: 恨他为什么会对冰冰如此温顺?为什么会对沈璧君如此无情?
      chapter: 11
    - text: 风四娘道:'她并不是为了别人来的,是为了你,她真正关心的,也只有你。'
      chapter: 12
    - text: 风四娘道:'那个人本来是花如玉的马车夫,好像叫白老三。'
      chapter: 12
    - text: 风四娘道:'当然是找沈璧君,你难道已忘了?'
      chapter: 14
    - text: 风四娘的手在桌下握紧,一字字道:'你应该先去还沈璧君的债。'
      chapter: 15
    - text: 沈璧君从未睡得如此香甜过。
      chapter: 16
    - text: 连城璧是武林中最受人尊敬的少年侠客，沈璧君是江湖中最美丽的女人。
      chapter: 16
    - text: 沈璧君为了你颠沛流离，受尽了折磨，你却另有了新欢。
      chapter: 17
    - text: 冰冰是不是还能活得下去？沈璧君是不是还能活得下去？
      chapter: 18
    - text: 沈璧君已走出了门，站在屋檐下，脸色是苍白，带着怒意。
      chapter: 19
    - text: 沈璧君冷冷道：“谁叫你来的？你根本就不该来。”
      chapter: 19
    - text: 沈璧君忽然冲上去，用力拉住了她：“我跟你一起走。”
      chapter: 20
    - text: 沈璧君冷冷道：“他的确不是，他根本不能算是人。”
      chapter: 20
    - text: 沈璧君呢?"风四娘又问道:"她是不是已回来了?"
      chapter: 21
    - text: 这个偷偷的躲在屋里哭泣的女人,赫然竟是沈璧君。
      chapter: 22
    - text: 因为......因为我还是他的妻子,昨天晚上,我还睡在他房里。
      chapter: 22
    - text: 白马山庄不是我的家。
      chapter: 22
    - text: 沈璧君是母亲。
      chapter: 23
    - text: 用白粉将头发扑成花白,再用一块青帕包起来,脸上添点油彩,画几条皱纹,沈璧君眯着眼睛低垂下头:"你还认不认得出我?"
      chapter: 23
    - text: 沈璧君已从后梢走过来,悄悄的问道:"你认得那个姓史的?"
      chapter: 24
    - text: 她的轻功居然很不错,家传的暗器手法更高妙,可是她跟别人交手,很少有不败的时候。
      chapter: 24
    - text: 沈璧君又在她耳边低语:"唱歌的是冰冰?"
      chapter: 25
    - text: 沈璧君遥视着远方,心也似在远方,过了很久才垂下头:'我知道。'
      chapter: 26
    - text: 沈璧君忽然站起来,肃然凝视着窗外的明月,道:'时候已不早了,我......我已该走了。'
      chapter: 27
    - text: 这双眼睛正瞪在一个人身上:'这个人就是史秋山。'
      chapter: 27
    - text: 江湖中知道她的人,绝不比知道风四娘的人少——不但知道她是武林中的第一美人,也知道她是个端庄的淑女。
      chapter: 28
    - text: 萧十一郎是不是能救得了沈璧君?
      chapter: 29
    - text: '"沈璧君。"风四娘叫了起来。'
      chapter: 31
    - text: 沈璧君道:"我没有死。"
      chapter: 31
    - text: 沈璧君忽然咬了咬牙,从章横腰边抽出柄尖刀,一抬手,卸下了他的下颚。
      chapter: 31
    - text: 因为他又想起了沈璧君。
      chapter: 34
    - text: 他要夺回的,不仅是沈璧君的人,还要夺回沈璧君的心。
      chapter: 34
