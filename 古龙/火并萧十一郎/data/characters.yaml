      chapter: 27
    - text: 萧十一郎道:'史秋山当然不是木头人,是江湖中惟一得到铁扇门真传的高手,若有人再做兵器谱,他的铁扇子至少可以排名在前三十位之内。'
      chapter: 27
    - text: 霍无病道:"换成了史秋山?"
      chapter: 28
    - text: 这次来的当然绝不会是史秋山。
      chapter: 29
