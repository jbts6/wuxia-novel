  source_refs:
    - text: 我叫王猛。虬髯大汉抢着道:"王八蛋的王,我是老三。"
      chapter: 23
    - text: 王猛道:"我姓王,叫王猛,我也知道这名字你一定没听说过,因为我本来是个和尚:"
      chapter: 24
    - text: 我就是少林寺里面,那个几乎把罗汉堂拆了的莽和尚,也就是那个被他们打了一百八十棍,还没有打死的铁和尚。
      chapter: 24
    - text: 也不知过了多久,王猛忽然长长叹了口气,道:"果然是好身手。"
      chapter: 25
    - text: 王猛道:'我们的老二。'
      chapter: 26
    - text: 这个人居然是王猛。
      chapter: 27
    - text: 王猛虽然全身都是湿的,一张脸却又干又硬
      chapter: 27
    - text: 王猛忍不住道:"你若真的是史老二,也不妨说出来,我们总是兄弟,绝不会帮着外人来对付你。"
