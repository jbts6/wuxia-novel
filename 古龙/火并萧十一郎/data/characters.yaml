  level: 核心
  rank: 出神入化
  description: 本书核心人物,表面仁义侠义无双,实则心思缜密、城府极深。本章中亲口向萧十一郎坦白自己才是真正的天宗主人,所有陷害萧十一郎的计划皆出自他手,只为夺回沈璧君并彻底毁掉萧十一郎。回到无垢山庄后发现金剑被萧十一郎篡改刻字,意识到可能反中圈套,最终在鸿宾酒楼虽表面获胜却失去一切骄傲与希望。
  source_refs:
    - text: 萧十一郎忽然又变成了连城璧
      chapter: 5
    - text: 江湖传闻,都说连城璧连公子已到了这地方,沈姑娘听见了这消息,就一定要随在下到这里来。
      chapter: 9
    - text: 萧十一郎道:'她本来就是为了要找连城壁才来的,只有连城璧,才是她......她真正关心的人'
      chapter: 12
    - text: 连城璧是武林中最受人尊敬的少年侠客，沈璧君是江湖中最美丽的女人。
      chapter: 16
    - text: 就在两年前，他还是天下武林中，最有前途，最受人尊敬的少年英雄。
      chapter: 16
    - text: 这一家人就是毁在你手里的，你却买下了他们的庄院。
      chapter: 17
    - text: 连城璧的“袖中剑”，她是亲眼看见过的。
      chapter: 18
    - text: 风四娘一字字道：“连城璧。”
      chapter: 19
    - text: 因为连城璧要带你到这里来，要将你留在这里，他才好去杀人。
      chapter: 19
    - text: 她知道他们就算在枫林渡口找十年，也找不到连城璧和萧十一郎的。
      chapter: 20
    - text: 连城璧就比较温和得多了,他一向是个温良如玉的谆谆君子。
      chapter: 21
    - text: 连城璧淡淡道:'我并没有找她回来,是她自己要回来的。'
      chapter: 22
    - text: 谁知道他只不过是个奴才。
      chapter: 22
    - text: 天孙的奴才。
      chapter: 22
    - text: ——以前她是不是和连城璧结伴来的?
      chapter: 23
    - text: 第三,我们也已知道连城璧一定会去找他。
      chapter: 23
    - text: 天宗的主人约了连城璧在这里相见,他居然也在这里请客。
      chapter: 24
    - text: 风四娘又喝了杯酒,才一个字一个字的说道:'连城璧。'
      chapter: 27
    - text: 事实上,他早已猜出连城璧必定和这阴谋有很密切的关系。
      chapter: 27
    - text: 现在她当然已知道第一个青衣人就是连城璧,除了连城璧外,还有谁跟沈璧君在一起生活了那么久?
      chapter: 28
    - text: 连城璧,果然是你。
      chapter: 29
    - text: 连城璧淡淡道:"我也绝不肯将这把刀还给别人,我只肯还给他。"
      chapter: 30
    - text: 连城璧道:"这四人中只有一个是真的天宗主人。"
      chapter: 31
    - text: 就连她都从来也没有见过动作这么快的人,她忽然发现连城璧身手之矫健,反应之快,竟似已不在萧十一郎之下。
      chapter: 31
    - text: 连城璧立刻道:"我追左边的一条。"
      chapter: 31
    - text: 再要连城璧将他也杀了,斩草除根。
      chapter: 32
    - text: 他甚至知道其中有个人是连城璧。
      chapter: 32
    - text: 在人们心目中,这四个字,也只有无垢山庄的连庄主足以当之无愧。
      chapter: 33
    - text: 连城璧抚摸剑身的手指突然停止,脸上的笑容也突然消失。
      chapter: 33
    - text: 刀光一闪,已掠过赵伯奇的脖子。
      chapter: 33
    - text: 连城璧。
      chapter: 33
    - text: 连城璧的脸上既没有讪笑,也没有怜悯,只有一种温柔而伟大的了解与同情。
      chapter: 34
    - text: 谁也不会知道连城璧才是真正的天宗第二代,这秘密势将随萧十一郎同化乌有,永远没有被揭穿的时候。
      chapter: 34
  id: char_lian_cheng_bi
