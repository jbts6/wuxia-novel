  source_refs:
    - text: 在逍遥侯的玩偶山庄里?
      chapter: 4
    - text: 在那玩偶山庄的时候,他们就一直在暗中帮着他
      chapter: 5
    - text: 看见了他们，萧十一郎不禁又想起了这神秘而可怕的玩偶山庄。
      chapter: 17
    - text: 他当然也忘不了在那棋亭中，和这绿袍老人的一战，不动的一战。
      chapter: 17
  id: faction_wan_ou_shan_zhuang
- name: 无垢山庄
  aliases: []
  types:
    - 山庄
  description: 连城璧的势力所在,巍峨耸立于群山之中。本章中连城璧回归后以此地为仁义象征,欲令其千秋万世受后人景仰,金剑即陈于其大厅。
  source_refs:
    - text: 无垢山庄。
      chapter: 16
    - text: 无垢山庄本是连家的祖业，就和连家的姓氏一样，本是连城璧一生中最珍惜，最自豪的。
      chapter: 16
    - text: 但我们都还是想不到，你居然将无垢山庄也买了下来。
      chapter: 17
    - text: 无垢山庄现在也已是我的。
      chapter: 18
    - text: 无垢山庄现在也已是我的。
      chapter: 19
    - text: 杜吟苦笑道:"我们本来就是要到无垢山庄去杀你的。"
      chapter: 21
    - text: 自从我的远祖云村公赤手空拳,创建了无垢山庄,到如今已三百年
      chapter: 30
    - text: 我绝不能让无垢山庄的威名毁在我手上
      chapter: 30
    - text: 在人们心目中,这四个字,也只有无垢山庄的连庄主足以当之无愧。
      chapter: 33
    - text: 这柄剑本就是他奉献给无垢山庄的一样。
      chapter: 33
    - text: 无垢山庄巍峨如故,耸立在群山中,也耸立在世人心中。
      chapter: 34
    - text: 从今后,无垢山庄将永远成为人们心目中「仁义」的象征,连城璧三个字,也将永远流传不朽,成为侠中之侠,英雄中的英雄。
      chapter: 34
  id: faction_wu_gou_shan_zhuang
- name: 先天无极派
  aliases: []
  types:
    - 门派
  description: 昔年江湖门派,掌门为中州大侠赵无极,其师弟霍无刚(霍无病)亦为高手。
  source_refs:
