- name: 天宗
  aliases: []
  types:
    - 组织
  description: 一个极秘密、极可怕的组织，并非一人而是许多人。祖师姓天；设宗主一人至高无上，下辖三十六位香主（三十六天罡）与七十二位副香主，入宗须香主推介并经宗主准许。花如玉、谢天石、欧阳兄弟、霍英、杜吟皆为其人；逍遥侯疑与之相关。
  source_refs:
    - text: 天宗本来就不是一个人,而是很多人,是个很秘密,很可怕的组织。
      chapter: 21
    - text: 现在我已知道,那个秘密组织叫'天宗'
      chapter: 22
    - text: 天宗的宗主,至少还是个人。
      chapter: 22
    - text: 天宗的主人约了连城璧在这里相见,他居然也在这里请客。
      chapter: 24
    - text: 风四娘道:'养狗的人,就是天宗的宗主。'
      chapter: 26
    - text: 风四娘道:"我只知道他们一定都是天宗的人。"
      chapter: 28
    - text: 其中是不是还有天宗的属下?
      chapter: 29
    - text: 临阵变节,本是'天宗'大忌
      chapter: 30
    - text: 天宗组织之严密,天下无双
      chapter: 30
    - text: 连城璧道:"这四人中只有一个是真的天宗主人。"
      chapter: 31
    - text: 章横当然也是天宗里的人,否则他为什么要在水下将风四娘船引开,不让她去追踪?
      chapter: 31
    - text: 却说不定会有很多线索——关于天宗的线索。
      chapter: 31
    - text: 天宗里果然是藏龙卧虎,高手如云。
      chapter: 32
    - text: 我一手创立了天宗
      chapter: 32
    - text: 天宗三十六处分堂都是我一手创立的
      chapter: 32
    - text: 你知道不知道谁才是真正的天宗主人?
      chapter: 34
    - text: 谁也不会知道连城璧才是真正的天宗第二代,这秘密势将随萧十一郎同化乌有,永远没有被揭穿的时候。
      chapter: 34
  id: faction_tian_zong
