- name: 割鹿刀
  aliases: []
  types:
    - 武器
  description: 名闻天下的宝刀，削铁如泥，萧十一郎的佩刀。本章经赵伯奇献给连城璧，又由萧十二郎送还萧十一郎，最终被十七郎以一笑换去，刀光皎洁如秋水、滴血不沾。
  source_refs:
    - text: 风四娘动容道:'割鹿刀?'
      chapter: 2
    - text: 江湖中真正看见过割鹿刀的人,至今还不多。
      chapter: 2
    - text: 那次为了割鹿刀,落在独臂鹰王司空曙的手里
      chapter: 3
    - text: 欧阳兄弟都不禁悚然动容:"割鹿刀?" 萧十一郎道:"不错,割鹿刀。"
      chapter: 7
    - text: 就是这柄刀,曾经令天下英雄共逐,刀上也不知染了多少英雄的血。
      chapter: 10
    - text: 萧十一郎手里却有柄吹毛断发,无坚不摧的割鹿刀。
      chapter: 11
    - text: 轩辕三成道:'这就是割鹿刀?'萧十一郎道:'不错。'
      chapter: 15
    - text: 轩辕三成道:'据说这就是天下无双的宝刀。'
      chapter: 15
    - text: 他身上穿着件很宽大的黑丝软袍,用一根缎带系住,上面斜插着一柄刀。
      chapter: 24
    - text: 萧十一郎忽然抽刀而起,随拍而舞。
      chapter: 24
    - text: 割鹿刀,犹在鞘。
      chapter: 25
    - text: 割鹿刀是把杀人如割草的快刀。
      chapter: 29
    - text: 月光照在连城璧手里的刀上,刀光仍然晶莹明亮,宛如一泓秋水,刀上没有血
      chapter: 30
    - text: 果然是天下无双的利器,果然名下无虚。
      chapter: 30
    - text: 包里是一柄刀,一柄名闻天下的刀。割鹿刀。
      chapter: 33
    - text: 宝刀无恙,刀光仍然皎洁如秋水。
      chapter: 33
    - text: 名闻天下的割鹿刀又到了萧十一郎手里。
      chapter: 33
    - text: 世上绝没有任何一把刀的锋利,能比得上割鹿刀。
      chapter: 34
    - text: 夕阳最后一线余辉照在割鹿刀上,刀光闪亮了萧十一郎的眼。
      chapter: 34
