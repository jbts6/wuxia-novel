- chapter: 1
  title: 第一回铁大爷
  summary: 死寂小镇上，装瞎的柳明秋携白犬探路，避过铁大爷所率五十一骑及刀眼绿袍高师爷；铁大爷爱宠实为恶心小老头高师爷。柳明秋以暗号见三婶，入宅与当代四公子江南慕容密谈：铁大爷此行带有弄玉班出身、精于缩骨易容狙击且经伊贺谷忍术的“丝”杀手。夜间死镇灯火复明，高师爷勘定七十丈内二十七处藏身点，铁大爷挑二十七丝士，轿中暗器瞬杀六名未拔刀者，余众亦将为保密而赴死路。慕容与柳明秋论“丝路”——非天山南北丝路，而是丝士心中那条无他则无路的人。
- chapter: 2
  title: 第三回丝士死士
  summary: 铁大爷五十铁骑仅余三十一人：二十七丝士名额外，林家兄弟与青山兄弟可共藏，剩王中平与阿干待死。柳先生向慕容分析局势并称阿干或可比少年楚留香。阿干扑杀绿袍老者（丝路）反被丝网银刺穿喉而死，割头小鬼取其首级；白袍女人拥抱王中平后使其面如兰花枯谢而死，死前诅咒对方必败于某个瞎子。柳先生告知楚留香三个月前已死于林还玉之手。铁大爷与丝路大笑兰花王者之香，决战约在八月十五仲秋月圆夜。
- chapter: 3
  title: 第四回决战夕前
  summary: 慕容在高台俯视因两强火并而被迫离乡的小镇居民。柳明秋识破敌方点灯示在、实以二十九人分二十七处埋伏的计策，主张不必大队人马，只带高手小苏逐一清除埋伏。小苏以赤裸身躯为诱敌武器随行；途中柳明秋突现异状倒下，一红衫白裤梳冲天辫的小孩窜出，以小刀割下其首级逃遁，小苏惊晕。高台上慕容仍对袖袖断言柳先生行动必成。
- chapter: 4
  title: 第五回决战之夜
  summary: 中秋夜边陲小镇灯火通明却空无一人,四海楼铁大老板与丝路先生布下暗卡丝士,等候江南慕容决战。侏儒朱儒回报柳明秋未至,却有白巾蒙面女子袖袖紧随慕容;慕容端坐椅上被人抬来,身后分六组人马,其中有钉手丁子灵与两名方形抬椅人。铁大爷定计先歼第二、三组。另线昆仑白石大屋中,白袍人反复研读卷宗《楚留香之死》,牵涉林还玉、慕容青城、柳上堤等人,直至有人潜入报告「飞蛾」行动已开始。
- chapter: 5
  title: 第六回飞蛾行动
  summary: 多年后有人考证当年八月十五子时开始的“飞蛾行动”。铁大爷以一百零八强弓连珠箭熄灯突袭，意在乱慕容阵脚而非专事斩杀；燕冲霄避箭落入马桶陷阱被刺死，吕慎吕密在盛记厨房被灶中铁条穿腹，虎丘五杰死于特制灯笼中的伏兵，程冻与郭温在棺材店误判埋伏后双双丧命。少年与长者推演战略，领悟行动名取飞蛾乃因慕容使人送死、置之死地，其真正关联最终指向已传死讯的楚留香。
- chapter: 6
  title: 第七回要命的人
  summary: 长街上两死人已被抹去痕迹，慕容安坐，白巾蒙面女子在侧，铁大爷精心亮相与之对峙；铁大爷称要找的是上一代慕容，认定今代慕容计划疏失形同送死。穿插多年后少年与长者论战：推断楚留香或未真死，飞蛾行动旨在置慕容于险境并轰动江湖，以情迫香帅复出；苏苏（小苏）为致柳明秋死命的暗棋，袖袖身份同样神秘。对峙中兰花般火花骤现，铁大爷痉挛，红衫小孩割其首遁去；慕容知真正致命攻击已发动，惟寄望欠命之人及时来救。
- chapter: 7
  title: 第八回杀头红小鬼
  summary: 昆仑隐秘山坳的白石大屋中，苦行僧反复审阅飞蛾行动核心卷宗，详载诱饵林还恩及其父林登、母慕容思柳、孪生姐林还玉与名医叶良士之诊断。子时，碧绿竹衫的绿袍人与拈梅僵硬的红小鬼先后入屋；绿袍人故意引来灰白纸扎轿与抬轿者。绿袍人出屋以青竹竿喷吐碧火将纸轿焚尽，黑衣人却借乌金丝悬空操控巨大火掌反击。脱袍后的绝美绿衣女子以绿袍阻火反卷；苦行僧用纯钢唧筒将金雾黏上乌金丝，借火成海困住防火黑衣人。红小鬼挣断夹关节的铁板，本为割头而来，却先如花痴般抱住绿衣女子并在其腿上重咬一口，随即割下黑衣人头遁去——其收藏的名人头檀香木匣已达一百三十三个。红小鬼并称：飞蛾行动一开始，楚留香便已死。
- chapter: 8
  title: 第九回狼来格格
  summary: 狼来格格（郎格丝）在石屋中赤裸面对苦行僧。苦行僧点破其身份与波斯大君交代的三事——取回乌金丝、杀割头小鬼、探听楚留香生死，并出示粉红卷宗，揭出她与苏佩蓉（苏苏）、李蓝袖（袖袖）同为花凤来之女。苏苏已刺死柳明秋，袖袖与慕容同为针对楚留香的最后杀手；行动真正目的是置楚留香于死地，因其与李红袖、苏蓉蓉、宋甜儿的亲近关系可逼其现身。
- chapter: 9
  title: 第十回一张地图
  summary: 苦行僧向郎格丝展示复现的波斯王室宝藏分布图，自承以六千余人侦察并偷取其心中地图，且欲利用她的财富与身手除掉密约盟友蜘蛛与割头小鬼；郎格丝解释未杀割头小鬼乃因奇异情欲刺激。石屋中忽现兰花香气与午夜红兰花异象。另一线苏苏绞杀柳明秋后晕厥，醒见山崖盛宴，宾主有蓝衫楚留香、独臂人、能饮老太太与华贵主人；苏苏确认楚留香未死，并震惊得知主人即已发财的胡铁花，其为替楚留香报仇而聚财。
- chapter: 10
  title: 第十二回中原一点红
  summary: 席间揭示中原一点红真面目：昔年黑衣快剑杀手，被胡铁花为杀人寻回。金老太太剖析兰花先生以苏苏、慕容、袖袖三人为饵、先除柳明秋再逼楚留香现身并拟借慕容袖袖反杀的精密计划；众人识破却因顾虑三人安危不敢轻揭。楚留香原则不改，仍决意去救慕容与袖袖；苏苏疑柳明秋之死亦是圈套，而兰花本人姓名性别武功仍一无所知。
- chapter: 11
  title: 第十三回论战·飞战
  summary: 后人视角下，清矍老者与求知少年在古厝中论及被后世称为「飞战」亦或「非战」的那一战：行动本名飞蛾行动，因参与者皆有飞义而得名；老者指出战未开打一方已败，败者并非香帅——兰花先生本欲置楚留香于死地，却因关键失误彻底失败，香帅救出慕容与苏苏。真正关键在于挖出兰花先生真面目，否则其必与组织脱离并消失。少年提出其弱点「就在午夜，就在兰花」：江湖传言此人月圆夜午夜现身且带兰花香，名气反成包袱；并对照香帅郁金香香气与洁僻、鼻疾的传奇由来。
- chapter: 12
  title: 第十四回兰花传奇
  summary: 长者纠正少年：兰花先生的月圆午夜与兰花香气过分明目，更可能是烟幕与陷阱；枭雄败则断腕消失。飞蛾行动中楚留香为查清身份、当面一决，宁败不许胜，赌兰花先生胜后会先“享受”再杀。行动结局被埋成武林近百年四大疑案之一，可比沈浪忽然失踪。少年推断香帅隐瞒结局是因不愿世人知道对方即兰花先生——必是与他极亲密、极不寻常之人，或实为女身，早料他如飞蛾扑火。郎格丝公主失望而返，铁大爷只是铁傀儡；割头小鬼被锁箱沉江后空箱留字：“饮不完的杯中酒，割不尽的名人头。”
