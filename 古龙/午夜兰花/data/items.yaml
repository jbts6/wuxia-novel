- id: item_bao_zang_fen_bu_tu
  name: 宝藏分布图
  aliases:
    - 地图
    - 图
  types:
    - 其他
  description: 波斯大君调查制成的中土埋藏宝藏地图，标有X处为财富埋藏处；大君交予郎格丝后被其心记并销毁，后又被苦行僧以特别方法复现于纸上。
- id: item_bo_si_pu_tao_jiu
  name: 波斯葡萄酒
  aliases: []
  types:
    - 其他
  description: 楚香帅最喜的冰镇酒，以色如血、用极透明杯子盛载著称。
- id: item_chuan_yi_jing
  name: 穿衣镜
  aliases: []
  types:
    - 其他
  description: 绿衣女子自波斯王宫专船运来的镜子，供她观看自身肌肉跃动，为其惟一享受。
- id: item_chun_jin_de_feng_huang
  name: 纯金的凤凰
  aliases: []
  types:
    - 饰品
  description: 章末老者郑重交给少年的纯金凤凰。
- id: item_diao_ling_jian
  name: 雕翎箭
  aliases: []
  types:
    - 暗器
  description: 铁大爷一百零八名擅射连珠的弓箭手所配之箭，每人三十六根，密令一发弓弦齐响。
- id: item_hei_se_de_jin_shen_yi
  name: 黑色的紧身衣
  aliases: []
  types:
    - 防具
  description: 黑衣人所穿，可防火。
- id: item_hei_se_mian_ju
  name: 黑色面具
  aliases: []
  types:
    - 防具
  description: 黑衣人所戴，可防火。
- id: item_ji_tong
  name: 唧筒
  aliases: []
  types:
    - 暗器
  description: 苦行僧所备纯钢唧筒之一（共十三支），喷出黄金色水雾，黏附于乌金丝后遇火燃烧。
- id: item_jing_shi
  name: 镜室
  aliases: []
  types:
    - 其他
  description: 苏蓉蓉为楚留香建造的房间，与易容相关布置相连。
- id: item_kong_ming_deng
  name: 孔明灯
  aliases: []
  types:
    - 其他
  description: 铁大爷带来的人在死镇可悬灯处排起的“气死风”孔明灯。
- id: item_lian_zi_sao_dao
  name: 练子扫刀
  aliases: []
  types:
    - 武器
  description: 郭温所用刀，刀长二尺八寸，练子长短由心，可作飞刀取人首级于百步外，用刚劲。
- id: item_lu_se_mian_ju
  name: 绿色面具
  aliases: []
  types:
    - 其他
  description: 狼来格格曾戴的诡秘可怖绿色面具。
- id: item_mei_hua
  name: 梅花
  aliases:
    - 梅枝
  types:
    - 暗器
  description: 红小鬼手拈的鲜艳梅枝；以指弹使五朵花瓣飞旋入屋作为行踪/传讯。
- id: item_mian_tie_ruan_dao
  name: 缅铁软刀
  aliases: []
  types:
    - 武器
  description: 程冻所用四尺二寸精钢百炼软刀，平时绕腰两匝，用时一抽迎风而挺。
- id: item_ming_zhang
  name: 明杖
  aliases: []
  types:
    - 其他
  description: 盲者点路所用、白色已变灰的手杖。
- id: item_qing_zhu_gan
  name: 青竹竿
  aliases:
    - 青竹
  types:
    - 武器
  description: 绿衣人/绿袍人所拄所持，比人更长四尺、梢带青竹叶；可点石阶传讯，亦可燃起碧绿火焰光束攻击。
- id: item_ren_pi_mian_ju
  name: 人皮面具
  aliases: []
  types:
    - 其他
  description: 中原一点红所戴惨白面具，仅露出一双锐眼。
- id: item_si_wang
  name: 丝网
  aliases: []
  types:
    - 其他
  description: 飞蛾行动中的关键布置，柳先生若破网则行动功败垂成。
- id: item_tan_xiang_mu_xia
  name: 檀香木匣
  aliases: []
  types:
    - 其他
  description: 割头小鬼收藏人头的木匣，内置石灰与十七种药物，匣上刻死者姓名；至此已有一百三十三个。
- id: item_wu_jin_si
  name: 乌金丝
  aliases:
    - 乌金的丝
    - 金丝
  types:
    - 其他
  description: 自波斯王宫流入中土的乌金丝，有弹力韧性且刀斧难断；黑衣人用以自悬循环发力，造成悬空与超常动作。
- id: item_xiao_dao
  name: 小刀
  aliases: []
  types:
    - 武器
  description: 红衫白裤冲天辫小孩所持，寒光闪闪，用以割下柳先生脑袋。
- id: item_xiao_tong_luo
  name: 小铜锣
  aliases:
    - 轻锣小锤
  types:
    - 其他
  description: 盲者招徕客人的小铜锣及轻锣小锤。
- id: item_yin_ci
  name: 银刺
  aliases:
    - 银色的刺
  types:
    - 暗器
  description: 绿袍老者所用银色细刺，可化丝反搭后脑，刺穿阿干咽喉后颈。
- id: item_yu_jin_xiang_de_xiang_jing
  name: 郁金香的香精
  aliases: []
  types:
    - 其他
  description: 楚留香因鼻子有毛病、怕身上有怪味，从一个很遥远的国度捎来的带着郁金香气息的香精。
