- chapter: 1
  title: 第一回一碗奇怪的面
  summary: 江南春雨夜，陋巷面摊以金花、银花、珠花三碗面为暗号试探来客武功；青衣人与铁剑方正门下年轻人先后试剑通过。独臂人欲杀年轻人，被老板娘拦下。举止闲适、只喝酒不吃面的人扶走试剑失败的焦林后，老板娘道破此人是从未败过的楚留香，众人悚然变色。
- chapter: 2
  title: 第二回 纯丝手帕上的新月
  summary: 楚留香将焦林安置在友人家后宅小院暂避，焦林点出面摊杀手极危险并认出楚香帅。楚留香提及要去树上救老友，焦林断定是胡铁花，又以亲生女儿新月胎记手帕相托。楚留香赴深山狗窝，却见胡铁花安然无恙，窝中豪奢，并有四名美女相伴。
- chapter: 3
  title: 第三回怜香惜玉的人
  summary: 楚留香在狗窝见胡铁花与美酒美女同乐，识破酒中迷药与破绽，卸下大眼睛少女手腕、以白玉杯与翡翠戒指制住其余女子。最娇小者抽短刀挟持胡铁花，被楚留香以气势逼退，并救走中药的胡铁花到池中解酒。胡铁花自承因四女而中计，又反教她们骗楚留香入套；他声称要替身份极高的朋友护送其女——当今天子御封正牌公主——嫁给纵横七海的天正大帅史天王。楚留香由此悟出小面摊老板娘花姑妈召集黄病夫、黑竹竿等杀手，是为阻这门亲事；二人都不愿公主嫁给被比为猩猩的史天王。胡铁花要楚留香护送自己去见公主之父，楚留香答应但要求分路而行、途中不得揭穿其身份。
- chapter: 4
  title: 第四回胭脂·宫粉·刨花油
  summary: 春日长街上，楚留香入崔大娘老店易容为白胡子小老头，胡铁花在茶馆被四名小姑娘以假夫妻与舆论胁迫带走。江边四女亮出刀、剑、判官笔与分水峨嵋刺，凭短兵险招与周身抹油逼得胡铁花被动；楚留香现身后四人跃江而逃。楚留香说明对付自己的乃铁剑先生被逐弟子，受雇不知雇主是谁，并决定再易容分头行动以护胡铁花。
- chapter: 5
  title: 第五回富贵客栈
  summary: 夜宿富贵客栈的胡铁花闻隔壁煎治伤药，墙破后见只剩半身的硬汉黑竹竿被蛇鞭、长剑、雁翎刀、分水峨嵋刺四路围攻，愤而掷酒坛出手。白面书生白云生以折扇与点穴制住胡铁花；屋脊上花姑妈点出胡铁花要护送玉剑公主去史天王处，白云生自承为史天王干儿子，率众退去。胡铁花认出花姑妈，为黑竹竿敷伤；黑竹竿退还十万两大通银票并劝勿再刺史天王，言及黄病夫惨死。楚留香一直在附近屋顶饮酒，瞥见施展猫遁的伊贺忍者掠过，身形潇洒掠过客栈却未现身饮酒。
- chapter: 6
  title: 第六回梁上君子
  summary: 楚留香潜入富贵客栈跨院，发现神秘忍者实为扶桑女子樱子；银箭公子薛穿心随之而入。樱子曾将一名胸印新月的大姑娘装入樟木箱劫来，楚留香趁樱子诱走薛穿心时盗箱，交常胜镖局何玉林看守并嘱以焦林丝帕相认。及至返回，镖局众人死醉倒地，箱中人变为何玉林尸体并留血书。薛穿心承认非己下手，却在言及焦林后突袭楚留香；楚留香避过银箭拳掌并点其臂关节，又扣其脉门阻其自尽，终被薛穿心口喷轻烟制倒。
- chapter: 7
  title: 第七回出价最高的人
  summary: 花姑妈笑缠胡铁花，承认指使刺杀史天王以破玉剑公主婚事，并自认与杜先生一方有关。薛穿心携特大樟木箱到场，先戏称箱中是楚留香，后对花姑妈承认箱中确为知其机密并与焦林有关的楚留香，花姑妈劝杀，薛穿心因曾被其相救而拒绝。薛穿心开价十万两拍卖箱子，樱子出十一万、胡铁花以两坛酒作价二十万、樱子再加至三十万。箱中楚留香自行起身，自报出价三千万两，揭示其故意中迷香与点穴以探听薛穿心、花姑妈均为杜先生之人且关键在焦林之女；箱子随即碎裂。楚留香迫使樱子以三十万两银票珍珠买下碎木，银两交薛穿心分给万胜镖局遗族与黑竹竿；又逼花姑妈一时辰内备叶财记马车、快马堂马夫与雪宜斋酒菜，目标直指玉剑山庄杜先生。
- chapter: 8
  title: 第八回神秘的杜先生
  summary: 楚留香独赴玉剑山庄，得见神秘杜先生竟是清丽中年女子；杜先生以山茶花枝突刺其目，反被楚留香内力化解，自认首败于男人。胡铁花在花姑妈处痛饮花雕，扬言若害楚留香便让庄中血流成河。楚留香循新月琴声登小楼，见箱中女子新月自承即玉剑公主、杜先生之女，并称心甘情愿嫁史天王，命其永别。楚留香向胡铁花道破：杜先生为朝廷特使、焦林前妻，以女和亲安抚海上史天王；他佯装退缩实欲独拼史天王，被胡铁花识破，二人握拳相约各自拼命。
- chapter: 9
  title: 第九回暴雨中的杀机
  summary: 暴雨中楚留香感应杀机，故意走上无人山坡，以假滑倒诱出伊贺第一忍者春雷伊次的必杀一刀；斩空后楚留香隐于暗中反制，伊次精神崩溃，被暗林叹息点破未战已败后切腹自尽。樱子现身邀楚留香掌灯时赴忘情馆。馆中东瀛老人石田斋彦左卫门自承派伊次试探，并以满箱珠玉雇楚留香杀史天王以报霞姬被夺之私怨，楚留香借小情当众拒贿赶客。事后樱子潜入马车，道破曾窃听楚留香与人饮酒密谈，自承为石田斋偷走玉剑山庄公主，并愿助楚留香登上史天王大海船天王号；楚留香却将她抛出车厢。
- chapter: 10
  title: 第十回事如春梦了无痕
  summary: 楚留香梦醒车中，被无舌大汉老熊以诈抓架至密林水阁；新月自承特法请客，袒露赤红新月并与楚留香缠绵，嘱其寻史天王传话且恐此后相忘。长江野渡，白衣装的樱子呼楚香帅上船，石田斋彦左卫门以菊正宗相待，诱其破坏史天王与杜先生联姻、同赴世外桃源，遭拒后以筷作剑成青眼之势。楚留香倒酒间真气循环流转、生生不息，势成浑圆无极，石田斋无把握不敢出手；神秘第三者点破渔翁之利，双方罢手，楚留香离去。另线花姑妈以巨杯饯别胡铁花，责其大嘴巴走漏行踪，警示白云生剑法可畏。
- chapter: 11
  title: 第十一回最难消受美人恩
  summary: 楚留香掠出石田斋船舱，遇白衣人白云生；白云生将盼盼、阿娇、金娘、楚青、小玉、大乔、情情一并请来，称要送他去见史天王。众女因同处尴尬而冷淡，后悄然离去。人鱼女奉二将军之命再来接他。楚留香登上全为女战士的战船，识破二将军为女人，见猩红大舱中的豹姬将军与黑豹。豹姬坦白因惧公主夺宠，要楚留香利用与护送统领胡铁花的交情去杀玉剑；她以胴体相诱，楚留香心动却拒绝，反请她穿衣或以黑豹、女剑客结果自己，豹姬道出他常说的二字：再见。
- chapter: 12
  title: 第十二回楚留香的秘密
  summary: 楚留香获豹姬释放，在珠宝、酒食清水与濒死白云生三样礼物中选择救人；海上无粮无水之际，靠先前自搜身麻子处摸得的旗花火箭发讯获救。数月后楚留香向胡铁花道出经过，并言及在史天王海上渔村根据地遇见胡开树、司徒平、金震甲、李盾及史天王本人——七人渔装登岸脚印重合，令楚留香震惊其非同常人。
- chapter: 13
  title: 第十三回无法捉摸的人
  summary: 楚留香在渔村木屋见到七位容貌装束完全相同的史天王，无法分辨真身。先到的李盾求镖银公道遭羞辱后自尽；金震甲送礼获允；胡开树被拒，奔船时遭孩童贝壳与妇孺渔网截杀，司徒平先破网再一剑刺死他并投靠史天王。楚留香改杀意、与史天王对饮，酒醒后得知玉剑公主已送去完婚，自认彻底失败。回岸遇黑竹竿、薛穿心与杜先生，却传来公主在洞房夜割下真史天王首级的消息，杜先生宣告成功。
