- chapter: 1
  title: 第一回 有四条眉毛的人
  summary: 楔子分述熊姥姥月圆毒杀镖师、老实和尚凌波追贼后水蛇帮尽死、西门吹雪一剑为赵刚报杀洪涛、花满楼两指夹刀庇护上官飞燕并自承目盲，引出四条眉毛的陆小凤。正文章回写青衣楼铁面判官与勾魂手追陆小凤，途经龙翔客栈与迎春阁见江东四杰被辱，依谜语找到朱停及老板娘；陆小凤以陪酒假象护朱停，两指捏住勾魂手鞭梢。柳余恨、萧秋雨、独孤方突至，击毙铁面判官并废勾魂手。黑衣公主献花跪拜，陆小凤撞破屋顶逃走。
- chapter: 2
  title: 第二回 丹凤公主
  summary: 陆小凤逃至霍老头枣林木屋饮酒，透露美如天仙、保镖为柳余恨、萧秋雨、独孤方的女子曾向他下跪求事。三保镖撞墙砸屋拆房逼迫，陆小凤为一坛酒与之周旋并显身手。五色彩衣小女孩（后知是十二岁的雪儿）以丹凤公主之名求见，猎狗送花篮金子赔屋；陆小凤戏称木椅与陆放翁遗迹无价，众人识破霍老头即富甲天下的霍休。雪儿以金子、美色及花满楼安危诱其上漆黑花车；陆小凤口称不为朋友拼命却仍上车。车中丹凤公主自承寻他七月、花满楼确在彼处（因好人易上当，并提及上官飞燕），不说明所托何事，仅称醒来或可见大金鹏王。
- chapter: 3
  title: 第三回 大金鹏王
  summary: 陆小凤与花满楼得见大金鹏王。王自述金鹏王朝五十年前覆灭、国库四分交重臣东来，并揭上官木即霍休、平独鹤即独孤一鹤（峨嵋掌门兼青衣楼主）、严立本即阎铁珊，要求讨还财富并令其向先王灵前忏悔。陆小凤应承代寻公道，拟先召朱停设机关护宅、再寻西门吹雪；席上丹凤公主以糖水假酒保父体面并吐露家贫。独孤方、萧秋雨因不服来杀花满楼，练子枪与无风声断肠剑俱败，长剑被夹断。花园中上官雪儿担忧失踪的上官飞燕，甚至怀疑花满楼与老王爷；花满楼对飞燕心事渐露，夜宴气氛愈发神秘。
- chapter: 4
  title: 第四回 盛宴
  summary: 大金鹏王设宴款待陆小凤与花满楼；陆小凤以五千两银票花押约朱停，并决意自寻西门吹雪。夜半上官雪儿潜入陆小凤房中被识破，随即撞见上官丹凤，丹凤伤感离去。次日陆小凤、花满楼寻孙老爷，经老实和尚与欧阳情线索至潇湘院赎回孙老爷，再由孙老爷引入山窟问大通大智，证实金鹏王朝覆灭及四臣东来等事，并得「没有法子」打动西门吹雪之答。上林春酒肆中血人萧秋雨惨死于陆小凤前，黑马车内留银钩与「以血还血」血书；陆小凤认定青衣楼恐吓反成大金鹏王之利，决意强邀西门吹雪，必要时火烧万梅山庄。
- chapter: 5
  title: 第五回 悲歌
  summary: 陆小凤与花满楼至万梅山庄，陆小凤以刮须之约说动西门吹雪同行。山坡夜闻悲歌，两人寻至山神庙，花满楼认出上官飞燕歌声与发丝，却发现独孤方被判官笔钉死并留血书警告。村店中雪儿以金燕子指控上官丹凤用飞凤针杀人，柳余恨却现身接雪儿回府。霍天青随后送帖，邀二人赴阎府。
- chapter: 6
  title: 第六回 珠光宝气
  summary: 霍天青在四面荷塘的水阁宴请陆小凤与花满楼，陪客有阎家西席苏少卿与镖头马行空。大老板阎铁珊到场后，陆小凤当众点破其即昔日金鹏王朝内库总管严立本，阎铁珊拂袖欲去。西门吹雪白衣拦路，连斩护卫高手；马行空袭花满楼反被流云飞袖掷入荷池，苏少英以峨嵋剑法与刀剑双杀七七四十九式挑战亦死于西门剑下。阎铁珊珠光暗器突袭未遂，人影遁走又被陆小凤追回；丹凤公主自荷塘跃入，背后一剑刺死阎铁珊，自承为大金鹏王公主来算旧债。西门吹雪斥其背后用剑不当，折剑离去。霍天青迁怒陆小凤，约其日出青风观领教双飞彩翼与心有灵犀一点通。
- chapter: 7
  title: 第七回 市井七侠
  summary: 陆小凤回客栈与花满楼、丹凤公主议霍天青日出决斗，知霍天青乃天禽老人晚年后嗣、商山二老小师弟，辈分极高。夜中市井七侠与关中大侠山西雁现身：山西雁说明门规与香火之重，欲劝陆小凤先走以免同门血战；丹凤公主疑其逼战，山西雁与卖包子小贩反以自尽明志。陆小凤半截牙筷断钢刀，表明本愿离开，邀山西雁、樊鹗、简二先生等出城吃赵大麻子狗肉，一场死斗暂解。
- chapter: 8
  title: 第八回 司空摘星
  summary: 霍天青快马送信改约，称金鹏旧债随时可清，众人于荒村小店以义气下酒。暴雨中十余骑投硝磺霹雳弹火攻小店，陆小凤入火寻赵大麻子后脱身。司空摘星现身，揭穿自己易容假扮赵大麻子等候陆小凤，已砍下放火者十余只手，并称有人出二十万两要他偷走上官丹凤，因感陆小凤救火之谊而不再下手，将伤者留给陆小凤追问来历。
- chapter: 9
  title: 第九回 峨嵋四秀
  summary: 暴雨后十余具青衣楼尸体被灭口，陆小凤与上官丹凤推断真凶杀人灭口。陆小凤沐浴时遭峨嵋四秀挟问苏少英之死与金鹏旧案，得悉独孤一鹤已至珠光宝气阁并邀次日便餐。西门吹雪现身院中，石秀雪拔剑欲战，花满楼两指夹剑化解，西门吹雪一剑断树而去。陆小凤与花满楼推断霍休即上官木、独孤一鹤即严独鹤，并忧西门吹雪难敌刀剑双杀。夜，独孤一鹤在阎铁珊灵堂与霍天青以内力对拼后力衰，又被西门吹雪以严独鹤之名逼战，双方拔剑。
- chapter: 10
  title: 第十回 飞燕去来
  summary: 峨嵋四秀在车上调侃对陆小凤、花满楼、西门吹雪的好感。陆小凤与花满楼赶来时，西门吹雪已杀独孤一鹤，并自述对方三十招后剑法突乱、临死称“我明白了”。众人在桑林外小酒店相遇，西门吹雪当众承认连杀苏少英与独孤一鹤；孙秀青为师拼命，双剑被夺。窗外乌光毒针刺中孙秀青与石秀雪，西门吹雪抱孙秀青追入桑林，马秀真、叶秀珠跟去。石秀雪中毒死在花满楼怀中；上官飞燕自后窗现身，透露被人胁迫劝花满楼罢手，随即离去，留下花满楼独自面对黑暗与伤痛。
- chapter: 11
  title: 第十一回 迷楼
  summary: 霍天青在珠光宝气阁夜候陆小凤,告知独孤死与西门吹雪之剑有关,并转交威胁信称丹凤难求;两人饮酒时霍天青提及邻居霍休及其山上机关小楼。花满楼称见过被操控的上官飞燕并猜黑手为霍休;二人推断霍休小楼或即青衣第一楼,上山循字入迷楼,误入山腹见刀枪珠宝与四名自称大金鹏王的疯老人,钟声后趁隙纵入,得见布衣温酒的霍休。
- chapter: 12
  title: 第十二回 第六根足趾
  summary: 陆小凤与花满楼在山窟会霍休，霍休承认本名上官木、为金鹏重臣，反称当年小王子失约躲避，并授六趾辨伪之法，言及易容高手与司空摘星盗丹凤未果。叶秀珠告知青衣第一楼在珠光宝气阁后山。再见大金鹏王时其双腿已由柳余恨自膝切断焚毁，无从验趾。陆小凤与雪儿掘出毒死的上官丹凤尸，脚确有六趾；再闯王居发现假王已死。柳余恨突袭被陆小凤夹剑，上官飞燕现身自承冒充丹凤、布局夺财后令柳余恨自尽，并以花满楼、朱停为人质要挟陆小凤杀西门吹雪，不料花满楼已解穴旁听；二人放走飞燕后她即被灭口。陆小凤一度认定主谋为霍天青，约战青风观，霍天青却先死于毒酒，道观随即被焚。最终陆小凤判明真正主谋是霍休——青衣一百零八楼总瓢把子，其护财杀众、利用飞燕与霍天青及陆小凤；山腹铁笼反困霍休，朱停开门，雪儿以食敲诈，事件收束。
- chapter: 13
  title: 第一回 绣花的男人
  summary: 镇远镖局副总镖头常漫天护送八十万两镖银,路遇大路上绣花的大胡子,对方以绣花针刺瞎老赵与常漫天等人。平南王府总管江重威入宝库取明珠玉璧时,同样撞见紫红棉袄大胡子绣黑牡丹,十三太保横练与铁砂掌不及施展即被刺瞎,十八斛明珠被盗。苦瓜大师素斋上,陆小凤因输给司空摘星挖了十天蚯蚓;席间透露近来最出风头者是会绣瞎子的绣花大盗,月内连作六七十案。金九龄现身,以司空摘星激将,使陆小凤主动接下查案。三人商定分头行动:金九龄与花满楼访常漫天、江重威,陆小凤携黑牡丹红缎去寻最漂亮的母老虎。
- chapter: 14
  title: 第二回 不绣花的女人
  summary: 陆小凤上山寻薛冰，遭两丫头以剪刀突袭，得薛冰拦下。他请薛老太太鉴定红缎子，确认为京城福瑞祥货、福记丝线所绣女工鞋面。薛冰以红鞋子秘密要挟同行。途中酒肆遇醉汉孙中调戏，薛冰砍其手；陆小凤两指拗刀震退对方同伴。店伙实为司空摘星，欲偷绣黑牡丹的红缎子以还人情，二人约赌夜间行窃。
- chapter: 15
  title: 第三回 偷王的赌约
  summary: 司空摘星与陆小凤赌约偷红缎子。薛冰透露红鞋子是全由女子组成的秘密组织。司空摘星以掉包偷走真缎子，又用酒杯假毒装中毒，逼陆小凤送自己到笔霞庵以便交差；途中薛冰失踪，桌上卤牛肉碟出现孙中断手。庵中陆小凤见到失明的江重威与住持江轻霞，司空摘星趁机溜走。江重威称宝库中那人武功极可怕，不愿透露更多。
- chapter: 16
  title: 第四回 女道人
  summary: 庵堂中江轻霞与陆小凤打情骂俏时薛冰现身,承认受司空摘星所托将绣黑牡丹的红缎子放在吕洞宾神像下。陆小凤取回缎子后质疑江轻霞,揭穿其并非江重威亲妹而是未过门妻子;又发现其青布鞋内藏红缎鞋,江轻霞出手逃离。陆小凤判断她武功尚不足一招刺瞎常漫天、华一帆,故非绣花大盗,却与红鞋子秘密有关。为查王府劫案,陆小凤决意亲闯王府,与薛冰至五羊城黑街寻蛇王索要守卫暗卡详图,约于如意客栈交付;图至后陆小凤独自前往,薛冰含泪目送。
- chapter: 17
  title: 第五回 绣花大盗
  summary: 陆小凤夜入王府探宝库，屋顶铁网密闭无路；叶孤城以天外飞仙试剑，被其两指夹锋。金九龄、花满楼现身，酒窖线索指向江轻霞与绣花大盗同组织。薛冰寻陆小凤时护卫遭绣花大盗式杀害、本人失踪。蛇王吐露仇人公孙大娘（多化名、必穿绣猫头鹰红鞋），约于月圆西园；陆小凤与蛇王约定互助。
- chapter: 18
  title: 第六回 要命的约会
  summary: 陆小凤于西园月夜寻找穿红鞋子的公孙兰，雇卖糖炒栗子的老太婆协助，却识破对方即公孙大娘：毒栗子、双短剑与绝顶轻功险些取其性命，公孙大娘借茶楼人群脱身。蛇王手下陆广带来薛冰下落，陆小凤与金九龄、鲁少华在麦家饼店后空屋发现薛冰白衣与衣柜中多套易容衣物、红缎荷包中的精钢绣花针，推断公孙大娘即绣花大盗与月圆杀人的熊姥姥，并关联江轻霞打钥匙模型的时间线；鲁少华飞鸽传书南海孟伟查巢。陆小凤再访蛇王楼，发现蛇王已被鲜红缎带勒死，遂决心斩杀公孙大娘。
- chapter: 19
  title: 第七回 小楼凤劫
  summary: 陆小凤与金九龄寻访公孙大娘，途遇老实和尚得悉其极美却无下落。城中旧屋灶内搜出藏毒烟的木头匣子，金九龄中计重伤；盖文指向阿土。陆小凤忍饥盯梢阿土至荷塘小楼，窥见红鞋子组织二娘、三娘、欧阳情、江轻霞、六姐、七娘与阿土聚会交割黄布包袱，终被识破请入。
- chapter: 20
  title: 第八回 千奇百变
  summary: 陆小凤在饿极受嘲中反拧红衣少女为质，遭公孙大娘姐妹刀剑鞭围攻，阿土以杯筷相救并自承即公孙大娘、绣花大盗，道破曾易容布下霍休机关。陆小凤要约其随行，公孙大娘约三阵定胜负：比酒陆小凤空腹佯醉认输；比剑公孙大娘着七彩霓裳演剑器武技，陆小凤借青衣女尼短剑以天外飞仙削断彩带获胜；比轻功三人同装分途诱追，陆小凤凭气味扣住敲锣大汉——真正的公孙大娘，终使其依约随行并令姐妹不得妄动。
- chapter: 21
  title: 第九回 田 路
  summary: 陆小凤夜访孟伟,以飞鸽传书约金九龄于蛇王旧楼子时见面,并称已押解公孙大娘。金九龄在小楼坐享美酒,接收陆小凤送来的大箱子;箱中昏迷的公孙大娘美艳惊人,臂上有云形紫红胎记。陆小凤告知已逼她服下独门迷药「七日醉」,并将她交予金九龄,嘱其逼问薛冰下落,自己则因白云城主叶孤城与西门吹雪紫金山之约赶赴金陵。金九龄用绿绒小轿与鲁少华黑漆马车将她转入西城糊裱店暗道中的精舍,以蛇试探并逼她亲笔承认绣花大盗身份。公孙大娘反指真正绣花大盗即金九龄本人,逐条拆穿他以红缎子、司空摘星、蛇王、薛冰、阿土与假中毒等布局嫁祸红鞋子姐妹;金九龄坦承后欲杀她灭口,回头却见陆小凤微笑现身。
- chapter: 22
  title: 第十回 破 案
  summary: 陆小凤现身金九龄密室，逐条拆穿假飞鸽、蛇王未燃灯、缎带与衣裳气味、孟伟反常及红缎拆线等漏洞，证明金九龄才是绣花大盗。他与公孙大娘联手置她于死地诱供，并由欧阳情、红衣少女带来被刺瞎的常漫天、江重威、华一帆作证。金九龄以薛冰下落为饵约陆小凤决斗，大铁椎对绣花针后破墙脱逃，途中借红鞋子姐妹拦截；陆小凤两指夺剑掷穿其心。金九龄死前暗示薛冰已死。尾声中公孙大娘揭穿二娘为内奸，陆小凤劝止其自尽后离去，并约定八月十五紫金山观剑决。
- chapter: 23
  title: 第一回 两雄相遇
  summary: 九月十三凌晨，京城大豪李燕北晨巡时责问快意堂堂主孙冲违令售刀剑弓箭，旋即遭乌篷车黑衣弓箭手伏击；孙冲被他用作挡箭射死。陆小凤以两枚铜钱金钱镖割断二十八张弓弦解围。二人边食豆汁边谈：李燕北与城南杜桐轩以地盘及六十万两赌西门吹雪对叶孤城九月十五一战；叶孤城据老实和尚消息已中唐天仪毒砂，赌盘剧变，昨夜京城多人因此被杀。澡堂中擦背人巾上有毒，神秘人影揭破并约至春华楼。杜桐轩亲至李燕北地盘送解药，反将赌注加码至三博二并击掌为信；六女洒菊后白云城主叶孤城现身，以天外飞仙废唐天容双肩，证明未死。李燕北信心动摇，陆小凤约晚间赴十三姨处，并欲寻花满楼与老实和尚、西门吹雪。
- chapter: 24
  title: 第二回 斯人独憔悴
  summary: 九月十三午后，陆小凤在京城游荡，避见珠宝市中的欧阳情，遇木道人与古松居士，同赴城外荒废窑场会见孙老爷。窑中以大通、大智之名答问收五十两银子，预言九月十五西门吹雪与叶孤城两败俱伤。问及杜桐轩身边黑衣人时，吹竹声起，赤红毒蛇窜出，孙老爷喉上两点黑血身亡；陆小凤断定大通大智皆为孙老爷一人，毒蛇乃受训受控而来。棺材店中，驼背客人已订楠木棺材并要刻叶孤城、西门吹雪之名。春华楼中，独孤一鹤门下严人英持剑逼问西门吹雪下落，街上传来张英风尸身伏于白马；陆小凤认其死于西门吹雪绝顶剑法。杆儿赵称此等白马惟皇城所有。陆小凤越墙入卷帘子胡同李燕北公馆，见其整理账簿备败退，席间会十三姨，得知欧阳情在厨做酥油泡螺；忽又闻与窑场相同的吹竹声，陆小凤穿窗冲出欲救欧阳情。
- chapter: 25
  title: 第三回 废园异事
  summary: 陆小凤在废园抓住吹竹哨的孩子小可怜，两指捏住应声而至的赤红毒蛇；发现被缎带勒死的驼背老头子实为易容的公孙大娘。欧阳情亦遭毒蛇咬伤，李燕北点穴暂阻毒性。胜通为报恩引见，献上叶孤城脓血白布带并指明藏身破庙。陆小凤探望重伤的叶孤城，得知其因吹竹声与毒蛇干扰被唐天仪暗器所伤，仍决意如期在紫禁之巅与西门吹雪决战；并得知西门吹雪因孙秀青有孕曾求改期、现已秘密安顿妻子。
- chapter: 26
  title: 第四回 北斗七星阵
  summary: 九月十四凌晨，李燕北独自晨行，向陆小凤坦言已将地盘、产业与帮会龙旗令符让予白云观主顾青枫，换取杜桐轩赌注了结与举家南迁。陆小凤赴白云观，遭黄冠道人北斗七星阵围杀并见树上皮书「小凤飞来，死于树下」；他托肘破阵后，又被富贵神剑殷羡以玉女穿梭刺向咽喉，以灵犀一指夹剑化解。木道人、顾青枫现身称此为试探玩笑；殷羡自承不及叶孤城天外飞仙，顾青枫透露紫金之巅即紫禁之巅且明日月圆可观。禅房中李燕北旧部已归新主，陆小凤借故揪走杆儿赵，实为私下寻问线索。
- chapter: 27
  title: 第五回 初入禁城
  summary: 九月十四上午,杆儿赵经太监安福(小安子)带陆小凤潜入紫禁城西北角太监窝,追查白马与张英风之死。小安子打听得知麻六哥前天晚带回一神气小伙子。陆小凤以一万两银票逼问,王总管喝令群殴;乱中麻六哥被刀刺死灭口。陆小凤旱地拔葱破顶、细胸巧翻云上城,遇老实和尚——和尚称张英风为其外甥。大内魏子云、屠方、丁敖、殷羡四高手围堵,免其擅闯与杀人罪,却迫他收下六条波斯缎带,负责挑选除白云城主与西门吹雪外的六名明夜观战者,无带擅入格杀勿论。陆小凤先抛一条给老实和尚,并苦恼其余名额如何分配。
- chapter: 28
  title: 第六回 第一根线
  summary: 欧阳情昏睡未醒，陆小凤吃下她炸的酥油泡螺后被十三姨迷倒；西门吹雪及时相救，告知李燕北已被十三姨刀杀焚尸，十三姨图谋一百九十五万两银票，西门吹雪未杀她。陆小凤得知西门吹雪已娶孙秀青为西门夫人，隐居合芳斋，并要他明日陪赴紫禁城。二人往寻负伤的叶孤城，却发现胜通被勒死、叶孤城已走。陆小凤梳理线索，推断吹竹弄蛇者连伤叶孤城与欧阳情、害死孙老爷并勒死公孙大娘与胜通，最可疑者为谎称与欧阳情有染的老实和尚，并牵出青衣楼、红鞋子、白袜子与京城赌注布局；又因张英风咽喉剑伤之死未解，与西门吹雪赶往全福客栈，得知严人英已携喇嘛赴天梁坛火葬。
- chapter: 29
  title: 第七回 天坛之夜
  summary: 天坛大殿夜深恶臭，陆小凤与西门吹雪遭遇箱中伏兵与两名怪异喇嘛。西门吹雪刺伤黑衣剑客并斩杀狞笑喇嘛，陆小凤双指夹剑、弹落九枚飞环；另一喇嘛逃遁，箱中之人吓死。西门吹雪认出其剑法为海南剑派龙卷风，对方冒充圣母之水峰剑客。殿后救出被海南手法点穴的严人英，旁有张英风尸体。严人英供出假帮手反手灭口，并交出张英风临死捏成的三尊蜡像，陆小凤认出王总管与麻六哥，第三人被压扁。二人推断张英风撞破太监窝秘密遭灭口并被嫁祸。严人英释然抱师兄尸体离去。陆小凤拟寻泥人张修复蜡像以查明第三人。
- chapter: 30
  title: 第八回 奇异老人
  summary: 陆小凤为揭破阴谋，携蜡像赴金鱼胡同找泥人张复原。他在太和居遭开天掌卜巨与唐天纵以玉璧、毒蒺藜要挟交换缎带，拒换并戏弄二人后离去。取回的蜡像竟是西门吹雪之脸；再返发现泥人张一家四口已被杀弃井，两名假泥人张以掉包嫁祸与泥人中机簧毒针连环行刺，陆小凤以蜡像挡针，老实和尚撞晕刺客，刺客却因僵尸木魅散化尸。章末唐天纵跪磕三头换得缎带，欲寻叶孤城。
- chapter: 31
  title: 第九回 难得糊涂
  summary: 陆小凤肩扛剩余缎带上街，司空摘星易容偷走一条后掠屋而去。饭馆中司马紫衣弟子胡青与司马紫衣先后以借换、五万两银票索缎带，胡青拔剑被筷子夹住剑尖并被师门削断佩剑；司马紫衣刺肩井穴亦被陆小凤两指夹住，反获赠缎带。陆小凤再以揭穿逛妓院故事，用两条缎带换得老实和尚馒头并嘱转交木道人。合芳斋中欧阳情指认王总管蜡像，透露其曾约海南派剑客密会，陆小凤理出灭口线索；又发现自己未留缎带，冲出寻索。孙秀青与西门吹雪在秋夕相依，欧阳情忧其有情后能否再以无情剑法胜叶孤城。
- chapter: 32
  title: 第十回 月圆之夜
  summary: 九月十五月圆之夜，陆小凤自合芳斋寻回司空摘星归还的缎带，告别孙秀青与欧阳情赶赴紫禁城。杜桐轩与卜巨先后拒收所赠缎带。玉带桥下汇合老实和尚、木道人、司空摘星、唐天纵、卜巨等，殷羡引入太和殿；殿顶缎带人数暴增，魏子云加强戒备。陆小凤于内阁房勉励西门吹雪恢复信心，又助卜巨以上殿。子时叶孤城带伤现身，双方互报剑器并由陆小凤验剑后，西门吹雪见其伤口流血不止拒杀求死之人，凌空离去；叶孤城喷血不支，陆小凤飞跃厉喝住手。
- chapter: 33
  title: 第十一回 深宫惊变
  summary: 唐天纵以追魂砂重创假叶孤城，其人扯下人皮面具，原是杜桐轩旧时黑衣保镖替身，唐门毒砂使其顷刻失语。陆小凤由此悟出王总管可盗缎带，逼魏子云连夜往南书房见驾；殿上紫衣夜行人杀侍卫，被丁敖与殷羡、魏子云、陆小凤联手尽灭。南书房中，王安引容貌酷似的南王世子行李代桃僵，鱼家兄弟奉召以飞鱼七星剑护驾，真叶孤城现身一剑破阵。叶孤城欲杀手无寸铁的皇帝时陆小凤闯入，叶孤城穿窗逃亡，于月下与西门吹雪对峙；大内枪林刀山合围，西门吹雪声言愿与叶孤城生死一战，魏子云左右为难，陆小凤自人墙中走出。
- chapter: 34
  title: 第十二回 强敌已逝
  summary: 陆小凤点破渔翁得利之局，魏子云允西门吹雪与叶孤城回到太和殿紫禁之巅决战。叶孤城因心乱暂不能出手，与陆小凤对谈后阴谋尽数揭穿。两人拔剑心剑相搏，西门吹雪最终刺死叶孤城并抱尸欲去；丁敖等以朝廷重犯阻拦，陆小凤与友人挺身相对。圣旨召陆小凤入南书房，众人出宫。尾声九月十六，皇帝与陆小凤饮酒并答应其任意一事，陆小凤所求经司空摘星等人辗转传开，众人一路大笑离去。
- chapter: 35
  title: 第一回 冰山美人
  summary: 秋夜，陆小凤与方玉飞同入银钩赌坊。陆小凤为冷若霜所吸引，追出长巷反遭其耳光；四名大汉掳走冷若霜时被陆小凤击退。冷若霜自报名号，以蒙眼为条件带他往所谓金钩赌坊，实则将其锁入铁板密室，诱饮女儿红后弃于荒野。翌日陆小凤回五福客栈，遭杨捕头以一夜八案人证物证围捕，又被绿袍老人以诸神之子之死逼命；他刀剑相击断兵后脱身。重回荒野有所悟，再闯未开赌的银钩赌坊，制伏大牛与瞎子，扯下狗屁山水后发现暗门地道，门内绝色丽人问他何以此时才到。
- chapter: 36
  title: 第二回 西方玉罗刹
  summary: 陆小凤在银钩赌坊与方玉飞、方玉香及蓝胡子对坐，揭穿夜市流水等声响实为口技腹语与赌场通气孔所造。蓝胡子出示李神童所绘四妻图，称罗刹牌被休妻李霞带走，并托陆小凤前往松花江拉哈苏寻回；牌为西方魔教之宝，原由西方玉罗刹之子玉天宝押在赌坊。陆小凤本欲脱身回京陪欧阳情，却见岁寒三友与杨捕头堵在门外，只得返回认罚酒。蓝胡子承诺找回罗刹牌后交出玉天宝真凶给岁寒三友，并指密门送他上路；末知五十万两先由方玉香赢来又输给蓝胡子。
- chapter: 37
  title: 第三回 缺了半边的人
  summary: 陆小凤投宿天福客栈,被三拨人跟踪:丁香姨、五名持刀剑马客,以及化装老学究的西方魔教护法长老岁寒三友。丁香姨夜访入房,暗器与刺客突袭却被无形力量尽数化解;五名盯梢者翌日以棺抬出,实死于岁寒三友之手。丁香姨自称表姐方玉香(蓝胡子之妻、香香)所派,送来五万两银票相陪。续行时跟踪者增至十人,其中有缺了半边的阴童子(原阴阳童子,为司空摘星所毁半边)。吉祥客栈中有人送来木箱,内装白牙与染血黑带子;陆小凤令丁香姨将箱送交对面岁寒三友,并决定主动去找阴童子。
- chapter: 38
  title: 第四回 意外中的意外
  summary: 陆小凤夜探吉祥客栈跨院,见阴童子以三少女人质相胁,窗外暗器三冰透骨钉先杀少女,又杀逃脱的阴童子;岁寒三友现身,示意其余六名埋伏亦已尽灭。陆小凤回房发现等候者竟是方玉香,丁香姨归来后两人互下杀手,丁香姨射出的亦是三冰透骨钉后遁去。方玉香透露丁香姨原是飞天玉虎之妻,席卷黑虎堂三十万两黄金与书僮私奔,书僮被廖氏五雄所杀,黑虎堂十三人中已死十二,飞天玉虎亦曾现身。方玉香欲以己身换陆小凤手中罗刹牌之交易,陆小凤拒而宿于屋顶。次日丁香姨传信召见,陆小凤见其手足已断,方知飞天玉虎所为;丁香姨自白欲买罗刹牌以成罗刹教主自保,并告李霞约江南贾乐山于拉哈苏交牌,以及西方玉罗刹已死、明年人日昆仑大光明境立新教主等秘辛,又嘱可信老山羊与陈静静。陆小凤离去后秋萍递飞天玉虎信,竟附休妻书将丁香姨'割爱以献',陆小凤回骂要在其鼻上打出屁眼。
- chapter: 39
  title: 第五回 贾乐山
  summary: 陆小凤囊空如洗仍被岁寒三友跟踪，逼得孤松请酒痛饮后醉卧。夜半司空摘星假扮贾乐山利诱威逼，被识破贼味；真贾乐山男扮中年美妇现身，以金银、杀手与美人楚楚劝其回头。陆小凤两指夹住黑衣人杀手剑、内力弹回梁上客满天花雨，并点破贾乐山即铁面龙王。楚楚等反噬合杀贾乐山，邀陆小凤冒充其以十二箱金银向李霞买罗刹牌；司空摘星以放过李霞等四女为条件后离去，楚楚戏言后扬长而去。
- chapter: 40
  title: 第六回 松花江上
  summary: 陆小凤扮成江南巨富贾乐山，携楚楚抵达松花江冰上市镇拉哈苏。他先后见到蓝胡子旧人唐可卿、冷红儿，并在银钩赌坊会晤陈静静与李神童；李霞避不见面，提出先交货款才交罗刹牌。陆小凤拒在赌坊落脚，重金租下天长酒楼，又令辛老二盯梢老山羊，最终随硬骨老山羊走向其「大水缸」之家。
- chapter: 41
  title: 第七回 松花江中
  summary: 陆小凤随老山羊登上巨型水缸,得知李霞未离镇、丁老大曾造双缸接雨,却被老山羊点破并非贾乐山。他先后在不醉无归小酒家被唐可卿戏弄掌掴、在草药店见冷红儿擒拿骚扰者,并与冷红儿共饮时被李神童打断;李神童识破其身份,称蓝胡子约其来此,要他将箱子送往银钩赌坊换罗刹牌。返回天长酒楼后发现神秘轻功人影,楚楚以黄金打造的箱子内装砖头送去赌坊;陆小凤回绝楚楚的亲近,翌日精神振作。
- chapter: 42
  title: 第八回 松花江下
  summary: 陆小凤入银钩赌坊，点破李霞藏身冰河水缸，与之对饮并谈罗刹牌交付；唐可卿闯入与李霞撕打后，陆小凤离去。陈静静夜访送菜并告知小唐（唐可卿）死于李霞之手，李霞与十二口箱子失踪。二人赶至老山羊水缸，见缸被酒火烧裂，冰中冻死老山羊与李霞。回赌坊后李神童疯癫以唐可卿尸为新娘并诬陈静静勒杀。陆小凤夜走至冷红儿草药店，发现冷红儿死于冰河，脸有爪痕，手指刺入冰中。
- chapter: 43
  title: 第九回 再见冰河
  summary: 陆小凤以江南霹雳堂火药炸开冰河取得罗刹牌；楚楚以假牌脱身，陈静静与李神童会合后陈静静杀死李神童。楚楚带人逼问陈静静，揭出其掉包罗刹牌并杀害李霞，再以暗器制住陈静静夺回真牌。陆小凤鞭取罗刹牌现身，华玉坤以弹指神通单挑不敌后被胡辛暗器误中身亡，杜白刺死胡辛却被楚楚反手穿心，两人同归于尽。
- chapter: 44
  title: 第十回 香姨之死
  summary: 陈静静向陆小凤承认自己披熊皮埋藏罗刹牌、并杀害冷红儿灭口；陆小凤识破她求死之意，决意带她求医，却被岁寒三友拦下。寒梅在酒楼命金龙镖局总镖头赵君武出手试探，陆小凤以奇异身法硬接掌拳不动。飞天玉虎来信嘲讽并运走财物，陆小凤赶回时陈静静所居已成火海，她葬身火中；岁寒三友在压力下暂退。陆小凤与赵君武并肩救火后结交，约半个月后在银钩赌坊再会，并誓不找到飞天玉虎不再饮酒。陆小凤持罗刹牌探望断足断腕的丁香姨，玉牌却被窗外暗器射走，丁香姨心口中创而死。
- chapter: 45
  title: 第十一回 重回赌坊
  summary: 陆小凤与方玉飞重返银钩赌坊；密室中岁寒三友与蓝胡子、方玉香会合。陆小凤点明假罗刹牌（冰河牌、神鞭牌）出自朱停，并当众变出假牌。他层层拆穿蓝胡子故意放假牌、试探丁香姨等布局，又指真牌仍在蓝胡子身上。方玉香以丝巾毒死蓝胡子并摸走真罗刹牌，孤松收牌勾销前嫌。陆小凤再揭方玉飞才是真正飞天玉虎：救走陈静静、杀丁香姨与灭口孩童，并借咒语中的冯二瞎子逼出假牌。方玉香嫉恨自尽，方玉飞戴银手套约战陆小凤的灵犀指，决斗刚起。
- chapter: 46
  title: 第十二回 罗刹教主
  summary: 方玉飞与寒梅联手夹击陆小凤，寒梅背后拔剑偷袭失败，方玉飞眉心中指、胸膛被寒梅之剑贯穿而死。寒梅吐露欲做罗刹教主、与黑虎堂联手称霸的野心。陆小凤识破罗刹牌赝品并点破孤松、枯竹杀玉天宝、欲夺教主之位；松竹神剑合围之际西门吹雪现身，以人剑合一反杀枯竹后飘然离去。孤松偷袭被陆小凤两指夹剑，又因雾中人现身而力量崩溃。西方玉罗刹现身，承认为清查教内不忠而诈死，并称玉天宝非其亲生，与陆小凤互认可怕却愿保持非友非敌。
- chapter: 47
  title: 第一回 第十三个人
  summary: 木道人召集古松居士、苦瓜和尚、唐二先生、潇湘剑客、司空摘星、花满楼等陆小凤之友聚会，出示西门吹雪所杀十二人纸卡，指陆小凤犯下出卖西门吹雪并夺妻的致命错误后逃亡。众人据昔日逃亡路线缩小其去向，多数人未言明即离席；花满楼断言他们必赴西门山庄推演逃亡之路，木道人遂与花满楼同行寻人。
- chapter: 48
  title: 第二回 逃 亡
  summary: 陆小凤被西门吹雪一剑所伤，在原始丛林中饥渴逃亡三天，途中咬蛇血续命，并遇见同样重伤的独行大盗独孤美。独孤美自承因安慰外甥叶孤鸿与粉燕子的妻子而遭两人追杀。叶孤鸿与粉燕子相继追上，叶孤鸿却反手一剑刺死粉燕子，并透露自己与独孤美皆属只容死人前往的神秘山庄。叶孤鸿弃独孤美不顾并以出林详图诱敌，陆小凤两指夹剑反制，叶孤鸿自愧剑不如西门吹雪、约战紫金之巅亦无颜赴约，举剑自尽；陆小凤对其耳语数句后离去。
- chapter: 49
  title: 第三回 死亡之约
  summary: 陆小凤与伤重的独孤美在绝对黑暗中依磷光逃出吃人树林；途中独孤美遭毒蛇咬伤，陆小凤为其吸毒，独孤美因此改变主意愿带他投奔有合约的幽灵山庄。二人在古松下取到预备的酒食、刀伤药、奇特哨子与指引，循哨音至万丈绝壑。脸被削平的勾魂使者踏钢索而来，先拒无合约的陆小凤，后因老刀把子传令两人同入。陆小凤拒坐竹篮、步行钢索，以儿歌激怒对方；勾魂使者乌木簪突袭，陆小凤两指夹击失手落索，以脚钩索翻回。他抵达对岸，冲过生死线，步入死人世界，独孤美与勾魂使者皆已不见，黑暗中却响起求饶声。
- chapter: 50
  title: 第四回 一个死人的世界
  summary: 陆小凤在迷雾中找到灰色小木屋，与自称救了他的少女叶灵（小叶）相见；叶灵自金漆马桶中变出燕蝶、竹叶青、炖鸡与衣履，宣布此处为陆公馆，并告以老刀把子的三条规矩及不可惹大叶子、不可让花寡妇进门。陆小凤糊里糊涂由活人变成死人并有了家后，遇极瘦的游魂啃鸡骨，游魂以高超轻功与缩骨掠窗而去，提醒大厅下马威与管家婆等疯子。晚食钟响后，漆黑大狗衔纸带路，途中装腔为蓝胡子索命并自狗腹飞刀，被陆小凤两指夹住；叶灵现身，陆小凤识破狗郎君，二人同赴晚食。
- chapter: 51
  title: 第五回 将军吃肉
  summary: 钩子七十岁仍好色，与表哥密谋先对付再杀掉陆小凤，管家婆告知黑狗与将军已先下手。叶灵向陆小凤介绍钩子、表哥、管家婆与将军的可怕。将军在大厅以大铁锅煮肉摆鸿门宴，两人比吃肉、举火炉，随后交手；陆小凤以头拳、股拳周旋，终以灵犀指击倒将军。灰衣老刀把子抱走将军，三十六人随去。叶灵透露曾替陆小凤求情，命其钟声不响不得出门；陆小凤在幽灵山庄度过充满恐惧的第一夜。
- chapter: 52
  title: 第六回 元老会的组织
  summary: 陆小凤在山谷木屋挨饿，与游魂对谈却问不出其来历。钟声响后他入大厅，见叶孤鸿棺木，叶灵着孝服指认他为凶手；独孤美以西门吹雪与自身到过树林为由开脱，并引他结识钩子海奇阔。海奇阔揭示元老会结构，点明游魂即钟无骨、飞天玉虎之父，有杀陆小凤之由却动不得。陆小凤醉归屋中发现钟无骨已死，海奇阔、表哥、管家婆与叶灵欲以元老会多数定其死罪；花寡妇质疑证据、衣带击败表哥，宣称须等老刀把子回来，强行带走陆小凤。
- chapter: 53
  title: 第七回 同是天涯沦落人
  summary: 花寡妇自承为柳青青，向陆小凤倾诉谢坚逼她与友人苟且的往事，并坦言老刀把子是她在幽灵山庄惟一的男人。两人醉卧时被表哥以销魂蚀骨散迷倒掳入地窖；表哥自承杀害多名失踪者并欲栽赃海奇阔，却被钩子海奇阔反制逼杀陆小凤。表哥一招杀海奇阔，又以巴山七七四十九手回风舞柳剑破管家婆高涛暗器，自承为巴山剑客传人顾飞云、奉命潜入幽灵山庄。老刀把子现身，顾飞云自尽灭口。老刀把子不杀陆小凤，允其带走花寡妇，二人走出幽灵山庄。
- chapter: 54
  title: 第八回 又见山庄
  summary: 柳青青（花寡妇）赤脚随陆小凤出谷，林外剑气落叶显示西门吹雪未去，二人折返幽灵山庄。陆小凤以看破来历逼退勾魂使者，又向老刀把子陈述石鹤旧事并断言其另有图谋。石屋中钩子、表哥、管家婆现身，揭出先前诸事皆为试探圈套；老刀把子收陆小凤为伙伴并设宴接风。叶雪携第十三条死豹入席，听闻兄死于西门吹雪后与陆小凤对饮；独孤美次日泄密称叶孤鸿实死于陆小凤之手。叶雪以剑试陆小凤两指后求其为夫共杀西门吹雪，陆小凤拒婚并指出叶孤鸿乃自刎。
- chapter: 55
  title: 第九回 畸人、畸情
  summary: 陆小凤自幽灵山庄一带走入更深浓雾，迷路后循烤野兔香气搜出被掩埋的烤叉与剩肉，误食混有大麻叶的兔肉中毒软瘫。身形尽毁、能随意扭曲的畸人现身，准确点穴制住他，自述曾是美男子，被人从高崖推落后在沼泽烂泥中靠霉菌与大麻续命多年，因刚才见陆小凤未欺负阿雪而暂留其命。陆小凤点破推他下崖者是老刀把子，并断定他是叶雪之父；畸人承认却哀求不可告知子女。叶灵循声寻至，陆小凤谎称自点穴道；畸人隐去想看这鬼灵精如何处置。叶灵采来药草强行塞喂，抱他入山洞，药力实为春药，两人在穴道未解下发生关系；叶灵宣称陆小凤是她的并要他归家做住家男人。暮色钟声中，陆小凤心生疲倦，幽灵山庄似有盛宴将起。
- chapter: 56
  title: 第十回 午夜悲歌
  summary: 宴会等候陆小凤入场，老刀把子当众宣布其喜事是与叶雪成亲；叶灵当场反对并自称已与陆小凤同生共死成婚，叶雪震怒冲出。老刀把子改允三个月后亲自主婚，其间二人不许见面，并把陆小凤交给柳青青。席后柳青青陪陆小凤饮酒宽慰，表哥突报叶雪已入通天阁，似欲与兄叶孤鸿火葬同葬。
- chapter: 57
  title: 第十一回 冒险登绝阁
  summary: 叶雪闭死崖顶木屋，表哥破壁遭其重伤；独孤美献绑陆小凤诱杀之计被老刀把子否决。陆小凤以一昼夜自由换取独救叶雪，以「父未死」劝其出屋，沼泽中却被玉树剑客叶凌风劫走人质，并点破阿雪实为老刀把子骨肉。老刀把子暗算陆小凤阻其入沼；犬郎君报将军将死、小叶失踪。陆小凤赶至将军府，见伪独孤美扼死将军，揭其真身为武当孙不变；孙不变以金丸黄绢自证后反目偷袭，反被陆小凤以小天星掌力与双掌制倒。老刀把子笑称孙不变本是其安插武当的奸细，并认陆小凤为右臂。午宴中柳青青透露叶灵偷走如意鱼皮水靠与分水飞鱼刺，勾魂使者现身似佩七星宝剑，海奇阔宣布天雷行动已开始。
- chapter: 58
  title: 第十二回 天雷行动
  summary: 老刀把子动员天雷行动，点名七大目标，定于四月十三武当梅真人忌日动手，兵器藏雪隐。拒行者遭杜铁心、娄老太太筷子灭口；司空斗追杀朱菲反被无豹重创，四罗汉告退。于还突袭被石鹤斩杀。陆小凤探明分工与叶灵身世，嘱犬郎君留暗记；易容为告老京官，携柳青青、表哥、管家婆、海奇阔与犬郎君离开幽灵山庄。
- chapter: 59
  title: 第十三回 鬼 屋
  summary: 陆小凤易容成威严老人,与柳青青、犬郎君等同行;海奇阔与表哥出城杀狗,却发现狗皮内真是狗,犬郎君早已调包。众人迷路撞入鬼屋,挖蚯蚓者讲述叶凌风将沈三娘肢解分藏九十三个水晶盒子的往事,柳青青被所谓神眼鬼手吓晕;次日陆小凤以挂帘绳钩揭穿闹鬼。临近武当时,陆小凤故意停车上酒楼,欲试探木道人、高行空与鹰眼老七能否认出易容后的一行人。
- chapter: 60
  title: 第十四回 最后指示
  summary: 陆小凤等人上酒楼，遇独坐的西门吹雪；木道人试探时，黑衣人石鹤突袭与西门吹雪大战，华衣老者以内力陷楼板助其脱身。翠衣少女小翠假认陆小凤为舅，引其至红门院见老刀把子。老刀把子揭示梅真人与石雁以道冠中账簿挟人隐私，布置四月十三武当大殿七十二长明灯同时熄灭时，由陆小凤夺石雁道冠、众人分杀目标，并令其此后单独行动，到后山由彭长备安排，只等灯灭。
- chapter: 61
  title: 第十五回 香火道人
  summary: 四月十三黎明，陆小凤依暗号由彭长备接上武当后山，扮火工道人藏腌萝卜屋。他因饥入香积厨，被宋长清派送食盒至听竹小院，得知住客为精于易容的少林铁肩。途遇王十袋，院中木道人、高行空、鹰眼老七、巴山小顾、花满楼等议酒楼剑事，鹰眼老七与高行空识破其即酒楼酒徒，陆小凤谎称与“陆小凤”打赌后借窗逃脱，于大殿以梯云纵藏横梁；掌门石雁佯称入殿者是自己，替他掩护。彭长备被竹竿钉死灭口，长清受罚，长慎将升总管；大殿九人又被极快剑锋尽屠灭口。陆小凤断定凶手为灭口而来、在武当来去自如，只得继续等天黑灯灭。
- chapter: 62
  title: 第十六回 梁上君子
  summary: 四月十三黄昏，陆小凤藏身武当大殿横梁，伺机摘取掌门石雁紫金道冠。木道人率紫衣道众入殿，宾客鱼贯而至，石雁在道童护卫下主持典礼并拟宣布继承人。七十二盏长明灯与烛火骤灭，黑暗中惨呼四起，梁上风声掠过，石雁道冠被夺、七星剑非己拔而出，胁下似被剑锋划过。灯复明后，铁肩、王十袋、巴山小顾、水上飞、高行空、鹰眼老七及武当重要弟子倒卧血泊，王十袋腰插致命之剑；木道人亦伤仍镇定下令禁人离殿，并自带十名精英追凶。石雁调无垢抬尸往听竹院，无镜、无色巡搜兵刃；高大威猛老人亦获准追凶。七星剑被寻回，紫金冠则不知所踪。
- chapter: 63
  title: 第十七回 人皮面具
  summary: 陆小凤摘得紫金冠返回满翠楼地室，揭穿老刀把子借天雷行动夺七星剑、嫁祸自己并图谋武当掌门的一石二鸟之计。他早在叶凌风山庄与司空摘星、犬郎君等以人皮面具和调包替换高涛等同党，诱老刀把子现身。假死的铁肩、石雁等人入室后，老刀把子劫持石雁欲逃，却被阶上持长剑神秘人刺死，真面目仍未揭开。
- chapter: 64
  title: 第十八回 功亏一篑
  summary: 木道人击杀无脸的老刀把子，鹰巢众人据陆小凤分析认定老刀把子即木道人、表哥即古松；石雁午时仙逝未留遗命，木道人依门规继任武当掌门，剑柄秘密尽失，计划功亏一篑。陆小凤在全福楼指认龙猛即吃肉的将军，龙猛中毒身亡；陆小凤本欲从马车夹层取出被囚的古松作证人，却反被藏于车底的三人点穴制住。
- chapter: 65
  title: 第十九回 油 锅
  summary: 陆小凤被高涛、海奇阔、杜铁心押入山洞刑堂；老刀把子一剑杀海奇阔与杜铁心并吓死高涛，却不杀陆小凤，将他封入密室。木道人率铁肩、王十袋、花满楼等救出陆小凤，即位武当掌门木真人。大殿上陆小凤与木真人暗中比力难分；西门吹雪带剑上山之际，白衣叶雪刺死木真人并自尽。解剑岩下西门吹雪因见陆小凤心已死而不出手，陆小凤大步走向黎明。
