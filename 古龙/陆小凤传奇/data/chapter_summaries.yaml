- chapter: 1
  title: 第一回 有四条眉毛的人
  summary: 本章以楔子引出陆小凤。先是熊姥姥用有毒糖炒栗子毒杀保镖张放等人；老实和尚在渡船以轻功追击水蛇帮强盗，却反送银子忏悔。西门吹雪为陌生恩人赵刚复仇，以一剑刺杀“闪电刀”洪涛；花满楼在小楼收留被崔一洞追杀的上官飞燕，展露盲人高手的从容。主线转入龙翔客栈，青衣楼铁面判官与勾魂手追查陆小凤，朱停与老板娘周旋；陆小凤以红披风为记，戏弄江东四杰。最终柳余恨、萧秋雨、独孤方三大怪人现身助陆小凤击退青衣楼，黑衣少女（公主）随乐声鲜花降临，陆小凤落荒而逃。
- chapter: 2
  title: 第二回 丹凤公主
  summary: 陆小凤因一名神秘女子向他下跪而仓皇逃入霍老头山腰木屋饮酒。霍老头真实身份是富甲天下的霍休。丹凤公主的三名保镖柳余恨、萧秋雨、独孤方撞破木屋砸毁器物,借此确认陆小凤身份。自称丹凤公主表姐的小女孩实为十二岁的表妹雪儿,带猎狗携金元宝赔偿并邀陆小凤相见。陆小凤识破谎言,得知好友花满楼被囚,最终登上丹凤公主的黑马车前往大金鹏王处。
- chapter: 3
  title: 第三回 大金鹏王
  summary: 大金鹏王向陆小凤讲述金鹏王朝五十年前被邻国联军攻灭、四位重臣带国库财富出逃中土的旧事,并指出阎铁珊、独孤一鹤、霍休正是当年的叛臣严立本、平独鹤、上官木。陆小凤答应替金鹏王朝讨还公道,并打算寻朱停、西门吹雪等人为助。上官飞燕离奇失踪,其妹上官雪儿疑其已遇害;独孤方与萧秋雨夜入客房刺杀花满楼,反被花满楼以听声辨剑的奇能断剑制服。
- chapter: 4
  title: 第四回 盛宴
  summary: 本章写陆小凤在大金鹏王盛宴上，托丹凤公主以花押银票请西门吹雪。深夜上官雪儿潜入陆小凤房中，被上官丹凤撞破。次日陆小凤与花满楼寻老实和尚、欧阳情，找到孙老爷，经其引见大通大智，得知金鹏王朝往事。萧秋雨身负重伤闯入上林春，留下银钩与'以血还血'的警告后死去，陆小凤决意找西门吹雪。
- chapter: 5
  title: 第五回 悲歌
  summary: 陆小凤与花满楼前往万梅山庄拜访西门吹雪，陆小凤刮去胡须终说动其同行。二人循歌声至山神庙，发现独孤方被钉死墙上，血书"以血还血"。上官雪儿现身，出示金燕子并称姐姐上官飞燕已被表姐上官丹凤害死。柳余恨再现，接雪儿回王爷处。霍天青遣人送帖，邀二人赴珠光宝气阎府。
- chapter: 6
  title: 第六回 珠光宝气
  summary: 陆小凤与花满楼赴霍天青之宴，同席者有马行空、苏少卿及主人阎铁珊。席间陆小凤揭露阎铁珊即金鹏王朝叛臣严立本，西门吹雪闯入阻其离去，连杀多名武林高手。苏少英现身原为峨嵋苏少英，亦败亡于西门吹雪剑下。丹凤公主自荷塘潜入，从背后剑杀阎铁珊。霍天青抱尸离去，约陆小凤日出时青风观一战。
- chapter: 7
  title: 第七回 市井七侠
  summary: 月夜陆小凤回到客栈与花满楼、丹凤公主饮酒夜谈，提及霍天青与商山二老、天禽门的渊源。深夜市井中各色人等陆续聚到院中，原是山西雁及结拜的市井七侠为护霍天青而来。山西雁道出天禽门祖师天禽老人晚年得子霍天青，门人愿以死相护。卖包子小贩欲自尽被陆小凤以牙筷断刀所阻，众人终相约同去城外吃狗肉。
- chapter: 8
  title: 第八回 司空摘星
  summary: 陆小凤、花满楼与上官丹凤于荒村小店饮酒，霍天青来信表明以死报阎铁珊、远游之意。十余骑青衣楼刺客以硝磺霹雳弹火烧小店，陆小凤火中逃生。司空摘星现身，自曝易容成赵大麻子，并称受人所托欲以二十万两偷走上官丹凤。司空摘星砍下刺客之手，留活口供陆小凤查问来历。
- chapter: 9
  title: 第九回 峨嵋四秀
  summary: 陆小凤在珠光宝气阁洗澡时，峨嵋四秀马秀真、石秀雪、叶秀珠、孙秀青闯入，逼问西门吹雪与苏少英之死及金鹏王朝真相，随后邀他明日午间赴宴。花满楼现身以两指夹住石秀雪双剑，救下峨嵋四秀，并与石秀雪生出情愫。陆小凤与花满楼推断霍休即上官木、独孤一鹤即严独鹤，担心西门吹雪不敌其'刀剑双杀'。霍天青在阎铁珊灵堂以'凤凰展翅''凤双飞''小天星'压服独孤一鹤，自陈为天禽老人之子。西门吹雪夜寻独孤一鹤，二人在白杨树下对峙，剑气冲霄，决斗将起。
- chapter: 10
  title: 第十回 飞燕去来
  summary: 峨嵋四秀马秀真、石秀雪、孙秀青、叶秀珠乘车夜行，途中戏谈陆小凤、花满楼与西门吹雪。花满楼与陆小凤在珠光宝气阁外小河旁遇见西门吹雪，得知独孤一鹤已被其杀死。青衣楼暗器毒针突袭，石秀雪中毒身亡，孙秀青等人愤而追敌入桑林。花满楼守着垂死的石秀雪时，旧识上官飞燕悄然从后窗现身，称受人胁迫来劝他莫再插手此事，否则便要她杀他。
- chapter: 11
  title: 第十一回 迷楼
  summary: 陆小凤夜访珠光宝气阁,与霍天青对饮,得知上官丹凤并未到来,并见到一封令其回头的怪信。花满楼在小店守护石秀雪的尸体,告知上官飞燕已被神秘人控制,疑为霍休所为。二人推断霍休山后小楼即是青衣第一楼,遂前往探查。小楼机关重重,暗门之后的山腹藏满刀枪珠宝,并遇四名自称大金鹏王的疯癫老者。最终二人穿过暗门,见到正温酒的霍休。
- chapter: 12
  title: 第十二回 第六根足趾
  summary: 陆小凤与花满楼在霍休山窟中得知金鹏王朝秘辛——每一代帝王双脚皆生六根足趾。霍休承认本名上官木，乃金鹏王朝重臣，并说大金鹏王真伪可凭足趾辨别。陆小凤挖出上官丹凤尸体，见其脚有六趾，证实冒牌者横行。上官飞燕终露真面目并逼死柳余恨，却被幕后"情人"灭口。陆小凤逐步查明主谋为霍天青，约其青风观决斗，却发现霍天青已服毒自尽，真正的幕后黑手另有其人。
- chapter: 13
  title: 第一回 绣花的男人
  summary: 本章讲述绣花大盗接连作案。常漫天护送镇远镖局八十万两镖银途中，遇一满脸大胡子、热天穿棉袄的男子，以绣花针将三十六人刺瞎并劫走镖银。平南王府总管江重威在宝库亦被同一人刺瞎，失十八斛明珠。陆小凤与花满楼、苦瓜大师、古松居士、木道人、金九龄聚首，金九龄出示绣黑牡丹的红缎子，道出绣花大盗一月内连犯大案，陆小凤终被激将答应查案。
- chapter: 14
  title: 第二回 不绣花的女人
  summary: 陆小凤上山探望薛冰与薛老太太，携一块绣黑牡丹的红缎子请薛老太太鉴定，得知缎子出自京城福瑞祥、丝线出自福记。薛冰以'红鞋子的秘密'引陆小凤动心，二人同往京城途中于柳林酒家饮酒。酒家伙计实为神偷司空摘星所扮，他受人之托欲偷走红缎子，遂与陆小凤立下赌约。孙中醉酒调戏薛冰被砍断手，陆小凤显露神技折刀震慑众人。
- chapter: 15
  title: 第三回 偷王的赌约
  summary: 陆小凤与薛冰对饮,猜度司空摘星受幕后绣花之人所托来偷东西。司空摘星佯装中毒,借机将红缎子送出交差,并与薛冰合谋。陆小凤抱司空摘星赶往笔霞庵解毒,却遇见失明的前王府总管江重威及其妹、住持江轻霞。江重威讲述王府宝库中遇一武功可怕的用针之人的经历,劝陆小凤莫去寻那人。最终司空摘星借机遁走,留下孙中断手之谜未解。
- chapter: 16
  title: 第四回 女道人
  summary: 陆小凤随江轻霞入庵,与薛冰相遇,追问绣黑牡丹的红缎子下落。薛冰坦言将红缎子置于吕洞宾神像下,陆小凤疑江轻霞即绣花大盗。江重威现身,道出与江轻霞的婚约往事,江轻霞愤而露出青布鞋中的红鞋子,被陆小凤识破后遁走。陆小凤断定江轻霞非绣花大盗,遂赴五羊城黑街寻蛇王,求得王府地形图,欲夜探王府查明真相。
- chapter: 17
  title: 第五回 绣花大盗
  summary: 陆小凤夜入王府宝库，欲探绣花大盗的进入之法，于屋顶遇白云城主叶孤城以「天外飞仙」试剑，金九龄、花满楼与叶孤城皆在旁。众人推断宝库另有地下通路，怀疑江轻霞与绣花大盗同党并盗取钥匙模型。薛冰外出未归，蛇王告知其两名手下被杀、薛冰失踪，凶手疑为绣花大盗。蛇王透露其仇人公孙大娘（别名女屠户等）约其月圆夜于西园相会，并指出公孙大娘无论怎样改扮都穿绣猫头鹰的红鞋。
- chapter: 18
  title: 第六回 要命的约会
  summary: 陆小凤在西园赴约寻找穿红鞋的女子,遇卖糖炒栗子的老太婆,识破其即为公孙大娘,亦即绣花大盗。二人交手后公孙大娘遁走。蛇王手下陆广带陆小凤至密室,见薛冰衣物却不见人,金九龄与羊城总捕头鲁少华据线索查出租房女子即绣花大盗,并推断其亦为熊姥姥、五毒娘子等,欲赴南海华玉轩查探。陆小凤回蛇王处,发现蛇王已被红缎带勒死。
- chapter: 19
  title: 第七回 小楼凤劫
  summary: 陆小凤随金九龄、孟伟等捕快追查公孙大娘,途中在乡村豆腐店遇见老实和尚。众人于民居灶中发现藏有毒烟机关的雕花木匣,金九龄开匣中毒受伤,陆小凤带其寻医并命孟伟追查乞丐阿土。陆小凤尾随阿土至一座小楼,发现红鞋子组织首脑聚会,二娘、三娘、欧阳情、江轻霞、六姐、七娘及阿土齐聚,静候公孙大娘与一位客人。
- chapter: 20
  title: 第八回 千奇百变
  summary: 陆小凤与红衣少女等六位女子同行，途中识破化身癞子乞丐的公孙大娘。公孙大娘真实身份乃绣花大盗，陆小凤揭穿其多重伪装。双方约定三阵定胜负以决定公孙大娘是否随陆小凤归案。第一阵比酒陆小凤佯醉认输，第二阵比剑他以天外飞仙一剑胜出。第三阵比轻功公孙大娘化作敲锣大汉诱其追逐，终被陆小凤凭香气识破就擒。
- chapter: 21
  title: 第九回 田 路
  summary: 孟伟夜中被陆小凤扮贼恐吓，得知绣花大盗已被擒。陆小凤让孟伟飞鸽传书约金九龄在蛇王旧窝相见，随后携公孙大娘赴羊城交差。金九龄在小楼接过大箱，见箱中是被迷倒的公孙大娘，却不知陆小凤已赶往紫金山赴西门吹雪与白云城主之约。金九龄借密道将公孙大娘藏于隐秘院落，欲逼她写口供承认是绣花大盗。公孙大娘反指金九龄才是真正的绣花大盗，并道破其嫁祸阴谋。金九龄承认后正欲灭口，陆小凤却从暗处现身。
- chapter: 22
  title: 第十回 破 案
  summary: 陆小凤揭示自己早已怀疑金九龄，借飞鸽传书将金九龄诱至公孙大娘面前使其自认是绣花大盗。金九龄企图以话语抵赖，陆小凤请来常漫天、江重威、华一帆及瞎眼证人作证。金九龄提议与陆小凤以武赌薛冰下落，选用大铁椎对陆小凤的绣花针。激战中金九龄掷椎逃窜，陆小凤以两指飞剑穿其心窝。金九龄死前未吐薛冰下落。尾声中公孙大娘查明二娘为金九龄内应，二娘自尽被救，众人同赴紫金山观决战。
- chapter: 23
  title: 第一回 两雄相遇
  summary: 九月十三凌晨，李燕北晨练时遭乌篷车弓箭手伏击，陆小凤以两枚铜钱割断二十八张弓弦救下他。李燕北道出与城南老杜杜桐轩以九月十五之战为赌注的恩怨，并提及叶孤城已负伤的消息来自老实和尚。杜桐轩先暗算李燕北又亲自解药救之，二人击掌加注赌约。春华楼上叶孤城赫然现身，一招天外飞仙洞穿唐天容双肩琵琶骨，证明自己未伤。陆小凤由此确认叶孤城无碍、西门吹雪胜算大增，却忧心决战背后的虚名之争。
- chapter: 24
  title: 第二回 斯人独憔悴
  summary: 九月十三午后，陆小凤在街头遇见欧阳情，又遇木道人与古松居士，同赴荒废窑场见怪人孙老爷。孙老爷假托大通、大智二老，陆小凤识破三人实为一人，问出欧阳情仍是处女等秘辛。孙老爷突被毒蛇咬死，陆小凤判定蛇受吹竹声训练所驱。棺材店中陆小凤惊见有人为叶孤城、西门吹雪预订九月十五的棺材。回春华楼后严人英寻仇陆小凤，却因张英风尸现而罢手，证实西门吹雪剑杀张英风。陆小凤终入十三姨公馆，席间闻吹竹声，急赴废园救欧阳情。
- chapter: 25
  title: 第三回 废园异事
  summary: 陆小凤追吹竹声至废园，擒住受驼背老者收买吹哨的孩子小可怜，并以两指夹住袭喉的赤红毒蛇。废园中赫然发现那驼背老者被红缎带勒死，揭开面具竟是易容的公孙大娘。陆小凤救下被毒蛇所伤的欧阳情，断定真凶比霍休、金九龄更可怕。他寻叶孤城求解药，于破庙见伤口溃烂的叶孤城，得知吹竹毒蛇亦曾暗算叶孤城，且西门吹雪因孙秀青有孕而求改期。叶孤城终吐露决战已改在紫禁之巅的太和殿屋脊。
- chapter: 26
  title: 第四回 北斗七星阵
  summary: 陆小凤在晨雾中遇见好友李燕北，得知李燕北已将地盘与帮会卖给道士顾青枫，并交出了龙旗令符，准备举家迁往江南。李燕北透露转让帮会的见证人是木道人、古松居士与老实和尚。陆小凤来到白云观，遭遇黄冠道人以北斗七星阵围杀，又被大内高手殷羡以玉女穿梭试招，原来一切只是玩笑。顾青枫、木道人、殷羡揭露紫禁之巅决战之事。陆小凤借杆儿赵打听消息，将他拉入树林追问那匹白马与死人之事。
- chapter: 27
  title: 第五回 初入禁城
  summary: 杆儿赵带陆小凤通过太监小安子混入紫禁城西北角的太监聚居地，欲查白马与张英风之死。陆小凤在茶馆与麻六哥赌局以银票为注，逼问张英风下落，麻六哥却被人一刀灭口。陆小凤越墙逃出，于城头遇见老实和尚，得知张英风竟是老实和尚的外甥。大内四大高手魏子云、屠方、丁敖、殷羡现身，命陆小凤负责挑选六人持波斯缎带入禁城观战，陆小凤无奈应允，并赠带子与老实和尚。
- chapter: 28
  title: 第六回 第一根线
  summary: 陆小凤昏睡后被十三姨下毒迷倒，西门吹雪出手相救并说明十三姨才是下毒者，李燕北亦死其刀下，动机是一百九十五万两银票。西门吹雪现身，已与孙秀青成婚。二人同赴叶孤城藏身的禅院，发现带路人胜通被勒死。陆小凤推断吹竹弄蛇之人暗算了叶孤城、毒害欧阳情、害死孙老爷并勒死胜通与公孙大娘，并怀疑幕后主使是老实和尚及一个名为白袜子的出家人组织。二人又往天梁坛查张英风之死。
- chapter: 29
  title: 第七回 天坛之夜
  summary: 陆小凤与西门吹雪潜入天梁坛，遭遇两名密宗喇嘛及藏身木箱的四名刺客。西门吹雪杀退喇嘛与黑衣人，陆小凤以灵犀一指夹住箱中刺出的剑，箱中刺客竟被吓死。箱中二人乃张英风与被点穴的严人英。严人英道出张英风怀中藏有三尊蜡像，分别是王总管、麻六哥与一名有胡子的中年人——真凶。西门吹雪认出刺客所用为海南剑派龙卷风剑法，推断主谋另有其人。陆小凤决意找泥人张复原蜡像以查明第三人之面目。
- chapter: 30
  title: 第八回 奇异老人
  summary: 九月十五清晨，陆小凤携蜡像往找泥人张复原，先遇欧阳情、孙秀青，得知二人均已脱险、孙秀青有孕。茶馆中卜巨与唐天纵以玉璧、毒蒺藜逼迫陆小凤交出禁城缎带，陆小凤戏耍二人后离去。泥人张处竟是冒牌货，交出的蜡像脸竟是西门吹雪。陆小凤折返识破掉包，又遇真正泥人张被冒牌者所扮，泥人暗藏机簧暗器欲杀他，被老实和尚撞破。真泥人张一家四口已死于井中，冒牌者服毒自尽。唐天纵终跪求缎带，欲往寻叶孤城报仇。
- chapter: 31
  title: 第九回 难得糊涂
  summary: 陆小凤在京城街头遇见扮作老者的司空摘星,被其偷走一条缎带,后又见司空摘星送还两条。于饭馆遇司马紫衣师徒,拒绝以五万两银票交易或赌剑交出缎带,以两根手指夹住司马紫衣之剑并赠其一条缎带。后至合芳斋见欧阳情,得知王总管曾带两名海南剑客到妓院密会,推断公孙大娘之死与此有关。陆小凤终将余下两条缎带以馒头为代价交予老实和尚,转交木道人。
- chapter: 32
  title: 第十回 月圆之夜
  summary: 陆小凤依老庆余堂线索,从孩童处取回司空摘星送还的两条缎带,夜入紫禁城。玉带桥畔先后聚集老实和尚、木道人、杜桐轩、卜巨、唐天纵、严人英、司空摘星、魏子云、丁敖等,众人皆持缎带。叶孤城重伤之貌与西门吹雪于太和殿顶比剑,魏子云要求交换佩剑以昭大信。西门吹雪察觉叶孤城伤重,不肯乘人之危,飘然退去,决战暂缓。
- chapter: 33
  title: 第十一回 深宫惊变
  summary: 太和殿顶,唐天纵以追魂砂暗算叶孤城替身,揭穿其为杜桐轩旧保镖所扮,戴人皮面具。紫衣人率系缎带夜行人斩杀大内侍卫,丁敖从后将其击杀。陆小凤推断王总管盗出缎带,逼魏子云带其入南书房见皇帝。皇帝惊醒,发现貌似自己的南王世子与王安欲行李代桃僵之谋。鱼家兄弟出手被叶孤城一剑破七星击败,陆小凤及时赶到阻止叶孤城行刺。
- chapter: 34
  title: 第十二回 强敌已逝
  summary: 陆小凤向叶孤城点破阴谋全貌:王总管与南王府借欧阳情妓院密会,叶孤城为灭口杀害张英风、公孙大娘、欧阳情、龟孙子大老爷等人,并以替身应战,又借缎带将大内高手调离内宫。叶孤城与西门吹雪于紫禁之巅决战,西门吹雪剑刺叶孤城胸膛,叶孤城故意偏差送死,死前流露感激。丁敖阻西门吹雪带走尸体,卜巨、木道人、老实和尚、司空摘星皆挺陆小凤。圣旨到,宣陆小凤入南书房,争端平息。尾声中陆小凤自南书房大笑而出,众友猜其向皇帝所求为何。
- chapter: 35
  title: 第一回 冰山美人
  summary: 陆小凤随方玉飞入银钩赌坊,遇见冷若霜冰山美人。冷若霜佯装受陆小凤指点反押错宝,后于巷中掴其耳光,又假意求助,骗其蒙眼带入金钩赌坊以铁板屋囚禁,留纸条扬言留君三日。陆小凤酒中被迷晕,醒于荒郊。回城五福客栈遭杨捕头以八案罪名缉拿,绿袍老人率众现身,称陆小凤杀其教主之子,陆小凤夺刀剑断之突围。复入银钩赌坊,从大牛瞎子看守处发现暗门地道。
- chapter: 36
  title: 第二回 西方玉罗刹
  summary: 陆小凤被方玉飞与方玉香引至银钩赌坊，识破蓝胡子真面目。蓝胡子道出罗刹牌乃西方玉罗刹之宝，被其子玉天宝押作赌注后由前妻李霞盗走。西方玉罗刹创立西方魔教，岁寒三友已为其护法长老。蓝胡子要陆小凤远赴拉哈苏找回罗刹牌并查玉天宝死因，门外却出现三名绿袍老怪物，陆小凤最终从密道脱身。
- chapter: 37
  title: 第三回 缺了半边的人
  summary: 陆小凤投宿天福客栈，被三拨人跟踪，其中丁香姨以美人计相陪并赠银五万两，自称受方玉香所派。暗处杀手来袭又莫名断落，五名跟踪者死去，岁寒三友冷眼旁观。丁香姨道出阴童子本是阴阳童子、被司空摘星所毁，并送来装满死人白牙的木箱。陆小凤决心主动去找阴童子。
- chapter: 38
  title: 第四回 意外中的意外
  summary: 陆小凤夜探吉祥客栈第四重院，落入阴童子之手，却见少女被三冰透骨钉射杀，岁寒三友现身。方玉香突至与丁香姨反目相斗，揭露丁香姨盗空黑虎堂财库、被飞天玉虎毁去手足，罗刹牌牵出贾乐山。丁香姨诉说自己乃白鸽堂主、后母李霞盗牌欲售贾乐山，并指明拉哈苏可信的老山羊与陈静静。秋萍送来信，飞天玉虎休妻赠银。
- chapter: 39
  title: 第五回 贾乐山
  summary: 孤松先生逼饿肚的陆小凤吃饭拼酒，岁寒三友青竹寒梅谈不醉之事。夜半司空摘星假扮贾乐山携楚楚等试探陆小凤，黑衣人以剑威逼、梁上客以暗器偷袭，皆被灵犀一指化解。贾乐山终现男扮女装真容，乃昔日铁面龙王，欲杀陆小凤，却被楚楚与三名手下反杀。楚楚欲借陆小凤冒充贾乐山购罗刹牌，司空摘星相助。
- chapter: 40
  title: 第六回 松花江上
  summary: 陆小凤扮作贾乐山携楚楚抵冰封松花江上的拉哈苏，楚楚认出蓝胡子二姨太唐可卿、三姨太冷红儿，并引出大姨太陈静静。李神童在银钩赌坊现身，陈静静道李霞藏起罗刹牌、要见款才交货。老山羊被辛老二跟踪后，引陆小凤前往其居所大水缸。
- chapter: 41
  title: 第七回 松花江中
  summary: 陆小凤化名贾乐山来到冰河小镇，被老山羊带入大水缸饮酒，得知李霞并未离开镇上。他先在不醉无归小酒家遇唐可卿，后在草药店结识冷红儿，并撞见李神童。李神童认出陆小凤真身，自称受蓝胡子之命在此接应，透露已出卖姐姐替蓝胡子做奸细。陆小凤命人将黄金箱子送往银钩赌坊，却发现箱中装的竟是砖头，箱子却是黄金所制。
- chapter: 42
  title: 第八回 松花江下
  summary: 陆小凤入银钩赌坊，循迹找到藏身大水缸的李霞；李霞与唐可卿争风，杀唐可卿后隐去。陈静静告知陆小凤唐可卿死讯并与之亲近。李霞与老山羊被冻尸于冰中。李神童装疯，以死去的唐可卿为「新娘」，并指认陈静静杀唐可卿。冷红儿在冰河上被黑熊爪杀。
- chapter: 43
  title: 第九回 再见冰河
  summary: 陆小凤用江南霹雳堂火药炸开冰河，取出藏于冰下的罗刹牌。楚楚负气离去，陈静静亦告别。岁寒三友讨要罗刹牌，陆小凤佯称被楚楚偷走假牌。陈静静与李神童合谋，楚楚带华玉坤、胡辛、杜白赶来，揭露陈静静真面目后，三人内斗俱亡。陆小凤最终以长鞭夺回罗刹牌。
- chapter: 44
  title: 第十回 香姨之死
  summary: 陈静静向陆小凤坦白自己与李神童合谋，并披熊皮杀冷红儿灭口。陆小凤带陈静静离开，遇岁寒三友，孤松放行。寒梅带赵君武试陆小凤功夫，陆小凤挨打不动声色。飞天玉虎来信戏弄，陆小凤返屋发现陈静静房被烧毁、丁香姨被暗器所杀，立誓追查飞天玉虎。
- chapter: 45
  title: 第十一回 重回赌坊
  summary: 陆小凤回到银钩赌坊，与方玉飞、蓝胡子、方玉香及岁寒三友会合。他当众指出蓝胡子即飞天玉虎，罗刹牌本一直在蓝胡子手中。蓝胡子被方玉香用丝巾毒死，方玉香随后亦毒发身亡。陆小凤揭穿方玉飞才是真正的飞天玉虎，并指认陈静静未死、被方玉飞带走。最终陆小凤以灵犀指与方玉飞公平决斗。
- chapter: 46
  title: 第十二回 罗刹教主
  summary: 陆小凤与方玉飞、寒梅在屋中相斗,方玉飞被陆小凤一指及寒梅之剑联手击杀。寒梅欲借假罗刹牌与方玉飞分掌罗刹教,却事败身亡。孤松、枯竹原也图谋教主之位,被陆小凤识破,西门吹雪现身以剑威逼,枯竹死于其剑下,孤松为陆小凤两根手指所制而退。雾中西方玉罗刹现身,自陈诈死以清教中不忠,并道出玉天宝并非其子。陆小凤与西方玉罗刹既非仇敌亦非朋友,彼此敬重而别。
- chapter: 47
  title: 第一回 第十三个人
  summary: 木道人召集古松居土、苦瓜和尚、唐二先生、潇湘剑客、司空摘星、花满楼等七位陆小凤好友,以古铜镇纸压着的十二张纸卡道出西门吹雪所杀的十二人。木道人称陆小凤出卖朋友并夺西门吹雪之妻,犯下比十二人更重的死罪。众人凭陆小凤脾气推断其逃亡路线,花满楼断定他不会出海入沙漠,并猜众人会去西门山庄。最终只剩木道人与花满楼,花满楼道出陆小凤只能自己找回自己。
- chapter: 48
  title: 第二回 逃 亡
  summary: 陆小凤带剑伤在原始丛林中逃亡三日,始终感觉西门吹雪的剑气紧追不舍。他遇一身受重伤的独孤美,二人互诉遭女人连累的麻烦,独孤美自报为号称六亲不认的独行大盗。叶孤鸿与粉燕子寻至,粉燕子被叶孤鸿所杀,叶孤鸿欲杀独孤美却因自惭剑法远不及陆小凤而自刺胸膛身亡。陆小凤与独孤美结伴,独孤美引其前往只有死人才能进入的山庄。
- chapter: 49
  title: 第三回 死亡之约
  summary: 陆小凤与独孤美循暗记般的磷光脱出吃人树林,天亮后于古松青石下寻得柳条箱,内有酒食、刀伤药、哨子与信。独孤美说出山庄名为幽灵山庄,只有死人能入。陆小凤吹哨引来脸被削平的勾魂使者,二人凭合约被准予入庄。过万丈绝壑的钢索时,勾魂使者以乌木簪突袭落空,自陈快剑胜过西门吹雪。陆小凤冲过红线生死线,踏入死人的世界。
- chapter: 50
  title: 第四回 一个死人的世界
  summary: 陆小凤入幽灵山庄化身死人,被少女叶灵安置于陆公馆并立下规矩,严禁招惹大叶子与花寡妇。游魂来访,透露山庄中多有疯子与下马威。晚食钟响,黑狗衔纸来带陆小凤赴宴,途中狗竟口吐蓝胡子索命之言并飞刀袭击,被陆小凤夹住刀锋。叶灵点破那条黑狗实是甘做狗的狗郎君,陆小凤方知此地狗即人、人即狗。
- chapter: 51
  title: 第五回 将军吃肉
  summary: 陆小凤在幽灵山庄与钩子、表哥、管家婆、将军等人相遇。将军于大厅设下吃肉比试，陆小凤凭灵犀指击败将军，却被灰衣人（老刀把子）抱走受伤的将军。叶灵告知陆小凤此处乃幽灵山庄，老刀把子武功深不可测，令陆小凤心生恐惧。
- chapter: 52
  title: 第六回 元老会的组织
  summary: 陆小凤被囚木屋，结识送饭的麻子与元老游魂。钟声后众人聚集，叶灵借棺中兄长叶孤鸿之死诬陷陆小凤。独孤美与钩子（海奇阔）先后为陆小凤解围，陆小凤识破游魂即武当名人钟无骨，却发现其已被害。元老会五人（钩子、表哥、管家婆、叶灵、花寡妇）齐至，花寡妇以无证据为由救下陆小凤并将其带走。
- chapter: 53
  title: 第七回 同是天涯沦落人
  summary: 花寡妇向陆小凤吐露身世，实为点苍剑客之妻柳青青。表哥用销魂蚀骨散迷倒二人，于地窖中露出真面目——巴山剑客传人顾飞云，实为卧底。他先后杀死海奇阔与管家婆，却被花寡妇与老刀把子设局反制，最终自刎灭口。老刀把子放陆小凤与花寡妇离开幽灵山庄。
- chapter: 54
  title: 第八回 又见山庄
  summary: 陆小凤与柳青青走出山谷，发现西门吹雪剑气留痕，遂折返幽灵山庄。勾魂使者拦路，老刀把子现身。原来钩子、表哥、管家婆一切行为皆是老刀把子试探陆小凤的圈套，陆小凤通过考验成为其伙伴。接风宴上叶雪归来，得知兄长死讯后要与陆小凤共饮，并要他助自己刺杀西门吹雪；陆小凤拒绝叶雪的逼婚，告知叶孤鸿实死于己手。
- chapter: 55
  title: 第九回 畸人、畸情
  summary: 陆小凤迷路误入沼泽，中影子以大麻叶烤肉之毒被制。影子实为叶雪之父，因被老刀把子推下悬崖而毁容畸变，靠烂泥与麻叶苟活，因陆小凤未欺阿雪而放他一马。叶灵寻来，假意采药解毒，实为用药草催情将陆小凤抱走并发生关系，要陆小凤做其丈夫。远处钟声响起，幽灵山庄似将再开盛宴。
- chapter: 56
  title: 第十回 午夜悲歌
  summary: 幽灵山庄宴会上，老刀把子宣布陆小凤与叶灵的喜事。叶灵当众声称已同陆小凤成为同生共死的夫妻，叶雪得知后愤而冲出。老刀把子做主三月后为二人办喜事，并将陆小凤交予柳青青看管。叶雪独自进入通天崖上的通天阁，准备与兄长叶孤鸿的灵柩一同火葬。表哥带来叶雪已入通天阁的坏消息，陆小凤与柳青青对饮，心事重重。
- chapter: 57
  title: 第十一回 冒险登绝阁
  summary: 陆小凤与老刀把子独处，得知叶雪并非叶凌风之女，而是老刀把子亲生。独孤美现身愿以陆小凤换救叶雪，却反被老刀把子打倒。陆小凤攀上通天阁木屋，以「叶雪父亲未死」为由将其带出，于沼泽遇见船屋中的叶凌风。叶凌风掳走叶雪，陆小凤识破其玉树剑客身份。归途老刀把子暗算陆小凤，犬郎君报信称将军将死、小叶失踪。陆小凤在将军府揭穿独孤美实为武当奸细孙不变，老刀把子却称孙不变是自己早年安插的卧底。众人回庄，海奇阔宣布天雷行动开始。
- chapter: 58
  title: 第十二回 天雷行动
  summary: 老刀把子公布天雷行动，分四步进行，首战目标为武当石雁、少林铁肩、丐帮王十袋、长江水上飞、雁荡高行空、巴山小顾道人、十二连环坞鹰眼老七七人。朱菲因太胖、于还因水靠飞鱼刺被偷而暴露退出，杜铁心以筷子杀人立威，司空斗与四位黑衣老者（原少林五恶兽）冲突被废双爪。叶灵偷走于还的如意鱼皮水靠与飞鱼刺去寻找姐姐，于还身份暴露后被石鹤以剑斩杀。犬郎君制作三十一张人皮面具为众人易容，陆小凤等作为最后一批人带犬郎君下山。
- chapter: 59
  title: 第十三回 鬼 屋
  summary: 陆小凤一行扮作京官家眷赶路，犬郎君化作狗随行。海奇阔与表哥出城欲杀犬郎君灭口，却发现杀错的竟是条真狗。途中迷路借宿山坡上一户阴森大宅，被疑为鬼屋。屋内每间房均摆着叶凌风将亡妻沈三娘分尸后装入的水晶盒，共九十三间。柳青青被所谓「鬼手」吓晕，陆小凤最终揭示鬼手不过是段带钩的绳子。众人继续向武当进发，于酒楼外认出鹰眼老七、高行空与木道人。
- chapter: 60
  title: 第十四回 最后指示
  summary: 陆小凤一行于酒楼遇西门吹雪、木道人、高行空、鹰眼老七。石鹤扮黑衣人挑战西门吹雪，被四位华衣老者（原少林无虎兄弟）以内力陷落楼板救走。少女小翠认陆小凤作舅舅，将其引入红门宅院，老刀把子现身交代最终计划：天雷行动旨在从武当掌门石雁道冠中夺取账簿，毁掉被要挟者的隐私。灯灭之际陆小凤出手夺冠，各人分头击杀目标，行动成败系于陆小凤一身。
- chapter: 61
  title: 第十五回 香火道人
  summary: 四月十三黎明前，陆小凤潜入武当后山，由火工道人总管彭长备带路，藏于香积厨旁小屋。石雁册立继承人之大典将至，陆小凤奉命送食盒至听竹小院，意外遇见王十袋、木道人、高行空、鹰眼老七、巴山小顾、花满楼、铁肩等武林名宿。鹰眼老七识破陆小凤伪装，群雄围堵，陆小凤施展梯云纵藏身大殿横梁。彭长备被飞入的竹竿钉死灭口，长慎等火工道人亦遭快剑割喉，武当山暗流汹涌、杀机四伏。
- chapter: 62
  title: 第十六回 梁上君子
  summary: 大典当晚，众高手齐聚武当大殿，石雁戴紫金冠、佩七星剑主持典礼。灯灭瞬间，陆小凤从横梁掠下摘走紫金冠，老刀把子趁机夺剑，铁肩、王十袋、巴山小顾、水上飞、高行空、鹰眼老七等纷纷倒地。木道人带头追凶并留守大殿，紫金冠失踪而七星剑被寻回，武当山上谜团更重。
- chapter: 63
  title: 第十七回 人皮面具
  summary: 陆小凤得手后潜回满翠楼地室，与柳青青、小翠会合，老刀把子宣布天雷行动成功。陆小凤揭穿老刀把子真正目标是七星剑剑柄中的秘密，并以人皮面具之计反制。原扮作管家婆的高涛撕下面具，竟是公孙大娘旧友。六名假死者（娄金氏、关天武、杜铁心、高涛、海奇阔、顾飞云）反戈围住老刀把子，铁肩等人假死现身，老刀把子夺剑欲逃，却被木道人自后袭杀，临死揭去竹笠露出无脸之容。
- chapter: 64
  title: 第十八回 功亏一篑
  summary: 木道人补剑杀死老刀把子，揭去面具竟是无脸之人，众人疑为石鹤，陆小凤却断言老刀把子正是木道人。回溯鹰巢计划：石雁联合陆小凤、司空摘星、花满楼及六派高手设局诱出幽灵山庄。陆小凤指证木道人因私情被迫让位、嫁祸叶凌风，且表哥即古松。石雁忽传病逝，掌门之位按规由木道人继承；陆小凤追查至全福楼，识破龙猛龙飞狮早已被掉包，龙猛食毒肉而亡，线索几断。
- chapter: 65
  title: 第十九回 油 锅
  summary: 陆小凤被高涛、海奇阔、杜铁心掳入山洞刑堂，三人欲施酷刑，却被突现的老刀把子一剑尽杀杜铁心、海奇阔，高涛惊怖而死。老刀把子坦言早欲灭口却故意留陆小凤活命。木道人率铁肩、王十袋、花满楼寻得秘洞救出陆小凤，并正式即位武当掌门。西门吹雪带剑上山，白衣女子叶雪突袭，以替父报仇一剑刺死木真人，终揭老刀把子真身。西门吹雪欲与陆小凤决战，见其心已死，终转身没入雾中。
