- id: item_bi_shou
  name: 匕首
  aliases: []
  type: 武器
  description: |-
    近身使用的匕首,出现在突袭、暗杀与近战描写中。
    贴身短兵,暗战与近身搏杀常用
    来历：常见兵器
    效果：近身刺杀;伤害
- id: item_hou_er_jiu
  name: 猴儿酒
  aliases: []
  type: 其他
  description: |-
    小鱼儿设计让猴子送来的猴儿酒,众人痛饮,是收束卷的标志性道具。
    猴子所献美酒,终局欢乐场景核心道具
    来历：猴子自酿
    效果：酒力强劲可醉人;特殊
- id: item_jie_yao
  name: 解药
  aliases: []
  type: 丹药
  description: |-
    与毒药成对出现的解药,推动脱困、救人与交易情节。
    对治毒药的解药,多次救人转机
    来历：医毒两端
    效果：解除毒性;增益
- id: item_ma_che
  name: 马车
  aliases: []
  type: 其他
  description: |-
    江枫开篇所赶破旧马车,载花月奴奔逃,遇十二星相阻截。
    开篇江枫所赶破旧马车,托载花月奴
    来历：逃难所用
- id: item_mi_yao
  name: 迷药
  aliases: []
  type: 丹药
  description: |-
    用于迷晕、绑架或脱困的迷药,江湖阴谋线常见。
    迷晕对手的药物,阴谋常用
    来历：阴损手段
    效果：使人昏迷或神智不清;控制
- id: item_ren_pi_mian_ju
  name: 人皮面具
  aliases: []
  type: 其他
  description: |-
    用于易容假扮的人皮面具,推动身份错位与奸谋情节。
    易容用的人皮面具,身份诡计道具
    来历：江湖易容
    效果：改变面容身份;特殊
- id: item_tong_fu
  name: 铜符
  aliases: []
  type: 其他
  description: |-
    书中关键信物铜符,小鱼儿等人智取或争夺,用于机关、身份或阴谋线索。
    智得铜符相关的关键信物,牵动多方争夺
    来历：江湖权谋与机关相关
    效果：开启机关或证明权柄;特殊
- id: item_tou_zi
  name: 骰子
  aliases: []
  type: 其他
  description: |-
    赌博用骰子,与奇异赌场、惊人豪赌等回目相关。
    赌场豪赌用具,轩辕三光等涉赌情节
    来历：赌场
- id: item_yao_wan
  name: 药丸
  aliases: []
  type: 丹药
  description: |-
    书中出现的药丸,或为疗伤或为毒计组成部分。
    各类丸药,疗伤或施毒相关
    来历：医药
    效果：药理作用视丸种而定;增益
