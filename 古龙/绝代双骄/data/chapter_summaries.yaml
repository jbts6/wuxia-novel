  title: 小鱼儿渐渐长大了。
  summary: 第8回「近墨者黑」。出场：小鱼儿、燕南天、屠娇娇、李大嘴、哈哈儿、杜杀。本回情节：小鱼儿恶人谷近墨者黑；杜杀冷冷截口道：“这些东西，可都是屠娇娇和李大嘴给你的？”；小鱼儿五岁还不到时，有一天，杜杀将他带到屋子里，屋子里有一条狗，杜杀给他一把小刀。
