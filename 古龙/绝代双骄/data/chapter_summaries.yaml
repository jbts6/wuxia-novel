- chapter: 126
  title: 白云飘渺。
  summary: 第126回「生离死别」。出场：小鱼儿、花无缺、燕南天、江枫、邀月、怜星。本回情节：铁心兰苏樱生离死别；铁心兰道：“嗯。”苏樱又惊又喜，但忽然大声道：“我不信，小鱼儿是绝不会杀花无缺的。”；邀月宫主忽然疯狂般大笑起来，指着花无缺道：“告诉你，他也是江枫的儿子，他本是小鱼儿的孪生兄弟。”
