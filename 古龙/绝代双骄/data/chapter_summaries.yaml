  title: 这不是小仙女！
  summary: 第18回「慕容九妹」。出场：小鱼儿、铁心兰、慕容九、慕容九妹、碧蛇神君。本回情节：慕容九妹出场；顾人玉失魂落魄地瞧着慕容九妹，铁心兰也呆呆地瞧着小鱼儿，顾人玉不由自主叹了口气。铁心兰也不由自主叹了口气，道：；铁心兰指着小鱼儿，道：“他已中了剧毒，只有碧蛇神君的解药，否则他……他……他就只怕活不过今天了！”
