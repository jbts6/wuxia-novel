  title: 哈哈儿看了看燕南天倒下的身体，突然大笑道：“各位也莫要争了，我有了个好主意。”
  summary: 第7回「漏网之鱼」。出场：小鱼儿、燕南天、屠娇娇、李大嘴、哈哈儿、阴九幽。本回情节：阴九幽哼了一声，再不说话。司马烟从来未说话，只是望着哈哈儿，哈哈儿望着屠娇娇，屠娇娇笑道：“万神医说什么就是什；哈哈儿立刻笑道：“万神医法眼审定，自是不会错的，既是如此，你我就算不分，大家一起动手将燕南天杀了也罢。”；哈哈儿看了看燕南天倒下的身体，突然大笑道：“各位也莫要争了，我有了个好主意。”
