  summary: 第119回「幸脱死劫」。出场：小鱼儿、花无缺、燕南天、铁心兰、屠娇娇、李大嘴。本回情节：李大嘴沉吟着还没有说话，白开心忽然大声道：“化骨丹！”这三个字说出来，轩辕三光和花无缺脊背上都不禁冒出一股寒气；轩辕三光最焦急，铁心兰最悲痛，白开心不停地冷笑，哈哈儿却笑不出来，只有杜杀，仍是脸色铁青，也不知心里在想些什么；鬼童子又笑了笑，道：“魏无牙就算有天大的本事，也无法将移花宫主姊妹和小鱼儿三个人一起杀死的，你说是不是？”
- chapter: 120
  title: 听到“燕南天”这名字，屠娇娇、李大嘴等人只恨不得背上生出对翅膀来，快快飞到十万八千里之外。慕容姊妹也不禁俱都为之动容。
  summary: 第120回「神功绝学」。出场：小鱼儿、花无缺、燕南天、屠娇娇、李大嘴、轩辕三光。本回情节：轩辕三光当先冲了过去，想分开人丛挤进去，但这些人看到他们回来了，早已哄的四下散开。移花宫主并不在里面，更瞧不见；祢十八和俞子牙对望一眼，祢十八道：“想不到移花宫主和燕南天都在那里。”；轩辕三光道：“不错，快说那位小鱼儿少爷究竟说了什么样的一句话？那移花宫主听了他的话，是不是真的立刻住了手？”
- chapter: 121
  title: 俞子牙将“嫁衣神功”之练法，向众人解说道：“只因这种功夫太过猛烈，所以练到六七成时，就要将炼成的功力全都毁去，然后再从头练过。”
