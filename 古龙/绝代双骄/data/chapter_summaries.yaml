- chapter: 1
  title: 江湖中有耳朵的人，绝无一人没有听见过“玉郎”江枫和燕南天这两人的名字；江湖中有眼睛的人，也绝无一人不想瞧瞧江枫的绝世风采和燕南天的绝代神剑；只因为任何人都知道，世上绝没有一个少女能抵挡江枫的微微一笑，也绝没有一个英雄能抵挡燕南天的轻轻一剑！任何人都相信，燕南天的剑，非但能在百万军中取主帅之首级，也能将一根头发分成两根；而江枫的笑，却可令少女的心粉碎。
  summary: 第1回「名剑香花」。出场：燕南天、江枫。本回情节：江枫燕南天十二星相追杀开端；江枫马车花月奴奔逃；江枫松了口气，叹道：“不想你竟从宫中带出了朵墨玉梅花，连‘十二星相’这样的凶人，竟也对她们如此惧怕。”
- chapter: 2
  title: 血！江枫脸上、身上，已无一处不是鲜血！
  summary: 第2回「刀下遗孤」。出场：燕南天、江枫、花月奴、邀月、怜星。本回情节：江枫花月奴遇难托孤；怜星宫主道：“那自称天下第一剑客的燕南天，本是江枫的平生知交，他本已约好要在这条路上接江枫，否则江枫也不会走这；怜星宫主嫣然笑道：“说笑？你伤了我的宫女花月奴，我若让你痛痛快快地死，已是太便宜了，谁会跟你们这样的人说笑？”
- chapter: 3
  title: 干净的石板街，简朴的房屋，淳善的人面……
  summary: 第3回「第一神剑」。出场：燕南天。本回情节：燕南天第一神剑；钱二道：“燕大侠，燕南天，燕神剑，……哈哈，朋友你若真的是练剑的，听到这名字，就总该服气了吧！”；钱二道：“雷老大有了这口剑，非但连燕南天都要大为失色，咱们镖局的总镖头，只怕也得让让贤了。”
- chapter: 4
  title: 暮霭苍茫。苍茫的暮色中，燕南天的身形，几乎已非肉眼所能分辨，他身形掠过时，最多也不过只能见到淡淡的灰影一闪。旧道上荒草漫漫，迎风飞舞，既不闻人声，亦不闻马蹄，天边新月升起，月光也不见掩去这其间的萧索之意。
  summary: 第4回「赤手歼魔」。出场：燕南天、江枫。本回情节：燕南天怒道：“你‘十二星相’难道未曾对我二弟江枫出手？”；燕南天厉声狂笑，道：“移花宫？……某家正要去的。”；燕南天仰天笑道：“恶人谷纵是刀山火海，也未必能要了燕南天的命！”
- chapter: 5
  title: 和阗河滚滚的河水，在七月的残阳下发着光。
  summary: 第5回「恶人之谷」。出场：燕南天、屠娇娇、李大嘴、哈哈儿、杜杀、阴九幽。本回情节：恶人谷十大恶人；燕南天恶人谷；海长波道：“只怕还不止四个……‘血手’杜杀，‘笑里藏刀’，‘笑弥陀’哈哈儿，‘不男不女’屠娇娇，‘不吃人头’李
- chapter: 6
  title: 一盏灯，灯光照着燕南天的脸。燕南天只觉得这盏灯似乎在他眼前不停地旋转，他想伸手掩住眼睛，但手脚却丝毫不能动弹。他头疼欲裂，喉咙里更似被火烧一般，他咬一咬牙用力瞪眼，瞧着这盏灯。——灯哪里在转？
