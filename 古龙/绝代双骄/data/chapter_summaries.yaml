- chapter: 20
  title: 这样也不知道过了多久，是几个时辰？还是几天？休息的时候他就将怀中的药丸掏出来吃，既不觉饿，也不觉冷。但出去是无法出去的，他迟早也是要活活地被困死在这里，那么纵然练成了绝世的武功，又有何用？小鱼儿想到这里，便要自暴自弃，只是功夫一不练，就冷得厉害，他死活没关系，又何必在活着时多吃苦。
