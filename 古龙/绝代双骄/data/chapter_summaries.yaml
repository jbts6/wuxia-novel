- chapter: 1
  title: 第一回 名剑香花
  summary: 江湖齐名的玉郎江枫，乔装驱车载着身怀六甲的妻子亡命荒道，遭十二星相司晨客、黑面君等人以鸡猪为警兆截杀，勒索田庄换来的明珠。车中少妇出示移花宫墨玉梅花一度吓退凶徒，却因宫中极少留活口而被识破；她以移花接玉反制黑面君并放走众人，随即动了胎气，于路旁产下双胞胎。司晨客等再至，揭穿其人为移花宫逃出的宫女、两位宫主正要江枫夫妇的命；江枫拼死夺刀恶战，仍被围困，少妇与婴儿落入险境。
- chapter: 2
  title: 第二回 刀下遗孤
  summary: 江枫夫妇血战黑面君与花衣人，黑面君受人所托不许二人同死，黄衣人欲斩孪生婴儿却被无形暗器连断钢刀。怜星宫主现身击毙花衣人，借力令黑面君与鸡冠人互残而死。花月奴求怜星救江枫，邀月宫主突至，令花月奴自尽并阻江枫同死；江枫以断刀自尽得偿所愿。邀月欲杀双生子，怜星提出更毒之计：一子留予燕南天抚养复仇，一子带入移花宫，使孪生兄弟互为仇敌，并故意划伤其中一子面颊以便日后容貌有别。
- chapter: 3
  title: 第三回 第一神剑
  summary: 平凡小镇太白居中，落拓穷汉燕南天以锈铁剑断雷老大精钢剑，又借口宝剑赠英雄收走镖局四人凑出的一千两银子。沈轻虹赶到试剑拆穿，点明此人即江湖第一神剑燕南天。江琴传江二弟密信，约燕南天由废道相接；沈轻虹求其震慑十二星相护红货并献黄金，燕南天因二弟急事拒之，瞬息十丈外离去。
- chapter: 4
  title: 第四回 赤手歼魔
  summary: 燕南天途中赤手落鹰救燕，循婴儿啼哭见江枫一家惨状；沈轻虹与雷啸虎赴约对抗十二星相，金猿星以宋德扬人头与夺得的红货揭破调虎离山。燕南天背负遗孤现身，赤手撕杀黑犬星等众，挖去金猿星双目后得知江琴卖弟并逃往恶人谷，决意闯谷复仇。沈轻虹因镖银暂饶金猿星。燕南天于太白居沽酒哺婴、购棺亲手入殓江枫月奴，又闯千里香以香料敛葬，途中请农妇哺乳遗孤。
- chapter: 5
  title: 第五回 恶人之谷
  summary: 燕南天怀抱婴儿经玉龙哈什河入昆仑，于玉龙峰下遭暗器与剑光伏击，以绝强武功逼退昆仑四子与川中三义；众人原为拦截投奔恶人谷的司马烟。杨平等劝阻并历数谷中杜杀、哈哈儿、屠娇娇、李大嘴、阴九幽等魔头，燕南天仍孤身拉车入谷。谷中灯火如市，酒店掌柜哈哈儿佯认其为穿肠剑司马烟，诱其食用天吃星以独门迷药配制的酒菜，燕南天真气尽失昏厥，婴儿啼哭渐远。
- chapter: 6
  title: 第六回 毒人毒计
  summary: 燕南天在恶人谷中醒来，被哈哈儿引见杜杀、李大嘴、屠娇娇、阴九幽等魔头；他暗中破去点穴、挣断牛筋铁线，吓散众魔并折断杜杀右腕。寻子途中放过自称改过的万春流，又中司马烟以木偶、暗器与火药襁褓等连环毒计。最终屠娇娇假扮弟媳尸身突袭，点中其四处大穴，众魔争相邀功欲杀天下第一剑客。
- chapter: 7
  title: 第七回 漏网之鱼
  summary: 哈哈儿提议不让燕南天痛快死去，众恶人轮番以阴风搜魂手、销魂美人功、刮骨刀、伐髓洗脑等折磨之。万春流审定其十四经脉毁八，请求留下作药草试验并喂下药丸。众人又欲杀啼哭的婴儿，屠娇娇力阻，主张将孩子培养成天下最恶之人以乱江湖、为恶人谷出气，众人同意，将孩子唤作小鱼儿。
- chapter: 8
  title: 第八回 近墨者黑
  summary: 小鱼儿在恶人谷中轮流跟随杜杀、哈哈儿、阴叔叔、李叔叔、万春流、屠娇娇等人长大。杜杀以杀狗、杀狼逼其练胆练刀；哈哈儿教他以笑为武器、先示好再下杀手。小鱼儿向屠娇娇讨得臭药整治爱乱嗅的李大嘴，又拿李大嘴杀的肉整得屠娇娇大吐，并攒下奇药奇器。后小鱼儿诱使杜杀与猛虎搏斗，杜杀以钢钩杀虎却肩被抓伤。少年小鱼儿在谷口遇见逃入的杀虎太岁巴蜀东，听闻其仇家包括江南双剑丁家兄弟、病虎常风、江北一条龙田八及小仙女张菁，并得知虎林七太岁几乎被张菁杀绝。
- chapter: 9
  title: 第九回 青出于蓝
  summary: 巴蜀东入恶人谷炫耀杀虎三绝手，反被小鱼儿戏弄并夺去缅铁软刀；闷雷刀宋三带其离开时提起燕南天，阴九幽当场杀死巴蜀东，屠娇娇又以销魂掌制住宋三。谷中众恶人齐聚杜杀处，公认小鱼儿已青出于蓝、人人惧怕，决议即日送其出谷。小鱼儿暗中将刀送给老西以掩行踪，与万春流探望病榻上的燕南天，并回忆五年前黑袍女子告知其姓江、父江枫为移花宫所害等身世秘密。
- chapter: 10
  title: 第十回 谷外风光
  summary: 恶人谷众人为小鱼儿饯行，赠藏青锦衣、腥红斗篷、金鱼帽、皮靴与金叶子；小鱼儿头也不回走出恶人谷，至藏边草原见牛羊马群与营火藏女，结识桃花并留宿其帐篷。次日市集上小鱼儿以高价买马、识破假珠花，并注意到一位冷漠的白衣少年。
- chapter: 11
  title: 第十一回 旁门左道
  summary: 小鱼儿与桃花回帐篷后，故意以一两金叶子买下众商贩漫天要价的货物并扬长而去，再将十来名江湖客打得七零八落。他牵小白马抛尽赃物，桃花追来争执后含泪策马而去。白衣少年拦路讨还货物并欲收小鱼儿为徒，双方约定输者为徒比武；小鱼儿融会杜杀、阴九幽、李大嘴、屠娇娇、哈哈儿五人武功与对方的疯狂一百零八打对攻，门路复杂难辨。
- chapter: 12
  title: 第十二回 意外风波
  summary: 小鱼儿与使疯狂一百零八打的白衣少年交手，编造七步阴风掌并以点血截脉之计逼其拜师，对方自报铁心男。桃花赶来哭求：关内强盗围困族人帐篷，要找"姓铁的小子"。铁心男挺身前往，轻松击溃李家兄弟刀鞭围攻，却骤遇峨嵋山上三根毛——毛毛虫、毛公鸡、毛猩猩；小鱼儿牵小白马暗中跟随观战。
- chapter: 13
  title: 第十三回 仙女惩凶
  summary: 毛家三兄弟尾随李家兄弟追杀铁心男，当众虐杀李家兄弟并生食人心；铁心男难敌三人。红衣少女张菁（小仙子）驰马赶到，鞭惩李家兄弟并击毙毛公鸡、重创毛毛虫与毛猩猩，随即向铁心男索要藏宝秘图。小鱼儿暗中以火烧其坐骑樱桃的马股马尾逼其远去，与铁心男逃入破木屋。铁心男自称秘图已由其兄调包带走，后在井水中下迷药欲脱身，反被小鱼儿换碗迷倒；小鱼儿正欲搜身时，红衣人影无声贴近其身后。
- chapter: 14
  title: 第十四回 倩女现形
  summary: 星光下小仙女张菁欲对中迷药的铁心男下手，小鱼儿装傻周旋并以谎话骗取信任；借提水泼湿之机点住张菁穴道，报还三记耳光并以吻代第三掌，自承火烧樱桃、水淹仙女后扬长而去。铁心男提前醒转点穴制住睡着的小鱼儿，因被搜身羞怒拔匕首，痛哭奔逃后又折返，请小鱼儿陪同前往昆仑山恶人谷寻人。小鱼儿自承在恶人谷长大，点破对方要找的是狂狮铁战、铁心男真名铁心兰且铁战为其父；二人离开草原。
- chapter: 15
  title: 第十五回 有惊无险
  summary: 小鱼儿得知铁心兰是女子后拒绝结伴与收徒，假意分手却暗中等候；铁心兰因伤心与风寒重病昏迷，小鱼儿在海晏客栈悉心照料并开药。安西、定远两镖局中人带着被小仙女打肿的脸在酒铺相遇，张菁现身催他们找人。小鱼儿用从姓屠者处偷来的人皮面具与绣花小布袋中的易容道具，将自己与铁心兰扮成老夫妻，牵着涂泥伪装的白马小白菜从张菁刀下沉着走过。出城后小鱼儿再次要分手，铁心兰痛哭掴他，话音未落有人冷笑打断。
- chapter: 16
  title: 第十六回 弄巧反拙
  summary: 小仙女识破小鱼儿伪装，以奇快掌法连殴；小鱼儿装败诱其大意，反点穴制住并略施惩戒后放走。小鱼儿扶铁心兰骑上小白菜离去；铁心兰说明张菁夺藏宝图是为安慰母亲玉娘子张三娘，并言及藏珍主人剑客燕南天入恶人谷未归、留下藏宝图与剑谱。途中黑蜘蛛现身马后，称本为藏宝图而来，却因小鱼儿有趣而放弃图欲交其为友。
- chapter: 17
  title: 第十七回 碧蛇神君
  summary: 小鱼儿拒称黑蜘蛛大哥，黑蜘蛛施展神蛛凌空、银丝渡虚离去并预言大祸。马臀现碧磷蛇印，铁心兰认出乃十二星相食鹿神君（碧蛇神君）之志，因燕南天藏剑谱旧怨而来。两人逃入山村求食，小鱼儿凭滚烫饭碗识破毒砂掌伪装，糙米饭中有青蛇，村民遇害。再逃遇蛇阵与假蛇，小鱼儿捏蛇中软剑剧毒，臂血发黑，自知半个时辰难活；遂挥羊皮藏宝图诱出碧蛇神君并吞图要挟。碧蛇神君欲剖腹取图，小鱼儿以死蛇中剑暂挡，终不敌；危急时甜笑女声喝止，语似小仙女，碧蛇神君剑断色变。
- chapter: 18
  title: 第十八回 慕容九妹
  summary: 碧蛇神君欲对小鱼儿开膛，慕容九妹与表弟顾人玉现身；碧蛇神君自断左手逃遁。铁心兰求药不得，小鱼儿反激九妹，九妹以慕容姐妹之名将其与铁心兰带入依山庄院，并以黑色玉瓶解药救治。顾人玉自承为慕容姐妹表弟，铁心兰道破慕容九姐妹即人间九秀。小仙女张菁来访欲杀小鱼儿，九妹以庄院不杀人为由拦阻，顾人玉亦出手助阵；小仙女扬言出庄必取命后离去。小鱼儿继续言语逗恼九妹，随其巡视大姐至三姐闺房，谈及美玉剑客与南宫世家等姻亲。
- chapter: 19
  title: 第十九回 爱恨情仇
  summary: 小鱼儿随慕容九妹参观后被锁入药室，偷吃珍贵药草与丹药，撬开铜门闯入冰窖，撞见慕容九妹赤身修炼化石神功第三转，并扯下九幅功法图烧毁后逃离。林中遭小仙女截杀痛揍，慕容九妹赶来反要杀他，两女刀剑相争间小鱼儿溜走并逃回慕容山庄冰窖藏匿。两女与铁心兰整理丹药时，慕容九妹用熔铅封死钥匙洞，欲将小鱼儿关死在内；小鱼儿被困后被迫盘膝运气，药力随真气流转而功力暗增。
- chapter: 20
  title: 第二十回 人心难测
  summary: 小鱼儿被困石室濒死，慕容山庄遭火，冰融水沸；十二星相白羊黄牛破门而出，小鱼儿伪称李大嘴兄弟骗取信任，一路同行入关至峨嵋。白羊黄牛实受蛇老七之命为燕南天藏宝而来，于峨嵋下以毒酒反制小鱼儿，揭穿圈套。
- chapter: 21
  title: 第二十一回 尔奸我诈
  summary: 小鱼儿中了黄牛、白羊酒中迷药，反以假称牛肉有毒、乳根穴发麻等连环欺诈，骗二人跪誓喂解药；又令其抢服有毒'解药'，双双中僵尸散倒地。碧蛇神君自窗而入，认出僵尸散却弃二人不救，以独门迷药余威与碧丝蛇胁持小鱼儿，逼问得藏宝在峨嵋后山后蒙头带走。途中避过小仙女与慕容九妹，二人正跟踪铁心兰，铁心兰则在此等候小鱼儿。
- chapter: 22
  title: 第二十二回 阴错阳差
  summary: 小鱼儿被碧蛇神君以碧丝蛇挟持，带路至峨嵋后山幽秘洞穴寻燕南天宝藏。洞中先见金陵三剑尸身，随后灰蝙蝠与猫头鹰现身；小鱼儿挑拨二人反目，猫头鹰与碧蛇神君先后毙命，灰蝙蝠亦被小鱼儿头上毒蛇咬死。赵全海、雪花刀柳玉如、关外神龙剑冯天雨等接踵而至，小鱼儿化名玉王子唬住众人。洞深处又遇王一抓、黄鸡大师、啸云居士、孙天南、邱清波等老怪物拼斗。众人以为月下石幢下有宝藏，掀开后却只见十三口棺材与历代祖师灵位，邱清波疑是峨嵋派厝灵禁地。
- chapter: 23
  title: 第二十三回 奇峰迭起
  summary: 黄鸡大师等人误入峨嵋禁地灵堂，王一抓等欲退，冯天雨点破棺材或为藏宝处，众人正欲查验时八道石门开、强光射出，神锡道长率峨嵋弟子围攻。小鱼儿以身上毒蛇唬退剑势，并指出早有人告密布下火并圈套；他掷出药匣反被斩碎。灯火骤灭，铁心兰牵小鱼儿脱身，灯再亮时移花宫白衣少女荷露与圆脸同伴现身，以移花接玉反拨峨嵋双剑，并向神锡道长索燕南天藏宝、要开棺搜检。双方冲突升级，花无缺以极迅身法尽夺峨嵋数十柄长剑，又托住欲自刎的神锡道长之手，谦词化解杀局，众人遂罢争告退。小鱼儿负气出洞，与铁心兰口角又和好，谈及花无缺神气、毒蛇难除；后路被小仙女与慕容九妹堵住，小鱼儿散发作鬼哭恐吓慕容九妹。
- chapter: 24
  title: 第二十四回 死中求活
  summary: 满身毒蛇的小鱼儿现身，吓晕慕容九妹并吓跑小仙女；他欲以蛇毒杀慕容九妹，被花无缺劝阻后放人。慕容九妹梦呓喊出江小鱼，花无缺称受师命必亲手杀之。花无缺以仙子香与素女丹救活小鱼儿，仍要堂堂正正取其性命；小鱼儿以自尽相胁退出竹屋，假作失足坠崖，实则贴壁藏身脱身。铁心兰痛哭欲殉被拦，慕容九妹神智错乱仍认自己已在慕容山庄杀过他。
- chapter: 25
  title: 第二十五回 死里逃生
  summary: 小鱼儿攀峭壁时遭峨嵋猴群扑扰，尖刀坠落、自身也几乎跌入深渊，被洞中伸出的猴爪抓住衣发救起。洞中困着容貌似猴的献果神君与枯瘦的沈轻虹，二人是十四年前因红货反目、同绳垂入山洞后绳子被烧而互困仇敌；献果神君属十二星相，靠驱猴抛果维生，并展示两箱珠宝。小鱼儿自报名江小鱼，夸口三个月内救出二人，与献果神君立下以脑袋为注的约定，随即抓起最大翡翠抛出洞外。
- chapter: 26
  title: 第二十六回 巧计脱困
  summary: 小鱼儿以抛掷珍宝诱猴传讯的巧计，说服沈轻虹与心疼至极的献果神君连日丢宝求援。猴群先后投入人头、铁如龙断手与三环剑、吴钩剑、五毒霹雳雷霆珠、九环刀、判官笔、飞凤剑等大量成名兵刃，显示悬崖之上武林高手已惨烈火并。沈轻虹逐一辨认死者身份并排除移花宫主、血手杜杀、狂狮铁战与燕南天等嫌疑；献果神君欲伏击来者。长夜将尽时，洞外伸出纤细美手，传来甜美女声问有人在家否，小鱼儿与之戏谑应答。
- chapter: 27
  title: 第二十七回 脱困入困
  summary: 绿裙少妇自百丈危崖外步入洞窟，以柔言巧计说服献果神君与沈轻虹先后攀索，前者中毒针坠崖、后者因绳断惨落。她自称从不亲自动手杀人。崖上有人狂呼姓萧的鬼丫头，扬言十天十夜活罪；少妇惊惧欲死，诱小鱼儿相拥跳下绝壑，却以背后五色大伞缓落至谷底。谷底如瓶底死地，草地整齐却无风无声，献果神君与沈轻虹尸骨全无；二人发现粗树下半截树皮光滑如门，小鱼儿笑敲问有人在家否。
- chapter: 28
  title: 第二十八回 穴里乾坤
  summary: 小鱼儿与绿裙少妇发现空心树内门户，进入后被筒状机关送入地下华丽地道；绿裙少妇随即被铁筒机关以火烧死。小鱼儿独自深入厅堂，在神秘语声诱使下吃下特备毒鸡昏迷。醒来见数名清秀男子，并得知此处有女王；女王现身，竟是先前看似被烧死的绿裙少妇。
- chapter: 29
  title: 第二十九回 颠倒乾坤
  summary: 萧咪咪揭穿自己是地下宫殿主人，戏点小鱼儿为皇后；小鱼儿认出她是十大恶人萧咪咪，并模仿恶人谷五人口吻自证来历。送酒少年江玉郎遭萧咪咪凌辱，小鱼儿借故与其独处探路却遭其当面告发。轻衫少年尽死，萧咪咪外出查探；小鱼儿识破江玉郎装晕，追至粪坑发现其耗一年挖出的藏身洞，点穴制住连环踢反扑。二人暂避洞中，小鱼儿察觉江玉郎狠忍可畏，又念及更深不可测的花无缺；因忘盖粪坑盖，江玉郎听壁惊觉萧咪咪已回。
- chapter: 30
  title: 第三十回 作法自毙
  summary: 小鱼儿与江玉郎躲在粪坑下地洞，约定静等萧咪咪离开；小鱼儿不解开江玉郎穴道并假睡，江玉郎偷藏发髻中的藏宝图纸却被识破。小鱼儿撕毁该图，揭穿其为与铁心兰所交相同的假藏宝秘图，并追问来源，得知江玉郎自其父书房偷出。萧咪咪隔坑呼唤，随即堵死出口欲困死二人；小鱼儿拍开江玉郎穴道，江玉郎绝望发呆后突然一掠而起，欲掌杀小鱼儿。
- chapter: 31
  title: 第三十一回 柳暗花明
  summary: 小鱼儿与江玉郎困于地洞，为争存活互殴；氧气将尽时，小鱼儿见酒水不积而挖开木壁，进入八角形机关密室。扳动绞盘打开石门，发现一室骷髅工匠尸骸。上方萧咪咪将死尸抛入豪华坟墓。二人退回密室，推断金、银、铜、铁、锡五面墙后另有机关，决定先试金墙。
- chapter: 32
  title: 第三十二回 地下宝藏
  summary: 小鱼儿与江玉郎打开地下宝藏，先见满屋珠宝，小鱼儿尽数让给江玉郎却又因困局互弃财物；再入兵器库，江玉郎细说九现神龙鬼见愁，小鱼儿毁之，并发现中天绝地灭透骨穿心针而死的乌黑骷髅，两人各暗取针筒与竹筒。铁屋中两具互杀同尽的骷髅显出鹰爪功与掌力，矮几上留有五位绝顶高手所记武功秘笈。江玉郎以空针筒威胁独占宝藏，被小鱼儿当场识破，只得垂首退出。
- chapter: 33
  title: 第三十三回 当代人杰
  summary: 小鱼儿与江玉郎打开锡屋，发现猛狮骸骨、毒药瓶与第四具尸骨；江玉郎以五毒天水威胁，反被小鱼儿空针筒吓晕。两人继入银墙后寝宫，见多具女尸及不腐的虬髯大汉与绝色女子。小鱼儿寻得方灵姬绢册，得知欧阳亭为当代人杰，建地灵宫诱杀天地五绝以成空前武功，方灵姬为报灭门仇以毒酒与其共死。
- chapter: 34
  title: 第三十四回 盖世恶赌
  summary: 萧咪咪现身密室，以剑挟持小鱼儿并与江玉郎铐在一起，搜走透骨针与五毒水，取得淡黄绢册后欲杀人灭口。小鱼儿诱其拉开土墙吊环，洪水灌入；不通水性的萧咪咪落水，江玉郎骗得秘笈见死不救。两人再开木绞盘，随水冲出地底宫阙，发现出口在小庙神像下。庙中神案上箕踞的泥腿客竟是十大恶人中的恶赌鬼轩辕三光，正逼土财主王百万猜铜板赌手脚，并再与其跟班赌钮扣。
- chapter: 35
  title: 第三十五回 智得铜符
  summary: 王大立赌赢轩辕三光后离去。轩辕三光逼邱清波以妻为注，邱清波宁死不辱，掌击天灵自尽。王一抓、孙天南突袭反被击溃致死。小鱼儿与江玉郎钻出石板，遇独眼恶赌鬼轩辕三光对饮。神锡道长为护峨嵋圣地前来索命，双方以头颅对掌门铜符豪赌；轩辕三光脚不离地连避三剑，以口咬腕反胜夺符。小鱼儿再以人身为注，赌身上伤疤数目，当场自划九道新疤凑满一百，智赢铜符，却把铜符还给神锡道长。
- chapter: 36
  title: 第三十六回 貌合神离
  summary: 小鱼儿与江玉郎仍被铐在一起,轩辕三光试砍手铐未果后离去。二人下山后连续得到匿名者送来的衣服、银两、房饭,再沿岷江南下到叙州,又有人包下乌篷船,船上史老头与史蜀云形迹可疑。江玉郎夜半取秘笈欲杀小鱼儿,被窗外飞来的干莲子打偏;次日秘笈又被小鱼儿"失手"落入江中。江上遇江南金狮镖局紫面狮李挺,江玉郎与其密谈托事,貌合神离之局更紧。
- chapter: 37
  title: 第三十七回 惊险重重
  summary: 小鱼儿乘史老头、史云姑之船经夔州出巫峡，江面船只挂黄绸避让，黄巾大汉驾瓜皮快船截杀；云姑铁莲子伤敌，史老头清啸长竿扫退群凶。黄花蜂首领认出史老前辈后赔罪放行，并称其二十年前威震水路。小鱼儿识破江玉郎勾结紫狮子与强盗害己。船至宜昌上岸，江玉郎与白凌霄、李明生、花惜香、何冠军、梅秋湖及孙小妹会合，对小鱼儿冷落欺侮。玉楼东宴会中，玉面神判、鬼影子何无双、金狮李迪等奉峨嵋掌门神锡道长之托为小鱼儿接风，一路暗中照应之人终得揭晓。
- chapter: 38
  title: 第三十八回 江南大侠
  summary: 玉面神判萧子春等人以神锡道长之托款待小鱼儿后围楼索命，判官笔点向天突时被恶赌鬼轩辕三光以酒杯套笔救下；轩辕三光一口酒击退鬼影子何无双，夺刀剑掴人，一刀分烛台茶几，逼江玉郎赌臂。江别鹤登场代子应赌，以鱼翅羹震碗赌法未战而令轩辕三光认输，任凭处置。
- chapter: 39
  title: 第三十九回 假仁假义
  summary: 江别鹤以一杯酒化解与轩辕三光的生死赌注,又将小鱼儿带回简朴庄院,假意寻锁匠、寻宝剑却暗持短剑、以情锁困住小鱼儿并令江玉郎监视。小鱼儿夜半以铜丝开锁,点倒江玉郎后潜入后园,发现花房地道与密室,在"本草"书盒中找到易容面具、毒药、银票、名门名单,并以灰尘抹出燕南天藏宝图压痕,判明伪造藏宝图、挑动天下英雄自相残杀者正是这位"江南大侠"。小鱼儿归位复锁后仍被江别鹤设局识破;江别鹤爱其才智却决意灭口,并计划借刺客之手杀小鱼儿以坐实仁义之名。
- chapter: 40
  title: 第四十回 冤家路窄
  summary: 小鱼儿被江别鹤点穴囚于卧房。铁心兰黑衣夜袭误砍床上之人，花无缺暗随而至两度折断其柳叶刀。江别鹤伪称小鱼儿为贤侄并挟制其穴道；铁心兰听出声音后欲带走花无缺。花无缺识破江小鱼身份执意亲手杀他，江玉郎装中毒嫁祸，江别鹤拔剑反被花无缺拦住。花无缺留下仙子香与素女丹后押小鱼儿离去。江氏父子随即怀疑府中老聋子实为改扮的狂狮铁战，扬言宁可错杀不漏。
- chapter: 41
  title: 第四十一回 流浪江湖
  summary: 江别鹤欲杀老人未果。花无缺与小鱼儿对峙，铁心兰赤身相救，小鱼儿含泪狂奔离去。小鱼儿痛悔自身无真本事，加入走江湖的海家班，以翻筋斗为业，人称海小呆，暗中苦练秘笈武功。某日岸上再见花无缺、铁心兰、慕容九妹、江玉郎与白凌霄，妒火中烧，冲动吻了海红珠。夜场海红珠走索失神跌落，白凌霄、李明生借机欺辱，小鱼儿出手重创二人后逃离；海红珠知他再不会回来。
- chapter: 42
  title: 第四十二回 巧识阴谋
  summary: 小鱼儿离开海红珠后流落四海春饭馆，先洗碗后凭恶人谷所学厨艺掌勺成名。铁无双在馆中宴请赵全海、厉峰等调解镖银之争，席间二人中天山雪魄精毒。小鱼儿窥见紫衣白面少年与黑衣人（语声酷似江玉郎）交接得手，以移穴大法避过神枢点穴，并抛下解药药方后悄然离城。其后江岸再遇未认出他的李明生、李迪、李挺，江面黑衣轻舟将至。
- chapter: 43
  title: 第四十三回 奇峰迭起
  summary: 仁义三侠黑衣约战双狮镖局，亮出梅花钩；江玉郎介入缴械并揭出海红珠、海四爹身份。小鱼儿假扮黑心贼亡魂吓退江玉郎与双狮父子，跳江后被女孟尝救起，入安庆庆余堂管药库。段合肥镖银于双狮镖局无声失踪，小鱼儿察觉内幕未必简单。
- chapter: 44
  title: 第四十四回 扑朔迷离
  summary: 小鱼儿思量镖银被劫之谜；三姑娘先后告知江玉郎夺回镖银，以及双狮镖局九十八人被虬髯老人一夜尽杀、镖银再失。小鱼儿怀疑江玉郎自导自演，并与三姑娘谈及她被当成男子看待的痛苦。次日段合肥召见小鱼儿并留其吃红烧肉，庆余堂上下对其态度大变。夜有锦衣大汉买尽附子、肉桂、犀角、熊胆，黑衣女子荷露寻药未果，小鱼儿认出其为移花宫侍女。
- chapter: 45
  title: 第四十五回 暗藏奸诈
  summary: 小鱼儿屋顶追踪荷露，窃听得知铁心兰中极寒毒、解药被搜购一空，疑凶心机深沉；因树叶声响暴露，遭江别鹤与花无缺联手追击，江抛七点银星、花以惊人内力收星。小鱼儿窜入宅院闹出动静，误闯三姑娘（段合肥之女）闺房，被其制住却又获救并送出偏门。小鱼儿循昨夜击穿药包留下的药末与药味，寻至地灵庄，窥见赵庄主宴客及满厅寒热药材，更认出宾客中有"爱才如命"铁无双，方知下毒者竟是铁心兰所信任之人。
- chapter: 46
  title: 第四十六回 巧识毒计
  summary: 小鱼儿暗窥赵香灵宴请铁无双与罗三、罗九，识破罗氏昆仲以平庸双盘掌、大洪拳示人的深沉城府，并猜透连夜送来附子等解药是栽赃铁无双的连环计。他易容潜入赵家庄，从青皮与家丁处得知赵香灵与段合肥商场仇深、欲借铁无双名头镇压。次日江别鹤携花无缺造访，花无缺自花厅取出解药，江别鹤以搜购解药逻辑质问赵香灵，铁无双起身为赵担保反被反诘。
- chapter: 47
  title: 第四十七回 计中之计
  summary: 花无缺以解药与内力救醒中毒的铁心兰；铁心兰称吃了铁无双所送枣子后昏迷，江别鹤借罗氏兄弟默许与假轿夫当众坐实铁无双劫段合肥镖银并欲害花无缺之罪，假轿夫反以掌力震伤铁无双。花无缺限今夜子时了断后离去。罗九怂恿赵香灵先下手绑架段合肥父女以为人质，小鱼儿权充轿夫随行；罗氏兄弟以暗青子与毒辣武功连破段宅守卫，劫走段合肥与段三姑。归途与江别鹤、花无缺轿马交错，双方互不揭穿，小鱼儿由此识破江别鹤与罗氏暗中勾结的计中之计。
- chapter: 48
  title: 第四十八回 揭发奸谋
  summary: 段合肥父女被劫入地灵庄后，罗三、罗九怂恿赵香灵以人质与埋伏智取江别鹤、花无缺，并拖铁无双下水。江别鹤计谋得逞，破伏后罗氏兄弟反咬赵香灵；段合肥实已被救出。赵香灵在神秘幽灵指点下当众揭发江玉郎假充轿夫、串通双狮镖局劫镖灭口的奸谋，轿夫以飞鹰搏兔突袭失败。乱中铁无双利剑穿喉而死，幽灵断言绝非自杀。
- chapter: 49
  title: 第四十九回 幽灵之谜
  summary: 大厅对质中，"幽灵"（小鱼儿）指证绿衫少年受江玉郎指使毒害赵全海并刺死师父铁无双；绿衫少年惊溃欲逃，被江别鹤掷剑灭口。江别鹤反咬"幽灵"与已遁走的"轿夫"串通，逼小鱼儿露脸。小鱼儿以铁心兰激花无缺，梁上对峙后凌空猛攻，被花无缺一招"移花接玉"反伤自仆。暗器灭灯后罗九救走小鱼儿，罗三一人装两人声掩护；罗九自白欲联手揭破江别鹤假面，小鱼儿应允结盟。
- chapter: 50
  title: 第五十回 意料之外
  summary: 小鱼儿随罗九至其秘密阁楼，见布置者梦姑娘实为失忆的慕容九妹；罗三回报铁无双已死、江别鹤得意。小鱼儿欲近慕容九妹时被黑蜘蛛银丝所阻，二人相认后黑蜘蛛离去。慕容九妹为驱「恶魔」自脱衣纠缠，小鱼儿以毡子与冷茶约束后易容离阁，于闹市购衣用餐，再至地灵庄外见武林人士为铁无双聚集，疑张菁胭脂马在场却未寻见其人。
- chapter: 51
  title: 第五十一回 假仁假义
  summary: 铁无双丧礼上赵香灵披麻戴孝，江别鹤当众假仁假义祭奠。黑衣女子当众斥其猫哭老鼠，顾人玉震飞挑衅者后与其联骑离去，群豪疑为小仙女。泥腿汉子送来署名愚婿李大嘴的怪挽联，实为白开心装死戏弄小鱼儿后轻功遁走。夜市中小鱼儿窥见南宫柳、秦剑气派非凡；回罗九处得知二人及顾人玉等因慕容家姑娘失踪赶来，罗九出示十大恶人真容图指认白开心，双方约定仇人各留。
- chapter: 52
  title: 第五十二回 装傻装疯
  summary: 小鱼儿借口阁上有蜘蛛离开罗九兄弟，夜伏邻房屋脊，果然等来遥望慕容九妹的黑蜘蛛。黑蜘蛛自称暗查罗九兄弟挑拨武林火并，又难掩对九妹的怜惜。他邀小鱼儿出城至荒祠会友「古月言」，锅中肉香扑鼻却不见人；小鱼儿识为人肉，黑蜘蛛联想到李大嘴与「胡说」之名后仍洒脱大笑。小仙女持剑闯入挑翻铁锅，锅中现出宛儿金钗，顾人玉、南宫柳、秦剑随后赶到，指二人食人。黑蜘蛛辩称嫁祸，小鱼儿却故意承认加害九妹，激怒小仙女与顾人玉三拳一剑夹击。
- chapter: 53
  title: 第五十三回 栽赃嫁祸
  summary: 小鱼儿以移花接木夺剑反制小仙女、顾人玉，却躲入黑蜘蛛身后搅局，终以断玉分金逼退二人，借黑蜘蛛银丝飞蛛脱身，并约南宫柳、秦剑明夜三更再战。城下他坦白拖黑蜘蛛下水，指江别鹤为伪君子，定计以牙还牙：令慕容九妹笔迹写八十万两白银勒索条、由黑蜘蛛投送，将藏人栽赃江别鹤。凌晨后他恢复药铺伙计见段三姑娘，确认江玉郎不在并约后园小门；又于思乡馆贴告示约白开心，易容李大嘴相见，揭其假借名头送挽联、栽赃吃人之事，诱其再写三更至段合肥家后院的害人信，同时备假信诱江别鹤赴祠堂。
- chapter: 54
  title: 第五十四回 略施巧计
  summary: 思乡馆遭江别鹤等人围攻，小鱼儿假扮李大嘴，以凳子声东击西，用鸳鸯双飞脚与冲天炮突围，并将信交到江别鹤剑尖后脱身。暗林中白开心以水晶断肠散讹诈，小鱼儿反点穴、谎称喂下黑煞催命丸，逼其办事。小鱼儿再回阁楼，接出慕容九妹，交段三姑娘于三更时分藏入江别鹤屋中。
- chapter: 55
  title: 第五十五回 巧妙安排
  summary: 小鱼儿将慕容九妹交三姑娘送往江别鹤处，自己在祠堂设局，算计秦剑、江别鹤、白开心与慕容家多方相撞，自谓一举六得。三姑娘因嫉妒刺激慕容九妹，致其痛哭狂奔，打乱送人环节。祠堂中慕容家女扮孝妇携棺银与暗器诱敌，江别鹤率黑衣人与铁胎弓对峙；小鱼儿暗掷尖石乱箭阵，并拉线落下白布栽赃。江别鹤识破对方为慕容双等人，双方起疑中了挑拨；小鱼儿再落第二道白布，却不知慕容九妹并未如期被寻获于江宅，计划已出岔子。
- chapter: 56
  title: 第五十六回 作法自毙
  summary: 慕容珊珊、小仙女、慕容双凭布条认定黑衣人为江别鹤并合剑围攻；黑衣人抛剑反挟慕容珊珊，双方僵持。南宫柳、秦剑、顾人玉赶到，称九妹不在江处且花无缺、铁心兰亦证其早已失踪，疑点转向暗中陷害者并围住小鱼儿藏身处。慕容九妹突然现身，先痴后醒，指江别鹤以迷药逼婚自己逃出；众人再围黑衣人，对方大笑揭巾露出虬髯，否认是江别鹤，反指江别鹤就在小鱼儿藏身处并拍掌攻入。
- chapter: 57
  title: 第五十七回 意外之外
  summary: 小鱼儿与黑衣人互指对方为江别鹤易容，对骂对打后分头逃逸。白开心截住小鱼儿指其为真江别鹤后离去，慕容姐妹与秦剑、南宫柳围攻，南宫柳点穴导攻使小鱼儿多处负伤。慕容九妹远处惨呼，众人以为江别鹤劫人而散，南宫柳判明小鱼儿非江别鹤并指其旁骛太多。小鱼儿林中休整时遇“慕容九妹”，识破为屠娇娇：她离恶人谷后曾扮罗九楼下傻丫头，现又扮九妹；并揭罗九兄弟即当年吞没十大恶人托付财物的欧阳兄弟，且以肥胖为易容。
- chapter: 58
  title: 第五十八回 天降怪客
  summary: 屠娇娇向小鱼儿点破自己把风、递面具与白开心配合之事，并暗示恶人谷有变。黑蜘蛛现身，细说送假信中南宫柳空屋圈套，被戴青铜面具、轻功绝顶的怪人挟出，后又被点穴留树、解开后奉命送信给花无缺；花无缺称其为移花宫主所嘱的「铜先生」，并力保江别鹤。黑蜘蛛去寻仇，小鱼儿心挂真慕容九妹、恶人谷变故与铜先生身份，终登屠娇娇变出的华丽马车离去。
- chapter: 59
  title: 第五十九回 惊人之变
  summary: 小鱼儿与屠娇娇同行，得知江湖哄传花无缺为江别鹤撑腰、将与慕容家姑爷们斗武；屠娇娇又透露恶人谷中万春流与药罐子失踪，并称药罐子即未死的燕南天，恶人谷人因此不敢再居。众人赶至山谷看热闹，慕容双、慕容珊珊与小仙女张菁盛装而至，南宫柳与秦剑却称家事未到；慕容姐妹以三事相难，要花无缺金鸡独立任二百人来推，花无缺应允，单脚踏陷石地半寸，十八名轿夫连环冲推而来。
- chapter: 60
  title: 第六十回 天之骄子
  summary: 花无缺以移花接玉将十八条大汉推力转为下压而不倒，再以寒凫戏水双足不沾地往返安庆取回热腾腾的八宝饭与千层糕，最后请车厢内铁心兰开门完成第三难，慕容姐妹认输离去。小鱼儿因铁心兰在花无缺车中心如刀绞，随即依约引欧阳丁、欧阳当登上屠娇娇马车；车垫下白开心、哈哈儿突然出手擒住二人，屠娇娇向其追索旧物，欧阳丁推说被路仲达所抢。车停后窗外出现杜老大苍白冷漠的脸，欧阳兄弟惊恐失色。
- chapter: 61
  title: 第六十一回 阴狠毒辣
  summary: 杜杀重聚恶人同伴，逼迫欧阳兄弟交出藏宝地点；欧阳丁供出龟山洞穴并画出地图。阴九幽赶到，称远远瞧见燕南天，十大恶人闻名失色撤离龟山。屠娇娇剁去欧阳兄弟手足并浇白糖后离去。小鱼儿心向燕南天，回救欧阳兄弟；二人临死吐露龟山实为恶魔陷阱，真宝藏在汉口城八宝里黄门三小屋。小鱼儿洗净换装，在安庆状元楼目睹花无缺与车中丽人，自问是否要一辈子躲着他。
- chapter: 62
  title: 第六十二回 情有独钟
  summary: 小鱼儿追上出城的花无缺，约三个月后于武汉一带生死一战并约定期前不得动手；铁心兰挡在二人间却被小鱼儿推开故作不识。城外花无缺与铁心兰互诉情愫，懒汉燕南天现身，误认花无缺为江小鱼而逼两人当场成亲，锈剑断木以武相逼。铁心兰先应后吐真言，花无缺宁死不从，反以移花接玉交手却被燕南天化解；燕南天自承与移花宫仇深如海，花无缺遂识破其身份。
- chapter: 63
  title: 第六十三回 剑气冲霄
  summary: 花无缺为移花宫声名与燕南天比剑，银剑七虚招无法撼动燕南天刚猛铁剑，终被震剑晕倒。江别鹤远观认出燕南天后杀死知情车夫段贵以保江南大侠名声。小鱼儿尾随发现段贵尸体，见花无缺将败时不顾恩怨飞扑挡剑，与燕南天相认；燕南天揭移花宫主杀其父母之仇，命其亲手杀花无缺，小鱼儿以三月之约拒绝。燕南天赞其不愧江枫之子，并允为他饶过改恶的屠娇娇等人。铁心兰遭小鱼儿冷待痛哭奔去，燕南天约小鱼儿明日再会后离去，小鱼儿以真气助花无缺苏醒。
- chapter: 64
  title: 第六十四回 神掌挫敌
  summary: 花无缺与小鱼儿约定三个月内暂作朋友，同赴江别鹤酒筵。小鱼儿当众戏弄点倒彭天寿，并当众指证江别鹤见死不救、杀车夫灭口；对战时佯弱诱敌，硬接分花拂柳一掌将江别鹤震飞扬长而去。事后潜入客栈窃听，见神秘高人与江别鹤密谈燕南天出世、江小鱼现身，并胁迫江别鹤从命办事。
- chapter: 65
  title: 第六十五回 神出鬼没
  summary: 小鱼儿跟踪江别鹤后潜入神秘人借住的客栈房间，察觉屋内被洗得一尘不染并散发奇香。他扮茶房探查时被身法如影的铜先生识破；铜先生戴青铜面罩、轻功绝伦，先称永不杀他，却因小鱼儿称颂从未谋面的母亲而暴怒施虐。小鱼儿逃出客栈仍被制住。花无缺醉眠中被铜先生唤起，奉移花宫师命尾随上山，铜先生自树梢抛下被点穴的小鱼儿，命花无缺动手。花无缺因与小鱼儿有三个月之约拒杀，并称纵使家师在场亦不能食言；铜先生厉逼二人，小鱼儿反激其亲自下手，铜先生长啸掠下。
- chapter: 66
  title: 第六十六回 高深莫测
  summary: 铜先生震断林木宣泄掌力，却依花无缺之约暂缓三个月动手，并宣称此间要完好保护小鱼儿；小鱼儿反以保护承诺戏弄铜先生，又请花无缺代告燕南天不能赴约，并点破逼花无缺亲手杀己的秘密仅移花宫主姐妹知晓，终被铜先生点穴。花无缺醉醒后遭江别鹤以愚兄贤弟结纳并暗中盯梢；江别鹤因宋三等在王铁臂把式场跟丢花无缺而施惩，自惧花无缺与江小鱼联手。花无缺以小石断流星锤链脱身出城，至昨日剑气摧残的花林代约，未遇燕南天却见铁心兰抚残花感怀，两人相对唏嘘、欲言难尽。
- chapter: 67
  title: 第六十七回 义薄云天
  summary: 花无缺向铁心兰表明视其为妹、不恨江小鱼；铁心兰改称大哥。燕南天入林寻江小鱼，花无缺告知其被铜先生拘禁；燕南天疑花无缺说谎并怒责铁心兰，二人空手恶斗。燕南天凭花无缺刚烈招式信其未谎，仍扣其为质与江小鱼互换性命。铁心兰心碎离去。另线铜先生将小鱼儿藏于树梢，小鱼儿以言语纠缠逼其移地并装伤试探，铜先生头疼无计。
- chapter: 68
  title: 第六十八回 暗藏奸诈
  summary: 燕南天与花无缺走出花林，议论铁心兰去向、江小鱼被铜先生掳走及铜先生来历，燕南天怀疑其为化名改扮。铜先生将睡着的小鱼儿带回客栈，见其睡颜与刀疤情绪失控捏碎椅靠；小鱼儿醒来以如厕、吃饭要挟对方。燕南天与花无缺入城至扬子江酒楼恰遇江别鹤；江别鹤惊骇，见燕南天称初次相见似未认出自己，强作周旋痛饮。铜先生带小鱼儿再上扬子江酒楼逼店伙供膳；小鱼儿追问仇恨之因，铜先生称秘密永无人能揭。醉后三人夜行，燕南天痛斥江琴出卖江二弟；喝退夜行人；花无缺决意与燕南天同行寻江小鱼。江别鹤诱二人入铜先生歇脚客栈欲借其对付燕南天未果，遂吐酒劝饮，终使燕南天与花无缺醉卧。
- chapter: 69
  title: 第六十九回 千钧一发
  summary: 江别鹤假醉中欲杀燕南天与花无缺，二人实亦假醉；燕南天一掌震飞江别鹤，本欲除害，江别鹤自称知晓江琴下落并自承即是江琴，逼燕南天承诺永不伤害后扬长而去。花无缺由此更服燕南天的大侠之诺。江别鹤院外窥见铜先生与江小鱼同行，疑燕南天、花无缺、江小鱼、铜先生结党，欲寻老虎夫妻等为援。铜先生与木夫人会合，铜先生击晕小鱼儿并声称要一直看守；二人谈及江枫与旧怨。小鱼儿醒来于华丽屋中，以笑话逗得轻纱侍女失笑，铜先生复入。
- chapter: 70
  title: 第七十回 死里求生
  summary: 铜先生因小鱼儿逗笑圆脸少女而暴怒，先掌掴小鱼儿，再反手击毙该女（实为铁萍姑之妹）；小鱼儿以武当、昆仑掌法精萃怒击，却被铜先生奇诡身法轻易化解并击倒。铜先生失望之余抛下黄绢，授三招可破移花宫武功的招式后离去。铁萍姑趁其入定，与小鱼儿约定逃亡；紫衣少女带青衣妇人收碗并令铁萍姑换班时，铁萍姑将其击昏，推开复壁窄门入地道。两人穿行潮湿山腹洞穴，识破石壁箭头实为回庙之路，逆箭而行，火折子渐尽，黑暗中牵手苦寻生路。
- chapter: 71
  title: 第七十一回 柳暗花明
  summary: 铁萍姑与小鱼儿困于山腹绝境时互诉心迹，因肥鼠现身循迹钻出小洞，发现江玉郎新藏的段合肥赃银。洞外江玉郎正与恶赌鬼轩辕三光以老鼠叼肉对赌，并拟以神智迷失的慕容九妹作价两百万两加大赌注。小鱼儿挺身而出，揭穿江玉郎借铜灯灯影操纵赌局的伎俩，人赃并获，要押江玉郎去见段合肥；江玉郎反挟慕容九妹为人质。
- chapter: 72
  title: 第七十二回 峰回路转
  summary: 江玉郎以慕容九妹要挟并栽赃耍赖，五名无牙门黑衣人携铁笼捕鼠闯入山洞。江玉郎挑唆其夺后洞财物，黑衣人放鼠并以鞭攻小鱼儿，轩辕三光因忌惮对方主子不敢出手。花无缺赶到以移花接玉破局，小鱼儿拳打五人；黑衣人因「可杀不可辱」服毒自尽，另有两人暗中溜走，江玉郎亦趁乱带走慕容九妹。
- chapter: 73
  title: 第七十三回 口蜜腹剑
  summary: 花无缺与小鱼儿、轩辕三光会合，方知江玉郎带走慕容九妹，同出的铁萍姑也因怕被花无缺认出而溜走。轩辕三光告诫小鱼儿将面对十二星相子鼠魏无牙，并受托送银给段合肥。小鱼儿向花无缺说明经历后决意去龟山救人并寻铁萍姑，请花无缺对燕南天隐瞒未遇自己。铁萍姑初获自由却囊空如洗，在小镇酒铺遭窘；江玉郎以表亲名义送金锭解围，再以客栈、衣饰、酒食步步笼络，灌醉铁萍姑后被一高一矮两人撞见。
- chapter: 74
  title: 第七十四回 人面兽心
  summary: 江玉郎在小厅遭一高一矮两人勒索，对方要慕容家姑娘并逼问洞中三人身份；江玉郎谎称轩辕三光、江小鱼、花无缺皆其仇人，趁敬酒飞杯点穴制住二人，又将二人送入邻房。铁萍姑酒醒后欲恨江玉郎，反被其痛哭示弱与甜言蜜语收服。邻房突传惨呼，高矮二人已成血堆，尸身现「无牙门下士，可杀不可辱」；其主人现身，称奴隶被辱故杀之，逼江玉郎七日内带路找那三人，并演示无牙门下不燃而毁物的碧焰神功。章末另有人狂笑贬低无牙门神功，人影如流星急坠。
- chapter: 75
  title: 第七十五回 南天大侠
  summary: 冒充燕南天的南天大侠路仲远现身客栈，击杀无牙门弟子魏白衣，并为被点哑穴的慕容九妹行功。江玉郎假充武当弟子博取其信任，趁其运功时暗算心口，铁萍姑赶回又补上一掌，路仲远重伤。江玉郎与铁萍姑掳走慕容九妹逃离。江小鱼与花无缺闻吼声赶到，路仲远临终前承认自己是路仲远、燕南天为其好友，因武功与震慑恶人谷余党等故借名重出，并经万春流改容；江小鱼识破假冒并代述原委，二人誓杀江玉郎复仇。
- chapter: 76
  title: 第七十六回 无牙门下
  summary: 路仲远安葬后,小鱼儿与花无缺分道:小鱼儿赶赴龟山,花无缺回移花宫追问为何要杀江小鱼。铁心兰拼死爬上移花宫,却发现两位宫主皆已离宫。魏青衣、魏黄衣率巨鼠毁花来犯,花无缺以移花接玉使其互残,魏青衣惨死,魏黄衣双眼被同伴挖去。
- chapter: 77
  title: 第七十七回 萍水相逢
  summary: 铁心兰目睹花无缺与已盲的魏黄衣对峙；魏黄衣撞断大树后挟持铁心兰，被花无缺击杀坠崖。花无缺忧心江小鱼将见魏无牙，次日携铁心兰奔龟山，途中刻意疏远。旅宿时铁心兰夜访，二人坦诚心迹后上街面摊饮酒。萍水相逢黑衣人，自称江小鱼之友并痛饮；花无缺察其有死志，尾随至灯火通明的道观后院，见黄幔前横卧吊睛白额猛虎，猛虎突然跃起。
- chapter: 78
  title: 第七十八回 冤家路窄
  summary: 花无缺入后院花厅，见白夫人驯虎隔帘相邀；掀幔后发现白夫人被丈夫以铁链锁困，并得知先前黑衣人似已被其友人带走。铁心兰久候不及跃上墙头，被孔明灯光柱照破，遭江玉郎诱入大殿点穴挟持，险遭非礼；一白衣女子冷眼现身打断，警告江玉郎不得再动别的女人。
- chapter: 79
  title: 第七十九回 山君夫人
  summary: 江玉郎将铁心兰送入秘道地室,与已被点穴的黑蜘蛛、慕容九妹同囚,并声称花无缺自身难保。花无缺为白夫人解颈上锁链,反被其以软语纠缠;白山君破窗而入,与花无缺激战,竟能破移花接玉。白夫人暗器击中花无缺腿弯,再假意回心。白山君以吸铁星拔针救治,却又暗插游丝针于笑腰穴下,限其不得出七十步,并求移花接玉之秘;花无缺拒言,白山君扬长而去。
- chapter: 80
  title: 第八十回 义无反顾
  summary: 花无缺被白山君所伤，真气难提，厅中猛虎逼近；他借画轴机关脱身，听见铁心兰呼救后不顾死地冲入，一度吓退江玉郎。江玉郎察觉其武功尽失后再度抱走铁心兰羞辱，花无缺明知步入死路仍一步步逼近，黑蜘蛛由辱转敬，铁心兰痛哭阻拦。
- chapter: 81
  title: 第八十一回 生死两难
  summary: 花无缺逼近江玉郎时被销魂针刺中笑穴，真气反通，以移花接玉尽收漫天银针暗器，迫江玉郎放下铁心兰后逃走。花无缺强忍剧痛狂笑不止，拍开铁心兰与黑蜘蛛穴道，故意激怒铁心兰令其离去，又在铁心兰折返相拥时独自遁走。他重返山君神庙寻战不得，击伏白额猛虎后口喷鲜血几近绝望。白夫人现身引他见倒悬而死的白山君尸身，自承因遭夫君杀机反手刺死对方；销魂针已入穴极深无法起出，但白夫人可延其命三日，并愿带他去寻世上唯一能救他的人，花无缺终于点头。
- chapter: 82
  title: 第八十二回 温柔陷阱
  summary: 白山君假死骗过花无缺后，白夫人以宁神药将其送入山中石门求见苏樱。花无缺发现苏樱竟是未满双十的白衣少女，对方以机关木人奉茶燃灯，称己为能救其命者之一并给药令其沉睡。白夫人随即现身，与苏樱密谋：假意医治，实欲套出花无缺口中移花接玉的秘密后再杀之。
- chapter: 83
  title: 第八十三回 自作自受
  summary: 花无缺笑声暂止却仍无力，气穴留针；苏樱以助其贯通真气、逼出毒针为由，套出移花接玉秘诀。白山君夫妇与江玉郎、铁萍姑在谷外等候，苏樱承认已问出秘密却拒不交出，扬长而去。江玉郎入谷企图以花言巧语甚至霸王硬上弓骗取秘诀，反被苏樱以百病百疼催生丸制住，痛感倍增、全身软瘫。
- chapter: 84
  title: 第八十四回 意外之变
  summary: 苏樱以假药与恐吓戏弄江玉郎，借机关床将其弹入地洞；随后至后园山洞探望被她关押养伤的小鱼儿。两人饮酒调笑间，苏樱说明关押是为护伤，并追述在天外天初遇小鱼儿、以及魏无牙对其顾忌的原委。小鱼儿详述自己闯过十八道机关、故意不露武功路数、识破椅子与墙角陷阱，并宁可中带毒飞刀也不愿死在魏无牙手上。章中穿插魏无牙与十二星相、移花宫主旧怨，以及花无缺危在旦夕的旁点。
- chapter: 85
  title: 第八十五回 色胆包天
  summary: 苏樱向小鱼儿讲述如何趁魏无牙会客时假借死人做肥料把他救下。小鱼儿得知朋友留下的天外天暗记可能有诈，急欲出去对质。魏无牙徒弟奉命来查花，以色胆包天胁迫苏樱，被神秘高手以青竹钉死。苏樱去寻恩人时，神秘人打开铁栅救出小鱼儿；小鱼儿声明不领情，仍随对方离开。
- chapter: 86
  title: 第八十六回 利令智昏
  summary: 魏麻衣点穴吊起小鱼儿后与苏樱相认，欲以人质逼问移花接玉秘密；苏樱欲以戒指毒针反制，却被小鱼儿喝破。小鱼儿自称早知移花接玉，以倒立放屁的假捷径戏弄利令智昏的魏麻衣。
- chapter: 87
  title: 第八十七回 汝奸我诈
  summary: 魏麻衣急于学移花接玉，被小鱼儿以「脱了裤子放屁」「呆子放屁功」戏耍羞怒；其欲杀小鱼儿时，阴九幽、白开心装鬼，哈哈儿扮和尚，李大嘴假作吃人，杜杀以钢钩伤其掌，屠娇娇易容假扮魏无牙又被识破。六名十大恶人现身联手恐吓，小鱼儿突然挣脱点穴反制夺匕。众恶人意图逼魏麻衣带路找魏无牙；屠娇娇、白开心追问小鱼儿为何拦苏樱说出移花接玉，小鱼儿称知对方秘密后再打便无意思，被白开心笑为好人。
- chapter: 88
  title: 第八十八回 飘忽无踪
  summary: 苏樱自空心树现身，十大恶人调笑后相继离去。苏樱指责小鱼儿装不能动骗她，并推断十大恶人曾借魏无牙之手除他；小鱼儿怒斥不信。小鱼儿又告以林中另有一对轻功高超的夫妇带走两大包东西，苏樱点破实为白山君夫妇偷走半死不活的花无缺与江玉郎。小鱼儿自掴后疯追出林，苏樱决意追随；地洞中有人冷笑窥伺。铁萍姑驾车载白山君夫妇入山石屋，江玉郎毒发忽冷忽热，花无缺痴坐如尸。白山君点住铁萍姑肩井、撕衣逼认，欲以更大羞辱试探花无缺是否装痴，花无缺仍茫然无觉。
- chapter: 89
  title: 第八十九回 守株待兔
  summary: 白夫人中止白山君对铁萍姑的戏弄，将她裹衣放到江玉郎身旁却未解穴。白山君夫妇苦心从苏樱处夺回花无缺却探密无获。白夫人在落叶下发现人造小洞，夫妻认定是失踪二十年的"十二星相"兔子所留，白山君遂守株待兔。江玉郎装睡偷听，猜出对方即星相中兔号捣药、自号蟾宫落药的胡药师。一段会自转的枯木滚来，内藏白发大头尖耳之人；白山君一拳震碎枯木，对方以锁子缩骨功现出昂藏七尺真身。白山君向江玉郎点明胡药师身世与无骨道人绝学，随即赶二人入石屋。胡药师自称窥见二人支使魏麻衣寻苏樱并暗中跟随，欲谈移花接玉之秘；白夫人点出苏樱尽得魏老头消息机关之学且青出于蓝。
- chapter: 90
  title: 第九十回 巧计安排
  summary: 胡药师向白山君、白夫人提议：抓住小鱼儿以逼苏樱吐露移花接玉的秘密，白夫人以江玉郎安危胁逼铁萍姑配合。白夫人在瀑布巨石上以几乎全裸的自身与铁萍姑作饵，溪中投放衣裙绣鞋，并令胡药师潜于水下准备擒人。小鱼儿沿溪追踪衣物却识破布局，既不救人也不离开，只在远处洗脚高歌，白夫人虽气极仍以江玉郎性命压制铁萍姑。
- chapter: 91
  title: 第九十一回 将计就计
  summary: 白夫人与胡药师以铁萍姑为饵设局诱捕小鱼儿；小鱼儿将计就计，以小弹丸封住胡药师呼吸用的芦苇迫其吞毒，并点中白夫人足底碧泉穴。铁萍姑因江玉郎安危不敢示警，被小鱼儿识破后仍得胡药师外衣蔽体。小鱼儿胁逼胡药师带路至石屋寻白山君，屋内仅见江玉郎发抖，白山君与花无缺已不知去向。
- chapter: 92
  title: 第九十二回 各逞机锋
  summary: 小鱼儿撞见江玉郎，怒而痛殴，又因花无缺下落与江玉郎针锋相对、互讽斗智；江玉郎承认以迷药迷倒花无缺与白山君并藏起二人，要挟小鱼儿接来苏姑娘为其治病，胡药师则称苏姑娘正循线索赶来。另一边，白夫人在飞泉下解穴，遇来寻小鱼儿与花无缺的铁心兰，诱其下水共浴后偷穿其衣扬长而去，铁心兰羞愤被困溪中。
- chapter: 93
  title: 第九十三回 奸狡无匹
  summary: 白夫人穿过树林见海棠绣衣心动换装，却中苏樱所下痒药，痒极之下承认偷走花无缺并供出后山石屋藏处，被苏樱打发回溪中浸泡。铁心兰赤身在溪，见白夫人奔回，苏樱归还其衣。苏樱与铁心兰结为姐妹，从对话中得知对方心上人是小鱼儿、另有对其对照鲜明的另一男子的歉疚，遂指引铁心兰持珠钗独自往槐树林投奔姓魏干爹；苏樱留下赴约。铁心兰走远后，山石后钻出四名形貌古怪之人，调侃苏樱卖友与小鱼儿不该娶笨瓜。
- chapter: 94
  title: 第九十四回 机智绝伦
  summary: 苏樱被白开心、哈哈儿、屠娇娇、李大嘴围住，四人提出交易：助她嫁给小鱼儿，条件是把小鱼儿活着带入魏无牙洞中再带出；苏樱以吃人威胁反将一军，逼四人色厉内荏。白开心色胆包天撕衣时，花无缺自天而降一掌将其抛上树，四恶人假打相斗脱身并留下四行字。苏樱点破花无缺以移花接玉打开穴道骗过白山君夫妇；花无缺依移花宫禁例本欲亲手杀她灭口，却被她以不仁不义不礼及铁心兰结拜姊妹、已将铁心兰送往魏无牙处等话打动，暂信其守秘而去救铁心兰。
- chapter: 95
  title: 第九十五回 阴险毒辣
  summary: 苏樱劝花无缺除掉江玉郎未果，并称赞他对铁心兰温柔。小鱼儿与胡药师焦急等待苏樱时，江玉郎佯称悟道、要以女儿红换取性命保障；小鱼儿吞下所谓女儿红后被江玉郎踹入深洞。江玉郎又与胡药师交手，迫使其跳入洞中，并自称所使为混合四派绝技的「踢死人不赔命,天下无双魔脚」。铁萍姑责其凶狠时被其纠缠，忽被戴面具白衣人抛上树梢；江玉郎出手反被袖拂回拳打中自己，跪认对方为移花宫主。
- chapter: 96
  title: 第九十六回 奸狡诡诈
  summary: 白衣小宫主逼江玉郎自残并拷问铁萍姑小鱼儿下落；铁萍姑谎称小鱼儿在东面以保江玉郎。宫主命江玉郎看守铁萍姑后离去。铁萍姑劝逃并点破只许花无缺杀小鱼儿的规矩，江玉郎反诱她继续隐瞒。十大恶人李大嘴、屠娇娇、白开心、哈哈儿现身，揭穿江玉郎假名，招其顶替已死欧阳兄弟，诱他借江别鹤与魏无牙交好之机潜入鼠洞探寻血漆破铁箱。江玉郎贪财好色应允，抛下被吊树上的铁萍姑离去；白开心断言其未必真交箱子。
- chapter: 97
  title: 第九十七回 胸有成竹
  summary: 屠娇娇、白开心、李大嘴、哈哈儿互相斗嘴，谈及杜老大仍在等待小鱼儿，并透露设标志诱小鱼儿入洞。树上假晕的铁萍姑听完全部对话，得知江玉郎虚情抛弃自己后痛哭。不会武功的苏樱现身安慰她，并得知小鱼儿被江玉郎推入山壁深洞后决意攀壁救人。胡药师亦落入洞底水池，与已中女儿红却仍从容的小鱼儿会合；小鱼儿拒给解药以收服胡药师，并在洞中窃听外界，悟出铁萍姑为移花宫门下、铜先生与木夫人即移花宫主改扮，又知魏无牙贵客为江别鹤，以及十大恶人设陷阱害己。苏樱终爬至洞口唤救，小鱼儿故意不答防她跳下；苏樱痛哭后声称厌世，随即自洞口坠下。
- chapter: 98
  title: 第九十八回 生死两难
  summary: 小鱼儿全力扑接跳下的苏樱，两人同落水中；苏樱厚脸示爱、以毒攻毒，将小鱼儿气得跳水自打；胡药师旁观称其为克星。苏樱问及江玉郎事，胡药师说明小鱼儿为救花无缺吞下毒草女儿红而被推落。另线铁萍姑受刺激晕厥，醒后遭戴青铜面具的邀月宫主质问，因称赞江小鱼被掴，并被宣告将受二十年酷刑；山谷间突响起大笑声。
- chapter: 99
  title: 第九十九回 水落石出
  summary: 小鱼儿未死，藏身山腹洞窟，笑声四起，邀月宫主（移花宫主）起初辨不出人在何处。小鱼儿以自身为人质，逼她立刻释放铁萍姑，否则情愿死在洞中；邀月无奈将铁萍姑抛入洞窟。小鱼儿得手后反客为主，要她去找花无缺并送饭，自称当家、谁也请他不出去。山腹水位随长江潮汐涨落，四人挤在石上；苏樱点破洞通江口、潮退可寻出口。邀月果然送来晚饭。胡药师找到曲折地道，小鱼儿却执意留下等与花无缺比武，并称独知破解移花宫武功之法。胡药师误以为中毒，被苏樱识破后逃出。苏樱向铁萍姑剖白只爱小鱼儿，并教她以冷落江玉郎作为报复。
- chapter: 100
  title: 第一百回 双骄再聚
  summary: 铁萍姑听完苏樱指点后离去。苏樱留下陪小鱼儿，并透露她见过花无缺、已与铁心兰结拜，且铁心兰现处老鼠洞；小鱼儿得知花无缺去寻铁心兰后大怒，却被苏樱以先前约定压住。花无缺突然赶到洞口放索，小鱼儿与苏樱出洞，见到邀月宫主、花无缺与铁心兰。邀月宫主给小鱼儿三个时辰调息，并禁他与花无缺交谈；小鱼儿故意点出铜先生身份以震花无缺。苏樱安抚小鱼儿并去劝铁心兰，二人谈及情敌与选择；铁心兰内心矛盾，章末苏樱问起其义父。
- chapter: 101
  title: 第一百零一回 意外之变
  summary: 铁心兰回报接头树林鼠窜、树上吊尸，苏樱心动却因小鱼儿未走。怜星宫主驾临，与邀月宫主令花无缺、江小鱼各前行十五步对决，并禁旁人相助。行至第十五步前小鱼儿因中江玉郎女儿红毒倒地，花无缺拒杀无力还手者。姐妹对峙后决意先查证并解其毒，再令花无缺亲手杀之，以免二十年复仇计划落空；二人更道破小鱼儿与花无缺本是兄弟的秘密仅她们知晓。邀月宫主探洞见铁萍姑已走，众人转往魏无牙所在寻江玉郎，苏樱扶小鱼儿先行，怜星携铁心兰离开。
- chapter: 102
  title: 第一〇二回 奇峰再起
  summary: 小鱼儿质问苏樱为何带移花宫主去找干爹魏无牙却不着急；途中调侃铁心兰，铁心兰因近两月与花无缺的患难与体贴而内心动摇、泣不成声。众人抵达魏无牙洞外，见十余人被一掌掴肿脸甚至打碎颚骨后上吊，小鱼儿推断行凶者武功远胜自己且事发于昨日黄昏前。进入藤萝掩盖的洞穴后，甬道豁然开阔如皇宫，地上留下间隔整齐的清晰脚印，小鱼儿判断来者步步为营、功力极强而机关未发，是因魏无牙闻其名头不敢妄动。苏樱据脚印与功力推测为大侠燕南天，邀月、怜星宫主却认定绝非燕南天，随即飞掠深入洞中。
- chapter: 103
  title: 第一〇三回 莫测高深
  summary: 铁心兰夹在花无缺与小鱼儿之间，掩面奔离；小鱼儿感谢花无缺守秘却刺其君子气，又与苏樱因去留与心意冲突而强吻被拒。邀月宫主令花无缺以碧血照丹青九成力试劈青玉石椅，仅入尺余，遂论剑指出劈椅者手法巧快、气势不同而非功力数倍于己，并将剑留给花无缺；怜星宫主命其追回铁心兰。小鱼儿与苏樱巡视空荡洞室，推想魏无牙与江别鹤勾结、空巢或是圈套。魏无牙驾金属两轮车自石壁现身，宣称已封死全部出路，洞府成为坟墓。
- chapter: 104
  title: 第一〇四回 见利忘义
  summary: 魏无牙自认武功难敌移花宫主姐妹，封死巨石门户欲与小鱼儿、苏樱及宫主等同归于尽；小鱼儿拆穿其伪造脚印、劈开青玉石椅以诱敌并争取封门时间的计策。魏无牙继而承认燕南天曾来此，一剑之威令其不敢相抗，并以交出江别鹤为条件换取性命。他揭开江别鹤本名江琴、原为江枫书童，因贪心与野心勾结十二星相出卖江枫夫妇，致小鱼儿父母双亡，自己则化名江南大侠横行江湖。
- chapter: 105
  title: 第一〇五回 勾心斗角
  summary: 魏无牙透露燕南天留下江别鹤给小鱼儿亲手复仇，并自认已将众人困死洞窟；移花宫邀月、怜星欲教小鱼儿武功以逼魏无牙吐出逃路，小鱼儿则反将死局与秘密要挟二人。苏樱点破门户未必真封死，魏无牙随后现身嘲弄并与小鱼儿交手，指甲淬毒、轮车暗器连环，小鱼儿先后使出飞龙大八式与千斤坠仍感吃紧。
- chapter: 106
  title: 第一〇六回 难以捉摸
  summary: 小鱼儿危急之际得移花宫主姐妹远处示范招式而反压魏无牙；魏无牙以石像替身脱身，将众人锁入六角石室。被困期间小鱼儿以青石棺材与碎石搭成茅房，后屋顶落下一柚子，他分半与苏樱及移花宫主姐妹，众人暂得一息。
- chapter: 107
  title: 第一〇七回 人性弱点
  summary: 被困石室的小鱼儿与苏樱、移花宫主姐妹识破魏无牙欲看他们痛苦的人性弱点，假意求死并借竹叶青合欢酒诱使怜星宫主失态；小鱼儿与邀月宫主灭灯诱魏无牙开门入室，却见其已自杀身亡。众人出室后花无缺挖掘声停歇，小鱼儿指出魏无牙留下的气孔仅容侏儒出入，逃生希望断绝。
- chapter: 108
  title: 第一零八回 计脱围困
  summary: 魏无牙周密布局，以活老鼠为食、出路难通，将众人困于死地。邀月宫主与小鱼儿、苏樱断绝希望后起杀机；小鱼儿以杂学乱力与佯不用力破其移花接玉，又借小便之由潜入地室，用布带捆酒瓶吊穴漏酒伪造水声，诱邀月宫主冲入后溜出并阖上石门，反将其困死其中。
- chapter: 109
  title: 第一零九回 明玉神功
  summary: 小鱼儿以同穴之辱逼困于石室的邀月宫主说出秘密，苏樱劝阻而小鱼儿坚称须改写与花无缺的生死宿命。怜星宫主酒醒现身，断言邀月视该秘密重于性命，并解说明玉功九层进境：第八层可无敌于天下，二人二十年前已至此境却因江枫之念停滞二十年。邀月于断绝生机时豁然贯通，练成第九层，脸呈透明异象。外间十大恶人开山声起复止，石室内众人坐困无望。
- chapter: 110
  title: 第一一零回 恶人恶计
  summary: 花无缺寻遍龟山不见铁心兰，回时魏无牙洞穴已被封死，移花宫主与小鱼儿似被困其中。他借铁锹斧头开山至夜，面前出现“铁心兰”，实为屠娇娇易容；花无缺中计被制，落入屠娇娇、李大嘴、杜杀等人之手。杜杀以礼相待并称铁心兰父亲铁战是其八拜之交、名列十大恶人，保证不会难为铁心兰；屠娇娇则称移花宫主等人已被魏无牙困死洞中。
- chapter: 111
  title: 第一一一回 奇异赌场
  summary: 众人决定在山洞外等待饿困移花宫主等人；哈哈儿以伪装吃人石的铁笼押来铁心兰与白夫人，白开心自山脚酒肉庙取食，李大嘴回报小镇有人开赔本赌场。屠娇娇与白开心夜入客栈，见到轩辕三光与黑瘦搭档以磕头打屁股为注赌单双。
- chapter: 112
  title: 第一一二回 惊人豪赌
  summary: 赌场中轩辕三光与黑瘦汉子坐庄豪赌,抓出赖账者后继续开局;三位绝美少妇携重金入场,紫衣少妇连押七把「双」皆输尽银两欲去,轩辕三光以赊账挽留,三人回桌再赌;屠娇娇与白开心在旁观赌并议论其用意。
- chapter: 113
  title: 第一一三回 情有独钟
  summary: 紫衣少妇与两位姊妹以人身为注再赌，押双后开出一对四，终于赢下沉默的黑瘦汉子。轩辕三光阻路追问，少妇自承为慕容七娘，身旁是六姊、八妹。原来黑瘦汉子即黑蜘蛛，曾护送失踪的慕容九妹归家，反被盘问冷待；九妹病重日夜念他，姊妹这才托五姊夫神眼书生骆明道在武汉认出二人，故意以赌局请他同行。轩辕三光怒斥又释然，愿送全部赌资作贺礼，并答应转告仍在山上的小鱼儿来喝喜酒。
- chapter: 114
  title: 第一一四回 邪不敌正
  summary: 赌场散场后，屠娇娇、白开心与轩辕三光发现燕南天携江别鹤同行。张菁与顾人玉拦江别鹤算账，却先后被燕南天轻易击退；燕南天亮明身份并带走江别鹤。屠娇娇点破江别鹤即当年害江枫的江琴，燕南天欲寻小鱼儿亲手报仇。江玉郎伪称能找到小鱼儿，骗得燕南天信任，父子随燕南天离去。
- chapter: 115
  title: 第一一五回 恶人再聚
  summary: 屠娇娇、白开心见燕南天上了江玉郎的当后点倒欲通风报讯的轩辕三光,将其扛回龟山与李大嘴、哈哈儿、杜杀会合。恶人们得知燕南天病愈武功更强后围逼轩辕三光;对方自承曾代送银两而得罪江别鹤父子,又与段合肥斗蟋蟀赢钱后狂赌,巧用叫狗为爹、叫屠寡妇为妈的伎俩逼李老实陪赌,并赢走本由欧阳丁、欧阳当交李老实保管的大箱子,银子输光、箱子丢进扬子江。恶人知箱不在龟山后停止开山,反议将花无缺与铁心兰、白开心与白夫人成亲,并霸王硬上弓蹭慕容家喜酒;众人认定江玉郎不会带燕南天去人多处,遂决意赶赴慕容家。
- chapter: 116
  title: 第一一六回 鬼童复出
  summary: 十大恶人得知慕容家因九姑娘夫妇不堪见人而改在江边小地铺张流水席成亲，遂乘马车闯入喜棚闹事，又被慕容家众姑爷以礼相迎上船。席间恶人欲借喜堂为花无缺、铁心兰与白夫人等强行成礼，慕容家以九妹吉礼已成驾舟归去婉拒；恶人仍以敲碗吹嘴作乐强行拜堂。危急之际，身高不满三尺、轻功更胜阴九幽的奇侠鬼童子（白日鬼）闯席现身，众人皆为之失色。
- chapter: 117
  title: 第一一七回 狂狮铁战
  summary: 鬼童子忽然现身，借口为铁心兰婚礼请来礼乐并引出白山君；白山君当众把白夫人移交给白开心后离去。一班自称古贤后人的老年乐手登船奏乐，实为江湖名侠。铁战赶到质问女婿花无缺被饿之事，抓住哈哈儿与屠娇娇，又逼问铁心兰是否愿嫁；铁心兰因牵挂小鱼儿既不点头也不摇头，萧女史称此即默认。
- chapter: 118
  title: 第一一八回 大众情人
  summary: 铁战逼问女儿心意，轩辕三光借屠娇娇之口点破铁心兰同时属意花公子与小鱼儿；铁战采纳白开心主意，要女儿一人嫁两夫，并率众去寻被困山腹七八天的小鱼儿。小仙女与顾人玉互明心意决意成亲。途中鬼童子向李大嘴、轩辕三光讲述铁战赴无名岛学武、岛上老人因不甘不及燕南天与移花宫主而重入红尘，以及自己救白老虎、召铁战赶来的经过；众人赶到藏人处时，铁战已揪住屠娇娇逼她救出小鱼儿。
- chapter: 119
  title: 第一一九回 幸脱死劫
  summary: 众人齐心开山，不到半天攻破十道石闸进入山腹，却只见魏无牙尸体、空酒瓶与碎衣，不见小鱼儿等人。白开心疑化骨丹灭尸，鬼童子旁观推断魏无牙被逼服毒。花无缺由鞋底湿痕发现石棺旁地洞与地下河，断定小鱼儿撕衣搓绳绑鼠探路自地下逃出。张菁（小仙女）赶来报信：小鱼儿、移花宫主与一名大头女孩已跳上船大吃，船上另有贵客燕南天；众人急欲回船，花无缺却因将与小鱼儿决生死而矛盾。
- chapter: 120
  title: 第一二零回 神功绝学
  summary: 小仙女、小蛮先后转述燕南天与小鱼儿相认、以及燕南天与移花宫主对峙始末。燕南天与小鱼儿叙旧后决心决战，双方赤手对峙；小鱼儿以一句关于花无缺决战的话令移花宫主住手。双方约定每日日出在山巅相见，直至寻得花无缺。众人于江岸见移花宫主脚下泥土凸起成丘与反凸脚印，俞子牙、萧女史等断为明玉功至第九层之真气漩涡吸力，并论及唯嫁衣神功可与之抗衡；顾人玉因与小鱼儿打赌失败外出办事。
- chapter: 121
  title: 第一二一回 互相残杀
  summary: 众人听俞子牙等解说嫁衣神功须先毁再练之理，明白燕南天因恶人谷被毁功而反成大功。顾人玉受小鱼儿之托放走已被废武功的江别鹤父子并安置顾家庄，众人对小鱼儿不愿冤冤相报议论不一。花无缺预感兄弟相残结局难改。逃亡中的十大恶人内讧：白开心夫妇说动阴九幽，白夫人以美人计刺伤杜杀致死；随后白夫人与阴九幽夹击李大嘴，李大嘴反杀阴九幽，终被白夫人踢晕。
- chapter: 122
  title: 第一二二回 兔死狗烹
  summary: 白开心装死扼杀屠娇娇，又与白夫人互道兔死狗烹后亲手扼死白夫人；他逗弄哈哈儿、欲折磨李大嘴时，哈哈儿突以笑里藏刀三暗器射杀他。屠娇娇临死咬死哈哈儿。重伤的李大嘴爬入山洞等死，恰遇小鱼儿与燕南天：小鱼儿已放走江别鹤父子，并劝燕南天放过残存恶人；燕南天虽怜悯李大嘴，仍坚持小鱼儿须与花无缺、自己须与移花宫主一战。小鱼儿不忍抛下曾养他长大的李大嘴。
- chapter: 123
  title: 第一二三回 善恶一线
  summary: 苏樱调侃小鱼儿,燕南天嘱小鱼儿速去会合花无缺后独上山顶。身负重伤的李大嘴拒绝求治,自述因吃人恐吓江湖而成为十大恶人,却已厌绝人肉,只求一顿红烧蹄膀。小鱼儿与苏樱查知他肋骨尽断仍可救,只恐其自弃。胡药师奉铁萍姑之命拖住二人;小鱼儿识破后冲回房中,见铁萍姑持尖刀哭倒,李大嘴道破她是自己女儿。他澄清当年杀妻煮食是因妻子不贞,为保颜面二十载默承吃女恶名,并将幼女托人抚养。父女误会消解,胡药师与铁萍姑情愫暗现;李大嘴心安理得含笑而逝。
- chapter: 124
  title: 第一二四回 生死两难
  summary: 铁萍姑与胡药师护送李大嘴遗体离去。小鱼儿与苏樱谈及与花无缺的生死决战难以避免，苏樱求他无论如何不要死。深夜铁心兰向花无缺剖白情感并求他莫杀小鱼儿，花无缺答应。次日燕南天引小鱼儿与万春流重逢，约定午时三刻决战。苏樱潜入玄武宫，以双杯毒酒逼花无缺决斗；小鱼儿闯入识破其计并怒斥她，苏樱心碎离去。邀月宫主现身，小鱼儿与花无缺上山，众人静待决战。
- chapter: 125
  title: 第一二五回 生死之搏
  summary: 决战前夕，燕南天叮嘱小鱼儿勿与花无缺硬拼，宜先耗其功力；小鱼儿自认占知彼之利。万春流受托查验酒杯余酒是否有毒，却被小鱼儿要求战后才告知。两阵观战者对胜负各有判断。花无缺为守对铁心兰的诺言决意自牺牲，怜星宫主因恶毒计划与对小鱼儿的愧疚痛苦难言。燕南天一声令下，兄弟生死之搏正式开始。
- chapter: 126
  title: 第一二六回 生离死别
  summary: 苏樱与铁心兰在树下相逢痛哭：花无缺为应铁心兰所求不杀小鱼儿而自尽，铁心兰亦服毒求死并托付苏樱与花无缺合葬、照顾小鱼儿。小鱼儿与花无缺斗至七百招，二人皆欲送死却互不知晓；怜星宫主欲喊停被邀月宫主点穴冰封，喊出孪生兄弟真相亦无人听清。双方弄巧成拙，花无缺一掌将小鱼儿打至濒死；邀月揭破花无缺亦是江枫之子、小鱼儿孪生兄弟，并逼花无缺以碧血照丹心自刎，剑却被人夺去。
- chapter: 127
  title: 第一二七回 真相大白
  summary: 万春流夺剑劝花无缺再等半个时辰；铁战、萧女史、祢十八、俞子牙等与邀月宫主对峙。燕南天发现小鱼儿未死，小鱼儿以万春流所授麻痹药装死而复活，诱出邀月宫主吐露秘密：小鱼儿与花无缺实为孪生兄弟，三人抱头痛哭。万春流点破装死之计并将碧血照丹心交还邀月宫主。苏樱应铁心兰之托说明其已服毒愿陪死，又透露已将铁心兰救治；花无缺飞掠寻人。邀月宫主抱妹妹尸体狂笑遁入迷雾。小鱼儿与苏樱和解求嫁；慕容双、南宫柳等成双；燕南天请众人共饮喜酒并声明花无缺即江无缺。铁战与轩辕三光买酒未果，小鱼儿暗遣猴子送来猴儿酒。
