  title: 小鱼儿望了巴蜀东一眼道：“这也算坏事吗？……嘿，这种坏事简直只有赶骡车的粗汉才会做的。”
  summary: 第9回「青出于蓝」。出场：小鱼儿、燕南天、江枫、邀月、怜星、屠娇娇。本回情节：万春流叹道：“她是女的，可是就更难猜了，江湖中女子除了邀月、怜星两人外，我简直再也想不出有一人能在‘恶人谷’中；小鱼儿道：“嗯，他还说我爹爹叫江枫，是被‘移花宫’中的人害死的，他叫我千万莫忘了这仇恨，长大了一定要找‘移花宫；小鱼儿摇头笑道：“无论你怎样说，假如你做的只是这种见不得人的坏事，你还不够资格进‘恶人谷’，除非……”
