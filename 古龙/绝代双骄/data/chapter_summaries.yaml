  title: 小鱼儿在暗中已瞧了许久，他瞧见李家兄弟在前面追铁心男，这毛家兄弟就在后面跟着李家兄弟。他们坐的那匹马又高又大，但走的步子却是又轻又快，一路在后面跟着李家兄弟，李家兄弟竟没人知道。
  summary: 第13回「仙女惩凶」。出场：小鱼儿、李大嘴。本回情节：小鱼儿不禁暗中鼓掌道：“好鞭法，打得好，不想铁心男有这样的朋友。看来用不着我出手了。”；小鱼儿瞪起眼睛道：“我救了你命，你就这样谢我？”；小鱼儿拍掌道：“呀，这名字我听过……”
