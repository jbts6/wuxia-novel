  title: 这语声冷而美，赫然竟是小仙女的声音。
  summary: 第16回「弄巧反拙」。出场：小鱼儿、燕南天、铁心兰、黑蜘蛛。本回情节：铁心兰失声惊呼道：“小鱼儿，你……你……”；铁心兰又惊又喜，颤声道：“小鱼儿，你……你这是怎么回事？”；铁心兰道：“就是那藏珍的主人，名叫燕南天！”
