- chapter: 21
  title: 小鱼儿中了黄牛、白羊在酒中放的迷药，身子无法动弹，只得叹口气，苦笑道：“看来当真是人不可貌相，你这条笨牛居然也有一肚子鬼主意，我可真做梦也未想到。”
