- chapter: 12
  title: 小鱼儿拍掌大笑道：“‘疯狂一百零八打’，哈哈，果然是疯子才会使的拳法，只可惜这么漂亮的人，却学这种疯子的拳法，真叫人看着难受。”
  summary: 第12回「意外风波」。出场：小鱼儿、江小鱼、屠娇娇、李大嘴、杜杀、阴九幽。本回情节：小鱼儿大笑道：“英雄救美人，这可是佳话一段，我江小鱼可不能杀风景……好，你去吧。”手掌拍了两下，铁心男一跃而起；小鱼儿道：“我人虽比你刚强，名字却没你刚强，我叫江小鱼……；突然间，远处有人嘶声大呼道：“小鱼儿！江小鱼！你莫要走！不能走！”
