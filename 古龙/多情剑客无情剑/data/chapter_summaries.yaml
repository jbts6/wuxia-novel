- chapter: 1
  title: 第一回 飞刀与快剑
  summary: 风雪中李寻欢乘马车南行，途中埋下自雕女像，并与一名倔强少年隔车对话而未同载。抵小镇客栈后，金狮镖局急风剑诸葛雷等人夸耀武功，碧血双蛇现身勒索口外包袱，斩杀赵老二并逼诸葛雷当众爬行。少年入内为五十两银子与白蛇比剑，一剑穿喉；黑蛇惊溃掷银而逃。诸葛雷偷袭少年后心，李寻欢小刀无声封喉将其击毙，少年遂来请李寻欢喝酒。
- chapter: 2
  title: 第二回 海内存知己
  summary: 李寻欢与少年阿飞同车饮酒纵谈江湖人心，阿飞自报其名并立志成名。道中雪人内藏黑蛇尸身，金狮镖局查猛、神行无影虞二拐子与极乐峒四童子拦路索要包袱。李寻欢佯称包袱在己，约一时辰后再见，实则欲寻酒店中另一镖头。他劝阿飞离去以免连累，自己入林追踪，在山脚旧日酒家发现查猛一行落脚。
- chapter: 3
  title: 第三回 宝物动人心
  summary: 李寻欢发现查猛与极乐峒四童子、虞二拐子皆被极快剑法一剑穿喉而死，柱上阿飞留言两清并留下洪汉民。李寻欢以酒与小刀逼问，判明洪汉民身穿刀枪不入的金丝甲，且甲自神偷戴五处被夺。酒店老板实为紫面二郎孙逵，与蔷薇夫人合谋酒中下毒欲夺甲；孙逵击杀洪汉民，又因积怨踢伤蔷薇夫人，并向李寻欢透露梅花盗重现江湖、众人争金丝甲以御其前胸致命一击的隐情。
- chapter: 4
  title: 第四回 美色惑人意
  summary: 孙逵为除梅花盗可得的财色重赏，欲毒杀李寻欢；青衣人现身点破酒毒，李寻欢早已咳嗽吐出毒酒。青衣人以青魔手一掌重创孙逵，孙逵借半截练子枪头自尽。青衣人继以青魔手、鱼肠剑及脱下面具的绝色美貌连环诱换金丝甲，李寻欢始终不允，反以小刀抵颈逼问动机；少女逃去，恶语揭其未过门妻子随好友离去，刺痛李寻欢。
- chapter: 5
  title: 第五回 风雪夜追人
  summary: 李寻欢于风雪夜中毒，断腿怪人花蜂自称下毒并夺走金丝甲。花蜂自述因勾引大胡子之妻、串通小蔷薇令紫面二郎背锅，反被斩腿囚禁十余年。花蜂离去后，虬髯大汉背负李寻欢追迹，却只见花蜂与千手罗刹尸身，十三种暗器显示下手者为千手罗刹。再循车辙至陵墓，发现潘大少与施耀先等皆死，施耀先咽喉剑洞与车厢划字证实阿飞复仇取走金丝甲；解药不在，李寻欢平静待死。
- chapter: 6
  title: 第六回 醉乡遇救星
  summary: 虬髯大汉赤膊拉车至牛家庄酒铺，与病重的李寻欢对饮哭笑。梅二先生醉乡买醉，遭黄河七蛟赵老大等人逼索治病；虬髯以铁布衫膀子架刀震退来敌，对方认出李寻欢小刀后仓皇逃遁。梅二自承为七妙人中妙郎中、寒鸡散配制者，坚持为李寻欢解毒，偕往寻大哥梅大先生。梅大先生初拒后因李探花之名热情款待，又因清明上河图已送人而翻脸藏酒拒给解药；李寻欢淡然告辞，梅大先生反被其风骨打动，重新出酒并承诺解药。
- chapter: 7
  title: 第七回 误伤故人子
  summary: 李寻欢在梅花草堂药力渐复。秦孝仪、巴英携龙小云以王摩诘画求见，欲请梅二先生救治重伤的少林俗家弟子秦重。龙小云为逼梅二先生随行，袖箭、短剑与紧背低头花装弩连袭李寻欢；李寻欢先忍后出一掌废其武功，方知对方是故交龙啸云与林诗音之子，痛极随行前往兴云庄。
- chapter: 8
  title: 第八回 往事不可追
  summary: 李寻欢与虬髯大汉重返故居龙公馆，先被管家麻子拦阻，旋即与义兄龙啸云相认抱哭。厅中护卫因龙小云被伤欲夹击李寻欢，遭龙啸云痛斥袒护。林诗音出场后护子怨恨李寻欢，不顾龙啸云劝解携子入内。席间众人久待铁面无私赵正义不归；龙啸云告以梅花盗已在保定现身，于冷香小筑前梅花林伤秦重，真正目标是住在冷香小筑、扬言除盗可嫁的武林第一美人林仙儿。李寻欢独自后园梅林，先杀欲灭口的伊哭大徒弟，再遭误认其为梅花盗的锦衣少年剑袭；龙啸云及时喝止，少年折剑示威，李寻欢称貂裘上有双眼睛。
- chapter: 9
  title: 第九回 何处不相逢
  summary: 游龙生与李寻欢言语交锋，龙啸云介绍双方身份；赵正义追查丘独之死并怒斥李寻欢，忧心青魔伊哭寻仇。李寻欢与龙啸云忆旧后同至冷香小筑，龙啸云因秦大少爷有事离去。林仙儿入室相见，承认曾逼换金丝甲与对李寻欢的特殊心思，并约李寻欢以金丝甲为饵、以她为饵诱杀梅花盗；李寻欢应允明夜再来。
- chapter: 10
  title: 第十回 十八年旧怨
  summary: 李寻欢与林仙儿交谈时被游龙生窃听嘲讽。梅花林外，秦孝仪因子秦重伤重不治迁怒，与虬髯大汉恶斗，被虬髯大汉奋力击倒；赵正义欲助战，遭李寻欢以飞刀威慑而止。龙啸云表态始终站在李寻欢一边。天明前虬髯大汉因十八年前旧怨怕连累李寻欢而离去。菜场中独眼妇人以梅二先生为人质逼其跟走；坟边木屋内旧怨诸人会合，指其出卖翁天迸，苦等十七年后欲清算。
- chapter: 11
  title: 第十一回 天外来救星
  summary: 中原八义擒获铁传甲后，边浩坚持请赵正义、大观楼说书人与少年阿飞主持公道。众人指控铁传甲昔年勾结仇敌杀害翁天迸、火烧翁家庄；铁传甲愧对翁天迸、死而无怨。阿飞以剑逼问赵正义，迫其承认参与翁家庄屠戮，随即点破被逼之词不足为凭，又力阻中原八义下手。樵夫以成名绝技力劈华山砍向铁传甲，阿飞一剑断斧并脱其三处关节。易明湖见剑法惊人，下令放人。阿飞拉走铁传甲；边浩愤而出追欲寻旧友，赵正义则称明后两日另有三位高人将至。
- chapter: 12
  title: 第十二回 同是断肠人
  summary: 阿飞劝铁传甲奋斗求生、勿轻言赴死，并信任其非卖友之人。李寻欢在兴云庄装病，夜迎藏剑山庄游龙生；游龙生以狄武子夺情剑典故相胁，欲阻其赴林仙儿之约，连刺数十剑尽空，剑被李寻欢弹飞。游龙生扬言复仇而去。林诗音遣青衣鬟请李寻欢至小楼，令红孩儿敬酒赔罪并求防身之道，李寻欢授以小刀；林诗音又述林仙儿悲苦身世，求其勿再寻林仙儿。
- chapter: 13
  title: 第十三回 无妄之灾
  summary: 李寻欢听林诗音劝阻后离开，于荷塘边远望冷香小筑；见人影掠出，入屋发现酒杯嵌桌成梅花状，疑林仙儿遭梅花盗掳走。群豪围屋误认他为梅花盗，田七、公孙摩云、赵正义借龙啸云揽肩之隙突袭制住李寻欢并制服龙啸云。阿飞与林仙儿携梅花盗尸身赶到，阿飞硬功击退公孙摩云；林仙儿撬开死人口中钢管，揭明梅花盗以腹语与口中暗器暗算的秘密。
- chapter: 14
  title: 第十四回 有口难言
  summary: 林仙儿当众讲述被梅花盗挟持及阿飞救她并击杀对方的经过。田七以话术动摇众人，使阿飞所杀之人不被承认为梅花盗，并当众嘲弄阿飞。李寻欢劝阿飞先走；阿飞以极快剑法震退田七两名持刀大汉，却因不会点穴无法解开李寻欢穴道。阿飞强行背起李寻欢突围，遭田七翅棍点穴与赵正义长枪及群豪围攻；林仙儿欲劝龙啸云阻拦却得知其亦被点穴。阿飞终出手伤人并扶李寻欢落座，正欲刺赵正义时，少林心眉大师以佛珠拦下。阿飞离去后，林仙儿追至街上道歉并套出阿飞日落前住在西门沈家祠堂，阿飞表明李寻欢若有不测仍会回来相救。
- chapter: 15
  title: 第十五回 情深意重
  summary: 李寻欢被囚兴云庄柴房。红孩儿送酒质问其与林诗音关系并泼酒拔刀；林诗音欲私放他，龙啸云因妻儿自认懦夫阻拦并跪求原谅，称将送少林寺见心湖与百晓生。铁传甲与阿飞在祠堂分手，阿飞隐瞒李寻欢处境决意亲救。林仙儿报信：依心眉之议明日送往少林，晚筵有铁笛先生——笛藏十三摄魂钉，爱妾如意死于梅花盗。阿飞午后挟持林麻子潜入，点晕后踢开柴房门。
- chapter: 16
  title: 第十六回 假仁假义
  summary: 阿飞白日闯柴房救人，中了游龙生、田七与诸葛弩的埋伏，幸得夺情剑与金丝甲突围并刺伤赵正义。出房后被心眉率少林僧以罗汉门围困，冲阵时遭少林铁袖背后重创。带伤入梅林遇铁笛先生，一剑破其让招却中铁笛暗器。铁笛先生放他离开；另处龙啸云看守咳病的李寻欢，李寻欢不肯解穴逃走。
- chapter: 17
  title: 第十七回 原形毕露
  summary: 龙啸云与李寻欢话别时，林诗音冷言点破龙啸云该放人却不放；龙啸云表面允诺关照阿飞，转头却与田七密谋，阿飞重创赵老大与铁笛先生后中心眉大师一掌逃走。林诗音偷听到丈夫出卖朋友，欲救李寻欢，却见田七布防，铁笛先生为亡妻如意闯屋欲杀李寻欢，反被林诗音一掌打昏。林诗音揭穿龙啸云串通，李寻欢坦言早知却不怪；三人情感崩溃对质。另一边阿飞在林仙儿处醒来，得知李寻欢已于昨天凌晨被带走。车中李寻欢调侃心眉大师与田七，马车骤停，路旁有人铁手勒住马辔。
- chapter: 18
  title: 第十八回 一日数惊
  summary: 伊哭拦车索要李寻欢，青魔手毒气伤感心眉大师；李寻欢在穴道未全解时以小李飞刀击伤伊哭迫其遁走。众人投宿客栈后，菜油中火红蜈蚣毒杀四名少林僧与厨役，李寻欢断为苗疆极乐峒五毒童子追杀。此后馍馍等食物连环下毒，心眉与田七只得以孩童面饽饽果腹，在饥饿与杀机中赶往嵩山少林。
- chapter: 19
  title: 第十九回 百口莫辩
  summary: 车出小镇后，心眉大师与田七同中毒饽饽，田七临死扼杀李寻欢，心眉拍穴救人却自知难活。极乐峒主驱极乐虫围杀，李寻欢以小李飞刀刺其咽喉，毒虫反噬峒主成枯骨。李寻欢不顾自身安危护送心眉赶赴嵩山少林寺；心湖大师与百晓生闻名而起，心宠诊出五毒水晶之毒，却断言心眉永不会醒，百晓生更指李寻欢百口莫辩。
- chapter: 20
  title: 第二十回 人心难测
  summary: 李寻欢在少林遭心湖、心宠与百晓生等围诘,亮出小李飞刀自保,坦言已杀极乐洞主却难自证无辜。阿飞伤愈后欲离冷香小筑寻他,林仙儿逼他同行并告别神思恍惚的林诗音;龙啸云自幕后断言无人能救李寻欢。客栈中阿飞将金丝甲赠林仙儿,二人几至欢好却被她中止。夜半青魔伊哭潜入,林仙儿点破丘独为其私生子并暗持青魔手,二人纠缠。
- chapter: 21
  title: 第二十一回 以友为荣
  summary: 伊哭与林仙儿苟合后本欲杀之，反被她媚言挑拨，连夜去寻同行少年阿飞。阿飞因思念林仙儿失眠，遭伊哭墙外叫阵；怒火中剑出被青魔手震断，险遭击杀，却以两指挟半截剑尖闪电刺穿伊哭咽喉，并抛尸入河。次日林仙儿掩饰伤容，偕阿飞在客店饭厅听孙老先生与红儿说书：梅花盗与探花郎实为一人的传言、兴云庄旧事、李寻欢护送中毒心眉大师回少林反被围困禅房、挟心树而令八百弟子无可奈何等。阿飞闻友被诬、真相无人可证，热血沸腾又以友为荣，同时深忧李寻欢迟早埋骨少林。
- chapter: 22
  title: 第二十二回 梅花又现
  summary: 饭堂中孙老先生祖孙谈李寻欢困于少林，唯真梅花盗复现可洗其冤；阿飞决意假冒梅花盗，林仙儿同行并指张胜奇为首个对象。黑衣人五点血花杀张胜奇，江湖再议梅花盗。萧静上山禀报，心宠、百晓生反认乃李寻欢同党假冒，心湖为五师弟准照李寻欢菜单备膳。阿飞练"不动"，林仙儿探得少林仍未信，再引其至申老三高墙庄院，定为第二下手对象。
- chapter: 23
  title: 第二十三回 误入罗网
  summary: 林仙儿引阿飞夜探申老三，阿飞越墙入室出手，却因对方胸藏钢板并落入屋顶巨网，被心宠与百晓生点穴擒获。百晓生揭破阿飞为救李寻欢假冒梅花盗。另边李寻欢以心树为质，于心眉遗蜕旁饮酒，得知少林藏经两年七次失窃、心眉疑内贼并留读经鎏记，鎏记末页与藏经已被毁。窗外心宠、百晓生拖出阿飞胁逼，李寻欢决意束手换友；心树托其查杀心眉凶手，李寻欢揭尸相询极乐童子毒征。
- chapter: 24
  title: 第二十四回 逆徒授首
  summary: 李寻欢由心眉遗蜕未腐推断其另中剧毒，与心树锁定半路出家、善于用毒的心宠。小亭对质时心树出示读经鎏记并设局搜出藏于心宠房中的达摩易筋经，心宠不打自招。百晓生原是幕后指使者，扣住心湖大穴欲胁众下山，李寻欢以小李飞刀洞穿其咽喉。单鹗趁乱携经逃窜，途中欲杀重伤的阿飞，反被阿飞以冰柱刺喉而死。心湖认错放行，李阿下山并起疑梅花盗或为女子。
- chapter: 25
  title: 第二十五回 剑无情人却多情
  summary: 李寻欢与阿飞推论梅花盗或为女子、并可能以美色驱使心宠盗取少林藏经；李寻欢于兴云庄外吐血却不入内，原谅龙啸云后与阿飞黯然分手。阿飞至冷香小筑当面指控林仙儿即梅花盗，指其以傀儡移祸、设陷申老三屋中害己与李寻欢，并持少林藏经；林仙儿以情动之，阿飞握剑终难下手，剑无情而人多情。
- chapter: 26
  title: 第二十六回 小店中的怪客
  summary: 秋日弄堂鸡毛小店中，残废店主孙驼子与寄居一年多、拒说姓名的怪客"酒鬼"相守；两名杏黄衫客骑马窥探高墙内李家旧宅、打探后来主人龙啸云下落并以银买话后离去。酒鬼对黄衫人去向沉思，并在九月十四日追问明日是否九月十五。
- chapter: 27
  title: 第二十七回 小店又来怪客
  summary: 小店中酒鬼算定客至，蓝衫祖孙、南山双虎、段开山杨承祖胡非胡媚与青面瘦长汉子先后上门。祖孙以李寻欢、阿飞等江湖大事说书。青面汉子断言六人将死于此，连掴段开山、折断杨承祖枪尖。杏黄衫少年以制钱压六人头上驱其入圈，独眼、绿面及白发镶金边黄衫客陆续押人入场，小店内外死寂如坟。
- chapter: 28
  title: 第二十八回 要人命的金钱
  summary: 弄堂尽头独腿黄衫人拄铁拐现身，黄衫老人向为信而来的四十九人宣示规矩。水蛇胡媚因喷嚏铜钱落地，违例当死，反扑被黄衫老人击伤后点名要杨承祖杀她；杨承祖头顶铜钱亦落，被迫砍死胡媚后自刎。独腿人与青面汉子对坐谈信与宝藏渔翁之利，铁拐顿地三尺入土，双方以兵器谱铁拐第八、蛇鞭第七相激，战意已起。
- chapter: 29
  title: 第二十九回 长眼睛的鞭子
  summary: 青面鞭神西门柔以长着眼睛般的蛇鞭卷落四十余人头上铜钱后脱身，独腿诸葛刚率高行空、唐独、上官飞、燕双飞围攻未果；祖孙两人向孙驼子道破诸人皆为金钱帮上官金虹属下，并论及兵器谱与丐帮消长；酒鬼取走诸葛刚所留书信，信中言九月十五夜兴云庄有重宝将现，酒鬼三更后失踪。
- chapter: 30
  title: 第三十回 漫漫的长夜
  summary: 四更浓雾中，落魄憔悴的李寻欢重返荒废的冷香小筑，窗外窥见诗音缝衣、龙小云练字；龙小云认定父亲龙啸云因惧李寻欢报仇而失踪，并暗下杀机。黎明时李寻欢自认两年暗中守护诗音，与门房麻子相认，得知龙家败落、诗音散尽首饰。麻子报有五位江湖人前来拜寿，李寻欢辨出诸葛刚、高行空、燕双飞、唐独、上官飞；其后黑衣人携乌鞘长剑到访。参观途中燕双飞欲以飞枪与小李探花飞刀较量，遭黑衣人冷语嘲讽。
- chapter: 31
  title: 第三十一回 小李飞刀
  summary: 龙小云陪同诸葛刚、高行空、唐独、燕双飞、上官飞与黑衣人等至林诗音小楼。三人黄衫人欲上楼探查，鞭神西门柔自楼跃下以蛇鞭勒杀二人并伤一人。诸葛刚以金刚铁拐横扫千军缠住蛇鞭，唐独欲以螳螂刀偷袭西门柔，却被小李飞刀洞穿咽喉毙命。李寻欢现身，燕双飞发九柄飞枪挑战，亦被小李飞刀瞬杀。黑衣人亮出嵩阳铁剑，连斩高行空与诸葛刚，断上官飞子母钢环后因欣赏其胆识放行；西门柔见势遁走。黑衣人自承郭嵩阳，以二尸为敬，与李寻欢约定择地一较高下。龙小云以母子无依言语刺激李寻欢，林诗音在楼上看着二人。李寻欢终随郭嵩阳离去。
- chapter: 32
  title: 第三十二回 知己仇敌
  summary: 李寻欢与郭嵩阳走向枫林决斗。李寻欢因尚有人需要照顾而先承认不能交手、认败；郭嵩阳感佩其勇气，却仍坚持一战，并承诺若李寻欢战死必代其完成未了心愿、保护所念之人。二人在枫林中以小李飞刀与铁剑交锋，人剑合一的剑气摧落红叶如血雨；飞刀硬接剑锋后刀锋折断，李寻欢无法再出刀，郭嵩阳却主动认败离去。说书老人的孙女儿辫子姑娘现身，称赞二人英雄本色，并指出李寻欢本有三次可取郭嵩阳性命的机会却未出手，又追问郭嵩阳由「风卷流云」转「流星追月」时的破隙。
- chapter: 33
  title: 第三十三回 惊人之语
  summary: 辫子姑娘自报家门为孙小红，约李寻欢斗酒，二人同至孙驼子小店。孙小红以问答法拼酒，接连揭出惊人内情：写那封信的人是林仙儿；阿飞仍与林仙儿在一起却完全被蒙在鼓里；林仙儿写信是为诱李寻欢为林诗音现身以便杀人；第一个要杀李寻欢的人是上官金虹。
- chapter: 34
  title: 第三十四回 惊人的消息
  summary: 孙小红与李寻欢拼酒，透露林仙儿造谣沈浪曾托李父保管两本武功心法以致上官金虹动心；并付纸卷示阿飞藏处，又言孙老爷子实为送走上官金虹。李寻欢追问孙老爷子身份时被灌醉。孙驼子闩门后现出二叔真面目，孙小红说明灌醉是爷爷吩咐，为避大欢喜女菩萨、蓝蝎子、吕凤先、荆无命、胡不归等接踵而来的杀机，约定将李寻欢带往城外。
- chapter: 35
  title: 第三十五回 吃人的蝎子
  summary: 孙驼子与侄女孙小红叙旧：他为守约已抹桌近十四年，答应明年过年回家。孙小红欲把醉倒的李寻欢当醉猫带走时，蓝蝎子自后院现身，声称要带走李寻欢为伊哭报仇。蓝蝎子招来路上吊上她的洪运镖局总镖头楚相羽（活霸王），先以一招蝎尾般奇兵刃杀之，再与孙驼子交手；孙驼子以大鹰爪力与驼峰绝技应战。蓝蝎子袖中寒光飞出，孙小红惊呼不及，半空中李寻欢之手更快地折断蓝蝎子手腕，兵刃落地。李寻欢缓缓站起，表明酒量不差，手中已现小李飞刀，满屋死寂恐惧。
- chapter: 36
  title: 第三十六回 奇异的感情
  summary: 蓝蝎子为伊哭复仇却遭李寻欢以小李飞刀钉门楣放行，因其尚有泪可流；孙小红识破李寻欢装醉，孙驼子自灌求醉不愿受人恩惠并吐露曾被救与守护十五年之苦。孙小红劝李寻欢顾及阿飞、勿为林仙儿放下一切，并请他去城外长亭见爷爷（因上官金虹必经）。两人夜行长亭途中谈笑间见金黄灯笼与金衣行列，辨为金钱帮，其中有插出鞘剑、疑使左手剑的强手，李寻欢将孙小红拉至道旁树后观察。
- chapter: 37
  title: 第三十七回 老人
  summary: 李寻欢与孙小红暗中观察上官金虹与荆无命步伐如一人的默契配合，心生畏惧。长亭老人以旱烟火光示警，与上官金虹在点烟指微间展开无形决斗并吐烟折变，使对方一揖称佩离去。老人随后点明林诗音因李寻欢的保护反成目标、龙啸云已携胡不归归来，并促李寻欢去见阿飞；李寻欢说走就走，孙小红欲随行被爷爷拦下。
- chapter: 38
  title: 第三十八回 祖孙
  summary: 残秋中李寻欢心境萧索，忆及神秘老人与孙驼子、孙小红一家，近乡情怯欲寻阿飞与林仙儿。黄昏在枫林酒铺「停车爱醉枫林晚」暗处，见上官飞焦急密会；红衣小姑娘接引后，李寻欢尾随轿队上山，听出轿中另有女子与上官飞缠绵，并确认该女为林仙儿。夜深上官飞痴迷离去后，李寻欢依暗号上门，开门却是白发老太婆与自称周姑娘的红衣小姑娘，坚称只有祖孙二人、无人进出，林仙儿去向成谜；李寻欢取走饭厅一瓶酒离去，被小姑娘笑作酒鬼。
- chapter: 39
  title: 第三十九回 阿飞
  summary: 李寻欢提酒沿山泉至梅林木屋，本以为抹桌少年不是阿飞，近看才知阿飞神采尽失、变得平和拘谨。重逢后两人执手哽咽。林仙儿现身，容貌更添魅力，否认昨夜坐轿外出，阿飞亦证其每晚早睡。林仙儿下厨接风，李寻欢与阿飞散步；阿飞自责对不起李寻欢与梅花盗受害者，称临走已归还劫财且离不开林仙儿。李寻欢发现二人分房而睡，阿飞天黑即眠，并因阿飞能数清梅花朵数而感其寂寞。
- chapter: 40
  title: 第四十回 奸情
  summary: 李寻欢探访阿飞与林仙儿的山居，见阿飞已弃剑戒酒、受林仙儿无微不至的照料，却暗疑其幸福真伪。晚饭后阿飞沉睡不醒，李寻欢想起排骨汤与砂锅，断定汤中有迷药，破门发现林仙儿夜出。他赶往镇外粉红灯光小楼，见郭嵩阳自楼中疲倦而出。二人至酒店屋脊对饮，郭坦言只在心情不好时找林仙儿相互利用；李寻欢求他协助向阿飞揭破奸情，郭答应同往。返回木屋时人去屋空，汤锅已洗得干干净净。
- chapter: 41
  title: 第四十一回 狡兔
  summary: 李寻欢与郭嵩阳发现阿飞与林仙儿已匆忙离去，旧物未动。李寻欢揭起床板，见山腹秘道直通小楼卧室床下。小楼红衣小姑娘转交一名大胡子刀疤男子留下的密封信，署名上官金虹，约李寻欢十月初一于山谷飞泉下相见。李寻欢与郭嵩阳决定暂留，并分别向小姑娘索要硬木与蛋。
- chapter: 42
  title: 第四十二回 恶毒
  summary: 客店中林仙儿以柔情与肉体操控阿飞，诱导其疏离李寻欢并誓护己。醉少年闯房揭旧事被阿飞击飞；死灰眼、脸带三刀疤的荆无命在院中窥见。林仙儿药倒阿飞后夜访荆无命，承认约李寻欢于十月初一见面，因恨欲借荆无命与上官帮主杀之，并以肉体手段试探荆无命。天将亮时她自忖九月二十五，李寻欢最多再活五天。
- chapter: 43
  title: 第四十三回 生死之间
  summary: 李寻欢戒酒一日后手抖，完成未竟人像并与林铃铃谈起旧情；次日他梳洗准备赴约，却被郭嵩阳点穴制住。郭嵩阳声称不能错过与上官金虹交手的机会，独自离去；铃铃将李寻欢藏入衣橱，门外又有两人敲门。
- chapter: 44
  title: 第四十四回 两世为人
  summary: 李寻欢被点穴后躲在林仙儿闺房衣橱中。至尊宝与蓝蝎子上门寻林仙儿不遇，拉开衣橱发现李寻欢。至尊宝要占其人，蓝蝎子要其命并索右手；蓝蝎子以接在断腕上的蝎子尾巴暗算，却误中至尊宝，至尊宝中蝎尾之毒倒下。蓝蝎子说明恩怨后仍要李寻欢右手；李寻欢因跌落冲破穴道，竟主动伸手，蓝蝎子感叹后欲走，被李寻欢拦下。
- chapter: 45
  title: 第四十五回 千钧一发
  summary: 蓝蝎子与李寻欢、铃铃对话后掠去，嘱咐留下至尊宝尸身由其安排。铃铃缠住李寻欢，逼他承诺见过郭嵩阳后必先回来。李寻欢赶往枫林，见落叶如血、决战已起；于百丈飞泉中发现郭嵩阳已死，嵩阳铁剑齐柄没入山石，尸身挂于泉中。李寻欢解下尸身，判断郭嵩阳临终挂剑正是为等他传话。
- chapter: 46
  title: 第四十六回 英雄与枭雄
  summary: 李寻欢与铃铃检视郭嵩阳尸身，从二十六处下深上浅的剑伤读出荆无命反撩偏锋、肋下变势的出手部位，并悟出郭嵩阳乃故意露破绽以身示警。铃铃感其义气跪拜。途中上官金虹与荆无命复盘，确认知情却因杀气、体力与只许胜不许败而不回头，上官更点破荆无命已有情。李寻欢于阿飞木屋旁安葬郭嵩阳，断言枭雄绝不会做无把握之事，故不会折返。
- chapter: 47
  title: 第四十七回 大欢喜女菩萨
  summary: 李寻欢与铃铃谈痴后回镇，嗅出酒菜香气来自铃铃小楼。楼上大欢喜女菩萨率众胖女宴饮，男侍供奉。李寻欢上楼相认，坦言为救杀死其徒弟的蓝蝎子而来，愿带走她，若她已死则报仇。涂粉男侍认出李探花即小李飞刀李寻欢，奉命取乌鞘长剑以夺情剑法串炸鸡；李寻欢认出其人为藏剑山庄游龙生。女菩萨令游龙生刺己咽喉示威，剑光已刺入。
- chapter: 48
  title: 第四十八回 女巨人
  summary: 游龙生夺情剑刺中大欢喜女菩萨咽喉却被其肥肉夹住；女菩萨以肉阵围困李寻欢，铃铃弄垮小楼解救。李寻欢飞刀射瞎女菩萨右眼，刀反被嚼碎；潜伏的游龙生自背后贯剑刺死女菩萨，反被压断骨头，临终否认自己是游龙生。黎明枫林外葬下三人。李寻欢拒绝收留女菩萨门下，铃铃以寻小姐与阿飞为由欲同行。另线阿飞与林仙儿在新居喝牛肉汤，因钱紧争执。
- chapter: 49
  title: 第四十九回 各有安排
  summary: 林仙儿以真情哄睡阿飞后独自乘轿赴密林土地庙，会齐黑衣人、中年商人、灰衣人与蓝衫少年。黑衣人交上宝庆一带账目银票却未追到孙老头祖孙；中年人因利润连年下滑被暗示卸任后惊逃，遭蓝衫少年一剑斩杀。灰衣人回报龙啸云已回兴云庄，同行有胡不归及吕凤先堂弟，并猜卖酒驼子或即孙老二。荆无命自林中现身，连杀灰衣人与黑衣人，识破蓝衫少年为点苍门下谢天灵弟子，称郭嵩阳已死在自己剑下；林仙儿因荆无命仍在而断定李寻欢已死，并煽动蓝衫少年上前拼命。
- chapter: 50
  title: 第五十回 温柔陷阱
  summary: 荆无命先以剑慑杀蓝衣少年，再杀轿夫，欲杀林仙儿却被其柔情软化；林仙儿入林见上官金虹，自荐有钱聪明且会杀人，二人纠缠至天将亮。林仙儿称阿飞在等她、不敢杀阿飞因惧李寻欢，并指李寻欢惟一弱点是林诗音；上官金虹坦言命荆无命来杀她是怕荆无命毁在她手上，并称李寻欢活不长。
- chapter: 51
  title: 第五十一回 奇峰迭起
  summary: 晨雾中荆无命与上官金虹悄然离去。李寻欢携铃铃逛街时盯梢一似乞丐者，疑为好友铁传甲；瘦长客老五等多人围攻，揭帽后却是酒糟鼻痴汉，原是掉包。白衣人以指剪银棍绝技打断扁担并剪碎银棍，吓退使出武当两仪剑法的卖卜瞎子一伙。李寻欢安置铃铃后追乞丐，于后门洞见其擦亮剪下银子，遂上前盘问。
- chapter: 52
  title: 第五十二回 陷阱
  summary: 李寻欢追问假痴乞丐，得知其与高大黑汉换衣赚银，信为铁传甲金蝉脱壳；不料乞丐实为胡不归，以沾衣十八跌、七十二路擒拿手、分筋错骨手等暗算将其摔擒。卖卜瞎子、独眼妇人、青衣大汉、卖臭豆干小贩等现身，揭穿自始至终是圈套。主谋竟是龙啸云，欲以李寻欢为饵引铁传甲。胡不归自承欠情办事且痛骂己非，龙小云钻桌下持刀寻仇被龙啸云掴止后跪饶，胡不归不耐冲出。
- chapter: 53
  title: 第五十三回 骗局
  summary: 李寻欢与龙啸云对饮深谈。龙啸云点破李寻欢把最心爱的人让给自己为妻、而妻子仍爱着那个人的伤痛。李寻欢指出兴云庄园中藏宝从头到尾是骗局；龙啸云表示信任李寻欢、绝不会杀他，却也不能放他，并要带他去见一个想见他的人。章末转入另一间封闭大屋，一人站着批阅账册卷宗，身后另有一人如枪杆般一动不动。
- chapter: 54
  title: 第五十四回 交换
  summary: 荆无命与上官金虹通宵理事。有人求见，上官金虹先命连同带路的第八舵主向松一并杀掉；荆无命发现来人是残废孩子龙小云，因不杀孩子而未动手。龙小云奉父龙啸云之命，以掌握中的李寻欢性命为筹码，求上官金虹在天下英雄面前与龙啸云结为八拜之交。上官金虹试以扣留龙小云要挟，龙小云称其父与帮主同类、宁舍独子亦不交人，又以小李飞刀例不虚发与结拜之利说服对方。荆无命主动答应护送。上官金虹指出龙小云武功被李寻欢所废反得以活命，因其阴辣若未残废则必不能放过。
- chapter: 55
  title: 第五十五回 荡妇
  summary: 黑暗中林仙儿与上官金虹密谈，上官金虹称李寻欢已在掌握、离死不远，命她去杀阿飞；并透露龙啸云借子龙小云送来李寻欢、还要结拜，实则可被反利用。荆无命在外守候，忠于上官金虹却因屋内声息痛苦难当。林仙儿以少女身份潜入如云客栈接近龙小云，得手后仍恨李寻欢，决意不让他死于上官金虹之手，终要亲手慢慢毁之。
- chapter: 56
  title: 第五十六回 出鞘剑
  summary: 林仙儿为阿飞找人铸就薄而轻的剑，劝他持剑去救生平好友李寻欢，并点出天机老人、上官金虹、李寻欢与最可怕的荆无命；阿飞答应她一定要回来。龙小云与荆无命同行，经绸缎庄与米仓多次换车掩护后抵达左都御史樊林泉宅邸，龙啸云在此接待，却发现墙角已站着来历不明的人。
- chapter: 57
  title: 第五十七回 火花
  summary: 阿飞历经艰苦追踪现身，与荆无命目光交锋如剑石相激。龙啸云暗器突袭，荆无命击落暗器并停剑不杀阿飞，自承能杀却因同为痛苦之人而留命。阿飞拒走，誓不让李寻欢死于荆无命之手；后阿飞呕吐呕血，荆无命至地室见被囚十余日、穴道尽闭的李寻欢，索看小李飞刀，令解穴欲亲手杀之。阿飞再度冲入，以命相抵护友，荆无命笑意奇特，剑光交击之际更有一道更快光芒闪起，一切骤然静止。
- chapter: 58
  title: 第五十八回 英雄
  summary: 荆无命剑刺阿飞肩胛两分，却被李寻欢小李飞刀斜插肩胛所制；荆无命自承其错，废臂离去。李寻欢放走龙啸云父子，并以气势宽慰阿飞。胡疯子于屋檐点破暗助原委并警告龙啸云勿结交上官金虹。黄昏后阿飞欲回林仙儿处，李寻欢忆起铃铃，二人转入饺子铺，见白衣人与红衣小姑娘。
- chapter: 59
  title: 第五十九回 勇气
  summary: 铃铃在饺子店苦等李寻欢多日，由白衣人吕凤先相陪。重逢后阿飞尖锐质疑她背对门并非真在等人。吕凤先自报姓名，称银戟温侯已死、自身以三指如金属之手为利器，要将手插入桌中示范，并点名要找四人证明，讽阿飞虽活犹死。阿飞碎杯出血求战，以证自己仍活着。众人至坟地，铃铃痛斥英雄只知互相杀戮后离去；阿飞恳求李寻欢勿阻，认此为复活勇气的最后机会，李寻欢终同意他出手。
- chapter: 60
  title: 第六十回 友情
  summary: 阿飞与李寻欢谈起铃铃是否说谎；阿飞以血与原野法则激发斗志，于荒坟夜雾中与吕凤先对决，借鬼火微扰破其空灵，一剑刺中肩头取胜却不取性命。李寻欢勉励阿飞，二人以酒庆祝后阿飞安睡。李寻欢另赴客栈践约，揭开与吕凤先、铃铃之间的交易：请吕凤先故意败给阿飞以助其振作，并以答应吕凤先任意一事为交换，甚至愿以命相抵；吕凤先终叹阿飞有此友为福，显出深挚友情。
- chapter: 61
  title: 第六十一回 承诺
  summary: 吕凤先不杀李寻欢，意在令其永觉有恩；李寻欢转而恳求吕凤先，勿让阿飞再见到那会令他沉沦的女人（天下第一美人），因铃铃知其所在却仍昏迷。阿飞醒来见李寻欢病弱睡中仍咳，含泪悄离，在店中饮豆浆时先后瞥见说书先生祖孙、断臂的荆无命与追踪的上官飞，因见剑而热血沸腾，尾随出街至土山。
- chapter: 62
  title: 第六十二回 绝招
  summary: 上官飞追上荆无命，揭发积怨并称其为父亲私生子，以龙凤双环出手欲杀之；荆无命以断臂硬接双环，右手剑自左胁下刺喉，道破右手比左手更快的秘密，击杀上官飞。阿飞欲追，被李寻欢以情谊劝止，并析荆无命暗练右手剑法意在试探与防备上官金虹，且澄清上官飞猜错父子关系。
- chapter: 63
  title: 第六十三回 断义
  summary: 阿飞与李寻欢穿过枯林回家,阿飞满心甜蜜以为林仙儿仍在灯下等候,李寻欢却因已使林仙儿离开而负疚难安。小屋灯亮门虚掩,门外尽是零乱男人脚印;推门后厨房无灯无汤,林仙儿房间传来垂死呻吟。阿飞撞开门,血泊中挣扎的竟是铃铃而非林仙儿。铃铃临终向李寻欢吐露:她早被「他」所骗失身,又受其指使将吕凤先带到此处,害她的不是李寻欢而是那人,并称那人必遭更惨报应。阿飞逼问是否带吕凤先来此,铃铃力竭死去。阿飞指责李寻欢主宰自己命运、断送林诗音又要毁自己与林仙儿,宣称以后不再是朋友,若再侮辱林仙儿便要以血洗清,头也不回去寻她。李寻欢咳血挡门劝阻未果,知林仙儿会留线索、阿飞必与吕凤先决生死且尚非对手,仍决心追去,因友情与对诗音的心皆永不更改。
- chapter: 64
  title: 第六十四回 祸水
  summary: 龙啸云即将入金钱帮坐第二把交椅，与龙小云畅想上官金虹来迎；荆无命断臂回报李寻欢已走，上官金虹未责一词。上官金虹接粉信赴松林会吕凤先，林仙儿临阵投向上官金虹，吕凤先未出手先败，痛哭崩溃。林仙儿称服上官杀人不必动手，二人言及李寻欢与阿飞。阿飞悄至欲杀上官金虹，林仙儿拦阻软化其恨意；上官金虹挑起阿飞所借青钢剑，称此剑不能杀他，林仙儿抢剑称其为恩人。
- chapter: 65
  title: 第六十五回 利用
  summary: 林仙儿哭诉吕凤先曾逼迫折磨她，称上官金虹救了她；阿飞承诺替她还债。上官金虹以命债要阿飞代为杀人，阿飞表示除李寻欢外皆可。夜行时上官以步法节奏暗控阿飞，并于荆无命前取走其剑、授以青钢剑，使阿飞似已取代荆无命之位。室内又以古大师为荆无命淬炼之剑试削茶杯，终使阿飞接剑。林仙儿点破明日目标恐为龙啸云：因下月初一有结义之约，上官不愿失言背信，又不能亲自动手或动用金钱帮，故利用阿飞，并料事成后将灭口且假作替龙啸云复仇；阿飞拒逃，宁以堂堂正正还债。
- chapter: 66
  title: 第六十六回 怒火
  summary: 阿飞向林仙儿坚称活着有时不如死去，并维护李寻欢，不许她以荆无命被弃之喻侮辱朋友；林仙儿发现无法以情爱控制阿飞后，深夜悄然投向上官金虹。上官金虹早有算计，抱起林仙儿时阿飞怒火中烧撞门而入，林仙儿当面冷嘲自己从未改变，阿飞陷入死灰般的绝望。
- chapter: 67
  title: 第六十七回 自取其辱
  summary: 阿飞在目睹林仙儿与上官金虹事后精神崩溃，啃土呕吐；上官金虹以剑相激并带他见七名少女与珠宝，阿飞狂饮抱人表示不想死。次日龙啸云、龙小云于如云客栈欲与上官金虹结拜却屡遭折辱；席间上官金虹刻意刁难碧华轩少主西门玉，最终以筷子点中其肩井穴。
- chapter: 68
  title: 第六十八回 武学巅峰
  summary: 上官金虹席间以筷子暗劲制倒说谎的西门玉立威，众人惶恐进食。湿淋淋的阿飞持剑闯入追击龙啸云，被龙小云勾椅绊倒失剑；龙啸云欲杀阿飞，反被上官金虹羞辱为连狗不如。龙小云自承其咎，剁下左腕献上后晕厥，龙啸云才被放走。上官金虹击碎酒壶掷银辱阿飞，李寻欢现身钉银并替阿飞倒酒；阿飞泪落摔杯冲出。李寻欢亮出小李飞刀，与上官金虹对峙——对方手中无环、心中有环，李寻欢刀上无招、心中有招，同臻武学巅峰，杀机一触即发。阿飞逃至昨夜沉醉的小院，旧人探出半边脸又缩回。
- chapter: 69
  title: 第六十九回 神魔之间
  summary: 阿飞再访昨夜之地,七女闭门反目、冷语相向,令他不敢再看旧人。李寻欢与上官金虹对峙,隐身老人与少女以手中无环到环我两忘的武学真谛消解杀气,上官金虹疑为孙老先生却无人应。四人抬楠寿棺材入高贵厅,棺内竟是荆无命所杀且曾埋葬的上官飞遗体;上官金虹强掩悲惧,与李寻欢互认能杀其子者不多,并重申两人一战终不可免。
- chapter: 70
  title: 第七十回 是真君子
  summary: 上官金虹因独子被杀要约李寻欢今日决战，李寻欢以丧子之日不宜决斗拒之，二人饮酒后上官抱尸离去。阿飞被林仙儿堵门折磨，面对上官抱来的尸体坦承自己杀子；上官不杀，命吕总管以酒色困之，要其活着痛苦。林仙儿质问是否可被阿飞要时被掴。李寻欢夜市寻阿飞不得，思林诗音，遇落魄偷酒的吕凤先，劝其回家遭拒；章末有人问若无家此病是否永不愈。
- chapter: 71
  title: 第七十一回 毒妇的心
  summary: 林仙儿现身寻到李寻欢，吕凤先闻声惊逃。林仙儿暗示自己毁了阿飞，并称唯有她能带路救他，条件是以李寻欢本人换阿飞自由。李寻欢饮酒沉静应对，终掴林仙儿十数耳光；她反扑入怀，声言只要他答应情愿日夜被打，旁人忽又拍手称打得好。
- chapter: 72
  title: 第七十二回 互斗心机
  summary: 夜市灯笼下，孙小红现身与林仙儿对峙。孙小红称阿飞已由孙老先生从上官金虹处救出，并扬言要救阿飞只有杀了林仙儿，随即提出立刻决斗。林仙儿以女人之法刁难，先后提议比生孩子、当场脱衣，逼得孙小红罢手。孙小红转而以言语暗示有人将暗中杀林仙儿，令其恐惧，自己则拉着李寻欢离开；李寻欢意识到孙小红已成长为成熟的女人。
- chapter: 73
  title: 第七十三回 人性无善恶
  summary: 林仙儿与孙小红以心斗心未真交手；孙小红拉李寻欢前行，林仙儿尾随欲见阿飞。途中谈及龙啸云欲与上官金虹结拜，以及李寻欢未在上官飞尸前出手的算计。李寻欢论人性本无善恶、人心难测。一行抵达昔日林仙儿与阿飞的小屋，林仙儿流泪求再见阿飞一面，李寻欢心软允其只说两句即走。
- chapter: 74
  title: 第七十四回 蒸笼和枷锁
  summary: 孙老先生以四盆旺火蒸醒虚脱的阿飞，欲蒸出其酒与勇气；祖孙与李寻欢谈笑间论及若天下人皆如李寻欢。林仙儿前来向阿飞辩白昔日所为并称缘尽欲去，阿飞却唤住她、护其以此处为家，令李寻欢与孙小红黯然出门。孙老先生遂论世人皆有蒸笼与枷锁：李寻欢之蒸笼为朋友，龙啸云之枷锁为怀疑嫉妒，阿飞之枷锁为爱，并叹无人能代阿飞解脱。
- chapter: 75
  title: 第七十五回 最慷慨的人
  summary: 阿飞与林仙儿私会时,林仙儿暗示自己已失身于上官金虹,阿飞誓杀上官金虹为其报仇。窗外三名金钱帮黄衣人持孔明灯闯入,为首为向舵主向松(风雨双流星),奉上官金虹之命来杀林仙儿。林仙儿试图以色相周旋并嘲向松为阴阳人,阿飞疲惫出手被流星锤打断木凳脚,向松表示只杀林仙儿不杀阿飞,并要当场演示杀人,忽有人出声质疑向松不配懂杀人。
- chapter: 76
  title: 第七十六回 生死一线间
  summary: 荆无命现身，以右手出剑瞬间刺死向松，并连杀鬼头刀与丧门剑；林仙儿断言他因恨上官金虹而来、亦曾杀上官飞，随荆无命离去并唾弃阿飞，阿飞瘫卧血泊生死一线。上官金虹下战书约李寻欢出西城十里长亭外林下决斗；孙小红欲代写遗言并愿同死，劝其远走，孙老先生点破李寻欢不会逃。李寻欢先至战场巡视地形与土质，孙老先生讲解地利与轻功差异对高手对决的影响。
- chapter: 77
  title: 第七十七回 高明的手段
  summary: 孙老先生向孙小红讲解决斗地势与夕阳反光、枯枝试探等战前学问，并评价李寻欢与上官金虹尚无优势；孙小红跪求祖父莫让李寻欢死，孙老先生应允。入夜李寻欢在八角亭顶发现铁匣中一束头发，孙老先生断为上官金虹所留以扰其心，李寻欢虽知其手段高明却已看见而难安。
- chapter: 78
  title: 第七十八回 兴云庄的秘密
  summary: 上官金虹以头发攻心，李寻欢虽知可能中计，仍决意赶赴兴云庄探看林诗音，孙小红强忍酸楚坚持同行。孙小红质疑龙小云在武功被废后仍能轻松断手不晕，怀疑他已得兴云庄稀世秘笈并恢复武功。孙老先生证实兴云庄确藏武功秘笈，并讲述王怜花与沈浪往事，点出王怜花曾欲烧毁记载其一生所学的怜花宝典。
- chapter: 79
  title: 第七十九回 恐怖的决斗
  summary: 孙老先生向李寻欢揭示：王怜花远游前将怜花宝典本欲托付小李探花，因李寻欢不在而交予林诗音，并留孙二侠（孙驼子）暗中相助；李寻欢由此痛感林诗音有所隐瞒，并忆起少年梅下雪中初识。随后他与孙小红至孙驼子小店，只见齐腕断手紧抓抹布、食指指向窗外，循血掌印至死巷虚掩后门，识破上官金虹圈套仍决意闯入。门后地下室中，黄衣人与中原八义围攻铁传甲，翁大娘死于仇恨，铁传甲为逼同伴撤离主动撞上公孙雨刀锋，公孙雨旋被花枪刺倒，另一柄花枪又向倒地的铁传甲刺下。
- chapter: 80
  title: 第八十回 义气的朋友
  summary: 地室混战中公孙雨连中双枪，中原八义与金钱帮黄衣人死伤惨重。李寻欢以小李飞刀震慑全场，逼问孙驼子下落，一黄衣人自尽作答。铁传甲临终澄清未出卖翁天杰，金风白道出翁老大暗中劫补与铁传甲知情不说的真相后自刎，樵夫与易明堂亦视死如归。易明堂告知林诗音仍在兴云庄、阴谋出自上官金虹与龙啸云，托李寻欢合葬诸兄弟。孙小红未进地室；李寻欢相信易明堂之言决定不去兴云庄，先去对付上官金虹。
- chapter: 81
  title: 第八十一回 可怕的错误
  summary: 孙小红与李寻欢核算赴约时程后,故意提议坐车不换马不用轻功,以便李寻欢休息并拖慢行程;李寻欢未上小楼见林诗音便启程。次日正午才行一半路,李寻欢察觉被拖延,孙小红坦言求爷爷代赴与上官金虹的决斗,李寻欢深惧她铸成无法补救的大错。
- chapter: 82
  title: 第八十二回 无心铸大错
  summary: 孙小红与李寻欢谈论孙老先生对上官金虹的愤怒与迟迟不出手的原因；李寻欢指出巅峰武者因恐惧而逃避行动，孙小红惊惧恳求赶回。二人换马狂奔至无月长亭，本以为火光是孙老先生抽旱烟，亭中却是上官金虹，并道来晚了。暗林中林仙儿怂恿荆无命趁机杀上官金虹以夺金钱帮主之位，荆无命却拧住林仙儿现身；对峙中荆无命成为决定生死的关键，并当众摔出林仙儿，林仙儿继而嘲讽二人关系、暗示荆无命为上官金虹而杀人。
- chapter: 83
  title: 第八十三回 无言的慰藉
  summary: 雨中，上官金虹将一文不值的林仙儿踢到李寻欢面前，称更有理由杀她的人是李寻欢；李寻欢拒绝，并因荆无命在场认为地方太挤、杀气须留给上官金虹。上官金虹与荆无命结成一体，断言李寻欢绝无机会，却愿破例让其选死处；李寻欢以换干衣、避雨为辞，实则欲为孙小红等争取生路。孙小红未拦阻话别，以无言目光给予慰藉与鼓励，李寻欢步履坚定离去。林仙儿起身试图以愧疚与眼泪打击孙小红，反被孙小红以「今天还有事要做、眼泪不妨等到明天」的勇气震住。
- chapter: 84
  title: 第八十四回 伟大的爱心
  summary: 雨夜中林仙儿与孙小红对峙后离去寻阿飞；林诗音现身与孙小红相认长谈，自认缺少勇气与坚强，不及孙小红能安慰鼓励李寻欢，并论及李寻欢对决上官金虹时荆无命是否出手、阿飞身上由林仙儿系上的枷锁，以及一个时辰内的转机；林诗音承认怜花宝典在自己手中，因怕武功害人而瞒着李寻欢，现感内疚请孙小红转达，孙小红则准备去找阿飞。
- chapter: 85
  title: 第八十五回 忽然想通了
  summary: 林诗音决意远行，与孙小红约次日再晤；孙小红感悟其更需要李寻欢，决心牺牲自己成全二人。林仙儿认定阿飞仍在旧屋等待，梳洗后返回以真心求复合，阿飞却折筷拒之，称奇怪自己怎会爱上她这种女人，脱衣入雨甩脱枷锁。林仙儿崩溃撕衣，后文暗示其在长安城由名妓沦为丑娼。雨中孙小红找到阿飞，见其已站直甩脱枷锁；阿飞自言是忽然想通了，并得知李寻欢生死全看自己。
- chapter: 86
  title: 第八十六回 错的是谁呢
  summary: 李寻欢被带入上官金虹简陋如坟墓的密室，两人围绕生死与清醒对谈；林诗音回客栈看望龙小云，发现儿子曾尾随并交出怜花宝典，龙小云道破其欲以宝典见上官金虹拼命拖延以待阿飞来救李寻欢，并痛哭自己恨李寻欢不是父亲；龙啸云门外现身自责，点穴制住林诗音后夺宝典冲出代她赴难，龙小云追认其为唯一的父亲，却已听不见。
- chapter: 87
  title: 第八十七回 血洗一身孽
  summary: 龙啸云登上金钱帮总舵石阶，被十八黄衣人围住；得知帮主上官金虹已回且与李寻欢同在院内后强求面见，却因上官金虹“看到龙啸云就杀”之令遭钩剑鞭笔与九环刀、判官笔联手击杀，喉管刺穿倒地，怀中怜花宝典染血绝传。其后阿飞在可望金钱帮家院的竹林中剖竹为剑，孙小红疑此轻剑能否对付上官金虹。
- chapter: 88
  title: 第八十八回 重生
  summary: 阿飞与孙小红认定上官金虹已回金钱帮总舵、故意慢慢折磨李寻欢。阿飞持竹剑闯入,连斩金钱帮黄衣精锐与地趟刀、凤翅流金铛等名家,余众溃散;孙小红以轻功暗器相助。二人冲至上官帮主寝室,却发现铁门厚重内闩,竹剑折断,无法救下门内的李寻欢。
- chapter: 89
  title: 第八十九回 胜败
  summary: 阿飞与孙小红在铁门外焦急等待李寻欢与上官金虹的生死结果；孙小红劝阿飞离开，阿飞执意留下。铁门打开后走出的竟是仍活着的李寻欢，上官金虹因赌能否躲过小李飞刀而错过杀机，最终败死。阿飞入内见小李飞刀致命之伤与如空壳般的荆无命；荆无命托尸离去时被激出手，剑速仍快却被阿飞竹剑先机抵住咽喉。阿飞不杀荆无命并放他走，欲以恨激发其重生；孙小红感慨击败天下顶尖高手后二人却毫无喜色。
- chapter: 90
  title: 第九十回 蛇足
  summary: 长亭雨歇，李寻欢与孙小红论胜败与奋斗，并目睹一对少年男女为成名而别。众人本在此等林诗音，阿飞断言她已不必来；林诗音果未至，因不愿再见李寻欢徒增痛苦，亦劝子龙小云勿去，认定龙啸云已用血洗净诸债。阿飞托言出海寻仙草神仙而远行，约三年后回来喝喜酒；李寻欢以喜酒太贵却不愿令友失望作答，孙小红投入其怀。阿飞一笑重拾勇气与希望，众人决心好好活下去。
