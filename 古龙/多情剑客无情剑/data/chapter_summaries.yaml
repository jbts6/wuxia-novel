- chapter: 1
  title: 冷风如刀，以大地为砧板，视众生为鱼肉。万里飞雪，将穹苍作烘炉，熔万物为白银。
  summary: 第1回「飞刀与快剑」。雪将住，风未定，一辆马车自北而来，滚动的车轮辗碎了地上的冰雪，却辗不碎天地间的寂寞。李寻欢打了个呵欠，将两条长腿在柔软的貂皮上尽量伸直，车厢里虽然很温暖，很舒服，但这段旅途实在太长，太寂寞，他不但已觉得疲倦，而且觉得很厌恶，他平生最厌恶的就。主要人物：李寻欢。
- chapter: 2
  title: 马车里堆着好几罐酒，这酒是那少年买的，所以他一碗又一碗地喝着，而且喝得很快。
  summary: 第2回「海内存知己」。李寻欢瞧着他，目中充满了愉快的神色，他很少遇见能令他觉得有趣的人，这少年却实在很有趣。道上的积雪已化为坚冰，车行冰上，纵是良驹也难驾驭，那虬髯大汉已在车轮上拴起几条铁链子，使车轮不致太滑。铁链拖在冰雪上，“格朗格朗”地直响。主要人物：李寻欢、阿飞。
- chapter: 3
  title: 李寻欢再一注视，那查猛的咽喉，竟已被洞穿！杀他的人显然不愿他的鲜血溅上自己的衣裳，所以一剑刺穿他的咽喉后，就立刻塞了团冰雪在创口里，等到冰雪被热血溶化的时候，血却也已被冰凝结住了。
  summary: 第3回「宝物动人心」。他的尸体仍笔直地站着，倚着木柱并没有倒下来，由此可见，杀他的那人，身法是多么轻，多么快！他一剑刺穿查猛的咽喉后，就立刻拔出了剑，连一丝多余的力量都没用，所以才没有碰倒查猛的尸体。查猛自然是准备抵抗的，但等到这一剑刺穿咽喉后，他的招式还没有使。主要人物：李寻欢、阿飞、梅花盗。
- chapter: 4
  title: 孙逵笑道：“你懂得什么？我若能将梅花盗置之于死地，非但从此扬眉吐气，而且……而且那好处也不知有多少。”
  summary: 第4回「美色惑人意」。李寻欢道：“还有什么好处？”孙逵道：“梅花盗自从在三十年前销声匿迹之后，江湖中人本都以为他已恶贯满盈，谁知半年多以前他竟忽又出现，就在这短短七八个月里，他已又做了七八十件巨案，连华山派掌门人的女儿，都被他糟蹋了。”李寻欢叹道：“此人算来已该。主要人物：李寻欢、梅花盗。
- chapter: 5
  title: 李寻欢抓起酒壶，将剩下来的酒全都灌了下去，然后就不停地咳嗽，苍白的脸上又现出凄艳的血红色。他手抚着胸膛，黯然自语道：“啸云，诗音，我绝不怪你们，无论别人怎么说，我都不会怪你们，因为我知道你们并没有错，所有的错，都是我一个人造成的。”
  summary: 第5回「风雪夜追人」。忽然间，木板门砰的一响！一个人自门外爬了进来，他看来就像是个肉球似的，腹大如鼓，全身都堆着肥肉，全身都沾染着泥垢，头发和胡子更乱得一塌糊涂，就像是已有许多年没有洗过澡，远远就可以嗅到一阵阵酸臭气。他爬着滚了进来，因为他两条腿已被齐根斩断。主要人物：李寻欢、阿飞、林诗音、梅花盗。
- chapter: 6
  title: 虬髯大汉忽然跳起来，将身上的衣裳全都脱下来，铁一般的胸膛迎着冰雪和寒风，将车轭背在身上。
  summary: 第6回「醉乡遇救星」。他竟像是一匹马似的将这大车拉着狂奔而去。李寻欢并没有阻止，因为他知道他满怀的悲痛需要发泄，但车门关起时，李寻欢也不禁流下了眼泪。地上积雪已化为坚冰，车轮在冰上滚动，虬髯大汉并不需要花很大力气，马车已疾驰如飞。主要人物：李寻欢、龙啸云、铁传甲。
- chapter: 7
  title: 李寻欢喝了酒，解药的药力发动得更快，还不到六个时辰，李寻欢已觉得体力渐渐恢复了过来。
  summary: 第7回「误伤故人子」。这时天刚破晓，虬髯大汉虽熬了一夜，但人逢喜事精神爽，只不过酒喝得太多了，头有些痛。梅二先生也用手捂住脑袋，喃喃道：“该死该死，天又亮了。”虬髯大汉道：“天亮了有何不好？”。主要人物：李寻欢、龙啸云、林诗音、梅花盗。
- chapter: 8
  title: 但这本是李寻欢自己的家园，他从小就在这里长大的。在这里，他曾经度过一段最幸福的童年，得过最大的荣耀，可是，也就在这里，他曾经亲自将他父母和兄长的灵柩抬出去埋葬。
  summary: 第8回「往事不可追」。有谁能想到此刻他在这里竟变成个陌生人了。李寻欢黯然一笑，耳旁似乎响起了一阵凄凉的悲歌：“眼看他起高楼，眼看他宴宾客，眼看他楼垮了。”他仔细咀嚼着这其中的滋味，体味着人生的离合，生命的悲欢，更是满怀萧索，泫然欲泣。主要人物：李寻欢、林仙儿、龙啸云、林诗音、梅花盗。
- chapter: 9
  title: 少年听了李寻欢的话，怔了怔，嘿嘿冷笑着道：“有趣有趣，阁下的确有趣得很，貂裘上居然还长着眼睛！”
  summary: 第9回「何处不相逢」。李寻欢淡淡一笑道：“我这件貂裘上若是没有长着眼睛，又怎会看见阁下的宝剑，又怎会躲得过阁下自背后刺来的一剑呢？”少年脸色立刻变了，一双手已气得发抖。龙啸云干咳两声，大笑道：“两位都在说笑，‘藏剑山庄’的少庄主，固然绝不会在乎区区一柄剑，但兄弟。主要人物：李寻欢、林仙儿、龙啸云、林诗音、梅花盗。
- chapter: 10
  title: 李寻欢叹了口气，道：“我教得太多，你也学得太快了。”
  summary: 第10回「十八年旧怨」。他忽然推开了她，拍了拍衣裳站起来，瞪着窗子道：“今天的戏已演完了，阁下若是还未看够，明天请早吧。”窗外传来了“嗤”的一声冷笑，一人道：“阁下的手段果然高明，但望阁下的飞刀也同样高明才好！”说到后一面句话，语声已远在十丈开外。主要人物：李寻欢、林仙儿、龙啸云、梅花盗。
- chapter: 11
  title: 独眼妇人听有人在屋子外面呼叫，抢了出去，皱眉道：“什么事如此大惊小怪的？”
  summary: 第11回「天外来救星」。那人道：“我方才见到“铁面无私”赵正义，他说那姓铁的就在……”他一面说着话，一面已推门走了进来，说到这里，忽然怔住，因为他已发现他要找的人——就在屋子里。独眼妇人格格笑道：“你想不到吧！”。主要人物：李寻欢、阿飞、龙啸云、梅花盗、铁传甲。
- chapter: 12
  title: 虽然是正午，天色却阴沉得有如黄昏。
  summary: 第12回「同是断肠人」。阿飞不急不徐地走着，就和铁传甲第一次看到他时完全一样，看来，是那么孤独，又那么疲倦。但铁传甲现在已知道，只要一遇到危险，这疲倦的少年立刻就会振作起来，变得鹰一般敏锐、矫健。铁传甲走在他身边，心里也不知有多少话想说，却又不知该如何说起，李寻欢。主要人物：李寻欢、阿飞、林仙儿、龙啸云、林诗音、铁传甲。
- chapter: 13
  title: 李寻欢听了林诗音的话，将面前的酒一饮而尽，喃喃道：“不错，我是个无可救药的浪子，我若去找她，就是害了她……”
  summary: 第13回「无妄之灾」。林诗音道：“你答应了我？”李寻欢咬了咬牙，道：“你难道不知道我一向都很喜欢害人么？”忽然间，一只手伸出来，紧紧拉着珠帘。主要人物：李寻欢、阿飞、林仙儿、龙啸云、林诗音、梅花盗。
- chapter: 14
  title: 林仙儿嫣然道：“田七爷难道还未看出他身上穿了金丝甲？”
  summary: 第14回「有口难言」。田七眼睛一亮，抚掌道：“不错，这就难怪摩云兄方才打人反而自己手痛了。”林仙儿道：“今天我本来不准备到冷香小筑去的，但到了晚上，我忽然想起忘了拿件东西，但我再也想不到，一回到冷香小筑，梅花盗就出现了。”她美丽的面靥上露出了恐惧之色，道：“严格。主要人物：李寻欢、阿飞、林仙儿、龙啸云、梅花盗。
- chapter: 15
  title: 下了多天的雪，今天总算有了阳光。
  summary: 第15回「情深意重」。但阳光并没有照进这间屋子，李寻欢也并不失望，因为他已知道，世上本就有许多地方是永远见不到阳光的。何况，对于“失望”，他也久已习惯了。他全不知道田七、赵正义这些人要对他怎么样，他甚至连想都懒得去想。现在，田七他们已将少林寺的僧人带去见秦孝仪父。主要人物：李寻欢、阿飞、林仙儿、龙啸云、林诗音、梅花盗。
- chapter: 16
  title: 门外并没有人看守，这也许是因为任何人都想不到阿飞敢在白天来救人的，也许是因为大家都想趁机睡个午觉。
  summary: 第16回「假仁假义」。这间柴房只有个很小的窗子，就像是天生的牢房一样，阴森森而黑暗，堆得像是小山般的柴木下，蜷伏着一个人，也不知是已晕迷，还是已睡着。一见到他身上那件貂裘，阿飞胸中的热血就沸腾了起来，连他自己也不明白自己怎会对这人生出如此深厚的友情。他一步窜过去。主要人物：李寻欢、阿飞、龙啸云。
- chapter: 17
  title: 龙啸云听了李寻欢的话，垂下了头，沉默了很久很久，黯然道：“明天……明天你就要走了，我……”
  summary: 第17回「原形毕露」。李寻欢道：“你千万莫要再来送我，我从来不喜欢送人，也不愿别人来送我，我看到别人送行时那种如丧考妣的模样就觉得恶心。”他又笑了笑道：“何况我这次去的地方又不远，说不定三五天就会回来。”龙啸云也打起了精神，展颜笑道：“不错，你回来我一定接你，那。主要人物：李寻欢、阿飞、林仙儿、龙啸云、林诗音。
- chapter: 18
  title: 那人身上穿着件青布袍，大袖飘飘，这件长袍无论穿在谁身上都会嫌太长，但穿在他身上，布还盖不到他的膝盖。
  summary: 第18回「一日数惊」。他本就已长得吓人，头上却偏偏还戴着顶奇形怪状的高帽子，骤然望去，就像是一棵枯树。一只手就能力挽奔马，这分力量实在大得可怕，但更可怕的却是他的眼睛，那简直不像是人的眼睛。他的眼睛竟是青色的，眼球是青色的，眼白也是青色，一闪一闪地发着光，就像是。主要人物：李寻欢、阿飞、林仙儿。
- chapter: 19
  title: 心眉大师吃着田七由小孩手上换来的那碗饽饽，他也吃得很放心，只不过出家人一向讲究细嚼慢咽，田七一碗全都下了肚，他才吃了两口。
  summary: 第19回「百口莫辩」。这时车马已驶出小镇，赶车的只希望快将这些瘟神送到地头，好大吃一顿，是以将马打得飞快。田七笑道：“照这样走法，天亮以前，就可以赶到嵩山了。”心眉大师面上也露出一丝宽慰之色，道：“这两天山下必有本门弟子接应，只要能……”。主要人物：李寻欢、阿飞、林仙儿、梅花盗。
- chapter: 20
  title: 冷风如刀，积雪的屋脊上突有一群寒鸦惊起，接着，屋脊后就响起了一阵清亮但却凄凉的钟声。
  summary: 第20回「人心难测」。连钟声都似乎在哀悼着他们护法大师的圆寂。李寻欢仿佛第一次感觉到风中的寒意，终于忍不住剧烈地咳嗽起来，心里也不知是愤怒，是后悔，还是难受。等他咳完了，就发现数十个灰衣僧人一个接着一个自小院的门外走了进来，每个人脸上却像是凝结着一层寒冰。主要人物：李寻欢、阿飞、林仙儿、龙啸云、林诗音。
- chapter: 21
  title: 屋子里只剩下喘息声。
  summary: 第21回「以友为荣」。伊哭正站在床边穿衣裳，他俯视着床上的林仙儿，面上带着那种惟有征服者才有的骄傲和满足。过了很久，林仙儿忽然望着他嫣然一笑，道：“现在你总该知道我是不是值得的了吧？”伊哭道：“我真该杀了你的，否则还不知有多少人要死在你手上。”。主要人物：李寻欢、阿飞、林仙儿、龙啸云、梅花盗。
- chapter: 22
  title: 午饭的时候已过，故事也说完了，人已渐渐散去。走的时候，大家都在纷纷议论，甚至在为李寻欢惋惜。
  summary: 第22回「梅花又现」。虽然离戌时还早，但天色已渐渐阴暗下来，饭堂中只剩下两桌人——孙老先生还在那里啜着酒，抽着旱烟，他的孙女在一旁低着头吃面，她吃面的法子很有趣，先将面条卷在筷子上，再送进嘴里。林仙儿脉脉地凝注着阿飞，阿飞却在沉思，他们桌上的饭菜都几乎没有动过，。主要人物：李寻欢、阿飞、林仙儿、梅花盗。
- chapter: 23
  title: 林仙儿和阿飞在晚风中来到一片很大的庄院前，指着那座高得出奇的围墙道：“这就是申老三的家，他们堂兄弟十六个合开了四十多家店铺，但这四十多家店铺，现在全是申老三的了，因为他的十五个兄弟已全都进了棺材。”
  summary: 第23回「误入罗网」。阿飞道：“那十五个人是怎么死的？”林仙儿道：“据说是病死的，但究竟是怎么死的，谁也不知道。别人只奇怪平日身体很好的十五个人，怎会在两三年之中就死得干干净净，就像是中了瘟疫似的，而申老三却连一点小毛病都没有。”阿飞仰起了头，似乎在计算墙的高度。主要人物：李寻欢、阿飞、林仙儿、梅花盗。
- chapter: 24
  title: 李寻欢叹了口气，道：“你的运气不错，被他毒死的人实在不好看。”
  summary: 第24回「逆徒授首」。其实无论被谁毒死的人都不会好看的。李寻欢闭起眼睛，缓缓道：“多年前，我曾经看到过一个被他毒死的人，那人中毒才不过片刻，全身已经发黑，我出去打个转，再回去一看，那人身上的肉已全都不见了，已变成了一副骷髅——漆黑的骷髅！”心树凝视心眉的尸身，嗄。主要人物：李寻欢、阿飞、梅花盗。
- chapter: 25
  title: 阿飞听说梅花盗是女人，不由笑道：“女人再强也不过是女人。”
  summary: 第25回「剑无情人却多情」。李寻欢道：“这也许正是她在故设疑阵，让别人都想不到梅花盗是女人。”他轻轻地咳嗽着，接着说道：“那梅花盗若果真是女人，她可以用一个男人做傀儡，替她做这种事，到了必要的时候，再找机会将这男人除去。”阿飞道：“你想得太多了。”。主要人物：李寻欢、阿飞、林仙儿、龙啸云、梅花盗。
- chapter: 26
  title: 秋，木叶萧萧。
  summary: 第26回「小店中的怪客」。街上的尽头，有座巨大的宅院，看来也正和枝头的黄叶一样，已到了将近凋落的时候。那两扇朱漆大门，几乎已有一年多未曾打开过了，门上的朱漆早已剥落，铜环也已生了锈。高墙内久已听不到人声，只有在秋初夏末，才偶然会传出秋虫低诉，鸟语啾啁，却更衬出了这宅。主要人物：龙啸云。
- chapter: 27
  title: 今天那酒鬼看来似乎有些异样，他的酒喝得特别慢，眼睛特别亮，手里没有刻木头，而且还特地将他桌上的蜡烛移到别的桌上。
  summary: 第27回「小店又来怪客」。他的眼睛一直在看着门，似乎在等人的模样。但戌时早已过了，小店里却连一个主顾也没有。孙驼子长长伸了个懒腰，打着呵欠道：“今天看样子又没有客人上门了，还是趁早打烊吧，也好陪你喝两杯。”。主要人物：李寻欢、阿飞、林仙儿。
- chapter: 28
  title: 也不知过了多久，弄堂尽头突然传来一阵“笃，笃，笃……”之声，声音单调而沉闷。
  summary: 第28回「要人命的金钱」。但这声音在这种时候听来，却另有一种阴森诡秘之意，每个人心头都好像被棍子在敲。“笃，笃，笃……”简直要把人的魂都敲散了。四个黄衫人对望了一眼，忽然一齐站了起来。
- chapter: 29
  title: 只见青面汉子左手轻轻在桌上一按，人已凌空飞起，只听“呼”的一声，风声激荡，右手里不知何时已多了条乌黑的长鞭。
  summary: 第29回「长眼睛的鞭子」。软兵器越长越难使，能使七尺软鞭的人，已可算是高手，此刻这青面汉子手里的蛇鞭却长得吓人，纵然没有三丈，也有两丈七八。他的手一抖，长鞭已带着风声向站在圆圈里的一群群人头顶上卷了过去，只听“叮叮当当”一连串声响，四十多枚铜钱一齐跌落在地上。这四十。主要人物：上官金虹、天机老人。
- chapter: 30
  title: 夜雾凄迷，木叶凋零，荷塘内落满了枯叶，小路上荒草没径，昔日花红柳绿，梅香菊冷的庭院，如今竟充满了森森鬼气。
  summary: 第30回「漫漫的长夜」。小桥的尽头，有三五精舍，正是“冷香小筑”。在这里住过的有武林中第一位名侠，江湖中第一位美人，昔日此时，梅花已将吐艳，香气醉沁人心。但现在，墙角结着蛛网，窗台积着灰尘，早已不复再见昔日的风流景象，连不老的梅树都已枯萎。主要人物：李寻欢、林仙儿、龙啸云。
- chapter: 31
  title: 龙小云见燕双飞似已怒极，赶紧笑道：“他的飞刀也是凡铁所铸，又不是什么仙兵神器，但江湖中人却说得他就好像传说中的剑仙一样，我有时听了真觉得有些好笑。”
  summary: 第31回「小李飞刀」。黑衣人淡淡道：“听说他废去了你的武功，你对他想必是一直怀恨在心。”龙小云笑道：“李大叔本是我的长辈，长辈教训晚辈，晚辈怎敢起怀恨之心，何况一个人不会武功，也未必就不能做大事的，前辈你说是么？”黄衣人凝注着他，似也看不透这孩子的真面目。主要人物：李寻欢、阿飞、林仙儿、上官金虹、林诗音、郭嵩阳。
- chapter: 32
  title: 到了那里，他们两人中就有一人的生命也到了尽头！
  summary: 第32回「知己仇敌」。郭嵩阳的确是很可怕的对手！李寻欢这一生中，也许直到今天才遇着个真正的对手！每个练武的人，武功练到巅峰时，都会觉得很寂寞，因为到了那时，他就很难再找到一个真正的对手。主要人物：李寻欢、郭嵩阳。
- chapter: 33
  title: 辫子姑娘道：“这是你错过杀他的第一次机会，你还要不要我再说第二次？”
  summary: 第33回「惊人之语」。李寻欢苦笑道：“不说也罢。”辫子姑娘冷笑道：“别人都说李寻欢是个真正的男人，想不到原来也有些娘娘腔。”李寻欢平生也挨过不少骂，但被人骂做“娘娘腔”，这倒还真是生平第一次，他实在有些哭笑不得。主要人物：李寻欢、阿飞、林仙儿、上官金虹、孙小红、林诗音。
- chapter: 34
  title: 孙小红摇着头笑道：“你看你，老毛病又犯了，还未轮到你问的时候，你偏偏要问。”
  summary: 第34回「惊人的消息」。她接着又道：“上官金虹这人的脾气，你当然知道，普通的宝藏，自然不能令他动心，这次他怎么会动了心呢？”李寻欢道：“不知道。”孙小红道：“因为他听说昔年天下第一位名侠沈浪是令尊的好朋友。”。主要人物：李寻欢、阿飞、林仙儿、上官金虹、孙小红、荆无命。
- chapter: 35
  title: 孙驼子突又长长叹了口气，喃喃道：“不错，你的确已不小了，上次我看到你的时候，你还只有五六岁，但现在你已经是大人了……”
  summary: 第35回「吃人的蝎子」。他垂头望着手里的抹布，又开始慢慢地抹着桌子。孙小红也低下了头，道：“二叔已有十三四年没有回过家了么？”孙驼子沉重地点了点头，喃喃道：“不错，十四年，还差几天就是十四年。”。主要人物：李寻欢、孙小红、蓝蝎子。
- chapter: 36
  title: 蓝蝎子额上的冷汗不停地流下来，一粒比一粒大……
  summary: 第36回「奇异的感情」。她全身都在颤抖着，忽然大叫了起来，道：“你飞刀为何还不出手？你为何还不杀了我？”李寻欢缓缓道：“你肯不顾一切来为伊哭复仇，总算对他还有真情，他死了，你自然很痛苦……很痛苦……”他凝注着手里的刀锋，目中似乎带着一丝痛苦之色，黯然道：“我。主要人物：李寻欢、阿飞、林仙儿、上官金虹、孙小红、林诗音。
- chapter: 37
  title: 李寻欢注意那使左手剑的汉子，孙小红注意的却是另一件事。
  summary: 第37回「老人」。这两人走得很慢，步子很大，看来和平常人走路并没有什么不同，但也不知为了什么，她总觉得这两人走起路来有些特别。她注意很久，才发现是什么原因了。平常两个人走路步伐必定是相同的。主要人物：李寻欢、阿飞、上官金虹、孙小红、荆无命、龙啸云。
- chapter: 38
  title: 秋风扑面，已有冬意。
  summary: 第38回「祖孙」。李寻欢的心境也正如这残秋般萧索。“你留在这里，只有增加她的烦恼和痛苦……”老人的话，似乎还在他耳边响着。主要人物：李寻欢、阿飞、林仙儿、孙小红、铁传甲。
- chapter: 39
  title: 月仍未缺。
  summary: 第39回「阿飞」。山泉在月光下看来就像是条闪着光的银带。李寻欢手里提着那酒瓶，瓶子里还剩下半瓶酒，夜很静，流水的声音在静夜中听来就像是音乐。他沿着山泉，慢慢地走着，走得并不急。他不愿在天还未亮时就走到阿飞住的地方，免得惊扰他们的好梦。主要人物：李寻欢、阿飞、林仙儿、梅花盗。
- chapter: 40
  title: 阿飞道：“这两年来，我日子的确过得很平静……我一生中从未有过如此安定平静的日子，她……她也的确对我很好。”
  summary: 第40回「奸情」。李寻欢笑道：“听到你说这些话，我也很高兴，太高兴了……”他自然不愿被阿飞看出他笑得有些不自然，嘴里说着话，头已转了过去，四面观望着，突然又道：“你的剑呢？”阿飞道：“我已不用剑了。”。主要人物：李寻欢、阿飞、林仙儿、郭嵩阳。
- chapter: 41
  title: 阿飞屋子里的东西也没有移动过，他们什么东西都没有带走，甚至连那套衣服都还摆在床头。
  summary: 第41回「狡兔」。但他们的人却已走了！显然走得很匆忙。阿飞竟然又不辞而别，李寻欢简直不能相信，望着那扇被他撞破的门，他忽又弯下腰去剧烈地咳嗽起来。郭嵩阳背负着双手，静静地望着他，等他咳完了，郭嵩阳才缓缓道：“你说阿飞是你的好朋友。”。主要人物：李寻欢、阿飞、林仙儿、上官金虹、郭嵩阳。
- chapter: 42
  title: 屋子很大，被单是新换的，洗得很白，浆得很挺，茶壶并没有缺口，茶杯也干净得很。
  summary: 第42回「恶毒」。但屋里却冷清清的，总像是缺少了些什么！林仙儿正坐在床头，在一件男人的衣服上缝钮扣，她用针显然没有用剑熟悉，时常会扎着自己的手。阿飞站在窗口，望着窗外的夜色，也不知在想些什么。主要人物：李寻欢、阿飞、林仙儿、荆无命。
- chapter: 43
  title: 李寻欢在雕着木头。
  summary: 第43回「生死之间」。那穿红衣服的小姑娘一直在旁边痴痴地瞧着他，忽然问道：“你究竟在雕什么？”李寻欢笑了笑，道：“你看不出？”小姑娘道：“我看你好像是想雕一个人的像，但为什么你每次都不完成它呢？也好让我看看你雕的这人漂不漂亮。”。主要人物：李寻欢、上官金虹、荆无命、龙啸云、郭嵩阳、铃铃。
- chapter: 44
  title: 衣橱里又暗又闷，若是换了别人在这种情况下被关在衣橱里，只怕要紧张得发疯。
  summary: 第44回「两世为人」。来的人显然不怀好意，否则怎会对铃铃如此粗鲁？但李寻欢这时反而平静了下来。遇着这种无可奈何的事，他总会先想法子使自己保持冷静，因为他知道自己纵然急疯了也没有用。这时铃铃已叫了起来，道：“你们这是什么意思？难道是土匪么？”。主要人物：李寻欢、林仙儿、铃铃、蓝蝎子。
- chapter: 45
  title: 蓝蝎子凄然一笑，道：“还等什么？从你伸出手的那一瞬间，你就已将你的债还清了，我虽是个女人，却也还懂得‘道义’两字。”
  summary: 第45回「千钧一发」。铃铃眨着眼，突又插嘴道：“女人天生就可以不讲道义，这本是女人的权利，男人天生比女人强，所以本该让女人几分。”蓝蝎子道：“这话是谁说的？”铃铃道：“当然是我们家小姐说的。”。主要人物：李寻欢、上官金虹、荆无命、郭嵩阳、铃铃、蓝蝎子。
- chapter: 46
  title: 李寻欢看了看郭嵩阳的尸体，长叹道：“不错，我毕竟还是来迟了一步。”
  summary: 第46回「英雄与枭雄」。铃铃道：“他的人既然已死了，还能对你说话？……难道死人还能说话？”李寻欢道：“有些话，用不着说出，我也可以听到。”铃铃道：“可是……可是我怎么没有听见？”。主要人物：李寻欢、阿飞、林仙儿、上官金虹、荆无命、郭嵩阳。
- chapter: 47
  title: 李寻欢道：“痴并不可笑，因为惟有至情的人，才能学得会这‘痴’字。”
  summary: 第47回「大欢喜女菩萨」。铃铃笑了，道：“痴也要学？”李寻欢道：“当然，无论谁想学会这‘痴’字，都不是件易事，因为‘痴’和‘呆’不同，只有痴于剑的人，才能练成精妙的剑法，只有痴于情的人，才能得到别人的真情，这些事，不痴的人是不会懂的。”铃铃垂下头，似在咀嚼着他这几句。主要人物：李寻欢、阿飞、铃铃、蓝蝎子。
- chapter: 48
  title: 游龙生不但剑法快，手里用的“夺情剑”也可算是柄吹毛断发的利器，李寻欢对这柄剑的锋利也清楚得很。
  summary: 第48回「女巨人」。他不信有任何人的血肉之躯能挡得住这一剑！只听一声惊呼，游龙生的人竟突然弹了出来，跌坐在李寻欢身旁的一个胖女人身上。这女人吃吃地笑着，搂住了他。主要人物：李寻欢、阿飞、林仙儿、铃铃、蓝蝎子。
- chapter: 49
  title: 林仙儿说着说着，眼泪已流了下来，幽幽地道：“你知道，以前我　那些钱，都已听你的话分给人家了，你难道不信？”
  summary: 第49回「各有安排」。阿飞长长叹了口气，柔声道：“我不是不信，只不过……我应该养你的，我不能让你受苦。”林仙儿从背后紧紧抱住了他，伏在他身上，流着泪道：“我知道你是真心对我好，从来也没有人对我这么好，可是，我们两人既然已这么好了，你就不该再分什么你的，我的……连。主要人物：李寻欢、阿飞、林仙儿、荆无命、龙啸云、吕凤先。
- chapter: 50
  title: 谢天灵乃点苍掌门，号称天南第一剑客，平生纵横无敌，却曾在郭嵩阳手下败过三次，而且败得心服口服。
  summary: 第50回「温柔陷阱」。如今连郭嵩阳都已死在他剑下，谢天灵自然更不是他的敌手，谢天灵的弟子就更不必说了。无论谁都可看出荆无命绝不是个说大话的人。荆无命道：“我一出手就可取你性命，你信不信？”。主要人物：李寻欢、阿飞、林仙儿、上官金虹、荆无命、林诗音。
- chapter: 51
  title: 雾淡了。
  summary: 第51回「奇峰迭起」。荆无命还是动也不动地站在那里，那双死灰色的眼睛，正茫然望着一滴露水自他的笠帽边缘滴落。他似乎没有看到上官金虹一个人走出了树林。上官金虹也没有瞧他一眼，不快不慢地从他面前走过，淡淡道：“今天有雾，一定是好天气。”。主要人物：李寻欢、上官金虹、荆无命、铁传甲、铃铃。
- chapter: 52
  title: 那乞丐摇着头，道：“我什么人也不认得，什么人也不认得我，我一个人也不认得，一个人也不认得我。”
  summary: 第52回「陷阱」。这人果然有些痴痴呆呆，明明是很简单的一句话，他却要反反复复说上好几次，而且说话时嘴里就像是含着个鸡蛋似的，含糊不清。李寻欢正想用别的法子再问问他时，他却已往李寻欢肋下钻了过去，一溜烟似的跑了。他跑得很快，却绝不像是有轻功根基的人，天下的乞丐。主要人物：李寻欢、龙啸云、铁传甲。
- chapter: 53
  title: 龙啸云勉强一笑，道：“一个人的名字也许会起错，但外号却是绝不会起错的，有的人明明其笨如牛，也可以起个名字叫聪明，但一人的外号若是疯子，他就一定是个疯子。”
  summary: 第53回「骗局」。李寻欢本来不想说话的，却忍不住道：“但一个人若是太聪明了，知道的事太多，也许慢慢就会变成个疯子。”李寻欢苦笑道：“因为到了那种时候，他就会觉得做了疯子就会变得快乐些，所以有些人最大的痛苦就是他明明想做疯子，却做不到。”龙啸云又笑了，道：“幸。主要人物：李寻欢、龙啸云。
- chapter: 54
  title: 这两人自然就是荆无命和上官金虹。
  summary: 第54回「交换」。像他们这样的人，世上也许还找不出第三个。江湖中声名最响，势力最大，财力也最雄厚的“金钱帮”帮主，住所竟如此粗陋，生活竟如此简朴。这简直是谁也无法想像的事。主要人物：李寻欢、上官金虹、荆无命、龙啸云。
- chapter: 55
  title: 黑暗。
  summary: 第55回「荡妇」。黑暗中有人在呻吟，喘息……过了很久很久，有女人的声音轻轻道：“有时我总忍不住想要问你一句话。”这女人声音甜美而娇弱，男人若想抵抗这种声音的诱惑魅力，只有变成聋子。主要人物：李寻欢、阿飞、林仙儿、上官金虹、荆无命、龙啸云。
- chapter: 56
  title: 剑。
  summary: 第56回「出鞘剑」。一柄很薄的剑，很轻，连剑柄都是用最轻的软木做成。因为他的剑刺出，没有人能削到他的手。无论任何兵器，都可将这柄剑击断。主要人物：李寻欢、阿飞、林仙儿、上官金虹、荆无命、龙啸云。
- chapter: 57
  title: 他身上穿着套青布衣服，本来很新，但现在已满是泥污、汗垢，肘间、膝头已也被磨破。
  summary: 第57回「火花」。他身上也很脏，头发更乱。但他远远站在那里，龙啸云都能感觉到一股逼人的杀气！他整个人看来就如同那柄插在他腰带上的剑。主要人物：李寻欢、阿飞、林仙儿、上官金虹、荆无命、龙啸云。
- chapter: 58
  title: 荆无命的剑，已刺入了阿飞的肩胛，但只刺入了两分。
  summary: 第58回「英雄」。阿飞的剑，距离荆无命咽喉还有四寸。他肩上的血已开始渗出，渗入衣服，染红了衣服。荆无命的剑为何没有刺下去？。主要人物：李寻欢、阿飞、林仙儿、上官金虹、荆无命、龙啸云。
- chapter: 59
  title: 她随着他的目光回过头，才发现李寻欢，立刻雀跃着冲了过来，紧紧拉住了李寻欢的手娇笑着道：“我知道你一定会来的，我知道你一定不会忘记我。”
  summary: 第59回「勇气」。铃铃果然还在这里等着。李寻欢也有些激动，反握住她的手，道：“你……你一直都在这里等？”铃铃点了点头，眼眶已红了，咬着嘴唇道：“你为什么来得这么迟，人家都快等得急死了……”。主要人物：李寻欢、阿飞、林仙儿、吕凤先、郭嵩阳、铃铃。
- chapter: 60
  title: 阿飞却还在沉吟着，终于忍不住道：“方才那小姑娘……她是谁？”
  summary: 第60回「友情」。李寻欢道：“她叫铃铃，也很可怜。”阿飞道：“我只知道她很会说谎。”阿飞道：“她并不是真的在等你——她等你，也许还有别的原因。”。主要人物：李寻欢、阿飞、林仙儿、吕凤先、铃铃。
- chapter: 61
  title: 吕凤先冷傲的眸子里，突然露出一种寂寞之意——一个人觉得寂寞的时候，就表示他正在渴望着友情。怎奈真挚的友情并不是人人都能得到的。
  summary: 第61回「承诺」。吕凤先冷冷道：“你的意思是说，你能为他死，他也会为你死，是不是？”吕凤先声音更冷酷，道：“但你已算准了我不会杀你，至少不会在这种情况下杀你，是不是？”沉默，通常只代表两种意思——默认和抗议。主要人物：李寻欢、阿飞、荆无命、吕凤先、铃铃。
- chapter: 62
  title: 转过山，景色更荒凉，秋风萧杀。
  summary: 第62回「绝招」。荆无命的手，突然按上了剑柄——但这是右手，并不是使剑的手，他的剑在这只手里，已不能算是杀人的利器！他的脚步也停下，仿佛知道他的路已走到尽头。就在这时，他听到了上官飞的冷笑。主要人物：李寻欢、阿飞、上官金虹、荆无命。
- chapter: 63
  title: 秋林，枯林。
  summary: 第63回「断义」。穿过枯林，就是条很僻静的小路。阿飞遥指着小路尽头处的一点孤灯，道：“那就是我的家。”这个字听在李寻欢耳里，竟是那么遥远，那么陌生……。主要人物：李寻欢、阿飞、林仙儿、林诗音、吕凤先、铃铃。
- chapter: 64
  title: 李寻欢一想到林诗音，他的心又是一阵剧痛。
  summary: 第64回「祸水」。但他并不想去找她，因为他知道龙啸云一定会好好地照顾着她——龙啸云虽善变，对林诗音的心却未变。只要他对诗音的心不变，别的一切事就全都可原谅。此刻龙啸云的心情，真是说不出地愉快。主要人物：李寻欢、阿飞、林仙儿、上官金虹、荆无命、龙啸云。
- chapter: 65
  title: 阿飞道：“恩人？”
  summary: 第65回「利用」。林仙儿道：“吕凤先一直在逼我，折磨我，我想死都不能，若不是他救了我，我只怕已……”说到这里，她的泪已流下。林仙儿流着泪道：“我本来以为你会为我报答他的，可是现在，现在你……”。主要人物：李寻欢、阿飞、林仙儿、上官金虹、荆无命、龙啸云。
- chapter: 66
  title: 阿飞道：“以前我也认为如此，但现在，我却已知道，有时活着还不如死了的好。”
  summary: 第66回「怒火」。林仙儿咬着嘴唇，道：“这话简直不像你说的，就像李寻欢说的，只有像他这样孤独的人才会说得出这种可笑的话。”阿飞目中又露出了痛苦之色，道：“你认为这话很可笑？”林仙儿道：“当然可笑，假如每个人想法都和他一样，世上也不知有多少人早就该去死了，别人。主要人物：李寻欢、阿飞、林仙儿、上官金虹、荆无命。
- chapter: 67
  title: 阿飞也不知自己是怎么走出去的。
  summary: 第67回「自取其辱」。上官金虹一直冷冷地瞧着他，瞧着他走出去。林仙儿透出口气，柔声道：“我是全心全意地对你，你现在总该相．信了吧。”上官金虹道：“我相信。”。主要人物：阿飞、林仙儿、上官金虹、龙啸云。
- chapter: 68
  title: 江湖中人人都知道上官金虹的武功深不可测，谁也没有看到过他出手——现在还是没有看到他出手。
  summary: 第68回「武学巅峰」。他的手根本好像没有动，只不过在桌上轻轻一按，筷子已急箭般射出，西门玉身子已软了下去。上官金虹道：“带下去，看仔细。”黄衫大汉一伸手，已将西门玉身子抄起。主要人物：李寻欢、阿飞、上官金虹、龙啸云。
- chapter: 69
  title: 阿飞突然跳起来，冲过去。
  summary: 第69回「神魔之间」。“砰”的门竟关了，而且上了闩。过了很久，门里才有应声：“谁？”门里的声音问：“你是谁？”。主要人物：李寻欢、阿飞、上官金虹、荆无命。
- chapter: 70
  title: 上官金虹因独子被杀，异常气愤，要和李寻欢决一死战，并把决战日期定在今天……
  summary: 第70回「是真君子」。李寻欢打断了他的话，道：“无论什么时候我都奉陪，只有今天不行。”上官金虹道：“为什么？”李寻欢叹了口气，道：“今天我……我只想去喝杯酒。”。主要人物：李寻欢、阿飞、林仙儿、上官金虹、荆无命、龙啸云。
- chapter: 71
  title: 轻柔的声音，诱人犯罪的声音。
  summary: 第71回「毒妇的心」。李寻欢还没有回头，吕凤先已跳起来，疯狂地冲了出去。他就好像突然见到鬼似的。李寻欢用不着回头，已知道说话的人是谁了。主要人物：李寻欢、阿飞、林仙儿、上官金虹、吕凤先。
- chapter: 72
  title: 摊子上挑着盏灯笼，灯笼已被油烟熏黑。
  summary: 第72回「互斗心机」。灯笼下俏生生地站着一个人，大大的眼睛，长长的辫子——李寻欢失声道：“孙姑娘！”孙小红嫣然道：“我本来最恨男人打女人，但这次，你却打得让我开心极了。”。主要人物：李寻欢、阿飞、林仙儿、上官金虹、孙小红、蓝蝎子。
- chapter: 73
  title: 林仙儿和孙小红的这一次决斗虽未真的交手，却无异己交手，而且已交手了两次。
  summary: 第73回「人性无善恶」。只不过她们斗的不是力，而是心。因为她很了解女人心里的弱点，而且懂得如何利用它。第二次，胜的却是孙小红。主要人物：李寻欢、阿飞、林仙儿、上官金虹、孙小红、龙啸云。
- chapter: 74
  title: 屋子里很热，热得出奇。
  summary: 第74回「蒸笼和枷锁」。因为屋里生了四盆火，火烧得很旺。闪动的火光，将墙壁和屋顶都照成了嫣红色。阿飞的脸也是红的，全身都是红的。主要人物：李寻欢、阿飞、林仙儿、上官金虹、孙小红、龙啸云。
- chapter: 75
  title: 炉火已熄。
  summary: 第75回「最慷慨的人」。现在屋子里燃烧着的是另一种火。一条修长、浑圆的腿自床沿垂下，在朦胧中看来更白得耀眼。阿飞紧张得就像是一根弓弦。主要人物：李寻欢、阿飞、林仙儿、上官金虹、荆无命。
- chapter: 76
  title: 缓慢的语声，既无高低，也没有情感，向松是熟悉这种声音的，只有荆无命说话才是这种声音！
  summary: 第76回「生死一线间」。向松骇然回首果然瞧见了荆无命！他的衣衫已破旧，神情看来也很憔悴，但他的那双眼睛——死灰色的眼睛，还是冷得像冰，足以令任何人的血凝结。向松避开了他的眼睛，看到了他的手。主要人物：李寻欢、阿飞、林仙儿、上官金虹、孙小红、荆无命。
- chapter: 77
  title: 孙老先生沉吟着，道：“后天他来的时候，上官金虹必定已先到了。”
  summary: 第77回「高明的手段」。孙小红道：“怎见得？”孙老先生道：“因为先来的人，就有权先占据最佳地势，上官金虹当然不肯错过这机会。”孙小红道：“那么，李寻欢为什么不跟他争先？”。主要人物：李寻欢、上官金虹、孙小红、荆无命、林诗音。
- chapter: 78
  title: 李寻欢笑了笑，淡淡道：“世事本就如此，有些事你纵然明知是上当，还是要去上这个当的。”
  summary: 第78回「兴云庄的秘密」。孙老先生忽然道：“不错，若有人能令我心动，我也一样会上当。”孙小红跺了跺脚，咬着嘴唇道：“你们上当，我偏不上当……”孙老先生叹道：“其实你也已上当了，因为你也在怀疑这头发是林姑娘的，你的心也已乱了，现在你若和人决斗，对方的武功纵然不如你，你。主要人物：李寻欢、阿飞、上官金虹、孙小红、龙啸云、林诗音。
- chapter: 79
  title: 孙老先生谈到王怜花想将自己所著怜花宝典烧了的事，李寻欢不由问道：“他为什么想烧了它？”
  summary: 第79回「恐怖的决斗」。孙老先生道：“因为那上面不但有他的武功心法，也记载着他的下毒术、易容术、苗人放蛊、波斯传来的慑心术……”他叹息着接道：“这么样一本书若是落在不肖之徒的手里，后果岂非不堪设想？”李寻欢也叹道：“那的确是后患无穷。”。主要人物：李寻欢、上官金虹、孙小红、龙啸云、林诗音、铁传甲。
- chapter: 80
  title: 公孙雨突又狂吼一声，扑在他身上，哽声道：“我们一定错了，他绝不是……”
  summary: 第80回「义气的朋友」。公孙雨背上又多了柄花枪，枪！双枪！枪拔起，在晕恻的灯光下看来，地室中就像是迷漫着一层雾。二十七人中，已有十六人倒下。主要人物：李寻欢、上官金虹、孙小红、龙啸云、林诗音、铁传甲。
- chapter: 81
  title: 孙小红嘟起了嘴，冷冷道：“原来你也并不十分够义气，至少对死人就没有对活人够义气。”
  summary: 第81回「可怕的错误」。李寻欢忽然问道：“昨天我们是什么时候出发的？”孙小红沉吟着，道：“晚上，就和现在差不多的时候。”李寻欢道：“今天我们是什么时候赶到这里的？”。主要人物：李寻欢、上官金虹、孙小红、林诗音。
- chapter: 82
  title: 孙小红很快地接着又道：“但那只不过是因为他根本没有机会使用武功，也没有必要使用武功。”
  summary: 第82回「无心铸大错」。李寻欢道：“没有必要？”孙小红道：“因为他根本没有对手。”李寻欢道：“上官金虹呢？”。主要人物：李寻欢、阿飞、林仙儿、上官金虹、孙小红、荆无命。
- chapter: 83
  title: 你若是多加注意，就会发觉一个女人死的时候，身上最后僵硬的一个地方就是她的舌头。这只因女人舌头上的肌肉永远都比其他任何地方灵敏得多。
  summary: 第83回「无言的慰藉」。林仙儿道：“不错，当然是你，他把我带到这里来，为的就是要看你亲手杀我，只有用这法子他心里才会觉得舒服些。”上官金虹道：“你呢？死在我手上，你是不是也觉得舒服些？”林仙儿道：“那就要看你用什么法子来杀我了，我倒不希望死得很快，因为只有慢慢地死。主要人物：李寻欢、阿飞、林仙儿、上官金虹、孙小红、荆无命。
- chapter: 84
  title: 过了半晌，林仙儿才咬着牙，道：“今天有很多事要做，你做了什么？”
  summary: 第84回「伟大的爱心」。孙小红缓缓道：“一个女人要帮助她的男人，并不是要去陪他死，为他拼命。而是要鼓励他，安慰他，让他能安心去做他的事，让他能觉得自己是重要的，并没有被人忽视。”林仙儿冷笑道：“这已够了么？”孙小红叹息了一声，道：“除此之外，我又还能为他做什么呢？。主要人物：李寻欢、阿飞、林仙儿、上官金虹、孙小红、荆无命。
- chapter: 85
  title: 林诗音又沉默了很久，才抬起头。
  summary: 第85回「忽然想通了」。她脸上的神色忽然变得很平静，道：“以后我们也许没有见面的机会了。”孙小红皱眉道：“为什么？”林诗音道：“因为……因为我就要到一个很远很远的地方去。”。主要人物：李寻欢、阿飞、林仙儿、孙小红、龙啸云、林诗音。
- chapter: 86
  title: 外面虽下着雨，屋子里却还是很干燥，因为这么大的屋子，只有一个窗户，窗户很小，离地很高。
  summary: 第86回「错的是谁呢」。窗户永远都是关着的，阳光永远照不进来。雨也洒不进来。墙上漆着白色的漆，漆得很厚，谁也看不出这墙是土石所筑，还是铜铁所铸。但谁都能看得出这墙很厚，厚得足以隔绝一切。屋子里除了两张床和一张很大的桌子外，就再也没有别的——没有椅，没有凳，甚至连一。主要人物：李寻欢、阿飞、上官金虹、龙啸云、林诗音。
- chapter: 87
  title: 这是座很广阔的庄院。
  summary: 第87回「血洗一身孽」。这座庄院看来和别的豪富人家的庄院也并没有什么两样。但你只要走得近些，一走上大门前的石阶，你就会立刻觉得有种阴森森的杀气，令人不寒而栗。院子里静悄悄的，仿佛连一个人都没有，但他一踏上石阶，忽然间就有十几个人幽灵般出现了。主要人物：李寻欢、阿飞、上官金虹、孙小红、龙啸云。
- chapter: 88
  title: 阿飞沉默了半晌，缓缓道：“无论用什么样的剑也不能对付上官金虹。”
  summary: 第88回「重生」。孙小红想了想，道：“那么……要用什么才能对付他？”他知道要用什么去对付上官金虹，可是他说不出。世上本就有很多事是说不出的。主要人物：李寻欢、阿飞、上官金虹、孙小红。
- chapter: 89
  title: 阿飞的腿弯下，整个人都似在抽搐，他又有了那种“无可奈何”的感觉，这种感觉每次都要令他发疯。
  summary: 第89回「胜败」。李寻欢就在这扇门里，慢慢地受着死的折磨。他们却只能在外面等着。等什么呢，等上官金虹自己开门走出来？。主要人物：李寻欢、阿飞、上官金虹、孙小红、荆无命。
- chapter: 90
  title: 李寻欢沉默了很久，才叹了口气，缓缓道：“一个人胜利之后，总会觉得很疲倦、很寂寞的。”
  summary: 第90回「蛇足」。孙小红道：“为什么？”李寻欢道：“因为他已经完全胜利，完全成功了，已没有什么事好再让他去奋斗的，一个失败了的人精神反而会振作些。”孙小红咬着嘴唇，悠悠道：“这么样说来，成功的滋味岂非也不好受？”。主要人物：李寻欢、阿飞、上官金虹、孙小红、龙啸云、林诗音。
