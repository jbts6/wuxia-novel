chapter_summary:
  title: "第十七回　宫九的阴谋"
  summary: "陆小凤回到岛上，发现沙曼等人神色凝重。原来在他出海期间，失窃珍宝的保镖陈平、李大中、孙五通等人被人发现临死前都指证陆小凤是窃贼，太平王世子已派特遣高手缉拿他。陆小凤认为这是宫九的阴谋，决定去找花满楼商量。花满楼建议他去找叶星士验证崔诚等人的死因。陆小凤夜访叶星士宅邸，发现叶星士已被葛通伪装，真正的叶星士用银针杀死葛通后，将陆小凤引至破庙。在庙中，陆小凤遭遇宫九和牛肉汤。宫九宣布要跟踪陆小凤，等他找到沙曼等人后将四人一网打尽，以此折磨陆小凤。陆小凤喝完牛肉汤后离去，开始了与宫九的猫鼠游戏。"
  source_refs:
    - chapter: 17
      text: "因为从现在起，我就开始跟着你，除非你不和他们见面，不然，我也会见到他们。"
