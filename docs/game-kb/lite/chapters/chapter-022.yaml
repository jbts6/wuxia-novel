chapter_summary:
  title: "第二十二回　隐形的人"
  summary: "老实和尚带陆小凤进入一座院落，三间房中分别住着沙曼、宫九和花满楼。陆小凤进入中央房间与花满楼重逢，得知太平王世子推荐他做御前侍卫的消息。宫九现身揭露阴谋：太平王世子（即宫九本人）计划刺杀皇帝篡位，小老头设计让陆小凤做'隐形人'执行刺杀。陆小凤拒绝合作，宫九以百名大汉围困。决斗中沙曼脱衣色诱宫九暴露其受虐癖弱点，陆小凤趁机以灌注内力的长鞭刺入宫九心脏。事后陆小凤与沙曼隐居江湖，做一对'隐形于江湖的仙侣'。"
  source_refs:
    - chapter: 22
      text: "宫九道："因为我就是太平王世子。""
    - chapter: 22
      text: "陆小凤就用这样的硬鞭，一鞭刺入宫九的心脏中。"
    - chapter: 22
      text: "我要是不趁着这个机会和你隐居，做一对隐形于江湖的仙侣，我还是人吗？"
