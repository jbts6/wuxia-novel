chapter_summary:
  title: "第二十一回　寻寻觅觅"
  summary: "陆小凤离开西门吹雪家去寻找被劫持的沙曼，在木桌上发现老实和尚留下的'宫九'二字。他前往长安找到鹰眼老七，却被暗器袭击，鹰眼老七中毒身亡，临死前只说出'宫九太……'三字便断气。陆小凤在长安闹市故意暴露行踪引宫九现身，后被老实和尚接到一处宅邸。陆小凤深夜寻找沙曼住处却扑空，与老实和尚辩论人生道义，得知小老头想招揽他做隐形人执行秘密任务，陆小凤坚决拒绝。"
  source_refs:
    - chapter: 21
      text: "陆小凤决定放弃思考了。"
    - chapter: 21
      text: "鹰眼老七一生中最后的三个字："宫九太……""
    - chapter: 21
      text: "我就偏偏要活给你看。"
