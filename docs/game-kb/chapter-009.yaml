chapter_summary:
  title: "第九回　惨遭暗算"
  summary: "陆小凤与沙曼重逢，得知九少爷是牛肉汤的哥哥且武功极高。沙曼即将与九少爷成亲，陆小凤痛苦万分。牛肉汤帮助陆小凤离开岛屿，但暗中炸毁船只企图杀害他。陆小凤跳海逃生，被小玉的救生艇救起，发现小厮竟是女扮男装的小玉。"
  source_refs:
    - chapter: 9
      text: "陆小凤忽然冲过去，拉住沙曼的手，大声道：'走，我带你一起走！'"
    - chapter: 9
      text: "沙曼背对着他，没有回头，他却已能感觉到她的身子又在颤抖，忽然冷冷道：'你走吧，快走，我……我明天就要成亲了，本就不能再见你'"
    - chapter: 9
      text: "突听'轰'的一声响，他回头的时候，一股青蓝色的火苗正从那条船上冒起来，忽然间就变成漫天火焰"
    - chapter: 9
      text: "这孩子竟是昨天晚上替九少爷去找过沙曼的小玉"
