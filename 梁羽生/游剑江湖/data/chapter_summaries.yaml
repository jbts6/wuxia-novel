- chapter: 1
  title: 第一回 名武师之死
  summary: 蓟州名武师杨牧英年暴毙。娇妻云紫萝与幼子杨华守灵，大弟子闵成龙自震远镖局赶回，与二弟子岳豪索取拳经剑谱未果后匆匆出殡。岳豪怀疑师娘，藉丫头翠花与黄龙帮丁舵主追查，擒获死夜潜入的小偷。盘问间杨大姑（辣手观音）与齐世杰赶到，认出小偷为妙手神偷快活张张逍遥；张称当晚为云紫萝银簪打中环跳穴所伤，众人惊骇其会武，张并称杨牧未必为云紫萝所害。
- chapter: 2
  title: 第二回 空棺疑案
  summary: 快活张向杨大姑等讲述：受高人所托送信至杨牧家，窥见云紫萝展旧情人画图，又见杨牧半真半假投环被云紫萝救下，自己以铜钱裹信投窗却被云紫萝银簪点伤环跳穴。众人认定云紫萝可疑，杨大姑下令开棺验尸，棺中仅有砖头、尸骨无存。云紫萝携子杨华现身，与杨门六弟子恶斗，以素绫为兵破六阳阵，撕下闵成龙半耳并折岳豪长剑；又与杨大姑以金刚六阳手、落英掌法交手，最终被迫留下杨华后飞逃。
- chapter: 3
  title: 第三回 蒙面怪客
  summary: 杨大姑击退云紫萝后率众搜杨牧家，未获拳经剑谱，却得杨牧遗书，暗示死因另有隐情、或为假死，并嘱勿难为云紫萝；杨大姑为守密仍对外指云紫萝杀夫。蒙面人宋腾霄突至灵堂，追问杨牧真假死与云紫萝下落，以混元一气功、五行八卦步法等击败辣手观音，收尽梅花针并反弹，带走杨华。宋腾霄携杨华至后山空坟，遇神偷快活张，受托代携云紫萝所绘孟元超肖像信物回苏州，由此悟云紫萝所爱为孟元超，并疑杨华酷似孟元超，疑问重重；杨大姑则拟回家请四海神龙齐建业打听蒙面人来历。
- chapter: 4
  title: 第四回 人面桃花
  summary: 宋腾霄一面带着杨华，一面苦思云紫萝为何嫁给杨牧，往事层层浮现：昔年风雨夜，孟元超道出师承金刀吕寿昆、其父刺和坤牺牲、自己奉师命投靠云宋两家的身世；随即师娘急召，二人欲往祁连山，云紫萝却拒同行。他们赶上与吕寿昆诀别，又在守丧期间与五名大内高手恶战，险死还生，得丐帮元一冲与吕思美救护。其后护送吕家人至小金川助义军，数年后方回苏州，方知云家母女早迁、云紫萝已嫁杨牧。本章末云紫萝黑衣重返儿时山村，而宋腾霄则决意带杨华去苏州寻她。
- chapter: 5
  title: 第五回 白衣少女
  summary: 云紫萝八年前与孟元超私情有孕后，误信元一冲所传孟元超凶多吉少，在母亲安排下与蓟州名武师杨牧先做挂名夫妻、三年后成婚，并生下杨华。如今她怀着杨牧的孩子重返故居，却见白衣少女吕思美飞入园中。吕思美奉师娘之命找师兄孟元超，告知云紫萝已嫁杨牧生子，并转达冷铁樵要孟元超联络各方豪杰、顺道护送她回三河探亲的差事。窗下偷听的云紫萝心酸不忍相见，决定暂不露面；孟元超则因挂念紫萝母子消息与快活张回音，想在此多住几天。
- chapter: 6
  title: 第六回 废园蝶血
  summary: 废园之中，云紫萝偷听之际，滇南四虎现身欲押孟元超、宋腾霄进京归顺萨福鼎。孟元超让吕思美独斗，小师妹以穿花绕树身法与八卦刀法重创四虎。点苍双煞卜天雕、段仇世随即现身夹攻，孟元超金刀绵掌苦战毒掌，吕思美冒险助战却中红砂掌内伤。段仇世提出以三记响头代师还债罢战，孟元超宁死不辱师，拒和决战。
- chapter: 7
  title: 第七回 情海波澜
  summary: 孟元超拒为师父向点苍双煞磕头，与段仇世、卜天雕恶战，师妹吕思美亦陷危境。云紫萝污泥蒙面，以白虹贯日、玄鸟铲砂、玉女投梭三招刺废卜天雕黑砂掌并逼退段仇世，随即避开与孟元超相见。孟元超以小还丹与推血过宫照料吕思美，吹萧忆往；云紫萝闻声一步一回头却因顾念华儿与师兄妹姻缘强行离去。跟踪而来的杨牧妒火中烧，戴人皮面具联络点苍双煞，献计劫持宋腾霄护送的孟元超之子并以汉玉为凭逼磕头、己则暗器取命；段仇世却在成交之际突袭杨牧，双方交上金刚六阳掌与巨灵之掌。
- chapter: 8
  title: 第八回 一念之差
  summary: 杨牧以汉玉求点苍双煞绑子报仇，被段仇世斥为无耻而灰溜溜走。段、卜改计自截宋腾霄所携孟元超幼子。杨牧途中遇黑衣人石朝玑，交手不敌；石朝玑揭穿其秘密，以功名富贵与揭隐私双管齐下，逼杨牧挂名大内侍卫、充当朝廷耳目。杨牧一念之差屈服。石朝玑授其回乡苦肉计：以雷神指伤其胸口，假称钦犯诈死，联络闵成龙、岳豪与四海神龙齐建业，潜入侠义道为朝廷作眼线。
- chapter: 9
  title: 第九回 天若有情
  summary: 杨牧与石朝玑交易后担忧身份败露于云紫萝。宋腾霄携杨华赴苏州，途中段仇世诈称受孟元超之托夺子，行骗不成则与卜天雕联手劫走杨华，并议回点苍山收徒以奇法报仇。宋腾霄失子后雨夜入云家废园，遇林无双代金逐流、史红英报清廷两批高手之危。宗神龙寻孟元超比剑，宋腾霄挺身相迎，先接空手三招再斗扶桑剑法，三十招后渐落下风并疑肩伤。
- chapter: 10
  title: 第十回 侠骨柔肠
  summary: 云家废园中，宗神龙以扶桑派剑招追击宋腾霄，林无双插入相救，双方硬接龙门三叠浪后暂分高下。林无双亮出飞鱼标记，自承为飞鱼岛主之女，并当众指明宗神龙因投效清廷已被掌门牟宗涛逐出门墙；宗神龙反以牟宗涛另娶练彩虹刺伤其心，诱其合作未成，遭林、宋联手逼退。林无双嘱宋代传金逐流对孟元超之意后离去。宋腾霄归家，见母亲与中了段仇世毒掌、由孟元超送来养伤的小师妹吕思美；双方互告云家遭遇与林无双报讯之事。林无双归途中回味史红英关于爱情与回忆的开导，承认对宋腾霄有好感，并决意赴泰山参加牟宗涛重九开宗立派盛会，以防宗神龙公报私仇。
- chapter: 11
  title: 第十一回 风尘结客
  summary: 孟元超离苏第四日行至淮北红草原，遇髯须骑客尉迟炯盘问寻人后各自离开。黄昏投宿界首，见黑衣人石朝玑藏匿黄骠马并嘱店主隐瞒；夜半石朝玑跪求孟元超庇护，诡称遭川北教头陷害。尉迟炯破门，石朝玑飞镖被弹指神通打回后金鲤穿波逃窗；孟元超持游身八卦刀与其快刀恶斗，虽技逊仍为护诺出街联手，石朝玑中途抛下孟元超逃跑。林无双闻声助尉迟炯追孟，扶桑派剑法与八步赶蝉轻功交锋互留余地，后互报姓名始知误会——林无双实奉金逐流夫妇报信并曾遇宋腾霄。三人相认，尉迟炯道破石朝玑乃御林军副统领、独脚大盗出身，用了借刀杀人；孟元超说明奉冷铁樵、萧志远之命联络关东及金逐流、江大侠、林道轩、厉南星等人，尉迟炯称其不必再专程往金府。
- chapter: 12
  title: 第十二回 惺惺相惜
  summary: 尉迟炯向孟元超说明扶桑派牟宗涛将于重九在泰山开宗立派，金逐流等人皆将观礼，并揭示林无双为本派门人、牟宗涛表妹，欲撮合二人同行。孟元超因避嫌坚持先访金逐流，尉迟炯怒赠其红鬃马。二人分手后，尉迟炯向林无双吐露：曾与快活张盗御林军统领北宫望坐骑与玉狮子，见使扶桑派剑法者护院，又闻北宫望赞牟宗涛开宗，故疑牟宗涛勾结清廷；林无双以宗神龙投顺朝廷、与牟宗涛有仇为反证，仍答应赴泰山代探。旁叙石朝玑实为萨福鼎安插棋子，尉迟炯对其判断有误。孟元超骑红鬃马三日至东平金家庄，金逐流已出门，副帮主李敦、秦冲接待；家中有不愿与钦犯碰面的远客，秦冲告知蓟州武师杨牧实系假死复生，并牵涉其妻传闻，令孟元超震惊。
- chapter: 13
  title: 第十三回 难言之隐
  summary: 孟元超在金家与秦冲谈话时，杨牧来访后离去；史红英单独接见孟元超，告知杨牧指控其拐带云紫萝，并透露有人在太湖西洞庭山见黑衣女子使蹑云剑法，断为云紫萝。史红英希望他先赴泰山联络义军，孟元超则在泰山与太湖之间意乱情迷。另线写云紫萝避见孟元超后遇邻家小牛儿，得知姓萧表妹在西洞庭山，遂雇舟入太湖投亲，途中闻扁舟琴歌声。
- chapter: 14
  title: 第十四回 太湖烟水
  summary: 云紫萝泛舟太湖，窃听黄衫客缪长风与白衣少年陈光世谈萧、邵二家女儿及龙吟功啸吟。登西洞庭山后，见表妹萧月仙与邵紫薇以凉州词剑招对练并因陈光世口角；连家白眉连甘沛持判官笔逼问缪长风行踪，重创对敌的二女与赶来的邵鹤年。云紫萝以钱镖与蹑云剑法出手，邵叔度、魏帼英先后以传音入密与高强内功击退连甘沛。萧魏母女与云紫萝姨甥相认；众人推断连甘沛寻仇，邵叔度拟访陈天宇打探消息，萧邵少年感情则横生波折。
- chapter: 15
  title: 第十五回 虔凉身世
  summary: 云紫萝向姨妈萧夫人隐瞒杨牧诈死与孟元超隐情，谎称丧夫并述杨大姑夺子、自己怀有身孕；萧夫人追述十八年前姨父助孟千山对抗震远镖局韩巨源、遭四海神龙齐建业绵掌重创以致病死，决意为夫报仇并因齐建业恰为杨大姑夫叔而欲并案算账，后因云紫萝有孕暂缓。邵鹤年伤愈留书出走访师，邵叔度拟往陈家打听；萧夫人并忧萧月仙因陈光世而冷淡邵鹤年，又盛赞缪长风劝云紫萝改嫁。
- chapter: 16
  title: 第十六回 心事迷茫
  summary: 萧夫人为云紫萝撮合缪长风，紫萝以心如止水婉拒。七日后紫萝梅林练蹑云剑法吟陆游咏梅词，巧遇缪长风，二人言语投机并回家。缪长风告知连甘沛已投北宫望、自己因天地会一役成钦犯，并赠人皮面具防身；次日与紫萝梅林切磋剑术，尽显博学。午夜西门的与火龙功和尚夜袭，紫萝偷袭沾上玄阴掌寒毒，缪长风引敌离开。萧夫人决定撤离，紫萝自愿戴面具赴泰山寻邵叔度父子，约在三河县云家老屋会合。
- chapter: 17
  title: 第十七回 道上相逢
  summary: 云紫萝横渡太湖赴泰山,心念孟元超、缪长风与宋腾霄。孟元超独骑红鬃马赶会,途中与练彩虹、石卫、桑青因坐骑来历冲突并交手,林无双赶到化解误会,转达其父与尉迟炯和解之意;众人遂同赴泰山脚下。
- chapter: 18
  title: 第十八回 泰山之会
  summary: 牟宗涛筹备泰山开宗大典。练彩虹等留在山脚客栈，林无双陪孟元超登山。途中林无双讲述扶桑派三支由来、扶桑七子依附清廷与尉迟炯结怨。二人在对松山见金逐流与牟宗涛以树枝隔峰比试扶桑派剑法，神秘高手赞好后消失；牟宗涛误以树箭袭孟元超，为金逐流所救，表兄妹重逢却令林无双幻灭。夜中林无双见表哥密送黑衣人，疑为清廷密使；孟元超追踪夜行人，偷听石朝玑等密议牟宗涛与四海神龙，并与杨牧交手。林无双在林中再遇面色铁青的表哥。
- chapter: 19
  title: 第十九回 石窟寄遇
  summary: 牟宗涛夜会林无双，索其代父拥戴己为扶桑派掌门，并劝她疏远尉迟炯与孟元超以免朝廷之忌。山坳中孟元超与杨牧交手，疑杨牧同伴为独脚大盗石朝玑；牟、杨串通以叶香主巡逻圆谎。林无双证实表哥曾送黑衣人下山，孟元超点明石朝玑乃清廷御林军副统领。林无双夜追翠鸟入水帘石窟被困，得夜明珠照见祖师虬髯客与女剑客十三幅连环剑图，领悟步法方位后牢记于心；洞开时异人嘱勿告表哥，壁图旋被铲去。练彩虹寻获无双，牟宗涛急探洞一无所获。齐建业与陈天宇父子等贵客到山，齐对孟元超有敌意；林无双约孟元超翌日梅林相见。
- chapter: 20
  title: 第二十回 干崖秋色
  summary: 云紫萝自太湖赴泰山，途中被误认为千手观音而遭宗神龙党羽暗器伏击，幸得真千手观音祈圣因解救，化名孟华娘结伴上山。扶桑派于玉皇顶日出时分举行开宗大典，孟元超劝林无双争掌门以防牟宗涛不轨；祈圣因向林无双密语，戴面具的云紫萝遥见孟元超与丈夫杨牧。宗神龙率众闯入，以辈分与胜者为雄挑战掌门，林无双挺身要求先战宗神龙。
- chapter: 21
  title: 第二十一回 争夺掌门
  summary: 扶桑派争夺掌门：林无双先以剑法破宗神龙十八盘连环剑，再以扇剑之争击败原掌门牟宗涛，被宣布为掌门；她设石卫为副掌门、牟宗涛为虬髯堂主。大典将毕，齐建业携诈死复出的杨牧出场，称其避清廷与石朝玑笼络；尉迟炯当场质疑，试杨牧功力并拖出佩朱雀金牌的大内侍卫为证。
- chapter: 22
  title: 第二十二回 "家丑"外扬
  summary: 泰山扶桑派大典上，尉迟炯带大内侍卫活口质问杨牧与石朝玑关系，活口被梅花毒针灭口。杨牧反诬孟元超勾引其妻云紫萝并抢其子；邵叔度、陈天宇证云紫萝在西洞庭山，段仇世指证蒙面抢孩者为宋腾霄、出示白玉佩并称杨华已为其弟子。牟宗涛与杨牧联手袭击段仇世，尉迟炯拦下牟宗涛；段仇世指认发针者为唐天纵，唐家三老之一唐天纵以暗器突围，与祈圣因比暗器后逃走。杨牧告罪下山，齐建业同行；云紫萝以假名孟华娘托信邵叔度后悄然离去，孟元超追往三河，林无双以「只向前看」开解。
- chapter: 23
  title: 第二十三回 落拓江湖
  summary: 缪长风摆脱西门与胖和尚后赴泰山，途中酒馆饮酒时巧遇宋腾霄、吕思美谈论云紫萝与孟元超。段仇世入店，宋腾霄与之冲突；齐建业、杨牧追来问罪，段仇世趁乱逃遁。齐建业为杨大姑出头，以肉掌对宋腾霄宝剑，宋腾霄穿花绕树勉力支撑却落下风，宁折不弯拒不认输。
- chapter: 24
  title: 第二十四回 陌路相逢
  summary: 吕思美以穿花绕树身法缠斗杨牧,联手宋腾霄对抗四海神龙齐建业;酒店主人陈德泰出手化解危局,缪长风抹平石上裂痕显露内力,齐建业暂且罢手。众人得知云紫萝在西洞庭山萧夫人处,并听闻泰山之会上杨牧曾诬指孟元超。
- chapter: 25
  title: 第二十五回 破镜难圆
  summary: 酒宴上缪长风因思云紫萝而心不在焉；戴人皮面具的云紫萝进店见宋腾霄等人后旋即离去，缪长风追出相认。云紫萝倾诉与杨牧决裂并怀有身孕，二人撮土结为异姓兄妹，决意同赴三河寻姨妈。途中躲过齐建业、杨牧搜捕，又因陈天宇邀客使杨牧一行折返。行至蓟州北芒山，震远镖局韩威武、杨牧与闵成龙设伏；闵成龙逼破面具，杨牧诬奸动武。缪长风护云紫萝与韩威武、镖师恶战，云紫萝险被杨牧击中。
- chapter: 26
  title: 第二十六回 一纸休书
  summary: 缪长风以狮子吼功与护体神功力敌韩威武及震远镖局众镖师,救出遭杨牧、闵成龙围攻且身怀有孕的云紫萝,背其逃上北芒山,并以小还丹安胎。二人赶至三河县萧夫人家,得知表妹萧月仙、邵紫薇中途私去泰山。当夜齐建业、韩威武、白武子与副总镖头欧阳坚上门:齐建业代杨牧递交休书,云紫萝怒撕休书与杨家决裂;震远镖局逼缪长风磕头赔罪遭拒,萧夫人点住云紫萝麻穴以免她插手,欧阳坚率先出手。
- chapter: 27
  title: 第二十七回 旧友重逢
  summary: 萧夫人以白绸青剑大战齐建业,齐建业隔物传功后佯败留情;缪长风功力未复,遭欧阳坚雷神掌与韩威武、白武子三人对敌,以太清气功等勉强支撑。宋腾霄、吕思美赶到,吕思美折断白武子关节,宋腾霄刺伤欧阳坚掌心,震远镖局败退。旧友重逢后,宋腾霄劝云紫萝顾念孟元超与林无双,云紫萝表明今生不嫁;萧夫人亦劝缪长风避嫌,缪长风决意离去以免连累紫萝,云紫萝暂随姨妈投月仙奶妈处待产。
- chapter: 28
  title: 第二十八回 神偷窥秘
  summary: 宋腾霄与吕思美北上京师，途中谈及云紫萝、孟元超各自另有意中人，拟投戴谟家暂居。入京后在天安门前被炭夫模样的神偷张逍遥（快活张）戏取佩剑与玉簪，随即归还并指点奶子胡同戴家住址。快活张实为天地会所托，以炭夫身份踩道北宫望统领府与萨福鼎外宅，图探副舵主李光夏下落；月黑之夜他潜入统领府，先以毒馒头暂避西域灵獒与西门灼玄阴掌，又借另一生人引开追兵，于厨房躲过搜查，并窃听北宫望假借石朝玑之名召见杨牧、收为双面眼线，以及韩威武将另议之事。贵客牟宗涛飞身到访，北宫望折节相迎，本章止于二人互询园中闹贼。
- chapter: 29
  title: 第二十九回 诡谋毒计
  summary: 牟宗涛赴御林军统领府与北宫望密会，途中一掌未擒神秘轻功高手反被污泥标记。北宫望以天地会副舵主李光夏为饵，诱牟与尉迟炯联手劫总管府救人，并安插人手图害孟元超，牟宗涛为夺回扶桑派掌门之利答应同谋。屋顶偷听的快活张被牟察觉合力震破屋顶后逃脱。尉迟炯在赌窟酒店等快活张时遭欧阳坚、炎炎和尚、刘兴元夫妇围攻；牟宗涛赶到假意援手，与炎炎和尚对打。
- chapter: 30
  title: 第三十回 云自遇敌
  summary: 酒店中牟宗涛与尉迟炯假戏真做，击退炎炎大师、欧阳坚与刘兴元夫妇后联袂离去。快活张见天地会煤炭行被封，与孟元超会合，得知李光夏囚于萨福鼎总管府，并商定监视总管府、将计就计揭破北宫望与牟宗涛阴谋。宋腾霄、吕思美暂离戴谟家游八达岭，遇陈光世；陈于云台偷听炎炎、葛老二、玄风密谈，获悉牟宗涛内应、萧月仙与邵紫薇被擒于三河云家老屋，以及北宫望召人进京真拼的消息。
- chapter: 31
  title: 第三十一回 旧游人杳
  summary: 陈光世在云台后偷听,见红缨会总舵主厉南星以一敌三力战玄风道人、炎炎和尚与葛老二;陈光世暗发冰魄神弹重创炎炎,二人佯装两败俱伤放走对手。厉南星与陈光世分头行事:厉入京报讯并托戴谟留意孟元超,陈赴三河救人。孟元超亦为避风头转道三河云家,发现玄风党羽占据老屋囚禁邵紫薇、萧月仙,楚天雄(通天狐)亦至。陈光世、孟元超先后交手,缪长风赶到制服廖凡、夏平,孟、陈冲入内堂,孟元超以计削断人质看守右臂。
- chapter: 32
  title: 第三十二回 蝶血京华
  summary: 孟元超救出中酥骨散的邵紫薇、萧月仙，缪长风以金蝉脱壳之招放走楚天雄；二人谈及云紫萝被杨牧休弃与结拜之情。审出口供后得知牟宗涛与北宫望合谋，众人决意进京。至戴谟家得知快活张、厉南星夜闯总管府，公差搜宅后伪快活张负伤归来，蒙面高人救出李光夏并指引投戴家。欧阳坚、西门灼、玄风道人来袭，混战中敌人召援后遁走；戴谟率众人入旧地道欲通震远镖局，途中孟元超识破假冒快活张之人。
- chapter: 33
  title: 第三十三回 假冒同行
  summary: 孟元超撕破假快活张的腊制脸皮，揭出其人是李同川（李麻子、李穿洞）。李麻子供认受北宫望差遣冒充快活张骗取信任、引西门灼等围攻，并透露快活张被囚西山、韩威武半知地道而欧阳坚实为清廷鹰爪。孟元超令李麻子假扮北宫望，与戴谟突入震远镖局密室；戴谟以虎爪擒拿手制住欧阳坚，李麻子用蒙汗药将其迷倒，再引缪长风、孟元超、李光夏与韩威武相见。
- chapter: 34
  title: 第三十四回 妙计突围
  summary: 李麻子假扮北宫望,与戴谟等人借欧阳坚作人质大摇大摆走出震远镖局,令埋伏的御林军护送出城;郊外灭口欧阳坚后赴西山樱桃沟,救出快活张。途中避开依附清廷的卧佛寺喇嘛,却遭宝相法师以西藏密宗七煞阵围困。快活张以陆地飞腾轻功、李麻子以蒙汗药先后突围,李光夏借叶幕华所授八阵图奥秘指挥破阵,众人以四方阵应敌后反败为胜,宝相法师遁逃,樱桃沟中又现四人。
- chapter: 35
  title: 第三十五回 西山恶斗
  summary: 西山樱桃沟，北宫望率西门灼、炎炎和尚、玄风道人追上孟元超一行。北宫望先以百招为限与孟元超快刀对决，使青龙宝剑与横云断峰、龙潜九渊缓守，百招打成平手；孟元超甘拜下风。北宫望再与缪长风以劈空掌对太清气功隔空较量内功。混战中玄风对孟元超、炎炎火龙功对戴谟七十二把大擒拿手、西门灼玄阴指对李光夏，北宫望一方渐占上风。卧佛寺忽报皇上驾临、萨福鼎先至，北宫望权衡与萨福鼎争宠及阴谋败露之险，放走钦犯。众人下山却在山脚撞见萨福鼎。
- chapter: 36
  title: 第三十六回 调兵遣将
  summary: 李麻子与快活张假扮萨福鼎与司礼太监，借游丐扬尘与戏服假传圣旨，戏弄北宫望等人于卧佛寺空候圣驾。众人分道：戴谟、缪长风赴扬州贺王元通寿，孟元超赶八达岭会宋腾霄、吕思美，李光夏拟经保定回大凉山，李麻子遣散游丐。北宫望经楚天雄与喇嘛指证识破冒充，又从杨牧得悉云紫萝奶妈线索，派杨牧、楚天雄连夜赴三河县智取孟元超；孟元超途中思旧，八达岭上宋、吕相聚唱曲。
- chapter: 37
  title: 第三十七回 忆敌为友
  summary: 吕思美向宋腾霄剖白对孟元超与宋腾霄不同的情谊。长城下二人见杨大姑追杀段仇世，杨大姑以金刚六阳手交锋，段仇世使出赤砂掌；宋吕先坐山观虎斗，后欲相助时杨大姑已脱身。段仇世称来寻孟元超而非寻仇，试探后主动弃用毒掌；孟元超现身，三人与段仇世恩怨相消、化敌为友。段告知杨华现为滇南双煞弟子无恙，并透露路上窃听杨牧与通天狐楚天雄密谋三河县事，警告孟元超提防小人。段仇世离去后，宋吕决意与孟元超同赴三河寻云紫萝，途中谈及缪长风与休书等事；章末转入云紫萝山居待产的寂寞心境。
- chapter: 38
  title: 第三十八回 重寻故剑
  summary: 陈光世留住萧家数日，萧夫人劝萧月仙疏远陈光世以成全邵紫薇。林中练剑时杨牧现身认亲。云紫萝拒见，杨牧与楚天雄等图捉孟元超，石朝玑率大内侍卫杀到。混战中萧夫人战楚天雄，萧月仙战庄鲲，孟元超以一敌三负伤。云紫萝梅花针伤庄鲲后阵痛将产，杨牧闯见有孕妒怒逼问。
- chapter: 39
  title: 第三十九回 匆匆来去
  summary: 云紫萝临盆产子。孟元超负伤以滚地堂刀法苦战石朝玑、于长吉，萧夫人被楚天雄缠住。宋腾霄、吕思美途遇扶桑派牟宗涛交手，得神秘高手飞叶相助逼退对方。陈光世、邵紫薇遇大内韩拓、洪大祥，宋吕驰援击退二人后赶回。吕思美救出孟元超，众人合力逼退石朝玑、于长吉与楚天雄；杨牧在产房省悟后穿窗逃走。韩威武至，报知鹰爪动向并转达小金川萧志远、冷铁樵召回口讯。
- chapter: 40
  title: 第四十回 几番离合
  summary: 韩威武传讯催孟元超等回小金川，并荐北芒山刘隐农处暂避，与萧夫人化解旧怨。云紫萝劝众人勿因私误事，孟元超决意护送其赴北芒山。屋顶白影惊动众人，吕思美追遇林无双，知其暗护孟元超且心向成全云紫萝。三日后孟元超独行北芒山，遇唐天纵暗器截杀，林无双暗以石子击退唐天纵。牟宗涛冒充暗助图骗，终图穷匕现，又被摘叶伤人、飞花击敌吓退。
- chapter: 41
  title: 第四十一回 赌酒显能
  summary: 孟元超佯伤引出林无双，两人推断暗助击退唐天纵、牟宗涛者或为泰山旧识的神秘高手；林无双欲同往小金川，并与孟元超撮土结为兄妹以避嫌，其间忆及云紫萝嘱托。冬去春来二人渡江，决定赴扬州为震远镖局总镖头王元通祝寿并通报牟宗涛叛门。同时缪长风先至扬州望江楼，结识怀故国之思的刘抗，与伍宏、魏庆赌酒，以高强内功一口气喝光酒坛取胜；后宗大哥加入试探，识出缪长风后罢手离去。
- chapter: 42
  title: 第四十二回 扬州祝寿
  summary: 刘抗强留旧交韩朋同往二十四桥，逼问其与宗神龙、姓伍一伙的关系。缪长风客店遭搜，结识来扬为王元通祝寿的辽东大侠尉迟炯，得知宗神龙已投萨福鼎。缪长风赶至二十四桥，适逢书生模样者以柳枝暗器伤韩朋并以折扇力敌刘、缪后遁去；众人断为牟宗涛。韩朋吐实：受长芦盐商岳丈牵连，被宗神龙逼作说客，欲在寿筵以私怨掩护捉拿钦犯。尉迟炯以假死丸药装死韩朋，令刘抗运棺北上以保其家小；自己与缪长风赴震远镖局祝寿。孟元超、林无双同抵扬州先谒史公祠，窃听宗神龙、牟宗涛、石朝玑、楚天雄、魏庆密会，得知双方合则两利，并风闻“正点儿”将携金逐流来扬。
- chapter: 43
  title: 第四十三回 揭破阴谋
  summary: 牟宗涛与宗神龙、石朝玑在史公祠密谋：引开金逐流以捉拿钦犯、废黜扶桑派掌门林无双并铲除异己；林无双、孟元超偷听后被魏庆察觉，林无双引走楚天雄与牟宗涛，孟元超与宗、石恶斗。牟宗涛路上遇金逐流、冷铁樵，谎指方向骗走金逐流；冷铁樵及时赶到史公祠救下孟元超，宗、石惊逃。二人互报局势：冷铁樵欲借王元通寿宴说服海砂帮主罗金鳌劫夺官粮以解小金川之围，却得知原定接头人韩朋已被牟宗涛暗箭所杀、刘抗运棺离扬并遭追杀，遂决意冒险。
- chapter: 44
  title: 第四十四回 英雄肝胆
  summary: 孟元超与冷铁樵易容后先往王家，树上留「平安」二字。林无双被楚天雄追击，陈光世以冰魄神弹相救并吓退楚天雄；宋腾霄、吕思美再联手将其须断衣烂、头破血流逼逃。众人会合后见树上留字，齐赴王元通寿宴。王家寿筵上闵成龙奉韩总镖头命，示意石朝玑、宗神龙将以拜寿为名捕飞贼；王元通左右为难。尉迟炯、缪长风密见王元通，随后改貌的冷铁樵、孟元超亦以箭为帖求见。
- chapter: 45
  title: 第四十五回 大闹寿堂
  summary: 王元通寿堂上,冷铁樵、孟元超携小金川义军令箭来访,却遇杨牧师徒试探。冷铁樵以留劲内力挫杨牧的六阳金刚手,并以隔山打牛逼开宗神龙对罗金鳌的擒拿。石朝玑、宗神龙等欲截拿钦犯;王元通以冒认乡亲掩护,杨牧当众指认孟元超。金逐流偕李麻子假扮孟元超到场搅局,约期比武化解当场冲突;齐建业随即现身,以休书断定云紫萝事与杨牧无关,并斥其结交武林败类,石朝玑一方受挫。
- chapter: 46
  title: 第四十六回 分道杨镳
  summary: 齐建业责骂杨牧并强行带走；石朝玑、宗神龙见金逐流、林无双在场亦告退。内宅中孟元超与尉迟炯、缪长风重逢，托缪长风往北芒山照料云紫萝，并相约转告王元通杨牧师徒变节。陈天宇到访，道出牟宗涛临门却因听见金逐流而遁走，并转告丐帮消息：宗神龙将于玉皇诞辰假充香客攻扶桑派。林无双遂改与石卫、桑青回山清理门户并拟请石卫继任掌门，孟元超则先回小金川。冷铁樵与罗金鳌密谈得助；众人饮酒时闵成龙溜走，孟元超揭穿其投清，王元通拟避往海砂帮，又托缪长风顺路照应运韩朋棺材北上的刘抗。
- chapter: 47
  title: 第四十七回 红颜知己
  summary: 缪长风沿高邮湖北上追刘抗运棺，途中遇武端、武庄兄妹并识破李代桃僵：棺中仅砖，韩朋已由快活张转移。相认后得知武氏为师姐赵文绮遗孤。海砂帮父子带伤报讯：石朝玑、魏庆、伍宏、西门虎夜袭，刘抗等突围。缪长风钱镖击伤西门虎；武庄与其接应，于湖畔击退石朝玑。海砂帮张源接应，众人将共劫粮船，缪长风独赴蓟州，途遇郝师兄。
- chapter: 48
  title: 第四十八回 路遇同门
  summary: 缪长风路遇师兄郝侃。郝侃称寻文绮遗孤武端武庄与刘抗，并欲结伴赴三河。途经泰安入徂徕山时，缪长风坐骑中毒，郝侃借骷髅标记与陷阱将其推落。郝侃以鹏搏九霄等技及毒针交手不敌；预约的牟宗涛与少林还俗弟子沙弥远赶到。沙弥远承认真与北宫望害师姐，以镣铁禅杖、伏魔杖法大战，终被缪长风飞瀑流泉打落兵刃认输。牟宗涛随即上前要继续讨教。
- chapter: 49
  title: 第四十九回 黑衣老者
  summary: 缪长风在祖徕山险遭牟宗涛、沙弥远等车轮战，宗神龙满面血污逃至，随即枯瘦黑衣老者以长绳夺沙弥远禅杖并纵之，牟宗涛等人溃逃。老者嘱缪转告林无双暂回泰山后离去；林无双循翠鸟而至，诉泰山十八盘遭宗神龙与邪派伏击、老者再救之事，并托缪长风转赠云紫萝老山参、转达元超挂念，且请其途经禹城查访五龙帮与邵鹤年失踪传闻。
- chapter: 50
  title: 第五十回 仪醪楼上
  summary: 缪长风受托查邵鹤年下落，至禹城仪醪楼打探，由墙掌印与酒保口述确认五龙帮张副帮主张宏达曾掳少年。尤、张联名拜帖诱缪，途中韩老四报警，缪长风点穴制住假使者。韩老四述张宏达以毒酒挟持全帮、尤大全忌惮内情，并告邵姓少年已自密室逃脱。缪长风记宝月楼地图后独自夜探五龙帮总舵。
- chapter: 51
  title: 第五十一回 扫荡妖邪
  summary: 缪长风潜入五龙帮总舵，于宝月楼窃听张宏达与宝相法师密谋：二人受北宫望指使欲拉拢海砂帮并暗算缪长风。厉南星携邵鹤年来讨化骨散解药，张宏达以帮众性命要挟；厉南星生擒张宏达，缪长风则截获宝相法师所携假药并阻其暗门逃脱。快活张携大内化骨散反制，迫张宏达交出暗藏真解药，邵鹤年与帮众获救，张宏达被废武功后放走。
- chapter: 52
  title: 第五十二回 儿女情怀
  summary: 张宏达事败后,众人揭穿快活张以假毒假解药逼出真解药的计策,原出萧月仙主意;厉南星废其武功。众人叙来历:黑衣老者曾救邵鹤年并指点投奔红缨会厉南星;萧月仙、邵紫薇受萧夫人所遣寻陈光世、探邵叔度消息,经陈光照指点至此;云紫萝产后安居北芒山刘隐农家。缪长风辞别尤大全、厉南星、快活张赴北芒山;友人谈及家室与云紫萝。云紫萝梅林练蹑云剑法,遇点苍双煞段仇世,对方称与孟元超已化敌为友,专为杨华之事而来。
- chapter: 53
  title: 第五十三回 敌人偷袭
  summary: 段仇世告知云紫萝：滇南四虎曾暗算卜师兄致其重伤，令郎现隐居大理，请她亲往接回；二人忽闻缪长风啸声与金铁交鸣。缪长风在北芒山截获唐天纵、连甘沛欲掳云紫萝与萧景熙之谋，力战连家惊神笔法与唐家暗器。同时楚天雄突袭刘家抢婴，刘隐农以棋子与劈空掌击伤通天狐。
- chapter: 54
  title: 第五十四回 宝刀未老
  summary: 云紫萝以玉女投梭刺伤楚天雄左臂，后者撞飞青钢剑后落荒而逃。缪长风山腰力敌唐天纵、连甘沛，中蝎子镖毒粉；段仇世以毒掌接蝎子镖助战，遭毒雾金针烈焰弹所伤。刘隐农磁铁棋盘收铁制暗器，又以沾衣十八跌卸玉制暗器，唐天纵与连甘沛趁雾遁走。事后众人闻邵鹤年已寻获，卜天雕遭算命危、杨华待接回滇边。翌日缪长风陪云紫萝赴滇，段仇世自寻焦家四虎报仇，刘隐农夫妇拟迁天山投唐经天。
- chapter: 55
  title: 第五十五回 倾吐衷曲
  summary: 云紫萝与缪长风谈心,由曹雪芹诗与反清大业谈及孟元超、林无双之坚韧;二人决定绕道泰山相见林无双,并探听牟宗涛、宗神龙捣乱结果,再赴点苍山寻卜天雕接回孩子。林无双在小天烛峰练本门内功剑法,以杜甫《望岳》自励,收束对孟元超、云紫萝的私情牵挂。牟宗涛妻练彩虹瞒夫来访,自承丈夫已与宗神龙同流,却难决断去留,求林无双陪同避往其父处;林无双因扶桑派掌门之责与邪派将至而拒离,仅允告地址。练彩虹握手道别时突点林无双冷渊穴,林无双因信任而中暗算。
- chapter: 56
  title: 第五十六回 糊涂受骗
  summary: 练彩虹为救林无双并减轻扶桑派内斗，将其点穴藏于小天烛峰；牟宗涛率邪派高手闯进玉皇观，借公决废林无双掌门并推自己继位，石卫、桑青等不服却遭挟制。宗神龙现身索要林无双，称奉牟宗涛之命送北宫望归案；练彩虹醒悟反目，欲解穴并拔剑护主。
- chapter: 57
  title: 第五十七回 清理门户
  summary: 小天烛峰上练彩虹为护林无双与宗神龙恶战,林无双解穴后指点剑招;力竭之际缪长风以狮子吼功助阵、云紫萝相救,宗神龙受伤遁逃。四人赶回玉皇观,林无双当众揭穿牟宗涛与宗神龙密谋并指使暗算掌门;练彩虹出面指证丈夫。牟宗涛狡辩推诿之际,白衣老者挟宗神龙闯入,周鼎、杨茂林与火云洞主突袭反被震退,门户之争白热化。
- chapter: 58
  title: 第五十八回 白衣老者
  summary: 玉皇观中，白衣老者方虚谷（东海散人）以沾衣十八跌与双指钳剑断剑力挫火云洞主等邪派，揭穿其扶桑派师叔身份；出示牟宗涛致北宫望密件为物证，牟宗涛扇骨暗器射死宗神龙灭口仍难抵赖。邪派围攻被方虚谷尽数摔出，乔海鹏伏波掌败于石卫，林无双剑下制住牟宗涛；方虚谷念在师门情分求情，将牟宗涛带回飞鱼岛严加管教。宗神龙身亡，包毅溜走被除名，林无双宣示清理门户并拟交掌门于石卫。云紫萝与林无双联床夜话，劝其赴小金川助孟元超，自己则偕缪长风赴云南大理；临别托口信与孟元超，二人途中谈纳兰金缕曲以明友情，兼程至昆明。
- chapter: 59
  title: 第五十九回 滇池风浪
  summary: 云紫萝与缪长风在昆明大观园游览滇池，见卖艺父女表演，又遇武端、武庄出手教训欺人的张副官后匆匆离去。二人转赴西山龙门，偷听到西门灼与郝侃密谈：王总兵奏折将由郝侃送京呈北宫统领，并涉及小金川用兵与武端兄妹行踪。快活张途中盗走文书，西门灼发铜钱暗器追杀；缪长风以天女散花打落暗器，旋与西门灼交手，郝侃则缠斗功力未复的云紫萝。刘抗及时赶到，以五丁开山与分筋错骨手重创西门灼，西门灼跃入滇池，不知生死。
- chapter: 60
  title: 第六十回 有情相会
  summary: 西山龙门下，武端武庄与应约而来的程新彦父女会合刘抗；西门灼被缪长风先伤后为刘抗打落滇池。郝侃非缪长风之敌，反被狮子吼与劈空掌重创滚坡，挟武端为人质时程玉珠以飞索横空咬其后颈，武端剑穿其喉报仇。刘抗详述郝侃十年前出卖武大侠夫妇及天地会证据，快活张交出黄总兵奏折请刘抗送小金川；程氏父女婉拒投奔义军离去。武端兄妹与缪长风决意同往大理寻沙弥远，本章并以快活张口吻起述程新彦因冤狱毁家逃亡的来历。
- chapter: 61
  title: 第六十一回 大理王府
  summary: 快活张讲述程新彦遭韩知府诬陷入狱、妻子被害的血海深仇后，与刘抗分赴小金川，缪长风、云紫萝、武端、武庄则赶往大理。途经红崖坡，二人公差被剪径者夺马，缪长风施救并得知西门灼未死、正差人送信给大理定边将军府韩姓将军。众人抵大理后，段仇世之侄段剑青持帖相迎，请入段府暂住；段仇世本人仅留信嘱侄尽地主之谊，并未现身。
- chapter: 62
  title: 第六十二回 苍山血战
  summary: 段剑青讲述段家与张丹枫、铁镜心及沐家渊源，以及叔父段苍平（段仇世）因学武、恋猎户女与师兄卜天雕被辱而离家的往事，并请缪长风、云紫萝劝叔回家。次日缪云上点苍山玉笔峰，遇杨大姑被滇南四虎围攻；缪长风以狮子吼功震慑四虎，杨大姑金刚六阳手重创焦雷。石屋中凌宏章已死、卜天雕濒危，卜天雕指出仇人为滇南四虎与一臭道士；凌宏章似中毒针而死，疑点未消。
- chapter: 63
  title: 第六十三回 大闹将军府
  summary: 卜天雕临终仅吐出华儿“还好”，与凌宏章合葬后缪长风、云紫萝留言段仇世并赶回王府。武端兄妹于大石庵闻沙弥远返大理，借葛进财、金光斗画将军府图夜袭；误杀其妾后与沙弥远激战，刀剑合璧仍不敌。程新彦、程玉珠火烧后堂并斩韩将军首级，烟雾掩护下武端兄妹趁机斩杀沙弥远。
- chapter: 64
  title: 第六十四回 归家歼仇
  summary: 武端兄妹与程新彦父女刺杀将军府得手后脱身；程新彦坦言冒用段仇世名义写信、途中夺公差坐骑公文，并与武家同夜分头报仇。缪长风、云紫萝暗中相助点穴沙弥远，兄妹归段府始知真相。西门灼据葛进财、金光斗线索清晨搜府，段剑青先护后拒搜；段仇世归来折臂西门灼，武端以武家拳钟鼓齐鸣击杀之，段仇世再毙卫士队长并以药粉灭尸。段仇世与缪云议师兄之死与崆峒派丹丘生；程氏父女现身并约往小金川会刘抗、快活张，武庄终身许配刘抗之事亦为段剑青所知。
- chapter: 65
  title: 第六十五回 心事迷茫
  summary: 武庄当众化解与段剑青的纠葛并默认与刘抗的关系；段剑青随段仇世暂避风头前往徂来山。武端兄妹赴小金川，缪长风与云紫萝分路。云紫萝心事纠结于孟元超与林无双，路上擒获造谣的闵成龙、岳豪，缪长风废去闵成龙武功本钱。云紫萝又点破宋鹏举、胡联奎勿入清廷陷阱。缪、云分手后，云紫萝仍为是否前往小金川见孟元超而迷茫。
- chapter: 66
  title: 第六十六回 咫尺天涯
  summary: 孟元超在小金川外围巡逻，得邓发报讯知白衣女侠救村民；入林发现是林无双遭楚天雄、石朝玑截击。二人联手：孟元超拍晕石朝玑并断其筋脉，飞刀逼得楚天雄跌崖而死。林无双转告扶桑派风波已息、方虚谷身份，以及云紫萝与缪长风赴大理、请勿挂念等语。回报冷铁樵、萧志远后，刘抗处会合程新彦父女与武端、武庄兄妹，转述大理杀韩将军、沙弥远等军情，并议两对婚事。义军据石朝玑口供定计，以李麻子冒充韩将军诱黄总兵会师。云紫萝于战起后独入小金川，在破庙偷听焦云与道士谈论华儿、段仇世及黄、韩军情。
- chapter: 67
  title: 第六十七回 疑幻疑冥
  summary: 云紫萝雨夜于破庙偷听，得知焦云与被逐出崆峒派的道士奉命联络韩将军夹攻小金川，并悉华儿已在丹丘生处。她力毙焦云、重创道士，却被假扮清军的刘抗拦住；刘抗说明李麻子冒充定边将军诱敌会师的计策，并指点她往葫芦谷寻孟元超。云紫萝在战后战场找到中箭垂危的孟元超，为他拔箭敷药、唱曲安抚。黄总兵派出的连甘沛与炎炎和尚搜至，云紫萝气力不济险遭擒；林无双及时赶到，以大须弥剑式重创二人，炎炎和尚因劳宫穴被刺毒发身亡，连甘沛被废武功。林无双转述缪长风已到小金川一带，云紫萝将孟元超托付林无双后独自离去。
- chapter: 68
  title: 第六十八回 死别生离
  summary: 云紫萝托林无双瞒着伤中的孟元超自己的去向后决意远去；林无双以老山参汤照料孟元超，并按约隐瞒云紫萝曾至。东战场义军火攻狭谷大破清兵，冷铁樵劝降，刘抗欲收服黄栋臣时遭北宫望抢人，双方激战互有死里逃生。北宫望挟黄栋臣以长绳荡越火海悬崖逃脱，武端兄妹率弓箭手追击。缪长风因故改道小金川，施展轻功登上对峰，发现对面正是黄栋臣与北宫望。
- chapter: 69
  title: 第六十九回 弹铗狂歌
  summary: 缪长风与北宫望在山头恶斗，双方两败俱伤并先后动用太清气功与天魔解体大法；唐天纵赶到以暗器重创二人，云紫萝驰援却中毒针，终由缪长风掷剑击毙唐天纵。云紫萝舍命为缪长风吮吸毒血后身亡，缪长风立誓教养其遗孤并弹铗狂歌远赴天山，全书告终。
