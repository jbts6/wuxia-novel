- chapter: 1
  title: 第一回 四海翻腾云水怒 百年淬厉电光开
  summary: 泰山顶上雷雨初霁，武当/青城弟子萧志远与少年叶凌风纵论反清志士凋零，相约东去东平杨家庄拜谒金世遗传人江海天。玉皇顶忽有约斗：李文成替天理会林清赴约，独抗清廷鹰犬黑木大师、白涛道人、剧盗彭洪与黑衣大内高手，幼子夏儿拒逃死战。萧、叶二人义助救出夏儿；李文成力杀黑木，自身重创，混战未决，叶廷宗真名亦被彭洪喝破。
- chapter: 2
  title: 第二回 为护良朋拼性命 相逢义士托遗孤
  summary: 泰山绝顶恶战：李文成杀黑木大师与彭洪、逼退白涛道人并重创黑衣武士，自身伤重不治；临终向萧志远、叶凌风托孤李光夏，交代天理教联络暗号、帮会首领与海底，并请隐瞒其代林清死战之情。萧、叶携李光夏返玉皇观，涵虚道长代为料理后事，并告知冷天禄使者与一名练七步朱砂掌的可疑来客分房等候；叶凌风单独会客时房中突发冲突，来客似遭毒手。
- chapter: 3
  title: 第三回 一语起疑诛怪客 双雄竟不敌红妆
  summary: 玉皇观中，叶凌风与怪客恶斗，涵虚以拂尘点其劳宫穴相助，叶凌风一剑刺死对方；冷铁樵指认死者为七步追魂手褚元，并述其由黑道大盗沦为朝廷鹰犬的来历，涵虚疑心稍释。冷铁樵转达叔父冷天禄邀萧志远回川起义之意，萧志远答应先送李文成遗孤李光夏至东平杨家庄江海天处。三人携李光夏下山，将近杨家庄时遭美妇人率丫鬟以响箭拦路，冷铁樵虎抓与萧志远青城剑法、天罗步法尽出，皆不敌其鞭剑，李光夏终被马鞭卷走。
- chapter: 4
  title: 第四回 玉女迎宾招责骂 少年惊艳惹相思
  summary: 冷铁樵得李光夏助解穴后，萧志远一行赶往江海天所居杨家庄报知李光夏被女贼劫走。江晓芙以游身八卦掌与劈空掌拦门试招，先后挫败叶凌风并逼退萧志远，被江海天喝止后赔罪。萧志远请江海天收李文成遗孤；江海天令江晓芙、江南分骑赤龙驹、白龙驹持帖追查女贼。叶凌风出示叶冲霄夫妇书信，与姑母谷中莲、姑父江海天相认，并拜江海天为师。
- chapter: 5
  title: 第五回 欲驻萍踪陪玉女 难明心迹觅孤儿
  summary: 谷中莲试功并考校大乘般若掌秘诀，确认叶凌风身份后收为江海天开山大弟子、掌门大弟子，宣示门规。江南归报白龙驹被女贼丫鬟骗走，江晓芙失踪；众人得知抢孩者为千手观音祈圣因。次日萧志远与冷铁樵回川，江海天夫妇携叶凌风往德州寻人；另叙李光夏自解穴道、推倒丫鬟滚落山谷，祈圣因自称表姑寻觅。
- chapter: 6
  title: 第六回 威加稚子滋疑虑 力战强豪动杀机
  summary: 祈圣因以梅花针逼迫躲藏的李光夏，鹿老大现身斥其假仁假义并自称侄叔，双方以暗器与鹿角叉、鞭剑恶斗，祈圣因右臂被叉伤，鹿老大携李光夏逃走。江晓芙循厮杀声而至，初出道即与祈圣因交手，虽一度被鞭击，终以裁云宝剑削其鞭、剃其发；祈圣因丈夫赶到，以掌力与皮带夺剑重创江晓芙。夫妻疑其为江海天女儿，暂且剑下留人。
- chapter: 7
  title: 第七回 少年侠骨来相护 幽谷情苗便暗生
  summary: 荒谷中祈圣因与丈夫尉迟炯争执是否杀害重伤的江晓芙；字文雄飞石救美并与尉迟炯恶斗，刺伤对方后双方皆重创，尉迟炯夫妇夺千里马逃走。字文雄与装死得免的江晓芙互服小还丹，在谷中清草生火求援并互诉身世仇怨与李文成托孤机密。字文雄受风寒运功不当真气走歪，江海天夫妇与叶凌风循烟火入谷，江海天以神功收束其真气并判明两人伤势，谷中莲与叶凌风开始商议如何安置这位救命恩人。
- chapter: 8
  title: 第八回 慈亲择婿心良苦 大盗登门胆意豪
  summary: 江海天救活字文雄，察其内功为云家金刚掌真传，知其为字文朗之子，收为记名弟子并拟授须弥剑式以固本疗伤；谷中莲有意亲上加亲撮合侄儿叶凌风与江晓芙，终因救命与伤势允字文雄入门。谷中莲护送江晓芙、字文雄回家，江海天携叶凌风赴德州丐帮分舵会杨必大。元一冲、甘人龙、林笙定陶追贼反遭挫败，尉迟炯夫妇骑赤龙驹、白龙驹持裁云宝剑登门以礼求见，群豪皆惊。
- chapter: 9
  title: 第九回 豪气雄风交侠士 奸谋诡计骗儿童
  summary: 尉迟炯夫妇至丐帮分舵向江海天负荆请罪、奉还裁云宝剑，密谈后知李光夏已被清廷鹰爪"祁连三兽"骗走并解往京城；江海天为免牵连朋友，独自携叶凌风赶赴北京营救。另线写鹿克犀哄骗李光夏套出林清与藏龙堡线索，会合羊吞虎、马胜龙继续欺瞒押送。
- chapter: 10
  title: 第十回 黑夜荒山来怪客 黄童白叟斗三魔
  summary: 祁连三兽羊吞虎、马胜龙、鹿克犀以叔伯名义带走李光夏；鹿克犀下山以江湖切口联系官府与卫焕一线。破庙歇宿时三人先后套问林教主下落，话术互斥。青衣汉子与女孩妞妞入庙，羊吞虎突袭交手，双方使出凤点头、朝天一住香、童了拜观音、阴阳双撞拳；马胜龙以回回刀法欲斩女孩，李光夏踢穴相救，二人走脱。三兽暂留李光夏套取秘密，李光夏伤心竟夜未成眠。
- chapter: 11
  title: 第十一回 万里双骑追恶寇 千金一诺为孤儿
  summary: 李光夏疑心祁连三兽，鹿克犀遣马胜龙报讯追杀青衣主仆。安大叔背小华下山途中再遇猛虎并喷血重伤，江海天与叶凌风赶到欲赠小还丹，因家规被拒；小华透露有名含“夏”的孩子落在坏人手中，江海天断为李光夏，却因对方规矩未能即时联手。三兽北面下山，茶亭闲话使李光夏察知武邑程百岳，遂谎称林清藏于程家以诱鹿克犀改道。
- chapter: 12
  title: 第十二回 虎猛鹿狡谋富贵 主骄奴妄气英豪
  summary: 鹿克犀利诱李光夏并挟为人质，赴西乡程家欲诱捕林清；管家冒充程百岳被击伤后真身程百岳现身交手，反被鹿克犀以李光夏要挟，只得铐身投案。马胜龙与御林军副统领贺兰明等围宅纵火押解途中，华姑娘一伙截道报恩，拗折马胜龙双臂、透骨钉杀军官，刘大叔软鞭断贺兰明鞭迫其溃逃；鹿克犀被放，程百岳镣铐被斩，李光夏穴道未解，双方为安置孩子争执。
- chapter: 13
  title: 第十三回 遍觅孤雏存友道 驱驰千里护英豪
  summary: 程百岳与安大叔、刘大叔争李光夏未果，安大叔以缅刀削断脚镣带走李光夏；程百岳归村见宅毁，途遇江海天、叶凌风，告以去向并托告知米脂藏龙堡张士龙。江海天师徒追踪入晋，蹄印消失后沿途打听无果，拟往大同请仲帮主；路上窃听大内陆兄、李兄言及独角鹿与藏龙堡之行，假意交易套出欲缉林清，点穴后改驰米脂报讯。盗马贼以梅花针刺伤白龙驹、赤龙驹，师徒减速仍赶路，叶凌风吐纳后江海天以杀手试招。
- chapter: 14
  title: 第十四回 独闯龙潭饶侠气 自投罗网中奸谋
  summary: 江海天试过叶凌风功力后独赴米脂报讯，叶凌风留在曲沃养马。江海天日夜兼程抵达藏龙堡，误信冒充张士龙的御林军副统领褚蒙，饮下鹤顶红与孔雀胆毒茶中计。褚蒙、羊吞虎、鹿克犀与大内卫士围攻，江海天虽中剧毒仍以护体神功与诸般绝技击退敌人。老仆人张伯引他寻地牢，发现林清之子林少爷被困石室与敌搏杀，江海天毒伤未愈、石门难破，救人陷入僵局。
- chapter: 15
  title: 第十五回 堪叹英雄遭劫难 何来小子慑群魔
  summary: 江海天听风辩器指点十二岁林道轩以脚镣铁链施尉迟鞭法击倒卫士，救出孩子并收为第四徒；张伯引二人避入后山水帘岩洞疗毒治伤，三日间传授小擒拿与天罗步法。第三日江海天行大周天吐纳法时，褚蒙、羊吞虎率御林军以猎犬寻至洞口；林道轩以暗器与小擒拿苦战，后被点穴。杨梵与纨姐闯入，杀伤军官并与褚、羊恶斗；江海天功成隔空点穴制羊吞虎，杨梵割其耳目，二人再废褚蒙后离去，却误以为江海天坐视不动而迁怒。
- chapter: 16
  title: 第十六回 大侠酬恩承重诺 少年负义昧良心
  summary: 江海天功行完满后向杨梵、上官纨致谢并欲传功酬恩，遭杨梵轻慢拒绝；仍以传音人密许诺日后相助一事。林道轩请上官纨转告小华（竺姓清华）与李光夏自己尚在人世，师徒遥望藏龙堡余烬后赴曲沃会叶凌风。叶凌风逾期畏惧，欲逃回师妹江晓芙处，途遇重伤的尉迟炯求助，竟拒借龙驹并落井下石推其下屋；贺兰明、鹿克犀、李大进追至，尉迟炯殿后掩护后终被擒。
- chapter: 17
  title: 第十七回 布下玉笼囚彩凤 安排香饵钩金鳌
  summary: 叶凌风抛下被擒的尉迟炯逃回客店，取白龙驹出走，途中遇怪客挡下贺兰明暗器。城外怪客亮出身份为风从龙——陕甘总督叶大人护院统领、贺兰明师兄——以掌握叶凌风卖友与家世秘密相挟，逼其在江家卧底。叶凌风先拒后服，供出李文成所托徐天德、冷天禄、张士龙、张汉潮、郭泗猢、丘玉等名，却未吐露联络暗号。风从龙约定东平镇临湖酒店与暗号「日月无光」，借走白龙驹离去；叶凌风醒悟萧志远未落网，决意赶回讨好师母先定与江晓芙的婚事自保。
- chapter: 18
  title: 第十八回 排难解纷劳大侠 寻徒觅药斗魔头
  summary: 叶凌风失约未在曲沃等候，江海天结清房钱后沿途寻访无果。吕梁山下遇丐帮帮主仲长统与大弟子元一冲：元一冲奉命上天笔峰采配制金创药的药草，遭杨梵、上官纨擒缚，上官泰勒令仲长统亲自赔罪方肯放人。江海天因曾受杨梵、上官纨之恩，愿作调人同往。上山后上官泰以佛门狮子吼功与大手印试探，江海天从容化解并促成放回丐帮弟子，惟上官泰又出示文书逼仲长统具结，冲突未完。
- chapter: 19
  title: 第十九回 把酒言欢肝胆照 连襟挑拨是非多
  summary: 上官泰以悔过文书逼迫仲长统，双方在练武场以混元一气功与大手印等绝艺生死相搏；江海天硬接双方掌力拆开死斗。跛足杨钲误以为江海天下毒手，以青竹杖试招后由上官泰澄清并相识。上官泰认输释放丐帮弟子、允诺采药并设酒赔罪。席间谈及连襟竺大哥与李光夏、六阳手等事，杨钲似有心挑拨江海天与竺较量。仲长统暗嘱江海天小心；三更江海天察觉上官泰与杨钲夜出十里外密谈。
- chapter: 20
  title: 第二十回 欲结朱陈施巧计 心怀叵侧动奸谋
  summary: 杨钲夜拉上官泰密谈，欲以儿女联姻抗竺家逼婚，并谋借江海天与毒计害李光夏以除襟兄；上官泰拒绝无耻之谋。杨钲突袭上官泰，江海天树上跃下双掌救伤攻敌，杨钲吐血遁走。江海天应允不张扬，上官泰允报竺家防李光夏；林道轩与上官纨园中相谈，纨求学克制杨梵之武功。
- chapter: 21
  title: 第二十一回 欲制玉郎求绝技 不知乳燕入谁家
  summary: 江海天应林道轩所请，传授蹑云步、天罗步与一指禅功，由林道轩秘密转授上官纨以制杨梵；采药后众人道别下山。仲长统问明杨钲被逐与朝廷勾结之事，约日后氓山再会。叶凌风受风从龙胁迫回江家卧底，返家后对字文雄心生妒忌并试力伤其未愈之手；向谷中莲谎报曲沃遇贺兰明、白龙驹被夺等事。谷中莲准其与江晓芙合练剑法，并拟清明前赴氓山，先遣江南往德州丐帮打听江海天下落。
- chapter: 22
  title: 第二十二回 万里寻夫来问讯 中霄执药动奸谋
  summary: 叶凌风因风从龙胁迫在江家卧底，闻江南谈及东平镇临湖新酒楼而心惊，彻夜难安。江南赴德州请丐帮寻江海天。入夜「千手观音」祈圣因寻夫上门，宇文雄记父仇拔剑，谷中莲以江海天已与尉迟炯夫妇和解收场并留客。祈圣因询尉迟炯下落，叶凌风隐瞒曲沃实情、复述谎言。谷中莲见其受伤开方，命叶凌风与宇文雄分头执药、借王大叔青骢马并寻梅花暗记；叶凌风本拟偷换毒药嫁祸宇文雄未成，途经风从龙所设太白楼，良心闪现后仍决定进楼勾结。
- chapter: 23
  title: 第二十三回 魔手攫人藏黑店 良驹中毒困英雌
  summary: 叶凌风夜入东平镇太白楼黑店与李大典一伙接头，回谷谎称购药探人并借夜行人事离间祈圣因与宇文雄。谷中莲为祈圣因重剂煎药，祈圣因服药后功效初显。次晨祈圣因骑宇文雄所借青骢马离谷，马中慢性毒困于山坡，遭御林军李大典、卫涣与白涛道人围攻；祈圣因鞭剑暗器齐出苦战近一时辰，伤重之际忽有石子打歪李大典刀锋。
- chapter: 24
  title: 第二十四回 挥刀救友真英杰 问罪登门枉好人
  summary: 祈圣因重伤遭李大典、卫涣、白涛道人围杀，神秘黑衣少年两次以石子与铜钱（天女散花）暗中解围后遁去。岳霆、葛三娘夫妇自东平镇驰援，岳霆刀劈卫涣，祈圣因匕首创逃的李大典肩头，白涛亦遁。祈圣因托岳霆转告江夫人：宇文雄乃勾引鹰爪孙的奸细。王老头证实宇文雄曾借青骢马，岳霆愈信其罪，夺车使葛三娘护送祈圣因，自己踢开江家大门问罪；谷中莲出面时，岳霆当众指宇文雄为清廷奸细。
- chapter: 25
  title: 第二十五回 清浊未分堪一叹 恩仇难辨又重来
  summary: 岳霆指责宇文雄串通御林军李大典谋害祈圣因；谷中莲暂废其江家记名弟子名分并逐出门外。王老头佐证山岗遇袭与青骢马中毒，叶凌风暗自庆幸黑店被焚与嫌疑落在二师弟身上。宇文雄离门后于山岗遇黑衣少年，对方疑叶凌风下毒却遭误会，劝其暂留未果。
- chapter: 26
  title: 第二十六回 蜜语甜言淆黑白 诡谋毒手害英豪
  summary: 宇文雄被逐后，叶凌风专心讨好江晓芙并练武。午夜黑衣少年（真叶凌风）夜访，揭穿假叶凌风两年前在积石山冒名顶替的往事。假叶凌风以软语开脱夜探大白楼、诬指宇文雄，获允保留身份后，趁对方离去以须弥掌力与鹤顶红孔雀胆淬毒针刺中其要害，再以追风剑法追杀至东平湖。黑衣少年施天魔解体大法仍跌湖失踪。谷中莲捡到叶凌风预埋的毒针，误认来者为大内高手。天明又有人求见，留下悬念。
- chapter: 27
  title: 第二十七回 峭壁留痕惊恶报 名山逑旧儆凶顽
  summary: 江南带回江海天新徒林道轩（天理教教主林清之子）。江海天因义父华天风召见改道华山，嘱谷中莲于氓山之会宣告叶凌风为掌门弟子。谷中莲携江晓芙、叶凌风、林道轩赴氓山，途述了因叛师被吕四娘清理门户、禅杖留痕峭壁的教训；叶凌风表面应命，暗忌林道轩并谋固掌门地位。至玄女观后叶凌风权充知客。会期前夕青城掌门辛隐农至，言及冷天禄义军受叶屠户（实为叶凌风之父）压迫，因萧志远之托请叶凌风入川相助，谷中莲代允。
- chapter: 28
  title: 第二十八回 奸徒得意英雄会 黑网伸张覆武林
  summary: 英雄会中，叶凌风因身世与入川助义军之事惶恐不安。天山派钟展夫妇携钟灵、钟秀抵达，话题暂离其父劣迹。青城派卧底蒙水平现身，与叶凌风定计：表面入川助义军，实则长线为朝廷效力，并逼问林清下落。叶凌风最终供出师弟林道轩即林清之子。钟展欣赏叶凌风资质，助其打通任督二脉并服碧灵丹。杨梵以布袋突袭掳走林道轩，点住江晓芙穴道；钟灵钟秀赶到确认奸细，黑网已向武林张开。
- chapter: 29
  title: 第二十九回 魑魅幽林施毒手 英雄大会究奸徒
  summary: 杨梵掳走林道轩，杨钲在氓山悬崖击落钟灵并重伤甘人龙后逃脱；翌日英雄大会上谷中莲宣布立叶凌风为掌门弟子并自请处分，元一冲指认杨钲父子线索，青袍怪客携杨梵现身搅局。
- chapter: 30
  title: 第三十回 青袍怪客来挑战 黄石奇招未奏功
  summary: 英雄大会上青袍怪客竺尚父到场挑战，丐帮帮主仲长统赶来指证杨钲投清并劝阻，竺尚父不信。谷中莲拒赔罪讨人，双方约以武会友。叶凌风被喝退，江晓芙与杨梵比剑，凭护体宝甲反伤对手后被点穴，算作平手。武当松石道人欲试竺尚父，对方却派管家老刘以旱烟杆应战；百招难分后松石祭出九宫八卦阵剑法，老刘仍有后着，胜负留待下回。
- chapter: 31
  title: 第三十一回 论剑喷烟施绝技 还珠留谒显神通
  summary: 氓山大会上，竺尚父管家青衣汉子以听风辨器与喷烟夺剑胜松石道人；雷震子以掌代剑使九宫八卦阵点穴逼其磕头。竺尚父继以木剑使同一剑法修补破绽击败雷震子，又与法华上人圈内比内功令其甘拜下风；大悲禅师以天女散花嵌牟尼珠成佛偈，竺尚父尽数还珠，各显神通。
- chapter: 32
  title: 第三十二回 双剑纵横生死斗 一声霹雳破疑团
  summary: 竺尚父以改推为吸的劈空掌取回三百六十颗牟尼珠，大悲禅师甘拜下风。钟展出战，以天山剑法、追风八剑与大须弥剑式交锋，双方断剑，钟展衣襟被刺认输剑法；继比天山神芒，竺尚父硬接并以碎石天女散花反胜暗器。危崖上一掌决死生之际，江海天赶回半空接下二人掌力吐血救人。随即比武石笋与玄女观炸药爆炸，江海天揭发乃杨钲一伙所为，并曾截获奸细（后被梅花针灭口）；众人惊觉内应深藏，大会中断，谷中莲改约当晚药王庙密商。
- chapter: 33
  title: 第三十三回 详查往事多疑窦 欲试奸徒辨真假
  summary: 竺尚父向江海天坦白库车王子身份与复国抗清志向，允送回李光夏、释放上官泰，并详述与唐努珠穆、叶冲霄父子西昆仑往事及曾授叶凌风小擒拿。江海天因叶凌风从未提及竺尚父、华天风临终却知叶凌风底细等疑窦，与谷中莲商定试探；谷中莲并告知宇文雄被逐、祈圣因暗算、尉迟炯下狱等家事。晚饭后江海天以小擒拿试叶凌风，对方终使出该法且称十一年前所学，与竺言相符，然旁白点明此冒牌侄儿早知试探。
- chapter: 34
  title: 第三十四回 凭籍师门担大任 预留对策嘱英雄
  summary: 蒙永平窃听江海天与竺尚父密谈后与叶凌风串通，授其两套小擒拿手法混充竺尚父所传；叶凌风以年龄、萧志远结义等说辞蒙混过关。机密会议上辛隐农等推叶凌风为入川援军首领，钟灵为副，钟秀、江晓芙亦随行。江海天仍疑叶凌风，嘱女儿转告钟灵兄妹严加留意，必要时可动武废其武功。援军出发后，江海天赴京师营救尉迟炯以查真相，谷中莲携华天风医案回娘家并拟往马萨儿国报信。
- chapter: 35
  title: 第三十五回 谎话捏来瞒侠女 灾星得脱遇师兄
  summary: 江海天与妻子山下分手后北上寻徒。林道轩被杨梵点穴装入布袋押往京师，途中茶店歇脚时遇竺清华与李光夏。杨梵谎称竺尚父与江海天比武互伤，欲骗走李光夏，布袋中林道轩呼救后爆发冲突。杨梵杀店伙，与竺李二人火并；鹿克犀来援，布袋却被途经的宇文雄以大须弥剑式夺去，乘御马疾驰。杨梵被李光夏劈伤，竺清华与李光夏联手挫败鹿克犀，暂退强敌。
- chapter: 36
  title: 第三十六回 巧言佞色施奸计 密意深情错付人
  summary: 宇文雄以马蹄伪装脱身，于林中救出林道轩并证实同门身份；师兄弟折返茶店探听李光夏消息，得知其已脱身。杨梵负伤留店，以花言巧语骗取上官纨信任，诬称竺尚父扣押上官泰、竺清华伙同李光夏伤他，煽动其擒人换父。林道轩欲揭穿却遭鹿克犀破门截杀，混战中上官纨护杨梵击退林道轩，宇文雄带林道轩轻功逃走。杨梵再激上官纨北追；竺清华与李光夏改道回氓山途中遭遇，上官纨确认父亲被扣后出手擒竺清华，李光夏以杀手刀法相抗，鹿克犀缠住竺清华，情势危急。
- chapter: 37
  title: 第三十七回 娥眉此去悲前路 小侠归来痛故园
  summary: 杨梵唆使上官纨与鹿克犀联手围攻竺清华、李光夏;老刘现身揭穿杨钲父子挑拨囚禁上官泰的阴谋,杨梵、鹿克犀逃走,上官纨痛哭追去。竺清华与李光夏决意赴京寻江大侠,途经保定潜入李家故居,意外与祈圣因重逢相认,却遭贺兰明、羊吞虎率众突袭。
- chapter: 38
  title: 第三十八回 豪杰横刀歼小丑 奸人指路捕孤儿
  summary: 保定城中，羊吞虎与贺兰明率御林军围攻祈圣因、竺清华、李光夏；林清突至连杀两名军官与羊吞虎，贺兰明负伤逃脱。四人出城后乔装混入京师，林清查知尉迟炯囚于刑部天牢并筹划大事。陶然亭上宇文雄约沙天立遭丁固设伏，李光夏与戴均出手击溃鹰爪，却见铁帽胡同被围、林道轩已上囚车。
- chapter: 39
  title: 第三十九回 教主深藏图大事 夫妻义重劫天牢
  summary: 林道轩被捕押入刑部天牢，九城将大搜，林清被迫将攻打皇宫计划提前至当晚，命崔进联络内应阎进喜、刘全，同时派戴均、李光夏、宇文雄、竺清华接应独探天牢的祈圣因。祈圣因中计遭贺兰明、李大典围攻；尉迟炯伏地听声闻妻声后挣断枷锁越狱，夫妻会合苦战。援军赶到后宇文雄以大须弥剑式救下祈圣因，戴均以百步神拳重创贺兰明，竺清华剑斩尉迟炯脚镣，尉迟炯力破三关断贺兰明一臂。杨钲出战震退众人并令杨梵劫走竺清华，上官泰父女随后杀至。
- chapter: 40
  title: 第四十回 剑影刀光寒敌胆 英风侠气闹京华
  summary: 上官泰父女入京营救林道轩，天牢混战中杨梵挟持竺清华反被制伏，表姐妹和好；西藏红教高手桑布巴看守囚牢，与上官泰恶斗，后被江海天以狮子吼功、劈空掌力击溃。江海天救出李光夏与林道轩，众人得知林清攻打皇宫，遂大开天牢、释放重犯前去接应。
- chapter: 41
  title: 第四十一回 苍茫大地谁为主 窈窕秋星或是君
  summary: 劫狱众人杀出天牢后与御林军巷战，尉迟炯滚地堂斩马、祈圣因暗器穿喉、江海天掷矛退敌。天理教因阎进喜告密、皇宫火枪队埋伏而失利，林清下令北门突围撤往黄村。途中祈圣因、尉迟炯揭穿叶凌风为奸细；江海天驰至黄村见林清枪伤垂危，密折证实叶凌风是四川总督叶屠户亲子。林清托付张士龙后含笑而逝，江海天悲愤吐血内息失调，遂立宇文雄为掌门弟子，命其携密折入川清理门户并许婚江晓芙。宇文雄辞别群雄驰往小金川，秋夜途中忽闻金铁交鸣。
- chapter: 42
  title: 第四十二回 金钗挑破当年梦 慧剑难挥往日情
  summary: 宇文雄途遇黑衣少年被少女双刀与四名狼牙棒大汉围攻，拔剑相助后认出对方正是当年劝其查明叶凌风真相之人。少女以金钗作暗器刺伤宇文雄肩头，旋即败退。黑衣少年自报姓名为叶慕华，并透露曾遭叶凌风毒针暗算几至丧命；实则叶慕华才是真叶凌风。宇文雄称师父江海天已许其重返师门，现奉命入川；叶慕华亦欲赴川，二人结伴。夜宿草地时寻回金钗，叶慕华因金钗辗转难眠，回忆六年前塔里木草原与耿总兵之女凤姑射鹰结识、三年前麦积石山遭十三名大内高手围攻及叶廷宗冒名夺信诸事，追源祸始仍疑凤姑。
- chapter: 43
  title: 第四十三回 罗网空张飞彩凤 青衫欲湿觅伊人
  summary: 叶慕华确认交手女子为伊宁总兵之女耿秀凤（凤姑），对其仇意与武功来历大惑不解；与宇文雄结伴西行入川，途中叶慕华夜盗万家庄万平野之枣红名驹。行至黑驼山见狼牙桩暗号，夜抵归德堡为少堡主归少灵识破盗马并交手胜之，堡门紧闭后二人分道，宇文雄绕道乌龙铺，叶慕华疑飞凤山女匪首即耿秀凤，易容潜入归德堡，点倒巡山堡丁，混入元宵灯会，遥见老堡主归古愚与护院秦柱尊、周鼎等布下罗网静待女匪。
- chapter: 44
  title: 第四十四回 剑影刀光寒敌胆 腥风血雨闹元宵
  summary: 元宵三更，归德堡赛会热闹非常。叶慕华混入人群，偷听得知归古愚父子欲强擒飞凤山女匪为妾；秦柱尊误抓扮女鬼的大汉出丑。耿秀凤自归家祠堂杀出，砍伤归少灵，朱家兄弟亮出佛手拐与护手钩内应起事，祠堂起火。归古愚左臂中毒匕首后自剜腐肉，与秦柱尊、周鼎等围攻耿秀凤；周鼎被挑残琵琶骨。娄人杰赶来报称飞凤山援兵已在黑风坳被围。叶慕华潜入马棚点穴放马冲阵大乱广场，战局骤变，秦柱尊欲以毒掌击杀耿秀凤，回目于此暂收。
- chapter: 45
  title: 第四十五回 打破牢笼飞彩凤 喜从王手接金钗
  summary: 叶慕华以金钗暗器与般若掌力救耿秀凤冲出归德堡，双方因麦积山约会与叶少奇奏折互生恩怨，暂以恩仇相抵分手；叶慕华赶赴乌龙铺已误约，宇文雄见风从龙骑赤龙驹追去后遭其伏击，以大须弥剑式苦战待援。
- chapter: 46
  title: 第四十六回 力擒巨恶明真相 识破奸谋谅故人
  summary: 叶慕华赶到拦下风从龙，以大乘般若掌力擒获朝廷护院；审讯逼出叶屠户父子诈败诱歼义军的密谋、叶凌风（叶廷宗）奸细身份与太白楼机关，并搜出御旨与凭照。宇文雄正欲杀俘灭口时，白发老婆婆以指环暗器解穴救走风从龙，与二人缠斗，风从龙欲夺马，回末留白。
- chapter: 47
  title: 第四十七回 尽释恩仇迎侠女 分清斜正叛师门
  summary: 终南山侧,朱家兄弟与重伤同伴自土堆杀出夹攻功力未复的风从龙;欧阳大娘以指环护他并与叶慕华、宇文雄恶斗。耿秀凤得知风从龙乃朝廷鹰爪、叶慕华实为恩人后拒奉师命,当众叛离师门,风从龙骑一丈青逃脱。欧阳大娘使出雷神掌重创叶慕华,丐帮帮主仲长统现身一掌震退她并揭开欧阳家恩怨。宇文雄骑赤龙驹追风从龙,却在险路上被杨钲飞石击伤坐骑,遭杨梵、蒙水平联手伏击,回末为人喝止。
- chapter: 48
  title: 第四十八回 情场恶浪多风险 战地腥云伏祸胎
  summary: 宇文雄被杨钲击伤昏迷，为天山派钟展、李沁梅夫妇救至云雾山。钟展认出大须弥剑式渊源，得知宇文雄携叶少奇密折要揭发叶凌风为朝廷奸细后，耗功力并赠碧灵丹为其打通三焦经脉，助他骑赤龙驹赶赴小金川。钟展夫妇由叶慕华之名推断其即真叶凌风。义军总部方面，叶凌风下令次日总攻小金川，钟秀倾慕假叶凌风而江晓芙暗中戒备，夜中江晓芙以祈圣因、尉迟炯一案蛛丝马迹劝钟秀疏远叶凌风，叶凌风恰于此时走上山坡。
- chapter: 49
  title: 第四十九回 万里飞骑传警报 中霄探帐破奸谋
  summary: 叶凌风半夜陪钟秀闲谈,捏造宇文雄私通太白楼下毒害马的奸细故事,套出江晓芙对师父入京查案与寻回宇文雄的消息。宇文雄急赴小金川哨岗求见钟灵,叶凌风先以钱镖点穴再拔剑欲杀;钟秀阻拦,江晓芙出剑断刃护人。钟灵赶到暂押宇文雄于监军帐。将近四更,江晓芙与钟秀潜探帐后,叶凌风深夜来搜并欲暗伤灭口,江晓芙以梅花针喝止。双方僵持中响箭连发报警。
- chapter: 50
  title: 第五十回 艰危未许销英气 侧调安能犯正气
  summary: 哨警中叶凌风离帐防风从龙败露，钟灵与江晓芙却自宇文雄衣中搜出叶屠户请功密折，钟秀惊晕。叶慕华蒙面闯营，抛出被擒的风从龙为证；叶凌风反咬、命秦永浩押解欲灭口，钟灵、宇文雄赶到揭穿，叶凌风袖箭杀风从龙、以玉带围腰卷甘霸突围，仗赤龙驹逃脱。军中改推叶慕华统领、宇文雄副统领、钟灵监军，废止其反攻小金川计划连夜退兵，然两支前部已中叶屠户旗号清军埋伏，伤亡殆尽，大队官军杀向营地。
- chapter: 51
  title: 第五十一回 自古忠奸难两立 终须黑白要分明
  summary: 清军强攻义军，叶慕华部署突围战；叶凌风率亲兵与杨钲父子奇袭中军。钟灵、钟秀、江晓芙与叶凌风混战，赤龙驹被叶凌风击毙，秦永浩被铁骑踏死。仲长统率丐帮弟子赶到，义军反击，叶屠户怯战溃退。战后叶慕华优待俘虏并转移山区。钟展夫妇来营；叶慕华派宇文雄、江晓芙赴小金川通报并防内奸。叶凌风单骑潜入小金川，骗取冷天禄、萧志远信任，接入蒙水平等奸细，并诬指宇文雄、叶慕华为奸细，下令格杀。
- chapter: 52
  title: 第五十二回 路转峰回逢侠女 林深路秘出奇兵
  summary: 宇文雄与江晓芙昼伏夜行偷越清军防线，至玉盘山南峰为最后一道连营结寨所阻。月下遇耿秀凤于猎户茅屋，先有飞镖与刀剑误战，后判明敌友。耿秀凤讲述华山后叛师、飞凤山大寨被毁，决心抗清并误信俘虏供词寻叶慕华至小金川；江晓芙说明叶凌风实为叶屠户之子、清军奸细。倮倮族玛花引三人从荆棘掩护的秘洞潜行，洞通小金川，拟由此出奇兵越过清军封锁。
- chapter: 53
  title: 第五十三回 误停谗言伤侠士 巧施毒计害英雄
  summary: 冷铁樵听信叶凌风谗言，前线误攻宇文雄；杨钲父子杀到，宇文雄负伤仍救冷铁樵。萧志远驰援反围清军。叶凌风趁机以毒针刺杀冷天禄并割首逃逸，萧志远穷追，废武活捉蒙永平而叶凌风遁入森林。叶凌风于破庙遇尉迟炯夫妇，危急之际杨钲父子赶到相救，祈圣因以假毒针恐吓杨梵，回末悬念。
- chapter: 54
  title: 第五十四回 陌陆相逢歼狡贼 荒林逃遁叹穷途
  summary: 杨钲情急攻祈圣因，遭尉迟炯刀伤后拖杨梵逃走；祈圣因实以碎骨冒充梅花毒针吓退杨家父子。杨钲得知叶屠户二十万大军因叶慕华等里外夹攻全军覆没，又以切磋为名逼叶凌风传江家内功心法，在林中暂避并收容旧奴鹿克犀。鹿克犀猎食遇竺清华、李光夏，暗箭失败后为李光夏斩杀；杨梵寻鹿时遭林道轩、上官纨以专破杨家杖法之剑法重创。杨钲赶到以一敌五，安平诈称竺尚父将至、叶凌风趁乱脱逃，杨钲终抱子遁入密林。
- chapter: 55
  title: 第五十五回 并骑同行情脉脉 单刀斩敌气昂昂
  summary: 杨钲父子林中遇欧阳伯和，得知归德堡失陷与归古愚进军；李光夏等五众来攻，江海天、仲长统、上官泰赶到。上官泰单挑杨钲，得其女上官纨与林道轩拆招点破杖法，杨钲重伤滚坡身亡。仲长统以混元一气功废欧阳伯和武功后，应耿秀凤之请留其一命。叶慕华与耿秀凤并骑追踪叶凌风，林中听见厮杀与笑声，分头察看。
- chapter: 56
  title: 第五十六回 心事浩茫连广宇 风雷激荡扫沉霆
  summary: 叶慕华身份揭晓为江海天真侄与援川义军统领；叶凌风与叶慕华激战，叶屠户被擒，归古愚被诛，叶凌风心脏爆裂身亡；谷中莲误会出手后得真相，叶慕华拜入江门，众人北上。
