- chapter: 1
  title: 第一回 荒山隐士迎佳客 美酒甜言惑少年
  summary: 武当派秦元浩首次出道，奉师雷震子之命携请帖赴东平江海天府贺江晓芙与宇文雄中秋之婚。途经徂徕山，窥见封妙嫦与文胜中以唐诗为名拆剑并演示梅花针、透骨钉，被迫现身比剑；秦元浩以连环夺命剑法与弹指神通占上风，文道庄弹飞双剑解围。封子超、文道庄殷勤留宿劝酒，以千日醉迷倒秦元浩，拟借其请帖趁江家嫁女之机报复两代之仇。
- chapter: 2
  title: 第二回 崎岖世路湛嗟叹 怅悯情怀可奈何
  summary: 本回补叙文廷璧叔侄与金世遗、江海天师徒的旧怨：文廷璧自创三象神功却屡挫于金世遗，沦为清廷鹰爪后于氓山被废武功；文道庄亦与江海天结仇，二十年后练成三象神功，携子文胜中重履中原，借居于八拜之交封子超的徂徕山庄。三人趁江海天女儿出阁在即，用千日醉灌醉误闯的武当派贺客秦元浩，密谋以易容丹让文胜中冒充秦元浩混入江家，劫持新人作人质向朝廷邀功。封妙嫦不知情而多有质疑，对秦元浩生出好感，并喝止文胜中废其武功。其后秦元浩神秘失踪，解药却原封未动，文、封判断有一流高手救人；仍决定按原计划赴东平县，留封妙嫦看家。章末秦元浩于林中醒来，遇一叫化子，且听下回分解。
- chapter: 3
  title: 第三回 疑梦疑真谨异丐 半忧半喜救佳人
  summary: 秦元浩从千日醉中醒来,得悉被小叫化金逐流从封家救出;金逐流以高强武功折服秦元浩后说明真相。两人偷听朱虎臣、车锐对话,得知封子超、文道庄原为大内中人,萨总管欲礼聘文道庄对付江海天。秦元浩与金逐流赶往封家,秦元浩与封妙嫦并肩抵挡朱、车二人,金逐流暗中相助,车锐被秦元浩刺死,朱虎臣带伤逃走,金逐流却已神出鬼没离去。
- chapter: 4
  title: 第四回 神功难测惊高弟 祸患潜埋闯喜筵
  summary: 秦元浩向封妙嫦问明千日醉原委，得知文道庄、文胜中借封子超之助骗他醉倒，由文胜中冒名持请柬混入江家；封妙嫦求他化名赴宴，只让封子超看见后悄然脱身。秦元浩换上文胜中衣裳赶路，与金逐流同行至江府；叶慕华以握手试探，惊觉金逐流功力深不可测。江海天因雷震子荐书与叶慕华禀报，请假秦元浩及文道庄上主家席，封子超托故缺席，祸患已潜埋喜筵之中。
- chapter: 5
  title: 第五回 重来踪迹从何觅 出处恩仇忍细论
  summary: 喜筵上仲长统以混元一气功试文道庄三象神功不分高下，封子超溜走。金逐流抢坐首席，借江海天隔物传功震退仲长统。文道庄借敬酒暗算江晓芙，为金逐流所破；两人比武，金逐流以天罗步法、大乘般若掌法、惊神指法、妙手空空与天山剑法周旋，终以金刚掌力击退文道庄。江海天点破金逐流为金世遗之子并认出文道庄，秦元浩放走假冒己身的文胜中后说明真相。
- chapter: 6
  title: 第六回 豪士惊心谈恶斗 荒山动魄遇穷儒
  summary: 江海天婚礼席间放走文道庄，金逐流携金世遗书信与白玉环见师兄，约明年元宵西山秘魔崖相会。上官泰报竺尚父遭帅孟雄暗算重伤、西星失守；金逐流以小还丹与续断膏相助。叶慕华夫妇与李光夏、林道轩随上官泰赴大凉山。金逐流与秦元浩至徂徕山封家寻封妙嫦，见丐帮竹棒示警，人去楼空。
- chapter: 7
  title: 第七回 锦帐低垂人已杳 琼浆难得客归来
  summary: 金逐流与秦元浩入封家寻封妙嫦未果，帐中遇龚平野使玄阴指与天魔解体大法后逃走；仲长统败欧阳坚雷神掌而放其生。金逐流独上徂徕山北峰天魔教旧址，遇自称偷儿的穷书生，又以护体神功、天罗步法与阴阳双撞掌戏退青衣道士与焦老三。
- chapter: 8
  title: 第八回 明珠尽散滋疑虑 红粉何尝是祸胎
  summary: 金逐流于破庙发现铜钟内刻天魔教百毒真经，拒学并目送自称李敦者将铜钟与史白邵珍珠沉潭；后赴木渎拜访陈天宇夫妇，误中冰魄神弹后以玉戒相认，得知陈光照与六合帮结仇及史白邵拟贺萨福鼎寿，约定明春北京再会，并在赴苏州途中疑见圆海与董十三娘。
- chapter: 9
  title: 第九回 谁施妙手空空技 哪识芳心惘惘情
  summary: 金逐流投宿苏州快活林，遇六合帮圆海与董十三娘借骷髅折扇强行入住。他于三更偷听二人密谈，得知红漆匣中玄铁本为帮主白邵留用、因李敦盗走珠串与百毒真经才改充萨总管寿礼，并获悉史红英与李敦的私情牵制。金逐流意图窃匣，反遭董十三娘梅花毒针突袭，又与虬龙鞭、戒刀联手激战；他以假夺命神砂脱身并施调虎离山潜入其房，却发现藏玄铁的红漆匣子已不翼而飞。
- chapter: 10
  title: 第十回 异宝轻抛真侠士 荒林谈笑救佳人
  summary: 金逐流在快活林以调虎离山与弹指碎石击退董十三娘、圆海，追上一蒙面盗走玄铁者；蒙面人实为六合帮主史白邵之妹史红英。双方比试鞭剑后史红英逃入林中，遭青龙帮高大成、白虎帮杜大业、红缨会宫秉藩与独脚大盗郑雄图围攻。金逐流以玄铁砸断狼牙棒、一指禅破铁砂掌并剑胜宫秉藩，救出史红英，自承为救过李敦的小叫化，有意归还玄铁。
- chapter: 11
  title: 第十一回 分离最是怜孤影 中伏何堪作楚囚
  summary: 史红英向金逐流说明截留玄铁与珍珠是为阻哥哥史白邵巴结萨福鼎，并将玄铁相赠后分道扬镳。金逐流北上途经采石矶渡江，遭梢公窦老大毒茶与凿船暗算，又被海沙帮大船火箭夹攻；他抛出玄铁欲夺船，却遭文道庄三象神功与盗魁夹击坠江被俘。文道庄以酥骨散废其功力，囚于石室；看守钱大道破其金世遗之子身份及六合帮寻妹之诬。金逐流依父传吐纳法恢复一二成功力，击退前来暗害的文胜中，却因过度用力真气耗尽；此时石室外有人掷物而入，伏线待续。
- chapter: 12
  title: 第十二回 诧见残脂逃黑狱 变来解药戏魔头
  summary: 金逐流在海砂帮石窟中得无名人所赠胭脂盒内的酥骨散解药,功力大体恢复后戏弄文胜中与看守,换上文胜中衣裳潜入花园。途遇厨子,点穴夺取沙千峰与文道庄的消夜叫化鸡,食后气力尽复。潜入红楼窃听,知沙千峰、文道庄欲巴结萨福鼎,并谋私分或代送玄铁,又闻史白都欲将妹史红英许配帅孟雄、并误会金逐流为其情郎。金逐流施展妙手空空夺匣,发现玄铁已被他人捷足先取;与文道庄、沙千峰激战,以空匣与招式周旋,并以文胜中中毒要挟,逼文道庄护送其出帮三十里,最后以腋下泥垢假充解药戏弄魔头。
- chapter: 13
  title: 第十三回 慨赠奇珍怀玉女 巧搓解药戏魔头
  summary: 金逐流以泥垢假作毒药与解药戏弄文道庄后离去；史红英归还玄铁与佩剑，并告以海砂帮内有李敦友人卧底相助。金逐流告知史红英其兄欲将她许配帅孟雄，二人因言语不合起争执。文道庄、沙千峰、董十三娘、圆海追至，金史联手以二敌四，金逐流以玄铁与剑法先声夺人，又以三转法轮磕回银梭使追兵中计；史红英施放无毒烟雾脱身，雾散后金逐流不见史红英踪影。
- chapter: 14
  title: 第十四回 弦索声中来恶客 大明湖畔结良朋
  summary: 金逐流寻史红英不着后渡江北上，经徐州入山东至济南，游大明湖时瞥见红缨会香主宫秉藩。历下亭上，说书父女何老大与凤丫头遭曹公子及保镳彭巨峰、连城虎强邀欺压；宫秉藩路见不平与连城虎、彭巨峰交手。金逐流以匣中玄铁破彭巨峰大力金刚掌，又以指代笔并夺判官笔使出四笔点八脉点倒连城虎，解了父女之围。
- chapter: 15
  title: 第十五回 独行长剑一杯酒 孤客高楼万里心
  summary: 金逐流在济南与宫秉藩相见并结识何建雄父女，获悉曹振镛之子强横来历及玄铁本为六合帮寿礼；何彩凤实为李敦未婚妻，金逐流误会被解开。金逐流独赴禹城仪醒楼，遇史白都与宫秉藩，与史白都赌酒并以最上乘内功化酒；史白都识破玄铁后双方于长街交手，史白都使出龙门鼓浪逼问史红英下落。
- chapter: 16
  title: 第十六回 玄铁逞威斗帮主 道旁仗义作媒人
  summary: 金逐流与六合帮主史白都街头恶斗，内功稍逊却以奇妙武功周旋；宫秉藩表面助拳、暗将玄铁匣子掷给金逐流，金逐流凭玄铁转守为攻，夺走史白都大宛名驹照夜狮子扬长而去。途中逼曾用千日醉暗算秦元浩的封子超允诺女儿婚事，强为秦元浩做媒并收其金子作谢媒。夜宿客店因坐骑被误认为六合帮要人而受厚待；董十三娘与青符道人来查，董十三娘吹毒针暗算反中尿壶，金逐流于马厩以玄铁逼退青符后脱身。路上见封妙嫦被高大成、杜大业等追击落马，金逐流以碎银点穴相救。
- chapter: 17
  title: 第十六回 倾国倾城难与遇 乐山乐水易忘归
  summary: 金逐流救下被高大成、杜大业等误捕的封妙嫦，废一汉子武功并获知绿林帖追捕劫礼女子（金疑为史红英）之事；击退六合帮香主圆海、焦磊后，告知封妙嫦已为其与秦元浩做成媒。金逐流抵京寻访戴均，戴均假死避丁彭，试探后留其居住并述旧怨。金游八达岭，于长城遇李南星抚焦尾琴，琴剑相交后结为异姓兄弟。
- chapter: 18
  title: 第十八回 异宝纷陈招巨盗 华堂喧闹现佳人
  summary: 李南星强赠古琴，金逐流许诺他日以宝剑相报。金逐流返戴家，打听铸剑名手并受托于戴均；次日以易容丹化装赴萨福鼎寿宴，途中点李壮牵风穴盗得请帖，又借宫秉藩担待闯过知客。寿堂中陈列碧玉西瓜、何首乌、通天犀角等异宝，金逐流寻史红英未果。尉迟炯与妻祈圣因率众劫宴，挟持萨福鼎扫掠贺礼；文道庄钱镖取回何首乌，并与千手观音祈圣因对拼暗器，双方互有胜负，冲突未结。
- chapter: 19
  title: 第十九回 拭目惊看龙虎斗 伤心疑是凤鸾俦
  summary: 萨福鼎寿堂中，尉迟炯夫妻劫走贺礼后挟持主人欲脱身，史白都以隔山打牛救回人质，双方与六合帮香主、文道庄等混战。史红英现身认亲并与李南星联手；金逐流先后救出祈圣因、击伤郑雄图，又与史白都比剑。尉迟炯夫妇及李、史分路突围，公孙宏暗中放走金逐流并支开追兵，终在城外与尉迟炯会合，自承掩护混入萨府，决意打明旗号反清；金逐流暂留北京，约定日后再往小金川。
- chapter: 20
  title: 第二十回 愿拼热血酬知己 误解芳心断侠肠
  summary: 金逐流夜返戴家，得见唐杰夫，戴均请其以玄铁铸剑；金逐流连日等候李南星、史红英不至。另线写李南星护史红英出城，途遇帅孟雄与史白都前后夹击；李南星以毒雾金针烈焰弹与醉八仙剑法力战，对掌暗用梅花针毒伤帅孟雄。六合帮等后至，史红英以匕首自胁咽喉换李南星上马脱身，嘱其转告金逐流，旋被史白都夺匕点穴。
- chapter: 21
  title: 第二十一回 铸成宝剑还心愿 掌击桐棺报宿仇
  summary: 李南星负伤逃遁，史白都暗器掷匕未果，史红英被押回六合帮总舵；李南星途中遇陈光照，养伤于西山卧佛寺。唐杰夫为金逐流铸成玄铁宝剑。史白都带丁彭、青符、焦磊至戴家吊丧，以隔物打力碎棺中青砖。李南星寻访金逐流闯入戴家，与史白都对峙；金逐流出面以玄铁宝剑断青符焦磊兵刃，并将宝剑赠李南星。史白都邀李南星赴六合帮商谈红英婚事，取回坐骑后离去。
- chapter: 22
  title: 第二十二回 拔剑狂歌伤往事 抚琴无语对良朋
  summary: 金逐流得知李南星倾心史红英后主动退让，拒同赴史白都会面；二人以古琴互答楚辞与诗经后，李南星拔剑狂歌离去。金逐流酒后记起元宵秘魔崖之约并暗计跟踪救援史红英。李南星回卧佛寺告知陈光照金逐流身份，陈因西山聚集黑道、帮会与大内高手暂不能离。李南星实知对头约其元宵秘魔崖相会，为免连累恩人决意赴约，以迷香瞒过陈光照。陈光照吞碧灵丹跟踪至秘魔崖，见对方称李为厉公子并逼其重振天魔教；陈以寒玉剑、冰魄神弹杀出重围后遭阳某人之徒克制，寒气反噬，双方掌力相当而战局未分。
- chapter: 23
  title: 第二十三回 秘魔崖下除妖孽 自玉环中识故人
  summary: 秘魔崖下，阳浩、龚平野以修罗阴煞功围攻李南星与陈光照；金逐流赶到并以正邪合内功抗衡阳浩，又与李南星互见寒玉戒指，识破彼此为金世遗所托之人。欧阳坚以雷神掌争玄铁宝剑，三方苦战之际，江海天现身折石挡暗器、化解雷神掌，众盗散去。事后金逐流追问厉南星与金世遗之怨，并听江海天讲述金世遗与厉胜男旧事；厉南星赶往六合帮寻史红英，金逐流暗自放弃对史红英的情思。
- chapter: 24
  title: 第二十四回 禅机妙悟游方外 旧梦难忘坠算中
  summary: 金逐流听空照大师演说止观，悟得应扫除对史红英的情障；江海天拟再赴西星助竺尚父，金逐流则与陈光照南下扬州，暗中照应赴史白都之约的厉南星。二人兼程至济南，金逐流拜托丐帮舵主王泰飞鸽知会扬州分舵，并探得曹家收敛、连城虎已离。客店早有人代订房饭，拜匣内大红帖子约酉时湖上候教。金、陈夜游大明湖，遇霞姑丫鬟接引过船，陈光照旧情复燃，旋即腹痛如绞，疑遭暗算。
- chapter: 25
  title: 第二十五回 岁月消磨嗟白发 心思多少为金钗
  summary: 贺大妈假冒霞姑约陈光照上船下毒，金逐流佯晕后逼出毒茶，以鸟爪功恶斗将其点穴搜出瓶盒；贺大妈逆行经脉解穴扫落药物跳湖，金逐流仅捞得夜明珠与史白都合婚八字。上岸遭彭巨崂、田峻、魏倚及曹家伏兵围攻，陈光照以冰魄神弹、寒光剑相助仍渐不支；王泰率丐帮反包围逼退曹家。王泰断定天魔教之毒，金逐流以碧灵丹续命并得知霞姑姓石、由贺大妈抚养及三年前拒婚经过，随即夜闯济南曹家，欲擒曹振镛之子逼取解药。
- chapter: 26
  title: 第二十六回 毒酒碎情怆往事 良宵惊梦晤佳人
  summary: 金逐流夜入曹府，先后挟制幽会小厮与三姨太，打探得贺大娘与曹通、董十三娘等在翠微轩密会。他偷听得悉贺大娘欲将石霞姑许配史白都以联六合帮、史白都妹将嫁帅孟雄及曹通怂恿除金等情，随后与董十三娘、彭巨崂等交手；石霞姑暗放暗器助其脱身。金逐流归后，石霞姑夜访陈光照并给解药，自陈曾被迫喝下吸血散毒酒、受贺大娘挟制三年。金逐流点出可请精通百毒真经的厉南星解毒，三人遂离济南赴扬州。与此同时，厉南星赴六合帮总舵，史白都佯允婚事并拟次日成婚，又怂恿其重组天魔教；史红英闻讯大惊，仍盼金逐流来救。
- chapter: 27
  title: 第二十七回 洞房一语惊迷梦 花烛今宵隐杀机
  summary: 史白都逼史红英在厉南星与帅孟雄之间择婚，意在百毒真经与更大阴谋；史红英表面应允，成亲日以丫鬟代拜堂，洞房中向厉南星揭穿骗局并约将计就计。金逐流潜赴扬州偷听后生误会，遭董十三娘与文道庄伏击；史白都趁乱擒妹夺势，厉南星凭玄铁宝剑断敌兵刃、以毒雾金针烈焰弹突围，终仍被追击。
- chapter: 28
  title: 第二十八回 暗使霉针施霉手 且看神剑显神威
  summary: 厉南星与金逐流在六合帮内院恶斗史白都、文道庄等人，玄铁宝剑连断兵器；金逐流中贺大娘淬毒梅花针后逃脱，李敦以磁石银针为他拔除五毒针。贺大娘谎称已用透骨钉、腐骨环逼死厉南星并使其携剑投河；李敦目击河边交手后判断厉南星或可凭水性逃生。丐帮李茂率众与陈光照、石霞姑攻打六合帮，史白都欲夺冰魄寒光剑反遭金蛇索药粉所制，贺大娘以七日毒发期胁迫石霞姑就范。
- chapter: 29
  title: 第二十九回 沉江幸有渔舟过 搜匣犹惊宝剑寒
  summary: 金逐流及时赶到，削断贺大娘毒爪并逼退之，继而与中了石霞姑药粉的史白都游斗交锋；双方混战后各自收兵。李敦为石霞姑解毒并授陈光照金针拔毒之法。众人因难以强攻六合帮救出史红英，决议转赴西昌联络义军以逸待劳。另一线，厉南星中毒跳江，紧握玄铁宝剑漂至下游，被渔人救起后遭封子超接走；封子超为献剑巴结史白都而杀舟子灭口，封妙嫦以金逐流之名唤醒厉南星并劝阻其父杀害，最终封氏父女驾船遇六合帮船只。
- chapter: 30
  title: 第三十回 覆雨翻云施毒手 光风霁月见仁心
  summary: 六合帮小头目王吉叛帮出逃途中偶遇封子超，谎称史白都被金逐流重创以吓退对方并掩盖己身逃帮。封妙嫦以磁石取出厉南星毒针，又以银簪按金针拔毒之法为其刺穴拔毒。封子超伪称冯姓、改道金陵，夜以鸡鸣五鼓返魂香迷香暗算厉南星，反被点穴；封妙嫦道明父女真名，厉南星看在其救命与秦元浩情分上饶封子超。三日后入内河，封子超见文胜中而再下黑手夺玄铁宝剑，文胜中接剑与功力未复的厉南星恶斗；封妙嫦借剑相助并与父决裂。危急间岸上忽来一不相称父女，正待下回分晓。
- chapter: 31
  title: 第三十一回 几番惆怅歌金缕 无限伤心付玉萧
  summary: 公孙宏父女现身观战，公孙燕以绸带击败文胜中夺下玄铁宝剑，封子超弃女而逃。公孙燕将宝剑归还厉南星，并与厉南星、封妙嫦结伴西行，公孙宏自回红缨舵。途中公孙燕告知封妙嫦：秦元浩半年前于水云庄力杀罗大魁，仍在庄中养伤。三人赶至陇县，将赴水云庄，途遇李虎儿、张鹏飞，方知云中燕次日即将出阁。
- chapter: 32
  title: 第三十二回 九州惯铸人间错 一缕难抽茧底丝
  summary: 李虎儿、张鹏飞误传水云庄新郎姓秦且曾杀罗大魁,公孙燕与封妙嫦误以为秦元浩另娶。公孙燕夜点封妙嫦昏睡穴潜入水云庄,始知新郎为秦少阳而非秦元浩。秦元浩因见封妙嫦与厉南星同行而生疑夜窥客店,反被当作采花贼;双方当场澄清,确认情意。众人贺云中燕婚后,厉南星、公孙燕、秦元浩、封妙嫦同赴大凉山投竺尚父义军,金逐流尚未抵达;公孙燕夜闻厉南星吹箫吟词,怅惘难解。
- chapter: 33
  title: 第三十三回 四野龙蛇吟寂寞 九边风雪路离迷
  summary: 公孙燕以沙子点中厉南星笑腰穴逗他破颜，两人夜谈后秦元浩召厉南星回营，得知扬州丐帮李茂等抵达而金逐流独自赶往西昌。次日石霞姑、陈光照随李茂到大凉山，石霞姑说明六合帮史白都兄妹已先入西昌、金逐流为史白都之妹只身前往，厉南星自告奋勇潜赴西昌接应。公孙燕牵挂厉南星，点昏睡穴后私自下山；途中遇彭巨嵘、连城虎盘查乐家班子，认出易容的何彩凤，以匕首伤其坐骑相救。何彩凤实为赴西昌行刺帅孟雄之内应，以易容丹助公孙燕改扮混入班子；冷铁樵率义军将与竺尚父会合攻西昌。厉南星抵西昌城外，见戒备森严，轻功亦难潜入。
- chapter: 34
  title: 第三十四回 联手双雄擒恶贼 同心意共定良谋
  summary: 西昌城外,厉南星见彭巨嵘、连城虎以击掌之计诱出李敦。李敦以毒雾金针烈焰弹脱身未果之际,厉南星持玄铁宝剑劈杀彭巨嵘,折断连城虎双笔并点穴制之。李敦认出厉南星为金逐流义兄,以毒针胁逼连城虎,又与关、刘卧底商定,改易容貌冒充相府送礼随从进城。史白都代帅孟雄迎接时起疑试探,厉南星佯作不会内功暂时过关;圆海来召,史白都回寓。史红英以婚事要挟提出开城请客、放还芍药并讨令箭、归还软鞭短剑、改由牡丹陪伴等条件,史白都勉强应允。史白都赴将军府,怀疑连城虎受人挟制,邀贺大娘依计查验,且听下回。
- chapter: 35
  title: 第三十五回 拼教玉碎歼强敌 始信金坚是旧情
  summary: 贺大娘借送茶试探连城虎并确认其中毒，史白都以大擒拿试其内力后与帅孟雄将其扣为人质。史红英索开城门与令箭放芍药出城，何彩凤、公孙燕混乐班入城；金逐流以天遁传音递毒针并截救芍药、击败董十三娘，得史红英表白诗帖。厉南星、李敦躲关大伦处，婚日扮随从入将军府，见礼堂戒备森严，花轿入府而本章止。
- chapter: 36
  title: 第三十六回 帕上脂痕刀上血 镜中俪影雾中花
  summary: 婚礼当日，史红英携牡丹入礼堂行刺帅孟雄，指环毒针先中其肩，继以藏于牡丹身上的短剑长鞭连攻；院中何彩凤、公孙燕身份暴露，厉南星以玄铁宝剑断贺大娘毒蒺藜并斩其毒爪，公孙燕剑杀郑雄图，连城虎自杀，高大成、杜大业与安俊庭苦战。金逐流自将军府匾额跃下救出牡丹，与史白都、阳浩、文道庄等交手，何彩凤射出蛇焰箭引发城中流星花炮与义军攻城信号，金逐流、史红英杀出礼堂后又遭史白都、文道庄、阳浩三高手合围。
- chapter: 37
  title: 第三十七回 妙舞清歌腾杀气 神拳宝剑拼存亡
  summary: 将军府混战中，厉南星破高大成、杜大业与棍阵，重创帅孟雄后掷玄铁宝剑与金逐流；史白都击落厉南星。金逐流持宝剑力战文道庄、史白都，并与史红英、公孙燕互救。贺大娘死讯令帅孟雄吐血溃逃，上官泰震伤之。义军破城，江海天门人弟子与秦元浩、封妙嫦等杀入府中；董十三娘毙命，文道庄抱文胜中与封妙嫦、秦元浩交手，战局骤变。
- chapter: 38
  title: 第三十八回 众叛亲离终自毙 人亡城失叹途穷
  summary: 将军府混战中,陈光照追杀六合帮香主圆海,文道庄救子不成反使文胜中死于冰魄神弹;史白都连遭江晓芙、石霞姑、陈光照、上官泰重创,六合帮众叛亲离拥立史红英,史白都自尽。史红英乘照夜狮子追入山区,与安俊庭交手后落入乔装的帅孟雄圈套,苦斗中金逐流掷玄铁宝剑撞碎大石并钉死帅孟雄,安俊庭夺马逃走。
- chapter: 39
  title: 第三十九回 幽谷落花埋侠骨 青天碧海证丹心
  summary: 金逐流斩杀帅孟雄后与史红英互明心意，义军收复西昌并庆功；叶慕华力主不宜死守，议定暂驻后回大凉山。厉南星失踪，公孙燕独追清军溃逃方向，会合宫秉藩，判明为阳浩、龚平野师徒所俘。公孙燕追至山岗，厉南星跳崖，公孙燕亦殉；宫秉藩斩龚平野，与阳浩互创后中修罗阴煞功寒毒。金逐流、史红英途中寻得宫秉藩，以千年何首乌施救，宫秉藩苏醒后欲有所求。
- chapter: 40
  title: 第四十回 岂知陌路逢强敌 却喜荒村遇故人
  summary: 宫秉藩向金逐流、史红英报知公孙燕受阳浩所逼跳崖，疑厉南星亦已先死。金逐流依老农指点独赴赭石山桃花谷，含碧灵丹下谷遍寻不见骸骨，众人多以为二人凶多吉少。金逐流护送伤愈中的宫秉藩至义军大凉山，再与史红英南归向公孙宏报信并拟往扬州。途经华阴华山，闻漱石道人新死，上山见长鲸帮孙百寿等开棺验尸，眉心黑气似天魔教毒针。孙百寿称天魔教新教主为厉南星，各帮拒观礼后帮主中毒、漱石亦遇害。金逐流深疑厉南星身份，史红英宣布废除属帮陋规、愿结兄弟盟帮，嘱由副帮主李敦解毒，并与金逐流先行探明天魔教真相。
- chapter: 41
  title: 第四十一回 豪杰胸怀遭误解 鬼魅伎俩最难防
  summary: 金逐流与史红英离开道观后，推断厉南星重掌天魔教为假，决计先往山东武邑见红缨会舵主公孙宏。二人抵达后遭庄远、秦冲率众围攻，误认史红英为仇敌；金逐流以大须弥掌与比翼双飞护住史红英，又以传音入密与玄铁宝剑震慑众人以求见。公孙宏实已中断肠散之毒：十日前被阳浩所扶假厉南星以公孙燕死讯及联手吞并六合帮之计诱入徂徕山，端茶下毒后欲困之，公孙宏以绵掌破顶脱险。金逐流转述宫秉藩所见，澄清公孙燕与厉南星实为阳浩所逼坠谷、史白都已死、史红英新任六合帮主，假教主所传乃借刀杀人之计。庄远、秦冲赔罪。金、史二人取公孙宏所绘地图，翌日赴天魔教总舵智取揭假。
- chapter: 42
  title: 第四十二回 疑雨疑云终大白 亦真亦幻说前因
  summary: 金逐流与史红英月夜潜入徂徕山，途经旧破庙后夜探重建的天魔教总舵。史红英冒充更夫接应，金逐流以黄鹊冲霄越墙潜入内香堂，竟与未死的厉南星相认。阳浩携假教主围困二人，厉南星打开床下秘道，俘获假教主并说明阳浩傀儡重组天魔教以投靠朝廷的阴谋。途中厉南星口述赭石岗跳崖后，与追随而来的公孙燕在桃花谷借桃花瘴、潭鱼以毒攻毒，治愈修罗阴煞功寒毒，并发现瀑布后另有出路。
- chapter: 43
  title: 第四十三回 幽谷落花藏侠侣 晓星残月证鸳盟
  summary: 厉南星向金逐流细述与公孙燕如何自瀑布后山洞脱困，因义军转移、公孙宏遭暗算及有人冒名重组天魔教，二人持秘密地图先来总舵。史红英堡外打更遭四名天魔教高手围攻，以斗篷与沾衣十八跌苦撑；公孙燕钱镖驰援，二人联手重创四敌后转入后山地道出口。文道庄突至，以邪练三象神功力压史、公孙，金、厉自地道冲出接战；金逐流以玄铁宝剑对文道庄淬毒软剑，苦战落下风并沾毒。阳浩破门中计寻至后山，修罗阴煞功对厉、公孙、史三人已失寒毒之效，双方渐成平手；文道庄杀意炽烈却已显走火入魔之兆。
- chapter: 44
  title: 第四十四回 走火入魔难自拔 传动运剑显神通
  summary: 文道庄走火入魔回光返照猛攻金逐流,金逐流以大须弥剑式稳住阵脚;阳浩以一敌三暂占上风。公孙宏与江海天现身,公孙宏以真力助公孙燕、厉南星恢复功力,二人联手按江海天暗示刺穿阳浩劳宫穴废其武功并刺瞎其一目。文道庄施天魔解体大法后被江海天以弹指神通夺剑、掌力相接废去三象神功并治愈走火入魔。二人被饶命后,众人押阳浩上山面对党羽。
- chapter: 45
  title: 第四十五回 中原并驾英豪在 海外连枝剑客来
  summary: 公孙宏率红缨会内外三堂香主上徂徕山找阳浩算帐，六合帮李敦夫妇与诸帮会亦至。厉南星与韩正达揭穿假教主骗局，阳浩招供后被逐，天魔教众欲拥立厉南星，其坚辞并劝众人分投红缨会与六合帮。金逐流发现封子超后山潜逃，追上后与欧阳坚斗雷神掌，又与扶桑岛传人牟先生以玄铁宝剑对折扇；仲长统以混元一气功破欧阳坚雷神掌并饶其一命，江海天化解金牟内力僵持。公孙宏追问牟先生何以与欧阳坚同行。
- chapter: 46
  title: 第四十六回 郁郁但求忘旧怨 惺惺相惜结新知
  summary: 牟宗涛自述扶桑岛牟家渊源，告知姬晓风已死、叶冲霄仍在海外研习般若掌，并解释与欧阳坚同行乃受叶冲霄夫妇之托。封子超弃暗投明，供出萨福鼎命其助欧阳坚谋害江海天家人，并透露清廷欲笼络青海盟旗对付大凉山义军；仲长统证实其言并已通知邙山派赴援。封妙嫦、秦元浩赶来与封子超父子婿相认。庆功宴上各帮会感史红英之德愿结盟，仲长统力推江海天为武林盟主，江海天谦辞尊称而应承联络抗清；席间有青袍汉子冷笑众人井底之蛙。
- chapter: 47
  title: 第四十七回 玄功绝技惊豪杰 高士神拳显异能
  summary: 席间青袍怪客以金属般怪声当众贬抑江海天、金逐流非天下第一,并要二人联手较量。江海天察觉对方以内功改音并戴人造面具,金逐流疑为扶桑岛牟宗涛;师兄弟先后以请手式、大须弥掌、天罗步法与玄铁宝剑上的大漠孤烟、追风剑式进攻,皆被对方四两拨千斤与借力打力化解;对方再以极寻常的四平拳制敌机先,逼得二人只有招架。金逐流半偷半创扶桑岛剑法仍不奏效,第十三招欺近时被弹落玄铁宝剑,随即以姬晓风所授妙手空空偷得寒玉戒指,喝出对方乃父亲金世遗。金世遗揭去人皮面具,点评海天谦虚、逐流涵养不足,并出示戒指剑痕,称昨日斗剑曾栽筋斗,暗示海外尚有更强异人。
- chapter: 48
  title: 第四十八回 诧见剑痕留碧玉 为完心愿访同门
  summary: 金世遗述及寒玉戒指留剑痕之战，众人骇然；叶冲霄到访并以大乘般若掌与江海天印证。谷之华、谷中莲、欧阳婉、甘文龙等至，方知清廷所遣扶桑七子昨夜围攻江家，邙山四大弟子中三人重伤，幸金世遗夫妇与叶冲霄夫妇及时赶到，破七星阵反败为胜。金逐流引扶桑岛后人牟宗涛来谒，金世遗听音辨其少阳经脉受震，牟宗涛详述途中遇一对高鼻夫妇，因探听扶桑七子与金世遗消息反遭比武重创，女方正欲出手。
- chapter: 49
  title: 第四十九回 海外归来求秘笈 华山巧遇试奇招
  summary: 牟宗涛与一对外来夫妇交手后败逃，金世遗判断男方或为提摩达多传人，并告知扶桑七子与萨福鼎一党，已在江家交手。金世遗约牟宗涛同往京城寻同门；金逐流、史红英订婚，谷之华以霜华剑为聘，两对小夫妻赴大凉山。华山清风观夜闻啸声，金逐流等月夜登山，石梁遇扶桑七子夫妇，以拂云手、金刚掌脱险后拔玄铁宝剑较量扶桑派剑术，回末胜负未分。
- chapter: 50
  title: 第五十回 柔枝代剑惊神技英 美目流波觅故人
  summary: 华山石梁上，金逐流以大须弥剑式与玄铁宝剑苦敌扶桑七子石卫、桑青双剑合壁，石梁对侧史红英、秦元浩、封妙嫦遭欧阳坚雷神掌突袭。林无双现身，以扶桑派剑法用树枝击败桑青，石卫夫妇忌惮其林岛主之女身份退去，欧阳坚亦遁。林无双自报姓名，述飞鱼岛被倭人侵占、举家归隐中原，并说明牟宗涛为其表兄、尉迟炯指引其来华山寻人。
- chapter: 51
  title: 第五十一回 神鞭暗器称双绝 快马挥刀会七雄
  summary: 林无双在华山向金逐流、史红英讲述：当年尉迟炯、祈圣因受萧志远之托赴保定联络天理会，途中与受萨福鼎笼络的扶桑七子遭遇。祈圣因以暗器梅花针击败桑青，尉迟炯以拼死快刀逼退宗神龙，夺其骏马而去。扶桑七子曾挑毁天理会保定总舵，总舵主张士龙牺牲，临终托寻林道轩继任；七子亦曾以七敌一败于金世遗。林无双独自来华山打探，得知表哥牟宗涛已进京。金逐流等返回大凉山，会晤尉迟炯夫妻与林道轩、李光夏；竺尚父得封子超急报，知萨福鼎欲笼络青海盟旗，遂派金逐流与尉迟炯出使伊克昭盟，祈圣因则陪两对小夫妻回保定。
- chapter: 52
  title: 第五十二回 但愿有情成眷属 却嗟无处觅萧郎
  summary: 金逐流、尉迟炯携竺尚父书信礼物至伊克昭盟游说土王。宗达完真透露清廷使者已先到，并提醒提防加害。内侍送来鹤顶红毒酒，二人服碧灵丹识破，逼内侍供出是清廷方面指使。金逐流夜探宫中，发现长须使者实为扶桑七子领袖宗神龙。牟宗涛率石卫、桑青、练彩虹前来清理门户，以扇代剑败宗神龙并夺剑谱；又出示萨福鼎免职下狱的邸抄。土王遂赶走满洲使者，答应与义军两不相助。金逐流归大凉山复命，金世遗安排其与厉南星、公孙燕同日成婚，林无双前来喝喜酒并打听表哥牟宗涛，全书完。
