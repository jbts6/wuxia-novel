- chapter: 1
  title: 第一回 远涉穷边逢侠女 横穿瀚海觅孤儿
  summary: 齐世杰为寻表弟杨炎越昆仑入藏，被假扮藏族向导的连甘沛诱至魔鬼城，中魔鬼花毒后遭连甘沛、窦健刚与密宗僧释湛围攻，危急时天山派女弟子冷冰儿出手击退三人并解毒。冷冰儿自承亦在寻杨炎，提及段剑青为派中叛徒且与杨炎五年前失踪有关，赠碧灵丹后离去。齐世杰入佛塔探「仙缘」，遭躲藏的释湛以掌心雷逼入暗门，二人坠入冰窟；冰窟老僧以冰弹制住释湛，辨善恶后斥退释湛，并以瑜伽气功托玉泉助齐世杰通脉。释湛偷袭反被老僧隔体传功弹入冰川丧命，石壁上隐现练功图形，暗示桂华生夫妇秘笈传说。
- chapter: 2
  title: 第二回 冰窟藏身求秘笈 魔城现影说前因
  summary: 齐世杰在冰窟得老僧迦象相救。迦象自述为段剑青师叔，五年前遭段与女魔头韩紫烟毒害，半身不遂蛰居魔鬼城，寻得桂华生夫妻所留冰川剑法与内功心法。齐世杰拜迦象为师，先习那烂陀寺龙象功与瑜伽气功，并学冰川剑法；迦象毒发圆寂后，齐世杰自悟桂华生心法，约一年半将两派内功合而为一。两年将满，释陀与窦健刚重返查访，言谈间道破段剑青买凶、唐经天传冰魄寒光剑予冷冰儿等事。地震摧毁魔鬼城，齐世杰重见天日，救治重伤的窦健刚，获悉段剑青或在回疆鲁特安旗，遂独自下山。
- chapter: 3
  title: 第三回 翠谷珠峰寻旧友 冰弹玉剑败魔头
  summary: 冷冰儿重返回疆瓦纳寻访杨炎与好友罗曼娜,却闻罗曼娜被妖人劫走、桑达儿中毒掌重伤。她以天山派内功与碧灵丹救醒桑达儿,推断仇敌段剑青涉案,追至雪峰石屋。杨炎现身却已沦为段剑青党羽,以假人陷阱与割藤手段谋害冷冰儿未果。冷冰儿识破调虎离山,自暗室救出罗曼娜,以冰魄寒光剑与冰魄神弹击退欧阳家传人。罗曼娜转述段剑青一党得知齐世杰途经通古斯峡,杨炎被指使前去行骗;冷冰儿在报恩救友与寻齐世杰之间心乱如麻,先护送罗曼娜下山。
- chapter: 4
  title: 第四回 幽峡迷途逢怪客 神功克敌结新交
  summary: 冷冰儿与罗曼娜在雪峰得凯石、凯莎等接应，归见罗海、桑达儿。众人得知三天前段剑青夜袭罗海时，被一空手少年击落青云钢剑并逼退，冷冰儿断定其人是齐世杰。罗海邀赴鲁特安旗，冷冰儿则急骑名驹赶往通古斯峡，意图寻杨炎。齐世杰在峡中迷路，先点退密宗喇嘛，再遇连甘沛与大吉法师：掌毙连骑、破其双笔点四脉，又以冰川剑法、龙象功与白虹贯日破紫金钵夺青竹杖。武功更高的少年唐不知劝退大吉，与齐世杰比剑后握手结交，自述身世不明，并谈及杨炎失踪及孟元超父子传闻。
- chapter: 5
  title: 第五回 离合无常欣巧遇 恩仇剖析破愚蒙
  summary: 齐世杰向自称唐不知的少年剖白杨炎身世与段剑青线索后，少年独自离去；真杨炎在通古斯峡识破冒充者欧阳承，得知冷冰儿危急。齐世杰峡谷迷路再遇大吉法师，方知唐不知即表弟杨炎。冷冰儿入峡寻人，与大吉法师激战，齐世杰赶到求情放人。二人重逢后辨认真假杨炎，并对照杨牧、孟元超旧怨，遂结伴赶赴鲁特安旗寻杨炎。
- chapter: 6
  title: 第六回 帐触梦痕愁不寐 可堪尘路复多歧
  summary: 杨炎在鲁特安旗草原中毒发作，被罗海一家救起并服下冷冰儿所赠半颗碧灵丹。夜遇欧阳继袭击，杨炎暗施天山神芒相助；神秘少女打退欧阳继并割罗曼娜青丝后离去。罗海等回首堡与冷冰儿、齐世杰会合，凭天山神芒认出路上少年即杨炎，沙辽导寻未果。杨炎险被少女试功废武后功力恢复大半，风雨中入山神庙，听见齐世杰师兄寻人的谈话。
- chapter: 7
  title: 第七回 不认亲人徒自苦 感怀身世有谁怜
  summary: 杨炎在荒庙外偷听宋鹏举、胡联奎对话，得知生母云紫萝当年被辣手观音赶出、杨牧假死及身世之隐，并闻杨牧可能尚在人间。郑雄图误认二人保镖劫镖，以铁烟杆点倒宋胡；杨炎佯装小叫化周旋。杨大姑赶到，以金刚六阳手击毙郑雄图并为侄辈疗伤。神秘少女出场嘲讽并与杨大姑缠斗近百招，杨炎以泥丸暗助双方解围，传音告知齐世杰在鲁特安旗后离去。山下少女逼杨炎比剑，双方剑法似曾相识，拆招近百。
- chapter: 8
  title: 第八回 鸳鸟亦为同命鸟 亲人怎变陌生人
  summary: 杨炎与龙灵珠比剑不分胜负后结为朋友，互述师承与身世：杨炎先后师从天山派唐经天与喜马拉雅山龙则灵，受命寻龙则灵失散之女；龙灵珠自述母系源自龙则灵之女，因父被龙则灵打断腿后遭仇家杀害、母亦病故而拒认外公。龙灵珠愤然离去。杨炎于破庙暗窥齐世杰与母亲杨大姑（辣手观音）重逢，杨大姑因冷冰儿叔父冷铁樵为钦犯而逼其断绝往来，齐世杰含恨从命，冷冰儿拂袖而去。
- chapter: 9
  title: 第九回 忘情挥泪空遗怨 铸错无心任自伤
  summary: 杨大姑以家训阻齐世杰与冷铁樵侄女儿往来，并透露其舅父杨牧仍在且为大内卫士，欲安排儿子谋清廷差事，父子冲突激化。杨炎树上偷听后被喝破，蒙面段剑青发毒钉并闯入破庙，与杨大姑、齐世杰剧斗，终露身分不敌而逃。母子互谅，齐世杰护送母亲并获准不跟舅舅做事。冷冰儿逃出后遭段剑青下药几乎失身，杨炎天山神芒救场；二人因药力与同命相怜险些铸错，又以冰魄神弹醒神。石清泉撞见辱骂，杨炎割其舌，冷冰儿仍愿以姐弟相称而杨炎已求娶。
- chapter: 10
  title: 第十回 怒气难消伤长老 清规数犯叛师门
  summary: 杨炎向冷冰儿求婚，两人击掌立誓：七年分离，并须寻得龙灵珠。冷冰儿南下柴达木；杨炎在山脚遭遇石天行、甘武维清理门户，承认割石清泉之舌，对决中重伤长老并点晕甘武维后自绝同门。丁兆鸣与孟华、邵鹤年、刘抗途遇伤者，孟华得知弟弟恶行后循血迹上山捉拿，梦醒后兄弟对峙。
- chapter: 11
  title: 第十一回 如此情怀谁可解 一般身世总堪怜
  summary: 孟华、丁兆鸣与杨炎对质，杨炎承认伤石清泉、割石清泉舌，坚称与冷冰儿光明正大。兄弟比剑，杨炎使龙形十八剑与天魔解体大法，仍不敌孟华；孟华以胡笳十八拍点其十八处穴道，却未废武功，交丁兆鸣处置。丁兆鸣将杨炎暂逐天山派、交孟元超管教，与邵鹤年押送柴达木。途中龙灵珠拦途截劫，制服二人救出杨炎；二人互陈身世、交换武功后龙灵珠索债离去。杨炎决意亲赴保定访查生父杨牧真相。
- chapter: 12
  title: 第十二回 当世几人堪白眼 快刀一战获青睐
  summary: 齐世杰归家月余仍为冷冰儿抑郁，杨大姑安排至岳豪园中赏花相亲，席间遇罗雨峰父女。关东大盗尉迟炯与千手观音祈圣因因岳豪家奴抢佃户刘二之女抵债而掳岳宏上门，索银十万两散给穷人。杨大姑以六阳手对祈圣因铁莲子时几乎落败，齐世杰摘茶花截落暗器解围。齐世杰先以缅刀对尉迟炯玄铁钝刀，六合刀不敌后改冰川剑法，三十六招刀断；再比六阳手与掌刀，于第一百十二招令尉迟炯认输。祈圣因以十八金针打落桃花警示岳豪不得在外为非，夫妇离去。事后齐世杰向岳豪索要五万两，并言及回疆曾败于一年仅十八岁的少年英雄（杨炎）。
- chapter: 13
  title: 第十三回 甥舅至亲怀敌意 师徒异路用机心
  summary: 齐世杰向岳豪索五万两济贫，令罗家亲事搁置；杨牧夜访招侄入京并谋以娶冷铁樵侄女为卧底，被齐世杰斥为奴才奸细而拂袖。方亮约见海神庙，透露义军解洪被擒、岳豪诱捕范魁；齐世杰潜入岳家，发现杨牧师徒合谋并以透骨钉暗算弟子，神秘高手以弹指神通救出范魁。齐世杰护送方亮、范魁登丐帮小船离保定，天明归家见母已坐候房中。
- chapter: 14
  title: 第十四回 回头始识风波恶 放眼应知天地宽
  summary: 杨大姑追问齐世杰夜访岳家始末，得知范魁中透骨钉、解洪案事发后，命儿子暂离避祸并禁往柴达木。罗雨峰与杨牧上门逼问劫狱与劫范魁之事，杨大姑力保世杰；杨炎现身自承两案，引杨牧至海神庙，父子相逢不相识，杨炎劝其勿再为鹰爪，杨牧以孟元超首级为辞官条件，杨炎激愤应下，并托其转告齐世杰：冷冰儿意中人另有其人。齐世杰暗中窃听后心乱离家，茶馆遇刘昆夺其马，又与书生江上云刀剑恶斗至平手；韩天寿赶到说明世杰曾助方亮范魁，江上云致歉，并以孝义之说与红鬃烈马促其亲赴柴达木报讯。世杰豁然决意前往；杨炎亦怀刺杀孟元超与冷冰儿之矛盾，行至甘肃武威。
- chapter: 15
  title: 第十五回 客店有心窥隐秘 古城无意遇同门
  summary: 杨炎在武威酒家听云中双煞提及小妖女，戏弄二人后窃银夺马西行张掖。弱水上窥见天山派李务实、陆敢当与崆峒劳家兄弟、金眼神雕彭大遒会合。入云来客店后窃听多方密谋：彭大遒实为杨牧友人大内侍卫，既要搜捕龙灵珠又企图利用杨炎；李陆则拒与朝廷鹰爪合作。杨炎制伏潜入己房的彭大遒，抛陆敢当入水缸后逃出城外，于祁连山脚诱逼套出口供，废其武功，并截住劳家兄弟准备继续追问真相。
- chapter: 16
  title: 第十六回 小侠惩奸戏双煞 少爷吸毒变奴才
  summary: 杨炎以金环与内功制住劳家兄弟，劳福荫宁死不屈，劳福庇因手足情深供述：白驼山主派司空照、慕容垂于思退崖笼络他们，欲助其反对丹丘生、孟华并控制崆峒；杨炎放走二人后，又遇穆志遥与云中双煞、杜诚。杨炎戏惩吹牛拍马者，擒穆志遥与马牛，揭破穆志遥因神仙丸上瘾甘为白驼山主奴才，并逼马牛招认白驼山以大麻所炼神仙丸诱武林人听命的图谋。
- chapter: 17
  title: 第十七回 毒贩妄图成霸业 牛刀小试戏妖人
  summary: 杨炎逼贩毒头子马牛吞尽神仙丸使其发狂，并强将中毒的穆志遥困于悬崖强制戒毒。登山途中窃听白驼山司空照、慕容垂谈玉龙太子与小妖女龙灵珠身世，随即假扮崆峒弟子戏弄二人，终以树枝施展沾衣十八跌、擒龙手及连环夺命剑法皮毛，点穴击败双魔并自报真名杨炎。
- chapter: 18
  title: 第十八回 手足相残何太忍 鸳鸯同命若为情
  summary: 杨炎入祁连山寻龙灵珠，窥见萧逸客练扫叶掌法并指点龙灵珠。白驼山宇文雷以伤定儿耗萧逸客内力，双方恶斗；萧逸客重伤，龙灵珠亦中毒掌不支。孟华突至退走宇文雷、救治萧逸客，却执意带走龙灵珠，反被萧逸客偷袭。杨炎下山遭遇穆扬波、李务实等围攻，以自创新剑招与弹指暗器脱身，斩绳救下龙灵珠。兄弟比剑，杨炎得龙灵珠助战并以北斗七星破胡茄十八拍，孟华败后撒手清理门户之事离去。
- chapter: 19
  title: 第十九回 不辨恩仇成大错 虽非骨肉胜亲生
  summary: 萧逸客服孟华所留小还丹并解天山派点穴，功力渐复；杨炎得传扫叶掌法。萧逸客向杨炎揭示龙灵珠杀父真相：年羹尧伪改康熙传位遗诏一案牵连其外祖父龙灵矫一系，清廷与白驼山主宇文博联手追杀。萧建议杨炎谎称遗诏已毁以减大内之敌，杨炎因身世与寻父仇犹豫。次日杨炎下山赴柴达木，龙灵珠约定若其身亡则认外公。齐世杰亦驰往柴达木欲救孟元超。杨炎易容潜入，却见养父缪长风与孟元超识破假冒的欧阳承；孟元超以德报怨并坚信真杨炎不会行刺。杨炎听罢杀心动摇，章末以义父虽非骨肉胜亲生作结。
- chapter: 20
  title: 第二十回 欲道心魔求棒喝 难挥慧剑令钮分
  summary: 杨炎藏于树上，听得孟元超明知真假炎儿仍以至诚相待，心乱逃离。回农家取马时遭旧日清军军官以农夫尸体与毒梅花针暗算被俘，龙灵珠以银丝软鞭救下。缪长风寻至，龙灵珠误认其为孟元超而攻击，被护体神功与掌力放过。缪长风道破杨牧伪君子真相与云紫萝往事，解开杨炎心结，以太清气功拔毒。齐世杰、冷冰儿上山会合，齐世杰以龙象功助疗。冷冰儿独守杨炎时，龙灵珠归来要人，冷冰儿放行。杨炎与龙灵珠下山，龙灵珠出示藏于皮袄中的康熙篡改遗诏，二人决意赴京。宋腾霄夫妇路过认出神似。孟元超等回山发现人去，冷冰儿决意回天山为杨炎辩诬，缪长风同行。全书终。
