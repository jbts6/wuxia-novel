- chapter: 1
  title: 第一回 恩仇未了相思债 利害云何骨肉情(上)
  summary: 辣手观音杨大姑应震远镖局总镖头韩威武之请入京。韩威武拟退休，大股东杨牧属意弟子闵成龙继任总镖头；韩请杨大姑劝阻，并属意齐世杰或女婿沐天澜。一改容少年（后判明为杨牧之子杨炎）指名要宋鹏举、胡联奎保黄金千两暗镖，茶敬交锋后暂退。杨大姑嘱宋胡见闵成龙勿提她到京。陶然亭畔杨炎揭明身分，求见杨牧，藏入镖车夹层同赴闵宅。闵成龙密室召宋胡，打听盗案与齐世杰下落，并欲夺总镖头之位。
- chapter: 2
  title: 第一回 恩仇未了相思债 利害云何骨肉情 (下)
  summary: 闵成龙以师父杨牧名义，授宋鹏举、胡联奎酥骨散与特制皮袋，令他们擒拿齐世杰乃至杨炎。杨大姑闯闵府对质，遭铜钱暗器与杨家六阳手所制；杨炎为试探生父，点穴掳走闵成龙，并在陶然亭编造白驼山身份带其见杨牧。杨牧表面上大义灭亲、答允酥骨散，实则假杀闵成龙并与杨炎相认，称擒齐世杰意在暗中放走。杨炎交出龙灵珠所授康熙遗诏助父辞官，却被劝留宿一宵；闵成龙未死，暗中去向大内总管报讯。杨大姑回震远镖局，从韩威武处得知女扮男装的龙灵珠下落并先往寻访。
- chapter: 3
  title: 第二回 颠倒是非施诡计 洞穿黑白仗良朋
  summary: 伪大内侍卫假借杨炎口信诱捕龙灵珠，杨大姑赶到后中透骨钉剧毒，仍击毙窗外埋伏者；龙灵珠反手勒毙黄衣汉子、杨大姑击毙青衣汉子，龙灵珠又以仅余碧灵丹为杨大姑解毒，双方因同忧杨炎而暂释前嫌。韩威武带来杨牧住址与宋鹏举受伤消息，龙灵珠独往寻炎。齐世杰潜入杨牧府带杨炎入地道，窃听杨牧命胡联奎以酥骨散、毒针废杨大姑武功，并拟将康熙遗诏经上司转呈；杨炎识破骗局，以内功制闵成龙换取卫副总管住址，与齐世杰赶往卫府，杨牧已在密室会见大内总管乌苏台。
- chapter: 4
  title: 第三回 求荣反辱亲情断 仗义扶危友道坚
  summary: 乌苏台逼杨牧以苦肉计换小妖女，杨炎偷听后与父决裂；龙灵珠闯杨家与卫长青激战，杨炎以隔物传功将计就计救出她，齐世杰以六阳手、龙象功击退卫长青与周霸等人。乌苏台押杨牧要挟不成，三人比翼逃离。众人回震远镖局与杨大姑、韩威武会合后，赴西山卢师山寻丐帮，遇皇甫嵩并得知解洪、方亮、范魁安在分舵。
- chapter: 5
  title: 第四回 情真戏假争权位 李代桃僵脱网罗(上)
  summary: 齐世杰、杨炎、龙灵珠等人抵达西山秘魔崖拜访丐帮分舵主支剑峰，得知义军药材已备齐却难运出。三更司马玄中宇文雷毒掌重伤，杨炎以扫叶掌法、龙爪手及神仙丸解药驱敌救人。司马玄转述天山派通告将杨炎逐出门墙，杨炎承认为叛徒后不辞而别，欲回天山护冷冰儿。韩威武闭门封刀大典上，杨牧将震远镖局半数股份转让给宇文雷，宇文雷以三十招为限挑战沐天澜争夺总镖头，支剑峰提出禁用暗器与使毒，比武展开。
- chapter: 6
  title: 第四回 情真戏假争权位 李代桃僵脱网罗(下)
  summary: 宇文雷在比武中使出白驼山本门武功击败沐天澜，正欲坐稳震远镖局总镖头。密室中龙灵珠认出宇文雷来历，戴京携股份文书到局，快活张假扮戴湛现身并修补齐世杰易容。厅上快活张以戴家原始契约否定杨牧转让的六成股权，仅余杨牧名下一成。齐世杰以戴湛徒弟身分与宇文雷再比，宇文雷暗用神仙丸使毒，反被齐世杰以解药与大挪移神功将毒气挪向卫长青；杨牧受快活张与杨大姑劝吓从后门逃走。齐世杰撕破宇文雷衣衫夺得藏丸银瓶，当众指认神仙丸，宇文雷与卫长青陷入绝境。
- chapter: 7
  title: 第五回 物归原主销悬案 货运边疆出怪招
  summary: 齐世杰以龙象功制住宇文雷，快活张以私藏康熙遗诏为把柄逼乌苏台城下之盟：恢复戴家震远镖局股份、当众为戴湛洗脱旧嫌，并让杨大姑公开现身。快活张易容卫长青、持杨牧腰牌，带队押运药材离京；龙灵珠赴天山寻杨炎，途中遭宇文雷、司空照、慕容垂围攻，又被石天行一行擒获。天山派与白驼山评理后带走龙灵珠；石天行、丁兆鸣赴火云庄贺归元寿辰，龙灵珠仍被石清泉与陆敢当看管。
- chapter: 8
  title: 第六回 行同禽兽凌孤女 幸有神驹救主人
  summary: 石清泉趁石天行、丁兆鸣赴火云庄未归，在古庙中欲凌辱龙灵珠；红鬃马引来旧主江上云，江上云制服石清泉，龙灵珠刺伤石清泉，江上云以点穴止血并逼写认罪书后带走龙灵珠。石天行、丁兆鸣途中遭穆欣欣酥骨神香暗算，被白驼山胁迫索要龙灵珠；孟华以狮子吼功赶到救出二人，以宇文雷换取解药。陆敢当谎称江上云因与孟华私怨而助龙灵珠。江上云与龙灵珠西出玉门后遇清军段剑青、武毅，激战脱身。
- chapter: 9
  title: 第七回 单骑闯阵留残命 妖妇迷魂夺证供
  summary: 江上云中箭后被桑达儿所救，嘱其携石清泉认罪书寻龙灵珠。桑达儿途中遭穆欣欣以神仙丸与迷魂术骗取认罪书。杨炎及时阻止桑达儿自尽并接手追讨。龙灵珠误判烽烟绕路，在荒屋遇尔朱荣，以神仙丸与假夺命神砂脱身。尔朱荣与穆欣欣重逢合谋，欲以认罪书要挟石天行，并伺机擒龙灵珠；章末杨炎化装小叫化靠近二人。
- chapter: 10
  title: 第八回 浪子伤情寻故侣 边城浴血振军威(下)
  summary: 杨炎化装小叫化追踪龙灵珠，遭穆欣欣下毒与尔朱荣龙象功夹击，以沾衣十八跌、大须弥掌、醉八仙剑法与天山剑法周旋，并射天山神芒脱身；段剑青召清骑追击，沙辽率哈萨克骑兵相救。杨炎抵鲁特安旗，得知龙灵珠已赴天山、江上云将至。罗海分兵会合天狼、巨熊援军大破丁显武清军，然黑风坳哨所遭尔朱荣与穆欣欣毒烟屠戮。杨炎忧二人北上威胁龙灵珠，次日快马回天山。
- chapter: 11
  title: 第九回 滚子还家情怅惘 掌门断案费思量(上)
  summary: 穆欣欣向宇文博献上石清泉认罪书以挽回宠信；快活张假扮武毅骗走该书并转交杨炎。真武毅与段剑青随后现身，宇文博试掌辨真后随二人另赴乌总管策划之事，穆欣欣则携马离去。杨炎兼程上天山。天山派补行唐嘉源掌门就任，石天行审讯龙灵珠；龙灵珠反控石清泉却因无人证物证被判无效。
- chapter: 12
  title: 第九回 滚子还家情怅惘 掌门断案费思量(下)
  summary: 天山派会场上，执法长老石天行审讯龙灵珠，当众揭杨炎为清廷鹰犬杨牧之子，并欲废其武功。冷冰儿、缪长风、丁兆鸣等力证杨炎与杨牧并非一路；杨炎以大遁传音现身，弹指神通与占衣十八跌挫败天山三英，呈上石清泉逼奸龙灵珠的血写认罪书。陆敢当畏罪潜逃，江上云赶到欲为龙灵珠作证，段剑青却突然现身替石清泉作伪证，反诬杨炎侮辱冷冰儿，会场丑闻再起、对质未完。
- chapter: 13
  title: 第十回 盟心忍令沾泥絮 情劫应嗟逐彩云(上)
  summary: 同门大会上，段剑青诬陷杨炎与冷冰儿有奸情，石天行偏审逼供。杨炎当众承认决意娶冷冰儿，冷冰儿称七年后再议婚事；缪长风以年龄对比力挺二人，江上云作证杨炎与生父杨牧殊途，并揭石清泉曾对龙灵珠施暴签下认罪书。唐嘉源判杨炎重归本门、面壁三月。陆敢当报石清泉思退崖自尽，石天行崩溃弃职。丁兆鸣审段剑青时对方以毒雾金针烈焰弹突围，掌心毒针伤杨炎后逃脱。警报钟响，白驼山主宇文博率众火攻天一阁，钟展在蹬道与之剧斗，唐嘉源率杨炎、缪长风及少林无碍大师、崆峒丹丘生等回山御敌。
- chapter: 14
  title: 第十回 盟心忍令沾泥絮 情劫应嗟逐彩云(下)
  summary: 宇文博、武毅、段剑青预谋偷袭天山，以火箭神仙丸与大麻毒烟攻天一阁；钟展中途开关力敌宇文博渐落下风。唐嘉源赶到震退武毅并以大须弥掌苦守，司空照、慕容垂以神仙散偷袭杨炎时孟华现身解救。孟华获唐夫人所授冰魄寒光剑代掌门与宇文博单挑，胡茄十八拍刺伤对方，宇文博施天魔解体大法暂增功力后仍认输逃走。钟展为弟子祛毒后在壁上刻下大须弥功诀，散功油尽灯枯而逝。
- chapter: 15
  title: 第十一回 何当重订三生约 只是难堪七载爵
  summary: 唐嘉源宣布能诛宇文博者为天山派继任掌门，孟华领旨；冷冰儿留七年之约信下山，途中误救段剑青激战后被宇文博掳走，龙灵珠以透骨钉废段剑青武功，段仇世求情带走侄子。杨炎赴鲁特安旗未遇冷冰儿，后潜入清营行刺误遇父亲杨牧，龙灵珠来援，父子恩怨未了而边塞烽火又起。
- chapter: 16
  title: 第十二回 弹指传烽消罪孽 惊雷绝塞了恩仇(上)
  summary: 杨炎、龙灵珠在清营与杨牧合演妙计突围，卫长青身亡、武毅重伤；杨牧托孤孟元超后身亡。义军以丁兆庸为傀儡破敌。杨炎与龙灵珠约赴白驼山救冷冰儿；宇文博囚冷冰儿逼献冰川剑法，并以连锁性药物反应设计应付孟华来访。
- chapter: 17
  title: 第十二回 弹指传烽消罪孽 惊雷绝塞了恩仇(下)
  summary: 假孟华（快活张）与真孟华在白驼山呼应，交涉神仙丸与释放冷冰儿；恶战中司马铁布七星阵，宇文雷遁逃。白驼山主宇文博终被杨炎所杀。龙则灵临终托付后含笑而逝；孟华与天山三老接杨炎回山，龙灵珠与杨炎再订七年之约，全书终。
