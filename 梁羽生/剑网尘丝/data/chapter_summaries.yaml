- chapter: 1
  title: 第一回 喜结良缘 佳人侠士 变生意外 红烛青霜
  summary: 洛阳中州大侠徐中岳续弦迎娶姜雪君，八方豪杰齐聚贺喜。席间宾客谈及徐中岳击败飞天神龙等往事。婚礼上黑衣少年卫天元（飞天神龙）现身，要求兑现三年前嵩山比武之约。铁力夫、王殿英联手阻拦反遭重创。公证人剪大先生说明三场比武规矩（暗器、掌、剑），新娘姜雪君点头同意可联手参战，比武即将以暗器场开始。
- chapter: 2
  title: 第二回 旧侣寻仇 掌伤大侠 新娘比武 血溅华堂
  summary: 徐中岳新婚之日与飞天神龙卫天元在礼堂比武：暗器、掌力、剑法三场中徐中岳先攻，暗器与掌力均未分胜负，比剑时徐中岳犯规且剑被弹指神通弹飞；卫天元后攻以蜡丸作暗器与徐中岳成和，再以劈空掌力重创徐中岳。姜雪君代夫续比剑，卫天元自刺胸膛认负，黑衣少女闯入救走卫天元。公证人剪大先生总判一胜一负一和成平手；喜事告吹。事后楚天舒证实姜雪君身怀反震奇经八脉功夫，鲍崇义讲述武林怪杰齐燕然之混元功与流云飞袖，游扬怀疑黑衣少女与齐燕然有关。
- chapter: 3
  title: 第三回 除夕归人 无辜遇难 深宵赴约 溥白豪冤
  summary: 鲍崇义向楚天舒、鲍令晖详述齐燕然及其徒弟十年前为钦犯、与混元一气功流云飞袖之关联，并论及飞天神龙身份之疑。楚天舒偕鲍令晖夜访徐家约出姜雪君，假山旁师兄妹以惊神笔法相认，楚天舒指出莱芜惨祸或与徐中岳有关。新房中赵红眉欲以鸡鸣五鼓返魂香冒充姜雪君暗算飞天神龙，鲍令晖脱身。梅清风、印新磨、叶忍堂围攻楚天舒被点穴制服，姜雪君以绸带点伤叶忍堂；剪大先生拦阻，责二人幽会，强令楚天舒见徐中岳，双方动手。
- chapter: 4
  title: 第四回 旧梦成尘 青梅竹马 此心如水 飞絮飘萍
  summary: 剪大先生以大摔碑手力压楚天舒，卫天元以铁袖功夫救走姜雪君并点倒楚天舒；城外青梅重逢后姜雪君道出被迫嫁入徐家与父亲姜志奇之死原委，卫天元怀疑徐中岳为杀父仇人。二人夜探姜志希府，见黑衣人灭口，姜母临终指认凶手为剪千崖，并证实姜志奇死于唐家毒药。
- chapter: 5
  title: 第五回 不见创痕 疑真疑幻 难明心迹 非友非仇
  summary: 齐漱玉决意返回洛阳助卫天元，途中与楚天舒误会交手，互以流云飞袖与惊神笔法点穴功夫较量后和解，得知彼此与齐燕然、丁勃、扬州楚家渊源。二人再入洛阳见鲍崇义父子，打听徐家动静；卫天元潜入徐家，识破剪大先生与徐中岳私谋及肩上齿痕旧案，却因枯禅上人与剪大先生拦阻未能救出姜雪君。徐中岳将姜雪君囚入复壁密室，又与大姨赵红眉密议。郭元宰听齐漱玉道破十年前出卖抗清义士真相后偶像幻灭，终允暗中指点密室位置，约定只救人、不伤人。
- chapter: 6
  title: 第六回 陌路相逢 难分邪正 鸳胶再续 莫问根由
  summary: 齐漱玉击晕赵红眉，楚天舒以身试毒确认解药后救醒姜雪君；三人揭穿徐中岳肩上齿痕，依郭元宰之约暂饶其一命，并借徐锦瑶之口为郭元宰洗脱泄密嫌疑，再由秘道逃出徐家。洛阳城外，姜雪君答应随齐漱玉归家寻卫天元，楚天舒亦以隐瞒身世为条件同行。卫天元赴京途中于巩县酒楼与剪千崖、一瓢道人等陌路相逢，突袭不成反被围攻，评理后发现前晚凶手或为冒充剪大先生之人，疑及剪一山。暴风雨中他于江边似见姜雪君、齐漱玉与楚天舒同舟远去。小舟上三人闻黄河三鬼疑齐漱玉为某女英雄之女，后又闻丁大叔啸声渐弱，急忙靠岸。
- chapter: 7
  title: 第七回 一失足时 死生成谜 再回头处 恩怨如烟
  summary: 楚天舒、齐漱玉、姜雪君闻啸赴救，见丁勃遭冀北双鹰萨都刺、萨都拉联手围攻；齐勒铭暗中出手逼退双鹰。丁勃原赴抱犊岗与“死人”齐勒铭相会，并得悉齐漱玉为其女。穆娟娟设计以双鹰谋害丁勃，齐勒铭识破后与之分手。齐勒铭因庄英男改嫁楚劲松及漱玉亲近楚天舒而起杀机，赶往黄龙峡欲暗害楚天舒。
- chapter: 8
  title: 第八回 梦幻尘缘 三生冤孽 飘零蓬梗 两代情仇
  summary: 姜雪君与楚天舒船头夜谈,以同门兄妹情分试探并约定假戏真做,齐漱玉偷听后以为二人互生情愫、卫天元心系自己。夜行人以极高轻功摸至舱中抚齐漱玉发丝后离去,众疑为卫天元;楚天舒上岸追索反被飞石点中环跳穴。其实夜行人是齐漱玉之父齐勒铭,他偷听后认定女儿爱卫天元、姜楚相恋,遂放过楚天舒,并回忆汤怀义诬飞天神龙诸恶及约己助战之事。齐勒铭路遇汤怀义,得知剪大先生、徐中岳赴京师投奔穆志遥设网,假意愿会飞天神龙随行。齐漱玉一行返齐家见齐燕然、丁勃、王妈,卫天元未归;王妈夜访楚天舒盘问情愫并托带绣花图样,丁勃亦劝其早归,谓留齐家祸非福。
- chapter: 9
  title: 第九回 浪子乖行 隐忧潜伏 妖狐现影 铸错难回
  summary: 丁勃力劝楚天舒离齐家避祸,楚天舒误以为齐燕然施压。途中中毒针昏迷,实为齐燕然输真气所救。齐燕然怀疑逆子齐勒铭所为,并述金狐穆好好、银狐穆娟娟与陕西穆家暗器渊源;又因庄英男改嫁楚劲松,担忧齐勒铭赴扬州寻仇,遣丁勃往告楚家避入少林。齐燕然赠楚天舒描红贴子,楚天舒与姜雪君分道,姜拟上京寻卫天元报仇。风陵渡遇申公达,称楚劲松应剪大先生、徐中岳与汤怀远英雄贴赴京对付飞天神龙;丁勃夜访点穴制止申公达妄闯王屋山。楚天舒赶赴京师途经华山,误救银狐穆娟娟并与武当五老玉虚子交手,玉虚子以连环夺命剑试探并追问齐勒铭是否未死。
- chapter: 10
  title: 第十回 奇变惊心 掌门遇害 幽岩被困 姹女含情
  summary: 玉虚子向楚天舒透露齐勒铭可能未死、震远镖局汤怀义身边有疑人,并言及欲联华山及六大门派对付齐家;二人闻华山急钟返山,途中楚天舒与涵虚、涵谷误战,玉虚子解围。群仙观内华山长老确认掌门天权道人遭人暗算惨死,疑凶武功似大摔碑手与绵掌合一,剪大先生英雄帖与丐帮来信交织其中。楚天舒下山时在千尺幢遭迷香与铁板困锁,后为银狐穆娟娟所救,二人再晤,穆娟娟自承身份并动情相待。
- chapter: 11
  title: 第十一回 勇救佳人 巧施骗术 追随父母 误坠奸谋
  summary: 齐漱玉女扮男装上京寻卫天元,途中遭秦岭三英截击;宇文夫人母子以白驼山身份出手相救并收她为义女,实为金狐穆好好设局。华山凌虚等五道疑她干娘为妖妇交锋后中毒身亡,临终指涉齐家。齐漱玉被骗同赴京师,楚天舒亦先一步入京寻父。
- chapter: 12
  title: 第十二回 弹剑京华 龙争虎斗 伤心家国 凤泊鸾飘
  summary: 楚劲松一家寓居震远镖局后别墅,应剪大先生与徐中岳之约入京对付飞天神龙。楚天虹自徐锦瑶处闻继母私奔与舒儿疑云;穆良驹、良骅邀游西山,彭大遒报飞天神龙现身,楚劲松随往。庄英男忆齐漱玉与前夫,汤秉乾来邀接风宴,梅道生与齐大圣到局;庄英男偷窥认出齐大圣即齐勒铭。楚劲松西山后元气大伤回城入宴,齐大圣以雷神指等挫印新磨、叶忍堂,握手助楚劲松恢复功力,并约次日拜访。
- chapter: 13
  title: 第十三回 忍陷火坑 拒婚受辱 忽来侠士 惩恶扶危
  summary: 汤怀远密室告知楚劲松飞天神龙或已抵京且实为齐燕然徒孙，二人进退两难。楚天虹回忆西山秋游：穆良骅、穆良驹分别纠缠她与徐锦瑶，飞天神龙现身惩恶，以大挪移五行推手击溃穆家兄弟联剑，并与赶到的楚劲松对掌后离去。楚劲松声明不再襄助剪大先生。夜归途中玉虚子警告齐勒铭可能假名齐大圣潜伏震远镖局；庄英男家中突现有伤疤怪人，旧怨重起。
- chapter: 14
  title: 第十四回 孽债难偿 不分皂白 前缘未证 难说恩仇
  summary: 齐勒铭夜闯楚宅向庄英男摊牌并点晕楚天虹,扬言报复楚劲松。窗外有人暗算庄英男致其中毒针,齐勒铭以碧灵丹与内功暂保其命。楚劲松与玉虚子赶到交战,齐勒铭施展天魔解体大法反被庄英男求情所牵而两败俱伤。黎明楚天舒赶到欲杀齐勒铭,齐漱玉从窗外闯入阻杀并认父。齐勒铭因齐燕然所赠描红帖子与女儿求情放并救活楚劲松,抱走中毒的庄英男离去。
- chapter: 15
  title: 第十五回 陷阱自投 甘为宰割 良知未泯 肯作帮凶
  summary: 徐锦瑶因父徐中岳逼嫁穆家、又欲其劝楚天虹联姻而至楚宅；齐勒铭抱庄英男突围被徐锦瑶拦阻，后中金狐穆好好与宇文冲之计软禁什刹海。楚天舒以酥骨散交齐漱玉冀废父武功以救之；齐漱玉与徐锦瑶、镖师及汤怀远冲突，得义兄宇文浩以铁菩提解围。汤怀远等疑白驼山与齐家牵连；齐漱玉随宇文浩入岛见干娘宇文夫人（穆好好），齐勒铭被迫以飞天神龙卫天元交换爱女，进退两难。
- chapter: 16
  title: 第十六回 仗势欺人 膏粱劫美 佯狂玩世 侠士惩凶
  summary: 卫天元化装下山，疑楚劲松与穆志遥、徐中岳之关系，欲寻楚天舒与姜雪君。楚天虹与徐锦瑶密商拒婚，楚天舒引郭元宰接应，徐锦瑶、楚天虹由郭元宰护送离京；途中遭穆良驹、彭大遒、大力神佟开甲拦劫，郭元宰与穆良驹比剑几败。化装的卫天元暗中指点，以弹指神通与借力打力重创佟开甲、掌掴穆良驹并扣为人质，逼彭大遒善后后放行。众人认出飞天神龙，言及楚劲松为齐漱玉之父所伤、齐漱玉疑被白驼山妖人骗走，卫天元遂携穆良驹驾车往震远镖局。
- chapter: 17
  title: 第十七回 慧剑难挥 但凭幻剑 芳心何托 仍鼓雄心
  summary: 姜雪君乔装姜火生投宿舅舅孟掌柜客店，闻飞天神龙伤穆家少爷；神秘女客（上官飞凤）冒充飞天神龙杀官兵并以腹语约她什刹海相见。卫天元挟穆良驹回京途中被穿姜雪君衣裳的上官飞凤拦下比剑，得知师妹齐漱玉落于白驼山，遂以穆良驹衣裳为信物。姜雪君赴宇文夫人处欲以人质换齐漱玉反遭挟制，宇文夫妇乔装暗算，姜雪君中梅花针昏迷。另一线齐勒铭奉命欲擒卫天元，密室十招赌斗；上官飞凤归来接招并再约十三招比剑，终以礼物可换齐漱玉之女打断杀招。
- chapter: 18
  title: 第十八回 剑网纷张 原如世网 尘丝难断 未了情丝
  summary: 上官飞凤证实齐勒铭身份并献上穆志遥之子作交换，卫天元愤然离去；齐勒铭因自尊心拒收师侄人质，改闯白驼山反抓宇文浩，却被对方以齐漱玉与老仆震脉之威胁制。鹰爪王王大鹏与铁拐李李力宏夜探藏人质处，中百日醉自伤昏迷，穆娟娟再以千日醉夺走穆良驹，与姐姐交易救出齐漱玉，并以解药助姜雪君脱身。齐漱玉与穆娟娟合作，在酒中下酥骨散废去齐勒铭武功，穆娟娟更捏碎其琵琶骨，父女恩怨与情丝尘丝一并收束，全书告终。
