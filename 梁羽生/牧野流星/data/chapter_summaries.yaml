- chapter: 1
  title: 第一回 鬼斧神工开异境 丹心侠骨创新天
  summary: 段仇世寻至云南石林，以点苍派请手式与少年杨华相认，并与隐居当地的丹丘生重逢。丹丘生自述已成崆峒派弃徒、曾逐走习修罗阴煞功的孟神通徒孙，并托付遗书《歧崛武学发微》。段仇世告知杨华大师父卜天雕与母亲皆死、仇在清廷，交付孟家刀谱，嘱其一年内练熟孟家刀法后找孟元超比武，以便父子相认并完成故友心愿。
- chapter: 2
  title: 第二回 家丑难言宁抗命 门墙羞列岂寻仇
  summary: 阳继孟携洞玄子、欧阳业重返石林，欲夺回洞府并算旧账。洞玄子以崆峒长老身份欲拘丹丘生问罪，丹丘生揭其家丑与投靠朝廷之私。丹丘生与阳继孟单挑，双方各以修罗阴煞功、隔物传功与蹑云剑法、惊神指法恶斗；洞玄子欲废杨华武功，段仇世出手相拦并与洞玄子缠斗，欧阳业则围攻杨华。混战中丹丘生喷酒破阴煞并击倒欧阳业，段仇世以神龙掉尾重创洞玄子，丹丘生、段仇世与杨华均受创，战局陷入凶险。
- chapter: 3
  title: 第三回 石窟宗师留秘笈 林中情侣觅亲人
  summary: 石林中生死大战收场：洞玄子被段仇世绵掌断剑击毙，自己也以拂尘重创段仇世；丹丘生与阳继孟拼斗内力，双方俱伤倒地。杨华被二师父段仇世、三师父丹丘生以残存真气救回后，两人先后气绝身亡。丹丘生临终将崆峒派武学精义托付杨华并嘱其另开一派；段仇世嘱其练成孟家刀法，并欲点破孟元超与杨华的关系及杨牧身世，话未说完便死。次日杨华醒来，五具尸体全部失踪，却在石台上发现丹丘生所留崆峒派武学精义，身上孟家刀法秘籍仍在。杨华认定血迹为实，决意留在石林苦练武功，并先练孟家刀法。
- chapter: 4
  title: 第一章是"总纲",开头写的是:"快刀要义,以我为主。以'嫩'辅'老'以'急'辅'迟'。以静制动,以客犯主。此为变格,亦须熟悉。静如处子,动如脱兔。要旨仍在一个"诀'字。但主客易势,动静得宜,必须审情度势,不可默守成规。"
  summary: 杨华研读孟家刀法，发现添注笔迹竟是母亲云紫萝所书，原文交代其曾替少年情侣孟元超抄录心得；半年练成刀法，又将近一年练完崆峒派武学精义，武功大进却难融会两门。离石林前七日游剑峰，凭壁虎游墙入张丹枫秘洞，依戒律磕一百响头得玄功要诀，并默记十八式无名剑法。期满离林时遇青哥与冰妹，偷听得知二人寻段仇世，且牵涉孟元超、段家与小金川义军。
- chapter: 5
  title: 第四回 深入石林求秘笈 敢凭宝剑斗魔头
  summary: 冷冰儿向段剑青讲述小金川义军准备放弃基地、孟元超林无双与云紫萝情谊等事；二人至剑池剑峰，段剑青道出张丹枫秘笈与段家渊源并欲攀峰寻宝。杨华隐于剑峰窃听，因冷冰儿“自成一体”之语顿悟武学。盘石生与洞冥子寻阳继孟与秘笈而至，擒制段剑青；杨华跃下以暗器与孟家掌法卸脱盘石生双臂，又与洞冥子连环夺命剑法恶斗，让招后仍难脱剑圈。
- chapter: 6
  title: 第五回 前路未知徒怅惘 故园遥望独彷惶
  summary: 杨华在石林以无名剑法对抗洞冥子连环夺命剑阵，实战顿悟将蹑云剑法与孟家刀法合一，刺伤洞冥子迫其与盘石生遁走；次日他铲去石窟十八式图形后告别石林独闯江湖。段剑青与冷冰儿离林三日后山路养伤，遇金光斗、李大勇，段称将回大理；金、李途中结拜密谋构陷段剑青，却被路边少年掀落马下索要腰牌，李大勇暗器透骨钉亦未能伤敌。
- chapter: 7
  title: 第六回 巧得腰牌入虎穴 敢凭硬骨斗狼兵
  summary: 少年杨华以沾衣十八跌与劈风掌夺得御林军军官李大勇腰牌，金光斗与李大勇互残而死；杨华将二人坐骑转送段剑青、冷冰儿。杨华凭腰牌与易容潜入小金川月余，以腰牌与计谋喝退官兵、智救猎人贺铁柱夫妻，并伪称下毒约束军官。贺铁柱指点云女侠紫萝墓在胡芦谷，杨华得知母亲坟所。
- chapter: 8
  title: 第七回 一曲悲歌吊知己 十年隐痛隔幽冥
  summary: 杨华以假毒戏弄狗官后资助贺铁柱夫妻远避，夜祭亡母云紫萝之墓。缪长风来墓前悲吟并告亡友已抚其幼子、荐入天山。杨牧与全大福寻墓，杨牧自报姓名并欲以金刚六阳手毁碑；缪长风出手掌掴杨牧、夺全大福刀。杨华先后护杨牧、又阻双方互杀，借玄功要诀与无名剑法硬接太清气功并削断全大福朴刀，终与缪长风正正经经比剑。
- chapter: 9
  title: 第八回 岂有明珠投暗室 错将奸贼当亲人
  summary: 杨华以无名剑法与缪长风比剑,终因功力不济认输;缪长风不忍下手,狂歌离去。杨华于云紫萝墓前发誓查明真相。杨牧识破其身份,假作慈父并编造云紫萝与孟元超私情故事,杨华拒认贼作父却中谗言,誓杀孟元超。一美少年为义军出手掌掴杨华。杨牧向崔宝山举报,四僧四道五官夜围杨华;杨华默运玄功独斗,重创喇嘛并逼退天泰上人。
- chapter: 10
  title: 第九回 何惧群魔唯奋战 却嗟知己最难求
  summary: 杨华连破四僧后大战武当青城四道，悟玄功要诀，以无名剑法融合孟家快刀破九宫八卦剑阵；再战五官，毙伤数敌。九人三重围困之际，美少年软鞭突袭解围，两人联手击溃四僧四道五官。事后美少年称只为报答贺猎户恩情、恩怨两清，拒通姓名，指出孟元超与义军或在青海柴达木，并斥杨华勿善恶颠倒。杨华目送其去后重振精神，取道川北甘肃赴青海高原，途遇清军军官。
- chapter: 11
  title: 第十回 险遇荒山崩雪浪 相逢古寺起风波
  summary: 杨华在山路上先后避开官兵、遇见震远镖局韩威武一行；大雪崩中韩威武以大力鹰爪功救人抢药材，自己遇险反被杨华用树枝拉起。双方互探身份后同赴白教喇嘛寺歇宿，沙玛法师接待。夜来御林军马昆、周灿亦因雪封山投寺，周灿认出日间挡路的杨华，韩威武谎称其为向导掩护；马周透露小金川有姓杨少年连败四僧四道五官并疑害李大勇，韩威武暗自将眼前少年与该案联系。
- chapter: 12
  title: 第十一回 惊听琵琶来怪客 戏倾杯酒折强徒
  summary: 韩威武等人在喇嘛寺歇夜时，闵成龙与尚铁宏率众劫镖。闵成龙与石建章比掌，杨华暗用碗破片刺其涌泉穴助石建章取胜；尚铁宏以失传铁琵琶绝学及暗器与韩威武苦战，杨华再暗点环跳穴使尚铁宏栽倒。马昆两不偏帮并试探沙玛法师，尚铁宏疑团满腹率众离去。
- chapter: 13
  title: 第十二回 解难分忧助镖客 同仇敌忾结良朋
  summary: 杨华以泥丸暗算尚铁宏后与众人回寺。马昆、周灿以同行柴达木监视韩威武；韩托杨华引开二人。美少年盗走御林军坐骑，杨华追至险谷相助，以大漠弧烟与棉里藏针剑法击败马、周并削发剃眉而不杀。二人共饮葡萄美酒，美少年承认为义军中人，杨华求问其姓名。
- chapter: 14
  title: 第十三回 情意暗藏难自白 深心结纳有原由
  summary: 杨华与美少年金碧漪互道姓名后，请求结伴同行赴柴达木；金碧漪允之，条件是途中事事听从，并吐露其暗护震远镖局、尚铁宏为海兰享结拜兄弟等内情。二人取秘道出玉树山，客店分房、松林露宿中金碧漪诸多忌讳益显。途中论及石林张丹枫遗迹、无名剑法与上乘剑术重拙大要诀，杨华暂隐身份并决意日后赴天山寻弟还剑。夜中杨华伏地听得邓中艾与萨福鼎手下密谋劫镖，并辩论小金川使剑少年、潼关软鞭少年与金逐流独子身份之谜，杨华愈信金碧漪来历不凡。
- chapter: 15
  title: 第十四回 帐里香飘奇扑朔 瓜田李下惹嫌疑
  summary: 刘挺之、叶谷浑与邓中艾在荒山以虎啸诱出马嘶，搜捕小金川两少年；杨华挺身独斗三大高手，以无名剑法与孟家快刀虚实变化削去邓中艾半边头发并突围。金碧漪不知所踪，金逐流之子金少侠斥退三人，却因误会与杨华比剑，飞龙在天被破后夺马扬长而去。杨华得知对方身份后懊恼结怨，踏入柴达木山区平安集备粮投宿，疑见白马并以天蚕丝帐与传音入密试探金碧漪，未果，邻房忽有人哼声。
- chapter: 16
  title: 第十五回 酒后未消豪侠气 灯前方识女儿情
  summary: 杨华于客栈夜闻安息香，金碧漪对门来访并自揭女身，说明与金碧峰为同胞兄妹、金逐流与江海天易子而教等家事。邻房虬髯老者实为关东大侠尉迟炯，酒后出面调侃并与杨华比试刀剑，互有留手后长叹离去。金碧漪因长辈误会与闲话不能陪杨华进山，赠地图并续借白马先会义军长辈；杨华独行，两日后深入柴达木山区。
- chapter: 17
  title: 第十六回 身世难言徒自苦 情怀愁锁倍堪怜
  summary: 杨华深入柴达木山区寻义军与孟元超，途中纠结金碧漪与身世。瀑布旁偷听宋腾霄、吕思美谈云紫萝往事，怀敌意交手几近平手。阳继孟与杨大姑突至，杨华九招破修罗阴煞功削指逼退阳继孟，又掌掴并放走杨大姑。表露身份后得知孟元超与尉迟炯已赴拉萨。杨华至义军营地见冷铁樵、萧志远、韩威武，闻清廷阴谋及营地将弃，权衡去留。
- chapter: 18
  title: 第十七回 陌路相逢情未了 芳踪难觅意如何
  summary: 柴达木席间,冷铁樵、萧志远等向杨华、韩威武细述暗镖遭闵成龙告密、海兰察与萨福鼎分派尚铁宏及刘挺之等人劫镖的经过,并告金少侠金碧峰将至、金碧漪已向北前往鄂克昭盟。杨华为避金碧峰并寻孟元超,决定随韩威武镖队同行;席间亦谈及江上云以剑败吉鸿疯魔杖、叶慕华拒为邓翔说媒等江湖近事。一行抵达鄂克昭盟首府昭化,知孟元超已赴拉萨、尉迟炯赴回疆。杨华市集见白马影踪,购得红鬃马追赶,在丘陵地带追上粉衣女骑,却遭对方飞镖相击。
- chapter: 19
  title: 第十八回 太惜明珠投暗室 怒将室剑护佳人
  summary: 杨华误认邓明珠为金碧漪，识破飞镖上的龙翔标记后结识邓老镖头之女。邓明珠告以镖局因吉鸿寻仇与父病关闭，自己要去天山请小师叔重振门户。吉鸿与白山截杀邓明珠，杨华以钱镖、无名剑法与轻功连挫二人，削发打牙并护下佳人，白马却被白山夺走。江上云随后赶到，邓明珠故意亲近杨华以气他；江上云私询杨华对碧漪心意，揭其为杨牧之子并逼其绝交，杨华拒绝后双方拔剑，江上云以春云乍展抢攻。
- chapter: 20
  title: 第十九回 骏马嘶风倩影 惊鸿掠水未留痕
  summary: 杨华以无名剑法与江上云天山剑法相斗，先占上风后故意示弱脱身，并在江上云臂上留三孔示警。草原上杨华误认骑白马者为敌，实则白教法王已擒白山夺回邓明珠坐骑；双方拆招三百余式，法王以袈裟夺剑却认杨华剑法见长并赠马。法王得知金碧漪曾递拜帖未留，与杨华分头寻人：法王追江上云并还白马，杨华西行寻金碧漪且不再回昭化。金碧漪亦在草原驰骋，回想柴达木与吕思美谈及杨华放过杨牧、孟元超与云紫萝旧情等隐秘，欲拦杨华做傻事。
- chapter: 21
  title: 第二十回 觅我情郎逃玉女 阻他父子动干戈
  summary: 金碧漪向吕思美试探后得知杨华实为孟元超之子，急赴昭化追踪欲“报仇”的杨华，却因杨华误认邓明珠而走岔路；途遇师兄江上云，双方因杨华身世与邓明珠一事争执，金碧漪弃江上云独自寻人。江上云遇白教法王，法王称赞杨华并托其骑白马寻师妹，江上云却改道天山。金碧漪路上遭马昆、周灿暗箭，甩掉二人后在茶铺得知杨华追赶一偷物腌脏汉子走了弯路；该汉子随即夺走她烙有大内印记的白马（御马），金碧漪只好步行赴拉萨。章末回溯两日前杨华在藏人小镇酒店遇见该汉子吃白食被围之事。
- chapter: 22
  title: 第二十一回 少侠寻人来塞外 神偷引路入藏边
  summary: 杨华在塞外酒馆替腌脏汉子付账并赠银，反被盗走孟家刀谱；商队首领老丁等人银物亦失。杨华追贼，神偷以轻功戏弄并引其改道，又于茶铺加倍还银、嘱其独行往拉萨。藏人老板讲述西藏神偷劫富济贫、救牧羊人女儿并削江布场主头发等事。杨华经念青唐古拉山白鹰泉，闻邓中艾与老丁对话，知老丁失机密公文且已联络江布，并疑神偷为快活张；杨华现身骂贼，与邓中艾再战，邓使出从连甘霖处换得的繁复点穴笔法。
- chapter: 23
  title: 第二十二回 智服凶徒查隐秘 惊闻爱侣陷囹圄
  summary: 杨华在白鹰泉以无名剑法力压邓中艾，又破丁兆栋暗器，擒获丁兆栋并问出萨福鼎密函三事：怂恿广惠法师出兵青海讨伐白教、绑架与冷铁樵结盟的部落酋长、捉拿孟元超。随后听闻江布场主囚禁金逐流之女碧漪，杨华智取场丁藏纳、黎里并获雄鹰阁地形，易容随丁兆栋潜入江布庄园，反制江布人质换人，终遭密宗高手释湛、释陀以隔物传功与袈裟发难，陷入以一敌二苦战。
- chapter: 24
  title: 第二十三回 九州铸铁伤心错 一局棋争敛手难
  summary: 杨华夜闯江布牧场救金碧漪，遭马昆、周灿与密宗喇嘛释湛、释陀合围；暗器高手击毙丁兆栋、打灭灯火，又有人放火马棚牵制江布。杨华摸入雄鹰阁，与先至的孟元超黑暗中刀剑剧斗。金碧漪已脱险，二人下楼击退追兵。山头相认未果，杨华以孟家刀法决生死，段仇世、金碧漪、快活张赶到大呼父子真相，杨华剑伤孟元超后仆倒，胸膛为父刀尖刺近心房，段仇世点穴、快活张敷药抢救。
- chapter: 25
  title: 第二十四回 何须拔剑寻仇去 依旧窥人有燕来
  summary: 杨华重伤苏醒后，经段仇世、金碧漪告知身世真相，得知生父为孟元超而非杨牧，父子相认并改称孟华。快活张讲述石林之战中救下段仇世、丹丘生，并以天山雪莲灵丹起死回生；三师父因洞玄子之死遭崆峒派追缉不便露面。养伤期间孟华与金碧漪互诉衷情。半月后段仇世、快活张相继离去。孟元超因病无法完成义军首领冷铁樵所托、凭与弄赞法师旧交劝阻达赖出兵白教法王之任，孟华力请代父持信物赴拉萨办事。
- chapter: 26
  title: 第二十五回 分袂叮咛愁一缕 参禅溜览豁双眸
  summary: 孟元超授孟华血衣与致弄赞法师书信，金碧漪叮咛送别后孟华赴拉萨投吉里父子。藏历佛祖诞将开放布达拉宫，吉里教孟华扮香客入宫。游览大昭寺时孟华窥见金碧峰与江上云议论其妹恋情并誓阻婚事。开放日弄赞法师未出摩顶，却迎赵廷禄等大内高手；孟华故意留宫，潜入弄赞静室，目击赵廷禄以帕巴鲁库少年玉佛为礼，奉朝廷之命请法师相助。
- chapter: 27
  title: 第二十六回 惊见古宫来恶客 且看神剑吐光芒
  summary: 赵廷禄奉命利诱威胁弄赞法师，欲借黄教名义讨伐青海白教；遭拒后卫托平以毒掌暗伤逼誓。孟华自佛像后现身，以无名剑法力战卫托平，挟持赵廷禄迫其签藏文悔过供状并交出解药。弄赞法师出面化解夜行人惊扰，确认不中清廷圈套、愿徐图与白教弃嫌修好，赠孟华见叶符。孟华回吉里家与暗中护持的快活张会合；快活张曾制住江上云、金碧峰并引开叶、刘。快活张托其问候孟元超后赴回疆。孟华睡后遭卫托平、叶谷浑、刘挺之、邓中艾率官兵上门搜捕，挺剑以白虹贯日等招突围恶战。
- chapter: 28
  title: 第二十七回 少侠但求消积怨 双英未许解前嫌
  summary: 孟华为掩护吉里父子，在屋顶与卫托平、邓中艾、刘挺之、叶谷浑缠斗，金碧峰、江上云及时驰援。叶谷浑掌心被刺、小指被削而逃，金碧峰绞断刘挺之缅刀，卫托平携刘、邓撤退。江上云、金碧峰拒受人情并禁提金碧漪后离去。孟华辞别吉里父子，轻功出拉萨返回郊外别墅，见孟元超以神龙掉尾印证武功恢复，却得知金碧漪后山打猎未归；山中误认邓明珠，获悉白衣汉子追走金碧漪，孟华以剑法与对方松枝较量，十招内长剑脱手落败。
- chapter: 29
  title: 第二十八回 欲上天山寻幼弟 却来牧野见奇花
  summary: 孟华寻到金碧漪，始知对手是其父金逐流；父女偕孟华回别墅，见孟元超与天山丁兆鸣刀剑过招。众人相认后，金逐流允金碧漪婚事意向却望过两年再议，次日分头：金逐流赴拉萨寻江上云、金碧峰与吉里父子，金碧漪偕丁兆鸣、邓明珠先走。孟元超嘱孟华追尉迟炯通报回疆内奸，并上天山见缪长风与唐经天探幼弟。半月后孟华驰骋草原，神龙掉尾救下哈萨克少女罗曼娜，得知尉迟炯半月前曾过瓦纳部落。
- chapter: 30
  title: 第二十九回 赋子野心思逐鹿 美人青睐嘱刁羊
  summary: 罗曼娜向孟华讲述关东大侠尉迟炯以飞刀救马贼并促成改刑的故事；孟华获邀参加瓦纳族刁羊大会，与族长罗海谈柴达木义军求援与反清盟约。刁羊中段剑青与孟华、桑达儿激烈争羊腿，孟华暗助桑达儿取胜。姑娘追时桑达儿欲向罗曼娜求爱，段剑青出鞭阻拦；孟华认出对手即石林旧识小王爷段剑青，并忆及其与冷冰儿往事，疑云丛生。
- chapter: 31
  title: 第三十回 可叹宝玉陷泥淖 非因美色爱蛮花
  summary: 姑娘追中段剑青与桑达儿争罗曼娜，孟华为桑达儿推血过宫并卷鞭卸力使段剑青落败；罗曼娜追来倾诉与段剑青采曼陀罗花旧事，孟华点破冷姑娘与真心，促成桑达儿、罗曼娜定情。段剑青约斗却突袭风府穴后逃走；孟华带伤寻其茅屋，遭其装病下药突袭，章末善心遭恶骗。
- chapter: 32
  title: 第三十一回 伪装悔改欺君子 偷听无心破诡谋
  summary: 段剑青在茅屋装病，用药气迷香与师父红发怪人欧阳冲设伏；孟华反掌击退段剑青，却被欧阳冲以雷神掌击中冷渊穴并吸入迷香而昏厥。孟华装睡偷听，得知二人要骗取张丹枫玄功要诀与剑法以解雷神掌走火入魔之危，并计划五日之内毒杀桑达儿，好让段剑青娶罗曼娜以图回疆王位、玉矿与波斯武功秘签。次日孟华依时醒来，与段剑青各演一出戏：段剑青伪装被迫拜师、假意悔改，诱孟华口述玄功；孟华将计就计，默运玄功恢复真气，准备反制。
- chapter: 33
  title: 第三十二回 情关空叹多情女 天网难逃负义儿
  summary: 孟华装伤骗过段剑青，以假玄功要诀换来混有酥骨散的“解药”，反点领机穴逼其服下；数日运功御毒、猎鹰雪鸡求生。欧阳冲归山搜捕，冷冰儿突现欲杀负义的段剑青，孟华求情并服碧灵丹与小还丹。冷冰儿以段剑青为人质逼欧阳冲撤离，图用调虎离山护孟华逃走。
- chapter: 34
  title: 第三十三回 冰湖幸免况冤掩 雪龄奇逢异士来
  summary: 冷冰儿押段剑青与欧阳冲下山交易，孟华服丹功力速复赶来。欧阳冲以隔物传功偷袭，冷冰儿天山剑法力抗并吐血，段剑青滚坡逃走。孟华快剑猛攻，欧阳冲败走。二人互述遭遇：冷冰儿曾被段剑青抛入冰湖，幸得牧民与唐加源夫妇相救并习天山剑法。孟华欲追尉迟炯，坐骑疑被段剑青骑走；途中遇唐加源试剑得回坐骑，并知欧阳冲已为唐加源剑势吓退。唐加源托孟华送洞真子锦匣给唐经天。孟华兼程赶路将追上尉迟炯时，遭天泰上人率九僧陷阱乱箭伏击。
- chapter: 35
  title: 第三十四回 打碎毒杯救大侠 计擒恶霸获名驹
  summary: 孟华破天泰上人九喇嘛阵，失雪里红后得老牧人赠马并指捷径赶至天狼谷；钱镖打碎毒酒杯救出尉迟炯，逼退阳继孟、叶谷浑。苏合揭穿双格酒壶机关，废旧格老继任并与尉迟炯定盟。江布携释空、释湛来投，孟华捏碎其琵琶骨留待吉里，获其名驹后分赴天山与大熊部。
- chapter: 36
  title: 第三十五回 苦斗番僧破金钵 忍看同道困蛮牛
  summary: 孟华骑江布骏马连日驰骋回疆草原，先遭北派大摔碑掌门劳超伯树上突袭，险战后以云麾三舞脱身；又被天竺番僧竹杖金钵缠斗，功力不敌却偷悟玄功要诀与天竺内功相通处，再以计脱身上天山。入原始林时见野牛围攻云杉上之人，传音入密辨出是金碧漪之兄金碧峰，遂不顾安危回马救援。
- chapter: 37
  title: 第三十六回 平楚日和憎健翻 天山月冷惜幽兰
  summary: 孟华投石救下被野牛逼上云杉的金碧峰，刺瞎牛首领并以马引开牛群，再搓绳将其接下并接好脱臼。金碧峰说明奉父命上天山代邀唐经天赴氓山派吕四娘百年祭，唐掌门闭关、缪长风外出、杨炎与新师兄采药未归；并告天山弟子误传孟华为清廷奸细。孟华赠马使金碧峰南归避劳超伯与天竺怪僧，自己冲寒上天山。第五日近南高峰，听得劳超伯、段剑青欲杀冷冰儿与唐加源之妻并夺罗曼娜波斯文经书；孟华踏雪追踪，于冰磨菇中以石子救下欲自尽的冷冰儿，拔剑与劳超伯日月双环剧斗，苦思以家传快刀化剑破环。
- chapter: 38
  title: 第三十七回 惘惘情怀怜二女 重重误会斗三英
  summary: 孟华悟破日月双环之法刺伤劳超伯，以小还丹救治冷冰儿；桑达儿、罗曼娜归来并说明上天山避难缘由，罗曼娜将古波斯文武功秘笈赠孟华。孟华出寻天山派却被诬为清廷奸细，先后与四弟子、祝建明郝建新七星阵及天山三英恶斗，皆手下留情破阵闯山。钟展出面以内力相试并查得郝建新所中似四川唐家毒针，案情仍纠缠于唐夫人遇刺与奸细误会。
- chapter: 39
  title: 第三十八回 奸徒巧辩迷师伯 稚子无知骂长兄
  summary: 孟华向天山长老钟展与白英奇指控劳超伯伤唐夫人、段剑青为内奸，却因杨炎（实为孟华之弟）为段剑青提供午夜不在场证言而反遭斥逐。孟华欲夺回弟弟，与白英奇、钟展交手；钟展以破绽试剑后认定其非奸细，改称孟少侠。报警钟声响起，众人赶回冰宫双华宫，见天竺僧俗反客为主据守宫门，甘建康、李信尧在内与强敌交锋；钟展夺大吉竹杖入宫，孟华连闯三关亦被请入。
- chapter: 40
  title: 第三十九回 长老险途行险着 少年神剑慑神僧
  summary: 天竺两神僧优昙、奢罗率众闯天山双华宫，要求印证武功。钟展稳住武成泰伤势后出面周旋，议定三场比试。第一场孟华以记名弟子身份对阵奢罗弟子大吉，拍落紫金钵与青竹杖取胜。第二场钟展以木剑对阵奢罗，由兵器交锋转入四掌相抵的内功对拼。比试未终，宫外突现劳超伯、欧阳冲等强敌猛攻天山弟子，甘建侯与孟华出宫应敌。
- chapter: 41
  title: 第四十回 暗器无功寒敌胆 掌门一出震群魔
  summary: 邪派与清廷高手趁唐经天闭关与钟展对战天竺僧之际大举进犯天山派。孟华点穴击败邓中艾，以重拙大剑诀重创卫托平；又尾随段剑青与唐世杰，揭破二人欲在思退崖石洞暗杀闭关中的唐经天。唐经天出关制服唐世杰，弹指神通擒欧阳冲与劳超伯（二人互害而亡），并以衣袖拆开钟展与奢罗的内功死斗，改请教佛法。
- chapter: 42
  title: 第四十一回 路转峰回消戾气 水流云散悟禅机
  summary: 唐经天与优昙法师比试止观坐禅并互证禅机,优昙消解争胜之心后率众离去;孟华与奢罗印证玄功要诀与内功心法,向唐经天揭发段剑青为奸细并转交洞真子锦匣,欲认异父弟杨炎。段剑青挟持杨炎逃走,冷冰儿苦战施玉女投梭受伤,孟华以铜钱震剑并救出落入冰缝的冷冰儿与杨炎。缪长风自天竺赶回,与优昙、奢罗以禅语及狮子吼功化解后散去,段剑青又与缪长风陌路相逢。
- chapter: 43
  title: 第四十二回 无尽疑团翻旧案 突生厅变接新娘
  summary: 段剑青诬陷孟华并引缪长风出手,双方激战至物我两忘;白英奇赶到说明段剑青才是奸细,缪长风醒悟。孟华道出身份为孟元超之子、段仇世门下,与缪长风释疑。回冰宫后唐经天收孟华为天山派记名弟子,共研无名剑法与波斯秘笈,并嘱其代往崆峒观礼。临行前孟华阅锦匣档案,知丹丘生十八年前因何洛命案与七星伴月嫌疑被逐,甘结含糊、案情疑窦丛生,唐经天复述洞妙真人为徒开脱诸说,旧案疑团未消。
- chapter: 44
  title: 第四十三回 负罪师门难自辩 临歧良友惜分飞
  summary: 唐经天向孟华细述崆峒旧案：洞妙真人为丹丘生辩护后仍将其逐出门墙，洞真子接掌后依洞玄子笔录的牟家男仆口供坐实嫌疑，而两名生还男仆已死无对证。孟华澄清洞玄子实为段仇世所杀、洞冥子为自己所伤，并点出洞冥子等人真正图谋张祖师武功秘笈。唐经天指点孟华先问明三师父真相，再择时与洞真子私下解铃。天明后孟华与杨炎、缪长风、冷冰儿辞别，偕桑达儿、罗曼娜离天山返乡。
- chapter: 45
  title: 第四十四回 欲雪师冤来赴山 却逢妖孽上名山
  summary: 孟华与罗曼娜、桑达儿在草原重逢罗海,得知罗海当选哈萨克总格老并发现玉矿,约定与柴达木义军合作抗清。孟华辞赴崆峒,沙漠中失马却救出白山和尚,获悉邓明珠与丁兆鸣追捕吉鸿。玉门关外再遇尊胜、道显,以孟家刀法折服道显并替白山求情。孟华早到崆峒隐匿,却与丁、邓同守断魂崖捷径;吉鸿由欧阳业引路、大石接应欲投清虚观,被丁兆鸣截击,欧阳业雷神掌助战,邓明珠双刀接敌。
- chapter: 46
  title: 第四十五回 午夜潜身登绝岭 暗加援手撮良缘
  summary: 吉鸿挟持邓明珠企图脱困，江上云现身对峙，孟华以弹指神通暗助点穴，吉鸿被擒交少林处置。欧阳业与大石道人密议杀人灭口及当年旧案，雷雨中欧阳业离奇失踪。洞冥子疑丹丘生所为，并透露靠山海兰察将至，且已派使毒高手追杀丁兆鸣、江上云。孟华夜伏断魂崖，见阳继孟与海兰察密会，得知洞冥子夺掌门、重翻旧案及海兰察欲借机一网打尽侠义道的阴谋；金碧漪突被挟持呼救。
- chapter: 47
  title: 第四十六回 忍见佳人落魔享 勇将宝剑斗强粱
  summary: 辛七娘挟持金碧漪途中遭遇孟华奇袭，孟华以弹指神通与快剑迫其松手，又连破毒指环与毒液，随即救出滚落山坡、中了酥骨散的金碧漪。海兰察与阳继孟先后出手，孟华以无名剑法与之缠斗百余招未分胜负；辛七娘趁乱再度掳走金碧漪上断魂崖。洞冥子赶到后，海、阳二人托词放过孟华，约定翌日搜捕。孟华深夜潜入清虚观，挟制大石道人并寻声逼近洞冥子与辛七娘商议人质与解药之处，决意擒洞冥子以换金碧漪。
- chapter: 48
  title: 第四十七回 真假难分误大事 是非不辨佯糊涂
  summary: 辛七娘欲交解药之际，假冒洞冥子的快活张被孟华误攻；真洞冥子与海兰察赶到，辛七娘毒指环令孟华中毒被擒。洞冥子要杀孟华，掌门洞真子因锦匣事留下审问，却不信孟华关于丹丘生冤案与海兰察阴谋的警告，将其投入地牢。孟华以波斯内功、洗髓经与玄功要诀等解毒复功，制服送饭弟子后逃出清虚观。会场外快活张赠人皮面具并称已知海兰察图谋，孟华混入大会时洞真子正宣布让贤洞冥子、着手清理门户。
- chapter: 49
  title: 第四十八回 玉虚子离厅暴毙 丹丘生委曲求全
  summary: 崆峒派同门大会上，洞真子推举洞冥子继任掌门，会中屡遭神秘声音斥责；辈份最尊的玉虚子出场，力主按洞妙遗志以丹丘生继任并欲道破旧案真相，却遭伪装散工的海兰察以七煞掌暗算，离厅暴毙。金逐流断为七煞掌所伤，大石道人缉凶未获。大会改先清理门户审丹丘生，丹丘生拒不分辩；段仇世挺身证明洞玄子为自己所杀，雷震子断石林一役为私人仇怨。
- chapter: 50
  title: 第四十九回 剑气纵横惊四座 妖氛猖獗骇群豪
  summary: 洞真子取消丹丘生杀害洞玄子罪名后继续审讯。孟华脱下面具上台辩护，指出伤洞冥子者实为三年前之自己，并以指代剑一人施展连环夺命剑法挫败大石、大松，拗断其剑。龙木公以毒剑试天山剑法，被孟华以追风、大须弥等剑式击败，毒剑反插己身，旋遭石子灭口。审讯将判时江上云、丁兆鸣押吉鸿与邓明珠赶到，又有人暗算吉鸿被江上云打落石子。
- chapter: 51
  title: 第五十回 堪叹同门施霉计 竟求大盗抢新娘
  summary: 断魂崖石子暗器击杀替死鬼焦蛟后,丁兆鸣、江上云于崆峒大会上交回少林叛徒吉鸿,并揭出欧阳业曾由大石道人接引上山、随后神秘失踪。吉鸿当众供述十八年前何洛雇其为独脚大盗劫牟小姐嫁妆并串通假抢新娘,实欲借机暗害伴郎丹丘生;吉鸿至古庙时局面已乱,被丹丘生三招刺伤后放出,洞真子、洞冥子则仍以洞玄子旧证与常理质疑其词。丁兆鸣、江上云再举途中辛七娘以梅花针行刺吉鸿、几近灭口,并以碧灵丹、毒针为证,洞冥子仍狡辩指使不明。金碧漪忽然闯入,指清虚观包庇辛七娘,要父亲金逐流替她报仇。
- chapter: 52
  title: 第五十一回 揭发奸谋呈密信 原来毒妇害亲夫
  summary: 金碧漪当众指认辛七娘曾将其掳为人质囚于清虚观，洞真子、洞冥子以失察推诿。神秘人以腹语揭发洞冥子勾结妖妇，现身使出沾衣十八跌，脱去易容后竟是十八年前失踪新娘牟丽珠。牟丽珠出示洞玄子亲笔情书，揭穿后母韩紫烟实为辛七娘师妹、清廷奸细，毒死中州大侠牟一行；更大的奸细则是亲家洞玄子。金逐流证实义军早疑牟家有卧底，并道破送解药与当年夜探牟府者皆为快活张。赵一武等赴断魂崖搜捕落崖的辛七娘。
- chapter: 53
  title: 第五十二回 一篑难将余骨补 半途空托寸心盟
  summary: 金逐流据快活张十八年来的调查，力主丹丘生无辜。牟丽珠续述旧案：刘妈截获韩紫烟密信、智擒并击杀送信的郝大志，得知洞玄子父子买凶吉鸿与两名御林军高手欲害丹丘生；她中途引开丹丘生告密，反与何洛恶斗，遭海兰察、欧阳业暗算晕厥。当场点明两军官即今之御林军统领海兰察与副统领欧阳业。丹丘生因玉虚子遇害、师门败类未绝，打破对师父的誓约，讲述快活张预警、古庙剑伤吉鸿及山谷中何洛与两军官串通做戏的经过。
- chapter: 54
  title: 第五十三回 谋害同门伤惨变 顾全大局屈沉冤
  summary: 牟丽珠与丹丘生当众剖白十八年前真相：何洛与海兰察合谋诱杀，牟丽珠刺死何洛，二人重伤后归还义军财物并分手；洞妙真人为顾全大局委屈逐徒并让位于洞真子。同门公决丹丘生无罪并拥其为掌门。牟丽珠再揭洞冥子伪造七星伴月伤痕、勾结辛七娘毒杀洞妙真人；洞冥子挟持洞真子，海兰察现身以炸药、大炮要挟，要洞冥子掌门并押解丹丘生、牟丽珠、孟华。
- chapter: 55
  title: 第五十四回 换日偷天惊妙手 引狼入室拼残生
  summary: 辛七娘被释放后，海兰察以炸药大炮限期要挟。快活张挟欧阳业现身，揭其串通谋害洞妙真人之罪，并已偷换炸药、破坏大炮；蛇焰箭仅燃烟花，发炮膛炸毙褚兆。洞真子趁乱与洞冥子互拼，扼死师弟后伤重身亡，嘱丹丘生报仇。混战中海兰察杀欧阳业，先与雷震子交手再对丹丘生；丹丘生连环夺命剑法占优，闻牟丽珠长啸露破绽，遂让孟华替战并承诺胜负一场而决。孟华融汇无名剑法与天山剑法破沾黏劲，海兰察施天魔解体大法与七煞掌，波及赵烈，战况转急。
- chapter: 56
  title: 第五十五回 凤泊鸾飘悲侠侣 龙争虎斗骇群豪
  summary: 孟华与海兰察一场而决，海兰察施天魔解体大法催动七煞掌，孟华以大须弥剑式慢剑划圈相持。丹丘生于断魂崖救起牟丽珠，以排云驶电、白虹贯日逼阳继孟自跳崖下；辛七娘被梅山二怪抬走。决斗末刻缪长风以狮子吼功暗助，孟华击倒海兰察。清虚观庆捷后，缪长风命孟华赴回疆充义军使者并赴罗海之女婚宴；段仇世闻段剑青劣迹，嘱孟华遇则废武留命。
- chapter: 57
  title: 第五十六回 了却恩仇情未尽 难明友敌费疑猜
  summary: 段仇世转达牟丽珠留言，丹丘生决心寻她并安排代理掌门。金逐流允婚，金碧漪随孟华赴回疆。途中雪山喷泉遇老叫化与大浮法师，互试武功、共食雪鸡；金碧漪试探对方与西藏、清廷鹰爪的关联，二人仓皇告辞。
- chapter: 58
  title: 第五十七回 衣钵难传嗟劣子 雪山脱险识奸谋
  summary: 金碧漪向孟华道破老叫化实为北丐帮故帮主仲长统之子仲毋庸，并详述其少时狂妄、冒功、刺伤师兄宣羽赞及涉嫌勾结清廷鹰爪、终被逐出丐帮的往事；又因大浮法师眼神闪烁，疑二人欲抢先至鲁特安旗图谋罗海。二人兼程上路，山口遭遇人为雪崩，孟华以凤点头、斗转参横四两拨千斤拨开巨石，吓退大浮法师。第三日赶至鲁特安旗，适逢桑达儿与罗曼娜婚期，接风欢宴。当夜段剑青潜入欲劫新娘，金碧漪以鲤鱼打挺、玉女投梭相搏，又凭大须弥剑式挡住两名蒙面接应；孟华传音入密驰援，以三转法轮等击败蒙面人，段剑青与蒙面人皆有空骑接应逃脱。
- chapter: 59
  title: 第五十八回 格老拒封伸大义 土王被诱入歧途
  summary: 罗海女儿婚礼夜举行大规模刁羊大会。金碧漪在姑娘追中遭车居族王子乌里赛拦路逼婚并交手,乌里赛自称段剑青师兄后遁去,与两骑川马会合。帐篷中卫托平、叶谷浑携乌里赛以玉璧、夜明珠及册封藩王诏书诱罗海归顺,并以清军与柴达木"强盗"恫吓;罗海以吴三桂削藩下场拒封,撕毁圣旨,宣布与柴达木义军结盟。乌里赛借拥抱以肩车式偷袭孟华,反被沾衣十八跌摔跪。翌日天明孟华、金碧漪抄小路截击,金碧漪擒乌里赛,卫、叶逃遁;乌里赛之番僧师父现身长啸夺徒并欲废金碧漪武功,金碧漪以天山剑法追风剑式与穿花绕树身法脱身。
- chapter: 60
  title: 第五十九回 苦口婆心终不悟 恶徒毒妇共偕亡
  summary: 孟华以大挪移法与剑中夹掌暂退番僧,未问得段剑青下落;老猿石上见崆峒连环夺命剑痕,回营却遇宋腾霄。倒叙丹丘生接掌门后经宣羽赞得知梅山二怪行踪,雪山巧遇仲毋庸、段剑青;文比老猿石遭毒雾金针烈焰弹暗算疗伤。伤愈遇梅山二怪挟辛七娘,牟丽珠赶到以玉女投梭与醉八仙重创二怪,丹丘生掌毙鹿洪,辛七娘扼死朱角,临终吐露韩紫烟再嫁崔宝山。
- chapter: 61
  title: 第六十回 孽债难偿空有恨 恶缘自缔倩谁怜
  summary: 丹丘生与牟丽珠重逢后约定易容混入清军行刺崔宝山与韩紫烟；罗海一方亦议定由孟华、金碧漪行刺并以桑达儿接应。韩紫烟因丹丘生再现而惊惶，并借笼络段剑青自遣。牟丽珠潜入内室挟持韩紫烟欲引崔宝山自投罗网，却中慢性迷魂香，反被韩紫烟喊破；崔宝山率卫托平、叶谷浑、刘挺之及孙道行、张火生冲入，牟丽珠昏迷未脱。
- chapter: 62
  title: 第六十一回 毒妇迷香困侠女 神偷妙手戏将军
  summary: 丹丘生破屋救出中迷香的牟丽珠，与孟华、金碧漪杀出清军大营，峡谷中遭卫托平等及乌里赛、迦密法师围攻；迷香迟发令双方战力尽失。桑达儿接应并与崔一伦比箭，孟华以弹指神通救乌里赛。快活张火烧清军粮草并盗得解药救醒众人，告知孟大侠、尉迟炯等已入回疆增援，又透露韩紫烟与段剑青失踪；随后独自再去联络援军。
- chapter: 63
  title: 第六十二回 义师奋战摧强虏 侠士攻心释战俘
  summary: 崔宝山以五官四道四僧分三路攻山；尉迟炯夫妇驰援，祈圣因钱镖重创五官，尉迟炯刀破四僧四道。孟元超父子会合，罗海哈萨克军射落帅旗，联军夜袭得胜后依孟元超之议退兵。丹丘生牟丽珠擒崔一伦并追韩紫烟段剑青；孟元超攻心释放崔一伦。孟华金碧漪赴雪山接应师父。
- chapter: 64
  title: 第六十三回 罪孽终难逃一死 风霜历尽订三生
  summary: 孟华、金碧漪循毒香寻至雪山,遇段剑青以假解药毒害师伯迦象;混战中迦象以狮子吼功耗尽功力坠崖,段剑青逃走并暗算韩紫烟。韩紫烟中自身毒针惨死,牟丽珠报父仇后与丹丘生团圆,快活张撮合二人并约往截大内运粮高手。谷中张火生、孙道行追杀仲毋庸,宣羽赞以混元一忌功相救;仲毋庸将功赎罪吐露崔宝山声东击西计划后自尽。孟华回营报讯,罗海、孟元超将计就计设伏;崔宝山识破后正面猛攻,桑达儿、孟华率五百弓手死守老弱营地。
- chapter: 65
  title: 第六十四回 折戟消乒歌牧野 沉沙洗甲看流星
  summary: 诸青崖以监军身份助崔宝山将计就计正面出击；桑达儿率五百人扼险，崔一伦以苦肉计暗助义军。乌里赛率车居族、大熊族来援，孟华金碧漪与诸青崖恶斗后清军大溃。杨炎于乱军中失踪。义军围困绝龙岭半月，孟元超遣孟华、金碧漪夜探敌营，龙骑兵中计失能，崔一伦劝降，孟华金碧漪刺废诸青崖，崔宝山率部停战解甲。回疆战事结束，孟华寻弟与段剑青多年未果，与金碧漪行侠草原，被牧民比作牧野流星。
