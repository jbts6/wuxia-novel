- chapter: 1
  title: 第十一回 劫后重逢 现身幽谷 孽由自作 曳尾泥涂
  summary: 全书自齐勒铭与武当五老比剑扬名写起，围绕卫天元、上官飞凤、齐漱玉、楚天舒等人的恩怨情仇与华山派掌门天权真人被害疑云展开，涉及齐家、穆家、剪家、华山、武当及京师统领府等多方势力；幻剑与灵旗的名号屡次震慑对手，终至劫后重逢、幽谷现身与因果报应的收束。
- chapter: 2
  title: 第十二回 解脱尘丝 仗他幻剑 擎开世网 奉我灵旗
  summary: 卫天元等掩埋穆志遥后取其方竹戒指，假冒御林军统领潜入白驼山。宇文浩武功被废送回，穆欣欣劝宇文雷逃走未果。卫天元身份被识破后与上官飞凤联手激战白驼山主，齐勒铭、穆娟娟外应制敌；宇文雷、穆好好、穆欣欣终因黑心兰毒同归于尽，白驼山制毒机关被焚。姜雪君出家为慧净求心安，卫天元下山寻上官飞凤，在日喀则击退鲁廷方、梅清风、麻赞哈。华山群仙观中楚天舒与齐漱玉、青鸾与鲍令晖各成眷属，全书收束。
