- chapter: 1
  title: 第一回 未泯杂念参无相 三戒当持号不歧
  summary: 楔子与第一回：何玉燕与耿京士私奔归家，戈振军指耿京士杀师通敌并恶斗；耿京士使出太极剑法，何玉燕产子后戈振军刺死耿京士，何玉燕托孤而亡。无极道长指出凶手另有其人后伤重而死。戈振军托蓝靠山抚孤，上武当禀告掌门无相；霍卜托京师暴毙棺空。戈振军受戒号不岐，随无色学太极剑，遗孤名蓝玉京，连环凶案未破。
- chapter: 2
  title: 第二回 各逞机谋缘底事 自疑身世感亲情
  summary: 不戒奉无相真人之命赴荒山发掘无极道人遗骨，发现坑中并排三具骷髅，且何亮死于淬毒梅花针；蒙面人联同常五娘、周雄伏击，不戒中毒重伤，幸得牟一羽击退蒙面人并护送回山。武当山展旗峰下，蓝玉京与蓝水灵因身世闲言与太极剑拆招生出疑云；不岐自辽东归来，回忆与郭东来七星剑法恶战及十六年前何玉燕、耿京士之死，疑云更深。
- chapter: 3
  title: 第三回 空嗟变幻迁枯骨 莫测高深立掌门
  summary: 雨夜中不岐坐立不安，无量报不戒重伤抬回。不戒中常五娘青蜂针并遭逆运太极神功，回光返照确认郭东来后气绝。牟一羽呈上盘龙山三副遗骨却独留何亮头盖骨；无量笼络不岐欲助其接掌门。掌门闭关后敲钟大会，代先师收牟沧浪为道号无名，随即宣布其接任武当新掌门，同门以剑法资格相争，比武伏线拉起。
- chapter: 4
  title: 第四回 恩同义父犹藏诈 逼露庐山始识非
  summary: 无相真人讲述三十六年前代师以太极剑法击败昆仑派玄贞子飞鹰剑法，并与其徒向天明订下再比之约。众弟子得知号称剑圣的向天明已三招羞辱无极派钟柳堂，且当日已递拜帖。无量传音嘱不岐提防牟沧浪（无名）与向天明串通。来者戴人皮面具自称玄贞子门下，先后胜过不波、不岐，无名出面隔开并以掌代剑借力破其面具，揭出其人实为向天明之徒东方亮。东方亮认输下山，声称乃代师试探，无名允与向天明另约；武当弟子因而折服于新掌门，无相则忧后继不如昆仑一系一代强于一代。
- chapter: 5
  title: 第五回 无相无碍观自在 不歧不谈训终违
  summary: 无相真人临终将太极拳经与玉玺交予无名，立其为武当派第十九代掌门后仙逝；无名升不波、不歧为长老，并遣牟一羽赴辽东寻七星剑客郭东来。不歧寻蓝玉京不得，聋哑道人指书石路告其奉真人之命下山，并讽不歧教坏徒弟。常五娘假扮道姑至蓝家索人，道破蓝玉京非蓝靠山亲生；不悔与蓝水灵伏击交手，双方互伤，常五娘逃脱。无名救治不悔，命无色追捕并兼访京儿，又安抚不歧并令其助不悔拨毒。蓝玉京依师祖字条下山，得内功心法、太极剑法与银票，奉命往少林求慧可指引寻七星剑客，未得师命前不得回山。
- chapter: 6
  title: 第六回 密遣下山传秘笈 偶逢道友创新招
  summary: 蓝玉京研读并焚毁师祖所传心法剑诀，在破庙自悟太极剑理时偶遇东方亮，七日比剑教学相长；下山途中遇常五娘突袭中毒，东方亮夺解药相救却隐瞒三代仇怨。无色道人途中误战东方亮险胜，为京儿驱毒并告以师祖仙去、牟沧浪继任及本门十六年来暗杀秘案，蓝玉京仍遵师祖之命继续前往少林。
- chapter: 7
  title: 第七回 萍水孽缘难自解 江湖侠骨恐无多
  summary: 蓝玉京独上少林寻慧可。常五娘被唐仲山责打后以真假话周旋，无色欲留活口查武当惨案，唐仲山用同味迷药演假死瞒过无色，并与牟一羽按牟沧浪之意达成交易。常五娘“复活”后透露蓝玉京将去少林。牟一羽途中被东方亮剑挫，蓝水灵女扮男装寻弟，受牟一羽鼓动拟暗杀东方亮，却与东方亮同行并得其授运行内息之法，心绪动摇。
- chapter: 8
  title: 第八回 幽谷寄情收义女 金盆洗手斥强梁
  summary: 西门燕拦下表哥东方亮，挟蓝水灵同归；客店夜遇迷香贼人，蓝水灵力战，西门燕醒后连杀三贼。二人入幽谷见西门夫人，蓝水灵被收为干女并习武三月。陆志诚报东方亮入断魂谷，夫人令燕、灵持戒指往少林求慧可寻人，并授白鹤亮翅、嘱见武当新掌门。
- chapter: 9
  title: 第九回 遍洒虚空无障碍 妙参禅理出重关
  summary: 西门燕与蓝水灵下山途中救下为慧可传口信的挑水和尚了缘，得知东方亮与蓝玉京曾至少林后，了缘伤重身亡，二人决意冒险往断魂谷。蓝玉京奉无相真人遗命赴少林寻慧可，先遇虬髯汉子大擒拿蹊跷坠崖，后与圆通、圆业比武，东方亮暗中指点并自与圆性十招印证，来历被本无识破为剑圣向天明高足，因寺规不得入见。蓝玉京独见慧可，询七星剑客郭东来下落并触及耿京士疑云；慧可应请出山，连闯圆真武功、本无内功与痛禅禅机三关，终得遍洒虚空、出得山门。
- chapter: 10
  title: 第十回 梦幻尘缘难再续 飘零蓬梗欲何依
  summary: 慧可考校出少林后，向蓝玉京讲述小五义往事及牟沧浪、殷明珠旧缘，二人东行七日抵断魂谷寻东方亮。韩翔款待并索求向西门夫人换取绿林金牌权柄；宴中常五娘以毒烛迷香制住二人。东方亮自地道现身，以牟沧浪隐私与戒指与常五娘交易换取蓝玉京，将慧可与蓝玉京暂交韩翔看管。二人囚于山洞，饭中掺酥骨散；蓝玉京借无相内功心法缓慢恢复并练太极剑，蒙面人下洞以太极剑理拆招，韩翔许诺胜其一招半式即放人。
- chapter: 11
  title: 第十一回 身陷囚牢成绝学 客奇蒙面创新招
  summary: 蓝玉京与慧可被囚断魂谷，蒙面人以木剑连日指点太极剑法；慧可装病试探，证实蒙面人为东方亮并以真气与人参相救。西门燕扮丁六姐携蓝水灵入谷挟制韩翔，东方亮身份暴露后逃出。班大超反叛封洞，蓝玉京借庄子之理挪开巨石救出众人，并截断班大超毒袖箭；慧可劝韩翔化解西门牧旧仇。脱险后姐弟分途，蓝水灵由陆志诚部属凤香主送回武当，蓝玉京与慧可另寻辽东隐士。
- chapter: 12
  title: 第十二回 陌路逢仇施辣手 寒潭照影起疑心
  summary: 蓝水灵发觉凤栖梧、平大婶违背陆志诚承诺，实欲送她回百花谷。途中遭龙门帮龙霸天、殷天德、司马操等截击：平大婶重伤，凤栖梧被旧怨司马操鞭笞，蓝水灵先后削去殷天德眉毛并与龙霸天缠斗，幸得暗中跟踪的牟一羽以石子击膝，断其指而逼退龙门帮。蓝水灵拒赴百花谷独自上路，在风陵渡遇牟一羽；西门燕赶来纠缠，牟一羽接战并寒潭照影，察觉己与西门燕相貌神情相似、隐疑殷明珠与父辈纠葛，遂约西门燕冒充兄妹同赴辽东寻东方亮，蓝水灵趁机脱身回武当。
- chapter: 13
  title: 第十三回 鸿爪雪泥何处觅 冰心铁胆两相牵
  summary: 牟一羽与西门燕结伴入辽东寻访蓝玉京及西门燕表哥；途中蒙面人留下掌印与石刻警告。蓝玉京与慧可在乌鲨镇遭鱼行围殴，查出十七年前耿行二夫妇与七星剑客线索，夜探金鼎和鱼行，擒廖掌柜得知霍卜托改名郭璞居于金陵。慧可伤重身亡，嘱咐不可将今夜之事告知现任掌门。西门夫人赶至辽东照料受伤的牟一羽并认其为干儿；牟一羽视其为母仇却心神动摇。蓝玉京被蒙面人点穴带走。
- chapter: 14
  title: 第十四回 中州一剑应无恙 海角何人自放歌
  summary: 常五娘欲挟持西门燕，蓝玉京出手解救并迫退常五娘；西门夫人以彩绳力敌嘉错法师，蓝玉京一剑穿破袈裟。金鼎和与韩超欲胁西门夫人、牟一羽上盛京交换七星剑客消息，西门一方拒绝。七星剑客郭东来海上啸歌、拒见故人，后在陆志诚下毒时以啸声与解药相助；蒙面人受其约束放过牟一羽。西门夫人假装失功吓退英松龄等人，牟一羽独自离去，西门母女先图出关。
- chapter: 15
  title: 第十五回 独处墓园怀旧侣 惊闻密室揭私情
  summary: 不岐于无相真人墓园练剑怀旧，常五娘易容逼他践约；紫霄宫前西门燕乔装折断奸细，牟一羽毁青蜂针灭迹。蓝水灵携西门燕归家后，不岐夜杀蓝靠山夫妇并自白曾杀耿京士；蓝玉京知身世归来，唐仲山于松林擒获常五娘。
- chapter: 16
  title: 第十六回 应笑我乱挥宝剑 问何人会解连环
  summary: 牟一羽奉父命见常五娘反遭唐仲山迷幻药暗算，蓝水灵被掳；西门夫人救醒儿女并揭开自己是牟一羽生母。不歧险被嫁祸自尽，耿玉京在无名真人传声下夺剑相救。王晦闻截下常五娘要挟牟沧浪让位，东方亮与向天明在武当山冲突后离去。
- chapter: 17
  title: 第十七回 与今群雄惊诡变 武当一剑灵锋芒
  summary: 无名真人打坐难安，朝廷钦使褚千石、赵太康来紫霄宫册封掌门。赵太康与牟一羽掘出连横尸身，见脸呈青色，断为常五娘青蜂针，并指唐二先生改毒色、杀人灭口；无名真人点出连横乃黑鲨帮罗江峰副手。不歧向耿玉京吐露十八年前何其武遇害真相，疑凶手轻功近东方亮，旋即中指窗口遭暗算身亡。耿玉京追凶，与乌鲨镇蒙面人剧斗，识破其为聋哑道人后心软未杀，反被打昏。无相真人出殡入土之际，灰衣人突至托住棺材。
- chapter: 18
  title: 第十八回 生死茫茫如梦幻 恩仇了了隐江湖
  summary: 无相真人葬礼上，剑圣向天明携旧约讨剑；耿玉京代祖出战，以武当剑意闭目应敌，破飞鹰回旋剑法末招，声震全场。无名真人欲让掌门于玉京，无量长老以结交东方亮及耿京士通敌嫌疑阻挠；本无大师开解门户成见。王晦闻揭开聋哑伪装，牵出青蜂针害死不歧及掌门阴谋，西门牧、牟沧浪、西门夫人等亦现身剖白旧日恩仇。终局牟一羽接掌武当，耿玉京与西门燕行侠关外，东方亮别立支派，三人合称武当三剑客。
