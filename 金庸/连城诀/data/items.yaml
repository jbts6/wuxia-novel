- id: item_jin_bo_xun_hua
  name: 金波旬花
  aliases: []
  type: 丹药
  description: |-
    说明：金波旬花是从天竺传来的奇毒之花,‘波旬’是梵语中‘恶魔’之意,天竺人称之为‘恶魔花’。花瓣黄得像金子,闪闪发亮,花朵形似荷花。凌退思将此花涂在女儿棺木上,丁典闻到花香便即中毒,神照功无法施展。此毒深入血管,使血液渐渐凝结,天下无药可解。
    天竺传来的奇毒‘恶魔花’,金色花瓣娇艳无比,毒性天下无药可解
- id: item_lian_cheng_jue
  name: 连城诀
  aliases: []
  type: 其他
  description: |-
    说明：连城诀是一份藏有宝藏秘密的密码文书,记录了梁元帝宝藏的位置。万震山、言达平、戚长发三人都想得到。需配合唐诗选辑解读。
    藏有宝藏秘密的密码文书,非武功秘籍
- id: item_tang_shi_xuan_ji
  name: 唐诗选辑
  aliases: []
  type: 秘籍
  description: |-
    说明：唐诗选辑是藏有连城诀密码的书籍,梅念笙传给丁典,丁典传给狄云。需配合连城诀解读宝藏位置。
    藏有连城诀密码的书籍,需配合连城诀解读
- id: item_wu_can_yi
  name: 乌蚕衣
  aliases: []
  type: 防具
  description: |-
    说明：乌蚕衣是一件刀枪不入的护身宝衣,用大雪山乌蚕蚕丝织成。丁典从雪山派敌人身上取得后赠予狄云,助其多次脱险。
    刀枪不入的护身宝衣
- id: item_xue_dao
  name: 血刀
  aliases: []
  type: 武器
  description: |-
    说明：血刀是血刀门的镇派宝刀,与血刀经配合使用,威力强大。
    血刀门的镇派宝刀
