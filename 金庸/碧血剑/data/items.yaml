- id: item_jin_she_jian
  name: 金蛇剑
  aliases: []
  type: 武器
  description: |-
    说明：金蛇郎君夏雪宜的佩剑,剑头分叉如蛇信,可攒刺亦可勾锁敌人兵刃,倒拖斜戳皆可伤敌,比之寻常长剑增添不少用法。剑身碧绿,映着火光似一条活蛇扭动。袁承志持此剑行走江湖,名动天下。
    金蛇郎君遗物,剑头分叉形状古怪,锋利无比,后为袁承志所用
    来历：金蛇郎君夏雪宜遗物,藏于华山山洞石壁之中
    效果：剑锋锐绝伦,无坚不摧,剑尖两叉既可攒刺亦可勾锁敌人兵刃;伤害
- id: item_jin_she_zhui
  name: 金蛇锥
  aliases: []
  type: 暗器
  description: |-
    说明：金蛇郎君夏雪宜的独门暗器,形如小蛇,通体金黄,锋利异常。配合秘笈中所载发射暗器心法使用,手法阴毒狠辣,出手诡谲难防。
    金蛇郎君独门暗器,配合金蛇锥手法使用
    来历：金蛇郎君遗物,随金蛇秘笈一同藏于华山山洞
    效果：暗器手法精妙,出手诡谲难防,可连发多枚;伤害
- id: item_qing_zhu_zhang
  name: 青竹杖
  aliases: []
  type: 武器
  description: |-
    说明：青竹帮帮主程青竹的随身兵器,以青竹制成。程青竹后来收阿九为徒,将青竹杖传给她使用。阿九断臂后仍以此杖行走。
    程青竹的兵器,后传给阿九使用
    来历：程青竹随身兵器,后传阿九
    效果：杖法灵动,兼有长兵器之利;伤害
- id: item_ruan_hong_zhu_suo
  name: 软红蛛索
  aliases: []
  type: 武器
  description: |-
    说明：五毒教教主何惕守的独门兵器,以数十条非丝非革的软索组成,挥出时可缠绕对手,索上或喂有剧毒。
    何惕守独门兵器,以蛛丝制成,柔软坚韧
    来历：五毒教独门兵器
    效果：软索缠绕对手,兼有毒性;控制
- id: item_yu_zan
  name: 玉簪
  aliases: []
  type: 其他
  description: |-
    说明：阿九头上的碧玉簪,袁承志借用来破温氏五老的五行阵。以一碰即碎的玉簪对敌,令对手心无所忌而露出破绽,实为上乘武学策略。后成为阿九与袁承志之间的信物。
    阿九的碧玉簪,赠与袁承志,后用于破五行阵
    来历：阿九头饰,后赠与袁承志
