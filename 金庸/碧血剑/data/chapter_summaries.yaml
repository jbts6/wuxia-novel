- chapter: 1
  title: 危邦行蜀道 乱世坏长城
  summary: 明末崇祯六年，浡泥国那督之子张朝唐携仆张康来中土应试，途经广东鸿图嶂时遭遇官兵追杀，幸得武会镖局镖师杨鹏举出手相救。三人结伴西行，误入圣峰嶂山宗秘密聚点。山宗成员乃袁崇焕旧部，隐居深山以避朝廷追杀。杨鹏举窥探密室遭擒，自断二指立誓守秘。次日山宗大祭袁崇焕，闯军使者田见秀、崔秋山等前来拜祭，揭穿混入的东厂奸细，双方商议结盟之事。
- chapter: 2
  title: 恩仇同患难 死生见交情
  summary: 田见秀与山宗众人商议结盟共抗朝廷，孙仲寿提出条件：闯王成功后须抗御满洲鞑子，且须由朱姓宗室为帝。崔秋山展露高强武艺，袁承志恳请学武，崔秋山传其伏虎掌法，倾囊以授。官兵突袭圣峰嶂，孙仲寿等人分路突围。崔秋山带袁承志从后山杀出，途中中毒箭受伤，袁承志为崔秋山吮吸毒血。二人辗转得安大娘收留救治，崔秋山伤愈后离去。
- chapter: 3
  title: 经年亲剑铗 长日对楸枰
  summary: 安大娘托哑巴带袁承志上华山，临别赠金丝镯子以作纪念。袁承志登华山绝顶，拜穆人清为师，修习华山派十段锦、破玉拳、混元功等武功。木桑道人来访，赠乌金丝背心防身至宝，与穆人清对弈。木桑以棋艺赌武功，传授袁承志轻功和暗器满天花雨手法。二人在华山绝顶相处半年，袁承志棋艺武功俱大进。
- chapter: 4
  title: 矫矫金蛇剑 翩翩美少年
  summary: 袁承志在华山后山玩耍时发现隐秘石洞，洞中有金蛇郎君夏雪宜的遗骸、金蛇剑、金蛇锥和金蛇秘笈。袁承志从秘笈中习得金蛇剑法及破五行阵之法，武功大进。秘笈所载武功奇想怪着，往往与武学要旨背道而驰却自具克敌制胜之妙。袁承志深研其中招式，几近走火入魔，终凭深厚根基化险为夷。金蛇郎君遗骸旁还有藏宝图，指向南京魏国公府。
- chapter: 5
  title: 山幽花寂寂 水秀草青青
  summary: 袁承志奉师命下山历练，夜遇温青，二人赏月吹箫，一见如故结为兄弟。温青吐露身世之苦：她是私生女，母亲受人欺侮生下她，自幼寄居外公家备受冷眼。袁承志同病相怜，二人感情日深。温青劫了闯王军饷黄金，安小慧前来讨要。袁承志居中调解，温青负气不还。袁承志夜探温家，与温氏五老交手。
- chapter: 6
  title: 逾墙搂处子 结阵困郎君
  summary: 温仪道出金蛇郎君夏雪宜往事：夏雪宜全家被温家所杀，苦练武功后前来复仇，却与温家女温仪相爱。温氏五老设下毒计暗算夏雪宜，将其囚禁，挑断手足筋脉。夏雪宜后骗温家五老上华山寻宝，趁机逃脱。袁承志以玉簪为兵器破五行阵，击败温氏五老，救出温仪。温仪最终自尽身亡，青青悲痛万分。温仪临终前将青青托付给袁承志照顾。
- chapter: 7
  title: 破阵缘秘笈 藏珍有遗图
  summary: 袁承志与青青携温仪骨灰离开温家堡，青青女扮男装，二人继续闯荡江湖。青青因安小慧之事对袁承志大发醋意，袁承志装病试探，青青吐露真情。二人来到南京寻访魏国公府以求宝藏，遍寻不获。秦淮河上青青吹箫，凤阳总督府马公子前来调戏，被青青杀死。二人在南京与黄真、崔希敏、安小慧会合。
- chapter: 8
  title: 易寒强敌胆 难解女儿心
  summary: 闵子华召集武林大会为兄报仇，要杀焦公礼。袁承志暗中旁观，得知归辛树门人梅剑和等人亦来助阵。焦宛儿向袁承志求助。袁承志出面调解，以金蛇郎君遗物中的书信揭露真相，化解焦家与闵子华的仇怨。归辛树门人对袁承志不满，双方产生冲突。仙都派的戒杀刀是自杀用的兵器，不可用以杀人，此事牵出更大的阴谋。
- chapter: 9
  title: 双姝拚巨赌 一使解深怨
  summary: 袁承志与归辛树比武，穆人清出面制止同门相争。阿九在南京出现，袁承志察觉她武功出自华山派路数。阿九容貌绝丽，袁承志心生好感。洪胜海向袁承志讲述被归二娘、孙仲君师徒迫害的惨事，袁承志对华山派门人滥杀无辜深感不满。穆人清命袁承志前往北京打探朝廷动静。阿九身份神秘，袁承志对她既好奇又怜惜。
- chapter: 10
  title: 不传传百变 无敌敌千招
  summary: 穆人清传授袁承志华山剑法，木桑道人传授神行百变轻功。山东群雄汇聚，泰山大会召开。程青竹、沙天广等人争夺地盘。袁承志以武功折服群雄，众人推举他为七省武林盟主。袁承志率众前往北京，途中与五毒教何铁手初次交锋。铁罗汉与胡桂南不打不相识，化敌为友，一同追随袁承志。
- chapter: 11
  title: 慷慨同仇日 间关百战时
  summary: 袁承志率群雄抵达北京，与程青竹、沙天广等人安顿下来。阿九在北京出现，与袁承志再度相逢。袁承志探知阿九与崇祯皇帝的关系非同寻常，心中疑虑。五毒教何铁手率众北上，以金蛇大圣为由寻衅袁承志，要求他去掉金蛇王称号。阿九实为崇祯皇帝之女长平公主，身世复杂，与袁承志的感情充满波折。
- chapter: 12
  title: 王母桃中药 头陀席上珍
  summary: 五毒教与袁承志的冲突升级，何铁手率众围攻。袁承志独闯五毒教驻地，以金蛇锥杀毙巨獒，深入敌腹。何红药出手与袁承志交战，二人激烈过招。袁承志武功高强，五毒教众人奈何他不得。何铁手对袁承志的武功心生仰慕，由敌转友之心渐生，拜师学艺之心渐切。
- chapter: 13
  title: 挥椎师博浪 毁炮挫哥舒
  summary: 袁承志与五毒教多次交手，以金蛇锥法和神行百变轻功大败五毒教众。何铁手对袁承志由敌转敬，暗生情愫，甘愿拜其为师。袁承志与阿九感情渐深，阿九赠玉簪为信物。青青察觉二人暧昧，醋意大发，与袁承志怄气。袁承志在国事与儿女私情间左右为难。
- chapter: 14
  title: 剑光崇政殿 烛影昭阳宫
  summary: 袁承志夜探皇宫，与玉真子激战。玉真子武功极高，袁承志以金蛇剑法和华山剑法与之周旋。阿九身处皇宫之中，袁承志得知她竟是崇祯皇帝的长平公主，大为震惊。崇祯皇帝砍断阿九一条臂膀，袁承志悲痛万分，将阿九救出救治。崇祯皇帝性情多疑，砍断亲生女儿臂膀，令袁承志悲愤交加。明朝末世风雨飘摇。
- chapter: 15
  title: 娇娆施铁手 曼衍舞金蛇
  summary: 五毒教何铁手率众寻衅，袁承志以金蛇锥杀毙五毒教巨獒，震慑全场。何铁手与袁承志正式交手，二人以软红蛛索和金蛇剑法大战数十回合。何铁手武功虽高，仍不是袁承志对手，心中对其钦佩更甚。何红药在一旁讲述金蛇郎君往事的线索初露端倪，引出夏雪宜与五毒教的恩怨。
- chapter: 16
  title: 荒冈凝冷月 纤手拂晓风
  summary: 袁承志独闯五毒教驻地惠王府，以金蛇锥杀退群犬，深入腹地与五毒教众人对峙。何红药出手迎战袁承志，二人激烈交手。何惕守暗中对袁承志的武功钦佩不已，拜师学艺之心更切。五毒教众人见袁承志武功高强，不敢再行纠缠，只得退让。何惕守武功高强，独霸一方做惯了教主，对袁承志心悦诚服。
- chapter: 17
  title: 青衿心上意 彩笔画中人
  summary: 何红药向众人讲述金蛇郎君夏雪宜的往事：夏雪宜年幼时全家被害，为复仇拜入五毒教学艺，与何红药相恋。后夏雪宜负心离去，何红药苦寻多年。何红药讲述了夏雪宜如何被温氏五老擒获、如何骗他们上华山、如何自行封闭于山洞中待死的经过。青青听闻父亲往事，悲痛万分，对身世更加感伤。
- chapter: 18
  title: 朱颜罹宝剑 黑甲入名都
  summary: 何铁手改名何惕守，正式拜袁承志为师，脱离五毒教。惠王朱常润在京密谋造反，曹化淳暗中布局拥立新君。袁承志夜探皇宫，得知曹化淳与满清勾结的阴谋。崇祯皇帝召袁承志入宫，袁承志在宫中与各方势力周旋。闯军势如破竹攻破潼关，天下大乱，明朝江山岌岌可危。
- chapter: 19
  title: 嗟乎兴圣主 亦复苦生民
  summary: 李自成大军攻破北京城，崇祯皇帝在煤山自缢身亡，明朝覆灭。袁承志在煤山发现崇祯遗体和血诏。李自成入城后志得意满，在承天门箭射「天」字。袁承志目睹闯军入城后军纪败坏、奸淫掳掠，大失所望。李岩进谏无果，闯军内部矛盾初显。刘宗敏强索陈圆圆。袁承志二十年大仇得报，却见仇人如此凄惨下场，不禁恻然久之。
- chapter: 20
  title: 空负安邦志 遂吟去国行
  summary: 华山派聚会，玉真子前来挑衅，打败华山众弟子。何惕守与阿九赶到华山。闯军追杀红娘子，何惕守出手相救。袁承志在华山击败玉真子。李岩夫妇被李自成逼死，袁承志悲痛万分。他率青青、何惕守、阿九等人远赴海外浡泥国，空负安邦之志，遂吟去国之行。袁承志空负安邦之志，最终率众归隐海外浡泥国，令人唏嘘。
