- id: item_hei_bai_shuang_jian
  name: 黑白双剑
  aliases: []
  type: 武器
  description: |-
    说明：石清使黑剑,闵柔使白剑,夫妇二人合称'黑白双剑'。双剑合璧威力倍增,是玄素庄的标志性兵器,也是石清闵柔行走江湖的身份象征。
    概述：石清闵柔夫妇的佩剑,一黑一白
    来历：玄素庄石清闵柔夫妇
    效果：双剑合璧威力倍增;伤害
- id: item_jin_wu_dao
  name: 金乌刀
  aliases: []
  type: 武器
  description: |-
    说明：史小翠创立金乌派后打造的兵器,刀法专克雪山派剑法。石破天拜史小翠为师后获赠此刀,配合金乌刀法使用,威力惊人。此刀象征着金乌派与雪山派的宿怨。
    概述：金乌派的标志性兵器,专克雪山剑法
    来历：史小翠打造
    效果：专克雪山剑法;伤害
- id: item_la_ba_zhou
  name: 腊八粥
  aliases: []
  type: 其他
  description: |-
    说明：侠客岛以数十种珍稀药材熬制而成的药粥,每逢腊月初八请赴岛群雄饮用。此粥有增进功力之效,是侠客岛招待贵宾的珍贵之物。群雄赴岛饮粥,也是全书后半段的重要情节。
    概述：侠客岛以珍稀药材熬制的药粥,饮者功力可增
    来历：侠客岛珍稀药材熬制
    效果：饮者功力可增;增益
- id: item_shang_shan_fa_e_ling
  name: 赏善罚恶令
  aliases: []
  type: 其他
  description: |-
    说明：侠客岛每十年派出赏善罚恶二使,在江湖中发放此令。接令者须于指定日期前赴侠客岛饮腊八粥,否则将遭灭门之祸。此令令江湖中人闻风丧胆,是全书最重要的剧情推动道具。
    概述：侠客岛发出的邀请令牌,接令者须赴侠客岛
    来历：侠客岛每十年发放
    效果：接令者须赴侠客岛,否则灭门;特殊
- id: item_xuan_bing_bi_huo_jiu
  name: 玄冰碧火酒
  aliases: []
  type: 丹药
  description: |-
    说明：丁不三珍藏多年的奇酒,酒性极烈,常人饮之立毙。石破天误饮此酒后体质发生异变,百毒不侵,为日后修炼高深武功奠定了根基。此酒是丁家的珍贵之物。
    概述：丁不三珍藏的奇酒,饮后体质异变
    来历：丁不三珍藏
    效果：饮后百毒不侵,体质异变;增益
- id: item_xuan_tie_ling
  name: 玄铁令
  aliases: []
  type: 其他
  description: |-
    说明：一块玄铁铸成的令牌,乃谢烟客行走江湖时发出的信物。持此令者可请谢烟客为其办一件事,无论难易,谢烟客必定照办。此令流落江湖,引发多方争夺,是全书开篇的关键道具。
    概述：谢烟客的信物,持令者可请他办一件事
    来历：谢烟客行走江湖时发出
    效果：持令者可请谢烟客办一件事;特殊
