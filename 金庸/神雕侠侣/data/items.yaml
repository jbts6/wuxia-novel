- id: item_san_mei_jin_zhen
  name: 三枚金针
  aliases: []
  type: 其他
  description: |-
    郭襄在风陵渡口初闻神雕侠事迹后心生仰慕,于万兽山庄相遇时将母亲黄蓉所赠三枚金针转赠杨过,言明凭针可向她许三个愿望。
    郭襄赠杨过的信物,凭此可许三个愿望
    来历：黄蓉赠郭襄,郭襄转赠杨过
    效果：凭一枚金针可向郭襄许一个愿望;特殊
- id: item_shen_diao
  name: 神雕
  aliases: []
  type: 其他
  description: |-
    一只身形巨大羽毛稀疏的丑陋巨雕,乃独孤求败生前挚友与伙伴,通灵性知人言,杨过在剑冢相遇后与之结伴,神雕助其练功成为生死之交。
    通灵巨雕,独孤求败遗伴,杨过挚友与伙伴
    来历：独孤求败遗伴,栖于剑冢附近山谷
    效果：助杨过练功提升内力与剑法;增益;巨翼击人力大无穷可退强敌;伤害
- id: item_xuan_tie_zhong_jian
  name: 玄铁重剑
  aliases: []
  type: 武器
  description: |-
    重达九九八十一斤的玄铁重剑,剑身乌黑无锋,乃独孤求败遗物,杨过在剑冢中得此剑后于海潮中苦练,终悟重剑无锋大巧不工之理。
    独孤求败遗物,杨过海潮练剑所用的无锋重剑
    来历：独孤求败剑冢
    效果：重剑无锋大巧不工,以拙胜巧威力无穷;伤害;海潮练剑可提升内力修为,助悟玄铁剑法;增益
- id: item_yu_feng_jin_zhen
  name: 玉蜂金针
  aliases: []
  type: 暗器
  description: |-
    古墓派独门暗器,金针细如牛毛,针上喂有玉蜂之毒,中者痛痒难当,需以玉蜂浆方可解毒,小龙女常以此针御敌。
    古墓派独门暗器,细如牛毛,喂有玉蜂之毒
    来历：古墓派传承
    效果：金针刺入穴道令敌痛痒难当;伤害;蜂毒发作可令对手暂时失去战力;控制
