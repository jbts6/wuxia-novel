- chapter: 1
  title: 风月无情
  summary: 南宋理宗年间，嘉兴南湖畔，赤练仙子李莫愁因当年与陆展元的情仇，时隔十年前来陆家庄复仇。武三通痴恋何沅君而疯癫，颈中挂着婴儿围涎在湖边游荡。李莫愁在庄门印下血手印，将陆立鼎夫妇重伤致死。临终前陆立鼎将李莫愁旧日定情锦帕交给程英，而非亲生女儿陆无双。柯镇恶与武娘子赶来相救，却非李莫愁敌手。李莫愁焚庄而去，程英与陆无双在乱中失散。
- chapter: 2
  title: 故人之子
  summary: 武娘子舍生吸毒救夫后身亡，武三通疯癫离去，武氏兄弟成为孤儿。郭靖黄蓉收养武氏兄弟，在归途中于破窑中找到杨过。杨过衣衫褴褛却机灵倔强，郭靖见他酷似杨康，感慨万千。欧阳锋疯疯癫癫现身，认杨过为义子，传授蛤蟆功入门心法。郭靖与欧阳锋交手受伤。黄蓉对杨过心存戒备，恐其重蹈杨康覆辙，但郭靖念及郭杨两家世交，决意带杨过回桃花岛抚养。
- chapter: 3
  title: 投师终南
  summary: 郭靖决定送杨过上终南山全真教学艺，黄蓉虽忌惮杨过聪明过人却也同意。途中郭靖向杨过讲述郭杨两家世代交好的渊源，以及杨康误入歧途的往事。到达终南山后，全真教众道误将郭靖当作来袭之敌，以多座北斗大阵围攻。郭靖武功盖世，以左右互搏之术中途变招突破重围，跃过玉清池甩开追兵。众道追之不及跌入池中狼狈不堪。郭靖发现重阳宫后院火光冲天，知有大敌来袭急忙赶去。
- chapter: 4
  title: 全真门下
  summary: 杨过被安排拜赵志敬为师，赵志敬心胸狭隘、为人刻薄，只教口诀不授真功，处处刁难虐待杨过。师兄弟鹿清笃等也常欺负他。杨过性格倔强不肯屈服，在一次比武中以蛤蟆功将鹿清笃打晕，闯下大祸。全真教众道大怒，杨过被迫逃离重阳宫，慌不择路闯入古墓附近树林，被玉蜂螫伤昏倒在地。赵志敬的虚伪狠毒与杨过的不屈形成鲜明对比。
- chapter: 5
  title: 活死人墓
  summary: 杨过被玉蜂螫伤后昏倒在古墓附近，被孙婆婆救入活死人墓。孙婆婆慈祥善良，悉心照料杨过。杨过初见小龙女，她白衣如雪、容貌绝世却神情冷漠。孙婆婆带杨过上重阳宫送解药，遭群道围攻，郝大通误伤孙婆婆致死。小龙女大怒出手击退全真诸道。孙婆婆临终恳求小龙女收留杨过，小龙女答应，杨过从此拜入古墓派门下，开始了一段全新的命运。
- chapter: 6
  title: 玉女心经
  summary: 杨过在古墓中跟随小龙女学艺，睡寒玉床、捉麻雀练轻功，武功渐有进境。小龙女送解药至重阳宫，杨过轻功已大有长进，轻松躲过鹿清笃的追打。二人在墓中朝夕相处，感情日深。小龙女传授杨过古墓派武功心法，二人开始修炼玉女心经。李莫愁师徒闯入古墓争夺经书，小龙女放下断龙石封闭墓门，杨过义无反顾冲回墓中，愿与小龙女同生共死。
- chapter: 7
  title: 重阳遗刻
  summary: 断龙石封墓后众人被困，李莫愁逼迫交出玉女心经，杨过挺身护住小龙女宁死不屈。李莫愁被二人真情所动，放下杀心。众人在墓中发现王重阳刻于石棺下的九阴真经遗文，据此修炼内功。欧阳锋找到杨过，小龙女趁机出墓。欧阳锋传功时怕小龙女偷学，点了她穴道离去，小龙女因此遭甄志丙趁机玷污。杨过随欧阳锋练功数日后回到古墓。
- chapter: 8
  title: 白衣少女
  summary: 杨过离开古墓独自行走江湖，在客店中遇到全真教道人姬清虚、皮清玄密谋对付小龙女。杨过机智地偷走银两、折断长剑，在被窝中恶作剧戏弄二道。程英再次出场，她已拜黄药师为师，温婉聪慧。杨过与程英、陆无双重逢同行。程英暗中传递消息提醒李莫愁来袭。程英对杨过暗生情愫，但杨过心中只有小龙女。李莫愁仍在追踪陆无双，众人小心躲避。
- chapter: 9
  title: 百计避敌
  summary: 杨过护送陆无双逃避李莫愁追杀，途中机智百出。杨过扮傻装疯自称傻蛋，让陆无双扮新娘子躲入花轿避敌。程英暗中传信提醒李莫愁来袭。杨过与陆无双共骑一驴，二人虽常斗嘴却渐生默契。李莫愁步步紧逼，杨过以各种巧妙计策与之周旋。途中遇黄药师弟子冯默风，他是独腿铁匠却忠心耿耿。杨过激怒冯默风出手，最终击退李莫愁掩护众人脱险。
- chapter: 10
  title: 少年英侠
  summary: 杨过一行人遇到完颜萍与耶律齐兄妹。完颜萍为报父母之仇追杀耶律楚材，耶律齐武功高强却处处容让。杨过见耶律齐出手三招暗暗惊佩其武功精妙。完颜萍报仇无望横刀自刎，被杨过救下。杨过教完颜萍用眼神和假动作迷惑对手。武氏兄弟武敦儒、武修文出场，二人争相追求郭芙。众少年英侠齐聚，各怀心事，江湖恩怨与儿女情长交织在一起。
- chapter: 11
  title: 风尘困顿
  summary: 杨过携众人来到华山之巅，恰逢洪七公与欧阳锋两位绝世高手在此比武。二人斗得天昏地暗，杨过在旁悉心照料饮食起居。洪七公与欧阳锋斗了三天三夜，最终油尽灯枯，二人相拥大笑同时溘然长逝。杨过悲痛万分，在华山雪地中埋葬两位前辈高人。华山之巅的生死对决成就了一段武林传奇佳话，杨过经历此事后对武学和人生有了更深的领悟。
- chapter: 12
  title: 英雄大宴
  summary: 大胜关英雄大会召开，中原武林群雄齐聚一堂。金轮法王率蒙古武士前来挑战，欲夺武林盟主之位。杨过与小龙女久别重逢，二人联手对抗金轮法王师徒。小龙女以轻功闪避金轮飞击，杨过以移魂大法使达尔巴自击晕倒。霍都与朱子柳比武，以暗器毒针伤人。杨过与小龙女双剑合璧威力惊人，逼退金轮法王师徒，为中原武林赢得声誉。杨过与小龙女双剑合璧威力惊人，终于逼退金轮法王师徒，为中原武林赢得声誉，群雄欢声雷动。
- chapter: 13
  title: 武林盟主
  summary: 英雄大会上杨过与霍都比武，以打狗棒法击败霍都为朱子柳报仇，以彼之道还施彼身。杨过施展移魂大法令达尔巴自击晕倒，智勇双全令人刮目相看。黄蓉看出杨过与小龙女之间的情愫暗自担忧。郭靖对杨过大加赞赏，欲将郭芙许配给他。群雄议论武林盟主人选，杨过与小龙女功不可没，但二人只想远离纷争。金轮法王不甘失败伺机报复。
- chapter: 14
  title: 礼教大防
  summary: 小龙女在众人面前当众表白对杨过的爱意，杨过亦表明心意。然而师徒之恋在当时礼教观念下引发轩然大波，群雄纷纷指责非议。郭靖震怒要杨过娶郭芙，黄蓉也从旁劝说。杨过宁死不从，断然拒绝婚约。小龙女与杨过被迫离开英雄大会，二人携手闯荡江湖。礼教大防成为他们最大的障碍，但二人心意已决，宁可与天下人为敌也不愿分离。
- chapter: 15
  title: 东邪门人
  summary: 杨过与小龙女途中遇到黄药师。黄药师性格怪僻却极有见识，与杨过一见如故，十分欣赏他的聪明才智和不拘礼法的性格。黄药师传授杨过弹指神通等武功绝学，二人亦师亦友。黄药师对杨过与小龙女的恋情表示理解和支持，认为真情可贵不必拘泥世俗。杨过从黄药师身上学到武学道理和人生哲学，武功大进。东邪门人对杨过的认可让他倍感温暖。
- chapter: 16
  title: 杀父深仇
  summary: 杨过逐渐得知父亲杨康的往事真相。杨康认贼作父、卖国求荣，最终惨死于铁枪庙中。黄蓉向杨过讲述杨康的种种劣迹，杨过内心挣扎痛苦万分。他既恨父亲的不义之举，又难以接受郭靖黄蓉可能与父亲之死有关的传闻。杀父之仇与养育之恩的矛盾让杨过陷入深深的困惑与愤怒。小龙女默默陪在杨过身边，支持他度过这段艰难的心理煎熬。
- chapter: 17
  title: 绝情幽谷
  summary: 杨过与小龙女误入绝情谷，此处风景如画却暗藏杀机。谷中遍生情花，花刺有毒，中者动情便痛彻心扉。杨过不慎被情花刺伤，因思念小龙女而毒发剧痛难忍。公孙绿萼出场，她是谷主公孙止之女，温柔善良，对杨过心生好感。杨过在谷中得知情花毒的厉害，若无解药将性命难保。绝情谷看似世外桃源，实则危机四伏令人防不胜防。杨过与小龙女误入绝情谷，此处风景如画却暗藏杀机，谷中遍生情花，花刺有毒，中者动情便痛彻心扉。
- chapter: 18
  title: 公孙谷主
  summary: 公孙止表面温文尔雅，实则阴险狡诈，觊觎小龙女美色，设下圈套欲强娶她为妻。杨过以柳枝施展打狗棒法击败樊一翁，展现高超武功。公孙止露出真面目，取出阴阳双刃与杨过对决。杨过情花毒发作处境危急。公孙绿萼暗中帮助杨过，触怒了父亲公孙止。公孙止的伪善面具被彻底揭开，绝情谷的黑暗真相逐渐浮出水面。公孙止的伪善面具被彻底揭开，绝情谷的黑暗真相逐渐浮出水面，众人方知此人乃衣冠禽兽。
- chapter: 19
  title: 地底老妇
  summary: 公孙止设陷阱将杨过与公孙绿萼推入地底深渊之中。二人在暗无天日的地穴中发现被囚禁十余年的裘千尺，她是公孙止的原配妻子，被丈夫下毒推入地底致残。裘千尺口吐枣核钉绝技令人胆寒，她揭露公孙止杀妻害女、强占侍女的种种恶行。杨过与绿萼在裘千尺帮助下找到出路。裘千尺对公孙止恨之入骨，誓要报仇雪恨。裘千尺对公孙止恨之入骨，誓要报仇雪恨，她虽身残志坚，枣核钉绝技仍令人心惊胆战。
- chapter: 20
  title: 侠之大者
  summary: 裘千尺出地底后与公孙止当面对质，揭露其杀妻害女的种种罪行。公孙止狗急跳墙要与众人同归于尽。小龙女从喜服下取出君子剑淑女剑，与公孙止激战。杨过情花毒加深命在旦夕。郭靖侠之大者为国为民的精神深深感召杨过，让他明白真正的大侠应该胸怀天下苍生。绝情谷危机暂解，但杨过的情花毒仍需半枚灵丹才能解救。绝情谷危机暂解，但杨过的情花毒仍需半枚灵丹才能解救，众人忧心忡忡不知如何是好。
- chapter: 21
  title: 襄阳鏖兵
  summary: 杨过赴襄阳，蒙古大军围城甚急。杨过内心挣扎是否刺杀郭靖以报父仇，夜间与郭靖同室而卧，怀中匕首贴肉已热。黄蓉察觉杨过异样，暗中提醒郭靖多加提防。郭靖对杨过坦诚相告杨康往事，言辞恳切令杨过半信半疑。蒙古大军攻城激烈，郭靖率军守城展现大侠风范。杨过在刺杀与感恩之间反复挣扎，最终未能下手行刺。杨过在刺杀与感恩之间反复挣扎，最终被郭靖的侠义精神所感化，未能下手行刺。
- chapter: 22
  title: 危城女婴
  summary: 襄阳大战中黄蓉临盆生下郭襄。战事危急之际，李莫愁趁乱抢走婴儿郭襄。杨过奋力追赶李莫愁，在危急关头救下婴儿。李莫愁本欲杀害婴儿，却被郭襄的天真笑容打动一时下不了狠手。杨过与李莫愁在荒野中周旋，既要保护婴儿又要对付李莫愁。黄蓉产后虚弱仍心系女儿安危。郭襄的降生为战火中的襄阳带来一丝生机与希望。郭襄的降生为战火纷飞的襄阳城带来一丝生机与希望，黄蓉母女平安令人欣慰。
- chapter: 23
  title: 手足情仇
  summary: 武氏兄弟武敦儒、武修文同时爱上郭芙，兄弟二人争风吃醋几至反目成仇。杨过出面调解，假意说郭芙已许配给自己让二武死心。郭芙得知后大怒，以为杨过故意羞辱她。杨过的善意调解反而弄巧成拙引发更多误会。二武为争夺郭芙几乎动手相残，最终在黄蓉劝解下平息。这一回展现了少年儿女之间错综复杂的感情纠葛。这一回展现了少年儿女之间错综复杂的感情纠葛，杨过好心办坏事令人啼笑皆非。
- chapter: 24
  title: 惊心动魄
  summary: 杨过情花毒发作日益严重，小龙女也身受重伤。二人在绝情谷中继续寻找解药，公孙止设下重重陷阱阻挠。杨过为救小龙女不惜以身犯险，将仅有的半枚解药让给小龙女服下。小龙女得知杨过将生的机会让给自己悲痛欲绝。二人在生死关头相互扶持，感情更加深厚。情花毒如同命运的考验，检验着他们对彼此的真心与牺牲精神。情花毒如同命运的考验，检验着他们对彼此的真心与牺牲精神，感人至深。
- chapter: 25
  title: 内忧外患
  summary: 周伯通出场，他天真烂漫武功盖世。金轮法王设下赌局与周伯通比试盗取蒙古王旗。赵志敬暗中与金轮法王勾结，企图利用周伯通谋取全真教掌教之位。周伯通夜探蒙古大营盗取王旗，展现绝顶轻功。全真教内部因赵志敬的阴谋暗流涌动。杨过与小龙女在绝情谷继续寻找解药，内外交困形势更加严峻。金轮法王与赵志敬各怀鬼胎。金轮法王与赵志敬各怀鬼胎，全真教内部因赵志敬的阴谋暗流涌动，形势岌岌可危。
- chapter: 26
  title: 神雕重剑
  summary: 杨过流落荒山遇到一只通灵神雕。神雕引导杨过发现独孤求败的剑冢，其中藏有玄铁重剑。杨过以重剑练剑，领悟重剑无锋、大巧不工的武学至理。神雕以蛇胆增强杨过内力，助他练功。杨过在神雕陪伴下苦练剑术，武功突飞猛进。失去一臂虽是残缺，却让他在武学上突破瓶颈达到新的境界。神雕重剑成为杨过日后的标志性武器。神雕重剑成为杨过日后的标志性武器，重剑无锋大巧不工的武学至理令他受益终身。
- chapter: 27
  title: 斗智斗力
  summary: 黄蓉与李莫愁展开一场智斗。李莫愁手中持有婴儿郭襄，黄蓉既要救回女儿又要对付李莫愁。黄蓉机智过人，以各种巧妙计策与李莫愁周旋。杨过以神雕侠身份出手相助。李莫愁虽武功高强却在智谋上不及黄蓉。经过一番斗智斗力，郭襄最终脱险。李莫愁在与婴儿相处中流露出难得的柔情，暗示她内心深处并非全然无情。李莫愁在与婴儿相处中流露出难得的柔情，暗示她内心深处并非全然无情，也有慈母之心。
- chapter: 28
  title: 洞房花烛
  summary: 杨过与小龙女回到古墓，在孙婆婆遗像前拜堂成亲互许终身。全真教群道来袭，小龙女以左右互搏之术大败群道，剑法出神入化。甄志丙出现，小龙女得知当初被玷污的真相万念俱灰。甄志丙自知罪孽深重，当众认罪后扑向长剑自戕谢罪。全真五子惭愧撤阵。小龙女身心俱伤，杨过悲愤交加。洞房花烛夜本是喜事，却成了一场劫难的开始。
- chapter: 29
  title: 劫难重重
  summary: 小龙女伤势加重，杨过带她四处求医问药。郭芙因误会与杨过起冲突，盛怒之下挥剑斩断杨过右臂。杨过断臂之痛锥心刺骨，却仍惦记小龙女安危。黄蓉赶到得知真相深感愧疚。杨过虽失去一臂，却在绝境中激发更大的潜力与斗志。小龙女身中剧毒又受重伤，杨过抱着她踏上寻找解药的艰难之路。断臂之痛成为杨过武学生涯的重大转折点。
- chapter: 30
  title: 离合无常
  summary: 小龙女得知自己身中剧毒无药可救，为不让杨过陪自己一起死，留下十六年后绝情谷底相见的约定，纵身跳入绝情谷深渊。杨过悲痛欲绝却信守承诺苦苦等待。十六年间杨过带着神雕行走江湖行侠仗义，人称神雕侠。他每年回到绝情谷畔等待小龙女归来。离合无常的人生考验着杨过的痴情与信念，十六年之约成为他活下去的唯一希望。离合无常的人生考验着杨过的痴情与信念，十六年之约成为他活下去的唯一精神支柱。
- chapter: 31
  title: 半枚灵丹
  summary: 十六年间杨过以神雕侠之名行走江湖，扶危济困、惩恶扬善。他武功已臻绝顶，独臂使玄铁重剑威震武林。杨过暗中守护襄阳，多次化解危机。公孙绿萼为救杨过献出宝贵生命，杨过深感愧疚不已。郭襄渐渐长大成人，从旁人口中听闻神雕侠的传奇事迹。十六年的等待让杨过从冲动少年成长为沉稳大侠，武功与心境都达到了新的高度。十六年的等待让杨过从冲动少年成长为沉稳大侠，武功与心境都达到了全新的高度。
- chapter: 32
  title: 情是何物
  summary: 杨过以神雕侠身份调解江湖纷争，帮助史家兄弟化解矛盾。郭襄对神雕侠充满好奇与仰慕之情。杨过的侠义事迹在江湖中广为传颂，他行侠仗义不求回报的品格令人敬佩。情是何物这一主题贯穿始终：杨过对小龙女的深情、李莫愁对陆展元的执念、公孙绿萼对杨过的单恋，各种情感交织成复杂的人性画卷。杨过在等待中不断思考情的真谛。
- chapter: 33
  title: 风陵夜话
  summary: 郭襄在风陵渡口听闻神雕侠的种种传奇故事，对这位神秘大侠心驰神往。众人围炉夜话，讲述神雕侠如何惩恶扬善、扶危济困。郭襄虽从未见过神雕侠，却被他的侠义精神深深打动。风陵渡口成为郭襄人生的重要转折点，她从此踏上寻找神雕侠的旅程。夜话中的种种故事勾勒出杨过十六年来的成长与蜕变，也预示着新的因缘际会。夜话中的种种故事勾勒出杨过十六年来的成长与蜕变，也预示着新的因缘际会即将展开。
- chapter: 34
  title: 排难解纷
  summary: 郭襄终于遇到杨过，杨过以神雕侠身份出现。郭襄向杨过倾诉仰慕之情，杨过被她的天真率直打动。杨过赠给郭襄三枚金针，承诺满足她三个愿望。郭襄用第一枚金针要看杨过的真面目，杨过摘下面具露出英俊面容。二人在百花谷中畅谈，杨过从郭襄身上看到黄蓉年轻时的影子。郭襄对杨过一见倾心，却不知他心中只有小龙女一人。郭襄对杨过一见倾心，却不知他心中只有小龙女一人，这段单恋注定是美丽而无果的。
- chapter: 35
  title: 三枚金针
  summary: 郭襄使用三枚金针，杨过一一兑现承诺。杨过向郭襄讲述自己与小龙女的爱情故事，郭襄既感动又心酸不已。杨过答应在郭襄生日时送她三件大礼以表心意。郭襄虽然年幼却已懂得情为何物。杨过对郭襄如同妹妹般关爱有加，心中却始终思念小龙女。三枚金针象征着信任与承诺，也连接起两代人的情感纠葛。郭襄从此成为杨过生命中重要的牵挂。
- chapter: 36
  title: 生辰大礼
  summary: 郭襄生日当天，杨过送上三件惊世大礼：火烧蒙古两千大军粮草、歼灭蒙古先锋部队、揭穿霍都阴谋解救丐帮。满天烟花照亮夜空，杨过以此为郭襄庆生震动天下群雄。郭靖黄蓉感激不尽，襄阳军民欢声雷动。杨过的侠义之举不仅为郭襄庆生，更为保家卫国立下大功。这场生日庆典成为武林中最轰动的盛事，神雕侠之名传遍天下。这场生日庆典成为武林中最轰动的盛事，神雕侠之名传遍天下，无人不知无人不晓。
- chapter: 37
  title: 三世恩怨
  summary: 霍都的阴谋被揭露，他潜伏在丐帮中企图夺取帮主之位。丐帮召开大会选举新帮主，霍都暗中操纵局势。杨过与黄蓉联手识破霍都的诡计，将其彻底击败。耶律齐在丐帮大会上展现武功与品行，被推举为新任帮主。三世恩怨在此汇聚：郭杨两家的渊源、丐帮的兴衰、蒙古与中原的对抗。旧怨新仇交织，江湖格局再次发生改变。旧怨新仇交织汇聚，江湖格局再次发生深刻改变，新一代侠客已然崛起。
- chapter: 38
  title: 生死茫茫
  summary: 十六年之期已到，杨过在绝情谷畔苦等小龙女。约定之日小龙女并未出现，杨过万念俱灰纵身跳入绝情谷。谷底竟是一片世外桃源般的天地，杨过发现小龙女在此生活了十六年之久。原来小龙女凭借寒潭白鱼和蜂蜜解了体内剧毒，在谷底隐居等待杨过归来。二人在谷底重逢，生死茫茫十六载终于再续前缘。这段跨越生死的爱情迎来圆满结局。
- chapter: 39
  title: 大战襄阳
  summary: 蒙古大军再次围攻襄阳城，战况空前激烈。杨过与小龙女重出江湖，与郭靖黄蓉并肩守城御敌。杨过在战场上以玄铁重剑大显神威，击退蒙古先锋部队。蒙哥汗亲率大军攻城，杨过飞石击毙蒙哥汗，蒙古大军顿时溃败四散。襄阳保卫战取得辉煌胜利，杨过立下不世之功。这一战不仅是军事上的胜利，更是侠义精神的集中体现。这一战不仅是军事上的辉煌胜利，更是侠义精神的集中体现，杨过名震天下。
- chapter: 40
  title: 华山之巅
  summary: 群雄齐聚华山之巅进行第三次华山论剑盛会。东邪黄药师、南僧一灯大师、西狂杨过、北侠郭靖、中顽童周伯通被推举为新五绝。杨过从当年叛逆少年成长为一代大侠名列五绝之中。众人祭奠洪七公与欧阳锋感慨万千。杨过与小龙女携手离去从此隐居江湖不问世事。华山论剑见证了一代新人的成长，也为这段跨越十六年的传奇画上了圆满句号。
