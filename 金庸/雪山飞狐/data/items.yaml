- id: item_chang_fang_tie_he
  name: 长方铁盒
  aliases: []
  type: 暗器
  description: 说明：从长白山树下挖出的两尺来长铁盒,被称为天龙门镇门之宝和武林至宝;盒边设有机关,可近距离射出三枝短箭。
- id: item_chuang_wang_jun_dao
  name: 闯王军刀
  aliases: []
  type: 武器
  description: 说明：李自成军刀之一,刀鞘刻有“杀一人如杀我父,淫一人如淫我母”及“奉天倡义”,后来成为天龙门镇门宝刀和江湖盟约信物。
- id: item_feng_tou_zhu_chai
  name: 凤头珠钗
  aliases: []
  type: 其他
  description: 说明：苗家旧物,钗身中空,凤头设有可用头发开启的机括,内部藏着闯王宝藏地图。
- id: item_han_qin
  name: 汉琴
  aliases: []
  type: 其他
  description: 说明：苗若兰用来弹奏善哉行、与胡斐琴歌酬答的汉代古琴。
- id: item_hong_bao_shi
  name: 红宝石
  aliases: []
  type: 武器
  description: 说明：反面嵌在双龙抢珠刀鞘的“珠”位;取下后露出指向东北偏北的箭头与小圆圈,标明宝藏入口。
- id: item_huang_jin_xiao_bi
  name: 黄金小笔
  aliases: []
  type: 暗器
  description: 说明：长约三寸、笔尖锋利、笔杆刻“安”字的金笔,可作暗器,被曹云奇视为陶子安赠田青文之物。
- id: item_ye_ming_bao_zhu
  name: 夜明宝珠
  aliases: []
  type: 其他
  description: 说明：双童各佩一颗成对夜明宝珠,右童之珠碎裂后,左童把自己的也剖成两半,使两人的珠饰继续一致。
- id: item_yu_jian
  name: 羽箭
  aliases: []
  type: 暗器
  description: 说明：陶子安一行所用的同式羽箭,被阮士中等视为追踪目标和指控陶子安的关键物证。
- id: item_yu_ma
  name: 玉马
  aliases: []
  type: 其他
  description: 说明：苗若兰携带的一对晶莹精致小玉马,曾赠双童赔偿宝珠,双童得知她身份后退还。
- id: item_zhui_ming_du_long_zhui
  name: 追命毒龙锥
  aliases: []
  type: null
  description: 说明：天龙门令武林人物闻名丧胆的带毒暗器,其威力仰仗门中秘制毒药;田青文计划用它杀周云阳灭口。
