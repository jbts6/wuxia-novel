- chapter: 1
  title: 一
  summary: 曹云奇与田青文因陶子安争执：曹云奇暂时平息怒气，与田青文并骑追上同门，但三人之间的情感冲突更加尖锐。；平通镖局雪坑伏击饮马川：饮马川一方折损三人，陶氏父子陷入劣势，只得提出以宝物换命。；神秘老僧制止群雄恶斗：各方不敢拒绝老僧邀请，带伤跟随他前往附近神秘主人的庄子，铁盒争夺暂告中止。；陶子安立誓与雪坡混战：郑三娘腿伤并身中毒锥，陶子安又掷刀欲取其性命，三方矛盾彻底激化。；陶子安以铁盒机关箭反击：静智当场死亡，熊元献受重伤，伏击方阵势大乱，也暴露出铁盒本身设有致命机关。；天龙门突袭夺得铁盒：阮士中夺得铁盒并交田青文护持，田青文抱盒奔向西北，陶子安和曹云奇相继追去。；天龙门追踪陶氏父子至长白山：天龙门五人潜近谷底，准备以追命毒龙锥先发制人，却撞见另一批伏兵率先出手。
- chapter: 2
  title: 二
  summary: 胡斐遣双童投帖践约：宝树从拜帖得知雪山飞狐本名胡斐，并确认胡斐将在今日午时准时到达。；胡斐双童以合璧剑术鏖战群豪：右童将阮士中逼入墙角，左童独挡其余八人；宝树畏惧双童联手之威，一时不敢解围。；群豪乘竹篮登上雪峰庄院：众人进入雪峰石屋前厅，得知庄主外出请援，并在庄院等候胡斐赴约。；赛赫图率大内高手擒拿范帮主：范帮主被擒并关入天牢，刘元鹤因此害怕在雪峰撞见丐帮人物。；雪峰庄主广邀高手围堵胡斐：胡斐虽只孤身一人赴约，庄院一方却已聚集并等待多路高手助拳。
- chapter: 3
  title: 三
  summary: 闯王军刀在铁盒中现世：铁盒重宝被确认是李自成军刀，天龙门镇门宝刀与胡苗范田旧事开始连结。；独臂刀疤仆人安慰苗若兰：苗若兰继续表达不愿孩子习武的愿望，并对仆人眼中的异光产生疑惑。；飞天狐狸忍辱布局与四家结仇：三家子弟不知百年秘密，继续追杀胡家后人，胡苗范田四家由此世代结下深仇。；胡家后人复仇与三公公自刎：密谈真相无人知晓，三家后人认定胡家施奸计逼死长辈，胡苗范田复仇循环延续。；胡苗范田四家仇杀与闯王军刀盟约：闯王军刀由天龙门田氏执掌，成为号召天下英雄共同对付胡家后人的信物。；苗人凤立下禁武止仇家训：苗若兰不会武艺，并盼望旧事中的孩子也能远离武功，让百年血债有机会终止。；苗若兰以玉马化解双童冲突：右童罢手并向阮士中赔礼；双童得知苗若兰是苗人凤之女后退还玉马离开。；双童炸毁峰顶绞盘长索：群豪被困雪峰，山庄粮食因宾客增加只够十日，众人不得不暂缓争斗追问飞狐与铁盒的旧怨。；铁盒跌落引发群豪争夺：宝树控制铁盒并逼天龙门众人说明其来历，群豪继而持兵刃围住宝树。
- chapter: 4
  title: 四
  summary: 宝树在平安客店救治七名伤者：宝树得知铁盒在胡一刀身上，也开始卷入胡苗范田旧怨。；胡夫人识破苗家剑破绽：苗人凤一度陷入双臂将被斩断的危局，但仍保有反击机会。；胡夫人以白绸带击退夜袭群豪：夜袭者逃散，苗人凤次日斥责己方众人，并感谢胡夫人手下留情。；胡一刀夜奔武定斩商剑鸣：胡一刀替苗家报仇且维护苗家剑威名，苗人凤更敬其磊落，并用黄包袱裹住婴儿承诺保护。；胡一刀以钱镖击退范田人马：范田众人带伤撤走，胡一刀夫妇进入平安客店准备生产。；胡一刀之子在平安客店出生：胡一刀夫妇有了最深牵挂，也为即将到来的苗胡决斗安排遗孤与铁盒。；苗人凤与胡一刀互授刀剑结为知己：两人虽受家仇束缚，却坦言相见恨晚，视彼此为天下唯一可交之人。；苗人凤与胡一刀首日比武惺惺相惜：两人首日不分胜负，由死敌渐生敬重。；苗人凤约战胡一刀并互托遗事：双方在性命相搏前确认彼此光明磊落，并把家仇与遗孤相互托付。；苗若兰还原胡苗换刀剑决斗：胡一刀因借来的单刀刀口有剧毒而身亡，胡夫人将孩子托付苗人凤后横刀殉夫，宝树的旧说受到公开质疑。
- chapter: 5
  title: 五
  summary: 飞天狐狸忍辱布局与四家结仇：三家子弟不知百年秘密，继续追杀胡家后人，胡苗范田四家由此世代结下深仇。；飞天狐狸以假尸计救闯王：清兵解围，真闯王易容下山，后来在石门县夹山普慈寺以奉天玉和尚身份隐居。；胡一刀遗孤失踪：苗人凤误以为孩子被杀并投河，终身以未能履诺为恨，苗若兰也一直盼孩子仍在人世。；胡一刀赠银救平阿四一家：平阿四一家得救；胡一刀又平等地称他“小兄弟”，使平阿四把胡一刀视为至亲并决意以命相报。；苗若兰还原胡苗换刀剑决斗：胡一刀因借来的单刀刀口有剧毒而身亡，胡夫人将孩子托付苗人凤后横刀殉夫，宝树的旧说受到公开质疑。；平阿四毁粮炸索并揭胡斐身份：峰上众人断粮受困；平阿四揭晓遗孤名叫胡斐、外号雪山飞狐，原本约定当日午时前来拜山。；平阿四获苗若兰护持揭露身份：宝树身份被揭，平阿四在众目睽睽和苗人凤名号保护下开始讲述二十七年前的隐秘。；平阿四揭闯王军刀宝藏秘密：胡一刀原想请苗人凤掘宝救济穷人，甚至驱逐旗人恢复汉家河山，但阎基没有传达，苗田两家也一直不知刀图合用的秘密。；平阿四救胡斐遭田归农重创：平阿四带着胡斐远离故乡并隐姓埋名，苗人凤则只见河边血迹，误以为孩子已经死亡。；阎基涂毒害死胡一刀并盗宝：胡一刀被毒死；平阿四以门闩击昏阎基，救走婴儿并抢夺拳经刀谱，却只撕走后部，阎基留下前两页并据此练成武功。
- chapter: 6
  title: 六
  summary: 白鸽传丝引来下峰粗索：众人将粗索缚在崖边大松树上，重新获得下峰通道，但随即因逃生次序和铁盒宝刀再起争执。；胡斐与苗若兰饮酒抚琴互生敬意：胡斐和苗若兰彼此改观、互生敬意；胡斐约定主人未归便次日再访，背负平阿四下峰。；胡斐与平阿四重逢并感谢苗若兰：胡斐确认平阿四仍活着，对苗若兰由警惕转为感激。；苗若兰追问田归农死亡旧案：陶百岁准备从头讲述天龙门诬指陶子安害死田归农的经过。；平阿四说明胡斐来意与毁索报恩：群豪得知受困是平阿四有意所为，也明白胡斐即将寻找苗人凤复仇。；群豪逃匿,苗若兰随于管家出迎胡斐：苗若兰与于管家成为庄中仅有的迎客者，胡斐与苗若兰第一次相见。；阮曹暗算宝树反致曹云奇坠崖,胡斐救人登峰：曹云奇死里逃生并向峰上通报雪山飞狐已到，胡斐随即攀上雪峰。
- chapter: 7
  title: 七
  summary: 曹云奇与田青文私情曝光引发厅上冲突：天龙门众人公开决裂，陶子安与田青文的婚约关系事实上破裂，曹云奇的掌门资格受到质疑。；胡斐拜帖确认雪山飞狐身份并洗清陶子安部分嫌疑：胡斐就是雪山飞狐的身份得到确认，陶子安的说法获得关键物证支持，但田归农死因仍待揭开。；刘元鹤承认奉旨卧底并揭露闯王宝藏双线索：清廷介入宝藏争夺的背景、军刀与地图两条线索及田归农的多重图谋全部公开。；苗人凤归还宝刀死婴并揭开凤头珠钗地图：宝刀和地图两件寻宝线索同时现身，田归农多年夺图落空；苗人凤带走骨灰与珠钗而未杀田归农。；陶百岁揭露田归农毒害苗胡阴谋：胡一刀中毒身亡的旧案获得新的直接证言，田归农两面谋害苗胡的动机与手段败露。；陶子安发现田归农中箭并从床底交锋中逃走：陶子安携宝刀逃到关外，却因田归农身上的羽箭成为杀人盗刀嫌疑人；床下人的身份暂时成谜。；陶子安发现田青文杀婴与周云阳埋刀互保：田青文杀婴、周云阳盗刀两件秘密互相绑定，陶子安则成为暗中掌握两项真相的见证人。；天龙门南北宗交接剑谱宗牒与宝刀失败：南北宗传承交接未能完成，宝刀去向与掌门之争成为后续冲突的导火索。；田归农托陶子安携铁盒赴关外：陶子安拒绝携盒离庄，决定把铁盒退回田归农，避免落入盗刀罪名。；田归农以羽箭自尽真相揭晓：田归农死于自尽而非他杀，陶子安与胡斐的杀人嫌疑被彻底洗清。
- chapter: 8
  title: 八
  summary: 刀鞘双龙图与红宝石暗记引出宝藏通道：宝树拨开冰雪找到盘旋曲折的地下通道，群豪陆续进入寻宝。；黄金小笔揭示田安豹暗器与胡斐警告：黄金小笔的主人和用途得到确认，天龙门众人获知胡斐已掌握他们行踪并警告他们将死在辽东。；刘元鹤夺钗并揭朝廷诱捕苗人凤：苗若兰确认父亲确已赴京而忧惧失色，群豪则掌握了朝廷圈套和藏宝图所在。；刘元鹤欲灭口,苗若兰与琴儿遭制：苗若兰与琴儿均失去行动能力，群豪抛下二人前往后山寻宝。；群豪打开冰封石门发现闯王宝藏：群豪确认找到闯王宝藏，并发现洞内还保存着两具数十年前的尸体。；群豪争相砍冰取宝并派人拾柴：群豪被贪欲驱使继续取宝，三人虽担心他人私取，仍被迫出洞捡柴。；田安豹与苗家先祖尸身证实旧案：陶百岁确认胡一刀所言属实：苗田两家上代是在宝藏中因贪念互相杀死，并非被胡一刀所害。；珠钗藏宝图锁定乌兰山玉笔峰：群豪确认自己正身处藏宝图所指玉笔峰，决定立即前往后山寻宝。
- chapter: 9
  title: 九
  summary: 范帮主以龙爪擒拿手偷袭苗人凤得手：苗人凤全身软瘫被擒，赛总管准备挑断其手脚筋；范帮主因赛曾发誓而阻止，却被赛总管撞穿板壁。；胡斐三招击败赛总管救出苗人凤：赛总管第三招坐倒认输，下令解开苗人凤镣铐；苗人凤自行冲开穴道，重新投入战斗。；胡斐夜返玉笔庄误藏苗若兰床上：胡斐为避免损害苗若兰名节不敢现身，二人被迫贴近躲藏并听见众人设伏计划。；苗人凤单闯天牢营救范帮主：苗人凤虽未救出范帮主，却突破周密围捕全身而退，令赛总管蒙受奇耻大辱。；苗若兰暴露后苗人凤误会胡斐并追击：胡斐抱起苗若兰从板壁破口离开，苗人凤误认他掳走女儿，怒叫奸贼并追出。；赛总管联同杜希孟在玉笔庄设伏苗人凤：苗人凤被杜希孟等迎入厢房，赛总管和六名卫士藏在床底、柜中和书架后等待偷袭。；赛总管以奉承与诈败谄诱范帮主作内应：范帮主对赛总管言听计从，答应利用家传龙爪擒拿手从背后偷袭世交苗人凤。
- chapter: 10
  title: 十
  summary: 杜希孟归还遗物而苗人凤带胡斐离开对质：胡斐收回母亲遗物并将其作为文定之物交给苗若兰，随后赴约面对苗人凤。；胡斐击落铁念珠并以珍宝惩戒宝树：宝树倒地无法站起；苗若兰求情后胡斐停手，洞内众人震慑不敢妄动。；胡斐讲述父母在宝洞舍弃宝藏而结缘：苗若兰向往胡斐父母的情爱，两人进一步袒露心意。；胡斐抢先以八方藏刀式制住苗人凤却无法下刀：胡斐既不愿伤害苗若兰之父，也不能任由对方完成杀招，故事停在是否劈下树刀的生死抉择。；胡斐以圆岩封住宝洞出口：天龙门、饮马川山寨、平通镖局等贪宝者被困洞中，生死取决于是否有人从外面施救。；胡斐与苗若兰互许终身：二人正式互表倾心，确立终身相守的承诺。；胡斐在山洞为苗若兰解穴并获得信任：苗若兰恢复活动并明确表示不怪胡斐，两人的信任与情意加深。；苗人凤与胡斐以树枝代刀剑决战并同落悬岩：两人被困在随时可能坠谷的悬岩上，为减轻重量继续以进手险招相搏。；苗人凤与胡斐在峭壁拳掌激斗并救回坠崖胡斐：苗人凤以救命抵消胡斐此前救他之恩，双方转为同等地势重新决战。；苗若兰向胡斐讲述父母悲剧与藏宝图流转：胡斐得知凤头珠钗藏图、宝树等夺图寻宝的前因，也更加理解苗人凤。
