- id: item_hua_shi_fen
  name: 化尸粉
  aliases: []
  type: 丹药
  description: |-
    说明：化尸粉是神龙教的独门毒药,呈黄色粉末状,遇血即发,能将尸体化为黄水,不留痕迹。韦小宝多次使用此物毁尸灭迹。
    概述：神龙教秘制毒药,沾血即化尸骨无存
- id: item_si_shi_er_zhang_jing
  name: 四十二章经
  aliases: []
  type: 秘籍
  description: |-
    说明：四十二章经共八部(四部满文、四部汉文),表面是佛经,实则内藏羊皮碎片,拼合后可得大清龙脉宝藏地图。神龙教、天地会、清廷等多方势力争夺。韦小宝最终集齐八部。
    概述：八部满汉文经书,内藏大清龙脉宝藏地图碎片
