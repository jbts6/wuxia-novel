- id: faction_mu_wang_fu
  name: 沐王府
  aliases: []
  type: 家族
  description: |-
    说明：沐王府是明朝镇守云南的沐氏家族后裔,世代忠于明朝。小公爷沐剑声统领府中事务,沐剑屏是其妹。沐王府以反清复明为己任,与天地会互通声气。沐王府成员武艺不俗,尤其擅长沐家剑法,在江湖上颇有声望。
    概述：云南沐氏后裔,世代镇守云南,以反清复明为己任
    驻地：loc_yun_nan
- id: faction_ping_xi_wang_fu
  name: 平西王府
  aliases: []
  type: 王族
  description: |-
    说明：平西王府是吴三桂在云南昆明的藩王府邸。吴三桂原为明朝将领,引清兵入关后被封为平西王,镇守云南。他拥兵自重,暗中筹备反清,最终发动三藩之乱。其子吴应熊入京为质,娶建宁公主。韦小宝曾深入云南吴三桂地盘,与其周旋。
    概述：吴三桂在云南的藩王府邸,拥兵自重,图谋反清
    驻地：loc_kun_ming
- id: faction_qing_liang_si
  name: 清凉寺
  aliases: []
  type: 寺院
  description: |-
    说明：清凉寺位于五台山,是顺治帝出家为僧的古刹。顺治帝看破红尘,遁入空门,法号行痴。海大富奉命寻找顺治帝,韦小宝也曾上五台山寻找。清凉寺是小说中宫廷秘辛与佛教圣地交汇的重要地点。
    概述：五台山清凉寺,顺治帝出家之地
    驻地：loc_qing_liang_si
- id: faction_shao_lin_si
  name: 少林寺
  aliases: []
  type: 寺院
  description: |-
    说明：少林寺是武林中声望最高的门派,千年古刹,武学渊源深厚。方丈晦聪大师老成持重,达摩院掌管高深武学。韦小宝曾假扮小和尚混入少林寺,在此学习罗汉拳等基础功夫。少林七十二绝技名震天下,包括大力金刚掌、般若掌、拈花指、龙爪手等。胖头陀曾到少林寺挑战。
    概述：武林泰山北斗,千年古刹,武功绝学众多
    驻地：loc_shao_lin_si
- id: faction_shen_long_jiao
  name: 神龙教
  aliases: []
  type: 帮派
  description: |-
    说明：神龙教是盘踞在大海中神龙岛上的神秘教派,教主洪安通武功诡谲,教中高手众多,包括胖头陀、瘦头陀、陆高轩等人。神龙教行事诡异,与清廷暗中勾结又互相利用。教主夫人苏荃精明强干,后归韦小宝。神龙教控制着多部四十二章经,是小说中重要的反派势力。
    概述：盘踞神龙岛的神秘教派,教主洪安通武功高强、猜忌多疑
    驻地：loc_shen_long_dao
- id: faction_tian_di_hui
  name: 天地会
  aliases: []
  type: 帮派
  description: |-
    说明：天地会是清初最大的反清秘密组织,由郑成功旧部创立,以"天父地母,反清复明"为口号。总舵主陈近南武功高强、义薄云天,下设十大香堂,各堂设香主统领。韦小宝被任命为青木堂香主,成为该会与清廷之间的关键人物。天地会成员遍布江南各地,与沐王府、王屋派等反清势力互通声气。
    概述：以反清复明为宗旨的秘密结社,总舵主陈近南,下设十大香堂
    驻地：loc_nan_jing
- id: faction_tie_jian_men
  name: 铁剑门
  aliases: []
  type: 武林门派
  description: |-
    说明：铁剑门是九难师太(长平公主出家后的法号)所属的武林门派,以铁剑功夫为本门绝学。九难武功卓绝,是当世顶尖高手之一,她教授阿珂美女拳法、传授韦小宝神行百变轻功。铁剑门人数不多,但九难一人足以撑起门派声望。
    概述：九难师太所属门派,以铁剑功夫闻名,武功卓绝
- id: faction_wang_wu_pai
  name: 王屋派
  aliases: []
  type: 武林门派
  description: |-
    说明：王屋派是位于河南王屋山的武林门派,由司徒伯雷创立,实力在江湖中属中下。司徒伯雷死后,其子司徒鹤接管门派事务。王屋派弟子参与反清活动,曾被清廷围剿。曾柔是王屋派弟子,后成为韦小宝夫人之一。
    概述：河南王屋山门派,实力较弱,卷入反清斗争
    驻地：loc_wang_wu_shan
- id: faction_zhuang_jia
  name: 庄家
  aliases: []
  type: 家族
  description: |-
    说明：庄家是扬州的大户人家,因得罪鳌拜而遭灭门之祸。庄夫人隐忍多年,以鬼宅为掩护复仇。双儿是庄家的丫鬟,对韦小宝忠心耿耿。庄家鬼宅是韦小宝与双儿初次相遇的地方,也是庄家复仇计划的据点。
    概述：扬州大户,遭鳌拜灭门后以鬼宅复仇,双儿出身于此
    驻地：loc_yang_zhou
