- chapter: 1
  title: 天涯思君不可忘
  summary: 郭襄骑驴上少林寺寻访杨过不遇，与无色禅师交手。觉远禅师携弟子张君宝追至，张君宝以九阳真经中的拳理击败何足道。少林僧人追究私授武功之责，觉远携张君宝、郭襄逃出少林。觉远圆寂前默诵九阳真经，三人各记一部分。
- chapter: 2
  title: 武当山顶松柏长
  summary: 十年后张君宝改名张三丰，创立武当派。俞岱岩奉师命下山行侠，途中卷入屠龙刀争夺战。天鹰教、海沙派、巨鲸帮等多方势力混战，殷素素以蚊须针暗算俞岱岩，致使俞岱岩被大力金刚指捏断四肢。
- chapter: 3
  title: 宝刀百炼生玄光
  summary: 张翠山奉师命下山查访俞岱岩受伤之事，在钱塘江畔与殷素素相遇。二人乘船出海，谢逊夺得屠龙刀后追杀而至。谢逊以狮吼功震晕众人，挟持张翠山、殷素素乘船出海，三人漂流至冰火岛。
- chapter: 4
  title: 字作丧乱意彷徨
  summary: 张翠山在武当山回忆往事，得知都大锦护送俞岱岩途中遭劫。张翠山赶往临安追查，发现龙门镖局满门被杀，疑为殷素素所为。张翠山内心痛苦，既感殷素素之情，又恨其行事狠辣。
- chapter: 5
  title: 皓臂似玉梅花妆
  summary: 张翠山与殷素素在王盘山岛参加扬刀立威大会，谢逊突然出现夺刀。谢逊展示屠龙刀威力，大开杀戒。殷素素被谢逊掌力所伤双目失明，张翠山奋力保护殷素素。三人最终一同出海远漂。
- chapter: 6
  title: 浮槎北溟海茫茫
  summary: 三人在海上漂流，谢逊多次发狂欲杀张殷二人。张翠山与殷素素在患难中相爱，于海上成婚。谢逊时而清醒时而疯狂，三人关系微妙。船继续向北漂行，进入茫茫大海。
- chapter: 7
  title: 谁送冰舸来仙乡
  summary: 三人漂流至冰火岛，殷素素刺瞎谢逊双目。谢逊暴怒追杀，殷素素以计安抚。三人在冰火岛上艰难求生，张翠山与谢逊结为异姓兄弟。殷素素生下张无忌，谢逊认其为义子。
- chapter: 8
  title: 穷发十载泛归航
  summary: 十年后三人决定回归中土。谢逊因双目失明留在冰火岛，张翠山一家三口乘木筏南归。临行前谢逊将屠龙刀的秘密告诉张翠山。三人海上遇风暴，张翠山与殷素素失散，张无忌被人掳走。
- chapter: 9
  title: 七侠聚会乐未央
  summary: 武当七侠重聚于张三丰百岁寿宴前夕。张翠山携妻儿回到武当山，与师兄们团聚。各派人士陆续前来祝寿，实则追问谢逊与屠龙刀下落。气氛由喜转忧，暗流涌动。
- chapter: 10
  title: 百岁寿宴摧肝肠
  summary: 张三丰百岁寿宴上，各大门派逼问谢逊下落。殷素素坦承俞岱岩受伤乃其所为，张翠山愧对师兄，拔剑自刎。殷素素殉夫而死，临终告诫张无忌要提防女人骗他。张无忌中玄冥神掌寒毒，命在旦夕。
- chapter: 11
  title: 有女长舌利如枪
  summary: 张三丰带张无忌下山求医，途经汉水遇常遇春。常遇春引荐张无忌往蝴蝶谷找胡青牛医治。张无忌在汉水舟中初遇周芷若，周芷若喂他吃饭，二人结下情缘。
- chapter: 12
  title: 针其膏兮药其肓
  summary: 张无忌到达蝴蝶谷，胡青牛诊出他中的是玄冥神掌寒毒，不愿医治。张无忌苦求不得，后胡青牛以金针之术为他缓解寒毒。张无忌在蝴蝶谷中自学医术，研读胡青牛的医书。
- chapter: 13
  title: 不悔仲子逾我墙
  summary: 纪晓芙带女儿杨不悔到蝴蝶谷求医。灭绝师太追至，逼纪晓芙杀杨逍。纪晓芙拒师命被灭绝师太击毙，临终托孤于张无忌。张无忌答应护送杨不悔去昆仑山找杨逍。
- chapter: 14
  title: 当道时见中山狼
  summary: 张无忌带杨不悔万里西行，途中历尽艰辛。在昆仑山遇到何太冲、班淑娴夫妇，险遭毒手。张无忌将杨不悔安全送到杨逍手中，杨逍感激不尽。
- chapter: 15
  title: 奇谋秘计梦一场
  summary: 张无忌独行江湖，被朱长龄设计欺骗。朱长龄企图利用张无忌找到谢逊夺取屠龙刀，阴谋败露后张无忌坠入万丈深渊。在山谷中发现白猿腹中的九阳真经手抄本。
- chapter: 16
  title: 剥极而复参九阳
  summary: 张无忌在山谷中修炼九阳真经，以五年之功将寒毒驱尽，练成九阳神功。他打通山洞石壁，重回人间。遇到朱九真等人，误入红梅山庄。张无忌武功大进，但不自知。
- chapter: 17
  title: 青翼出没一笑飏
  summary: 张无忌遇到峨嵋派弟子，周芷若再次出现。丁敏君欺辱周芷若，张无忌出手相救。灭绝师太率弟子西行，张无忌暗中跟随。峨嵋派在西域遭遇金花婆婆袭击。
- chapter: 18
  title: 倚天长剑飞寒铓
  summary: 灭绝师太展示倚天剑威力，一剑斩断金花婆婆的珊瑚杖。六大派商议围攻光明顶，峨嵋派誓师出征。张无忌随队前往，暗中保护周芷若。途中得知明教内乱的真相。
- chapter: 19
  title: 祸起萧墙破金汤
  summary: 明教内部四分五裂，杨逍与五散人、韦一笑等人积怨甚深。说不得将张无忌装入布袋背上光明顶。六大派围攻在即，明教众人终于放下恩怨，合力抗敌。
- chapter: 20
  title: 与子共穴相扶将
  summary: 张无忌与小昭进入光明顶秘道，发现阳顶天夫妇遗骸和乾坤大挪移心法。张无忌修炼乾坤大挪移，以七层之功练成历代教主未竟之境。二人从秘道中脱困，赶赴光明顶主战场。
- chapter: 21
  title: 排难解纷当六强
  summary: 张无忌赶到光明顶，以一人之力连败六大派高手。先后击败崆峒、华山、昆仑、少林各派，又与灭绝师太激战。灭绝师太以倚天剑猛攻，张无忌以乾坤大挪移巧妙化解。武当派宋远桥等与张无忌交手时手下留情。
- chapter: 22
  title: 群雄归心约三章
  summary: 张无忌力挽狂澜，解光明顶之围。明教众人感其恩德，拥立他为新任教主。张无忌约法三章，约束明教弟子不得滥杀无辜。六大派败退，明教暂获安宁。
- chapter: 23
  title: 灵芙醉客绿柳庄
  summary: 赵敏在绿柳山庄设宴招待张无忌等人，暗中下毒。张无忌识破诡计，与赵敏在地牢中斗智斗勇。张无忌以赵敏脚上的穴道相逼，赵敏服软。二人之间暗生情愫。小昭随行，叮当声不断。
- chapter: 24
  title: 太极初传柔克刚
  summary: 赵敏率众攻打武当山，张三丰身受重伤。张无忌赶到武当，张三丰临危传授太极拳剑。张无忌以太极功夫击败赵敏麾下高手阿大、阿二、阿三。赵敏见势不妙，率众撤退。
- chapter: 25
  title: 举火燎天何煌煌
  summary: 赵敏率众突袭光明顶，明教损失惨重。张无忌以九阳神功驱退玄冥神掌寒毒，实力更上层楼。明教重新整顿，张无忌率众追击赵敏。杨逍、范遥等高手纷纷出手。
- chapter: 26
  title: 俊貌玉面甘毁伤
  summary: 范遥自毁容貌潜入汝阳王府卧底多年，终于现身。赵敏在万安寺囚禁六大派高手，逼迫他们投降。张无忌潜入万安寺，与赵敏再次交锋。范遥暗中相助。
- chapter: 27
  title: 百尺高塔任回翔
  summary: 张无忌率众攻入万安寺，救出被囚禁的各大门派高手。灭绝师太拒绝张无忌相救，从高塔上跳下身亡。周芷若接任峨嵋派掌门。万安寺大火，众人纷纷从塔上跃下，张无忌以乾坤大挪移接住。
- chapter: 28
  title: 恩断义绝紫衫王
  summary: 张无忌应赵敏之请借屠龙刀一观。金花婆婆现身，原来她是紫衫龙王黛绮丝。黛绮丝与谢逊旧怨深重，欲夺屠龙刀。张无忌从中调解，但恩怨难消。
- chapter: 29
  title: 四女同舟何所望
  summary: 张无忌与赵敏、周芷若、殷离、小昭四女同舟出海。波斯明教使者追至，出示圣火令要黛绮丝回去受审。小昭被揭示为波斯明教圣女。张无忌面临四女的感情纠葛，左右为难。
- chapter: 30
  title: 东西永隔如参商
  summary: 小昭为救众人，答应随波斯明教使者回去担任圣女。张无忌与小昭依依惜别，小昭唱起离歌。殷离被周芷若所伤，赵敏也受了伤。屠龙刀和倚天剑在混战中失落。
- chapter: 31
  title: 刀剑齐失人云亡
  summary: 殷离伤重不治，张无忌悲痛万分。周芷若趁乱夺取屠龙刀和倚天剑，刀剑互砍而断。张无忌在灵蛇岛上发现谢逊的踪迹。赵敏伤势加重，张无忌左右为难。
- chapter: 32
  title: 冤蒙不白愁欲狂
  summary: 张无忌误以为赵敏杀害殷离、盗走刀剑，与赵敏决裂。赵敏百口莫辩，含冤离去。张无忌后来发现真相，知道是周芷若所为。张无忌内心痛苦，既恨自己错怪赵敏，又对周芷若心生疑虑。
- chapter: 33
  title: 箫长琴短衣流黄
  summary: 张无忌与赵敏冰释前嫌，二人并骑同行。张无忌得知谢逊被丐帮所擒，赶赴卢龙营救。赵敏受伤未愈，张无忌不敢在她面前太过关怀周芷若。二人在破庙中避雨。
- chapter: 34
  title: 新妇素手裂红裳
  summary: 周芷若在濠州与张无忌举行婚礼。赵敏突然闯入，以谢逊的头发为证要张无忌随她去救义父。张无忌在婚礼上抛下周芷若，随赵敏而去。周芷若大怒，裂红裳而去，从此性情大变。
- chapter: 35
  title: 屠狮有会孰为殃
  summary: 少林寺召开屠狮大会，各派齐聚欲杀谢逊报仇。张无忌率明教群豪赶到，与少林三僧渡厄、渡劫、渡难的金刚伏魔圈展开激战。张无忌受伤，赵敏在一旁焦急守护。
- chapter: 36
  title: 夭矫三松郁青苍
  summary: 张无忌在雨夜追蹑成昆（圆真），发现谢逊被囚于少林寺外。成昆与谢逊的恩怨终于揭晓：成昆杀谢逊全家，谢逊疯狂复仇滥杀无辜。张无忌欲救义父，但三僧的金刚伏魔圈难以突破。
- chapter: 37
  title: 天下英雄莫能当
  summary: 屠狮大会正式比武，各派争夺武林至尊之位。张无忌率明教高手迎战各方。周芷若以九阴白骨爪大显神威，震惊全场。黄衫女突然出现，以正宗九阴真经武功击败周芷若。
- chapter: 38
  title: 君子可欺之以方
  summary: 谢逊与成昆在少林寺中了结恩怨。谢逊在佛前忏悔，放弃复仇。成昆被谢逊制服，谢逊剃度出家，法号渡厄。各派见谢逊已归佛门，不再追究。三僧解围，谢逊平安。
- chapter: 39
  title: 秘笈兵书此中藏
  summary: 屠龙刀和倚天剑的秘密终于揭晓：刀剑中藏有武穆遗书、九阴真经和降龙十八掌精义。周芷若的阴谋败露，张无忌不再追究。黄衫女将九阴真经交还，飘然离去。张无忌感叹武林至尊的虚妄。
- chapter: 40
  title: 不识张郎是张郎
  summary: 少林大会结束，群雄散去。张无忌辞去明教教主之位，与赵敏退隐江湖。周芷若出家为尼，殷离复活归来。张无忌在赵敏为他画眉时，才真正明白自己心中所爱。全书终。
