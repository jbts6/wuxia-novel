- id: item_hei_yu_duan_xu_gao
  name: 黑玉断续膏
  aliases: []
  type: 丹药
  description: |-
    说明：西域传来的珍贵药膏,能续接被捏断的骨骼。张无忌以此药膏治愈了俞岱岩被大力金刚指捏断的四肢,使其重新站立。此药极为罕见,非寻常药铺所能购得。
    概述：能续接断骨的珍贵药膏,救治俞岱岩
    来历：西域传来
    效果：续接断骨,使残肢恢复;heal
- id: item_huo_yao
  name: 火药
  aliases: []
  type: 其他
  description: |-
    说明：光明顶秘道中藏有的火药,原为明教所备。张无忌与小昭在秘道中发现这些火药,后用于炸开石壁脱困。火药的存在说明明教早有准备,以防万一。
    概述：光明顶秘道中藏有的火药
    来历：明教秘道中所藏
    效果：可炸开石壁等障碍物;special
- id: item_jin_hua
  name: 金花
  aliases: []
  type: 暗器
  description: |-
    说明：紫衫龙王黛绮丝化名金花婆婆时使用的金色花朵暗器。金花既是暗器也是信物,江湖中人见金花即知金花婆婆驾到。金花婆婆以此暗器伤人无数,威力不凡。
    概述：金花婆婆的标志性暗器和信物
    来历：黛绮丝所制
    效果：锋利的金色暗器,可伤人于无形;combat
- id: item_long_zhua_shou
  name: 龙爪手
  aliases: []
  type: 秘籍
  description: |-
    说明：少林派高深爪法,共三十六式。空性大师以此爪法闻名江湖,招式凌厉无比。张无忌在光明顶上与空性交手,以乾坤大挪移看破龙爪手所有招式,空性败退。
    概述：少林派绝学,空性大师的看家本领
    来历：少林派所有
    效果：三十六式凌厉爪法,招招攻敌要害;combat
- id: item_qing_lu
  name: 青驴
  aliases: []
  type: 其他
  description: |-
    说明：郭襄骑着这头青驴遍访江湖,寻找杨过的踪迹。青驴载着她从河南到少林寺,又从少林寺南下。郭襄在驴背上吟诗作词,青驴是她浪迹天涯的忠实伙伴。
    概述：郭襄的坐骑,随她行走江湖
    来历：郭襄所有
- id: item_tie_luo_han
  name: 铁罗汉
  aliases: []
  type: 其他
  description: |-
    说明：少林寺无色禅师赠予郭襄的一对铁铸罗汉玩具。这对铁罗汉机关精巧,能自行对打拳招。张君宝后来以此铁罗汉中暗藏的拳谱自学武功,奠定了武当派武学的基础。
    概述：无色禅师赠予郭襄的铁铸罗汉
    来历：无色禅师赠予郭襄
- id: item_wen_xu_zhen
  name: 蚊须针
  aliases: []
  type: 暗器
  description: |-
    说明：殷素素使用的极细暗器,细如蚊须,中者难以察觉。殷素素以此针暗算俞岱岩,使其受伤后被大力金刚指捏断四肢。蚊须针是殷素素的成名暗器,体现了她行事狠辣的一面。
    概述：殷素素的暗器,致使俞岱岩受伤
    来历：殷素素所有
    效果：中者难以察觉,逐渐发作;debuff
- id: item_zhu_hua
  name: 珠花
  aliases: []
  type: 其他
  description: |-
    说明：赵敏赠予张无忌的一朵珠花,是二人感情的信物。张无忌一直贴身收藏,即使在与周芷若成婚之际,仍念念不忘。珠花见证了二人从敌对到相爱的过程。
    概述：赵敏赠予张无忌的珠花,二人定情之物
    来历：赵敏赠予张无忌
