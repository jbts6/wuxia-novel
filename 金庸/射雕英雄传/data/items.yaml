- id: item_she_zhang
  name: 蛇杖
  aliases: []
  type: 武器
  description: |-
    说明：白驼山掌门欧阳锋的独门兵器,杖头铸有两条怪蛇,蛇口可喷射毒液。此杖配合欧阳锋的蛤蟆功使用,威力倍增。杖身以精钢打造,坚韧异常。欧阳锋以此杖横行西域数十年,罕逢敌手。
    欧阳锋的独门兵器,杖头铸有怪蛇
    来历：白驼山欧阳锋自铸
    效果：杖头怪蛇可喷射剧毒;伤害;毒液可令对手中毒麻痹;控制
- id: item_tie_qiang
  name: 铁枪
  aliases: []
  type: 武器
  description: |-
    说明：杨铁心祖传的铁枪,枪身沉重,枪尖锋利。杨铁心以此枪施展杨家枪法,武艺不凡。牛家村铁枪庙中供奉的便是此枪。杨铁心以此枪闯入王府寻妻,最终夫妇双双殉情。此枪见证了杨家的悲欢离合。
    杨铁心的家传铁枪,杨家枪法所用
    来历：杨铁心祖传
    效果：配合杨家枪法威力倍增;伤害
- id: item_wu_mu_yi_shu
  name: 武穆遗书
  aliases: []
  type: 秘籍
  description: |-
    说明：南宋名将岳飞所著兵法,记载行军打仗、排兵布阵的精要。完颜洪烈千方百计搜寻此书,企图以此增强金国军力。郭靖得知后立志夺回,此书最终下落不明。书中兵法对郭靖后来的军事生涯影响深远。
    岳飞所著兵法奇书,记载行军布阵之要
    来历：南宋名将岳飞所著
    效果：习得者可精通行军布阵之法;增益
