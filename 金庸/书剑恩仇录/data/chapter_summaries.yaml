- chapter: 11
  title: 第一卷卷轴一展开，袁枚和众人都是一惊，原来是祝允明所书的李义山两首无题诗。袁枚称他为“樊榭先生”的那人名叫厉鹗，也是杭州人。厉鹗诗词俱佳，词名尤着，审音守律，辞藻绝胜，为当时词坛祭酒，见是祝允明书法，连叫：“这就名贵得很了。”杭州诗人赵翼心急，忙去打开第二个卷轴来看，见是唐寅所画的一幅簪花仕女图，上面还盖着“乾隆御览之宝”的朱印。袁枚心知有异，忙问旁边两人道：“沈年兄、蒋大哥，你们瞧这送书画之人是什么来头？”
  summary: 白振通过猎犬追踪发现玉如意院中地道；乾隆被囚于六和塔；乾隆寝殿外六名侍卫被神秘刺客杀害；乾隆在玉如意院中被红花会擒获；乾隆追逐玉如意；西湖花国状元评选；周绮携猫试毒戏弄乾隆
