- id: item_chi_xie_fen
  name: 赤蝎粉
  aliases: []
  type: 丹药
  description: 程灵素使用的接触性毒粉,触之如火炙并可令皮肉焦肿剧痛;她曾将其涂于铁锥和玉龙杯,并混入七心海棠叶粉以消除异味、增强毒性。
- id: item_duan_chang_cao
  name: 断肠草
  aliases: []
  type: 丹药
  description: 可制成猛毒粉末的剧毒药草,粉末飞入眼中会造成剧痛失明;田归农以其毒瞎苗人凤,石万嗔后来也被断肠草熏瞎双眼。
- id: item_fan_mu_bie
  name: 番木鳖
  aliases: []
  type: 丹药
  description: 与鹤顶红一同混入参汤的毒物,两毒夹攻,使解救中毒者大费手脚。
- id: item_fei_yan_yin_suo
  name: 飞燕银梭
  aliases: []
  type: 暗器
  description: 赵半山别出心裁制成的弧形暗器,掷出后能够转弯并飞回手中。
- id: item_gui_bian_fu_ju_du
  name: 鬼蝙蝠剧毒
  aliases: []
  type: 丹药
  description: 一种无药可解的剧毒,中毒者脸现黑点、肌肉扭曲;姜小铁曾用它毒死两名孟家人,而使用此毒伤人违反无嗔门下大戒。
- id: item_he_ding_hong
  name: 鹤顶红
  aliases: []
  type: 丹药
  description: 福康安之母曾将此毒与番木鳖混入参汤,令马春花濒死;它也是九大禁药之一,与碧蚕毒蛊、孔雀胆混用时外表无色,却会使剧毒入心、无药可治。
- id: item_jiang_tiao_hou_de_jie_yao
  name: 蒋调侯的解药
  aliases: []
  type: 丹药
  description: 装在小瓷瓶中的黄色药粉,可保住中了绝门毒针者的性命,但不能立刻解除腿部麻痹。
- id: item_jin_feng_bei
  name: 金凤杯
  aliases: []
  type: 其他
  description: 杯身刻有飞凤的八只金杯,用来授予福康安划定的金凤八门。
- id: item_jin_feng_zhu_chai
  name: 金凤珠钗
  aliases: []
  type: 其他
  description: 南兰的金凤珠钗在她与田归农私通时跌到床前,由田归农拾起并插回她头上,标志她决意离开丈夫。
- id: item_jue_men_du_zhen
  name: 绝门毒针
  aliases: []
  type: 丹药
  description: 贵州蒋氏闻名天下的剧毒暗器,苗人凤腿中两针后下半身迅速麻痹,运功追逐会令毒性加快发作。
- id: item_kong_que_dan
  name: 孔雀胆
  aliases: []
  type: 丹药
  description: 与碧蚕毒蛊、鹤顶红混用后无色无臭,虽见效较缓,却剧毒无解。
- id: item_ku_sang_bang
  name: 哭丧棒
  aliases: []
  type: 其他
  description: 钟兆英所使的怪异兵刃,介乎刚柔之间,兼有杆棒、鞭锏及判官笔点穴的路数。
- id: item_lan_hua
  name: 蓝花
  aliases: []
  type: 丹药
  description: 程灵素新试种的深蓝色花卉,是血矮栗的克星;其香气可使携带者不受血矮栗毒气侵害,并能救醒中毒者。
- id: item_lei_zhen_dang
  name: 雷震挡
  aliases: []
  type: 其他
  description: 塞北白家堡一派的奇形兵刃,横条弯曲如蛇、两端尖利,与闪电锥合使时威力更大;褚姓老者的一件曾被胡斐借用,后在斗剑中毁坏。
- id: item_leng_yue_bao_dao
  name: 冷月宝刀
  aliases: []
  type: 武器
  description: 三尺来长的青森森弯刀,刀柄嵌有一钩眉月,锋利坚韧,可轻易斩断寻常利刃并与天龙宝刀正面相抗;后来封存于胡一刀墓前。
- id: item_qi_xin_hai_tang
  name: 七心海棠
  aliases: []
  type: 丹药
  description: 程灵素培植的天下第一毒物,花枝如铁、花瓣有七个黄点,须以酒浇灌;根茎花叶皆含奇毒,制炼后可入药拔毒,也可制成无色无臭的致命毒物。
- id: item_qing_se_yao_wan
  name: 青色药丸
  aliases: []
  type: 丹药
  description: 石先生给巴姓武官服下的两粒药丸,可令其腹痛呕吐,用来配合暗投蜈蚣的骗局。
- id: item_san_wu_wu_ma_yan
  name: 三蜈五蟆烟
  aliases: []
  type: 丹药
  description: 程灵素曾在掌门人大会施放的毒烟,其中加入七心海棠花蕊以消除异味并增强毒性。
- id: item_shan_dian_zhui
  name: 闪电锥
  aliases: []
  type: 其他
  description: 塞外上官姓武师藏在袖中、以右手使用的奇门兵刃,与左手所使雷震挡相辅相成。
- id: item_sheng_sheng_zao_hua_dan
  name: 生生造化丹
  aliases: []
  type: 丹药
  description: 无嗔大师耗费数年炼成的三粒丹药,每粒可为三毒入心者延寿三年,但九年后再服无效。
- id: item_ti_hu_xiang
  name: 醍醐香
  aliases: []
  type: 丹药
  description: 程灵素培植的小白花,香气可使人如饮烈酒;经七心海棠炼制的三束醍醐香可由三人运气施放以退敌而不致命。
- id: item_tian_long_bao_dao
  name: 天龙宝刀
  aliases: []
  type: 武器
  description: 天龙门南北二宗轮值执掌的传世宝刀,短于常刀、光如宝石寒冰,削铁如泥;田归农持有时被胡斐夺走,并被用于斩杀凤天南。
- id: item_tou_gu_ding
  name: 透骨钉
  aliases: []
  type: 暗器
  description: 慕容景岳自铸的独门暗器;程灵素曾将七心海棠毒质与假信附在钉上击中姜小铁,以引姜铁山夫妇赴约。
- id: item_wu_chen_yi_yao_lu
  name: 无嗔医药录
  aliases: []
  type: 丹药
  description: 无嗔大师毕生心血所著、门下称为《药王神篇》的医药典籍,九成以上记载治病救伤与解毒之法;书页染有剧毒,并严戒将无解剧毒混用。
- id: item_wu_ying_yin_zhen
  name: 无影银针
  aliases: []
  type: 暗器
  description: 汤沛藏在靴底机关中的细小银针,足跟触地即可从足尖射出,曾暗助凤天南并伤及胡斐、圆性。
- id: item_xiao_zhu_rong_de_huo_qi
  name: 小祝融的火器
  aliases: []
  type: 暗器
  description: 小祝融曹猛的成名火器,装在带弹簧的铁匣中,可发射火球暗算敌人。
- id: item_xue_ai_li
  name: 血矮栗
  aliases: []
  type: 丹药
  description: 环绕药王庄的殷红矮树,散发可令人昏厥的浓香,生长处寸草不生、虫蚁绝迹;其毒性本无药可解,须常服树上栗子或携带蓝花抵御。
- id: item_xue_yin_shi
  name: 血印石
  aliases: []
  type: 其他
  description: 佛山祖庙北帝神像前带有隐隐血迹的石头,被视为“吃螺误为吃鹅、破儿腹明冤”惨案的见证。
- id: item_yin_li_bei
  name: 银鲤杯
  aliases: []
  type: 其他
  description: 杯上刻有跃鲤,共八只,用来授予福康安划定的银鲤八门。
- id: item_yin_shuang_zhu_dian_ju
  name: 银霜逐电驹
  aliases: []
  type: 其他
  description: 骆冰珍爱的白马,脚程极快,赵半山曾骑它两天从北京赶到商家堡;后由骆冰托袁紫衣带来赠给胡斐,被称为万金难求的宝马。
- id: item_yu_long_yu_bei
  name: 玉龙御杯
  aliases: []
  type: 其他
  description: 乾隆钦赐、杯身刻有蟠龙的成套玉杯,是掌门人大会最高等级门派名位的象征;其中七只被程灵素预先布毒并在大会上同时跌碎。
- id: item_yun_zhou
  name: 云帚
  aliases: []
  type: 其他
  description: 圆性所持的特制云帚,帚丝中装有极大磁铁,可从人体中吸出镀银铁针。
- id: item_zi_jin_ba_gua_dao
  name: 紫金八卦刀
  aliases: []
  type: 武器
  description: 商剑鸣遗下的厚背薄刃紫金宝刀,是商家堡复仇与八卦门传承的象征;后由商宝震携用,并成为徐铮与商宝震决斗中的关键兵刃。
- id: item_zi_xie_fen
  name: 紫蝎粉
  aliases: []
  type: 丹药
  description: 程灵素发现床下藏敌时撒出的紫褐色毒粉,曾被石万嗔以掌力震出床底。
