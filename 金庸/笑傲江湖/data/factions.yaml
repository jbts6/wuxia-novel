  description: 说明：司马大所在的岛上势力,其部属曾与天河帮帮众一同护送令狐冲等人前往五霸冈。
- id: faction_da_li_duan_shi
  name: 大理段氏
  aliases: []
  type: 武学世家
  description: 说明：任我行所述修习北冥神功、志在为善的武学世家。
- id: faction_e_mei_pai
  name: 峨嵋派
  aliases: []
  type: 武林门派
  description: 说明：四川武林名门,掌门为金光上人;曾派高手参加五岳并派大典,后与正派群雄聚集恒山应对日月神教。
- id: faction_feng_lei_tang
  name: 风雷堂
  aliases: []
  type: 日月神教堂口
  description: 说明：日月神教下属堂口,由童百熊担任堂主;东方不败早年曾任风雷堂长老座下副香主。
- id: faction_fu_jian_quan_zhou_shao_lin_si_xia_yuan
  name: 福建泉州少林寺下院
  aliases: []
  type: 少林支院
  description: 说明：由红叶禅师主持的少林支院,百余年前曾保存《葵花宝典》,原书后来在红叶禅师临终前焚毁。
- id: faction_fu_wei_biao_ju
  name: 福威镖局
  aliases: []
  type: 镖局
  description: 说明：林远图创办、林家三代经营的镖局,总号设在福州并有多省分局;因辟邪剑谱遭青城派袭击而家破人亡。
- id: faction_gai_bang
  name: 丐帮
  aliases: []
  type: 帮会
  description: 说明：号称江湖第一大帮、潜力极强的江湖帮会,由解风任帮主,张金鳌任副帮主,并参与少林与嵩山等武林大会。
- id: faction_heng_shan_pai_bdampoff
  name: 衡山派
  aliases: []
  type: 五岳剑派
  description: 说明：五岳剑派之一,由莫大先生执掌,以变幻灵动的衡山剑法著称;派中刘正风曾欲退出江湖,门派后来反对五岳并派,并在思过崖山洞折损大批高手。
- id: faction_heng_shan_pai_ilhhjpef
  name: 恒山派
  aliases: []
  type: 五岳剑派
  description: 说明：五岳剑派之一,以女尼和俗家女弟子为主,戒律严谨,长于圆转绵密的剑法并拥有多种治伤灵药;定闲临终传位令狐冲,门派随后抗拒五岳强并及日月神教压服。
- id: faction_hua_shan_pai
  name: 华山派
  aliases: []
  type: 门派
  description: |-
    说明：五岳剑派之一,驻于华山,以气功和剑术传承,由岳不群执掌;门中曾因气宗、剑宗之争严重内耗,后来并入五岳派。
    驻地：loc_hua_shan
- id: faction_hua_shan_qi_zong
  name: 华山气宗
  aliases: []
  type: 门派分支
  description: |-
    说明：华山派以气为主、重视内功的支脉,以岳肃为祖,玉女峰大比剑后成为华山正统,后由岳不群执掌。
    驻地：loc_hua_shan
- id: faction_huang_he_lao_zu
  name: 黄河老祖
  aliases: []
  type: 江湖组合
  description: 说明：老头子与祖千秋因分别姓老、姓祖且居于黄河沿岸而得的合称。
- id: faction_jiang_nan_si_you
  name: 江南四友
  aliases: []
  type: 隐居武林团体
  description: 说明：黄钟公、黑白子、秃笔翁、丹青生四兄弟组成的梅庄主人群体,以琴棋书画自娱,奉命共同看守西湖底的任我行。
- id: faction_jin_dao_men
  name: 金刀门
  aliases: []
  type: 洛阳武林世家与门派
  description: 说明：金刀无敌王元霸主持的洛阳武林世家,艺高势大,是林夫人的娘家。
- id: faction_jiu_jiang_bai_jiao_bang
  name: 九江白蛟帮
  aliases: []
  type: 江湖帮会
  description: 说明：由史帮主率领的九江帮会,长江双飞鱼等帮众曾加入迎救圣姑的群豪队伍。
- id: faction_kun_lun_pai
  name: 昆仑派
  aliases: []
  type: 武林门派
  description: 说明：剑法兼具沉雄轻灵的正教名门,由震山子执掌;门人谭迪人等曾参与江湖行动,并曾应邀参加五岳并派大典、与正派群雄聚集恒山。
- id: faction_qing_cheng_pai
  name: 青城派
  aliases: []
  type: 武林门派
  description: 说明：川西武林门派,以松风观为重要驻地,由余沧海执掌,以松风剑法等武学闻名;为夺辟邪剑谱摧毁福威镖局,余沧海死后余众仍追杀林平之。
- id: faction_qing_long_bang
  name: 青龙帮
  aliases: []
  type: 江湖帮会
  description: 说明：活动于汉水一带的江湖帮会,施令威归隐前曾在汉水江头杀败该帮十三名头目。
- id: faction_ri_yue_shen_jiao
  name: 日月神教
  aliases: []
  type: 江湖教派
  description: 说明：以黑木崖为总坛的江湖大教,教外多称“魔教”;先后由东方不败、任我行执掌,以黑木令和三尸脑神丹控制部属,长期与正教诸派对峙。
- id: faction_shao_lin_si
  name: 少林寺
  aliases: []
  type: 佛门武林门派
  description: 说明：由方证大师任方丈的佛门武学势力,门中有方生大师等僧人,传有少林神拳并曾为令狐冲疗伤。
- id: faction_shen_wu_bang
  name: 神乌帮
  aliases: []
  type: 地方帮会
  description: 说明：活动于汉水及鄂北至豫南一带的地方帮会,曾受令狐冲差遣来回传递消息。
- id: faction_shui_yue_an
  name: 水月庵
  aliases: []
  type: 武林尼庵
  description: 说明：龙泉城西的武林尼庵,由清晓师太主持,庵中藏有五柄龙泉宝剑,遭嵩山势力夜袭后荒废。
- id: faction_song_shan_pai
  name: 嵩山派
  aliases: []
  type: 五岳剑派
  description: |-
    说明：五岳剑派之一,由左冷禅执掌并长期占据五岳盟主之位;为促成五岳并派,多次以劫持、围攻、纵火和冒充日月神教等手段胁迫他派,后在思过崖损失大批高手。
    驻地：loc_song_shan
- id: faction_tai_shan_pai
  name: 泰山派
  aliases: []
  type: 五岳剑派
  description: 说明：由东灵道人创立的五岳剑派之一,剑法以厚重沉稳见长;天门道人任掌门时反对并派,门内随后因并派之争分裂,多名高手后来死于思过崖山洞。
- id: faction_tao_gu_liu_xian
  name: 桃谷六仙
  aliases: []
  type: 江湖异士组合
  description: 说明：桃根仙、桃干仙、桃枝仙、桃叶仙、桃花仙、桃实仙六兄弟的合称;六人武功怪异高强、争辩不休,极重手足情义并视令狐冲为朋友。
- id: faction_tian_feng_tang
  name: 天风堂
  aliases: []
  type: 日月神教堂口
  description: 说明：日月神教下属堂口,由桑三娘任香主。
- id: faction_tian_he_bang
  name: 天河帮
  aliases: []
  type: 帮会
  description: 说明：黄伯流统领的齐鲁豫鄂大帮,号令万余帮众,曾在五霸冈搭棚备酒款待令狐冲。
- id: faction_wu_dang_pai
  name: 武当派
  aliases: []
  type: 武林门派
  description: 说明：传承武当长拳的武林门派。
- id: faction_wu_xian_jiao
  name: 五仙教
  aliases: []
  type: 教派
  description: 说明：云南用毒教派,原名五毒教,教众多为云贵川湘苗人,善使瘴、蛊、毒及毒蛇毒虫,现任教主为蓝凤凰。
- id: faction_wu_yue_jian_pai
  name: 五岳剑派
  aliases: []
  type: 门派联盟
  description: 说明：由嵩山、泰山、衡山、华山、恒山五派结成的剑派联盟,约定攻守相助、同气连枝,原由左冷禅任盟主;后五派正式合并为五岳派,旧联盟随之名存实亡。
- id: faction_xiao_yao_pai
  name: 逍遥派
  aliases: []
  type: 历史武学门派
  description: 说明：任我行所述的北宋武学门派,其神功后来分为北冥神功与化功大法两门。
- id: faction_xuan_wu_tang
  name: 玄武堂
  aliases: []
  type: 日月神教堂口
  description: 说明：日月神教下属堂口之一,任我行复位后,其长老、堂主与副堂主前往成德殿参见。
- id: faction_zhu_que_tang
  name: 朱雀堂
  aliases: []
  type: 日月神教堂口
  description: 说明：日月神教下属堂口;东方不败掌权之初,童百熊曾杀死不服的朱雀堂罗长老以助其立威。
