- id: item_bai_yun_xiong_dan_wan
  name: 白云熊胆丸
  aliases: []
  type: 丹药
  description: 恒山派用于治疗金创与重伤的珍贵内服丸药,药性猛烈,服后常会昏晕半日以助疗伤。
- id: item_bi_shui_jian
  name: 碧水剑
  aliases: []
  type: 武器
  description: 断金削铁的利器,岳不群从浙江龙泉得来,在岳灵珊十八岁生日时赠给她;与令狐冲拆招时被弹落千丈深谷。
- id: item_bi_xie_jian_pu
  name: 辟邪剑谱
  aliases: []
  type: 秘籍
  description: 令狐冲在福州向阳巷得到的袈裟,袈裟上写有辟邪剑谱,是各方争夺的关键载体。
- id: item_di_lei
  name: 地雷
  aliases: []
  type: 其他
  description: 山上布设的三十二处地雷,同时爆炸后截断了日月神教教众的下山之路。
- id: item_du_zhen
  name: 毒针
  aliases: []
  type: 丹药
  description: 岳不群暗藏掌中的带毒细针,曾刺伤左冷禅手掌并刺瞎其双眼;定闲、定逸心口的针孔也成为查明死因与凶手武功的关键线索。
- id: item_hei_mu_ling
  name: 黑木令
  aliases: []
  type: 其他
  description: 日月神教的权威令牌,为长约半尺、雕有花纹文字的焦黑木牌,令牌驾到有如教主亲临,可用来传达或假传教主号令。
- id: item_hei_xue_shen_zhen
  name: 黑血神针
  aliases: []
  type: 暗器
  description: 曲洋突围时撒出的一丛黑针暗器,数量多且来势极快,曾令十余人中针;本次使用的针上并未喂毒。
- id: item_jin_si_yu_wang
  name: 金丝渔网
  aliases: []
  type: 其他
  description: 岳不群从老头子处取得的坚韧巨网,刀剑割之纹丝不动,曾被用来同时罩住并捆缚令狐冲与任盈盈。
- id: item_jiu_long_bao_yi
  name: 九龙宝椅
  aliases: []
  type: 丹药
  description: 九龙宝椅的椅脚装有药引,并通向火药堆,成为群雄设局爆破的关键机关。
- id: item_kui_hua_bao_dian
  name: 葵花宝典
  aliases: []
  type: 秘籍
  description: 相传为前朝宪官所著的至高武学秘笈,日月神教将其作为历代教主相传的镇教之宝;所传残本要诀要求自宫、炼丹服药,与辟邪剑谱同出一源。东方不败死后,其所持册页被任我行运功搓碎。
- id: item_long_quan_bao_jian
  name: 龙泉宝剑
  aliases: []
  type: 武器
  description: 水月庵所藏的五柄削铁如泥的宝剑,帮助恒山派斩断敌兵、且战且退,并支撑到援军赶到。
- id: item_san_shi_nao_shen_dan
  name: 三尸脑神丹
  aliases: []
  type: 丹药
  description: 日月神教用以控制教众的毒丹,丹内裹有尸虫,需定期服解药压制;否则尸虫入脑嚼食脑髓,使人痛苦发狂。不同药主所制丹药的解药不能通用。
- id: item_si_xue_qi_du
  name: 死穴奇毒
  aliases: []
  type: 丹药
  description: 神秘高手在田伯光双乳下点死穴后所下的奇毒,留下两枚钱大红点,随时日腐烂蔓延,最终可使中毒者全身烂死。
- id: item_tian_xiang_duan_xu_jiao
  name: 天香断续胶
  aliases: []
  type: 丹药
  description: 恒山派调制不易、千金难买的治伤圣药,外敷深创可迅速止血,多次用于救治令狐冲的刀剑伤。
- id: item_wu_bao_hua_mi_jiu
  name: 五宝花蜜酒
  aliases: []
  type: 丹药
  description: 五仙教自酿的花蜜酒,酒中浸有青蛇、蜈蚣、蜘蛛、蝎子和蟾蜍;令狐冲饮下后能抵御酒瓶上的毒。
- id: item_wu_xian_da_bu_yao_jiu
  name: 五仙大补药酒
  aliases: []
  type: 丹药
  description: 五毒教祖传秘方所酿,以五种珍奇毒虫及数十种奇花异草入酒,可使人百病不生、诸毒不侵并增长功力,同时具有剧毒。
- id: item_xi_xue_shui_zhi
  name: 吸血水蛭
  aliases: []
  type: 其他
  description: 一百多条比寻常水蛭大一倍有余的吸血水蛭,蓝凤凰与四名苗女用它们将自身鲜血转注入令狐冲体内。
- id: item_xiu_hua_zhen
  name: 绣花针
  aliases: []
  type: 暗器
  description: 东方不败所用的寸许长钢针,能凭深厚功力拨开长剑、瞬间刺穴,临死时更被弹入任我行右目。
- id: item_xu_ming_ba_wan
  name: 续命八丸
  aliases: []
  type: 丹药
  description: 平一指为老不死胎中怪病所开的八颗珍稀丸药,由老头子费尽心力搜集数十种纯阴珍药制成,宣称可救治重大内外伤;祖千秋盗出后混入八杯酒让令狐冲服下。
- id: item_xuan_tie_qi_ping
  name: 玄铁棋枰
  aliases: []
  type: 武器
  description: 黑白子使用的二尺见方、厚达一寸的棋枰式兵器,能吸附铁制棋子与兵刃,也可以沉重枰身直接攻击。
- id: item_yang_zhi_yu_ma
  name: 羊脂玉马
  aliases: []
  type: 其他
  description: 福威镖局湘局保管的一对五寸来高羊脂玉马,被申师哥从棺材中搜出,原拟充作赠给刘正风的贺礼,后由林平之取回。
- id: item_yi_jin_jing
  name: 《易筋经》
  aliases: []
  type: 秘籍
  description: 少林寺至高无上的内功绝艺,骑驴老者拟请方证传给令狐冲,以化解吸星大法之害并换取群豪散去。
- id: item_yu_xiao
  name: 玉箫
  aliases: []
  type: 其他
  description: 与古琴分置于盘中的玉箫,后由令狐冲取出交给任盈盈吹奏。
- id: item_zha_yao
  name: 炸药
  aliases: []
  type: 丹药
  description: 玄高带到山上的二万斤炸药,用于布置大规模爆破机关。
- id: item_zi_xia_mi_ji
  name: 紫霞秘笈
  aliases: []
  type: 秘籍
  description: 华山派历祖相传的镇山之宝,记载紫霞神功内功心法;岳灵珊曾偷出此书试图救治令狐冲,陆大有遇害后秘笈失踪,后从劳德诺的衣袋中掉出并由岳不群收回。
