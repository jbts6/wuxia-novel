- chapter: 1
  title: 青衫磊落险峰行
  summary: 无量剑东西二宗在剑湖宫比剑，段誉随马五德前来观战。段誉不懂武功却大放厥词，被龚光杰掌掴。钟灵以蛇貂救段誉。神农帮来袭，容子矩中毒身亡。
- chapter: 2
  title: 玉壁月华明
  summary: 神农帮围攻无量剑，段誉被卷入。钟灵的闪电貂咬伤神农帮众人。段誉误入无量山深谷。
- chapter: 3
  title: 马疾香幽
  summary: 段誉跌入无量山深谷，发现无量玉壁和神仙姐姐雕像。在洞中习得北冥神功和凌波微步。
- chapter: 4
  title: 崖高人远
  summary: 段誉离开深谷后被木婉清追杀，后被带入万劫谷。钟万仇和甘宝宝收留段誉。
- chapter: 5
  title: 微步縠纹生
  summary: 木婉清以毒箭射伤段誉，后为他解毒。两人渐生情愫。
- chapter: 6
  title: 谁家子弟谁家院
  summary: 保定帝段正明派人寻找段誉。段誉在万劫谷中与钟灵、木婉清相处。
- chapter: 7
  title: 无计悔多情
  summary: 鸠摩智来天龙寺索取六脉神剑剑谱。枯荣大师等高僧抵抗。段誉被带到天龙寺。
- chapter: 8
  title: 虎啸龙吟
  summary: 段誉在天龙寺中学得六脉神剑。鸠摩智擒走段誉。
- chapter: 9
  title: 换巢鸾凤
  summary: 鸠摩智带段誉前往燕子坞。段誉在曼陀山庄初见王语嫣，惊为天人。
- chapter: 10
  title: 剑气碧烟横
  summary: 段誉在曼陀山庄与王语嫣相处。王夫人对段誉不满。
- chapter: 11
  title: 向来痴
  summary: 慕容复出场。段誉、王语嫣等人遭遇风波。
- chapter: 12
  title: 从此醉
  summary: 丐帮在杏子林中聚会。全冠清等人揭发乔峰身世，乔峰被指为契丹人。
- chapter: 13
  title: 水榭听香　指点群豪戏
  summary: 乔峰身世被揭露，丐帮内乱。乔峰被迫离开丐帮。
- chapter: 14
  title: 剧饮千杯男儿事
  summary: 乔峰在聚贤庄大战群雄，救出阿朱。名震天下。
- chapter: 15
  title: 杏子林中　商略平生义
  summary: 乔峰与阿朱相处，两人渐生情愫。
- chapter: 16
  title: 昔时因
  summary: 虚竹在少林寺中修行。乔峰潜入少林寺调查身世。
- chapter: 17
  title: 今日意
  summary: 四大恶人出场。段延庆、叶二娘、南海鳄神、云中鹤各显神通。
- chapter: 18
  title: 胡汉恩仇　须倾英雄泪
  summary: 无崖子在擂鼓山设珍珑棋局。段誉、慕容复等人前来破解。
- chapter: 19
  title: 虽万千人吾往矣
  summary: 虚竹误打误撞破解珍珑棋局，得无崖子传功。
- chapter: 20
  title: 悄立雁门　绝壁无余字
  summary: 虚竹成为灵鹫宫主，统率天山三十六洞七十二岛。
- chapter: 21
  title: 千里茫茫若梦
  summary: 天山童姥与李秋水的恩怨。虚竹在天山修炼。
- chapter: 22
  title: 双眸粲粲如星
  summary: 虚竹在冰窖中与西夏公主银川结缘。
- chapter: 23
  title: 塞上牛羊空许约
  summary: 少室山大战。乔峰、段誉、虚竹三兄弟联手对敌。
- chapter: 24
  title: 烛畔鬓云有旧盟
  summary: 乔峰、段誉、虚竹结为兄弟。共同对抗敌人。
- chapter: 25
  title: 莽苍踏雪行
  summary: 阿朱为救段正淳，假扮段正淳赴约，被乔峰误杀。临死前托付乔峰照顾阿紫。
- chapter: 26
  title: 赤手屠熊搏虎
  summary: 乔峰照顾阿紫。阿紫性格刁蛮，对乔峰产生依赖。
- chapter: 27
  title: 金戈荡寇鏖兵
  summary: 乔峰在辽国与耶律洪基结为兄弟。
- chapter: 28
  title: 草木残生颅铸铁
  summary: 大理国内乱。段延庆图谋夺回皇位。
- chapter: 29
  title: 虫豸凝寒掌作冰
  summary: 丁春秋率星宿派弟子四处作恶。虚竹与丁春秋交手。
- chapter: 30
  title: 挥洒缚豪英
  summary: 函谷八友出场，均为苏星河弟子。
- chapter: 31
  title: 输赢成败　又争由人算
  summary: 慕容博假死真相揭露。萧远山现身。
- chapter: 32
  title: 且自逍遥没谁管
  summary: 扫地僧现身，点化慕容博和萧远山。化解多年恩怨。
- chapter: 33
  title: 奈天昏地暗　斗转星移
  summary: 西夏国选驸马。慕容复、段誉等人前往。虚竹与银川重逢。
- chapter: 34
  title: 风骤紧　缥缈峰头云乱
  summary: 段誉终于赢得王语嫣的芳心。
- chapter: 35
  title: 红颜弹指老　刹那芳华
  summary: 段延庆联合慕容复图谋大理国皇位。
- chapter: 36
  title: 梦里真真语真幻
  summary: 段正淳在少室山一役中自尽殉国。
- chapter: 37
  title: 同一笑　到头万事俱空
  summary: 刀白凤揭露段誉身世，段誉实为段延庆之子。
- chapter: 38
  title: 胡涂醉　情长计短
  summary: 慕容复在西夏选驸马失败后彻底疯狂，在坟头自封为王。
- chapter: 39
  title: 解不了　名缰系嗔贪
  summary: 虚竹以生死符制住丁春秋，废其功力。
- chapter: 40
  title: 却试问　几时把痴心断
  summary: 段誉继承大理皇位，成为大理国皇帝。
- chapter: 41
  title: 燕云十八飞骑　奔腾如虎风烟举
  summary: 辽国入侵大宋。乔峰在雁门关逼耶律洪基退兵。
- chapter: 42
  title: 老魔小丑　岂堪一击　胜之不武
  summary: 乔峰在雁门关外自尽殉国。段誉、虚竹悲痛万分。
- chapter: 43
  title: 王霸雄图　血海深恨　尽归尘土
  summary: 阿紫抱着乔峰的尸体跳崖殉情。
- chapter: 44
  title: 念枉求美眷　良缘安在
  summary: 游坦之为阿紫殉情跳崖。
- chapter: 45
  title: 枯井底　污泥处
  summary: 段誉回大理继位，虚竹与银川在灵鹫宫，慕容复疯癫与阿碧相伴。三兄弟各奔前程。
- chapter: 46
  title: 酒罢问君三语
  summary: 段誉治理大理国，开创盛世。
- chapter: 47
  title: 为谁开　茶花满路
  summary: 虚竹继承逍遥派和灵鹫宫，与银川共度余生。
- chapter: 48
  title: 王孙落魄　怎生消得　杨枝玉露
  summary: 慕容复在坟头自封为王，阿碧始终陪伴左右。
- chapter: 49
  title: 敝屣荣华　浮云生死　此身何惧
  summary: 江湖恩怨终有尽时，三位主角各有归宿。
- chapter: 50
  title: 教单于折箭　六军辟易　奋英雄怒
  summary: 天龙八部的故事至此完结。
