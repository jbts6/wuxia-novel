chapter_summary:
  title: "第十四回　谈判顺利"
  summary: "沙曼感激小玉的帮助并邀请她日后同行，小玉透露自己行动是出于自身原因但暂不说明。午夜时分，陆小凤独自前往宫九舱房，发现宫九有严重的自虐倾向——用针刺自己身体并渴望被鞭打。宫九为激怒陆小凤而侮辱沙曼，陆小凤愤怒拿起鞭子。"
  source_refs:
    - chapter: 14
      text: "他是个不平凡的人，是个超人，他的能力，他所拥有的一切，绝不是任何人所能梦想得到。"
    - chapter: 14
      text: "他的躯体苍白而瘦弱，带着斑斑的血渍，却是他自己用针刺出来的。"
    - chapter: 14
      text: "陆小凤忽然冲过去，拿起了鞭子。别人侮辱他，他也许还不会如此愤怒，侮辱他所爱的人，却是他绝对无法忍受的！"
