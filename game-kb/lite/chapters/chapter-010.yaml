chapter_summary:
  title: "第十回　已知将死"
  summary: "陆小凤与小玉在船上发现船底被蜜蜂宫主动了手脚、即将沉没，小玉早有准备用黄蜡封堵漏洞。二人划小艇靠岸后，陆小凤带小玉回到草棚，发现沙曼藏身弥勒佛像中等候。沙曼谎称当日成亲以试探陆小凤心意，二人终于互诉真情。然而牛肉汤突然出现，嘲讽二人，宣布宫九将给予半个时辰逃跑时间后展开追杀，以岛上五千七百多个藏身处为赌注，声称宫九能在三个时辰内找到他们。"
  source_refs:
    - chapter: 10
      text: "她在这小船底下打了两个洞，用蜡封住，被海水一泡，蜡就会溶，海水涌进来，这条船就要沉了。"
    - chapter: 10
      text: "我打赌，用不着三个时辰，九哥就可以找到你。"
