chapter_summary:
  title: "第十一回　逃避追捕"
  summary: "陆小凤与沙曼逃避宫九追捕，陆小凤想出躲进宫九屋中的计策。沙曼拦截运送箱子的人，两人藏入箱中被送入宫九卧房。在屋中遇见面下躲藏的老实和尚。沙曼透露宫九十八个时辰后必须离开去杀人，届时他们便可脱身。"
  source_refs:
    - chapter: 11
      text: "宫九既然要出来追捕他们，自己的屋里一定没有人。"
    - chapter: 11
      text: "十八个时辰后，他已经不在这里。"
    - chapter: 11
      text: "因为外面还有件事一定要等着他去做。"
