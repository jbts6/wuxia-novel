chapter_summary:
  title: "第十六回　重回岛上"
  summary: "陆小凤独自乘小艇重返神秘小岛，途中思念沙曼，推断出小老头是珠宝窃案主谋、宫九是执行者。登岛后与小老头对话，得知珠宝和失踪的一百零三人已被宫九运走，小老头透露岛上已空无一人，并再次邀请陆小凤做接班人。陆小凤提出崔诚密室杀人之谜，小老头提及隐形人但未作解答。"
  source_refs:
    - chapter: 16
      text: "窃案是你策划的，珠宝和失踪的人都在岛上。"
    - chapter: 16
      text: "小老头是主谋，宫九是执行者。"
    - chapter: 16
      text: "珠宝和人已经不在岛上？"
    - chapter: 16
      text: "我心目中理想的接班人，只有一个。"
    - chapter: 16
      text: "小老头笑道：\"记得我对你说过的隐形人吗？\""
