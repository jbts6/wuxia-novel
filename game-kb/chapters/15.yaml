chapter_summary:
  title: "第十五回　仗义救人"
  summary: "陆小凤等人乘小艇遭遇风暴，老狐狸暗中操舵脱险。众人登陆后发现老狐狸的狐狸窝被鹰眼老七占据，原来鹰眼老七受太平王世子之命追查三千五百万两失窃珠宝和一百零三名失踪武林高手。天龙南宗门下（大内侍卫）与伪装武官的神秘势力在狐狸窝激战。陆小凤仗义出手救人，最终识破珠宝藏于木鱼、高手藏于佛像的真相，承诺十五天内找回失物。"
  source_refs:
    - chapter: 15
      text: "这件事牵涉到三千五百万两的金珠珍宝。"
    - chapter: 15
      text: "还有一百零三个精明干练的武林好手，都在一夜之间失踪了。"
    - chapter: 15
      text: "十五天之内，我一定给你找回来。"
