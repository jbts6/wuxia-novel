chapter_summary:
  title: "第十二回　和尚弄鬼"
  summary: "陆小凤和沙曼躲在箱子里准备逃离，老实和尚也在箱子里。小玉帮助他们，将箱子送回宫九的船上。在船上，陆小凤发现箱子里的人变成了沙曼而不是老实和尚，两人重逢。老实和尚则被吊在舱房顶上。"
  source_refs:
    - chapter: 12
      text: "沙曼忽然进箱子，而箱子里的老实和尚却被吊起来了。"
    - chapter: 12
      text: "陆小凤不能相信，也不敢相信，箱子里明明是老实和尚，怎么会忽然又变成沙曼？"
    - chapter: 12
      text: "这不是梦，这是真的。"
